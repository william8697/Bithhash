<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Transaction Details</title>
    <meta name="description" content="Audit‑grade transaction record with real‑time conversion and export.">
    
    <!-- Google Fonts (same as dashboard) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Font Awesome & AOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- TradingView (optional, not used here but kept for consistency) -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        /* ===== EXACT COLOR THEME FROM DASHBOARD ===== */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --security-green: #34A853;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 0 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 0;
            flex: 1;
        }

        /* Header minimal (back & export) */
        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 30px 0 25px 0;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 8px 16px;
            background: var(--lighter);
            border-radius: 30px;
        }
        .back-link:hover {
            color: var(--primary);
            background: rgba(0,216,255,0.1);
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-2px);
        }

        /* security badge */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--darker);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 100;
            border-left: 4px solid var(--security-green);
            color: var(--dark);
        }

        /* ===== MAIN CARD – EXACT MODAL STYLE ===== */
        .transaction-card {
            background: var(--darker);
            border-radius: 24px;
            padding: 25px 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            margin-bottom: 30px;
            border: none;
        }

        /* Header inside card (like modal-header) */
        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--gray-light);
            padding-bottom: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .card-header h3 {
            font-size: 1.6rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            padding: 10px 25px;
            border-radius: 40px;
            margin: 0;
        }
        .asset-icon-large {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* summary grid – binance style */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .summary-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
        }
        .summary-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .summary-value {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
        }
        .summary-sub {
            font-size: 1rem;
            color: var(--gray);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .detail-block {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-light);
            flex-wrap: wrap;
            gap: 8px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            color: var(--gray);
            font-weight: 400;
        }
        .detail-value {
            font-weight: 600;
            text-align: right;
            word-break: break-word;
            max-width: 60%;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .status-badge.success { background: rgba(0,255,0,0.15); color: var(--success); }
        .status-badge.pending { background: rgba(255,184,0,0.15); color: var(--warning); }
        .status-badge.failed { background: rgba(255,0,0,0.15); color: var(--error); }

        .price-positive { color: var(--success); }
        .price-negative { color: var(--error); }

        .network-chip {
            background: var(--lighter);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* profit/loss box */
        .pnl-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 10px 20px;
            border-radius: 40px;
        }

        /* loading / error states */
        .error-container {
            text-align: center;
            padding: 60px 20px;
            background: var(--darker);
            border-radius: 24px;
        }

        /* pdf export section – hidden during export */
        #pdf-footer, .pdf-footer-placeholder {
            display: none;
        }
        .footer-note {
            margin-top: 30px;
            color: var(--gray);
            font-size: 0.8rem;
            text-align: center;
        }

        /* responsive */
        @media (max-width: 600px) {
            .transaction-card { padding: 18px; }
            .card-header h3 { font-size: 1.2rem; padding: 8px 16px; }
            .summary-value { font-size: 1.4rem; }
            .detail-value { max-width: 50%; }
        }
    </style>
</head>
<body>

<div class="security-badge">
    <i class="fas fa-shield-alt"></i>
    <span>256-bit AES & TLS 1.3 Encrypted</span>
</div>

<div class="container" id="export-content">
    <!-- header with back & export -->
    <div class="transaction-header">
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <div class="action-buttons">
            <button class="btn btn-outline" id="printBtn"><i class="fas fa-print"></i> Print</button>
            <button class="btn btn-primary" id="pdfBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
        </div>
    </div>

    <!-- main card (identical to modal) -->
    <div class="transaction-card" id="transaction-card">
        <div class="card-header">
            <h3 id="txTitle">Transaction Details</h3>
        </div>
        <div id="transaction-details-body">
            <!-- dynamically filled exactly as in modal, same structure, no alterations -->
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-clock"></i> All times are UTC • Real‑time rates from CoinGecko
    </div>
</div>

<!-- hidden footer for PDF (company logo + name) -->
<div id="pdf-footer" style="display: none; text-align: center; padding-top: 20px; border-top: 1px solid #333; margin-top: 30px;">
    <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" style="height: 30px; width: auto; vertical-align: middle; margin-right: 10px;">
    <span style="font-family: 'Rowdies', sans-serif; color: var(--primary); font-size: 1.1rem;">BitHash</span>
    <div style="color: #777; font-size: 0.7rem; margin-top: 5px;">© BitHash LLC – audited transaction record</div>
</div>

<script>
    (function() {
        // ----- GLOBAL STATE (EXACTLY COPIED FROM MODAL LOGIC) -----
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
            { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
            { id: 'tether', symbol: 'usdt', name: 'Tether', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png' },
            { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
            { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
            { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' },
            { id: 'xrp', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' }
        ];
        const assetLogos = {};
        topAssets.forEach(a => assetLogos[a.symbol] = a.logo);

        const assetNetworks = {
            'btc': 'Bitcoin', 'eth': 'Ethereum', 'usdt': 'Tron (TRC-20)', 'bnb': 'BNB Smart Chain (BEP-20)',
            'sol': 'Solana', 'usdc': 'Ethereum (ERC-20)', 'xrp': 'XRP Ledger', 'doge': 'Dogecoin',
            'ada': 'Cardano', 'shib': 'Ethereum (ERC-20)', 'avax': 'Avalanche C-Chain', 'dot': 'Polkadot',
            'trx': 'TRON', 'link': 'Ethereum (ERC-20)', 'matic': 'Polygon', 'wbtc': 'Ethereum (ERC-20)',
            'ltc': 'Litecoin', 'near': 'NEAR', 'uni': 'Ethereum (ERC-20)', 'bch': 'Bitcoin Cash',
            'xlm': 'Stellar', 'atom': 'Cosmos', 'xmr': 'Monero', 'flow': 'Flow', 'vet': 'VeChain',
            'fil': 'Filecoin', 'theta': 'Theta', 'hbar': 'Hedera', 'ftm': 'Fantom', 'xtz': 'Tezos'
        };

        // current prices (to be fetched)
        let currentPrices = {};
        let currentBTCPrice = 43000;

        // ----- HELPER FUNCTIONS (exact copies from dashboard) -----
        function formatUSD(num) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
            if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
            if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
            const parts = n.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return '$' + parts.join('.');
        }
        function formatNumberWithCommas(num, decimals=8) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
            if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
            const parts = n.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (parts[1]) {
                parts[1] = parts[1].replace(/0+$/, '');
                return parts[1].length ? parts[0] + '.' + parts[1] : parts[0];
            }
            return parts[0];
        }

        // ----- fetch real-time prices (same as modal) -----
        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const resp = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_market_cap=true`);
                if (resp.ok) {
                    const data = await resp.json();
                    currentPrices = {};
                    topAssets.forEach(asset => {
                        if (data[asset.id]) {
                            currentPrices[asset.id] = {
                                usd: data[asset.id].usd || 0,
                                usd_24h_change: data[asset.id].usd_24h_change || 0,
                                usd_24h_vol: data[asset.id].usd_24h_vol || 0,
                                usd_market_cap: data[asset.id].usd_market_cap || 0
                            };
                        } else {
                            currentPrices[asset.id] = { usd: 0, usd_24h_change:0, usd_24h_vol:0, usd_market_cap:0 };
                        }
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                }
            } catch (e) { console.warn('price fetch failed', e); }
        }

        // ----- extract transaction from URL (encrypted as in dashboard) -----
        function getTransactionFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const encrypted = params.get('id');
            if (!encrypted) return null;
            try {
                const decoded = JSON.parse(atob(encrypted));
                // minimal validation: has id and timestamp
                if (decoded.id && decoded.t) {
                    // try to retrieve from localStorage (simulate fetch from API)
                    // but we'll rely on the fact that the full transaction object is stored briefly
                    const stored = sessionStorage.getItem('pendingTx');
                    if (stored) {
                        const tx = JSON.parse(stored);
                        // clear after use (optional)
                        // sessionStorage.removeItem('pendingTx');
                        return tx;
                    }
                    // fallback: we can't get full object -> return dummy but with id
                    return { id: decoded.id, _id: decoded.id };
                }
            } catch (e) { console.error('invalid transaction link', e); }
            return null;
        }

        // ----- RENDER PAGE EXACTLY LIKE MODAL (copy-paste from modal's openTransactionDetails) -----
        function renderTransaction(transaction) {
            const container = document.getElementById('transaction-details-body');
            if (!transaction) {
                container.innerHTML = `<div class="error-container"><i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--error);"></i><h3>Transaction not found</h3><p>The link may be invalid or expired.</p></div>`;
                return;
            }

            // ----- EXACT LOGIC FROM MODAL (openTransactionDetails) -----
            const assetSymbol = transaction.asset || 
                (transaction.type === 'deposit' ? transaction.method || 'usdt' : 
                 transaction.type === 'withdrawal' ? transaction.method || 'btc' : 
                 transaction.type === 'buy' ? transaction.asset || 'btc' :
                 transaction.type === 'sell' ? transaction.asset || 'btc' : 'btc');
            
            const isBuy = transaction.type === 'buy';
            const isSell = transaction.type === 'sell';
            const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            
            const usdAmount = parseFloat(transaction.amount) || 0;
            const assetAmount = parseFloat(transaction.assetAmount) || 0;
            
            const isIncoming = transaction.type === 'deposit' || transaction.type === 'interest' || transaction.type === 'referral' || transaction.type === 'buy';
            const isOutgoing = transaction.type === 'withdrawal' || transaction.type === 'sell';
            
            const amountClass = isIncoming ? 'price-positive' : isOutgoing ? 'price-negative' : '';
            const amountPrefix = isIncoming ? '+' : isOutgoing ? '-' : '';
            
            let exchangeRate = 1.00;
            let assetIdForRate = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
            if (assetSymbol.toLowerCase() === 'usdt' || assetSymbol.toLowerCase() === 'usdc') exchangeRate = 1.00;
            else exchangeRate = currentPrices[assetIdForRate]?.usd || currentBTCPrice;
            
            let network = transaction.network;
            if (!network || network === 'Unknown' || network === 'unknown') {
                const assetKey = assetSymbol.toLowerCase();
                network = assetNetworks[assetKey] || (assetKey === 'btc' ? 'Bitcoin' : 'Bitcoin');
            }
            
            const transactionDate = transaction.date || transaction.createdAt || transaction.timestamp || new Date();
            const formattedDate = new Date(transactionDate).toLocaleString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit', hour12:true
            });

            let detailsHTML = '';

            if (isBuy || isSell) {
                const profitLossHTML = isSell && transaction.sellDetails ? `
                    <div style="margin-top: 25px; background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div><div style="color:var(--gray);">Buying Price</div><div style="font-size:1.3rem;">${formatUSD(transaction.sellDetails.avgBuyPrice || 0)}</div></div>
                            <div><div style="color:var(--gray);">Selling Price</div><div style="font-size:1.3rem;">${formatUSD(transaction.sellDetails.price || 0)}</div></div>
                            <div><div style="color:var(--gray);">Profit</div><div class="price-positive">+${formatUSD(transaction.sellDetails.profit || 0)}</div></div>
                            <div><div style="color:var(--gray);">Loss</div><div class="price-negative">-${formatUSD(transaction.sellDetails.loss || 0)}</div></div>
                        </div>
                    </div>
                ` : '';

                detailsHTML = `
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">${isBuy ? 'Spent' : 'Received'} (USD)</div>
                            <div class="summary-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                            <div class="summary-sub"><img src="${primaryAssetLogo}" style="width:20px;height:20px;border-radius:50%;"> ${amountPrefix}${formatNumberWithCommas(Math.abs(assetAmount),8)} ${assetSymbol.toUpperCase()}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Status</div>
                            <div><span class="status-badge ${transaction.status === 'completed' ? 'success' : transaction.status === 'pending' ? 'pending' : 'failed'}">${(transaction.status || 'pending').toUpperCase()}</span></div>
                            <div class="summary-sub" style="margin-top:12px;">Exchange rate: 1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</div>
                            <div class="summary-sub"><span class="network-chip">${network}</span></div>
                        </div>
                    </div>
                    ${profitLossHTML}
                `;
            } else {
                detailsHTML = `
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">Total Amount (USD)</div>
                            <div class="summary-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                            <div class="summary-sub"><img src="${primaryAssetLogo}" style="width:20px;height:20px;"> ${amountPrefix}${formatNumberWithCommas(Math.abs(usdAmount/exchangeRate),8)} ${assetSymbol.toUpperCase()}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Status</div>
                            <div><span class="status-badge ${transaction.status === 'completed' ? 'success' : transaction.status === 'pending' ? 'pending' : 'failed'}">${(transaction.status || 'pending').toUpperCase()}</span></div>
                            <div class="summary-sub" style="margin-top:12px;">Exchange rate: 1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</div>
                            <div class="summary-sub"><span class="network-chip">${network}</span></div>
                        </div>
                    </div>
                `;
            }

            const fullHTML = `
                <div style="text-align: center; margin-bottom: 25px;">
                    <img src="${primaryAssetLogo}" style="width: 56px; height: 56px; border-radius: 50%; margin-bottom: 10px;">
                    <h4 style="color: var(--dark); font-size: 1.4rem; margin-bottom: 5px; text-transform: capitalize;">${transaction.type || 'Transaction'}</h4>
                    <div style="font-size: 0.85rem; color: var(--gray);">ID: ${transaction.id || transaction._id || 'N/A'}</div>
                </div>
                ${detailsHTML}
                <div class="detail-block">
                    <h5 style="margin-bottom: 20px;">Full details</h5>
                    <div class="detail-row"><span class="detail-label">Date & time</span><span class="detail-value">${formattedDate}</span></div>
                    <div class="detail-row"><span class="detail-label">Transaction type</span><span class="detail-value" style="text-transform:capitalize;">${transaction.type || 'Transfer'}</span></div>
                    <div class="detail-row"><span class="detail-label">Asset</span><span class="detail-value"><img src="${primaryAssetLogo}" style="width:18px;height:18px;border-radius:50%; vertical-align:middle;"> ${assetSymbol.toUpperCase()}</span></div>
                    <div class="detail-row"><span class="detail-label">Exchange rate</span><span class="detail-value">1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</span></div>
                    <div class="detail-row"><span class="detail-label">Transaction fee</span><span class="detail-value" style="color:${transaction.type==='deposit'?'var(--success)':'var(--error)'};">${transaction.fee ? formatUSD(transaction.fee) : 'None'}</span></div>
                    <div class="detail-row"><span class="detail-label">Net amount</span><span class="detail-value">${formatUSD(usdAmount - (transaction.fee||0))}</span></div>
                    <div class="detail-row"><span class="detail-label">Network</span><span class="detail-value"><span class="network-chip">${network}</span></span></div>
                    ${transaction.reference ? `<div class="detail-row"><span class="detail-label">Reference</span><span class="detail-value">${transaction.reference}</span></div>` : ''}
                </div>
            `;
            container.innerHTML = fullHTML;
            document.getElementById('txTitle').innerHTML = `<img src="${primaryAssetLogo}" class="asset-icon-large"> ${assetSymbol.toUpperCase()} ${transaction.type || 'Transaction'}`;
        }

        // ----- fetch transaction from API using ID (since we only have id in URL) -----
        async function fetchTransactionById(txId) {
            const token = localStorage.getItem('jwtToken');
            if (!token) { window.location.href = 'login.html'; return null; }
            try {
                // exact endpoint used in dashboard: /api/transactions
                const resp = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    const transactions = data.data?.transactions || data.transactions || [];
                    const found = transactions.find(t => t.id === txId || t._id === txId);
                    if (found) return found;
                }
            } catch (e) { console.warn('fetch tx failed', e); }
            return null;
        }

        // ----- INIT -----
        window.addEventListener('load', async () => {
            await fetchCoinGeckoPrices();

            const encryptedParam = new URLSearchParams(window.location.search).get('id');
            if (!encryptedParam) {
                document.getElementById('transaction-details-body').innerHTML = `<div class="error-container"><i class="fas fa-link-slash"></i><h3>No transaction specified</h3></div>`;
                return;
            }

            // decode to get id
            let txId = null;
            try {
                const dec = JSON.parse(atob(encryptedParam));
                txId = dec.id;
            } catch { /* ignore */ }

            if (!txId) {
                document.getElementById('transaction-details-body').innerHTML = `<div class="error-container">Invalid transaction link</div>`;
                return;
            }

            const tx = await fetchTransactionById(txId);
            if (!tx) {
                document.getElementById('transaction-details-body').innerHTML = `<div class="error-container"><i class="fas fa-database"></i><h3>Transaction not found in your history</h3></div>`;
                return;
            }

            renderTransaction(tx);

            // store for potential pdf usage (already have tx)
            window.currentTx = tx;
        });

        // ----- PRINT & PDF (company logo in footer) -----
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        document.getElementById('pdfBtn').addEventListener('click', function() {
            const element = document.getElementById('export-content');
            const footer = document.getElementById('pdf-footer').cloneNode(true);
            footer.style.display = 'block';

            // temporarily append footer, hide original footer-note
            const originalFooter = document.querySelector('.footer-note');
            const clonedFooter = footer;
            element.appendChild(clonedFooter);

            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:     `BitHash_transaction_${new Date().toISOString().slice(0,10)}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                clonedFooter.remove();
            });
        });
    })();
</script>
