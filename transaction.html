<head>

    <title>BitHash · institutional transaction view</title>

    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">

    <style>
        /* ---------- CRYPTO.COM ENTERPRISE DESIGN SYSTEM ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --bg-surface: #0A0E17;
            --bg-elevated: #121926;
            --bg-card: #1A2536;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --accent-green: #22C55E;
            --accent-red: #EF4444;
            --accent-orange: #F97316;
            --accent-blue: #3B82F6;
            --border-light: #2A3748;
            --border-glow: rgba(0, 216, 255, 0.15);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 216, 255, 0.1);
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            --gradient-gold: linear-gradient(135deg, #D4AF37 0%, #FBBF24 100%);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- HEADER (only logo + page title – ultra clean) ----- */
        header {
            background: rgba(10, 14, 23, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 72px;
            display: flex;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 36px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(0, 216, 255, 0.3));
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-title-badge {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            background: rgba(0, 216, 255, 0.08);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(0, 216, 255, 0.25);
            color: var(--text-primary);
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        /* hide all navigation, auth, mobile clutter – only header exists */
        nav, .auth-buttons, .mobile-menu-toggle, .security-badge, footer {
            display: none !important;
        }

        /* ----- MAIN LAYOUT – ENTERPRISE SPACING ----- */
        .transaction-page {
            flex: 1 0 auto;
            padding: 36px 0 48px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header-left h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(to right, #fff, #CBD5E1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .page-header-left .tx-ref {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid var(--border-light);
        }

        .action-toolbar {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-light);
        }

        .btn i { font-size: 1rem; color: var(--primary); }

        .btn:hover {
            background: rgba(0,216,255,0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,216,255,0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00D8FF 0%, #0066FF 100%);
            border: none;
            color: #0A0E17;
            font-weight: 700;
        }
        .btn-primary i { color: #0A0E17; }

        /* ----- MAIN CARD – DEEP, DETAILED ----- */
        .tx-card {
            background: var(--bg-elevated);
            border-radius: 48px;
            padding: 40px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(0,216,255,0.2);
            backdrop-filter: blur(20px);
            margin-bottom: 24px;
        }

        /* top hero section */
        .tx-hero {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .tx-icon {
            width: 88px;
            height: 88px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            background: rgba(0,216,255,0.1);
            color: var(--primary);
            box-shadow: 0 10px 25px rgba(0,216,255,0.3);
        }

        .tx-icon.deposit { background: rgba(34,197,94,0.15); color: var(--accent-green); box-shadow: 0 10px 25px rgba(34,197,94,0.3); }
        .tx-icon.withdrawal { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .tx-icon.buy { background: rgba(0,216,255,0.15); color: var(--primary); }
        .tx-icon.sell { background: rgba(249,115,22,0.15); color: var(--accent-orange); }

        .tx-title-section {
            flex: 1;
        }

        .tx-title-section h2 {
            font-size: 2.4rem;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .tx-badge-group {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tx-badge {
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-light);
        }

        .tx-badge.success { background: rgba(34,197,94,0.1); color: var(--accent-green); border-color: rgba(34,197,94,0.3); }
        .tx-badge.pending { background: rgba(249,115,22,0.1); color: var(--accent-orange); border-color: rgba(249,115,22,0.3); }
        .tx-badge.failed { background: rgba(239,68,68,0.1); color: var(--accent-red); border-color: rgba(239,68,68,0.3); }

        /* ----- AMOUNT PANELS (BIG & BOLD) ----- */
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .amount-panel {
            background: var(--bg-card);
            border-radius: 36px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .amount-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
        }

        .amount-fiat {
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'Manrope', sans-serif;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .amount-fiat.price-positive { color: var(--accent-green); text-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .amount-fiat.price-negative { color: var(--accent-red); text-shadow: 0 0 15px rgba(239,68,68,0.4); }

        .amount-asset {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-secondary);
            border-top: 1px dashed var(--border-light);
            padding-top: 20px;
            margin-top: 8px;
        }

        .asset-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
        }

        .exchange-rate-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        /* ----- PROFIT / LOSS SECTION (ENTERPRISE) ----- */
        .pnl-section {
            background: linear-gradient(145deg, #1E2A3A, #16202E);
            border-radius: 36px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,215,0,0.15);
        }

        .pnl-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .pnl-header i { font-size: 2rem; color: var(--gradient-gold); }
        .pnl-header h3 { font-size: 1.8rem; font-weight: 600; }

        .pnl-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .pnl-item {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .pnl-label { font-size: 0.8rem; color: var(--text-tertiary); margin-bottom: 8px; }
        .pnl-value { font-size: 1.6rem; font-weight: 700; }

        /* ----- DETAIL GRID (METADATA) ----- */
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .meta-item {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border-light);
        }
        .meta-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .meta-value {
            font-size: 1.3rem;
            font-weight: 600;
            word-break: break-word;
        }
        .meta-value.with-icon { display: flex; align-items: center; gap: 10px; }

        .network-chip {
            background: rgba(0,216,255,0.1);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-block;
            border: 1px solid rgba(0,216,255,0.2);
        }

        /* wallet breakdown (buy) */
        .wallet-breakdown {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 32px;
        }
        .wallet-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1.2rem;
        }
        .wallet-row:last-child { border: none; }
        .wallet-name i { color: var(--primary); width: 28px; }
        .wallet-amount { font-weight: 600; }
        .wallet-total { color: var(--primary); font-size: 1.4rem; }

        .ref-section {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 24px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            border: 1px dashed var(--border-light);
            margin-bottom: 32px;
        }

        .footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
        }

        /* ----- FULL RESPONSIVENESS (ENTERPRISE) ----- */
        @media (max-width: 1100px) {
            .amount-grid { grid-template-columns: 1fr; }
            .pnl-grid { grid-template-columns: repeat(2,1fr); }
            .meta-grid { grid-template-columns: repeat(2,1fr); }
        }

        @media (max-width: 700px) {
            .container { padding: 0 20px; }
            .tx-card { padding: 28px; border-radius: 36px; }
            .amount-fiat { font-size: 2.8rem; }
            .pnl-grid { grid-template-columns: 1fr; }
            .meta-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 1.8rem; }
            .tx-title-section h2 { font-size: 1.8rem; }
            .tx-icon { width: 64px; height: 64px; font-size: 2rem; }
        }

        @media (max-width: 480px) {
            .tx-card { padding: 20px; border-radius: 28px; }
            .amount-fiat { font-size: 2.2rem; }
            .btn { padding: 8px 16px; }
        }

        /* print – enterprise ready (logo + website title) */
        @media print {
            header, .action-toolbar, .footer-actions { display: none !important; }
            body { background: white; }
            .tx-card { box-shadow: none; border: 1px solid #ccc; background: white; color: black; }
            .amount-fiat { color: black !important; }
            * { color: black; }
            body::before {
                content: "₿itHash · bithashcapital.live · transaction receipt";
                display: block;
                font-family: 'Rowdies', sans-serif;
                font-size: 16pt;
                color: #00A3CC;
                text-align: center;
                margin: 20px;
            }
        }

        /* loading overlay */
        .loading-overlay {
            position: fixed; inset: 0; background: var(--bg-surface); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loading-logo { width: 100px; animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .notification-center {
            position: fixed; top: 90px; right: 20px; z-index: 10000; max-width: 340px;
        }
        .notification {
            background: rgba(20,30,45,0.98); backdrop-filter: blur(10px);
            border-left: 5px solid var(--primary); border-radius: 16px;
            padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 20px 30px black;
            transform: translateX(120%); transition: 0.3s;
        }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" class="loading-logo">
        <div style="color: var(--text-secondary); margin-top: 20px;">loading institutional data · secure channel</div>
    </div>

    <div class="notification-center" id="notification-center"></div>

    <!-- header only logo + website title (exactly as requested) -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">₿itHash</span>
            </div>
            <div class="page-title-badge">transaction · institutional view</div>
        </div>
    </header>

    <main class="transaction-page">
        <div class="container">
            <!-- page header with back/print/pdf -->
            <div class="page-header">
                <div class="page-header-left">
                    <h1>Transaction intelligence</h1>
                    <span class="tx-ref" id="tx-ref-label">loading reference</span>
                </div>
                <div class="action-toolbar">
                    <button class="btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button>
                    <button class="btn" onclick="printTransaction()"><i class="fas fa-print"></i> print</button>
                    <button class="btn btn-primary" onclick="downloadTransactionPDF()"><i class="fas fa-file-pdf"></i> export PDF</button>
                </div>
            </div>

            <!-- main card injected with full realtime details -->
            <div class="tx-card" id="transaction-details-container">
                <div style="text-align: center; padding: 80px 20px; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-pulse fa-3x" style="color: var(--primary);"></i>
                    <p style="margin-top: 24px; font-size: 1.2rem;">establishing secure connection · loading real‑time data</p>
                </div>
            </div>
        </div>
    </main>

    <!-- NO FOOTER (removed completely) -->

    <script>
        // ---------- ENTERPRISE STATE & REALTIME ----------
        let currentPrices = {};
        let currentTransaction = null;
        let allTransactions = [];

        // full top30 asset list (abbreviated here but same logic)
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
            { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
            { id: 'tether', symbol: 'usdt', name: 'Tether', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png' },
            { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
            { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
            { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' },
            { id: 'xrp', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' },
            { id: 'dogecoin', symbol: 'doge', name: 'Dogecoin', logo: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png' },
            { id: 'cardano', symbol: 'ada', name: 'Cardano', logo: 'https://assets.coingecko.com/coins/images/975/large/cardano.png' },
            { id: 'shiba-inu', symbol: 'shib', name: 'Shiba Inu', logo: 'https://assets.coingecko.com/coins/images/11939/large/shiba.png' }
        ];
        const assetLogos = {};
        topAssets.forEach(a => assetLogos[a.symbol] = a.logo);

        const assetNetworks = {
            'btc':'Bitcoin','eth':'Ethereum','usdt':'Tron (TRC-20)','bnb':'BSC','sol':'Solana','usdc':'Ethereum','xrp':'XRP','doge':'Dogecoin','ada':'Cardano','shib':'Ethereum'
        };

        window.addEventListener('load', async function() {
            setTimeout(() => document.getElementById('loading-overlay')?.classList.add('hidden'), 400);
            await fetchCoinGeckoPrices();    // realtime fx
            await loadTransactionFromURL();
        });

        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a=>a.id).join(',');
                const resp = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=30&page=1&sparkline=false`);
                if (resp.ok) {
                    const data = await resp.json();
                    data.forEach(asset => { currentPrices[asset.id] = { usd: asset.current_price || 0 }; });
                }
            } catch (e) { /* silent fallback */ }
        }

        async function loadTransactionFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedId = urlParams.get('id');
            if (!encryptedId) { showError('missing transaction id'); return; }

            try {
                const decoded = atob(encryptedId);
                const payload = JSON.parse(decoded);
                if (Date.now() - (payload.t || 0) > 86400000) { showError('link expired (24h)'); return; }
                await loadTransactionFromAPI(payload.id);
            } catch (e) { showError('invalid payload'); }
        }

        async function loadTransactionFromAPI(txId) {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            try {
                const resp = await fetch(`https://bithash-backend.onrender.com/api/transactions/${txId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    currentTransaction = data.data || data;
                    renderFullTransaction();
                } else {
                    // fallback to list
                    const listResp = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (listResp.ok) {
                        const listData = await listResp.json();
                        allTransactions = listData.data?.transactions || listData.transactions || [];
                        currentTransaction = allTransactions.find(t => t.id === txId || t._id === txId);
                        currentTransaction ? renderFullTransaction() : showError('tx not found');
                    } else { showError('unable to fetch'); }
                }
            } catch (e) { showError('network error'); }
        }

        function renderFullTransaction() {
            const tx = currentTransaction;
            if (!tx) return;
            const container = document.getElementById('transaction-details-container');
            document.getElementById('tx-ref-label').innerText = `id: ${tx.id || tx._id || '—'}`;

            const assetSymbol = (tx.asset || (tx.type==='deposit'? tx.method || 'usdt' : tx.type==='withdrawal'? tx.method || 'btc' : 'btc')).toLowerCase();
            const isBuy = tx.type === 'buy', isSell = tx.type === 'sell', isDeposit = tx.type === 'deposit', isWithdrawal = tx.type === 'withdrawal', isInterest = tx.type==='interest', isReferral = tx.type==='referral';
            const isIncoming = isDeposit || isInterest || isReferral || isBuy;
            const amountClass = isIncoming ? 'price-positive' : (isWithdrawal||isSell) ? 'price-negative' : '';

            const usdAmount = parseFloat(tx.amount) || 0;
            const assetAmount = parseFloat(tx.assetAmount) || 0;
            const primaryAssetLogo = assetLogos[assetSymbol] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';

            const assetId = topAssets.find(a => a.symbol === assetSymbol)?.id || 'bitcoin';
            const exchangeRate = currentPrices[assetId]?.usd || 43000;

            let network = tx.network || assetNetworks[assetSymbol] || 'Bitcoin';
            const formattedDate = new Date(tx.date || tx.createdAt || Date.now()).toLocaleString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });

            let iconClass = 'default', icon = 'fa-exchange-alt';
            if (isDeposit) { iconClass='deposit'; icon='fa-circle-arrow-down'; }
            else if (isWithdrawal) { iconClass='withdrawal'; icon='fa-circle-arrow-up'; }
            else if (isBuy) { iconClass='buy'; icon='fa-cart-shopping'; }
            else if (isSell) { iconClass='sell'; icon='fa-tag'; }
            else if (isInterest) { iconClass='deposit'; icon='fa-percent'; }

            let statusClass='pending', statusText='Pending';
            if (tx.status==='completed') { statusClass='success'; statusText='Completed'; }
            else if (tx.status==='failed') { statusClass='failed'; statusText='Failed'; }

            let html = `
                <div class="tx-hero">
                    <div class="tx-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                    <div class="tx-title-section">
                        <h2>${tx.type || 'transaction'}</h2>
                        <div class="tx-badge-group">
                            <span class="tx-badge ${statusClass}">${statusText}</span>
                            <span class="tx-badge"><i class="far fa-calendar"></i> ${formattedDate}</span>
                        </div>
                    </div>
                </div>

                <div class="amount-grid">
                    <div class="amount-panel">
                        <div class="amount-label">settled amount (USD)</div>
                        <div class="amount-fiat ${amountClass}">${isIncoming ? '+' : (isWithdrawal||isSell)? '-' : ''}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="amount-asset"><img src="${primaryAssetLogo}" class="asset-logo"> ${isIncoming ? '+' : (isWithdrawal||isSell)? '-' : ''}${formatNumber(Math.abs(usdAmount/exchangeRate),6)} ${assetSymbol.toUpperCase()}</div>
                    </div>
                    <div class="amount-panel">
                        <div class="amount-label">exchange rate</div>
                        <div class="amount-fiat" style="font-size:2.8rem;">${formatUSD(exchangeRate)}</div>
                        <div class="exchange-rate-row"><span>1 ${assetSymbol.toUpperCase()}</span><span>${formatUSD(exchangeRate)}</span></div>
                    </div>
                </div>
            `;

            // P/L for sell
            if (isSell && tx.sellDetails) {
                const d = tx.sellDetails;
                html += `<div class="pnl-section">
                    <div class="pnl-header"><i class="fas fa-chart-line"></i><h3>profit & loss · realized</h3></div>
                    <div class="pnl-grid">
                        <div class="pnl-item"><div class="pnl-label">avg buy price</div><div class="pnl-value">${formatUSD(d.avgBuyPrice||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-label">sell price</div><div class="pnl-value">${formatUSD(d.price||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-label">profit</div><div class="pnl-value price-positive">+${formatUSD(d.profit||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-label">loss</div><div class="pnl-value price-negative">-${formatUSD(d.loss||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-label">P/L %</div><div class="pnl-value ${(d.profitLossPercentage||0)>=0?'price-positive':'price-negative'}">${(d.profitLossPercentage||0).toFixed(2)}%</div></div>
                        <div class="pnl-item"><div class="pnl-label">qty sold</div><div class="pnl-value">${formatNumber(d.quantitySold||0,6)} ${assetSymbol.toUpperCase()}</div></div>
                    </div>
                </div>`;
            }

            // wallet breakdown for buy
            if (isBuy && tx.buyDetails) {
                const b = tx.buyDetails;
                const main = parseFloat(b.mainAmountUsed)||0, mat = parseFloat(b.maturedAmountUsed)||0;
                html += `<div class="wallet-breakdown">
                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;"><i class="fas fa-wallet" style="color:var(--primary); font-size:2rem;"></i><h3 style="font-size:1.8rem;">wallet allocation</h3></div>
                    <div class="wallet-row"><span class="wallet-name"><i class="fas fa-wallet"></i> main wallet</span><span class="wallet-amount price-positive">${formatUSD(main)}</span></div>
                    <div class="wallet-row"><span class="wallet-name"><i class="fas fa-coins"></i> matured wallet</span><span class="wallet-amount price-positive">${formatUSD(mat)}</span></div>
                    <div class="wallet-row"><span class="wallet-name"><i class="fas fa-calculator"></i> total used</span><span class="wallet-total">${formatUSD(main+mat)}</span></div>
                </div>`;
            }

            // meta grid
            html += `<div class="meta-grid">
                <div class="meta-item"><div class="meta-label">type</div><div class="meta-value" style="text-transform:capitalize;">${tx.type}</div></div>
                <div class="meta-item"><div class="meta-label">asset</div><div class="meta-value with-icon"><img src="${primaryAssetLogo}" class="asset-logo" style="width:28px;height:28px;"> ${assetSymbol.toUpperCase()}</div></div>
                <div class="meta-item"><div class="meta-label">network</div><div class="meta-value"><span class="network-chip">${network}</span></div></div>
                <div class="meta-item"><div class="meta-label">fee</div><div class="meta-value">${tx.fee ? formatUSD(tx.fee) : '—'}</div></div>
                <div class="meta-item"><div class="meta-label">net amount</div><div class="meta-value ${amountClass}">${formatUSD(usdAmount - (tx.fee||0))}</div></div>
                <div class="meta-item"><div class="meta-label">transaction id</div><div class="meta-value" style="font-family:var(--font-mono); font-size:0.9rem;">${tx.id || tx._id || ''}</div></div>
            </div>`;

            if (tx.reference || tx.description) {
                html += `<div class="ref-section"><i class="fas fa-quote-right" style="margin-right:10px;"></i> ${tx.reference || tx.description}</div>`;
            }

            html += `<div class="footer-actions">
                <button class="btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button>
                <button class="btn btn-primary" onclick="printTransaction()"><i class="fas fa-print"></i> print receipt</button>
            </div>`;

            container.innerHTML = html;
        }

        // ---------- formatting ----------
        function formatUSD(num) {
            let n = parseFloat(num)||0;
            if (n >= 1e12) return '$'+(n/1e12).toFixed(2)+'T';
            if (n >= 1e9) return '$'+(n/1e9).toFixed(2)+'B';
            if (n >= 1e6) return '$'+(n/1e6).toFixed(2)+'M';
            return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        function formatNumber(num, dec=8) {
            let n = parseFloat(num)||0;
            return n.toFixed(dec).replace(/\.?0+$/, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        function printTransaction() { window.print(); }
        function downloadTransactionPDF() { showNotification('info','PDF','preparing enterprise document'); setTimeout(()=>window.print(),400); }
        function showError(m) {
            const c = document.getElementById('transaction-details-container');
            c.innerHTML = `<div style="text-align:center;padding:80px;"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:var(--accent-red);"></i><p style="margin:20px;">${m}</p><button class="btn btn-primary" onclick="window.location.href='dashboard.html'">back</button></div>`;
        }
        function showNotification(t,tt,msg) {
            const box = document.getElementById('notification-center');
            const n = document.createElement('div'); n.className = `notification ${t}`;
            n.innerHTML = `<strong>${tt}</strong><br>${msg}`;
            box.appendChild(n); setTimeout(()=>n.classList.add('show'),30);
            setTimeout(()=>{ n.classList.remove('show'); setTimeout(()=>n.remove(),300); }, 3500);
        }
    </script>
</body>
</html>
