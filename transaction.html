<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Transaction Details</title>
    <meta name="description" content="View complete transaction details with professional financial-grade information.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* ============================================= */
        /* CRYPTO.COM COLOR THEME - EXACT MATCH TO DASHBOARD */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 216, 255, 0.3));
        }
        
        .loading-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--gray);
            font-size: 1rem;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background-color: var(--darker);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            transition: var(--transition-slow);
            border-bottom: none;
            height: 70px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .logo img {
            height: 32px;
            width: auto;
            transition: var(--transition);
        }
        
        .logo:hover img {
            transform: scale(1.05);
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
            box-shadow: 0 4px 15px rgba(0, 216, 255, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.4);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
            transform: translateY(-2px);
        }
        
        /* Main Content */
        .transaction-page {
            padding: 140px 0 60px;
            min-height: 100vh;
        }
        
        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .transaction-title h1 {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        .transaction-title p {
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .transaction-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .transaction-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            transition: var(--transition);
        }
        
        .transaction-card:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .transaction-badge {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .badge-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .badge-icon.success {
            background-color: rgba(0, 255, 0, 0.1);
            color: var(--success);
        }
        
        .badge-icon.pending {
            background-color: rgba(255, 184, 0, 0.1);
            color: var(--warning);
        }
        
        .badge-icon.failed {
            background-color: rgba(255, 0, 0, 0.1);
            color: var(--error);
        }
        
        .transaction-type {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            text-transform: capitalize;
        }
        
        .transaction-id {
            text-align: center;
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 30px;
            word-break: break-all;
        }
        
        .amount-overview {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .amount-usd {
            font-size: 3rem;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }
        
        .amount-asset {
            font-size: 1.5rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .amount-asset img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        
        .status-badge-large {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .status-badge-large.success {
            background-color: rgba(0, 255, 0, 0.1);
            color: var(--success);
        }
        
        .status-badge-large.pending {
            background-color: rgba(255, 184, 0, 0.1);
            color: var(--warning);
        }
        
        .status-badge-large.failed {
            background-color: rgba(255, 0, 0, 0.1);
            color: var(--error);
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .detail-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
        }
        
        .detail-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 1.1rem;
            color: var(--dark);
            font-weight: 500;
            word-break: break-word;
        }
        
        .detail-value.small {
            font-size: 0.95rem;
        }
        
        .price-positive {
            color: var(--success);
        }
        
        .price-negative {
            color: var(--error);
        }
        
        .profit-loss-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
        }
        
        .profit-loss-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        
        .profit-loss-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .profit-loss-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
        }
        
        .profit-loss-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 5px;
        }
        
        .profit-loss-value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .timeline-section {
            margin: 30px 0;
        }
        
        .timeline-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .timeline-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .timeline-item:last-child {
            border-bottom: none;
        }
        
        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 216, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        
        .timeline-content {
            flex: 1;
        }
        
        .timeline-status {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        .timeline-date {
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .timeline-description {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .additional-info {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-light);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .info-value {
            color: var(--dark);
            font-weight: 500;
            text-align: right;
            word-break: break-word;
        }
        
        .network-badge {
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
        }
        
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
        }
        
        .qr-placeholder i {
            font-size: 3rem;
        }
        
        .footer-note {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-light);
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        /* PDF specific styles - will be applied when printing */
        .pdf-header {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        
        .pdf-footer {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-light);
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        @media print {
            header, .transaction-actions, .no-print {
                display: none !important;
            }
            
            .transaction-page {
                padding: 20px 0;
            }
            
            .pdf-header, .pdf-footer {
                display: block;
            }
            
            body {
                background: white;
                color: black;
            }
            
            .transaction-card {
                background: none;
                border: 1px solid #eee;
            }
            
            .detail-item {
                background: none;
                border: 1px solid #f0f0f0;
            }
            
            .status-badge-large {
                border: 1px solid currentColor;
                background: none;
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .transaction-page {
                padding: 120px 0 40px;
            }
            
            .transaction-title h1 {
                font-size: 1.5rem;
            }
            
            .amount-usd {
                font-size: 2.2rem;
            }
            
            .amount-asset {
                font-size: 1.2rem;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .profit-loss-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .transaction-card {
                padding: 20px;
            }
            
            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .info-value {
                text-align: left;
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .transaction-actions {
                width: 100%;
                flex-direction: column;
            }
            
            .transaction-actions .btn {
                width: 100%;
            }
            
            .profit-loss-grid {
                grid-template-columns: 1fr;
            }
            
            .amount-usd {
                font-size: 1.8rem;
            }
            
            .amount-asset {
                font-size: 1rem;
            }
        }
        
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            pointer-events: none;
            width: 100%;
            max-width: 350px;
        }
        
        .notification {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: start;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            background-color: rgba(30, 30, 30, 0.95);
            pointer-events: auto;
        }
        
        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .notification.error {
            background-color: rgba(255, 0, 0, 0.95);
            color: white;
        }
        
        .notification.success {
            background-color: rgba(0, 255, 0, 0.95);
            color: var(--darker);
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        
        .notification-message {
            font-size: 0.75rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" class="loading-logo">
        <div class="loading-text">Loading Transaction Details...</div>
    </div>

    <!-- Notification System -->
    <div class="notification-center" id="notification-center"></div>

    <!-- Header - EXACT COPY FROM DASHBOARD -->
    <header id="main-header">
        <div class="container header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                <span class="logo-text">₿itHash</span>
            </div>
            
            <nav id="main-nav" style="display: none;"></nav>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <section class="transaction-page">
        <div class="container">
            <!-- PDF Header (hidden by default, visible when printing) -->
            <div class="pdf-header">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" style="height: 50px; margin-bottom: 10px;">
                <h2 style="color: var(--primary); margin-bottom: 5px;">BitHash Transaction Receipt</h2>
                <p style="color: var(--gray);">Official Transaction Record</p>
            </div>
            
            <div class="transaction-header">
                <div class="transaction-title">
                    <h1>Transaction Details</h1>
                    <p>View complete information for this transaction</p>
                </div>
                <div class="transaction-actions no-print">
                    <button class="btn btn-primary" onclick="printTransaction()">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button class="btn btn-outline" onclick="downloadPDF()">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </div>
            </div>

            <!-- Transaction Content - Will be populated dynamically -->
            <div id="transaction-content"></div>
            
            <!-- PDF Footer (hidden by default, visible when printing) -->
            <div class="pdf-footer">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" style="height: 30px; vertical-align: middle; margin-right: 10px;">
                <span>BitHash LLC • Official Transaction Record • Generated on <span id="pdf-date"></span></span>
            </div>
        </div>
    </section>

                try {

                    const timestamp = decrypted.t;
                    if (Date.now() - timestamp > 24 * 60 * 60 * 1000) {
                        showNotification('error', 'Expired', 'Transaction link has expired');
                        setTimeout(() => window.location.href = 'dashboard.html', 2000);

                    return;
                }
                
                const response = await fetch(`https://bithash-backend.onrender.com/api/transactions/${transactionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentTransaction = data.data?.transaction || data.transaction;
                    
                    if (!currentTransaction) {
                        throw new Error('Transaction not found');
                    }
                    
                    renderTransactionDetails();
                    
                    // Set PDF date
                    document.getElementById('pdf-date').textContent = new Date().toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    
                } else if (response.status === 404) {
                    showNotification('error', 'Not Found', 'Transaction not found');
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                } else {
                    throw new Error('Failed to load transaction');

        /* ============================================= */

        function getTypeIcon(type) {
            const icons = {
                'deposit': 'fa-arrow-down',
                'withdrawal': 'fa-arrow-up',
                'buy': 'fa-shopping-cart',
                'sell': 'fa-tag',
                'interest': 'fa-percent',
                'referral': 'fa-users',
                'transfer': 'fa-exchange-alt'
            };
            return icons[type] || 'fa-circle';
        }
        
        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            
            if (numericNum >= 1e12) {
                return '$' + (numericNum / 1e12).toFixed(2) + 'T';
            } else if (numericNum >= 1e9) {
                return '$' + (numericNum / 1e9).toFixed(2) + 'B';
            } else if (numericNum >= 1e6) {
                return '$' + (numericNum / 1e6).toFixed(2) + 'M';
            }
            
            const parts = numericNum.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            return '$' + parts.join('.');
        }
        
        function formatNumberWithCommas(num, decimals = 8) {
            const numericNum = parseFloat(num) || 0;
            
            if (numericNum >= 1e12) {
                return (numericNum / 1e12).toFixed(2) + 'T';
            } else if (numericNum >= 1e9) {
                return (numericNum / 1e9).toFixed(2) + 'B';
            } else if (numericNum >= 1e6) {
                return (numericNum / 1e6).toFixed(2) + 'M';
            }
            
            const parts = numericNum.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            if (parts[1]) {
                parts[1] = parts[1].replace(/0+$/, '');
                if (parts[1].length === 0) {
                    return parts[0];
                }
                return parts[0] + '.' + parts[1];
            }
            
            return parts[0];
        }

        function downloadPDF() {
            const element = document.querySelector('.transaction-page');
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `transaction-${currentTransaction?.id || currentTransaction?._id || 'receipt'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            // Show loading
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.querySelector('.loading-text').textContent = 'Generating PDF...';
            
            // Ensure PDF header/footer are visible for generation
            const pdfHeader = document.querySelector('.pdf-header');
            const pdfFooter = document.querySelector('.pdf-footer');
            
            pdfHeader.style.display = 'block';
            pdfFooter.style.display = 'block';
            
            // Generate PDF
            html2pdf().set(opt).from(element).save().then(() => {
                // Hide PDF header/footer
                pdfHeader.style.display = 'none';
                pdfFooter.style.display = 'none';
                
                document.getElementById('loading-overlay').classList.add('hidden');
                showNotification('success', 'PDF Generated', 'Your receipt has been downloaded successfully');
            }).catch(error => {
                console.error('PDF generation error:', error);
                pdfHeader.style.display = 'none';
                pdfFooter.style.display = 'none';
                document.getElementById('loading-overlay').classList.add('hidden');
                showNotification('error', 'PDF Error', 'Could not generate PDF. Please try again.');
            });
        }
        
        /* ============================================= */
        /* Notification Functions - EXACT COPY */
        /* ============================================= */
        
        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) processNotificationQueue();
        }
        
        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }
            
            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'error' ? 'fa-exclamation-circle' : 
                        type === 'success' ? 'fa-check-circle' : 
                        type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
            `;
            
            document.getElementById('notification-center').appendChild(notification);
            
            void notification.offsetWidth;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) notification.parentNode.removeChild(notification);
                    processNotificationQueue();
                }, 400);
            }, duration);
        }
    </script>
</body>
</html>
