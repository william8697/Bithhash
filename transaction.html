<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Transaction Details</title>
    <meta name="description" content="View detailed transaction information, print receipts, and track your crypto transactions.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google tag (gtag.js) -->

    <style>
        /* ============================================= */
        /* CRYPTO.COM COLOR THEME - EXACT MATCH TO DASHBOARD */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --blue-light: #004488;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --blue-gradient: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --security-blue: #1A73E8;
            --security-green: #34A853;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            height: 100%;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--darker);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 100;
            border-left: 4px solid var(--security-green);
            color: var(--dark);
        }
        
        .security-badge i {
            color: var(--security-green);
            font-size: 0.9rem;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 60px;
            height: 60px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .loading-text {
            margin-top: 15px;
            font-weight: 500;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        /* Simple Header - Only Logo and Title */
        .simple-header {
            padding: 16px 0;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .simple-header .container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-logo img {
            height: 28px;
            width: auto;
        }
        
        .header-logo span {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }
        
        .header-title {
            font-size: 1.1rem;
            color: var(--gray);
            border-left: 1px solid var(--gray-light);
            padding-left: 12px;
        }
        
        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
            max-width: 320px;
            pointer-events: none;
        }
        
        .notification {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: start;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            margin-bottom: 8px;
            font-size: 0.7rem;
            backdrop-filter: blur(10px);
            background-color: rgba(30, 30, 30, 0.95);
            pointer-events: auto;
            position: relative;
        }
        
        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .notification.error { background-color: rgba(255, 0, 0, 0.95); }
        .notification.success { background-color: rgba(0, 255, 0, 0.95); color: var(--darker); }
        .notification.warning { background-color: rgba(255, 184, 0, 0.95); color: var(--darker); }
        
        .notification i { font-size: 0.9rem; flex-shrink: 0; }
        .notification-content { flex: 1; padding-right: 8px; }
        .notification-title { font-weight: 600; margin-bottom: 2px; font-size: 0.8rem; }
        .notification-message { font-size: 0.7rem; line-height: 1.3; }
        
        .notification-close {
            position: absolute; top: 6px; right: 6px; width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background-color: rgba(0, 0, 0, 0.1);
            cursor: pointer; font-size: 0.6rem;
        }
        
        /* Transaction Page Content - Compact Layout */
        .transaction-page {
            flex: 1;
            padding: 0 0 24px 0;
        }
        
        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .transaction-header h1 {
            font-size: 1.4rem;
            color: var(--dark);
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 8px 14px;
            border-radius: 8px;
            background: var(--lighter);
            color: var(--dark);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            border: none;
        }
        
        .action-btn:hover {
            background: var(--primary);
            color: var(--darker);
        }
        
        .action-btn i {
            font-size: 0.9rem;
        }
        
        .transaction-card {
            background: var(--darker);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
        }
        
        /* Compact Header Section */
        .transaction-header-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-light);
            flex-wrap: wrap;
        }
        
        .transaction-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .transaction-icon.deposit, .transaction-icon.buy, .transaction-icon.interest, .transaction-icon.referral {
            background: rgba(0, 255, 0, 0.1);
            color: var(--success);
        }
        
        .transaction-icon.withdrawal, .transaction-icon.sell {
            background: rgba(255, 0, 0, 0.1);
            color: var(--error);
        }
        
        .transaction-icon.default {
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
        }
        
        .transaction-title {
            flex: 1;
        }
        
        .transaction-title h2 {
            font-size: 1.3rem;
            margin-bottom: 2px;
            color: var(--dark);
            text-transform: capitalize;
        }
        
        .transaction-title .transaction-id {
            font-size: 0.75rem;
            color: var(--gray);
            word-break: break-all;
        }
        
        .transaction-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .transaction-status-badge.success {
            background-color: rgba(0, 255, 0, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 255, 0, 0.3);
        }
        
        .transaction-status-badge.pending {
            background-color: rgba(255, 184, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 184, 0, 0.3);
        }
        
        .transaction-status-badge.failed {
            background-color: rgba(255, 0, 0, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
        
        /* Compact Amount Grid */
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .amount-card {
            background: var(--lighter);
            border-radius: 16px;
            padding: 16px;
        }
        
        .amount-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .amount-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
            line-height: 1.2;
            margin-bottom: 4px;
            word-break: break-word;
        }
        
        .amount-value.price-positive { color: var(--success); }
        .amount-value.price-negative { color: var(--error); }
        
        .amount-secondary {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .asset-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        /* Compact Profit/Loss Section */
        .profit-loss-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .profit-loss-title {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .profit-loss-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .profit-loss-item {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .profit-loss-label {
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        
        .profit-loss-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
        }
        
        .profit-loss-value.price-positive { color: var(--success); }
        .profit-loss-value.price-negative { color: var(--error); }
        
        /* Compact Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .detail-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
        }
        
        .detail-label {
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 0.9rem;
            color: var(--dark);
            font-weight: 500;
            word-break: break-word;
        }
        
        .detail-value.with-icon {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .network-badge {
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
        }
        
        /* Compact Wallet Breakdown */
        .wallet-breakdown {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .wallet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-light);
            gap: 8px;
        }
        
        .wallet-row:last-child { border-bottom: none; }
        
        .wallet-name {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .wallet-name i {
            color: var(--primary);
            width: 18px;
            font-size: 0.9rem;
        }
        
        .wallet-amount {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
        }
        
        .wallet-total {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }
        
        /* Compact Reference Section */
        .reference-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--gray);
            word-break: break-word;
        }
        
        .reference-section strong { color: var(--dark); }
        
        /* Footer Actions */
        .footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
        }
        
        /* Print Styles - Professional Receipt with Logo */
        @media print {
            body {
                background: white;
                color: black;
                display: block;
            }
            
            .security-badge,
            .notification-center,
            .action-buttons,
            .footer-actions,
            .simple-header {
                display: none !important;
            }
            
            .transaction-page {
                padding: 0;
            }
            
            .container {
                max-width: 100%;
                padding: 0;
            }
            
            .transaction-card {
                box-shadow: none;
                border: 1px solid #ddd;
                background: white;
                border-radius: 8px;
                padding: 25px;
                margin: 20px;
            }
            
            /* Add receipt header with logo */
            .transaction-card::before {
                content: '';
                display: block;
                height: 60px;
                margin-bottom: 20px;
                background: url('https://media.bithashcapital.live/circular_dark_background%20(1).png') no-repeat left center;
                background-size: 40px;
                padding-left: 50px;
                font-family: 'Rowdies', sans-serif;
                font-size: 24px;
                color: #00D8FF;
                line-height: 40px;
                border-bottom: 2px solid #00D8FF;
            }
            
            .transaction-card {
                position: relative;
            }
            
            .transaction-card::after {
                content: 'BitHash - Official Transaction Receipt';
                position: absolute;
                top: 20px;
                left: 70px;
                font-family: 'Rowdies', sans-serif;
                font-size: 24px;
                color: #00D8FF;
            }
            
            /* Add website URL in footer */
            .transaction-card .footer-actions {
                display: none;
            }
            
            .transaction-card .reference-section:last-of-type {
                margin-bottom: 0;
            }
            
            .transaction-card .details-grid {
                break-inside: avoid;
            }
            
            .amount-value, .detail-value, .wallet-amount {
                color: black !important;
            }
            
            .detail-label, .amount-label {
                color: #444 !important;
            }
            
            /* Add footer with website */
            .transaction-card::before {
                counter-increment: page;
                content: "www.bithash.com | Transaction Receipt";
                display: block;
                text-align: center;
                margin-top: 30px;
                padding-top: 15px;
                border-top: 1px dashed #ccc;
                color: #666;
                font-size: 11px;
                font-family: 'Inter', sans-serif;
            }
        }
        
        /* Responsive Styles - Optimized for Mobile */
        @media (max-width: 768px) {
            .container { padding: 0 12px; }
            
            .simple-header .header-title { font-size: 0.95rem; }
            
            .transaction-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .transaction-header h1 { font-size: 1.3rem; }
            
            .action-buttons {
                width: 100%;
                justify-content: space-between;
            }
            
            .action-btn {
                flex: 1;
                justify-content: center;
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            
            .transaction-card { padding: 16px; }
            
            .transaction-header-section { gap: 12px; }
            .transaction-icon { width: 40px; height: 40px; font-size: 1.2rem; }
            .transaction-title h2 { font-size: 1.1rem; }
            
            .amount-grid { gap: 12px; margin-bottom: 16px; }
            .amount-card { padding: 12px; }
            .amount-value { font-size: 1.4rem; }
            .amount-secondary { font-size: 0.8rem; }
            
            .profit-loss-grid { grid-template-columns: repeat(2, 1fr); }
            .profit-loss-section { padding: 12px; margin-bottom: 16px; }
            .profit-loss-item { padding: 10px; }
            
            .details-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .detail-item { padding: 10px; }
            
            .wallet-breakdown { padding: 12px; margin-bottom: 16px; }
            .wallet-row { padding: 6px 0; }
            .wallet-name { font-size: 0.85rem; }
            .wallet-amount { font-size: 0.9rem; }
            
            .reference-section { padding: 10px; margin-bottom: 16px; font-size: 0.8rem; }
            
            .footer-actions { margin-top: 16px; }
            .btn { padding: 8px 14px; font-size: 0.8rem; }
        }
        
        @media (max-width: 480px) {
            .simple-header .header-title { display: none; }
            
            .profit-loss-grid { grid-template-columns: 1fr; }
            .details-grid { grid-template-columns: 1fr; }
            
            .amount-value { font-size: 1.3rem; }
            
            .wallet-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            
            .footer-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" class="loading-logo">    
        <div class="loading-text">Loading Transaction Details</div>
    </div>

    <!-- Security Badge (Optional - can be removed if not needed) -->
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>256-bit AES Encrypted</span>
    </div>

    <!-- Notification System -->
    <div class="notification-center" id="notification-center"></div>

    <!-- Simple Header - Only Logo and Title (No Navigation) -->
    <div class="simple-header">
        <div class="container">
            <div class="header-logo">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                <span>₿itHash</span>
            </div>
            <div class="header-title">Transaction Receipt</div>
        </div>
    </div>

    <!-- Transaction Page Content - Compact Layout -->
    <section class="transaction-page">
        <div class="container">
            <div class="transaction-header">
                <h1>Transaction Details</h1>
                <div class="action-buttons">
                    <button class="action-btn" onclick="window.location.href='dashboard.html'">
                        <i class="fas fa-arrow-left"></i> Dashboard
                    </button>
                    <button class="action-btn" onclick="printTransaction()">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button class="action-btn" onclick="downloadTransactionPDF()">
                        <i class="fas fa-download"></i> PDF
                    </button>
                </div>
            </div>

            <div class="transaction-card" id="transaction-details-container">
                <!-- Content will be dynamically populated -->
                <div style="text-align: center; padding: 40px; color: var(--gray);">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p style="margin-top: 15px;">Loading transaction details...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- NO FOOTER - Removed as requested -->

    <script>
        // Global state
        let currentPrices = {};
        let currentBTCPrice = 43000;
        let allTransactions = [];
        let currentTransaction = null;
        
        // Top 30 assets
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
            { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
            { id: 'tether', symbol: 'usdt', name: 'Tether', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png' },
            { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
            { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
            { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' },
            { id: 'xrp', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' },
            { id: 'dogecoin', symbol: 'doge', name: 'Dogecoin', logo: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png' },
            { id: 'cardano', symbol: 'ada', name: 'Cardano', logo: 'https://assets.coingecko.com/coins/images/975/large/cardano.png' },
            { id: 'shiba-inu', symbol: 'shib', name: 'Shiba Inu', logo: 'https://assets.coingecko.com/coins/images/11939/large/shiba.png' },
            { id: 'avalanche-2', symbol: 'avax', name: 'Avalanche', logo: 'https://assets.coingecko.com/coins/images/12559/large/Avalanche_Circle_RedWhite.png' },
            { id: 'polkadot', symbol: 'dot', name: 'Polkadot', logo: 'https://assets.coingecko.com/coins/images/12171/large/polkadot.png' },
            { id: 'tron', symbol: 'trx', name: 'TRON', logo: 'https://assets.coingecko.com/coins/images/1094/large/tron-logo.png' },
            { id: 'chainlink', symbol: 'link', name: 'Chainlink', logo: 'https://assets.coingecko.com/coins/images/877/large/chainlink-new-logo.png' },
            { id: 'polygon', symbol: 'matic', name: 'Polygon', logo: 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png' },
            { id: 'wrapped-bitcoin', symbol: 'wbtc', name: 'Wrapped Bitcoin', logo: 'https://assets.coingecko.com/coins/images/7598/large/wrapped_bitcoin_wbtc.png' },
            { id: 'litecoin', symbol: 'ltc', name: 'Litecoin', logo: 'https://assets.coingecko.com/coins/images/2/large/litecoin.png' },
            { id: 'near', symbol: 'near', name: 'NEAR Protocol', logo: 'https://assets.coingecko.com/coins/images/10365/large/near_icon.png' },
            { id: 'uniswap', symbol: 'uni', name: 'Uniswap', logo: 'https://assets.coingecko.com/coins/images/12504/large/uni.jpg' },
            { id: 'bitcoin-cash', symbol: 'bch', name: 'Bitcoin Cash', logo: 'https://assets.coingecko.com/coins/images/780/large/bitcoin-cash-circle.png' },
            { id: 'stellar', symbol: 'xlm', name: 'Stellar', logo: 'https://assets.coingecko.com/coins/images/100/large/Stellar_symbol_black_RGB.png' },
            { id: 'cosmos', symbol: 'atom', name: 'Cosmos Hub', logo: 'https://assets.coingecko.com/coins/images/1481/large/cosmos_hub.png' },
            { id: 'monero', symbol: 'xmr', name: 'Monero', logo: 'https://assets.coingecko.com/coins/images/69/large/monero_logo.png' },
            { id: 'flow', symbol: 'flow', name: 'Flow', logo: 'https://assets.coingecko.com/coins/images/13446/large/5f6294c0c7a8cda55cb1.png' },
            { id: 'vechain', symbol: 'vet', name: 'VeChain', logo: 'https://assets.coingecko.com/coins/images/1167/large/VET_Token_Icon.png' },
            { id: 'filecoin', symbol: 'fil', name: 'Filecoin', logo: 'https://assets.coingecko.com/coins/images/12817/large/filecoin.png' },
            { id: 'theta-token', symbol: 'theta', name: 'Theta Network', logo: 'https://assets.coingecko.com/coins/images/2538/large/theta-token-logo.png' },
            { id: 'hedera-hashgraph', symbol: 'hbar', name: 'Hedera', logo: 'https://assets.coingecko.com/coins/images/3688/large/hbar.png' },
            { id: 'fantom', symbol: 'ftm', name: 'Fantom', logo: 'https://assets.coingecko.com/coins/images/4001/large/Fantom_round.png' },
            { id: 'tezos', symbol: 'xtz', name: 'Tezos', logo: 'https://assets.coingecko.com/coins/images/976/large/Tezos-logo.png' }
        ];
        
        // Asset logo mapping
        const assetLogos = {};
        topAssets.forEach(asset => { assetLogos[asset.symbol] = asset.logo; });
        
        // Network mapping
        const assetNetworks = {
            'btc': 'Bitcoin', 'eth': 'Ethereum', 'usdt': 'Tron (TRC-20)', 'bnb': 'BNB Smart Chain',
            'sol': 'Solana', 'usdc': 'Ethereum (ERC-20)', 'xrp': 'XRP Ledger', 'doge': 'Dogecoin',
            'ada': 'Cardano', 'shib': 'Ethereum (ERC-20)', 'avax': 'Avalanche C-Chain', 'dot': 'Polkadot',
            'trx': 'TRON', 'link': 'Ethereum (ERC-20)', 'matic': 'Polygon', 'wbtc': 'Ethereum (ERC-20)',
            'ltc': 'Litecoin', 'near': 'NEAR', 'uni': 'Ethereum (ERC-20)', 'bch': 'Bitcoin Cash',
            'xlm': 'Stellar', 'atom': 'Cosmos', 'xmr': 'Monero', 'flow': 'Flow', 'vet': 'VeChain',
            'fil': 'Filecoin', 'theta': 'Theta', 'hbar': 'Hedera', 'ftm': 'Fantom', 'xtz': 'Tezos'
        };

        // Notification queue
        const notificationQueue = [];
        let isNotificationShowing = false;

        // Initialize page
        window.addEventListener('load', function() {
            setTimeout(async function() {
                document.getElementById('loading-overlay').classList.add('hidden');
                
                // Fetch prices
                await fetchCoinGeckoPrices();
                
                // Load transaction from URL
                await loadTransactionFromURL();
                
                // Check auth state
                await checkAuthState();
            }, 300);
        });

        /* ============================================= */
        /* Price Fetching */
        /* ============================================= */
        
        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=1h%2C24h%2C7d`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    currentPrices = {};
                    data.forEach(asset => {
                        currentPrices[asset.id] = {
                            usd: asset.current_price || 0,
                            usd_24h_change: asset.price_change_percentage_24h || 0,
                            usd_24h_vol: asset.total_volume || 0,
                            usd_market_cap: asset.market_cap || 0
                        };
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                }
            } catch (error) {
                console.warn('CoinGecko failed:', error);
            }
        }

        /* ============================================= */
        /* Load Transaction from URL */
        /* ============================================= */
        
        async function loadTransactionFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedId = urlParams.get('id');
            
            if (!encryptedId) {
                showError('No transaction ID provided');
                return;
            }
            
            try {
                const decoded = atob(encryptedId);
                const payload = JSON.parse(decoded);
                
                // Validate timestamp (24 hour expiry)
                const timestamp = payload.t || 0;
                if (Date.now() - timestamp > 24 * 60 * 60 * 1000) {
                    showError('Transaction link has expired');
                    return;
                }
                
                await loadTransactionFromAPI(payload.id);
            } catch (e) {
                showError('Invalid transaction link');
            }
        }
        
        async function loadTransactionFromAPI(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    window.location.href = 'login.html?redirect=transaction.html?id=' + encodeURIComponent(new URLSearchParams(window.location.search).get('id'));
                    return;
                }
                
                const response = await fetch(`https://bithash-backend.onrender.com/api/transactions/${transactionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentTransaction = data.data || data;
                    renderTransactionDetails();
                } else if (response.status === 404) {
                    await loadAllTransactionsAndFind(transactionId);
                } else {
                    showError('Failed to load transaction');
                }
            } catch (error) {
                showError('Network error loading transaction');
            }
        }
        
        async function loadAllTransactionsAndFind(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    allTransactions = data.data?.transactions || data.transactions || [];
                    currentTransaction = allTransactions.find(t => t.id === transactionId || t._id === transactionId);
                    
                    if (currentTransaction) {
                        renderTransactionDetails();
                    } else {
                        showError('Transaction not found');
                    }
                } else {
                    showError('Could not load transactions');
                }
            } catch (error) {
                showError('Network error');
            }
        }
        
        function showError(message) {
            document.getElementById('transaction-details-container').innerHTML = `
                <div style="text-align: center; padding: 40px; color: var(--gray);">
                    <i class="fas fa-exclamation-circle" style="font-size: 2.5rem; color: var(--error); margin-bottom: 15px;"></i>
                    <h3 style="color: var(--dark); margin-bottom: 8px;">Unable to Load Transaction</h3>
                    <p style="margin-bottom: 20px;">${message}</p>
                    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </button>
                </div>
            `;
        }

        /* ============================================= */
        /* Render Transaction Details - COMPACT VERSION */
        /* ============================================= */
        
        function renderTransactionDetails() {
            const transaction = currentTransaction;
            if (!transaction) return;
            
            const container = document.getElementById('transaction-details-container');
            
            const assetSymbol = transaction.asset || 
                              (transaction.type === 'deposit' ? transaction.method || 'usdt' : 
                               transaction.type === 'withdrawal' ? transaction.method || 'btc' : 
                               transaction.type === 'buy' ? transaction.asset || 'btc' :
                               transaction.type === 'sell' ? transaction.asset || 'btc' : 'btc');
            
            const isBuy = transaction.type === 'buy';
            const isSell = transaction.type === 'sell';
            const isDeposit = transaction.type === 'deposit';
            const isWithdrawal = transaction.type === 'withdrawal';
            const isInterest = transaction.type === 'interest';
            const isReferral = transaction.type === 'referral';
            
            const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            
            const usdAmount = parseFloat(transaction.amount) || 0;
            
            const isIncoming = isDeposit || isInterest || isReferral || isBuy;
            const isOutgoing = isWithdrawal || isSell;
            
            const amountClass = isIncoming ? 'price-positive' : isOutgoing ? 'price-negative' : '';
            const amountPrefix = isIncoming ? '+' : isOutgoing ? '-' : '';
            
            // Get exchange rate
            let exchangeRate = 1.00;
            let assetIdForRate = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
            
            if (assetSymbol.toLowerCase() === 'usdt' || assetSymbol.toLowerCase() === 'usdc') {
                exchangeRate = 1.00;
            } else {
                exchangeRate = currentPrices[assetIdForRate]?.usd || 1;
            }
            
            // Network
            let network = transaction.network;
            if (!network || network === 'Unknown' || network === 'unknown') {
                const assetKey = assetSymbol.toLowerCase();
                network = assetNetworks[assetKey] || (assetKey === 'btc' ? 'Bitcoin' : 'Bitcoin');
            }
            
            const transactionDate = transaction.date || transaction.createdAt || transaction.timestamp || new Date();
            const formattedDate = new Date(transactionDate).toLocaleString('en-US', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit'
            });
            
            // Icon
            let iconClass = 'default';
            if (isDeposit || isBuy || isInterest || isReferral) iconClass = 'deposit';
            else if (isWithdrawal || isSell) iconClass = 'withdrawal';
            
            let icon = 'fa-exchange-alt';
            if (isDeposit) icon = 'fa-arrow-down';
            else if (isWithdrawal) icon = 'fa-arrow-up';
            else if (isBuy) icon = 'fa-shopping-cart';
            else if (isSell) icon = 'fa-tag';
            else if (isInterest) icon = 'fa-percentage';
            else if (isReferral) icon = 'fa-users';
            
            let statusClass = 'pending';
            let statusText = 'Processing';
            if (transaction.status === 'completed') {
                statusClass = 'success';
                statusText = 'Completed';
            } else if (transaction.status === 'pending') {
                statusClass = 'pending';
                statusText = 'Pending';
            } else if (transaction.status === 'failed') {
                statusClass = 'failed';
                statusText = 'Failed';
            }
            
            let detailsHTML = `
                <div class="transaction-header-section">
                    <div class="transaction-icon ${iconClass}">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div class="transaction-title">
                        <h2>${transaction.type || 'Transaction'}</h2>
                        <div class="transaction-id">ID: ${(transaction.id || transaction._id || 'N/A').substring(0, 16)}...</div>
                    </div>
                    <div>
                        <span class="transaction-status-badge ${statusClass}">${statusText}</span>
                    </div>
                </div>
                
                <div class="amount-grid">
                    <div class="amount-card">
                        <div class="amount-label">Total (USD)</div>
                        <div class="amount-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="amount-secondary">
                            <img src="${primaryAssetLogo}" class="asset-logo" alt="${assetSymbol.toUpperCase()}">
                            <span>${amountPrefix}${formatNumberWithCommas(Math.abs(usdAmount / exchangeRate), 6)} ${assetSymbol.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="amount-card">
                        <div class="amount-label">Rate</div>
                        <div class="amount-value">${formatUSD(exchangeRate)}</div>
                        <div class="amount-secondary">
                            <span>1 ${assetSymbol.toUpperCase()}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // Profit/Loss section for sell
            if (isSell && transaction.sellDetails) {
                const sd = transaction.sellDetails;
                detailsHTML += `
                    <div class="profit-loss-section">
                        <div class="profit-loss-title"><i class="fas fa-chart-line"></i> P&L</div>
                        <div class="profit-loss-grid">
                            <div class="profit-loss-item"><span class="profit-loss-label">Buy</span><span class="profit-loss-value">${formatUSD(sd.avgBuyPrice || 0)}</span></div>
                            <div class="profit-loss-item"><span class="profit-loss-label">Sell</span><span class="profit-loss-value">${formatUSD(sd.price || 0)}</span></div>
                            <div class="profit-loss-item"><span class="profit-loss-label">P/L</span><span class="profit-loss-value ${(sd.profit || 0) > 0 ? 'price-positive' : 'price-negative'}">${(sd.profit || 0) > 0 ? '+' : '-'}${formatUSD(Math.abs(sd.profit || sd.loss || 0))}</span></div>
                        </div>
                    </div>
                `;
            }
            
            // Wallet breakdown for buy
            if (isBuy && transaction.buyDetails) {
                const bd = transaction.buyDetails;
                detailsHTML += `
                    <div class="wallet-breakdown">
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-wallet"></i> Main</span><span class="wallet-amount price-positive">${formatUSD(parseFloat(bd.mainAmountUsed) || 0)}</span></div>
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-coins"></i> Matured</span><span class="wallet-amount price-positive">${formatUSD(parseFloat(bd.maturedAmountUsed) || 0)}</span></div>
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-calculator"></i> Total</span><span class="wallet-total">${formatUSD((parseFloat(bd.mainAmountUsed)||0) + (parseFloat(bd.maturedAmountUsed)||0))}</span></div>
                    </div>
                `;
            }
            
            // Details grid
            detailsHTML += `
                <div class="details-grid">
                    <div class="detail-item"><span class="detail-label">Date</span><span class="detail-value">${formattedDate}</span></div>
                    <div class="detail-item"><span class="detail-label">Type</span><span class="detail-value" style="text-transform:capitalize;">${transaction.type}</span></div>
                    <div class="detail-item"><span class="detail-label">Asset</span><span class="detail-value with-icon"><img src="${primaryAssetLogo}" class="asset-logo">${assetSymbol.toUpperCase()}</span></div>
                    <div class="detail-item"><span class="detail-label">Network</span><span class="detail-value"><span class="network-badge">${network}</span></span></div>
                    <div class="detail-item"><span class="detail-label">Fee</span><span class="detail-value">${transaction.fee ? formatUSD(transaction.fee) : 'None'}</span></div>
                    <div class="detail-item"><span class="detail-label">Net</span><span class="detail-value ${amountClass}">${formatUSD(usdAmount - (transaction.fee || 0))}</span></div>
                </div>
            `;
            
            // Reference
            if (transaction.reference || transaction.description) {
                detailsHTML += `<div class="reference-section"><strong>Ref:</strong> ${transaction.reference || transaction.description}</div>`;
            }
            
            // Footer actions
            detailsHTML += `
                <div class="footer-actions">
                    <button class="btn btn-outline" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back</button>
                    <button class="btn btn-primary" onclick="printTransaction()"><i class="fas fa-print"></i> Print</button>
                </div>
            `;
            
            container.innerHTML = detailsHTML;
        }

        /* ============================================= */
        /* Formatting Functions */
        /* ============================================= */
        
        function formatUSD(num) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
            if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
            const parts = n.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return '$' + parts.join('.');
        }
        
        function formatNumberWithCommas(num, decimals = 6) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
            if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            const parts = n.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (parts[1]) {
                parts[1] = parts[1].replace(/0+$/, '');
                return parts[1] ? parts[0] + '.' + parts[1] : parts[0];
            }
            return parts[0];
        }

        /* ============================================= */
        /* Print & PDF Functions */
        /* ============================================= */
        
        function printTransaction() {
            window.print();
        }
        
        function downloadTransactionPDF() {
            showNotification('info', 'PDF', 'Preparing PDF...');
            setTimeout(() => window.print(), 300);
        }

        /* ============================================= */
        /* Auth Check */
        /* ============================================= */
        
        async function checkAuthState() {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) return;
                
                const response = await fetch('https://bithash-backend.onrender.com/api/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) localStorage.removeItem('jwtToken');
            } catch (error) {
                console.error('Auth error:', error);
            }
        }

        /* ============================================= */
        /* Notification Functions */
        /* ============================================= */
        
        function showNotification(type, title, message, duration = 3000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) processNotificationQueue();
        }
        
        function processNotificationQueue() {
            if (notificationQueue.length === 0) { isNotificationShowing = false; return; }
            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            const icon = type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;
            
            document.getElementById('notification-center').appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            
            notification.querySelector('.notification-close').addEventListener('click', () => closeNotification(notification));
            setTimeout(() => closeNotification(notification), duration);
        }
        
        function closeNotification(notification) {
            notification.classList.remove('show');
            setTimeout(() => { notification.remove(); processNotificationQueue(); }, 300);
        }
    </script>
</body>
</html>
