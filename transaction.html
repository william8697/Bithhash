<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>BitHash · transaction details</title>
    <meta name="description" content="View detailed transaction information, print receipts, and track your crypto transactions.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>  
    
    <style>
        /* ===== CRYPTO.COM COLOR THEME – EXACT DASHBOARD MATCH ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --blue-light: #004488;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --blue-gradient: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --security-green: #34A853;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- LAYOUT COMPACT – NO FOOTER, MINIMAL HEADER ----- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* header: only logo + title, no extra navigation bulk */
        .site-header {
            background-color: var(--darker);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            padding: 8px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 62px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--gray-light);
        }

        .header-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-group img {
            height: 32px;
            width: auto;
        }
        .logo-group span {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .page-title-badge {
            background: rgba(0,216,255,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary);
            border: 1px solid rgba(0,216,255,0.2);
            white-space: nowrap;
        }
        .page-title-badge i {
            margin-right: 4px;
            font-size: 0.75rem;
        }

        /* hide old nav & auth – they are not needed (no footer, clean) */
        .old-nav, .auth-buttons, .mobile-menu-toggle, .mobile-logout, footer, .security-badge {
            display: none !important;
        }

        /* ----- MAIN CONTENT – RESPONSIVE, VERTICALLY COMPACT ----- */
        .transaction-page {
            padding: 20px 16px 30px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* transaction header – stacked on mobile, minimal vertical space */
        .tx-top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tx-top-bar h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .action-btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: var(--lighter);
            border: none;
            color: var(--dark);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--gray-light);
        }
        .action-btn i {
            font-size: 0.8rem;
            color: var(--primary);
        }
        .action-btn:hover {
            background: var(--primary);
            color: var(--darker);
            border-color: var(--primary);
        }
        .action-btn:hover i {
            color: var(--darker);
        }

        /* CARD – reduced padding for mobile, still elegant */
        .tx-card {
            background: var(--darker);
            border-radius: 28px;
            padding: 24px 22px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* icon header row – compact */
        .tx-icon-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-light);
        }
        .tx-badge-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
        }
        .tx-badge-icon.deposit { background: rgba(0,255,0,0.1); color: var(--success); }
        .tx-badge-icon.withdrawal { background: rgba(255,0,0,0.1); color: var(--error); }
        .tx-badge-icon.default { background: rgba(0,216,255,0.1); color: var(--primary); }

        .tx-title-id h2 {
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 2px;
        }
        .tx-title-id .tx-id {
            font-size: 0.75rem;
            color: var(--gray);
            word-break: break-all;
        }

        .status-chip {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,184,0,0.1);
            color: var(--warning);
            border: 1px solid rgba(255,184,0,0.2);
            margin-left: auto;
        }
        .status-chip.success {
            background: rgba(0,255,0,0.1);
            color: var(--success);
            border-color: rgba(0,255,0,0.2);
        }
        .status-chip.failed {
            background: rgba(255,0,0,0.1);
            color: var(--error);
            border-color: rgba(255,0,0,0.2);
        }

        /* amount grids – auto columns, small screens stack, but 2 cards become 1 col max */
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }
        .amount-card {
            background: var(--lighter);
            border-radius: 20px;
            padding: 18px 16px;
        }
        .amount-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .amount-value {
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            line-height: 1.2;
            word-break: break-word;
        }
        .price-positive { color: var(--success); }
        .price-negative { color: var(--error); }
        .amount-secondary {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 6px;
        }
        .asset-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* profit/loss & wallet sections – compact */
        .pl-section, .wallet-breakdown {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pl-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .pl-item {
            background: rgba(0,0,0,0.25);
            padding: 12px 10px;
            border-radius: 14px;
        }
        .pl-label {
            font-size: 0.65rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .pl-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .wallet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--gray-light);
            flex-wrap: wrap;
            gap: 6px;
        }
        .wallet-row:last-child { border-bottom: none; }
        .wallet-name i { color: var(--primary); width: 20px; }
        .wallet-total { color: var(--primary); font-weight: 700; }

        /* details grid – responsive: 2 columns on tablet, 1 on mobile */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 24px 0;
        }
        .detail-item {
            background: rgba(0,0,0,0.2);
            padding: 12px 14px;
            border-radius: 16px;
        }
        .detail-label {
            font-size: 0.65rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .detail-value {
            font-weight: 500;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .network-badge {
            background: rgba(0,216,255,0.1);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }

        .ref-note {
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 14px;
            font-size: 0.8rem;
            color: var(--gray);
            border-left: 3px solid var(--primary);
        }

        .footer-actions-mini {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        /* loading/error state */
        .placeholder-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        /* small screen overrides – drastically reduce vertical space */
        @media (max-width: 700px) {
            .tx-card { padding: 18px 14px; }
            .amount-grid { grid-template-columns: 1fr; gap: 12px; }
            .pl-grid { grid-template-columns: 1fr; }
            .details-grid { grid-template-columns: 1fr; gap: 10px; }
            .tx-icon-row { gap: 10px; }
            .tx-title-id h2 { font-size: 1.2rem; }
            .amount-value { font-size: 1.6rem; }
            .tx-top-bar h1 { font-size: 1.3rem; }
            .action-btn { padding: 6px 12px; font-size: 0.75rem; }
        }

        @media (max-width: 380px) {
            .tx-card { padding: 14px 10px; }
            .action-btn-group { width: 100%; justify-content: flex-start; }
        }

        /* print styles: logo & site title appear clean */
        @media print {
            body { background: white; }
            .site-header, .action-btn-group, .footer-actions-mini { display: none !important; }
            .tx-card { box-shadow: none; border: 1px solid #ccc; background: white; }
            .amount-value, .detail-value, .wallet-amount { color: black !important; }
            .tx-card::before {
                content: "₿itHash – official receipt";
                display: block;
                font-family: 'Rowdies', sans-serif;
                color: #00A3CC;
                font-size: 1.2rem;
                margin-bottom: 12px;
                padding-bottom: 4px;
                border-bottom: 1px solid #aaa;
            }
        }

        /* remove footer completely, no remnant */
        footer, .security-badge {
            display: none;
        }
    </style>
</head>
<body>
    <!-- loading overlay (preserved but minimal) -->
    <div class="loading-overlay" id="loading-overlay" style="position:fixed; inset:0; background:var(--darker); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:0.3s;">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" style="width:70px; animation:pulse 1.5s infinite;">    
        <div style="margin-top:16px; color:var(--gray);">Loading details</div>
    </div>

    <!-- minimalist header: only logo + page identifier (exactly as requested) -->
    <header class="site-header">
        <div class="header-compact">
            <div class="logo-group">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span>₿itHash</span>
            </div>
            <div class="page-title-badge"><i class="fas fa-receipt"></i> transaction receipt</div>
        </div>
    </header>

    <!-- main content wrapper (no footer) -->
    <main class="main-wrapper">
        <section class="transaction-page">
            <!-- top bar with title + action buttons -->
            <div class="tx-top-bar">
                <h1><i class="fas fa-list-ul" style="color:var(--primary); margin-right:8px;"></i>Details</h1>
                <div class="action-btn-group">
                    <button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back</button>
                    <button class="action-btn" onclick="printTransaction()"><i class="fas fa-print"></i> Print</button>
                    <button class="action-btn" onclick="downloadTransactionPDF()"><i class="fas fa-download"></i> PDF</button>
                </div>
            </div>

            <!-- dynamic transaction card -->
            <div class="tx-card" id="transaction-details-container">
                <div class="placeholder-message">
                    <i class="fas fa-spinner fa-pulse fa-2x" style="color:var(--primary);"></i>
                    <p style="margin-top:12px;">fetching transaction ...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- hidden notification center (preserved) -->
    <div class="notification-center" id="notification-center" style="position:fixed; top:20px; right:10px; z-index:10000; max-width:320px;"></div>

    <script>
        (function() {
            // hide loading overlay after delay
            window.addEventListener('load', function() {
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    document.getElementById('loading-overlay').style.visibility = 'hidden';
                }, 400);
            });

            // ---------- data & globals (exact copy from original, trimmed) ----------
            let currentPrices = {};
            let currentBTCPrice = 43000;
            let allTransactions = [];
            let currentTransaction = null;

            const topAssets = [
                { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
                { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
                { id: 'tether', symbol: 'usdt', name: 'Tether', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png' },
                { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
                { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
                { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' },
                { id: 'xrp', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' }
            ];
            const assetLogos = {};
            topAssets.forEach(a => assetLogos[a.symbol] = a.logo);

            const assetNetworks = {
                'btc':'Bitcoin','eth':'Ethereum','usdt':'Tron (TRC-20)','bnb':'BSC','sol':'Solana',
                'usdc':'Ethereum','xrp':'XRP','doge':'Dogecoin','ada':'Cardano'
            };

            // ---------- load transaction ----------
            async function loadTransactionFromURL() {
                const urlParams = new URLSearchParams(window.location.search);
                const encryptedId = urlParams.get('id');
                if (!encryptedId) return showError('No transaction ID');

                try {
                    const decoded = atob(encryptedId);
                    const payload = JSON.parse(decoded);
                    const now = Date.now();
                    if (now - (payload.t || 0) > 86400000) return showError('Link expired (24h)');
                    await loadTransactionFromAPI(payload.id);
                } catch (e) {
                    showError('Invalid link');
                }
            }

            async function loadTransactionFromAPI(id) {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    window.location.href = 'login.html?redirect='+encodeURIComponent(window.location.href);
                    return;
                }
                try {
                    const resp = await fetch(`https://bithash-backend.onrender.com/api/transactions/${id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        currentTransaction = data.data || data;
                        await fetchCoinGeckoPrices(); // optional prices
                        renderTransactionDetails();
                    } else if (resp.status === 404) {
                        await loadAllAndFind(id);
                    } else {
                        showError('Failed load');
                    }
                } catch (e) {
                    showError('Network error');
                }
            }

            async function loadAllAndFind(id) {
                const token = localStorage.getItem('jwtToken');
                try {
                    const resp = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        allTransactions = data.data?.transactions || data.transactions || [];
                        currentTransaction = allTransactions.find(t => t.id === id || t._id === id);
                        if (currentTransaction) { await fetchCoinGeckoPrices(); renderTransactionDetails(); }
                        else showError('Transaction not found');
                    } else showError('Cannot fetch list');
                } catch (e) { showError('Network error'); }
            }

            async function fetchCoinGeckoPrices() {
                try {
                    const ids = topAssets.map(a=>a.id).join(',');
                    const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=20&page=1&sparkline=false`);
                    if (res.ok) {
                        const data = await res.json();
                        data.forEach(asset => {
                            currentPrices[asset.id] = { usd: asset.current_price || 0 };
                        });
                        currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                    }
                } catch (e) {}
            }

            function showError(msg) {
                const container = document.getElementById('transaction-details-container');
                container.innerHTML = `<div class="placeholder-message"><i class="fas fa-exclamation-circle" style="font-size:2.5rem;color:var(--error);"></i><h3 style="margin:12px 0;">${msg}</h3><button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button></div>`;
            }

            // ------- RENDER (COMPACT BUT DETAILED) -------
            function renderTransactionDetails() {
                const tx = currentTransaction;
                if (!tx) return;
                const container = document.getElementById('transaction-details-container');
                const assetSymbol = tx.asset || tx.method || 'btc';
                const isBuy = tx.type === 'buy';
                const isSell = tx.type === 'sell';
                const isDeposit = tx.type === 'deposit';
                const isWithdrawal = tx.type === 'withdrawal';
                const isInterest = tx.type === 'interest';
                const isReferral = tx.type === 'referral';

                const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
                const usdAmount = parseFloat(tx.amount) || 0;
                const assetAmount = parseFloat(tx.assetAmount) || 0;

                const isIncoming = isDeposit || isInterest || isReferral || isBuy;
                const amountClass = isIncoming ? 'price-positive' : (isWithdrawal || isSell) ? 'price-negative' : '';
                const amountPrefix = isIncoming ? '+' : ((isWithdrawal || isSell) ? '-' : '');

                const assetId = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
                const exchangeRate = currentPrices[assetId]?.usd || 1;

                let network = tx.network || assetNetworks[assetSymbol.toLowerCase()] || 'Bitcoin';
                const txDate = new Date(tx.date || tx.createdAt || Date.now()).toLocaleString('en-US',{ month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });

                let iconClass = 'default', icon = 'fa-exchange-alt';
                if (isDeposit) { iconClass='deposit'; icon='fa-arrow-down'; }
                else if (isWithdrawal) { iconClass='withdrawal'; icon='fa-arrow-up'; }
                else if (isBuy) { icon='fa-cart-shopping'; iconClass='deposit'; }
                else if (isSell) { icon='fa-tag'; iconClass='withdrawal'; }
                else if (isInterest) { icon='fa-percent'; iconClass='deposit'; }
                else if (isReferral) { icon='fa-users'; iconClass='deposit'; }

                let statusClass = 'pending', statusText = 'Pending';
                if (tx.status === 'completed') { statusClass='success'; statusText='Completed'; }
                else if (tx.status === 'failed') { statusClass='failed'; statusText='Failed'; }

                let html = `
                    <div class="tx-icon-row">
                        <div class="tx-badge-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                        <div class="tx-title-id">
                            <h2>${tx.type || 'transaction'}</h2>
                            <div class="tx-id">ID: ${(tx.id || tx._id || '').slice(0,16)}…</div>
                        </div>
                        <span class="status-chip ${statusClass}">${statusText}</span>
                    </div>

                    <div class="amount-grid">
                        <div class="amount-card">
                            <div class="amount-label">amount (USD)</div>
                            <div class="amount-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                            <div class="amount-secondary">
                                <img src="${primaryAssetLogo}" class="asset-logo"> ${amountPrefix}${formatNumber(Math.abs(assetAmount || usdAmount/exchangeRate),6)} ${assetSymbol.toUpperCase()}
                            </div>
                        </div>
                        <div class="amount-card">
                            <div class="amount-label">exchange rate</div>
                            <div class="amount-value">${formatUSD(exchangeRate)}</div>
                            <div class="amount-secondary">1 ${assetSymbol.toUpperCase()}</div>
                        </div>
                    </div>
                `;

                // profit/loss for sell
                if (isSell && tx.sellDetails) {
                    const sd = tx.sellDetails;
                    html += `<div class="pl-section"><div class="section-title"><i class="fas fa-chart-line" style="color:var(--primary);"></i> profit / loss</div><div class="pl-grid">`;
                    html += `<div class="pl-item"><span class="pl-label">buy price</span><span class="pl-value">${formatUSD(sd.avgBuyPrice||0)}</span></div>`;
                    html += `<div class="pl-item"><span class="pl-label">sell price</span><span class="pl-value">${formatUSD(sd.price||0)}</span></div>`;
                    html += `<div class="pl-item"><span class="pl-label">profit</span><span class="pl-value price-positive">+${formatUSD(sd.profit||0)}</span></div>`;
                    html += `<div class="pl-item"><span class="pl-label">loss</span><span class="pl-value price-negative">-${formatUSD(sd.loss||0)}</span></div>`;
                    html += `</div></div>`;
                }

                // wallet breakdown for buy
                if (isBuy && tx.buyDetails) {
                    const bd = tx.buyDetails;
                    const main = parseFloat(bd.mainAmountUsed) || 0;
                    const matured = parseFloat(bd.maturedAmountUsed) || 0;
                    html += `<div class="wallet-breakdown"><div class="section-title"><i class="fas fa-wallet"></i> wallets used</div>`;
                    html += `<div class="wallet-row"><span class="wallet-name"><i class="fas fa-wallet"></i> Main</span><span class="wallet-amount price-positive">${formatUSD(main)}</span></div>`;
                    html += `<div class="wallet-row"><span class="wallet-name"><i class="fas fa-coins"></i> Matured</span><span class="wallet-amount price-positive">${formatUSD(matured)}</span></div>`;
                    html += `<div class="wallet-row"><span class="wallet-name"><i class="fas fa-calculator"></i> total used</span><span class="wallet-total">${formatUSD(main+matured)}</span></div>`;
                    html += `</div>`;
                }

                // details grid
                html += `<div class="details-grid">
                    <div class="detail-item"><div class="detail-label">date</div><div class="detail-value">${txDate}</div></div>
                    <div class="detail-item"><div class="detail-label">type</div><div class="detail-value" style="text-transform:capitalize;">${tx.type}</div></div>
                    <div class="detail-item"><div class="detail-label">asset</div><div class="detail-value with-icon"><img src="${primaryAssetLogo}" class="asset-logo" style="margin-right:4px;"> ${assetSymbol.toUpperCase()}</div></div>
                    <div class="detail-item"><div class="detail-label">network</div><div class="detail-value"><span class="network-badge">${network}</span></div></div>
                    <div class="detail-item"><div class="detail-label">fee</div><div class="detail-value">${tx.fee ? formatUSD(tx.fee) : 'none'}</div></div>
                    <div class="detail-item"><div class="detail-label">net</div><div class="detail-value ${amountClass}">${formatUSD(usdAmount - (tx.fee||0))}</div></div>
                </div>`;

                if (tx.reference || tx.description) {
                    html += `<div class="ref-note"><strong>ref:</strong> ${tx.reference || tx.description}</div>`;
                }

                html += `<div class="footer-actions-mini">
                    <button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button>
                    <button class="action-btn" onclick="printTransaction()"><i class="fas fa-print"></i> print</button>
                </div>`;

                container.innerHTML = html;
            }

            // helpers
            function formatUSD(num) {
                let n = parseFloat(num) || 0;
                if (n >= 1e9) return '$'+(n/1e9).toFixed(2)+'B';
                if (n >= 1e6) return '$'+(n/1e6).toFixed(2)+'M';
                return '$'+ n.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
            }
            function formatNumber(num, d=4) {
                let n = parseFloat(num)||0;
                return n.toFixed(d).replace(/\.?0+$/,'');
            }

            window.printTransaction = function() { window.print(); };
            window.downloadTransactionPDF = function() { showNotification('info','PDF','preparing...'); setTimeout(()=>window.print(),300); };

            function showNotification(t,title,msg) { /* stub for safety */ }

            // start
            loadTransactionFromURL();
            // also expose for later
            window.renderTransactionDetails = renderTransactionDetails;
            window.showError = showError;
        })();
    </script>
</body>
</html>
