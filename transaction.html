    <script>
        // ---------- GLOBAL STATE (copied from dashboard modal logic) ----------
        let currentPrices = {};

        // Top assets (same as dashboard)
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },

            { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
            { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' }

        const assetLogos = {};
        topAssets.forEach(a => assetLogos[a.symbol] = a.logo);
        assetLogos['btc'] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';

        const assetNetworks = {
            'btc': 'Bitcoin',
            'eth': 'Ethereum',
            'usdt': 'Tron (TRC-20)',
            'bnb': 'BNB Smart Chain (BEP-20)',
            'sol': 'Solana',
            'usdc': 'Ethereum (ERC-20)',
            'xrp': 'XRP Ledger',
            'doge': 'Dogecoin'
        };

        // Notification system (copied from dashboard)
        const notificationQueue = [];
        let isNotificationShowing = false;

        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) processNotificationQueue();
        }

        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }
            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            const icon = type === 'error' ? 'fa-exclamation-circle' : 
                        type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;
            document.getElementById('notification-center').appendChild(notification);
            void notification.offsetWidth;
            notification.classList.add('show');
            notification.querySelector('.notification-close').addEventListener('click', () => {
                notification.classList.remove('show');
                setTimeout(() => { notification.remove(); processNotificationQueue(); }, 400);
            });
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => { notification.remove(); processNotificationQueue(); }, 400);
                }
            }, duration);
        }

        // formatting helpers (identical to dashboard)
        function formatUSD(num) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
            if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
            if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
            return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        function formatNumberWithCommas(num, decimals=8) {
            const n = parseFloat(num) || 0;
            if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
            if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
            const parts = n.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (parts[1]) parts[1] = parts[1].replace(/0+$/, '');
            return parts[1] ? parts[0] + '.' + parts[1] : parts[0];
        }

        // fetch live prices (CoinGecko) – exact copy from dashboard
        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=1h%2C24h%2C7d`);
                if (response.ok) {
                    const data = await response.json();
                    currentPrices = {};
                    data.forEach(asset => {
                        currentPrices[asset.id] = {
                            usd: asset.current_price || 0,
                            usd_24h_change: asset.price_change_percentage_24h || 0
                        };
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                } else {
                    await fetchCoinGeckoSimplePrices();
                }
            } catch (e) {
                await fetchCoinGeckoSimplePrices();
            }
        }
        async function fetchCoinGeckoSimplePrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                if (response.ok) {
                    const data = await response.json();
                    topAssets.forEach(asset => {
                        currentPrices[asset.id] = {
                            usd: data[asset.id]?.usd || 0,
                            usd_24h_change: data[asset.id]?.usd_24h_change || 0
                        };
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                }
            } catch (e) {}
        }

        // Load transaction from encrypted URL param
        function getTransactionFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const encrypted = params.get('id');
            if (!encrypted) return null;
            try {
                const decoded = JSON.parse(atob(encrypted));
                return decoded; // { id, t, u }
            } catch (e) {
        console.error('Invalid transaction link');
            return null;
        }
        }

        // fetch full transaction data from backend (using /api/transactions)
        async function fetchTransactionById(transactionId) {
            const token = localStorage.getItem('jwtToken');
            if (!token) { window.location.href = 'login.html'; return null; }
            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch transactions');
                const data = await response.json();
                const all = data.data?.transactions || data.transactions || [];
                return all.find(tx => tx.id === transactionId || tx._id === transactionId) || null;
            } catch (e) {
                showNotification('error', 'Error', 'Could not load transaction');
                return null;
            }
        }

        // RENDER PAGE with exact same structure as dashboard modal (openTransactionDetails content)
        function renderTransaction(transaction) {
            if (!transaction) {
                document.getElementById('transaction-body').innerHTML = '<div style="text-align:center;padding:50px;color:var(--gray);">Transaction not found</div>';
                document.getElementById('header-status').textContent = 'Error';
                return;
            }

            // asset data
            const assetSymbol = transaction.asset || (transaction.type === 'deposit' ? transaction.method || 'btc' : 'btc');
            const assetKey = assetSymbol.toLowerCase();
            const assetData = topAssets.find(a => a.symbol === assetKey) || { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' };
            const assetLogo = assetData.logo;
            document.getElementById('header-asset-logo').src = assetLogo;
            document.getElementById('header-title').innerHTML = `${transaction.type ? transaction.type.charAt(0).toUpperCase() + transaction.type.slice(1) : 'Transaction'} Details`;
            document.getElementById('header-status').className = `status-badge ${transaction.status === 'completed' ? 'success' : transaction.status === 'pending' ? 'pending' : 'failed'}`;
            document.getElementById('header-status').textContent = (transaction.status || 'pending').toUpperCase();

            const usdAmount = parseFloat(transaction.amount) || 0;
            const isIncoming = ['deposit','interest','referral','buy'].includes(transaction.type);
            const isOutgoing = ['withdrawal','sell'].includes(transaction.type);
            const amountClass = isIncoming ? 'price-positive' : (isOutgoing ? 'price-negative' : '');
            const amountPrefix = isIncoming ? '+' : (isOutgoing ? '-' : '');

            // exchange rate (real-time)
            const assetId = assetData.id;
            const price = currentPrices[assetId]?.usd || currentBTCPrice;
            let assetAmount = 0;
            if (transaction.type === 'buy' || transaction.type === 'sell') {
                assetAmount = parseFloat(transaction.assetAmount) || 0;
            } else {
                assetAmount = usdAmount / price;
            }

            const network = transaction.network && transaction.network !== 'Unknown' ? transaction.network : (assetNetworks[assetKey] || 'Bitcoin');

            // profit/loss for sell
            const sellDetails = transaction.sellDetails || (transaction.type === 'sell' ? transaction : null);
            const profit = sellDetails?.profit || 0;
            const loss = sellDetails?.loss || 0;
            const avgBuyPrice = sellDetails?.avgBuyPrice || transaction.buyDetails?.price || null;

            // Build HTML (exact replica of modal with additional profit details)
            let html = `
                <div class="amount-summary">
                    <div class="summary-item">
                        <div class="summary-label">Total Amount (USD)</div>
                        <div class="summary-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="summary-sub">
                            <img src="${assetLogo}" alt=""> ${amountPrefix}${formatNumberWithCommas(Math.abs(assetAmount), 8)} ${assetSymbol.toUpperCase()}
                        </div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Exchange Rate at Transaction</div>
                        <div class="summary-value">${formatUSD(price)}</div>
                        <div class="summary-sub">1 ${assetSymbol.toUpperCase()} = ${formatUSD(price)}</div>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">Transaction ID</div>
                        <div class="detail-value">${transaction.id || transaction._id || 'N/A'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Date & Time</div>
                        <div class="detail-value">${new Date(transaction.date || transaction.createdAt || new Date()).toLocaleString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' })}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Type</div>
                        <div class="detail-value" style="text-transform:capitalize;">${transaction.type || 'Transfer'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Network</div>
                        <div class="detail-value">${network}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Transaction Fee</div>
                        <div class="detail-value">${transaction.fee ? formatUSD(transaction.fee) : 'None'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Net Amount</div>
                        <div class="detail-value">${formatUSD(usdAmount - (transaction.fee || 0))}</div>
                    </div>
                </div>
            `;

            // Additional profit/loss section for sell
            if (transaction.type === 'sell' && (profit > 0 || loss > 0)) {
                html += `
                <div class="profit-loss-box">
                    <h4 style="margin-bottom: 15px; color: var(--dark);">Profit & Loss Breakdown</h4>
                    <div class="profit-loss-grid">
                        <div class="profit-loss-item">
                            <div class="label">Average Buy Price</div>
                            <div class="value">${formatUSD(avgBuyPrice || 0)}</div>
                        </div>
                        <div class="profit-loss-item">
                            <div class="label">Sell Price</div>
                            <div class="value">${formatUSD(sellDetails?.price || price)}</div>
                        </div>
                        <div class="profit-loss-item">
                            <div class="label">Realized Profit</div>
                            <div class="value price-positive">+${formatUSD(profit)}</div>
                        </div>
                        <div class="profit-loss-item">
                            <div class="label">Realized Loss</div>
                            <div class="value price-negative">-${formatUSD(loss)}</div>
                        </div>
                        <div class="profit-loss-item">
                            <div class="label">ROI %</div>
                            <div class="value ${profit > 0 ? 'price-positive' : loss > 0 ? 'price-negative' : ''}">${profit > 0 ? '+' : ''}${((profit - loss) / (avgBuyPrice * assetAmount || 1) * 100).toFixed(2)}%</div>
                        </div>
                    </div>
                </div>
            `;
            }

            // Description / details
            html += `<div style="margin-top: 25px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px;"><i class="fas fa-info-circle" style="color: var(--primary); margin-right: 8px;"></i> ${transaction.description || transaction.details || 'Transaction processed'}</div>`;

            document.getElementById('transaction-body').innerHTML = html;
        }

        // Prepare PDF area with exact same details + footer logo
        function preparePDFExport(transaction) {
            const area = document.getElementById('pdf-export-area');
            if (!transaction) return;
            const assetSymbol = transaction.asset || 'btc';
            const assetKey = assetSymbol.toLowerCase();
            const assetData = topAssets.find(a => a.symbol === assetKey) || { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' };
            const assetLogo = assetData.logo;
            const usdAmount = parseFloat(transaction.amount) || 0;
            const isIncoming = ['deposit','interest','referral','buy'].includes(transaction.type);
            const amountPrefix = isIncoming ? '+' : (['withdrawal','sell'].includes(transaction.type) ? '-' : '');
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            const assetAmount = transaction.type === 'buy' || transaction.type === 'sell' ? parseFloat(transaction.assetAmount) || 0 : usdAmount / price;

            const network = transaction.network && transaction.network !== 'Unknown' ? transaction.network : (assetNetworks[assetKey] || 'Bitcoin');

            area.innerHTML = `
                <div class="export-header">
                    <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                    <h2>BitHash Transaction Receipt</h2>
                </div>
                <div style="margin-bottom: 20px;">
                    <h3 style="display:flex; align-items:center; gap:10px;"><img src="${assetLogo}" style="width:28px;"> ${transaction.type} - ${assetSymbol.toUpperCase()}</h3>
                    <p><strong>Status:</strong> ${transaction.status}</p>
                    <p><strong>Transaction ID:</strong> ${transaction.id || transaction._id}</p>
                    <p><strong>Date:</strong> ${new Date(transaction.date || transaction.createdAt).toLocaleString()}</p>
                </div>
                <table style="width:100%; border-collapse:collapse; margin:20px 0;">
                    <tr><td style="padding:8px; border-bottom:1px solid #ccc;"><strong>Amount (USD)</strong></td><td style="padding:8px; border-bottom:1px solid #ccc;">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</td></tr>
                    <tr><td style="padding:8px; border-bottom:1px solid #ccc;"><strong>Amount (${assetSymbol.toUpperCase()})</strong></td><td style="padding:8px; border-bottom:1px solid #ccc;">${amountPrefix}${formatNumberWithCommas(Math.abs(assetAmount),8)}</td></tr>
                    <tr><td style="padding:8px; border-bottom:1px solid #ccc;"><strong>Exchange Rate</strong></td><td style="padding:8px; border-bottom:1px solid #ccc;">1 ${assetSymbol.toUpperCase()} = ${formatUSD(price)}</td></tr>
                    <tr><td style="padding:8px; border-bottom:1px solid #ccc;"><strong>Network</strong></td><td style="padding:8px; border-bottom:1px solid #ccc;">${network}</td></tr>
                    <tr><td style="padding:8px;"><strong>Transaction Fee</strong></td><td style="padding:8px;">${transaction.fee ? formatUSD(transaction.fee) : 'None'}</td></tr>
                </table>
                <div class="footer-note">
                    <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png"> BitHash – Secure Cloud Mining
                </div>
            `;
        }

        // Download PDF using html2pdf with logo footer
        function downloadPDF() {
            const element = document.getElementById('pdf-export-area');
            if (!element.innerHTML.trim()) {
                showNotification('error', 'No Data', 'Transaction details not ready');
                return;
            }
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:     `BitHash_Transaction_${new Date().toISOString().slice(0,10)}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function printTransaction() {
            window.print();
        }

        // ---- init ----
        window.addEventListener('load', async function() {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            await fetchCoinGeckoPrices();

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const txRef = getTransactionFromUrl();
            if (!txRef || !txRef.id) {
                document.getElementById('transaction-body').innerHTML = '<div style="text-align:center;padding:50px;color:var(--gray);">Invalid or expired transaction link</div>';
                document.getElementById('header-status').textContent = 'Invalid';
                return;
            }

            const transaction = await fetchTransactionById(txRef.id);
            if (transaction) {
                renderTransaction(transaction);
                preparePDFExport(transaction);
            } else {
                document.getElementById('transaction-body').innerHTML = '<div style="text-align:center;padding:50px;color:var(--gray);">Transaction not found</div>';
                document.getElementById('header-status').textContent = 'Not Found';
            }
        });

        // scroll effect
        window.addEventListener('scroll', function() {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
    </script>
</body>
</html>
