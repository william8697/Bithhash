<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Transaction Details</title>
    <meta name="description" content="View detailed transaction information for your cloud mining account.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --success: #228B22;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            display: none;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .loading-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--accent);
            font-size: 1rem;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        /* Header */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background-color: rgba(11, 14, 17, 0.95);
        }
        
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .logo img {
            height: 36px;
            width: auto;
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
        }
        
        .logo-text span {
            color: var(--accent);
        }
        
        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .back-button:hover {
            background: var(--accent);
            color: #000000;
            border-color: var(--accent);
        }
        
        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 100px auto 60px;
            padding: 0 24px;
        }
        
        /* Error State */
        .error-container {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-surface);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
        }
        
        .error-icon {
            font-size: 4rem;
            color: var(--error);
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        /* Transaction Card */
        .transaction-card {
            background: var(--bg-surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        /* Card Header */
        .card-header {
            padding: 24px 32px;
            background: linear-gradient(135deg, rgba(247, 166, 0, 0.08) 0%, rgba(0, 0, 0, 0) 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .status-badge.completed {
            background: rgba(34, 139, 34, 0.15);
            color: var(--success);
            border: 1px solid rgba(34, 139, 34, 0.3);
        }
        
        .status-badge.pending {
            background: rgba(255, 184, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 184, 0, 0.3);
        }
        
        .status-badge.failed {
            background: rgba(255, 0, 0, 0.15);
            color: var(--error);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }
        
        .transaction-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 8px;
        }
        
        /* Card Body */
        .card-body {
            padding: 32px;
        }
        
        /* Amount Section */
        .amount-section {
            text-align: center;
            padding: 32px 0;
            background: rgba(247, 166, 0, 0.03);
            border-radius: 20px;
            margin-bottom: 32px;
        }
        
        .amount-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .amount-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .amount-crypto {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        .amount-crypto img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
        }
        
        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .detail-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .detail-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-all;
        }
        
        .detail-value.mono {
            font-family: monospace;
            font-size: 0.85rem;
        }
        
        .detail-value.positive {
            color: var(--success);
        }
        
        .detail-value.negative {
            color: var(--error);
        }
        
        /* Asset Logo */
        .asset-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(247, 166, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .asset-logo img {
            width: 32px;
            height: 32px;
        }
        
        /* QR Code Section */
        .qr-section {
            display: flex;
            justify-content: center;
            margin: 32px 0;
            padding: 24px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        
        .qr-container {
            text-align: center;
        }
        
        .qr-container canvas,
        .qr-container img {
            border-radius: 16px;
            background: white;
            padding: 12px;
        }
        
        .qr-label {
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000000;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .btn-outline:hover {
            background: rgba(247, 166, 0, 0.1);
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        /* Print Styles - Enterprise Statement */
        @media print {
            body {
                background: white;
                color: black;
            }
            
            header, .action-buttons, .back-button {
                display: none !important;
            }
            
            .main-content {
                margin: 0;
                padding: 0;
            }
            
            .transaction-card {
                background: white;
                border: none;
                box-shadow: none;
            }
            
            .card-header {
                background: white;
                border-bottom: 2px solid #ddd;
            }
            
            .card-body {
                padding: 20px;
            }
            
            .amount-section {
                background: #f5f5f5;
            }
            
            .detail-item {
                border: 1px solid #e0e0e0;
                background: white;
            }
            
            .qr-section {
                border: 1px solid #e0e0e0;
            }
            
            .status-badge {
                border: 1px solid #ddd;
            }
            
            .status-badge.completed {
                background: #e8f5e9;
                color: #2e7d32;
            }
            
            .status-badge.pending {
                background: #fff3e0;
                color: #ed6c02;
            }
            
            .status-badge.failed {
                background: #ffebee;
                color: #d32f2f;
            }
        }
        
        /* Statement Preview Modal */
        .statement-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            padding: 20px;
        }
        
        .statement-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .statement-content {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .statement-header {
            position: sticky;
            top: 0;
            background: white;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            z-index: 10;
        }
        
        .statement-body {
            padding: 32px;
        }
        
        .statement-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                margin: 80px auto 40px;
                padding: 0 16px;
            }
            
            .card-header {
                padding: 16px 20px;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .card-body {
                padding: 20px;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .amount-value {
                font-size: 2rem;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-surface);
            border-left: 4px solid var(--accent);
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            border-left-color: var(--success);
        }
        
        .toast.error {
            border-left-color: var(--error);
        }
        
        .toast i {
            font-size: 1.2rem;
        }
        
        .toast.success i {
            color: var(--success);
        }
        
        .toast.error i {
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
        <div class="loading-text"><i class="fas fa-lock"></i> Loading Transaction Details</div>
    </div>

    <header>
        <div class="header-container">
            <a href="dashboard.html" class="logo">
                <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo">
                <span class="logo-text"><span>₿</span>itHash</span>
            </a>
            <a href="dashboard.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </header>

    <div class="main-content">
        <div id="transaction-container"></div>
    </div>

    <!-- Statement Preview Modal -->
    <div class="statement-modal" id="statement-modal">
        <div class="statement-content">
            <div class="statement-header">
                <button class="btn btn-outline" id="download-statement-btn" style="padding: 8px 16px;">
                    <i class="fas fa-download"></i> Download PDF
                </button>
                <button class="btn btn-primary" id="print-statement-btn" style="padding: 8px 16px;">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="statement-close" id="close-statement-modal">&times;</button>
            </div>
            <div class="statement-body" id="statement-body">
                <!-- Statement content will be cloned here -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // =============================================
        // GLOBAL VARIABLES
        // =============================================
        let currentTransaction = null;
        let qrCodeInstance = null;
        let statementClone = null;
        
        // Asset logo mapping (same as dashboard)
        const assetLogos = {
            'btc': 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
            'eth': 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
            'usdt': 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
            'bnb': 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
            'sol': 'https://assets.coingecko.com/coins/images/4128/large/solana.png',
            'usdc': 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png',
            'xrp': 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png',
            'doge': 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png',
            'ada': 'https://assets.coingecko.com/coins/images/975/large/cardano.png',
            'shib': 'https://assets.coingecko.com/coins/images/11939/large/shiba.png',
            'trx': 'https://assets.coingecko.com/coins/images/1094/large/tron-logo.png',
            'ltc': 'https://assets.coingecko.com/coins/images/2/large/litecoin.png'
        };
        
        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function formatCurrency(amount, asset = 'USD') {
            if (asset === 'USD') {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(amount || 0);
            }
            return `${(amount || 0).toFixed(8)} ${asset.toUpperCase()}`;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            });
        }
        
        function formatShortDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function getAssetLogo(asset) {
            const assetLower = (asset || 'btc').toLowerCase();
            return assetLogos[assetLower] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        }
        
        function getTransactionTypeIcon(type) {
            const icons = {
                'deposit': '<i class="fas fa-download"></i>',
                'withdrawal': '<i class="fas fa-upload"></i>',
                'buy': '<i class="fas fa-shopping-cart"></i>',
                'sell': '<i class="fas fa-tag"></i>',
                'interest': '<i class="fas fa-chart-line"></i>',
                'referral': '<i class="fas fa-users"></i>',
                'investment': '<i class="fas fa-microchip"></i>',
                'transfer': '<i class="fas fa-exchange-alt"></i>',
                'loan': '<i class="fas fa-hand-holding-usd"></i>'
            };
            return icons[type] || '<i class="fas fa-exchange-alt"></i>';
        }
        
        // =============================================
        // GENERATE UNIQUE QR CODE FOR TRANSACTION
        // QR code redirects to this transaction page
        // =============================================
        function generateTransactionQRCode(transactionId) {
            const qrContainer = document.getElementById('qr-code-container');
            if (!qrContainer) return;
            
            qrContainer.innerHTML = '';
            
            // Build the QR code URL - when scanned, opens this transaction directly
            const currentUrl = window.location.href.split('?')[0];
            const qrUrl = `${currentUrl}?id=${encodeURIComponent(transactionId)}`;
            
            try {
                // Generate QR code using QRCode.js
                new QRCode(qrContainer, {
                    text: qrUrl,
                    width: 120,
                    height: 120,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (err) {
                console.error('QR Code generation failed:', err);
                qrContainer.innerHTML = '<div style="width:120px;height:120px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border-radius:12px;"><i class="fas fa-qrcode" style="font-size:48px;color:#999;"></i></div>';
            }
        }
        
        // =============================================
        // GENERATE STATEMENT HTML (For Print/Download)
        // Includes Logo, Slogan, QR Code - NO LINKS
        // =============================================
        function generateStatementHTML(transaction) {
            const asset = transaction.asset || 'btc';
            const assetLogo = getAssetLogo(asset);
            const amountUSD = transaction.amount || 0;
            const cryptoAmount = transaction.assetAmount || (transaction.amount / (transaction.exchangeRateAtTime || 1));
            
            // Build QR code URL for the statement
            const currentUrl = window.location.href.split('?')[0];
            const qrUrl = `${currentUrl}?id=${encodeURIComponent(transaction.id || transaction._id)}`;
            
            // Format the date for the statement
            const statementDate = new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const transactionDate = formatDate(transaction.createdAt || transaction.date || transaction.timestamp);
            
            return `
                <div id="statement-print-area" style="font-family: 'Inter', sans-serif; max-width: 800px; margin: 0 auto; background: white; color: #1a1a2e;">
                    <!-- Header with Logo and Slogan -->
                    <div style="text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #0B0E11 0%, #11151C 100%); border-radius: 16px 16px 0 0;">
                        <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" style="width: 70px; height: 70px; margin-bottom: 15px;">
                        <h1 style="color: #FFFFFF; font-size: 28px; margin: 0; font-weight: bold; letter-spacing: 1px;">₿itHash</h1>
                        <p style="color: #F7A600; font-size: 14px; margin: 8px 0 0 0; font-style: italic; font-weight: 500;">Where Your Financial Goals Become Reality</p>
                    </div>
                    
                    <!-- Statement Title -->
                    <div style="padding: 25px 30px; background: white;">
                        <div style="text-align: center; margin-bottom: 25px;">
                            <h2 style="color: #F7A600; font-size: 22px; margin: 0; border-bottom: 2px solid #F7A600; display: inline-block; padding-bottom: 8px;">OFFICIAL TRANSACTION STATEMENT</h2>
                        </div>
                        
                        <!-- Transaction ID and Date -->
                        <div style="background: #F8FAFC; border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                            <table style="width: 100%; border-collapse: collapse;">
                                <tr>
                                    <td style="padding: 6px 0; color: #64748B; font-size: 13px; width: 35%;">Transaction ID:</td>

                                </tr>

                                    <td style="padding: 6px 0; color: #64748B; font-size: 13px;">Reference Number:</td>

                                </tr>
                                <tr>
                                    <td style="padding: 6px 0; color: #64748B; font-size: 13px;">Statement Generated:</td>
                                    <td style="padding: 6px 0; color: #0B0E11;">${statementDate}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 6px 0; color: #64748B; font-size: 13px;">Transaction Date:</td>
                                    <td style="padding: 6px 0; color: #0B0E11;">${transactionDate}</td>
                                </tr>
                            </table>
                        </div>
                        
                        <!-- Amount Section -->
                        <div style="background: linear-gradient(135deg, #F7A60008 0%, #fff 100%); border-radius: 16px; padding: 25px; text-align: center; margin-bottom: 25px; border: 1px solid #E5E7EB;">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;">
                                <img src="${assetLogo}" style="width: 40px; height: 40px; border-radius: 50%;">
                                <span style="font-size: 32px; font-weight: 700; color: #0B0E11;">${formatCurrency(amountUSD, 'USD')}</span>
                            </div>
                            <div style="color: #64748B; font-size: 14px;">
                                ≈ ${cryptoAmount.toFixed(8)} ${asset.toUpperCase()}
                            </div>
                            ${transaction.exchangeRateAtTime ? `
                            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #E5E7EB; font-size: 12px; color: #64748B;">
                                Exchange Rate at Time: 1 ${asset.toUpperCase()} = ${formatCurrency(transaction.exchangeRateAtTime, 'USD')}
                            </div>
                            ` : ''}
                        </div>
                        
                        <!-- Transaction Details Grid -->
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px;">
                            <div style="background: #F8FAFC; border-radius: 12px; padding: 16px;">
                                <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Transaction Type</div>
                                <div style="font-weight: 600; color: #0B0E11; text-transform: capitalize;">${transaction.type || 'Transaction'}</div>
                            </div>
                            <div style="background: #F8FAFC; border-radius: 12px; padding: 16px;">
                                <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Status</div>
                                <div style="font-weight: 600; color: ${transaction.status === 'completed' ? '#228B22' : transaction.status === 'pending' ? '#FFB800' : '#FF0000'}; text-transform: capitalize;">${transaction.status || 'Pending'}</div>
                            </div>
                            <div style="background: #F8FAFC; border-radius: 12px; padding: 16px;">
                                <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Asset / Network</div>
                                <div style="font-weight: 600; color: #0B0E11;">${(transaction.asset || 'USD').toUpperCase()} ${transaction.network ? `(${transaction.network})` : ''}</div>
                            </div>
                            <div style="background: #F8FAFC; border-radius: 12px; padding: 16px;">
                                <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Payment Method</div>
                                <div style="font-weight: 600; color: #0B0E11; text-transform: uppercase;">${transaction.method || 'INTERNAL'}</div>
                            </div>
                        </div>
                        
                        <!-- Additional Details -->
                        ${transaction.description || transaction.details ? `
                        <div style="background: #F8FAFC; border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                            <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Transaction Description</div>
                            <div style="color: #0B0E11; font-size: 14px; line-height: 1.5;">${transaction.description || (typeof transaction.details === 'string' ? transaction.details : JSON.stringify(transaction.details))}</div>
                        </div>
                        ` : ''}
                        
                        ${transaction.walletAddress || transaction.btcAddress ? `
                        <div style="background: #F8FAFC; border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                            <div style="color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Destination Address</div>
                            <div style="color: #0B0E11; font-family: monospace; font-size: 12px; word-break: break-all;">${transaction.walletAddress || transaction.btcAddress}</div>
                        </div>
                        ` : ''}
                        
                        ${transaction.fee > 0 ? `
                        <div style="background: #FEF3C7; border-radius: 12px; padding: 20px; margin-bottom: 25px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="color: #92400E; font-weight: 600;">Network/Processing Fee:</span>
                                <span style="color: #92400E;">${formatCurrency(transaction.fee, 'USD')}</span>
                            </div>
                            ${transaction.netAmount ? `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #FDE68A;">
                                <span style="color: #92400E; font-weight: 600;">Net Amount Received:</span>
                                <span style="color: #92400E; font-weight: 600;">${formatCurrency(transaction.netAmount, 'USD')}</span>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        
                        <!-- QR Code Section -->
                        <div style="text-align: center; padding: 20px; background: #F8FAFC; border-radius: 12px; margin-bottom: 25px;">
                            <div style="display: inline-block; text-align: center;">
                                <div id="statement-qr-code" style="margin: 0 auto;"></div>
                                <div style="margin-top: 12px; font-size: 11px; color: #64748B;">Scan to view transaction details</div>
                            </div>
                        </div>
                        
                        <!-- Footer -->
                        <div style="text-align: center; padding-top: 20px; border-top: 1px solid #E5E7EB;">
                            <p style="color: #6C7480; font-size: 11px; margin: 5px 0;">This is an official statement from ₿itHash Capital.</p>
                            <p style="color: #6C7480; font-size: 11px; margin: 5px 0;">800 Plant St, Wilmington, DE 19801, United States</p>
                            <p style="color: #6C7480; font-size: 11px; margin: 5px 0;">support@bithashcapital.live</p>
                            <p style="color: #6C7480; font-size: 10px; margin-top: 15px;">&copy; ${new Date().getFullYear()} ₿itHash Capital. All rights reserved.</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // =============================================
        // GENERATE QR CODE FOR STATEMENT
        // =============================================
        function generateStatementQRCode(transactionId) {
            const qrContainer = document.getElementById('statement-qr-code');
            if (!qrContainer) return;
            
            qrContainer.innerHTML = '';
            
            const currentUrl = window.location.href.split('?')[0];
            const qrUrl = `${currentUrl}?id=${encodeURIComponent(transactionId)}`;
            
            try {
                new QRCode(qrContainer, {
                    text: qrUrl,
                    width: 100,
                    height: 100,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (err) {
                console.error('Statement QR Code generation failed:', err);
                qrContainer.innerHTML = '<div style="width:100px;height:100px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border-radius:8px;"><i class="fas fa-qrcode" style="font-size:40px;color:#999;"></i></div>';
            }
        }
        
        // =============================================
        // PRINT STATEMENT
        // =============================================
        async function printStatement() {
            if (!currentTransaction) return;
            
            const transactionId = currentTransaction.id || currentTransaction._id;
            const statementHTML = generateStatementHTML(currentTransaction);
            
            // Create a temporary iframe for printing
            const iframe = document.createElement('iframe');
            iframe.style.position = 'absolute';
            iframe.style.width = '0px';
            iframe.style.height = '0px';
            iframe.style.border = 'none';
            document.body.appendChild(iframe);
            
            const iframeDoc = iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>BitHash Transaction Statement</title>
                    <meta charset="UTF-8">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Inter', sans-serif; padding: 20px; }
                        @media print {
                            body { padding: 0; }
                            .no-print { display: none; }
                        }
                    </style>
                    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
                </head>
                <body>
                    ${statementHTML}
                    <script>
                        // Generate QR code after content loads
                        setTimeout(function() {
                            var container = document.getElementById('statement-qr-code');
                            if (container && typeof QRCode !== 'undefined') {
                                var url = window.location.href.split('?')[0] + '?id=${encodeURIComponent(transactionId)}';
                                new QRCode(container, {
                                    text: url,
                                    width: 100,
                                    height: 100,
                                    colorDark: "#000000",
                                    colorLight: "#ffffff",
                                    correctLevel: QRCode.CorrectLevel.H
                                });
                            }
                        }, 100);
                    <\/script>
                </body>
                </html>
            `);
            iframeDoc.close();
            
            setTimeout(() => {
                iframe.contentWindow.print();
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 1000);
            }, 500);
        }
        
        // =============================================
        // DOWNLOAD STATEMENT AS PDF
        // =============================================
        async function downloadStatementPDF() {
            if (!currentTransaction) return;
            
            showToast('Preparing PDF document...', 'success');
            
            const transactionId = currentTransaction.id || currentTransaction._id;
            const statementHTML = generateStatementHTML(currentTransaction);
            
            // Create a temporary div to render the statement
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '0';
            tempDiv.style.width = '800px';
            tempDiv.style.backgroundColor = 'white';
            tempDiv.innerHTML = statementHTML;
            document.body.appendChild(tempDiv);
            
            // Generate QR code in the temp div
            const qrContainer = tempDiv.querySelector('#statement-qr-code');
            if (qrContainer) {
                const currentUrl = window.location.href.split('?')[0];
                const qrUrl = `${currentUrl}?id=${encodeURIComponent(transactionId)}`;
                try {
                    new QRCode(qrContainer, {
                        text: qrUrl,
                        width: 100,
                        height: 100,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch (err) {
                    qrContainer.innerHTML = '<div style="width:100px;height:100px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border-radius:8px;"><i class="fas fa-qrcode" style="font-size:40px;color:#999;"></i></div>';
                }
            }
            
            // Wait for QR code to render
            await new Promise(resolve => setTimeout(resolve, 300));
            
            try {
                const canvas = await html2canvas(tempDiv, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    useCORS: true,
                    allowTaint: false
                });
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });
                
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(`BitHash_Transaction_Statement_${transactionId.slice(-8)}.pdf`);
                
                showToast('PDF downloaded successfully!', 'success');
            } catch (err) {
                console.error('PDF generation failed:', err);
                showToast('Failed to generate PDF. Please try again.', 'error');
            } finally {
                document.body.removeChild(tempDiv);
            }
        }
        
        // =============================================
        // RENDER TRANSACTION DETAILS
        // =============================================
        function renderTransactionDetails(transaction) {
            const container = document.getElementById('transaction-container');
            if (!container) return;
            
            const asset = transaction.asset || 'btc';
            const assetLogo = getAssetLogo(asset);
            const amountUSD = transaction.amount || 0;
            const cryptoAmount = transaction.assetAmount || (transaction.amount / (transaction.exchangeRateAtTime || 1));
            const transactionId = transaction.id || transaction._id;
            const reference = transaction.reference || transactionId;
            
            // Determine if this is a crypto transaction for QR code
            const isCryptoTransaction = ['deposit', 'withdrawal', 'buy', 'sell'].includes(transaction.type);
            
            let statusClass = 'pending';
            let statusText = 'Pending';
            if (transaction.status === 'completed') {
                statusClass = 'completed';
                statusText = 'Completed';
            } else if (transaction.status === 'failed') {
                statusClass = 'failed';
                statusText = 'Failed';
            } else if (transaction.status === 'cancelled') {
                statusClass = 'failed';
                statusText = 'Cancelled';
            }
            
            const html = `
                <div class="transaction-card">
                    <div class="card-header">
                        <div>
                            <span class="status-badge ${statusClass}">
                                ${getTransactionTypeIcon(transaction.type)}
                                ${statusText}
                            </span>
                        </div>
                        <div class="transaction-id">
                            <i class="fas fa-hashtag"></i> ${reference.slice(-12)}
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="amount-section">
                            <div class="amount-label">TRANSACTION AMOUNT</div>
                            <div class="amount-value">${formatCurrency(amountUSD, 'USD')}</div>
                            <div class="amount-crypto">
                                <img src="${assetLogo}" alt="${asset}"> ≈ ${cryptoAmount.toFixed(8)} ${asset.toUpperCase()}
                            </div>
                            ${transaction.exchangeRateAtTime ? `
                            <div style="margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);">
                                Rate at time: 1 ${asset.toUpperCase()} = ${formatCurrency(transaction.exchangeRateAtTime, 'USD')}
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="details-grid">
                            <div class="detail-item">
                                <div class="detail-label">Transaction Type</div>
                                <div class="detail-value" style="text-transform: capitalize;">
                                    ${getTransactionTypeIcon(transaction.type)} ${transaction.type || 'Transaction'}
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Date & Time</div>
                                <div class="detail-value">${formatDate(transaction.createdAt || transaction.date || transaction.timestamp)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Asset / Network</div>
                                <div class="detail-value">${(transaction.asset || 'USD').toUpperCase()} ${transaction.network ? `<span style="color: var(--text-muted);">(${transaction.network})</span>` : ''}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Payment Method</div>
                                <div class="detail-value" style="text-transform: uppercase;">${transaction.method || 'INTERNAL'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Transaction Reference</div>
                                <div class="detail-value mono">${reference || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Transaction ID</div>
                                <div class="detail-value mono">${transactionId || 'N/A'}</div>
                            </div>
                        </div>
                        
                        ${transaction.description || transaction.details ? `
                        <div class="detail-item" style="margin-bottom: 24px;">
                            <div class="detail-label">Description</div>
                            <div class="detail-value">${transaction.description || (typeof transaction.details === 'string' ? transaction.details : JSON.stringify(transaction.details))}</div>
                        </div>
                        ` : ''}
                        
                        ${transaction.walletAddress || transaction.btcAddress ? `
                        <div class="detail-item" style="margin-bottom: 24px;">
                            <div class="detail-label">Destination Address</div>
                            <div class="detail-value mono">${transaction.walletAddress || transaction.btcAddress}</div>
                        </div>
                        ` : ''}
                        
                        ${transaction.fee > 0 ? `
                        <div class="detail-item" style="margin-bottom: 24px; background: rgba(255, 184, 0, 0.05);">
                            <div class="detail-label">Network/Processing Fee</div>
                            <div class="detail-value">${formatCurrency(transaction.fee, 'USD')}</div>
                            ${transaction.netAmount ? `<div class="detail-label" style="margin-top: 8px;">Net Amount</div><div class="detail-value">${formatCurrency(transaction.netAmount, 'USD')}</div>` : ''}
                        </div>
                        ` : ''}
                        
                        ${isCryptoTransaction ? `
                        <div class="qr-section">
                            <div class="qr-container">
                                <div id="qr-code-container"></div>
                                <div class="qr-label">Scan to view this transaction</div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="action-buttons">
                            <button class="btn btn-outline" onclick="downloadStatementPDF()">
                                <i class="fas fa-download"></i> Download Statement
                            </button>
                            <button class="btn btn-primary" onclick="printStatement()">
                                <i class="fas fa-print"></i> Print Statement
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Generate QR code for the transaction
            if (isCryptoTransaction && transactionId) {
                generateTransactionQRCode(transactionId);
            }
        }
        
        // =============================================
        // FETCH TRANSACTION FROM BACKEND
        // =============================================
        async function fetchTransaction(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    window.location.href = 'login.html';
                    return null;
                }
                
                const response = await fetch(`https://bithash-backend-kg7j.onrender.com/api/transactions/${transactionId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('jwtToken');
                    window.location.href = 'login.html';
                    return null;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                return data.data?.transaction || data.transaction || null;
                
            } catch (error) {
                console.error('Error fetching transaction:', error);
                throw error;
            }
        }
        
        // =============================================
        // RENDER ERROR STATE
        // =============================================
        function renderError(message) {
            const container = document.getElementById('transaction-container');
            if (!container) return;
            
            container.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h2 class="error-title">Transaction Not Found</h2>
                    <p class="error-message">${message || 'The requested transaction could not be found or you do not have permission to view it.'}</p>
                    <a href="dashboard.html" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> Return to Dashboard
                    </a>
                </div>
            `;
        }
        
        // =============================================
        // DECRYPT AND GET TRANSACTION ID FROM URL
        // =============================================
        function getTransactionIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let transactionId = urlParams.get('id');
            
            if (!transactionId) {
                return null;
            }
            
            // Try to decode if it's base64 encoded (for security)
            try {
                const decoded = atob(transactionId);
                const parsed = JSON.parse(decoded);
                if (parsed.id) {
                    return parsed.id;
                }
                return transactionId;
            } catch (e) {
                // Not base64 encoded, return as is
                return transactionId;
            }
        }
        
        // =============================================
        // INITIALIZE PAGE
        // =============================================
        async function init() {
            // Hide loading overlay initially (will show again while fetching)
            const loadingOverlay = document.getElementById('loading-overlay');
            
            const transactionId = getTransactionIdFromUrl();
            
            if (!transactionId) {
                loadingOverlay.classList.add('hidden');
                renderError('No transaction ID provided.');
                return;
            }
            
            try {
                const transaction = await fetchTransaction(transactionId);
                
                if (!transaction) {
                    loadingOverlay.classList.add('hidden');
                    renderError('Transaction not found.');
                    return;
                }
                
                currentTransaction = transaction;
                renderTransactionDetails(transaction);
                loadingOverlay.classList.add('hidden');
                
            } catch (error) {
                console.error('Initialization error:', error);
                loadingOverlay.classList.add('hidden');
                renderError(error.message || 'Failed to load transaction details. Please try again.');
            }
        }
        
        // =============================================
        // CHECK AUTHENTICATION ON PAGE LOAD
        // =============================================
        async function checkAuth() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            
            try {
                const response = await fetch('https://bithash-backend-kg7j.onrender.com/api/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    localStorage.removeItem('jwtToken');
                    window.location.href = 'login.html';
                    return false;
                }
                
                return true;
            } catch (error) {
                console.error('Auth check error:', error);
                window.location.href = 'login.html';
                return false;
            }
        }
        
        // =============================================
        // EXPOSE FUNCTIONS TO GLOBAL SCOPE
        // =============================================
        window.printStatement = printStatement;
        window.downloadStatementPDF = downloadStatementPDF;
        
        // Initialize on page load
        (async function() {
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                init();
            }
        })();
    </script>
</body>
</html>
