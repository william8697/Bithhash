<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Transaction Details</title>
    <meta name="description" content="View detailed transaction information with export and print capabilities.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* ============================================= */
        /* CRYPTO.COM COLOR THEME - EXACTLY AS DASHBOARD */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --blue-gradient: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --security-blue: #1A73E8;
            --security-green: #34A853;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--darker);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 100;
            border-left: 4px solid var(--security-green);
            color: var(--dark);
        }
        
        .security-badge i {
            color: var(--security-green);
            font-size: 1rem;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 216, 255, 0.3));
        }
        
        .loading-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--gray);
            font-size: 1rem;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header - EXACT COPY from dashboard */
        header {
            background-color: var(--darker);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            transition: var(--transition-slow);
            border-bottom: none;
            height: 70px;
        }
        
        header.scrolled {
            background-color: rgba(10, 14, 23, 0.98);
            backdrop-filter: blur(5px);
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .logo img {
            height: 32px;
            width: auto;
            transition: var(--transition);
        }
        
        .logo:hover img {
            transform: scale(1.05);
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
            background-clip: text;
            position: relative;
        }
        
        .back-btn {
            background: var(--lighter);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            margin-right: 15px;
        }
        
        .back-btn:hover {
            background: var(--primary);
            color: var(--darker);
        }
        
        .back-btn i {
            font-size: 0.8rem;
        }
        
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            pointer-events: none;
            width: 100%;
            max-width: 350px;
        }
        
        .notification {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: start;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            background-color: rgba(30, 30, 30, 0.95);
            pointer-events: auto;
            position: relative;
        }
        
        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .notification.error {
            background-color: rgba(255, 0, 0, 0.95);
            color: white;
            border-left: 4px solid #cc0000;
        }
        
        .notification.success {
            background-color: rgba(0, 255, 0, 0.95);
            color: var(--darker);
            border-left: 4px solid #00cc00;
        }
        
        .notification.warning {
            background-color: rgba(255, 184, 0, 0.95);
            color: var(--darker);
            border-left: 4px solid #e6a600;
        }
        
        .notification i {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .notification-content {
            flex: 1;
            padding-right: 10px;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        
        .notification-message {
            font-size: 0.75rem;
            line-height: 1.4;
        }
        
        .notification-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.7rem;
        }
        
        .notification-close:hover {
            background-color: rgba(0, 0, 0, 0.2);
            transform: rotate(90deg);
        }
        
        /* Main Content */
        .transaction-page {
            padding: 100px 0 60px;
            flex: 1;
        }
        
        .transaction-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .transaction-card {
            background: var(--darker);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }
        
        .transaction-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            color: white;
        }
        
        .transaction-header h2 {
            font-size: 1.3rem;
            margin: 0;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            word-break: break-word;
        }
        
        .transaction-header h2 i {
            font-size: 1.5rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }
        
        .action-btn:hover {
            background: var(--primary);
            color: var(--darker);
            transform: translateY(-2px);
        }
        
        .transaction-body {
            padding: 25px;
        }
        
        /* EXACT SAME STYLES AS MODAL IN DASHBOARD */
        .asset-logo-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
        }
        
        .transaction-type-badge {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .type-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-transform: capitalize;
        }
        
        .type-badge.deposit, .type-badge.buy, .type-badge.interest, .type-badge.referral {
            background: rgba(0, 255, 0, 0.1);
            color: var(--success);
        }
        
        .type-badge.withdrawal, .type-badge.sell {
            background: rgba(255, 0, 0, 0.1);
            color: var(--error);
        }
        
        .type-badge.pending {
            background: rgba(255, 184, 0, 0.1);
            color: var(--warning);
        }
        
        .amount-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .amount-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        
        .amount-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .amount-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            font-family: 'Manrope', sans-serif;
            line-height: 1.2;
        }
        
        .amount-value.price-positive {
            color: var(--success);
        }
        
        .amount-value.price-negative {
            color: var(--error);
        }
        
        .asset-amount {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .asset-amount img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        
        .details-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .details-section h3 {
            color: var(--dark);
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .details-section h3 i {
            color: var(--primary);
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .detail-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .detail-item.full-width {
            grid-column: span 2;
        }
        
        .detail-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 0.95rem;
            color: var(--dark);
            font-weight: 500;
            word-break: break-word;
        }
        
        .detail-value.price-positive {
            color: var(--success);
        }
        
        .detail-value.price-negative {
            color: var(--error);
        }
        
        .detail-value.network {
            color: var(--primary);
            font-weight: 600;
        }
        
        .profit-loss-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }
        
        .profit-loss-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .transaction-id {
            font-size: 0.8rem;
            color: var(--gray);
            text-align: center;
            margin: 20px 0;
            word-break: break-all;
        }
        
        .back-to-dashboard {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
            box-shadow: 0 4px 15px rgba(0, 216, 255, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.4);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
            transform: translateY(-2px);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-badge.success {
            background-color: rgba(0, 255, 0, 0.1);
            color: var(--success);
        }
        
        .status-badge.pending {
            background-color: rgba(255, 184, 0, 0.1);
            color: var(--warning);
        }
        
        .status-badge.failed {
            background-color: rgba(255, 0, 0, 0.1);
            color: var(--error);
        }
        
        /* PDF specific styles - applied only during PDF generation */
        .pdf-content {
            background: white;
            color: black;
            padding: 30px;
        }
        
        .pdf-content .transaction-header-pdf {
            background: linear-gradient(135deg, #003366 0%, #002244 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .pdf-content .transaction-header-pdf img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        
        .pdf-content .transaction-header-pdf h1 {
            font-size: 1.5rem;
            margin: 0;
        }
        
        .pdf-content .transaction-header-pdf p {
            opacity: 0.9;
            margin: 5px 0 0;
        }
        
        .pdf-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .pdf-footer img {
            width: 40px;
            height: 40px;
        }
        
        .pdf-footer .company-name {
            font-weight: 700;
            color: #00D8FF;
            font-size: 1.1rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .transaction-page {
                padding: 80px 0 40px;
            }
            
            .amount-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .detail-item.full-width {
                grid-column: span 1;
            }
            
            .profit-loss-grid {
                grid-template-columns: 1fr;
            }
            
            .transaction-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .action-buttons {
                align-self: flex-end;
            }
            
            .back-btn span {
                display: none;
            }
            
            .back-btn {
                padding: 8px 12px;
            }
        }
        
        @media (max-width: 480px) {
            .transaction-body {
                padding: 15px;
            }
            
            .amount-value {
                font-size: 1.5rem;
            }
            
            .asset-logo-large {
                width: 60px;
                height: 60px;
            }
        }
        
        /* No borders, no boxes - BINANCE STYLE */
        .transaction-card,
        .amount-card,
        .details-section,
        .profit-loss-section,
        .btn,
        .action-btn,
        .back-btn,
        .status-badge,
        .type-badge {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        /* Keep subtle borders for separation */
        .detail-item {
            border-bottom: 1px solid var(--gray-light);
        }
        
        .transaction-header {
            border-bottom: 1px solid var(--gray-light);
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo" class="loading-logo">    
        <div class="loading-text">Loading Transaction Details</div>
    </div>

    <!-- Security Badge -->
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>256-bit AES & TLS 1.3 Encrypted</span>
    </div>

    <!-- Notification System -->
    <div class="notification-center" id="notification-center"></div>

    <!-- Header - EXACT COPY FROM DASHBOARD -->
    <header id="main-header">
        <div class="container header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                <span class="logo-text">
                     <span>₿</span>itHash
                </span>
            </div>
            
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Dashboard</span>
            </button>
        </div>
    </header>

    <!-- Main Transaction Page -->
    <section class="transaction-page">
        <div class="container transaction-container">
            <div class="transaction-card" id="transaction-card">
                <div class="transaction-header">
                    <h2>
                        <i class="fas fa-receipt"></i>
                        Transaction Details
                    </h2>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="printTransaction()" title="Print">
                            <i class="fas fa-print"></i>
                        </button>
                        <button class="action-btn" onclick="exportToPDF()" title="Export as PDF">
                            <i class="fas fa-file-pdf"></i>
                        </button>
                    </div>
                </div>
                
                <div class="transaction-body" id="transaction-body">
                    <!-- Content will be populated dynamically -->
                    <div style="text-align: center; padding: 50px; color: var(--gray);">
                        <i class="fas fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <p>Loading transaction details...</p>
                    </div>
                </div>
            </div>
            
            <div class="back-to-dashboard">
                <button class="btn btn-outline" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Return to Dashboard
                </button>
            </div>
        </div>
    </section>

    <!-- Hidden PDF Template -->
    <div id="pdf-template" style="display: none;">
        <div class="pdf-content" id="pdf-content">
            <div class="transaction-header-pdf">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                <div>
                    <h1>BitHash Transaction Receipt</h1>
                    <p>Official Transaction Record</p>
                </div>
            </div>
            
            <div id="pdf-body">
                <!-- Will be populated with transaction details -->
            </div>
            
            <div class="pdf-footer">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                <div class="company-name">BitHash</div>
                <p>© <span id="pdf-year"></span> BitHash LLC. All Rights Reserved.</p>
                <p>This is an electronically generated receipt. No signature required.</p>
            </div>
        </div>
    </div>

    <script>
        // Global variables - EXACT COPY FROM DASHBOARD
        let currentPrices = {};
        let currentBTCPrice = 43000;
        let userBalances = { main: 0, active: 0, matured: 0 };
        let userAssetBalances = {};
        
        // Top 30 assets - EXACT COPY FROM DASHBOARD
        const topAssets = [

        // Fetch prices - EXACT COPY FROM DASHBOARD
        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    currentPrices = {};
                    data.forEach(asset => {
                        currentPrices[asset.id] = {
                            usd: asset.current_price || 0,
                            usd_24h_change: asset.price_change_percentage_24h || 0
                        };
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                    return true;
                }
            } catch (error) {
                console.warn('CoinGecko failed:', error);
            }
            return false;

        // Decrypt transaction ID and load transaction
        async function loadTransactionFromEncryptedId(encryptedId) {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }
                
                // Decrypt the ID (same method as dashboard's navigateToTransactionPage)
                const decoded = atob(encryptedId);
                const payload = JSON.parse(decoded);
                
                const transactionId = payload.id;
                const timestamp = payload.t;
                
                // Check if timestamp is within 1 hour (3600000 ms)
                if (Date.now() - timestamp > 3600000) {
                    showNotification('error', 'Link Expired', 'This transaction link has expired');
                    document.getElementById('transaction-body').innerHTML = `
                        <div style="text-align: center; padding: 50px; color: var(--gray);">
                            <i class="fas fa-clock" style="font-size: 3rem; margin-bottom: 20px; color: var(--warning);"></i>
                            <p>This transaction link has expired.</p>
                            <button class="btn btn-primary" onclick="goBack()" style="margin-top: 20px;">
                                <i class="fas fa-arrow-left"></i> Return to Dashboard
                            </button>
                        </div>
                    `;
                    return;
                }
                
                // Load transaction from API
                await loadTransactionById(transactionId);
                
            } catch (error) {
                console.error('Failed to decrypt transaction ID:', error);
                showNotification('error', 'Invalid Link', 'The transaction link is invalid');
                document.getElementById('transaction-body').innerHTML = `
                    <div style="text-align: center; padding: 50px; color: var(--gray);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px; color: var(--error);"></i>

                        </button>
                    </div>
                `;
            }
        }
        
        // Load transaction by ID - EXACT COPY FROM DASHBOARD'S API CALL
        async function loadTransactionById(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) return;
                
                const response = await fetch(`https://bithash-backend.onrender.com/api/transactions/${transactionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentTransaction = data.data || data;
                    renderTransactionDetails(currentTransaction);
                } else if (response.status === 404) {
                    showNotification('error', 'Not Found', 'Transaction not found');
                    document.getElementById('transaction-body').innerHTML = `
                        <div style="text-align: center; padding: 50px; color: var(--gray);">
                            <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 20px; color: var(--warning);"></i>
                            <p>Transaction not found.</p>
                            <button class="btn btn-primary" onclick="goBack()" style="margin-top: 20px;">
                                <i class="fas fa-arrow-left"></i> Return to Dashboard
                            </button>
                        </div>
                    `;
                } else {
                    showNotification('error', 'Error', 'Failed to load transaction');
                }
            } catch (error) {
                console.error('Error loading transaction:', error);
                showNotification('error', 'Error', 'Network error occurred');
            }
        }
        
        // Render transaction details - EXACT COPY FROM DASHBOARD'S openTransactionDetails FUNCTION

            const body = document.getElementById('transaction-body');
            
            // Get asset details
            const assetSymbol = transaction.asset || 
                (transaction.type === 'deposit' ? transaction.method || 'usdt' : 
                 transaction.type === 'withdrawal' ? transaction.method || 'btc' : 
                 transaction.type === 'buy' ? transaction.asset || 'btc' :
                 transaction.type === 'sell' ? transaction.asset || 'btc' : 'btc');
            
            const isBuy = transaction.type === 'buy';
            const isSell = transaction.type === 'sell';
            const isDeposit = transaction.type === 'deposit';
            const isWithdrawal = transaction.type === 'withdrawal';
            const isInterest = transaction.type === 'interest';
            const isReferral = transaction.type === 'referral';
            
            const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            
            const usdAmount = parseFloat(transaction.amount) || 0;
            const assetAmount = parseFloat(transaction.assetAmount) || 0;
            
            const isIncoming = isDeposit || isInterest || isReferral || isBuy;
            const isOutgoing = isWithdrawal || isSell;
            
            const amountClass = isIncoming ? 'price-positive' : (isOutgoing ? 'price-negative' : '');
            const amountPrefix = isIncoming ? '+' : (isOutgoing ? '-' : '');
            
            // Get correct exchange rate
            let exchangeRate = 1.00;
            let assetIdForRate = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
            
            if (assetSymbol.toLowerCase() === 'usdt' || assetSymbol.toLowerCase() === 'usdc') {
                exchangeRate = 1.00;
            } else {
                exchangeRate = currentPrices[assetIdForRate]?.usd || 1;
            }
            
            // Ensure network is never "Unknown"
            let network = transaction.network;
            if (!network || network === 'Unknown' || network === 'unknown') {
                const assetKey = assetSymbol.toLowerCase();
                network = assetNetworks[assetKey] || (assetKey === 'btc' ? 'Bitcoin' : 
                                                      assetKey === 'eth' ? 'Ethereum' : 
                                                      assetKey === 'usdt' ? 'Tron (TRC-20)' : 
                                                      'Bitcoin');
            }
            
            const transactionDate = transaction.date || transaction.createdAt || transaction.timestamp || new Date();
            const formattedDate = new Date(transactionDate).toLocaleString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true
            });
            
            const formattedShortDate = new Date(transactionDate).toLocaleString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            
            // Determine badge class
            let badgeClass = '';
            if (transaction.status === 'completed') badgeClass = 'success';
            else if (transaction.status === 'pending') badgeClass = 'pending';
            else badgeClass = 'failed';
            
            let typeBadgeClass = '';
            if (isIncoming) typeBadgeClass = 'deposit';
            else if (isOutgoing) typeBadgeClass = 'withdrawal';
            
            // Build HTML
            let html = `
                <img src="${primaryAssetLogo}" class="asset-logo-large" alt="${assetSymbol.toUpperCase()}">
                
                <div class="transaction-type-badge">
                    <span class="type-badge ${typeBadgeClass}">
                        <i class="fas ${isBuy ? 'fa-shopping-cart' : isSell ? 'fa-hand-holding-usd' : isDeposit ? 'fa-arrow-down' : isWithdrawal ? 'fa-arrow-up' : isInterest ? 'fa-percent' : isReferral ? 'fa-users' : 'fa-exchange-alt'}"></i>
                        ${transaction.type || 'Transaction'}
                    </span>
                    <span class="status-badge ${badgeClass}" style="margin-left: 10px;">
                        ${(transaction.status || 'pending').toUpperCase()}
                    </span>
                </div>
                
                <div class="amount-grid">
                    <div class="amount-card">
                        <div class="amount-label">Total Amount (USD)</div>
                        <div class="amount-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="asset-amount">
                            <img src="${primaryAssetLogo}" alt="${assetSymbol.toUpperCase()}">
                            <span>${amountPrefix}${formatNumberWithCommas(Math.abs(assetAmount || usdAmount / exchangeRate), 8)} ${assetSymbol.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="amount-card">
                        <div class="amount-label">Exchange Rate</div>
                        <div class="amount-value">${formatUSD(exchangeRate)}</div>
                        <div class="asset-amount">
                            <span>1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // Add profit/loss section for sell transactions
            if (isSell && transaction.sellDetails) {
                const profit = transaction.sellDetails.profit || 0;
                const loss = transaction.sellDetails.loss || 0;
                const profitLossClass = profit > 0 ? 'price-positive' : (loss > 0 ? 'price-negative' : '');
                const profitLossText = profit > 0 ? `+${formatUSD(profit)}` : (loss > 0 ? `-${formatUSD(loss)}` : '$0');
                const profitLossPercent = transaction.sellDetails.profitLossPercentage || 0;
                const percentClass = profitLossPercent >= 0 ? 'price-positive' : 'price-negative';
                const percentSign = profitLossPercent >= 0 ? '+' : '';
                
                html += `
                    <div class="profit-loss-section">
                        <h3><i class="fas fa-chart-line"></i> Profit & Loss</h3>
                        <div class="profit-loss-grid">
                            <div>
                                <div class="detail-label">Buying Price</div>
                                <div class="detail-value">${formatUSD(transaction.sellDetails.avgBuyPrice || 0)}</div>
                            </div>
                            <div>
                                <div class="detail-label">Selling Price</div>
                                <div class="detail-value">${formatUSD(transaction.sellDetails.price || 0)}</div>
                            </div>
                            <div>
                                <div class="detail-label">Profit / Loss</div>
                                <div class="detail-value ${profitLossClass}">${profitLossText}</div>
                            </div>
                            <div>
                                <div class="detail-label">Percentage</div>
                                <div class="detail-value ${percentClass}">${percentSign}${profitLossPercent.toFixed(2)}%</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Add details section
            html += `
                <div class="details-section">
                    <h3><i class="fas fa-info-circle"></i> Transaction Details</h3>
                    <div class="details-grid">
                        <div class="detail-item">

                            <div class="detail-value" style="display: flex; align-items: center; gap: 6px;">

                <div class="transaction-id">
                    <i class="fas fa-hashtag"></i> Reference: ${transaction.reference || transaction.id || transaction._id || 'N/A'}
                </div>
            `;

        // Helper function to generate description - EXACT COPY FROM DASHBOARD
        function getTransactionDescription(transaction, assetSymbol, exchangeRate, network) {
            const formattedAssetSymbol = assetSymbol.toUpperCase();
            
            if (transaction.type === 'deposit') {
                return `Deposit of ${formattedAssetSymbol} at rate $${exchangeRate.toFixed(2)} on ${network}`;
            } else if (transaction.type === 'withdrawal') {
                return `Withdrawal of ${formattedAssetSymbol} on ${network}`;
            } else if (transaction.type === 'buy') {
                return `Bought ${formattedAssetSymbol} at $${(transaction.buyDetails?.price || exchangeRate).toFixed(2)}`;
            } else if (transaction.type === 'sell') {
                const profit = transaction.sellDetails?.profit || 0;
                const loss = transaction.sellDetails?.loss || 0;
                if (profit > 0) {
                    return `Sold ${formattedAssetSymbol} with +$${profit.toFixed(2)} profit (${(transaction.sellDetails?.profitLossPercentage || 0).toFixed(2)}%)`;
                } else if (loss > 0) {
                    return `Sold ${formattedAssetSymbol} with -$${loss.toFixed(2)} loss (${(transaction.sellDetails?.profitLossPercentage || 0).toFixed(2)}%)`;
                } else {
                    return `Sold ${formattedAssetSymbol} at $${(transaction.sellDetails?.price || exchangeRate).toFixed(2)}`;
                }
            } else if (transaction.type === 'interest') {
                return `Interest earned in ${formattedAssetSymbol}`;
            } else if (transaction.type === 'referral') {
                return `Referral bonus in ${formattedAssetSymbol}`;
            }
            return 'Transaction processed';
        }

                    <div id="print-content"></div>
                    
                    <div class="print-footer">
                        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash Logo">
                        <div class="company-name">BitHash</div>
                        <p>© ${new Date().getFullYear()} BitHash LLC. All Rights Reserved.</p>
                        <p>This is an electronically generated receipt. No signature required.</p>
                    </div>
                    
                    <script>
                        document.getElementById('print-content').innerHTML = \`${generatePrintContent()}\`;
                        window.print();
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }
        
        // Generate print content
        function generatePrintContent() {
            if (!currentTransaction) return '';
            
            const transaction = currentTransaction;
            const assetSymbol = transaction.asset || 'btc';
            const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            const usdAmount = parseFloat(transaction.amount) || 0;
            const isIncoming = ['deposit', 'interest', 'referral', 'buy'].includes(transaction.type);
            const amountClass = isIncoming ? 'price-positive' : 'price-negative';
            const amountPrefix = isIncoming ? '+' : '-';
            const formattedDate = new Date(transaction.date || transaction.createdAt || new Date()).toLocaleString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            
            let exchangeRate = 1.00;
            const assetIdForRate = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
            if (assetSymbol.toLowerCase() !== 'usdt' && assetSymbol.toLowerCase() !== 'usdc') {
                exchangeRate = currentPrices[assetIdForRate]?.usd || 1;
            }
            
            let network = transaction.network;
            if (!network || network === 'Unknown' || network === 'unknown') {
                network = assetNetworks[assetSymbol.toLowerCase()] || 'Bitcoin';
            }
            
            let profitHTML = '';
            if (transaction.type === 'sell' && transaction.sellDetails) {
                profitHTML = `
                    <div class="print-section">
                        <h2>Profit & Loss</h2>
                        <div class="print-grid">
                            <div class="print-item">
                                <div class="print-label">Buying Price</div>
                                <div class="print-value">${formatUSD(transaction.sellDetails.avgBuyPrice || 0)}</div>
                            </div>
                            <div class="print-item">
                                <div class="print-label">Selling Price</div>
                                <div class="print-value">${formatUSD(transaction.sellDetails.price || 0)}</div>
                            </div>
                            <div class="print-item">
                                <div class="print-label">Profit / Loss</div>
                                <div class="print-value ${transaction.sellDetails.profit > 0 ? 'price-positive' : 'price-negative'}">
                                    ${transaction.sellDetails.profit > 0 ? '+' : '-'}${formatUSD(transaction.sellDetails.profit || transaction.sellDetails.loss || 0)}
                                </div>
                            </div>
                            <div class="print-item">
                                <div class="print-label">Percentage</div>
                                <div class="print-value ${(transaction.sellDetails.profitLossPercentage || 0) >= 0 ? 'price-positive' : 'price-negative'}">
                                    ${(transaction.sellDetails.profitLossPercentage || 0) >= 0 ? '+' : ''}${(transaction.sellDetails.profitLossPercentage || 0).toFixed(2)}%
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="print-section">
                    <h2>Transaction Overview</h2>
                    <div class="print-grid">
                        <div class="print-item">
                            <div class="print-label">Transaction ID</div>
                            <div class="print-value">${transaction.id || transaction._id || 'N/A'}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Date & Time</div>
                            <div class="print-value">${formattedDate}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Type</div>
                            <div class="print-value" style="text-transform: capitalize;">${transaction.type || 'Transaction'}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Status</div>
                            <div class="print-value" style="text-transform: uppercase;">${transaction.status || 'pending'}</div>
                        </div>
                    </div>
                </div>
                
                <div class="print-section">
                    <h2>Amount Details</h2>
                    <div class="print-grid">
                        <div class="print-item">
                            <div class="print-label">Amount (USD)</div>
                            <div class="print-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Amount (${assetSymbol.toUpperCase()})</div>
                            <div class="print-value">${amountPrefix}${formatNumberWithCommas(Math.abs(usdAmount / exchangeRate), 8)} ${assetSymbol.toUpperCase()}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Exchange Rate</div>
                            <div class="print-value">1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</div>
                        </div>
                        <div class="print-item">
                            <div class="print-label">Network</div>
                            <div class="print-value">${network}</div>
                        </div>
                    </div>
                </div>
                
                ${profitHTML}
                
                <div class="print-section">
                    <h2>Additional Information</h2>
                    <div class="print-item">
                        <div class="print-label">Description</div>
                        <div class="print-value">${transaction.description || transaction.details || getTransactionDescription(transaction, assetSymbol, exchangeRate, network)}</div>
                    </div>
                    ${transaction.fee ? `
                    <div class="print-item">
                        <div class="print-label">Transaction Fee</div>
                        <div class="print-value">${formatUSD(transaction.fee)}</div>
                    </div>
                    ` : ''}
                    <div class="print-item">
                        <div class="print-label">Reference</div>
                        <div class="print-value">${transaction.reference || transaction.id || transaction._id || 'N/A'}</div>
                    </div>
                </div>
            `;
        }
        
        // Export to PDF
        function exportToPDF() {
            if (!currentTransaction) {
                showNotification('error', 'Error', 'No transaction data to export');
                return;
            }
            
            showNotification('info', 'Generating PDF', 'Please wait...');
            
            // Prepare PDF content
            const pdfBody = document.getElementById('pdf-body');
            pdfBody.innerHTML = generatePrintContent();
            
            const element = document.getElementById('pdf-content');
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `BitHash_Transaction_${currentTransaction.id || currentTransaction._id || 'receipt'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                showNotification('success', 'Success', 'PDF downloaded successfully');
            }).catch(error => {
                console.error('PDF error:', error);
                showNotification('error', 'Error', 'Failed to generate PDF');
            });
        }
        
        // Format functions - EXACT COPY FROM DASHBOARD
        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            
            if (numericNum >= 1e12) {
                return '$' + (numericNum / 1e12).toFixed(2) + 'T';
            } else if (numericNum >= 1e9) {
                return '$' + (numericNum / 1e9).toFixed(2) + 'B';
            } else if (numericNum >= 1e6) {
                return '$' + (numericNum / 1e6).toFixed(2) + 'M';
            }
            
            const parts = numericNum.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            return '$' + parts.join('.');
        }
        
        function formatNumberWithCommas(num, decimals = 8) {
            const numericNum = parseFloat(num) || 0;
            
            if (numericNum >= 1e12) {
                return (numericNum / 1e12).toFixed(2) + 'T';
            } else if (numericNum >= 1e9) {
                return (numericNum / 1e9).toFixed(2) + 'B';
            } else if (numericNum >= 1e6) {
                return (numericNum / 1e6).toFixed(2) + 'M';
            }
            
            const parts = numericNum.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            if (parts[1]) {
                parts[1] = parts[1].replace(/0+$/, '');
                if (parts[1].length === 0) {
                    return parts[0];
                }
                return parts[0] + '.' + parts[1];
            }
            
            return parts[0];
        }
        
        // Navigation
        function goBack() {
            window.location.href = 'dashboard.html';
        }
        
        // Notification functions - EXACT COPY FROM DASHBOARD
        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) processNotificationQueue();
        }
        
        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }
            
            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'error' ? 'fa-exclamation-circle' : 
                        type === 'success' ? 'fa-check-circle' : 
                        type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;
            
            document.getElementById('notification-center').appendChild(notification);
            
            void notification.offsetWidth;
            notification.classList.add('show');
            
            notification.querySelector('.notification-close').addEventListener('click', () => {
                closeNotification(notification);
            });
            
            if (duration > 0) {
                setTimeout(() => {
                    if (notification.parentNode) closeNotification(notification);
                    processNotificationQueue();
                }, duration);
            }
        }
        
        function closeNotification(notification) {
            notification.classList.remove('show');
            setTimeout(() => {
                if (notification.parentNode) notification.parentNode.removeChild(notification);
                processNotificationQueue();
            }, 400);
        }
    </script>
