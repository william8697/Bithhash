    <script>

        // =============================================

        // =============================================
        
        // Global state (copied from dashboard)
        let currentPrices = {};
        let currentBTCPrice = 43000;
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },

            { id: 'chainlink', symbol: 'link', name: 'Chainlink', logo: 'https://assets.coingecko.com/coins/images/877/large/chainlink-new-logo.png' },
            { id: 'polygon', symbol: 'matic', name: 'Polygon', logo: 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png' },
            { id: 'wrapped-bitcoin', symbol: 'wbtc', name: 'Wrapped Bitcoin', logo: 'https://assets.coingecko.com/coins/images/7598/large/wrapped_bitcoin_wbtc.png' },
            { id: 'litecoin', symbol: 'ltc', name: 'Litecoin', logo: 'https://assets.coingecko.com/coins/images/2/large/litecoin.png' },
            { id: 'near', symbol: 'near', name: 'NEAR Protocol', logo: 'https://assets.coingecko.com/coins/images/10365/large/near_icon.png' },
            { id: 'uniswap', symbol: 'uni', name: 'Uniswap', logo: 'https://assets.coingecko.com/coins/images/12504/large/uni.jpg' },
            { id: 'bitcoin-cash', symbol: 'bch', name: 'Bitcoin Cash', logo: 'https://assets.coingecko.com/coins/images/780/large/bitcoin-cash-circle.png' }
        ];
        
        const assetLogos = {};
        topAssets.forEach(asset => {
            assetLogos[asset.symbol] = asset.logo;
        });
        
        const assetNetworks = {
            'btc': 'Bitcoin',
            'eth': 'Ethereum',
            'usdt': 'Tron (TRC-20)',
            'bnb': 'BNB Smart Chain (BEP-20)',
            'sol': 'Solana',

            'xrp': 'XRP Ledger',

            'avax': 'Avalanche C-Chain',
            'dot': 'Polkadot',
            'trx': 'TRON',
            'link': 'Ethereum (ERC-20)',
            'matic': 'Polygon',
            'wbtc': 'Ethereum (ERC-20)',
            'ltc': 'Litecoin',
            'near': 'NEAR',
            'uni': 'Ethereum (ERC-20)',
            'bch': 'Bitcoin Cash'
        };

        // Helper functions (copied from dashboard)
        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e12) return '$' + (numericNum / 1e12).toFixed(2) + 'T';
            if (numericNum >= 1e9) return '$' + (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return '$' + (numericNum / 1e6).toFixed(2) + 'M';
            const parts = numericNum.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return '$' + parts.join('.');
        }

        function formatNumberWithCommas(num, decimals = 8) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e12) return (numericNum / 1e12).toFixed(2) + 'T';
            if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            const parts = numericNum.toFixed(decimals).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (parts[1]) {
                parts[1] = parts[1].replace(/0+$/, '');
                if (parts[1].length === 0) return parts[0];
                return parts[0] + '.' + parts[1];
            }
            return parts[0];
        }

        // Fetch prices (copied from dashboard)
        async function fetchCoinGeckoPrices() {
            try {
                const ids = topAssets.map(a => a.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_7d_change=true&include_24hr_vol=true&include_market_cap=true&include_1h_change=true`
                );
                if (response.ok) {
                    const data = await response.json();
                    currentPrices = {};
                    topAssets.forEach(asset => {
                        if (data[asset.id]) {
                            currentPrices[asset.id] = {
                                usd: data[asset.id].usd || 0,
                                usd_24h_change: data[asset.id].usd_24h_change || 0,
                                usd_1h_change: data[asset.id].usd_1h_change || 0,
                                usd_7d_change: data[asset.id].usd_7d_change || 0,
                                usd_24h_vol: data[asset.id].usd_24h_vol || 0,
                                usd_market_cap: data[asset.id].usd_market_cap || 0
                            };
                        } else {
                            currentPrices[asset.id] = { usd: 0, usd_24h_change: 0, usd_1h_change: 0, usd_7d_change: 0, usd_24h_vol: 0, usd_market_cap: 0 };
                        }
                    });
                    currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                }
            } catch (error) {
                console.warn('Price fetch failed, using defaults');
            }
        }

        // Load transaction from URL and display it (copied modal logic)
        async function loadTransactionFromUrl() {
            await fetchCoinGeckoPrices();
            
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedId = urlParams.get('id');
            
            if (!encryptedId) {
                showError('No transaction ID provided');
                return;
            }

            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                    return;
                }

                // Decode the ID (simplified - backend handles actual decryption)
                // In a real scenario, you'd send this encrypted ID to your backend
                const response = await fetch('https://bithash-backend.onrender.com/api/transactions/decode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ encryptedId: encryptedId })
                });

                if (!response.ok) {
                    throw new Error('Failed to decode transaction ID');
                }

                const decodeData = await response.json();
                const transactionId = decodeData.data?.id || decodeData.id;

                // Fetch the actual transaction
                const txResponse = await fetch(`https://bithash-backend.onrender.com/api/transactions/${transactionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!txResponse.ok) {
                    throw new Error('Failed to fetch transaction details');
                }

                const txData = await txResponse.json();
                const transaction = txData.data?.transaction || txData.transaction || txData;

                renderTransactionDetails(transaction);

            } catch (error) {
                console.error('Error loading transaction:', error);
                showError('Could not load transaction details. Please try again.');
            }
        }

        // Render transaction using the exact logic from dashboard modal
        function renderTransactionDetails(transaction) {
            const body = document.getElementById('transaction-details-body');
            
            // Get asset logo
            const assetSymbol = transaction.asset || 
                (transaction.type === 'deposit' ? transaction.method || 'usdt' : 
                 transaction.type === 'withdrawal' ? transaction.method || 'btc' : 
                 transaction.type === 'buy' ? transaction.asset || 'btc' :
                 transaction.type === 'sell' ? transaction.asset || 'btc' : 'btc');
            
            const primaryAssetLogo = assetLogos[assetSymbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            
            const usdAmount = parseFloat(transaction.amount) || 0;
            const assetAmount = parseFloat(transaction.assetAmount) || 0;
            
            const isIncoming = transaction.type === 'deposit' || transaction.type === 'interest' || transaction.type === 'referral' || transaction.type === 'buy';
            const isOutgoing = transaction.type === 'withdrawal' || transaction.type === 'sell';
            
            const amountClass = isIncoming ? 'positive' : (isOutgoing ? 'negative' : '');
            const amountPrefix = isIncoming ? '+' : (isOutgoing ? '-' : '');
            
            // Get exchange rate
            let exchangeRate = 1.00;
            let assetIdForRate = topAssets.find(a => a.symbol === assetSymbol.toLowerCase())?.id || 'bitcoin';
            
            if (assetSymbol.toLowerCase() === 'usdt' || assetSymbol.toLowerCase() === 'usdc') {
                exchangeRate = 1.00;
            } else {
                exchangeRate = currentPrices[assetIdForRate]?.usd || currentBTCPrice;
            }
            
            // Network
            let network = transaction.network;
            if (!network || network === 'Unknown' || network === 'unknown') {
                const assetKey = assetSymbol.toLowerCase();
                network = assetNetworks[assetKey] || (assetKey === 'btc' ? 'Bitcoin' : 
                                                       assetKey === 'eth' ? 'Ethereum' : 
                                                       assetKey === 'usdt' ? 'Tron (TRC-20)' : 
                                                       'Bitcoin');
            }
            
            const transactionDate = transaction.date || transaction.createdAt || transaction.timestamp || new Date();
            const formattedDate = new Date(transactionDate).toLocaleString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true
            });
            
            const transactionId = transaction.id || transaction._id || 'N/A';
            const shortId = transactionId.substring(0, 16) + '...';
            
            // Status badge
            const statusClass = transaction.status === 'completed' ? 'success' : 
                                transaction.status === 'pending' ? 'pending' : 'failed';
            const statusText = transaction.status === 'completed' ? 'Completed' : 
                               transaction.status === 'pending' ? 'Processing' : 'Failed';
            
            // Build HTML exactly as in the modal but adapted for page layout
            let detailsHTML = `
                <div class="detail-header">
                    <div class="detail-header-icon">
                        <i class="fas ${transaction.type === 'deposit' ? 'fa-arrow-down' : 
                                       transaction.type === 'withdrawal' ? 'fa-arrow-up' : 
                                       transaction.type === 'buy' ? 'fa-cart-plus' : 
                                       transaction.type === 'sell' ? 'fa-tag' : 'fa-exchange-alt'}"></i>
                    </div>
                    <div class="detail-header-title">
                        <h1>${(transaction.type || 'Transaction').charAt(0).toUpperCase() + (transaction.type || 'Transaction').slice(1)}</h1>
                        <p>
                            <i class="fas fa-fingerprint"></i> ID: <span>${shortId}</span>
                            <i class="fas fa-calendar-alt" style="margin-left: 15px;"></i> ${formattedDate}
                        </p>
                    </div>
                </div>
                
                <div class="amount-overview">
                    <div class="amount-box">
                        <div class="amount-label">Total Amount (USD)</div>
                        <div class="amount-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="amount-secondary">
                            <img src="${primaryAssetLogo}" alt="${assetSymbol}">
                            <span>${amountPrefix}${formatNumberWithCommas(Math.abs(assetAmount || usdAmount / exchangeRate), 8)} ${assetSymbol.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="amount-box">
                        <div class="amount-label">Status</div>
                        <div style="margin-bottom: 15px;">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="amount-secondary">
                            <i class="fas fa-clock" style="color: var(--gray);"></i>
                            <span>Exchange Rate: $${exchangeRate.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-tag"></i> Transaction Type</div>
                        <div class="info-value" style="text-transform: capitalize;">${transaction.type || 'Transfer'}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-coins"></i> Asset</div>
                        <div class="info-value" style="display: flex; align-items: center; gap: 8px;">
                            <img src="${primaryAssetLogo}" style="width: 24px; height: 24px; border-radius: 50%;" alt="${assetSymbol}">
                            <span>${assetSymbol.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-chart-line"></i> Exchange Rate</div>
                        <div class="info-value">1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-network-wired"></i> Network</div>
                        <div class="info-value"><span class="network-badge">${network}</span></div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-receipt"></i> Transaction Fee</div>
                        <div class="info-value">${transaction.fee ? formatUSD(transaction.fee) : 'None'}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label"><i class="fas fa-wallet"></i> Net Amount</div>
                        <div class="info-value ${amountClass}">${amountPrefix}${formatUSD(Math.abs(usdAmount - (transaction.fee || 0)))}</div>
                    </div>
                </div>
            `;
            
            // Add profit/loss section for sell transactions
            if (transaction.type === 'sell' && transaction.sellDetails) {
                detailsHTML += `
                    <div class="profit-loss-section">
                        <div class="profit-loss-title">
                            <i class="fas fa-chart-pie"></i> Profit & Loss Analysis
                        </div>
                        <div class="profit-loss-grid">
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Buying Price</div>
                                <div class="profit-loss-value">${formatUSD(transaction.sellDetails.avgBuyPrice || 0)}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Selling Price</div>
                                <div class="profit-loss-value">${formatUSD(transaction.sellDetails.price || 0)}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Profit</div>
                                <div class="profit-loss-value positive">+${formatUSD(transaction.sellDetails.profit || 0)}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Loss</div>
                                <div class="profit-loss-value negative">-${formatUSD(transaction.sellDetails.loss || 0)}</div>
                            </div>
                            ${transaction.sellDetails.profitLossPercentage ? `
                            <div class="profit-loss-item" style="grid-column: span 2;">
                                <div class="profit-loss-label">Return Percentage</div>
                                <div class="profit-loss-value ${transaction.sellDetails.profitLossPercentage >= 0 ? 'positive' : 'negative'}">
                                    ${transaction.sellDetails.profitLossPercentage >= 0 ? '+' : ''}${transaction.sellDetails.profitLossPercentage.toFixed(2)}%
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            
            // Add buy details for buy transactions
            if (transaction.type === 'buy' && transaction.buyDetails) {
                detailsHTML += `
                    <div class="profit-loss-section">
                        <div class="profit-loss-title">
                            <i class="fas fa-info-circle"></i> Purchase Details
                        </div>
                        <div class="profit-loss-grid">
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">From Wallet</div>
                                <div class="profit-loss-value" style="text-transform: capitalize;">${transaction.buyDetails.fromWallet || 'both'}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Main Used</div>
                                <div class="profit-loss-value">${formatUSD(transaction.buyDetails.mainAmountUsed || 0)}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Matured Used</div>
                                <div class="profit-loss-value">${formatUSD(transaction.buyDetails.maturedAmountUsed || 0)}</div>
                            </div>
                            <div class="profit-loss-item">
                                <div class="profit-loss-label">Purchase Price</div>
                                <div class="profit-loss-value">${formatUSD(transaction.buyDetails.price || 0)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Add reference if exists
            if (transaction.reference) {
                detailsHTML += `
                    <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px;">
                        <div class="info-label"><i class="fas fa-hashtag"></i> Reference</div>
                        <div class="info-value" style="font-family: monospace;">${transaction.reference}</div>
                    </div>
                `;
            }
            
            // Action buttons
            detailsHTML += `
                <div class="action-buttons">
                    <a href="dashboard.html" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <button class="btn btn-primary" onclick="window.print()">
                        <i class="fas fa-print"></i> Print Receipt
                    </button>
                </div>
            `;
            
            body.innerHTML = detailsHTML;
        }

        function showError(message) {
            document.getElementById('transaction-details-body').innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--error); margin-bottom: 20px;"></i>
                    <h2 style="margin-bottom: 15px;">Unable to Load Transaction</h2>
                    <p style="color: var(--gray); margin-bottom: 30px;">${message}</p>
                    <a href="dashboard.html" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> Return to Dashboard
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
