    <style>
        /* ============================================= */
        /* ENTERPRISE DESIGN SYSTEM - SOPHISTICATED */
        /* ============================================= */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Primary Brand Colors */
            --primary-50: #e6f9ff;
            --primary-100: #b3ecff;
            --primary-200: #80dfff;
            --primary-300: #4dd2ff;
            --primary-400: #1ac5ff;
            --primary-500: #00b8ff;
            --primary-600: #0099cc;
            --primary-700: #007399;
            --primary-800: #004d66;
            --primary-900: #002633;
            
            /* Core Palette */
            --bg-primary: #0B0F17;
            --bg-secondary: #131A24;
            --bg-tertiary: #1C2632;
            --bg-elevated: #253241;
            --bg-card: #0F151F;
            
            /* Surface Colors */
            --surface-1: #141E2A;
            --surface-2: #1E2A37;
            --surface-3: #2A3645;
            
            /* Text Colors */
            --text-primary: #FFFFFF;
            --text-secondary: #B0C4DE;
            --text-tertiary: #8899B0;
            --text-disabled: #5A6F88;
            
            /* Accent Colors */
            --accent-success: #10B981;
            --accent-success-dark: #059669;
            --accent-success-light: #34D399;
            --accent-warning: #F59E0B;
            --accent-warning-dark: #D97706;
            --accent-error: #EF4444;
            --accent-error-dark: #DC2626;
            --accent-info: #3B82F6;
            --accent-purple: #8B5CF6;
            --accent-pink: #EC4899;
            
            /* Chart Colors */
            --chart-1: #00D8FF;
            --chart-2: #A855F7;
            --chart-3: #10B981;
            --chart-4: #F59E0B;
            --chart-5: #EF4444;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #00D8FF 0%, #3B82F6 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #34D399 100%);
            --gradient-warning: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%);
            --gradient-card: linear-gradient(145deg, rgba(20,30,42,0.9) 0%, rgba(28,38,50,0.95) 100%);
            
            /* Typography */
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-space: 'Space Grotesk', sans-serif;
            
            /* Shadows */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.5), 0 2px 4px -1px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.7), 0 4px 6px -2px rgba(0,0,0,0.5);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.8), 0 10px 10px -5px rgba(0,0,0,0.6);
            --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.9);
            
            /* Borders */
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --border-radius-2xl: 32px;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================= */
        /* GLOBAL STYLES - ENTERPRISE GRADE */
        /* ============================================= */
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 184, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================= */
        /* TYPOGRAPHY SCALE - DETAILED */
        /* ============================================= */
        
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .display-1 {
            font-size: 4rem;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        
        .display-2 {
            font-size: 3.5rem;
            line-height: 1.2;
            font-weight: 700;
        }
        
        .heading-1 {
            font-size: 2.5rem;
            line-height: 1.3;
            font-weight: 700;
        }
        
        .heading-2 {
            font-size: 2rem;
            line-height: 1.4;
            font-weight: 600;
        }
        
        .heading-3 {
            font-size: 1.5rem;
            line-height: 1.5;
            font-weight: 600;
        }
        
        .heading-4 {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 600;
        }
        
        .body-large {
            font-size: 1.125rem;
            line-height: 1.7;
        }
        
        .body-regular {
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .body-small {
            font-size: 0.875rem;
            line-height: 1.5;
        }
        
        .caption {
            font-size: 0.75rem;
            line-height: 1.4;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .mono-text {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            letter-spacing: -0.01em;
        }

        /* ============================================= */
        /* ENTERPRISE COMPONENTS */
        /* ============================================= */
        
        /* Loading Overlay - Premium */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 100px;
            height: 100px;
            animation: logoPulse 2s infinite;
            filter: drop-shadow(0 0 20px rgba(0, 184, 255, 0.5));
        }
        
        .loading-progress {
            width: 200px;
            height: 2px;
            background: var(--surface-2);
            margin-top: 32px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        
        .loading-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 40%;
            background: var(--gradient-primary);
            animation: loadingProgress 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        
        @keyframes loadingProgress {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        /* Security Badge - Enterprise */
        .security-badge {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface-1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 100px;
            border: 1px solid rgba(0, 184, 255, 0.2);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .security-badge i {
            color: var(--accent-success);
            font-size: 1.25rem;
        }
        
        .security-badge .badge-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Header - Minimal (logo + title only) */
        header {
            background: var(--surface-1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
        }
        
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .logo img {
            height: 40px;
            width: auto;
            transition: transform var(--transition-base);
        }
        
        .logo:hover img {
            transform: scale(1.05);
        }
        
        .logo-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        /* Main Content */
        .transaction-page {
            padding: 40px 0 60px;
            position: relative;
            z-index: 1;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .page-title-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0C4DE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .page-title-section p {
            color: var(--text-tertiary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .live-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .action-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            transition: all var(--transition-base);
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-display);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        
        .btn-outline:hover {
            border-color: var(--primary-500);
            background: rgba(0, 184, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 184, 255, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 255, 0.4);
        }

        /* Enterprise Transaction Card */
        .transaction-card {
            background: var(--surface-1);
            border-radius: var(--border-radius-2xl);
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: var(--shadow-2xl);
        }

        /* Card Header */
        .card-header {
            padding: 32px 32px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .transaction-type-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: rgba(0, 184, 255, 0.1);
            color: var(--primary-500);
            border: 2px solid rgba(0, 184, 255, 0.2);
        }
        
        .transaction-type-icon.deposit {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            border-color: rgba(16, 185, 129, 0.2);
        }
        
        .transaction-type-icon.withdrawal {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-error);
            border-color: rgba(239, 68, 68, 0.2);
        }
        
        .transaction-type-icon.buy {
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent-purple);
            border-color: rgba(139, 92, 246, 0.2);
        }
        
        .transaction-type-icon.sell {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-warning);
            border-color: rgba(245, 158, 11, 0.2);
        }
        
        .transaction-meta {
            flex: 1;
        }
        
        .transaction-meta h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: capitalize;
        }
        
        .transaction-id {
            font-family: var(--font-mono);
            color: var(--text-tertiary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .copy-button {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: color var(--transition-fast);
            padding: 4px;
        }
        
        .copy-button:hover {
            color: var(--primary-500);
        }
        
        .status-badge {
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
        }
        
        .status-badge.completed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .status-badge.failed {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Amount Cards - Detailed */
        .amount-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .amount-card {
            background: var(--surface-2);
            border-radius: var(--border-radius-xl);
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform var(--transition-base), border-color var(--transition-base);
        }
        
        .amount-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-500);
        }
        
        .amount-label {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .amount-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: var(--font-space);
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .amount-secondary {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 1rem;
            padding-top: 8px;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }
        
        .asset-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Profit & Loss Section - Detailed */
        .pnl-section {
            padding: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .section-title i {
            font-size: 1.5rem;
            color: var(--primary-500);
            background: rgba(0, 184, 255, 0.1);
            padding: 8px;
            border-radius: var(--border-radius-md);
        }
        
        .section-title h3 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .pnl-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .pnl-item {
            background: var(--surface-2);
            padding: 24px;
            border-radius: var(--border-radius-lg);
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        .pnl-label {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }
        
        .pnl-value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: var(--font-space);
            line-height: 1.2;
        }
        
        .pnl-percentage {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: var(--border-radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            margin-left: 12px;
        }
        
        .pnl-percentage.positive {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
        }
        
        .pnl-percentage.negative {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-error);
        }

        /* Wallet Breakdown - Detailed */
        .wallet-breakdown {
            padding: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .wallet-table {
            margin-top: 20px;
        }
        
        .wallet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .wallet-row:last-child {
            border-bottom: none;
        }
        
        .wallet-row .label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
        }
        
        .wallet-row .label i {
            width: 20px;
            color: var(--primary-500);
        }
        
        .wallet-row .amount {
            font-weight: 600;
            font-size: 1.125rem;
        }
        
        .wallet-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-500);
        }

        /* Details Grid - Comprehensive */
        .details-grid-section {
            padding: 32px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .detail-block {
            background: var(--surface-2);
            padding: 20px;
            border-radius: var(--border-radius-lg);
        }
        
        .detail-block .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }
        
        .detail-block .value {
            font-size: 1rem;
            font-weight: 500;
            word-break: break-word;
        }
        
        .network-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 184, 255, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
            color: var(--primary-500);
            font-size: 0.875rem;
        }

        /* Reference Section */
        .reference-section {
            padding: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .reference-content {
            background: var(--surface-2);
            padding: 24px;
            border-radius: var(--border-radius-lg);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.7;
            color: var(--text-secondary);
            border-left: 4px solid var(--primary-500);
        }

        /* Footer Actions */
        .card-footer {
            padding: 32px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            background: var(--surface-1);
        }

        /* Real-time Update Banner */
        .realtime-banner {
            background: rgba(0, 184, 255, 0.05);
            border: 1px solid rgba(0, 184, 255, 0.1);
            border-radius: var(--border-radius-lg);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .realtime-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .realtime-info .update-time {
            font-family: var(--font-mono);
            color: var(--text-tertiary);
        }
        
        .refresh-button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: var(--border-radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .refresh-button:hover {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }

        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 100px;
            right: 24px;
            z-index: 9999;
            width: 360px;
        }
        
        .notification {
            background: var(--surface-2);
            border-left: 4px solid;
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            display: flex;
            gap: 12px;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success { border-left-color: var(--accent-success); }
        .notification.error { border-left-color: var(--accent-error); }
        .notification.warning { border-left-color: var(--accent-warning); }
        .notification.info { border-left-color: var(--accent-info); }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .amount-cards-grid { grid-template-columns: repeat(2, 1fr); }
            .pnl-grid { grid-template-columns: repeat(2, 1fr); }
            .details-grid-section { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .amount-cards-grid { grid-template-columns: 1fr; }
            .pnl-grid { grid-template-columns: 1fr; }
            .details-grid-section { grid-template-columns: 1fr; }
            .card-header { flex-direction: column; align-items: flex-start; }
            .transaction-type-icon { width: 60px; height: 60px; font-size: 1.5rem; }
            .transaction-meta h2 { font-size: 1.5rem; }
        }
        
        @media (max-width: 480px) {
            .container { padding: 0 16px; }
            .amount-value { font-size: 2rem; }
            .pnl-value { font-size: 1.25rem; }
        }

        /* Print Styles */
        @media print {
            header, .security-badge, .action-bar, .card-footer, .realtime-banner, .notification-center {
                display: none !important;
            }
            
            body { background: white; }
            .transaction-card { 
                border: 1px solid #ddd; 
                box-shadow: none; 
                background: white;
                color: black;
            }
            .amount-value, .pnl-value, .detail-block .value { color: black !important; }
        }
    </style>
</head>
<body>
    <!-- Premium Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-progress"></div>
        <div style="margin-top: 24px; font-size: 1rem; color: var(--text-secondary);">loading transaction intelligence</div>
    </div>

    <!-- Enterprise Security Badge -->
    <div class="security-badge">
        <span class="badge-dot"></span>
        <i class="fas fa-shield-halved"></i>
        <span>256-bit AES | TLS 1.3 | HSM</span>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notification-center"></div>

    <!-- Header (Logo + Title Only) -->
    <header>
        <div class="container header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">BitHash</span>
            </div>
        </div>
    </header>

    <!-- Main Transaction Page -->
    <section class="transaction-page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <div class="page-title-section">
                    <h1>Transaction Intelligence</h1>
                    <p>
                        <span class="live-indicator">
                            <span class="dot"></span>
                            <span>real-time data</span>
                        </span>
                        <span class="update-time" id="last-update-time">updating now</span>
                    </p>
                </div>
                <div class="action-bar">
                    <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                        <i class="fas fa-arrow-left"></i> Dashboard
                    </button>
                    <button class="btn btn-outline" onclick="printTransaction()">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button class="btn btn-primary" onclick="downloadPDF()">
                        <i class="fas fa-file-pdf"></i> Export PDF
                    </button>
                </div>
            </div>

            <!-- Real-time Update Banner -->
            <div class="realtime-banner" id="realtime-banner">
                <div class="realtime-info">
                    <i class="fas fa-sync-alt" style="color: var(--primary-500);"></i>
                    <span>Live market data</span>
                    <span class="update-time" id="market-update-time">—</span>
                </div>
                <button class="refresh-button" onclick="manualRefresh()">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>

            <!-- Transaction Details Container -->
            <div id="transaction-details-container">
                <!-- Content will be dynamically rendered here -->
                <div style="text-align: center; padding: 100px; background: var(--surface-1); border-radius: var(--border-radius-2xl);">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-500);"></i>
                    <p style="margin-top: 24px; color: var(--text-secondary);">fetching transaction data...</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // =============================================
        // ENTERPRISE STATE MANAGEMENT
        // =============================================
        
        const state = {
            currentTransaction: null,
            currentPrices: {},
            allTransactions: [],
            refreshInterval: null,
            lastUpdate: null,
            assetDatabase: {}
        };

        // =============================================
        // COMPREHENSIVE ASSET DATABASE
        // =============================================
        
        const ASSET_DATABASE = {
            btc: { id: 'bitcoin', name: 'Bitcoin', symbol: 'btc', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png', network: 'Bitcoin', decimals: 8 },
            eth: { id: 'ethereum', name: 'Ethereum', symbol: 'eth', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png', network: 'Ethereum (ERC-20)', decimals: 18 },
            usdt: { id: 'tether', name: 'Tether', symbol: 'usdt', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png', network: 'Tron (TRC-20)', decimals: 6 },
            bnb: { id: 'binancecoin', name: 'BNB', symbol: 'bnb', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png', network: 'BSC (BEP-20)', decimals: 18 },
            sol: { id: 'solana', name: 'Solana', symbol: 'sol', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png', network: 'Solana', decimals: 9 },
            usdc: { id: 'usd-coin', name: 'USDC', symbol: 'usdc', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png', network: 'Ethereum (ERC-20)', decimals: 6 },
            xrp: { id: 'xrp', name: 'XRP', symbol: 'xrp', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png', network: 'XRP Ledger', decimals: 6 },
            doge: { id: 'dogecoin', name: 'Dogecoin', symbol: 'doge', logo: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png', network: 'Dogecoin', decimals: 8 },
            ada: { id: 'cardano', name: 'Cardano', symbol: 'ada', logo: 'https://assets.coingecko.com/coins/images/975/large/cardano.png', network: 'Cardano', decimals: 6 },
            shib: { id: 'shiba-inu', name: 'Shiba Inu', symbol: 'shib', logo: 'https://assets.coingecko.com/coins/images/11939/large/shiba.png', network: 'Ethereum (ERC-20)', decimals: 18 },
            avax: { id: 'avalanche-2', name: 'Avalanche', symbol: 'avax', logo: 'https://assets.coingecko.com/coins/images/12559/large/Avalanche_Circle_RedWhite.png', network: 'Avalanche C-Chain', decimals: 18 },
            dot: { id: 'polkadot', name: 'Polkadot', symbol: 'dot', logo: 'https://assets.coingecko.com/coins/images/12171/large/polkadot.png', network: 'Polkadot', decimals: 10 },
            trx: { id: 'tron', name: 'TRON', symbol: 'trx', logo: 'https://assets.coingecko.com/coins/images/1094/large/tron-logo.png', network: 'TRON', decimals: 6 },
            link: { id: 'chainlink', name: 'Chainlink', symbol: 'link', logo: 'https://assets.coingecko.com/coins/images/877/large/chainlink-new-logo.png', network: 'Ethereum (ERC-20)', decimals: 18 },
            matic: { id: 'polygon', name: 'Polygon', symbol: 'matic', logo: 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png', network: 'Polygon', decimals: 18 },
            wbtc: { id: 'wrapped-bitcoin', name: 'Wrapped Bitcoin', symbol: 'wbtc', logo: 'https://assets.coingecko.com/coins/images/7598/large/wrapped_bitcoin_wbtc.png', network: 'Ethereum (ERC-20)', decimals: 8 },
            ltc: { id: 'litecoin', name: 'Litecoin', symbol: 'ltc', logo: 'https://assets.coingecko.com/coins/images/2/large/litecoin.png', network: 'Litecoin', decimals: 8 },
            near: { id: 'near', name: 'NEAR Protocol', symbol: 'near', logo: 'https://assets.coingecko.com/coins/images/10365/large/near_icon.png', network: 'NEAR', decimals: 24 },
            uni: { id: 'uniswap', name: 'Uniswap', symbol: 'uni', logo: 'https://assets.coingecko.com/coins/images/12504/large/uni.jpg', network: 'Ethereum (ERC-20)', decimals: 18 },
            bch: { id: 'bitcoin-cash', name: 'Bitcoin Cash', symbol: 'bch', logo: 'https://assets.coingecko.com/coins/images/780/large/bitcoin-cash-circle.png', network: 'Bitcoin Cash', decimals: 8 },
            xlm: { id: 'stellar', name: 'Stellar', symbol: 'xlm', logo: 'https://assets.coingecko.com/coins/images/100/large/Stellar_symbol_black_RGB.png', network: 'Stellar', decimals: 7 },
            atom: { id: 'cosmos', name: 'Cosmos', symbol: 'atom', logo: 'https://assets.coingecko.com/coins/images/1481/large/cosmos_hub.png', network: 'Cosmos', decimals: 6 },
            xmr: { id: 'monero', name: 'Monero', symbol: 'xmr', logo: 'https://assets.coingecko.com/coins/images/69/large/monero_logo.png', network: 'Monero', decimals: 12 },
            flow: { id: 'flow', name: 'Flow', symbol: 'flow', logo: 'https://assets.coingecko.com/coins/images/13446/large/5f6294c0c7a8cda55cb1.png', network: 'Flow', decimals: 8 },
            vet: { id: 'vechain', name: 'VeChain', symbol: 'vet', logo: 'https://assets.coingecko.com/coins/images/1167/large/VET_Token_Icon.png', network: 'VeChain', decimals: 18 },
            fil: { id: 'filecoin', name: 'Filecoin', symbol: 'fil', logo: 'https://assets.coingecko.com/coins/images/12817/large/filecoin.png', network: 'Filecoin', decimals: 18 },
            theta: { id: 'theta-token', name: 'Theta', symbol: 'theta', logo: 'https://assets.coingecko.com/coins/images/2538/large/theta-token-logo.png', network: 'Theta', decimals: 18 },
            hbar: { id: 'hedera-hashgraph', name: 'Hedera', symbol: 'hbar', logo: 'https://assets.coingecko.com/coins/images/3688/large/hbar.png', network: 'Hedera', decimals: 8 },
            ftm: { id: 'fantom', name: 'Fantom', symbol: 'ftm', logo: 'https://assets.coingecko.com/coins/images/4001/large/Fantom_round.png', network: 'Fantom', decimals: 18 },
            xtz: { id: 'tezos', name: 'Tezos', symbol: 'xtz', logo: 'https://assets.coingecko.com/coins/images/976/large/Tezos-logo.png', network: 'Tezos', decimals: 6 }
        };

        // =============================================
        // INITIALIZATION
        // =============================================
        
        window.addEventListener('load', async function() {
            await initializeApp();
        });

        async function initializeApp() {
            try {
                // Hide loading overlay after minimum display
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                }, 800);

                // Initialize price feed
                await fetchLivePrices();
                
                // Start real-time updates
                startRealTimeUpdates();
                
                // Load transaction from URL
                await loadTransactionFromURL();
                
                // Update timestamp
                updateTimestamp();
            } catch (error) {
                console.error('Initialization error:', error);
                showNotification('error', 'System Error', 'Failed to initialize transaction view');
            }
        }

        // =============================================
        // REAL-TIME PRICE FEED
        // =============================================
        
        async function fetchLivePrices() {
            try {
                const assetIds = Object.values(ASSET_DATABASE).map(a => a.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${assetIds}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=1h%2C24h%2C7d`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    state.currentPrices = {};
                    data.forEach(asset => {
                        state.currentPrices[asset.id] = {
                            usd: asset.current_price || 0,
                            usd_24h_change: asset.price_change_percentage_24h || 0,
                            usd_1h_change: asset.price_change_percentage_1h_in_currency || 0,
                            usd_7d_change: asset.price_change_percentage_7d_in_currency || 0,
                            market_cap: asset.market_cap || 0,
                            volume: asset.total_volume || 0
                        };
                    });
                    
                    state.lastUpdate = new Date();
                    updateMarketTime();
                    
                    // Re-render if transaction exists
                    if (state.currentTransaction) {
                        renderTransactionDetails();
                    }
                    
                    return true;
                }
            } catch (error) {
                console.warn('Price fetch failed:', error);
            }
            return false;
        }

        function startRealTimeUpdates() {
            // Update every 30 seconds
            state.refreshInterval = setInterval(async () => {
                await fetchLivePrices();
            }, 30000);
        }

        function updateMarketTime() {
            const now = new Date();
            document.getElementById('market-update-time').textContent = 
                now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update-time').textContent = 
                `updated ${now.toLocaleTimeString()}`;
        }

        // =============================================
        // TRANSACTION LOADING (from backend)
        // =============================================
        
        async function loadTransactionFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedId = urlParams.get('id');
            
            if (!encryptedId) {
                showError('No transaction identifier provided');
                return;
            }
            
            try {
                // Decode and validate
                const decoded = atob(encryptedId);
                const payload = JSON.parse(decoded);
                
                // Check expiry (24 hours)
                const timestamp = payload.t || 0;
                if (Date.now() - timestamp > 24 * 60 * 60 * 1000) {
                    showError('Transaction link has expired (max 24 hours)');
                    return;
                }
                
                // Load from API
                await fetchTransactionFromAPI(payload.id);
                
            } catch (error) {
                console.error('Decode error:', error);
                showError('Invalid transaction reference');
            }
        }

        async function fetchTransactionFromAPI(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    // Redirect to login with return URL
                    window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
                    return;
                }
                
                showNotification('info', 'Fetching Data', 'Loading transaction details...');
                
                const response = await fetch(`https://bithash-backend.onrender.com/api/transactions/${transactionId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    state.currentTransaction = data.data || data;
                    renderTransactionDetails();
                    showNotification('success', 'Loaded', 'Transaction data loaded successfully');
                } else if (response.status === 404) {
                    // Try from all transactions
                    await fetchAllTransactionsAndFind(transactionId);
                } else {
                    showError('Failed to load transaction from server');
                }
            } catch (error) {
                console.error('API error:', error);
                showError('Network error connecting to server');
            }
        }

        async function fetchAllTransactionsAndFind(transactionId) {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/transactions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const transactions = data.data?.transactions || data.transactions || [];
                    state.currentTransaction = transactions.find(t => 
                        t.id === transactionId || t._id === transactionId || t.txId === transactionId
                    );
                    
                    if (state.currentTransaction) {
                        renderTransactionDetails();
                        showNotification('success', 'Found', 'Transaction located in history');
                    } else {
                        showError('Transaction not found in your account');
                    }
                } else {
                    showError('Unable to fetch transaction history');
                }
            } catch (error) {
                showError('Network error during lookup');
            }
        }

        // =============================================
        // RENDER ENTERPRISE TRANSACTION VIEW
        // =============================================
        
        function renderTransactionDetails() {
            const tx = state.currentTransaction;
            if (!tx) return;
            
            const container = document.getElementById('transaction-details-container');
            
            // Determine asset and type
            const assetSymbol = (tx.asset || tx.method || 'btc').toLowerCase();
            const assetInfo = ASSET_DATABASE[assetSymbol] || ASSET_DATABASE.btc;
            
            const isBuy = tx.type === 'buy';
            const isSell = tx.type === 'sell';
            const isDeposit = tx.type === 'deposit';
            const isWithdrawal = tx.type === 'withdrawal';
            const isInterest = tx.type === 'interest';
            const isReferral = tx.type === 'referral';
            
            // Get icon class
            let iconClass = '';
            if (isDeposit || isInterest || isReferral) iconClass = 'deposit';
            else if (isWithdrawal) iconClass = 'withdrawal';
            else if (isBuy) iconClass = 'buy';
            else if (isSell) iconClass = 'sell';
            
            let icon = 'fa-exchange-alt';
            if (isDeposit) icon = 'fa-arrow-down';
            else if (isWithdrawal) icon = 'fa-arrow-up';
            else if (isBuy) icon = 'fa-cart-shopping';
            else if (isSell) icon = 'fa-tag';
            else if (isInterest) icon = 'fa-percent';
            else if (isReferral) icon = 'fa-users';
            
            // Status
            let statusClass = 'pending';
            let statusText = 'Pending';
            if (tx.status === 'completed' || tx.status === 'success') {
                statusClass = 'completed';
                statusText = 'Completed';
            } else if (tx.status === 'failed') {
                statusClass = 'failed';
                statusText = 'Failed';
            }
            
            // Calculate amounts
            const usdAmount = parseFloat(tx.amount) || 0;
            const assetAmount = parseFloat(tx.assetAmount) || 0;
            const fee = parseFloat(tx.fee) || 0;
            
            // Get exchange rate
            let exchangeRate = 1;
            if (assetInfo.id && state.currentPrices[assetInfo.id]) {
                exchangeRate = state.currentPrices[assetInfo.id].usd || 1;
            }
            
            // Format date
            const txDate = tx.date || tx.createdAt || tx.timestamp || new Date();
            const formattedDate = new Date(txDate).toLocaleString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                timeZoneName: 'short'
            });
            
            // Build HTML
            let html = `
                <div class="transaction-card">
                    <!-- Card Header -->
                    <div class="card-header">
                        <div class="transaction-type-icon ${iconClass}">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="transaction-meta">
                            <h2>${tx.type || 'Transaction'}</h2>
                            <div class="transaction-id">
                                <span>${tx.id || tx._id || 'N/A'}</span>
                                <button class="copy-button" onclick="copyToClipboard('${tx.id || tx._id}')">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">
                            <i class="fas ${statusClass === 'completed' ? 'fa-check-circle' : statusClass === 'pending' ? 'fa-clock' : 'fa-exclamation-circle'}"></i>
                            <span>${statusText}</span>
                        </div>
                    </div>

                    <!-- Amount Cards -->
                    <div class="amount-cards-grid">
                        <div class="amount-card">
                            <div class="amount-label">
                                <i class="fas fa-dollar-sign"></i>
                                <span>USD Value</span>
                            </div>
                            <div class="amount-value ${isDeposit || isBuy || isInterest ? 'positive' : 'negative'}">${formatUSD(usdAmount)}</div>
                            <div class="amount-secondary">
                                <img src="${assetInfo.logo}" class="asset-icon" alt="${assetSymbol}">
                                <span>${assetAmount.toFixed(assetInfo.decimals || 6)} ${assetSymbol.toUpperCase()}</span>
                            </div>
                        </div>
                        
                        <div class="amount-card">
                            <div class="amount-label">
                                <i class="fas fa-chart-line"></i>
                                <span>Exchange Rate</span>
                            </div>
                            <div class="amount-value">${formatUSD(exchangeRate)}</div>
                            <div class="amount-secondary">
                                <span>1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</span>
                            </div>
                        </div>
                        
                        <div class="amount-card">
                            <div class="amount-label">
                                <i class="fas fa-receipt"></i>
                                <span>Transaction Fee</span>
                            </div>
                            <div class="amount-value">${formatUSD(fee)}</div>
                            <div class="amount-secondary">
                                <span>${fee > 0 ? (fee/usdAmount*100).toFixed(2) : '0'}% of total</span>
                            </div>
                        </div>
                    </div>
            `;
            
            // Profit & Loss Section (for sell transactions)
            if (isSell && tx.sellDetails) {
                const sd = tx.sellDetails;
                const plPercentage = sd.profitLossPercentage || 0;
                html += `
                    <div class="pnl-section">
                        <div class="section-title">
                            <i class="fas fa-chart-pie"></i>
                            <h3>Profit & Loss Analysis</h3>
                        </div>
                        <div class="pnl-grid">
                            <div class="pnl-item">
                                <div class="pnl-label">Average Buy Price</div>
                                <div class="pnl-value">${formatUSD(sd.avgBuyPrice || 0)}</div>
                            </div>
                            <div class="pnl-item">
                                <div class="pnl-label">Sell Price</div>
                                <div class="pnl-value">${formatUSD(sd.price || 0)}</div>
                            </div>
                            <div class="pnl-item">
                                <div class="pnl-label">Gross Profit/Loss</div>
                                <div class="pnl-value ${(sd.profit || 0) > 0 ? 'positive' : 'negative'}">
                                    ${formatUSD((sd.profit || 0) - (sd.loss || 0))}
                                    <span class="pnl-percentage ${plPercentage >= 0 ? 'positive' : 'negative'}">
                                        <i class="fas ${plPercentage >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'}"></i>
                                        ${Math.abs(plPercentage).toFixed(2)}%
                                    </span>
                                </div>
                            </div>
                            <div class="pnl-item">
                                <div class="pnl-label">Quantity Sold</div>
                                <div class="pnl-value">${(sd.quantitySold || 0).toFixed(6)} ${assetSymbol.toUpperCase()}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Wallet Breakdown (for buy transactions)
            if (isBuy && tx.buyDetails) {
                const bd = tx.buyDetails;
                const mainUsed = parseFloat(bd.mainAmountUsed) || 0;
                const maturedUsed = parseFloat(bd.maturedAmountUsed) || 0;
                const totalUsed = mainUsed + maturedUsed;
                
                html += `
                    <div class="wallet-breakdown">
                        <div class="section-title">
                            <i class="fas fa-wallet"></i>
                            <h3>Wallet Breakdown</h3>
                        </div>
                        <div class="wallet-table">
                            <div class="wallet-row">
                                <span class="label"><i class="fas fa-wallet"></i> Main Wallet</span>
                                <span class="amount">${formatUSD(mainUsed)}</span>
                            </div>
                            <div class="wallet-row">
                                <span class="label"><i class="fas fa-coins"></i> Matured Wallet</span>
                                <span class="amount">${formatUSD(maturedUsed)}</span>
                            </div>
                            <div class="wallet-row">
                                <span class="label"><i class="fas fa-calculator"></i> Total Debit</span>
                                <span class="wallet-total">${formatUSD(totalUsed)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Comprehensive Details Grid
            html += `
                    <div class="details-grid-section">
                        <div class="detail-block">
                            <div class="label">Date & Time</div>
                            <div class="value">${formattedDate}</div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">Transaction Type</div>
                            <div class="value" style="text-transform: capitalize;">${tx.type || 'Transfer'}</div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">Asset / Network</div>
                            <div class="value">
                                <span class="network-chip">
                                    <img src="${assetInfo.logo}" style="width: 16px; height: 16px; border-radius: 50%;" alt="">
                                    ${assetInfo.name} (${assetSymbol.toUpperCase()})
                                </span>
                            </div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">Network / Protocol</div>
                            <div class="value">
                                <span class="network-chip">
                                    <i class="fas fa-network-wired"></i>
                                    ${tx.network || assetInfo.network}
                                </span>
                            </div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">Confirmations</div>
                            <div class="value">
                                ${tx.confirmations || 'N/A'} 
                                ${tx.confirmations ? '<span style="color: var(--accent-success); margin-left: 8px;">✓ verified</span>' : ''}
                            </div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">Block Height</div>
                            <div class="value mono-text">${tx.blockHeight || '—'}</div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">From Address</div>
                            <div class="value mono-text" style="font-size: 0.8rem;">${tx.fromAddress || '—'}</div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">To Address</div>
                            <div class="value mono-text" style="font-size: 0.8rem;">${tx.toAddress || '—'}</div>
                        </div>
                        
                        <div class="detail-block">
                            <div class="label">TX Hash</div>
                            <div class="value mono-text" style="font-size: 0.8rem;">${tx.txHash || tx.hash || '—'}</div>
                        </div>
                    </div>
            `;
            
            // Reference/Memo Section
            if (tx.reference || tx.description || tx.memo || tx.note) {
                const refText = tx.reference || tx.description || tx.memo || tx.note;
                html += `
                    <div class="reference-section">
                        <div class="section-title" style="margin-bottom: 16px;">
                            <i class="fas fa-message"></i>
                            <h3>Reference & Memo</h3>
                        </div>
                        <div class="reference-content">
                            ${refText}
                        </div>
                    </div>
                `;
            }
            
            // Footer Actions
            html += `
                    <div class="card-footer">
                        <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </button>
                        <button class="btn btn-outline" onclick="printTransaction()">
                            <i class="fas fa-print"></i> Print Receipt
                        </button>
                        <button class="btn btn-primary" onclick="downloadPDF()">
                            <i class="fas fa-file-pdf"></i> Export PDF
                        </button>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        
        function formatUSD(value) {
            const num = parseFloat(value) || 0;
            
            if (num >= 1e12) return `$${(num / 1e12).toFixed(2)}T`;
            if (num >= 1e9) return `$${(num / 1e9).toFixed(2)}B`;
            if (num >= 1e6) return `$${(num / 1e6).toFixed(2)}M`;
            
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(num);
        }

        function showError(message) {
            const container = document.getElementById('transaction-details-container');
            container.innerHTML = `
                <div class="transaction-card" style="text-align: center; padding: 80px 40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--accent-error); margin-bottom: 24px;"></i>
                    <h2 style="font-size: 2rem; margin-bottom: 16px;">Error Loading Transaction</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 32px;">${message}</p>
                    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                        <i class="fas fa-arrow-left"></i> Return to Dashboard
                    </button>
                </div>
            `;
            showNotification('error', 'Error', message);
        }

        function showNotification(type, title, message) {
            const center = document.getElementById('notification-center');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            if (type === 'warning') icon = 'fa-exclamation-triangle';
            
            notification.innerHTML = `
                <i class="fas ${icon}" style="font-size: 1.25rem;"></i>
                <div style="flex: 1;">
                    <div style="font-weight: 600; margin-bottom: 4px;">${title}</div>
                    <div style="font-size: 0.875rem; opacity: 0.9;">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </div>
            `;
            
            center.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showNotification('success', 'Copied', 'Transaction ID copied to clipboard');
            }).catch(() => {
                showNotification('error', 'Failed', 'Could not copy to clipboard');
            });
        }

        function printTransaction() {
            window.print();
        }

        function downloadPDF() {
            showNotification('info', 'Generating PDF', 'Preparing enterprise PDF report...');
            setTimeout(() => {
                window.print();
            }, 500);
        }

        function manualRefresh() {
            showNotification('info', 'Refreshing', 'Fetching latest market data...');
            fetchLivePrices();
        }

        // =============================================
        // AUTHENTICATION CHECK
        // =============================================
        
        async function checkAuth() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return false;
            
            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                return response.ok;
            } catch {
                return false;
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (state.refreshInterval) {
                clearInterval(state.refreshInterval);
            }
        });
    </script>
</body>
</html>
