    <style>
        /* ---------- ENTERPRISE DESIGN SYSTEM (exact crypto.com theme, extended) ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #00FF00;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --security-green: #34A853;
            --surface-0: #0B1019;
            --surface-1: #141C2B;
            --surface-2: #1E2A3A;
            --border-subtle: rgba(0, 216, 255, 0.12);
            --shadow-heavy: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 216, 255, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- loading overlay (enterprise fidelity) ----- */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--darker);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loading-logo { width: 88px; height: 88px; animation: pulse 1.8s infinite; filter: drop-shadow(0 0 20px #00D8FF); }
        .loading-text { margin-top: 28px; font-weight: 400; color: var(--gray); font-size: 1rem; letter-spacing: 0.3px; }
        @keyframes pulse { 0% { transform: scale(0.96); opacity: 0.8; } 50% { transform: scale(1.04); opacity: 1; } }

        /* ----- security badge (always visible) ----- */
        .security-badge {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 60px;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem; font-weight: 600;
            z-index: 100;
            border: 1px solid var(--primary-dark);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: white;
        }
        .security-badge i { color: var(--security-green); font-size: 1rem; }

        /* ----- HEADER (only logo + title, no nav/footer) ----- */
        header {
            background: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            position: sticky; top: 0; width: 100%; z-index: 200;
            height: 70px;
            display: flex;
            align-items: center;
        }
        .header-container {
            width: 100%; max-width: 1600px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
        }
        .logo img { height: 36px; width: auto; transition: var(--transition); }
        .logo-text {
            font-family: 'Rowdies', cursive;
            font-weight: 700; font-size: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-badge {
            background: var(--surface-2);
            border-radius: 40px;
            padding: 6px 20px;
            border: 1px solid var(--border-subtle);
            color: var(--primary-light);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .header-badge i { font-size: 0.9rem; color: var(--primary); }

        /* ----- MAIN CONTAINER (enterprise spacing) ----- */
        .transaction-page {
            padding: 32px 24px 80px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* ----- top action bar (detailed) ----- */
        .transaction-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px 20px;
            margin-bottom: 30px;
        }
        .header-left h1 {
            font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #c0d0e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-left p { font-size: 0.9rem; color: var(--gray); margin-top: 4px; }

        .action-buttons {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .action-btn {
            background: var(--surface-1);
            border: 1px solid var(--gray-light);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem; font-weight: 500;
            display: inline-flex; align-items: center; gap: 8px;
            cursor: pointer; transition: var(--transition);
        }
        .action-btn i { color: var(--primary); font-size: 1rem; }
        .action-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #0A0E17;
        }
        .action-btn:hover i { color: #0A0E17; }

        /* ----- main card (depth, detail) ----- */
        .transaction-card {
            background: var(--surface-1);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow-heavy);
            border: 1px solid rgba(0,216,255,0.08);
            backdrop-filter: blur(2px);
        }

        /* --- section: header with icon + status --- */
        .tx-masthead {
            display: flex; align-items: center; gap: 20px;
            flex-wrap: wrap; margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-light);
        }
        .tx-icon {
            width: 70px; height: 70px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; background: var(--surface-2);
        }
        .tx-icon.deposit { background: rgba(0,255,0,0.08); color: var(--success); }
        .tx-icon.withdrawal { background: rgba(255,0,0,0.08); color: var(--error); }
        .tx-icon.default { background: rgba(0,216,255,0.08); color: var(--primary); }

        .tx-main-title { flex: 1; }
        .tx-main-title h2 { font-size: 2rem; font-weight: 600; text-transform: capitalize; }
        .tx-main-title .tx-global-id {
            font-size: 0.8rem; color: var(--gray); font-family: monospace;
            background: var(--surface-2); padding: 4px 12px; border-radius: 40px; display: inline-block;
            margin-top: 6px; letter-spacing: 0.3px;
        }

        .tx-badge {
            padding: 6px 20px; border-radius: 40px; font-weight: 600; font-size: 0.9rem;
            background: var(--surface-2); border: 1px solid transparent;
        }
        .tx-badge.completed { background: rgba(0,255,0,0.12); color: #aaffaa; border-color: rgba(0,255,0,0.3); }
        .tx-badge.pending { background: rgba(255,184,0,0.12); color: #ffcc66; border-color: #ffb80055; }
        .tx-badge.failed { background: rgba(255,0,0,0.12); color: #ff8888; border-color: #ff000055; }

        /* --- financial grid (enterprise density) --- */
        .financial-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
            margin-bottom: 32px;
        }
        @media (max-width: 600px) { .financial-grid { grid-template-columns: 1fr; } }

        .finance-card {
            background: var(--surface-2);
            border-radius: 24px; padding: 24px;
            border: 1px solid var(--border-subtle);
        }
        .finance-label {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--gray); margin-bottom: 8px;
        }
        .finance-amount {
            font-size: 2.5rem; font-weight: 700; font-family: 'Manrope', sans-serif;
            line-height: 1.2; margin-bottom: 6px;
        }
        .finance-amount.positive { color: var(--success); }
        .finance-amount.negative { color: var(--error); }
        .finance-secondary {
            display: flex; align-items: center; gap: 10px; font-size: 1rem;
            color: var(--gray); border-top: 1px dashed var(--gray-light); padding-top: 12px;
        }

        /* ---- P&L section (institutional detail) ---- */
        .pnl-container {
            background: rgba(0,0,0,0.3); border-radius: 24px; padding: 24px;
            margin-bottom: 32px; border: 1px solid var(--border-subtle);
        }
        .pnl-title {
            display: flex; align-items: center; gap: 8px; color: var(--primary);
            font-weight: 600; margin-bottom: 20px; text-transform: uppercase; font-size: 0.85rem;
        }
        .pnl-grid {
            display: grid; grid-template-columns: repeat(4,1fr); gap: 16px;
        }
        @media (max-width: 700px) { .pnl-grid { grid-template-columns: repeat(2,1fr); } }
        .pnl-item {
            background: var(--surface-1); border-radius: 18px; padding: 16px;
        }
        .pnl-item-label { font-size: 0.7rem; color: var(--gray); margin-bottom: 4px; }
        .pnl-item-value { font-size: 1.2rem; font-weight: 600; }
        .positive { color: var(--success); }
        .negative { color: var(--error); }

        /* ---- wallet breakdown (crystal) ---- */
        .wallet-breakdown {
            background: var(--surface-2); border-radius: 24px; padding: 24px;
            margin-bottom: 32px; border: 1px solid var(--border-subtle);
        }
        .wallet-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--gray-light);
            flex-wrap: wrap; gap: 10px;
        }
        .wallet-row:last-child { border: none; }
        .wallet-name { display: flex; align-items: center; gap: 10px; color: var(--gray); }
        .wallet-amount { font-weight: 600; color: white; }
        .wallet-total { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        /* ---- detail grid (metadata, 3 columns) ---- */
        .meta-grid {
            display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;
            margin-bottom: 32px;
        }
        @media (max-width: 800px) { .meta-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 500px) { .meta-grid { grid-template-columns: 1fr; } }
        .meta-item {
            background: rgba(255,255,255,0.02); border-radius: 20px; padding: 16px;
        }
        .meta-label { font-size: 0.7rem; color: var(--gray); margin-bottom: 6px; }
        .meta-value { font-size: 1rem; font-weight: 500; word-break: break-word; }
        .network-chip {
            background: rgba(0,216,255,0.1); color: var(--primary); padding: 4px 16px;
            border-radius: 40px; font-size: 0.8rem; display: inline-block;
        }

        /* ---- reference / audit trail ---- */
        .audit-trail {
            background: var(--surface-2); border-radius: 18px; padding: 18px;
            margin-bottom: 32px; font-size: 0.9rem;
            border-left: 4px solid var(--primary);
        }
        .audit-trail strong { color: var(--primary); font-weight: 600; }

        /* ---- footer actions (minimal, no site footer) ---- */
        .tx-footer-actions {
            display: flex; justify-content: flex-end; gap: 16px;
            margin-top: 16px;
        }

        /* ---------- PRINT (enterprise ready, with logo & title) ---------- */
        @media print {
            header, .security-badge, .action-buttons, .tx-footer-actions, .loading-overlay {
                display: none !important;
            }
            body { background: white; }
            .transaction-page { padding: 0.3in; }
            .transaction-card {
                border: 1px solid #aaa; box-shadow: none; background: white;
            }
            .tx-icon, .finance-card, .meta-item, .pnl-item, .wallet-breakdown {
                background: #f5f5f5 !important; color: black; border-color: #ccc;
            }
            .finance-amount, .pnl-item-value, .meta-value { color: black !important; }
            .logo-text { -webkit-text-fill-color: #00A3CC; }
            /* add header print identifier */
            .tx-masthead::before {
                content: "₿itHash · official receipt"; 
                font-family: 'Rowdies', cursive;
                font-size: 1.6rem; color: #00A3CC; 
                display: block; width: 100%; margin-bottom: 15px;
                border-bottom: 2px solid #00D8FF;
            }
        }
    </style>
</head>
<body>

        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">

    <!-- security badge -->
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>AES-256 · TLS 1.3 · real‑time audit</span>
    </div>

    <!-- HEADER (brand + page identifier, no footer) -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">₿itHash</span>
            </div>
            <div class="header-badge">
                <i class="fas fa-file-invoice"></i> enterprise transaction view
            </div>

    <!-- MAIN PAGE (DETAIL HEAVY, realtime) -->
    <section class="transaction-page">
        <div class="transaction-header">
            <div class="header-left">
                <h1>transaction intelligence</h1>
                <p id="transaction-subtitle">real‑time details · full depth</p>
            </div>
            <div class="action-buttons">
                <button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button>

                <button class="action-btn" onclick="downloadTransactionPDF()"><i class="fas fa-file-pdf"></i> export PDF</button>
            </div>

        <!-- DYNAMIC CARD (fully populated by enterprise JS) -->
        <div class="transaction-card" id="transaction-details-container">
            <div style="text-align: center; padding: 80px 20px; color: var(--gray);">
                <i class="fas fa-spinner fa-spin fa-3x"></i>
                <p style="margin-top: 24px;">establishing secure channel · fetching transaction</p>
            </div>
        </div>
    </section>

    <!-- no footer section (exactly as required) -->

    <script>
        (function() {
            // ---------- ENTERPRISE STATE (full copy from backend integration) ----------
            let currentPrices = {};
            let currentBTCPrice = 43000;
            let allTransactions = [];
            let currentTransaction = null;

            // top 30 assets (complete list)
            const topAssets = [
                { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
                { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
                { id: 'tether', symbol: 'usdt', name: 'Tether', logo: 'https://assets.coingecko.com/coins/images/325/large/Tether.png' },
                { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
                { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
                { id: 'usd-coin', symbol: 'usdc', name: 'USDC', logo: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png' },
                { id: 'xrp', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' },
                { id: 'dogecoin', symbol: 'doge', name: 'Dogecoin', logo: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png' },
                { id: 'cardano', symbol: 'ada', name: 'Cardano', logo: 'https://assets.coingecko.com/coins/images/975/large/cardano.png' },
                { id: 'shiba-inu', symbol: 'shib', name: 'Shiba Inu', logo: 'https://assets.coingecko.com/coins/images/11939/large/shiba.png' },
                { id: 'avalanche-2', symbol: 'avax', name: 'Avalanche', logo: 'https://assets.coingecko.com/coins/images/12559/large/Avalanche_Circle_RedWhite.png' },
                { id: 'polkadot', symbol: 'dot', name: 'Polkadot', logo: 'https://assets.coingecko.com/coins/images/12171/large/polkadot.png' },
                { id: 'tron', symbol: 'trx', name: 'TRON', logo: 'https://assets.coingecko.com/coins/images/1094/large/tron-logo.png' },
                { id: 'chainlink', symbol: 'link', name: 'Chainlink', logo: 'https://assets.coingecko.com/coins/images/877/large/chainlink-new-logo.png' },
                { id: 'polygon', symbol: 'matic', name: 'Polygon', logo: 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png' },
                { id: 'wrapped-bitcoin', symbol: 'wbtc', name: 'Wrapped Bitcoin', logo: 'https://assets.coingecko.com/coins/images/7598/large/wrapped_bitcoin_wbtc.png' },
                { id: 'litecoin', symbol: 'ltc', name: 'Litecoin', logo: 'https://assets.coingecko.com/coins/images/2/large/litecoin.png' },
                { id: 'near', symbol: 'near', name: 'NEAR', logo: 'https://assets.coingecko.com/coins/images/10365/large/near_icon.png' },
                { id: 'uniswap', symbol: 'uni', name: 'Uniswap', logo: 'https://assets.coingecko.com/coins/images/12504/large/uni.jpg' },
                { id: 'bitcoin-cash', symbol: 'bch', name: 'Bitcoin Cash', logo: 'https://assets.coingecko.com/coins/images/780/large/bitcoin-cash-circle.png' }
            ];
            const assetLogos = {};
            topAssets.forEach(a => assetLogos[a.symbol] = a.logo);

            const assetNetworks = {
                'btc':'Bitcoin','eth':'Ethereum','usdt':'Tron (TRC-20)','bnb':'BSC','sol':'Solana',
                'usdc':'Ethereum (ERC-20)','xrp':'XRP','doge':'Dogecoin','ada':'Cardano','shib':'ERC-20',
                'avax':'Avalanche C','dot':'Polkadot','trx':'TRON','link':'ERC-20','matic':'Polygon',
                'wbtc':'ERC-20','ltc':'Litecoin','near':'NEAR','uni':'ERC-20','bch':'Bitcoin Cash'
            };

            // ---------- helper formatting ----------
            function formatUSD(num) {
                let n = parseFloat(num) || 0;
                if (n >= 1e12) return '$'+(n/1e12).toFixed(2)+'T';
                if (n >= 1e9) return '$'+(n/1e9).toFixed(2)+'B';
                if (n >= 1e6) return '$'+(n/1e6).toFixed(2)+'M';
                return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }
            function formatNumberWithCommas(num, decimals=6) {
                let n = parseFloat(num)||0;
                if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
                if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
                if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
                return n.toFixed(decimals).replace(/\.?0+$/, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            // ---------- load transaction from URL (enterprise) ----------
            async function loadTransactionFromURL() {
                const urlParams = new URLSearchParams(window.location.search);
                const encryptedId = urlParams.get('id');
                if (!encryptedId) { showError('missing transaction reference', 'ERR_NO_ID'); return; }
                try {
                    const decoded = atob(encryptedId);
                    const payload = JSON.parse(decoded);
                    if (Date.now() - (payload.t||0) > 24*60*60*1000) { showError('secure link expired (max 24h)','ERR_EXPIRED'); return; }
                    await loadTransactionFromAPI(payload.id);
                } catch (e) { showError('invalid secure link','ERR_DECODE'); }
            }

            async function loadTransactionFromAPI(txId) {
                const token = localStorage.getItem('jwtToken');
                if (!token) { window.location.href = 'login.html?redirect='+encodeURIComponent(window.location.href); return; }
                try {
                    let res = await fetch(`https://bithash-backend.onrender.com/api/transactions/${txId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) { const d = await res.json(); currentTransaction = d.data || d; renderFullDetails(); }
                    else if (res.status === 404) { await loadAllAndFind(txId); }
                    else showError(`backend error ${res.status}`,'ERR_API');
                } catch (e) { showError('network fault · retry','ERR_NET'); }
            }

            async function loadAllAndFind(txId) {
                const token = localStorage.getItem('jwtToken');
                try {
                    let r = await fetch('https://bithash-backend.onrender.com/api/transactions', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (r.ok) { let d = await r.json(); allTransactions = d.data?.transactions || d.transactions || [];
                        currentTransaction = allTransactions.find(t => t.id === txId || t._id === txId);
                        if (currentTransaction) renderFullDetails(); else showError('tx not found in history','ERR_NOT_FOUND');
                    } else showError('cannot fetch transaction list','ERR_LIST');
                } catch { showError('network error','ERR_NET'); }
            }

            function showError(msg, code) {
                document.getElementById('transaction-details-container').innerHTML = `
                    <div style="text-align:center; padding:60px 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--error);"></i>
                        <h3 style="margin:20px 0 8px;">${msg}</h3>
                        <p style="color:var(--gray);">code: ${code || 'UNKNOWN'}</p>
                        <button class="action-btn" style="margin-top:30px;" onclick="window.location.href='dashboard.html'"><i class="fas-arrow-left"></i> back to dashboard</button>
                    </div>`;
            }

            // ---------- ENTERPRISE RENDER (all fields, realtime ready) ----------
            function renderFullDetails() {
                const tx = currentTransaction; if (!tx) return;
                const container = document.getElementById('transaction-details-container');
                document.getElementById('transaction-subtitle').innerText = `TX: ${tx.id || tx._id || ''} · realtime`;

                let assetSymbol = (tx.asset || tx.method || 'btc').toLowerCase();
                let logo = assetLogos[assetSymbol] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
                let usdAmount = parseFloat(tx.amount) || 0;
                let assetAmount = parseFloat(tx.assetAmount) || 0;
                let isIncoming = ['deposit','interest','referral','buy'].includes(tx.type);
                let isOutgoing = ['withdrawal','sell'].includes(tx.type);
                let amountClass = isIncoming ? 'positive' : (isOutgoing ? 'negative' : '');
                let prefix = isIncoming ? '+' : (isOutgoing ? '-' : '');

                let exchangeRate = 1;
                let assetId = topAssets.find(a=>a.symbol===assetSymbol)?.id || 'bitcoin';
                exchangeRate = (assetSymbol==='usdt'||assetSymbol==='usdc') ? 1 : (currentPrices[assetId]?.usd || 43000);

                let network = tx.network || assetNetworks[assetSymbol] || 'Bitcoin mainnet';
                let dateStr = new Date(tx.date || tx.createdAt || Date.now()).toLocaleString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});

                let statusClass = tx.status==='completed'?'completed':(tx.status==='pending'?'pending':'failed');
                let statusText = tx.status==='completed'?'SETTLED':(tx.status==='pending'?'PENDING·CHAIN':'FAILED');

                let icon = 'fa-exchange-alt', iconClass='default';
                if (tx.type==='deposit'){icon='fa-arrow-down'; iconClass='deposit';}
                else if (tx.type==='withdrawal'){icon='fa-arrow-up'; iconClass='withdrawal';}
                else if (tx.type==='buy'){icon='fa-shopping-cart'; iconClass='deposit';}
                else if (tx.type==='sell'){icon='fa-tag'; iconClass='withdrawal';}
                else if (tx.type==='interest'){icon='fa-percentage'; iconClass='deposit';}

                // start building HTML
                let html = `
                <div class="tx-masthead">
                    <div class="tx-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                    <div class="tx-main-title">
                        <h2>${tx.type || 'transaction'}</h2>
                        <span class="tx-global-id"><i class="fas fa-fingerprint"></i> ${tx.id || tx._id || ''}</span>
                    </div>
                    <div class="tx-badge ${statusClass}">${statusText}</div>
                </div>

                <div class="financial-grid">
                    <div class="finance-card">
                        <div class="finance-label">settled amount (USD)</div>
                        <div class="finance-amount ${amountClass}">${prefix}${formatUSD(Math.abs(usdAmount))}</div>
                        <div class="finance-secondary"><img src="${logo}" style="width:22px;height:22px;border-radius:50%;"> ${prefix}${formatNumberWithCommas(Math.abs(usdAmount/exchangeRate),8)} ${assetSymbol.toUpperCase()}</div>
                    </div>
                    <div class="finance-card">
                        <div class="finance-label">exchange rate (oracle)</div>
                        <div class="finance-amount">${formatUSD(exchangeRate)}</div>
                        <div class="finance-secondary"><i class="fas fa-chart-line" style="color:var(--primary);"></i> 1 ${assetSymbol.toUpperCase()} = ${formatUSD(exchangeRate)}</div>
                    </div>
                </div>`;

                // P/L for sell
                if (tx.type==='sell' && tx.sellDetails) {
                    let d=tx.sellDetails; let plPer = d.profitLossPercentage||0;
                    html += `<div class="pnl-container"><div class="pnl-title"><i class="fas fa-chart-pie"></i> profit & loss (realized)</div>
                    <div class="pnl-grid">
                        <div class="pnl-item"><div class="pnl-item-label">avg buy price</div><div class="pnl-item-value">${formatUSD(d.avgBuyPrice||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-item-label">sell price</div><div class="pnl-item-value">${formatUSD(d.price||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-item-label">gross profit</div><div class="pnl-item-value positive">+${formatUSD(d.profit||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-item-label">loss</div><div class="pnl-item-value negative">-${formatUSD(d.loss||0)}</div></div>
                        <div class="pnl-item"><div class="pnl-item-label">P/L %</div><div class="pnl-item-value ${plPer>=0?'positive':'negative'}">${plPer>=0?'+':''}${(plPer).toFixed(2)}%</div></div>
                        <div class="pnl-item"><div class="pnl-item-label">quantity sold</div><div class="pnl-item-value">${formatNumberWithCommas(d.quantitySold||0,6)} ${assetSymbol.toUpperCase()}</div></div>
                    </div></div>`;
                }

                // wallet breakdown buy
                if (tx.type==='buy' && tx.buyDetails) {
                    let bd=tx.buyDetails; let main=parseFloat(bd.mainAmountUsed)||0, mat=parseFloat(bd.maturedAmountUsed)||0;
                    html += `<div class="wallet-breakdown"><div class="pnl-title"><i class="fas fa-wallet"></i> wallet allocation (buy)</div>
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-circle" style="color:var(--primary);"></i> main wallet</span><span class="wallet-amount">${formatUSD(main)}</span></div>
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-circle" style="color:var(--gold);"></i> matured wallet</span><span class="wallet-amount">${formatUSD(mat)}</span></div>
                        <div class="wallet-row"><span class="wallet-name"><i class="fas fa-calculator"></i> total used</span><span class="wallet-total">${formatUSD(main+mat)}</span></div>
                    </div>`;
                }

                // meta grid (extensive)
                html += `<div class="meta-grid">
                    <div class="meta-item"><span class="meta-label"><i class="far fa-calendar"></i> timestamp</span><div class="meta-value">${dateStr}</div></div>
                    <div class="meta-item"><span class="meta-label"><i class="fas fa-tag"></i> type</span><div class="meta-value" style="text-transform:capitalize;">${tx.type}</div></div>
                    <div class="meta-item"><span class="meta-label"><i class="fas fa-coins"></i> asset</span><div class="meta-value" style="display:flex;align-items:center;gap:6px;"><img src="${logo}" style="width:22px;border-radius:50%;"> ${assetSymbol.toUpperCase()}</div></div>
                    <div class="meta-item"><span class="meta-label"><i class="fas fa-link"></i> network</span><div class="meta-value"><span class="network-chip">${network}</span></div></div>
                    <div class="meta-item"><span class="meta-label"><i class="fas fa-gas-pump"></i> fee</span><div class="meta-value">${tx.fee ? formatUSD(tx.fee) : '0.00'}</div></div>
                    <div class="meta-item"><span class="meta-label"><i class="fas fa-file-signature"></i> net settlement</span><div class="meta-value ${amountClass}">${formatUSD(usdAmount - (tx.fee||0))}</div></div>
                `;

                // add reference if present
                if (tx.reference || tx.description || tx.details) {
                    html += `<div class="audit-trail"><strong><i class="fas fa-history"></i> audit reference:</strong> ${tx.reference || tx.description || tx.details}</div>`;
                } else {
                    html += `<div class="audit-trail"><strong><i class="fas fa-check-circle"></i> on-chain finality</strong> · transaction anchored</div>`;
                }

                html += `<div class="tx-footer-actions">
                    <button class="action-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> dashboard</button>
                    <button class="action-btn" onclick="printTransaction()"><i class="fas fa-print"></i> print receipt</button>
                </div>`;

                container.innerHTML = html;
            }

            window.printTransaction = function() { window.print(); };
            window.downloadTransactionPDF = function() { window.print(); }; // fallback

            // ----- realtime price fetch -----
            async function fetchCoinGeckoPrices() {
                try {
                    const ids = topAssets.map(a=>a.id).join(',');
                    const resp = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=1h%2C24h%2C7d`);
                    if (resp.ok) {
                        const data = await resp.json();
                        currentPrices = {};
                        data.forEach(asset => { currentPrices[asset.id] = { usd: asset.current_price || 0 }; });
                        currentBTCPrice = currentPrices.bitcoin?.usd || 43000;
                    }
                } catch (e) {}
            }

            // ----- init -----
            window.addEventListener('load', async function() {
                setTimeout(() => { document.getElementById('loading-overlay').classList.add('hidden'); }, 400);
                await fetchCoinGeckoPrices();
                await loadTransactionFromURL();
            });
        })();
    </script>
</body>
</html>
