<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash Cloud Mining | Enterprise Mining Operations</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================= */
        /* ENTERPRISE DESIGN SYSTEM – CLEAN, MODULAR, PROFESSIONAL */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2469F0;
            --primary-dark: #1A4FC4;
            --primary-light: #5B8DF5;
            --accent: #00D4A0;
            --success: #14B869;
            --error: #F05252;
            --warning: #FFB443;
            --bg-base: #F8FAFE;
            --bg-surface: #FFFFFF;
            --bg-muted: #F1F5F9;
            --text-primary: #0A1A2B;
            --text-secondary: #48607C;
            --text-tertiary: #7C8BA0;
            --border-light: #E4EAF2;
            --border-medium: #CBD5E1;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 48px -8px rgba(0, 0, 0, 0.08), 0 8px 16px -4px rgba(0, 0, 0, 0.02);
            --shadow-xl: 0 32px 64px -12px rgba(0, 0, 0, 0.12);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: 0;
            margin: 0;
        }

        /* ============================================= */
        /* GLOBAL COMPONENTS – CLEAN & PROFESSIONAL */
        /* ============================================= */
        .notification-center {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 380px;
            width: 100%;
            pointer-events: none;
        }

        .notification {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-light);
            transform: translateX(120%);
            opacity: 0;
            transition: var(--transition);
            pointer-events: auto;
            border-left: 4px solid transparent;
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        .notification i {
            font-size: 1.3rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .notification-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .notification-close {
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
            font-size: 1.4rem;
            line-height: 1;
        }

        .notification-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 72px;
            height: 72px;
            animation: gentlePulse 1.8s infinite;
            border-radius: 50%;
            box-shadow: var(--shadow-md);
        }

        .loading-text {
            margin-top: 24px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        /* ============================================= */
        /* HEADER – CLEAN, MINIMAL, ELEVATED */
        /* ============================================= */
        header {
            background: rgba(255,255,255,0.80);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(203, 213, 225, 0.3);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--primary);
            padding: 2px;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 36px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
            padding: 6px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .balance-badge {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-muted);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .balance-item i {
            color: var(--primary);
        }

        .balance-amount {
            font-weight: 700;
            color: var(--text-primary);
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(36, 105, 240, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 105, 240, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border-medium);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-back {
            background: white;
            color: var(--text-primary);
            padding: 10px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        .btn-back:hover {
            background: var(--bg-muted);
            transform: translateX(-4px);
        }

        /* ============================================= */
        /* MAIN CONTAINER – CLEAN LAYOUT WITH CARDS */
        /* ============================================= */
        .main-container {
            max-width: 1400px;
            margin: 48px auto;
            padding: 0 32px;
        }

        /* Header section */
        .plan-header {
            margin-bottom: 48px;
        }

        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(36, 105, 240, 0.08);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary);
            letter-spacing: 0.4px;
            margin-bottom: 20px;
            border: 1px solid rgba(36, 105, 240, 0.15);
        }

        .plan-badge i {
            font-size: 1rem;
        }

        .plan-title {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .plan-subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 720px;
            font-weight: 400;
        }

        /* Two-column layout */
        .details-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.9fr;
            gap: 32px;
            margin-bottom: 48px;
        }

        /* Left column cards */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            border-color: #d0ddec;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .card-title i {
            color: var(--primary);
            font-size: 1.4rem;
        }

        /* Plan specs grid – clean metrics */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .spec-item {
            background: var(--bg-muted);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-light);
        }

        .spec-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .spec-value.success {
            color: var(--success);
        }

        /* Miner details – clean horizontal split */
        .miner-container {
            display: flex;
            gap: 32px;
        }

        .miner-image {
            width: 160px;
            height: 160px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-muted);
            flex-shrink: 0;
            border: 1px solid var(--border-light);
        }

        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .miner-specs {
            flex: 1;
            background: var(--bg-muted);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            border: 1px solid var(--border-light);
        }

        .miner-spec-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.95rem;
        }

        .miner-spec-row:last-child {
            border-bottom: none;
        }

        .miner-spec-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .miner-spec-value {
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ============================================= */
        /* INVESTMENT PANEL – ELEVATED CARD */
        /* ============================================= */
        .investment-panel {
            background: linear-gradient(145deg, #FFFFFF, #F9FCFF);
            border-radius: var(--radius-xl);
            padding: 36px;
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(0,0,0,0.02);
            border: 1px solid rgba(203, 213, 225, 0.4);
            position: sticky;
            top: 100px;
        }

        .balance-selector {
            margin-bottom: 32px;
        }

        .balance-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-options {
            display: flex;
            gap: 16px;
        }

        .balance-option {
            flex: 1;
            background: var(--bg-muted);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            border: 1.5px solid var(--border-light);
        }

        .balance-option:hover:not(.disabled) {
            background: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(36,105,240,0.08);
        }

        .balance-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.6);
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .balance-option-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .balance-option-asset img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .balance-option-amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .balance-option-fiat {
            font-size: 0.9rem;
            color: var(--text-tertiary);
        }

        /* Form elements */
        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-surface);
            border: 1.5px solid var(--border-medium);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            transition: var(--transition);
            font-family: var(--font-sans);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(36,105,240,0.12);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 500;
            min-height: 24px;
        }

        /* Expected return card */
        .expected-return {
            background: linear-gradient(135deg, #F1F9F4, #E8F3EE);
            border-radius: var(--radius-lg);
            padding: 28px;
            text-align: center;
            margin-bottom: 28px;
            border: 1px solid rgba(20,184,105,0.2);
        }

        .return-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .return-fiat {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--success);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .return-asset img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
        }

        /* Primary action button */
        .action-button {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px -8px rgba(36,105,240,0.4);
        }

        .action-button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 16px 24px -8px rgba(36,105,240,0.5);
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .investment-status {
            text-align: center;
            font-size: 0.95rem;
            margin-top: 18px;
            min-height: 28px;
            font-weight: 600;
            color: var(--primary);
        }

        /* ============================================= */
        /* CHART SECTION – CLEAN CARD */
        /* ============================================= */
        .chart-section {
            margin-top: 48px;
        }

        .tradingview-container {
            width: 100%;
            height: 400px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }

        /* ============================================= */
        /* ANIMATIONS */
        /* ============================================= */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeSlideUp 0.5s ease-out forwards;
        }

        /* ============================================= */
        /* RESPONSIVE */
        /* ============================================= */
        @media (max-width: 1100px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
            .investment-panel {
                position: static;
            }
            .nav-links {
                display: none;
            }
        }

        @media (max-width: 700px) {
            .header-container {
                padding: 0 20px;
            }
            .balance-badge {
                display: none;
            }
            .miner-container {
                flex-direction: column;
                align-items: center;
            }
            .miner-image {
                width: 200px;
                height: 200px;
            }
            .plan-title {
                font-size: 2.2rem;
            }
            .specs-grid {
                grid-template-columns: 1fr;
            }
            .balance-options {
                flex-direction: column;
            }
            .card {
                padding: 24px;
            }
            .tradingview-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading enterprise mining data...</div>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">BitHash</span>
            </div>

            <div class="nav-links">
                <a href="index.html#plans">Plans</a>
                <a href="index.html#how-it-works">How It Works</a>
                <a href="dashboard">Dashboard</a>
            </div>

            <div class="user-info" id="userInfo">
                <!-- Dynamically populated -->
            </div>

            <button class="btn btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                <span>Back to plans</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-container" id="mainContent">
        <!-- Dynamically populated by JavaScript -->
    </div>

    <script>
        // =============================================
        // PROFESSIONAL CLOUD MINING IMPLEMENTATION
        // =============================================

        // Global State
        const AppState = {
            sessionKey: null,
            timestamp: null,
            ref: null,
            planDetails: null,
            userBalances: {
                main: 0,
                matured: 0
            },
            selectedBalance: 'main',
            selectedBalanceAmount: 0,
            isInvesting: false,
            currentBTCPrice: 43000,
            userPreferences: {
                displayAsset: 'btc'
            },
            investmentInProgress: false,
            planIndex: 0
        };

        // Asset Data
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' }
        ];

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Parse URL parameters from index.html redirect
            const urlParams = new URLSearchParams(window.location.search);
            AppState.sessionKey = urlParams.get('session');
            AppState.timestamp = urlParams.get('v');
            AppState.ref = urlParams.get('ref');

            // Also check for direct plan parameters (fallback)
            const planId = urlParams.get('plan');
            const planName = urlParams.get('name');
            const minAmount = urlParams.get('min');
            const maxAmount = urlParams.get('max');
            const percentage = urlParams.get('percentage');
            const duration = urlParams.get('duration');

            if (!AppState.sessionKey && !planId) {
                showNotification('error', 'Invalid Session', 'No plan selected. Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // If we have direct parameters, use them
            if (planId && minAmount && maxAmount && percentage && duration) {
                AppState.planDetails = {
                    id: planId,
                    name: planName || 'Professional Plan',
                    minAmount: parseFloat(minAmount),
                    maxAmount: parseFloat(maxAmount),
                    percentage: parseFloat(percentage),
                    duration: parseFloat(duration)
                };
                
                // Determine plan index based on minAmount
                if (AppState.planDetails.minAmount >= 50000) AppState.planIndex = 5;
                else if (AppState.planDetails.minAmount >= 10000) AppState.planIndex = 4;
                else if (AppState.planDetails.minAmount >= 5000) AppState.planIndex = 3;
                else if (AppState.planDetails.minAmount >= 1000) AppState.planIndex = 2;
                else if (AppState.planDetails.minAmount >= 500) AppState.planIndex = 1;
                else AppState.planIndex = 0;
            }

            // Initialize the page
            await initializePage();
        });

        async function initializePage() {
            try {
                // Check authentication
                const token = localStorage.getItem('jwtToken');
                if (token) {
                    await fetchUserBalances();
                } else {
                    updateAuthUI();
                }

                // If plan details not set from URL, fetch from API
                if (!AppState.planDetails) {
                    await loadPlanDetailsFromSession();
                }

                // Fetch BTC price
                await fetchBTCPrice();

                // Render the page
                renderPlanDetails();

                // Hide loading overlay
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 500);

            } catch (error) {
                console.error('Initialization error:', error);
                showNotification('error', 'Error', 'Failed to load page. Please try again.');
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        }

        async function loadPlanDetailsFromSession() {
            try {
                const token = localStorage.getItem('jwtToken');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

                // Fetch all plans
                const response = await fetch('https://bithash-backend.onrender.com/api/plans', { headers });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch plans');
                }

                const data = await response.json();
                const plans = data.data?.plans || [];

                // Get plan ID from session (format: planId_timestamp_random)
                const planId = AppState.sessionKey.split('_')[0];
                
                if (!planId) {
                    throw new Error('Plan not found in session');
                }

                // Find the plan
                const plan = plans.find(p => p.id === planId);
                
                if (!plan) {
                    throw new Error('Plan not found');
                }

                // Store plan details
                AppState.planDetails = plan;

                // Determine plan index based on minAmount
                if (plan.minAmount >= 50000) AppState.planIndex = 5;
                else if (plan.minAmount >= 10000) AppState.planIndex = 4;
                else if (plan.minAmount >= 5000) AppState.planIndex = 3;
                else if (plan.minAmount >= 1000) AppState.planIndex = 2;
                else if (plan.minAmount >= 500) AppState.planIndex = 1;
                else AppState.planIndex = 0;

            } catch (error) {
                console.error('Error loading plan:', error);
                throw error;
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    AppState.currentBTCPrice = data.bitcoin.usd || 43000;
                }
            } catch (error) {
                console.warn('Using default BTC price');
            }
        }

        function selectBalance(type, amount) {
            document.getElementById('balanceMain')?.classList.remove('selected');
            document.getElementById('balanceMatured')?.classList.remove('selected');

            const selectedEl = document.getElementById(type === 'main' ? 'balanceMain' : 'balanceMatured');
            if (selectedEl && !selectedEl.classList.contains('disabled')) {
                selectedEl.classList.add('selected');
                AppState.selectedBalance = type;
                AppState.selectedBalanceAmount = amount;

                const investmentInput = document.getElementById('investmentAmount');
                if (investmentInput) {
                    const maxAmount = Math.min(AppState.planDetails.maxAmount, amount);
                    investmentInput.max = maxAmount;
                    investmentInput.min = AppState.planDetails.minAmount;
                    
                    if (investmentInput.value) {
                        validateAmount(parseFloat(investmentInput.value));
                        updateExpectedReturn(parseFloat(investmentInput.value));
                    }
                }
            }
        }

        function autoSelectBalance() {
            const mainBalance = AppState.userBalances.main;
            const maturedBalance = AppState.userBalances.matured;
            const minAmount = AppState.planDetails.minAmount;

            if (mainBalance >= minAmount) {
                selectBalance('main', mainBalance);
            } else if (maturedBalance >= minAmount) {
                selectBalance('matured', maturedBalance);
            }
        }

        function setupInvestmentListeners() {
            const investmentInput = document.getElementById('investmentAmount');
            
            investmentInput.addEventListener('input', function(e) {
                const amount = parseFloat(e.target.value) || 0;
                validateAmount(amount);
                updateExpectedReturn(amount);
            });

            setTimeout(() => {
                const amount = parseFloat(investmentInput.value) || 0;
                validateAmount(amount);
            }, 100);
        }

        function validateAmount(amount) {
            const errorElement = document.getElementById('amountError');
            const investButton = document.getElementById('investButton');
            const plan = AppState.planDetails;
            
            errorElement.textContent = '';

            if (isNaN(amount) || amount <= 0) {
                errorElement.textContent = 'Enter a valid amount';
                investButton.disabled = true;
                return false;
            }

            if (amount < plan.minAmount) {
                errorElement.textContent = `Minimum investment $${plan.minAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            }

            if (amount > plan.maxAmount) {
                errorElement.textContent = `Maximum investment $${plan.maxAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            }

            if (amount > AppState.selectedBalanceAmount) {
                const formattedBalance = AppState.selectedBalanceAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                errorElement.textContent = `Insufficient balance: $${formattedBalance} available`;
                investButton.disabled = true;
                return false;
            }

            investButton.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            const plan = AppState.planDetails;
            const facilityFee = amount * 0.03;
            const netInvestment = amount - facilityFee;
            const totalReturn = netInvestment + (netInvestment * plan.percentage / 100);
            
            document.getElementById('returnFiat').textContent = `$${totalReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const price = AppState.currentBTCPrice;
            const asset = AppState.userPreferences.displayAsset;
            const assetAmount = price > 0 ? totalReturn / price : 0;
            
            document.getElementById('returnAssetText').textContent = `${assetAmount.toFixed(6)} ${asset.toUpperCase()}`;
        }

        async function handleInvestment() {
            if (AppState.investmentInProgress) {
                showNotification('warning', 'Please wait', 'Investment in progress');
                return;
            }

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication required', 'Please login to invest');
                setTimeout(() => window.location.href = 'login', 1500);
                return;
            }

            const amount = parseFloat(document.getElementById('investmentAmount').value);
            
            if (!validateAmount(amount)) {
                return;
            }

            AppState.investmentInProgress = true;
            
            const investButton = document.getElementById('investButton');
            const statusElement = document.getElementById('investmentStatus');
            
            investButton.disabled = true;
            investButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            statusElement.textContent = 'Initiating deployment...';
            statusElement.style.color = 'var(--primary)';

            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: AppState.planDetails.id,
                        amount: amount,
                        balanceType: AppState.selectedBalance
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusElement.textContent = 'Investment successful! Redirecting...';
                    statusElement.style.color = 'var(--success)';
                    
                    showNotification('success', 'Success!', 
                        `Investment of $${amount.toLocaleString()} deployed.`);

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);

                } else {
                    throw new Error(data.message || 'Investment failed');
                }

            } catch (error) {
                console.error('Investment error:', error);
                
                statusElement.textContent = error.message || 'Deployment failed';
                statusElement.style.color = 'var(--error)';
                
                showNotification('error', 'Investment Failed', error.message || 'Please try again');
                
                investButton.disabled = false;
                investButton.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Deploy investment';
            } finally {
                AppState.investmentInProgress = false;
            }
        }

                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">×</div>
            `;
            
            notificationCenter.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 10);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 400);
                }
            }, duration);
        }

        // Expose functions to global scope
        window.selectBalance = selectBalance;
        window.handleInvestment = handleInvestment;
    </script>
</body>
</html>
