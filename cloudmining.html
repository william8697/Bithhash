<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- SEO Meta Tags -->
    <title>BitHash Cloud Mining | Complete Your Investment</title>
    <meta name="description" content="Complete your Bitcoin cloud mining investment. SHA-256 ASIC mining with daily returns.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Critical CSS - Complete Removal of Borders/Boxes -->
    <style>
        /* ============================================= */
        /* GLOBAL RESET - ZERO BORDERS, BOXES, BLOCKS */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            background: #0a0a0a;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================= */
        /* COLOR THEME - MATCHES INDEX.HTML EXACTLY */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --blue-light: #004488;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --blue-gradient: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            --security-green: #34A853;
            --popular-accent: #FF6B00;
            
            --blue-translucent: rgba(26, 115, 232, 0.25);
            --blue-translucent-hover: rgba(26, 115, 232, 0.4);
        }
        
        /* ============================================= */
        /* LAYOUT - SMOOTH, NO BORDERS, FLOWING */
        /* ============================================= */
        .app-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 90px 24px 40px;
            width: 100%;
        }
        
        /* Header - Minimal, No Box */
        .investment-header {
            margin-bottom: 32px;
        }
        
        .investment-header h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 8px;
        }
        
        .investment-header h1 span {
            color: var(--primary);
        }
        
        .investment-header .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .investment-header .breadcrumb i {
            color: var(--primary);
            font-size: 0.8rem;
        }
        
        .investment-header .breadcrumb a {
            color: var(--gray);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .investment-header .breadcrumb a:hover {
            color: var(--primary);
        }
        
        /* Plan Overview - Smooth Flow, No Box */
        .plan-overview {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .plan-badge-large {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .plan-badge-large img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }
        
        .plan-badge-large h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .plan-meta-tags {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        
        .meta-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .meta-tag i {
            color: var(--primary);
            width: 18px;
            text-align: center;
        }
        
        .meta-tag .highlight {
            color: var(--success);
            font-weight: 600;
        }
        
        /* ============================================= */
        /* TWO COLUMN LAYOUT - STILL NO BOXES */
        /* ============================================= */
        .investment-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            margin-bottom: 48px;
        }
        
        /* Left Column - Plan Details (No Boxes) */
        .plan-details-section {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        
        .detail-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .detail-group h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        
        .detail-group h3 i {
            color: var(--primary);
        }
        
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .spec-label {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 500;
        }
        
        .spec-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            font-family: 'Manrope', sans-serif;
        }
        
        .spec-value small {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 400;
        }
        
        .spec-value.success {
            color: var(--success);
        }
        
        .spec-value .trend-icon {
            font-size: 0.9rem;
            margin-left: 4px;
        }
        
        /* Miner Details - Still No Box */
        .miner-detail-row {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .miner-image {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .miner-specs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .miner-spec-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .miner-spec-item i {
            width: 20px;
            color: var(--primary);
            font-size: 0.9rem;
        }
        
        .miner-spec-item span {
            color: var(--gray);
        }
        
        .miner-spec-item strong {
            color: #ffffff;
            font-weight: 600;
            margin-left: 4px;
        }
        
        /* Fee Structure - Smooth Text */
        .fee-structure {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .fee-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .fee-item i {
            width: 20px;
            color: var(--primary);
            font-size: 0.9rem;
        }
        
        .fee-item .fee-label {
            flex: 1;
            color: var(--gray);
        }
        
        .fee-item .fee-value {
            font-weight: 600;
            color: #ffffff;
        }
        
        /* ============================================= */
        /* RIGHT COLUMN - INVESTMENT PANEL (NO BOXES) */
        /* ============================================= */
        .investment-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        
        .balance-selector {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .balance-selector h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .balance-selector h3 i {
            color: var(--primary);
        }
        
        .balance-cards {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .balance-card {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: none;
            box-shadow: none;
        }
        
        .balance-card:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .balance-card.selected {
            background: rgba(0, 216, 255, 0.1);
            box-shadow: 0 0 0 1px var(--primary);
        }
        
        .balance-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .balance-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .balance-card-header span {
            font-weight: 600;
            color: #ffffff;
        }
        
        .balance-asset {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .balance-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        
        .balance-asset small {
            color: var(--gray);
            font-size: 0.8rem;
        }
        
        .balance-fiat {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Manrope', sans-serif;
        }
        
        .balance-asset-amount {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .balance-asset-amount img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        /* Investment Form - Flowing, No Boxes */
        .investment-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-group label {
            color: var(--gray);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .input-group label i {
            color: var(--primary);
            width: 18px;
        }
        
        .amount-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 4px 4px 4px 16px;
            transition: all 0.2s ease;
        }
        
        .amount-input-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 1px var(--primary);
        }
        
        .amount-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 14px 0;
            outline: none;
            font-family: 'Manrope', sans-serif;
        }
        
        .amount-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        
        .amount-input-wrapper .currency-label {
            padding: 0 16px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
        }
        
        .amount-hint {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .amount-hint button {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .amount-hint button:hover {
            background: rgba(0, 216, 255, 0.1);
        }
        
        .amount-error {
            color: var(--error);
            font-size: 0.85rem;
            min-height: 20px;
        }
        
        /* Return Projection - Smooth Display */
        .return-projection {
            background: rgba(40, 167, 69, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .projection-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .projection-label {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .projection-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .projection-value.success {
            color: var(--success);
            font-size: 1.5rem;
        }
        
        .projection-asset {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: var(--gray);
        }
        
        .projection-asset img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .projection-asset span {
            color: #ffffff;
            font-weight: 600;
        }
        
        .fee-breakdown {
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .fee-breakdown-item {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .fee-breakdown-item .fee-value {
            color: #ffffff;
        }
        
        .fee-breakdown-item .fee-value.warning {
            color: var(--warning);
        }
        
        /* Action Button */
        .invest-action-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: var(--darker);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .invest-action-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 216, 255, 0.3);
        }
        
        .invest-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .invest-action-btn i {
            font-size: 1rem;
        }
        
        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
            margin-top: 8px;
        }
        
        /* Security Note - Flowing Text */
        .security-note {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .security-note i {
            color: var(--security-green);
        }
        
        /* ============================================= */
        /* MINER SPECIFICATION TABLE - NO BOXES */
        /* ============================================= */
        .miner-spec-table {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .miner-spec-table h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .miner-spec-table h3 i {
            color: var(--primary);
        }
        
        .spec-grid-detailed {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .spec-detailed-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .spec-detailed-label {
            color: var(--gray);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .spec-detailed-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            font-family: 'Manrope', sans-serif;
        }
        
        .spec-detailed-value small {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 400;
            margin-left: 4px;
        }
        
        /* ============================================= */
        /* NOTIFICATION SYSTEM - FLOATING */
        /* ============================================= */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            pointer-events: none;
            max-width: 350px;
        }
        
        .notification {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(30px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: none;
        }
        
        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .notification.success {
            background: #d4edda;
            color: #1a1a1a;
        }
        
        .notification.error {
            background: #f8d7da;
            color: #1a1a1a;
        }
        
        .notification i {
            font-size: 1.2rem;
        }
        
        .notification.success i {
            color: #28a745;
        }
        
        .notification.error i {
            color: #dc3545;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .notification-close {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 4px;
        }
        
        .notification-close:hover {
            opacity: 1;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            width: 64px;
            height: 64px;
            animation: pulse 1.5s infinite;
        }
        
        .loading-text {
            margin-top: 16px;
            color: var(--gray);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        /* ============================================= */
        /* RESPONSIVE */
        /* ============================================= */
        @media (max-width: 1024px) {
            .investment-layout {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .plan-overview {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            
            .plan-meta-tags {
                margin-left: 0;
            }
            
            .app-wrapper {
                padding: 90px 20px 30px;
            }
        }
        
        @media (max-width: 768px) {
            .investment-header h1 {
                font-size: 2rem;
            }
            
            .plan-badge-large h2 {
                font-size: 1.6rem;
            }
            
            .specs-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .balance-cards {
                flex-direction: column;
            }
            
            .miner-detail-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .miner-image {
                width: 100px;
                height: 100px;
            }
        }
        
        @media (max-width: 480px) {
            .app-wrapper {
                padding: 80px 16px 20px;
            }
            
            .investment-header h1 {
                font-size: 1.8rem;
            }
            
            .plan-meta-tags {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .spec-detailed-value {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading investment details...</div>
    </div>
    
    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>
    
    <!-- Main Content - Single Smooth Page -->
    <div class="app-wrapper">
        <!-- Header Section - No Box -->
        <div class="investment-header">
            <div class="breadcrumb">
                <a href="index"><i class="fas fa-home"></i> Home</a>
                <i class="fas fa-chevron-right"></i>
                <span>Cloud Mining Investment</span>
            </div>
            <h1><span>Cloud Mining</span> Investment Panel</h1>
        </div>
        
        <!-- Plan Overview - Dynamic Content -->
        <div class="plan-overview" id="planOverview">
            <!-- Dynamically populated -->
        </div>
        
        <!-- Main Investment Layout - Two Columns, No Boxes -->
        <div class="investment-layout">
            <!-- Left Column: Plan Details -->
            <div class="plan-details-section" id="planDetailsSection">
                <!-- Dynamically populated -->
            </div>
            
            <!-- Right Column: Investment Panel -->
            <div class="investment-panel" id="investmentPanel">
                <!-- Dynamically populated -->
            </div>
        </div>
        
        <!-- Miner Specification Table - Full Width, No Box -->
        <div class="miner-spec-table" id="minerSpecTable">
            <!-- Dynamically populated -->
        </div>

            function attachEventListeners() {

                        document.querySelectorAll('.balance-card').forEach(c => c.classList.remove('selected'));

                        AppState.selectedBalance = this.dataset.balance;
                        AppState.selectedBalanceAmount = parseFloat(this.dataset.amount);
                        
                        validateAndUpdate();
                    });
                });

                if (amountInput) {
                    amountInput.addEventListener('input', function() {
                        validateAndUpdate();
                    });
                }

            function validateAndUpdate() {
                const amountInput = document.getElementById('investmentAmount');

                let amount = parseFloat(amountInput.value) || 0;

                } else if (amount > AppState.maxAmount) {
                    errorEl.textContent = `Maximum investment is $${AppState.maxAmount.toLocaleString()}`;
                    investBtn.disabled = true;
                } else if (amount > AppState.selectedBalanceAmount) {
                    errorEl.textContent = `Insufficient ${AppState.selectedBalance} balance`;
                    investBtn.disabled = true;
                } else {
                    investBtn.disabled = false;
                    updateReturnProjection(amount);
                }
            }
            
            function updateReturnProjection(amount) {
                const grossReturn = amount * (1 + AppState.percentage/100);
                const fee = grossReturn * 0.03;
                const netReturn = grossReturn - fee;
                const netIncome = netReturn - amount;
                
                document.getElementById('netReturnFiat').textContent = '$' + netReturn.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('netIncomeFiat').textContent = '$' + netIncome.toLocaleString(undefined, {minimumFractionDigits: 2});
                
                const netIncomeAsset = AppState.btcPrice > 0 ? netIncome / AppState.btcPrice : 0;
                document.getElementById('netIncomeAsset').textContent = netIncomeAsset.toFixed(6) + ' ' + AppState.userAsset.toUpperCase();
            }

                if (AppState.isProcessing) return;
                
                const amount = parseFloat(document.getElementById('investmentAmount').value) || 0;
                const token = localStorage.getItem('jwtToken');
                
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to continue');
                    return;
                }
                
                // Final validation
                if (amount < AppState.minAmount || amount > AppState.maxAmount || amount > AppState.selectedBalanceAmount) {
                    showNotification('error', 'Invalid Amount', 'Please check your investment amount');
                    return;
                }
                
                AppState.isProcessing = true;
                const investBtn = document.getElementById('investButton');
                const statusEl = document.getElementById('investmentStatus');
                
                investBtn.disabled = true;
                investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                statusEl.textContent = 'Creating your cloud mining investment...';
                statusEl.style.color = 'var(--primary)';
                
                try {
                    // EXACT SAME ENDPOINT AS MODALS - /api/investments
                    const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            planId: AppState.planId,
                            amount: amount,
                            balanceType: AppState.selectedBalance,
                            sessionKey: AppState.sessionKey,
                            refCode: AppState.refCode
                        })
                    });

                    try {
                        responseData = await response.json();

                        statusEl.style.color = 'var(--success)';
                        
                        showNotification('success', 'Investment Successful', 
                            `Your cloud mining investment of $${amount.toLocaleString()} has been created.`);
                        
                        // AUTO-REDIRECT BACK TO INDEX.HTML AFTER 2 SECONDS
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        throw new Error(responseData.message || 'Investment failed');
                    }
                    
                } catch (error) {
                    console.error('Investment error:', error);
                    statusEl.textContent = error.message || 'Investment failed';
                    statusEl.style.color = 'var(--error)';
                    investBtn.disabled = false;
                    investBtn.innerHTML = '<i class="fas fa-cloud"></i> Start Cloud Mining';
                    
                    showNotification('error', 'Investment Failed', error.message);
                    
                } finally {
                    AppState.isProcessing = false;
                }
            }
            
            // =============================================
            // NOTIFICATION SYSTEM
            // =============================================
            function showNotification(type, title, message, duration = 5000) {
                const container = document.getElementById('notificationCenter');
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                
                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <button class="notification-close">&times;</button>
                `;
                
                container.appendChild(notification);
                
                // Trigger animation
                setTimeout(() => notification.classList.add('show'), 10);
                
                // Close button
                notification.querySelector('.notification-close').addEventListener('click', () => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                });
                
                // Auto remove
                if (duration > 0) {
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.classList.remove('show');
                            setTimeout(() => notification.remove(), 300);
                        }
                    }, duration);
                }
            }
            
            // =============================================
            // INITIALIZATION
            // =============================================
            async function init() {
                // Hide loading overlay after content is ready
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 800);
                
                // Parse URL parameters
                if (!parseURLParameters()) return;
                
                // Show loading while fetching data
                document.getElementById('loadingOverlay').classList.remove('hidden');
                document.getElementById('loadingOverlay').querySelector('.loading-text').textContent = 'Loading your account...';
                
                // Fetch user data
                await fetchUserData();
                
                // Render the page
                renderPage();
                
                // Hide loading
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 500);
            }
            
            // Start the application
            init();
        })();
    </script>
</body>
</html>
