<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Cloud Mining Investment | BitHash Capital</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .investment-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header - Minimal, just back button and plan name */
        .investment-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-light);
        }

        .back-button {
            background: transparent;
            border: 1px solid var(--gray-light);
            color: var(--dark);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .back-button:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--darker);
            transform: translateX(-3px);
        }

        .plan-title-section {
            flex: 1;
        }

        .plan-title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.25rem;
        }

        .plan-title-section .plan-subtitle {
            color: var(--gray);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .plan-subtitle span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .plan-subtitle i {
            color: var(--primary);
            font-size: 0.8rem;
        }

        /* Notification System */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 350px;
        }

        .notification {
            padding: 16px 20px;
            border-radius: var(--border-radius);
            background: var(--darker);
            border-left: 4px solid;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(100%);
            opacity: 0;
            animation: slideIn 0.3s forwards;
            pointer-events: auto;
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.success i {
            color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        .notification.error i {
            color: var(--error);
        }

        @keyframes slideIn {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification i {
            font-size: 1.5rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .notification-close {
            background: transparent;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: var(--transition);
        }

        .notification-close:hover {
            color: var(--dark);
            transform: rotate(90deg);
        }

        /* Main Grid Layout - Smooth and Clean */
        .investment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Left Column - Plan Details & Miner Specs */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section {
            background: rgba(255,255,255,0.02);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--dark);
        }

        .section-title i {
            color: var(--primary);
            font-size: 1rem;
        }

        /* Plan Specs Grid */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .spec-item {
            background: rgba(255,255,255,0.03);
            border-radius: var(--border-radius);
            padding: 1rem;
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .spec-value.highlight {
            color: var(--success);
        }

        /* Miner Display */
        .miner-display {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .miner-image {
            width: 120px;
            height: 120px;
            background: var(--lighter);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .miner-specs {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .miner-spec-item {
            background: rgba(255,255,255,0.03);
            border-radius: var(--border-radius);
            padding: 0.75rem;
        }

        .miner-spec-label {
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 0.25rem;
        }

        .miner-spec-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Right Column - Investment Form */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Balance Selection */
        .balance-options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .balance-option {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--border-radius);
            padding: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .balance-option:hover {
            background: rgba(255,255,255,0.05);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0,216,255,0.1);
        }

        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .balance-option-label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            color: var(--gray);
        }

        .balance-amount-fiat {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .balance-amount-asset {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .balance-amount-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        /* Investment Form */
        .investment-form {
            background: rgba(255,255,255,0.02);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .amount-input-container {
            position: relative;
        }

        .amount-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            color: var(--dark);
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            transition: var(--transition);
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,216,255,0.1);
        }

        .amount-input.error {
            border-color: var(--error);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            min-height: 20px;
        }

        .range-indicator {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--gray);
        }

        /* Return Display */
        .return-display {
            background: rgba(40,167,69,0.1);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(40,167,69,0.2);
        }

        .return-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        .return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--gray);
        }

        .return-asset img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Invest Button */
        .invest-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: var(--border-radius);
            color: var(--darker);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,216,255,0.3);
        }

        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .invest-button i {
            font-size: 1rem;
        }

        .investment-status {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 20px;
        }

        /* TradingView Chart */
        .chart-section {
            margin-top: 1rem;
        }

        .tradingview-container {
            width: 100%;
            height: 200px;
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;
            visibility: visible;
            transition: 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .investment-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .investment-container {
                padding: 1rem;
            }

            .specs-grid {
                grid-template-columns: 1fr;
            }

            .miner-display {
                flex-direction: column;
                text-align: center;
            }

            .miner-specs {
                width: 100%;
            }

            .balance-options {
                flex-direction: column;
            }

            .plan-title-section h1 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .investment-header {
                flex-wrap: wrap;
            }

            .return-fiat {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        // =============================================

        // =============================================
        let currentPlan = null;
        let userBalances = { main: 0, matured: 0 };
        let userPreferences = { displayAsset: 'btc' };

        // =============================================
        // URL HANDLING - Complex, non-crackable URLs
        // =============================================
        function generateComplexId(planId) {
            // Generate a complex, non-guessable ID
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2, 15);
            const hash = btoa(`${planId}-${timestamp}-${random}-${Math.random().toString(36)}`).replace(/=/g, '');
            return `${hash}-${planId}`;
        }

        function getPlanIdFromUrl() {
            const path = window.location.pathname;
            const parts = path.split('/');
            const complexId = parts[parts.length - 1];
            
            if (!complexId || complexId === 'cloudmining.html') {
                return null;
            }
            
            // Extract actual plan ID from complex ID
            const lastDash = complexId.lastIndexOf('-');
            if (lastDash === -1) return null;
            
            return complexId.substring(lastDash + 1);
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message) {
            const container = document.getElementById('notification-center');
            const id = 'notif-' + Date.now() + Math.random();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.id = id;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <button class="notification-close" onclick="document.getElementById('${id}').remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) el.remove();
            }, 5000);
        }

        // =============================================
        // API CALLS
        // =============================================
        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem('jwtToken');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || `API call failed: ${response.status}`);
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // =============================================
        // LOAD PLAN DATA
        // =============================================
        async function loadPlanData() {
            try {
                const planId = getPlanIdFromUrl();
                
                if (!planId) {
                    showNotification('error', 'Invalid URL', 'No plan specified');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                    return;
                }
                
                // Fetch plan details
                const response = await fetch(`${API_BASE}/plans`, {
                    headers: localStorage.getItem('jwtToken') ? {
                        'Authorization': `Bearer ${localStorage.getItem('jwtToken')}`
                    } : {}
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load plans');
                }
                
                const data = await response.json();
                const plans = data.data?.plans || [];
                
                // Find the plan
                currentPlan = plans.find(p => p.id === planId);
                
                if (!currentPlan) {
                    showNotification('error', 'Plan Not Found', 'The requested investment plan does not exist');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                    return;
                }
                
                // Determine plan index for miner selection
                const planIndex = plans.findIndex(p => p.id === planId);
                
                // Update UI with plan details
                updatePlanUI(planIndex);
                
                // Load balances if logged in
                await loadUserBalances();
                
                // Show content
                document.getElementById('investment-grid').style.opacity = '1';
                document.getElementById('loading-overlay').classList.add('hidden');
                
                // Initialize chart
                initTradingViewChart();
                
            } catch (error) {
                console.error('Error loading plan:', error);
                showNotification('error', 'Loading Failed', error.message);
                
                document.getElementById('plan-name').textContent = 'Error Loading Plan';
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        function updatePlanUI(planIndex) {
            if (!currentPlan) return;
            
            const miner = MINERS[Math.min(planIndex, MINERS.length - 1)];
            const planName = PLAN_NAMES[Math.min(planIndex, PLAN_NAMES.length - 1)];
            
            // Update header
            document.getElementById('plan-name').textContent = `${planName} Plan`;
            
            // Update specs
            const specsGrid = document.getElementById('plan-specs');
            specsGrid.innerHTML = `
                <div class="spec-item">
                    <div class="spec-label">Investment Range</div>
                    <div class="spec-value">$${currentPlan.minAmount.toLocaleString()} - $${currentPlan.maxAmount.toLocaleString()}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Return Rate</div>
                    <div class="spec-value highlight">+${currentPlan.percentage}%</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Duration</div>
                    <div class="spec-value">${currentPlan.duration} hours</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Company Fee</div>
                    <div class="spec-value">3% upon maturity</div>
                </div>
            `;
            
            // Update miner details
            const minerDisplay = document.getElementById('miner-details');
            minerDisplay.innerHTML = `
                <div class="miner-image">
                    <img src="${miner.image}" alt="${miner.name}" 
                         onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                </div>
                <div class="miner-specs">
                    <div class="miner-spec-item">
                        <div class="miner-spec-label">Model</div>
                        <div class="miner-spec-value">${miner.name}</div>
                    </div>
                    <div class="miner-spec-item">
                        <div class="miner-spec-label">Hash Rate</div>
                        <div class="miner-spec-value">${miner.hashRate}</div>
                    </div>
                    <div class="miner-spec-item">
                        <div class="miner-spec-label">Power</div>
                        <div class="miner-spec-value">${miner.power}</div>
                    </div>
                    <div class="miner-spec-item">
                        <div class="miner-spec-label">Efficiency</div>
                        <div class="miner-spec-value">${miner.efficiency}</div>
                    </div>
                </div>
            `;
            
            // Update range indicator
            document.getElementById('min-amount').textContent = currentPlan.minAmount.toLocaleString();
            document.getElementById('max-amount').textContent = currentPlan.maxAmount.toLocaleString();
            
            // Set input attributes
            const amountInput = document.getElementById('investment-amount');
            amountInput.min = currentPlan.minAmount;
            amountInput.max = currentPlan.maxAmount;
        }

        async function loadUserBalances() {
            const token = localStorage.getItem('jwtToken');
            
            if (!token) {
                document.getElementById('balance-options').innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--gray);">
                        <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>Please login to invest</p>
                        <button class="invest-button" style="width: auto; margin-top: 1rem;" onclick="window.location.href='login'">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </div>
                `;
                return;
            }
            
            try {
                const data = await apiCall('/users/balances');
                userBalances.main = data.data?.balances?.main || 0;
                userBalances.matured = data.data?.balances?.matured || 0;
                
                // Load preferences
                try {
                    const prefs = await apiCall('/users/preferences');
                    userPreferences.displayAsset = prefs.data?.preferences?.displayAsset || 'btc';
                } catch (e) {
                    console.warn('Could not load preferences:', e);
                }
                
                updateBalanceOptions();
                
            } catch (error) {
                console.error('Error loading balances:', error);
                showNotification('error', 'Balance Error', 'Could not load your balances');
            }
        }

        function updateBalanceOptions() {
            const container = document.getElementById('balance-options');
            const minAmount = currentPlan.minAmount;
            
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const price = currentBTCPrice; // In production, fetch from real-time API
            
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            container.innerHTML = `
                <div class="balance-option ${userBalances.main >= minAmount ? '' : 'disabled'}" 
                     data-balance="main" data-amount="${userBalances.main}"
                     onclick="selectBalance('main', ${userBalances.main})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Main Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}" style="width: 16px; height: 16px; border-radius: 50%;">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${userBalances.main.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}" style="width: 14px; height: 14px; border-radius: 50%;">
                        <span>${mainAssetAmount.toFixed(6)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-option ${userBalances.matured >= minAmount ? '' : 'disabled'}" 
                     data-balance="matured" data-amount="${userBalances.matured}"
                     onclick="selectBalance('matured', ${userBalances.matured})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Matured Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}" style="width: 16px; height: 16px; border-radius: 50%;">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${userBalances.matured.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}" style="width: 14px; height: 14px; border-radius: 50%;">
                        <span>${maturedAssetAmount.toFixed(6)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
            
            // Auto-select main balance if sufficient
            if (userBalances.main >= minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        // =============================================
        // BALANCE SELECTION
        // =============================================
        window.selectBalance = function(type, amount) {
            if (amount < currentPlan.minAmount) return;
            
            selectedBalance = type;
            selectedBalanceAmount = amount;
            
            // Update UI
            document.querySelectorAll('.balance-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            const selectedOpt = document.querySelector(`.balance-option[data-balance="${type}"]`);
            if (selectedOpt) {
                selectedOpt.classList.add('selected');
            }
            
            // Enable input and set min amount
            const amountInput = document.getElementById('investment-amount');
            amountInput.disabled = false;
            amountInput.value = currentPlan.minAmount;
            amountInput.max = Math.min(currentPlan.maxAmount, amount);
            
            // Enable invest button if amount is valid
            validateAmount(currentPlan.minAmount);
            
            // Update return
            updateExpectedReturn(currentPlan.minAmount);
        };

        // =============================================
        // AMOUNT VALIDATION
        // =============================================
        document.getElementById('investment-amount').addEventListener('input', function(e) {
            const amount = parseFloat(e.target.value) || 0;
            validateAmount(amount);
            updateExpectedReturn(amount);
        });

        function validateAmount(amount) {
            const errorElement = document.getElementById('amount-error');
            const investButton = document.getElementById('invest-button');
            const amountInput = document.getElementById('investment-amount');
            
            errorElement.textContent = '';
            amountInput.classList.remove('error');
            
            if (!selectedBalance) {
                errorElement.textContent = 'Please select a balance first';
                investButton.disabled = true;
                return false;
            }
            
            if (isNaN(amount) || amount <= 0) {
                errorElement.textContent = 'Please enter a valid amount';
                amountInput.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount < currentPlan.minAmount) {
                errorElement.textContent = `Minimum investment is $${currentPlan.minAmount.toLocaleString()}`;
                amountInput.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount > currentPlan.maxAmount) {
                errorElement.textContent = `Maximum investment is $${currentPlan.maxAmount.toLocaleString()}`;
                amountInput.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount > selectedBalanceAmount) {
                const formattedBalance = selectedBalanceAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                errorElement.textContent = `Insufficient balance. Available: $${formattedBalance}`;
                amountInput.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            investButton.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            if (!currentPlan || amount <= 0) {
                document.getElementById('return-fiat').textContent = '$0.00';
                return;
            }
            
            // Calculate return (net after 3% fee)
            const fee = amount * 0.03;
            const netAmount = amount - fee;
            const totalReturn = netAmount + (netAmount * currentPlan.percentage / 100);
            
            document.getElementById('return-fiat').textContent = `$${totalReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // Update asset display
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const price = currentBTCPrice;
            
            if (price > 0) {
                const assetAmount = totalReturn / price;
                document.getElementById('return-asset-logo').style.display = 'inline-block';
                document.getElementById('return-asset-logo').src = assetLogo;
                document.getElementById('return-asset-text').textContent = `${assetAmount.toFixed(6)} ${asset.toUpperCase()}`;
            }
        }

        // =============================================
        // INVESTMENT SUBMISSION
        // =============================================
        document.getElementById('invest-button').addEventListener('click', async function() {
            if (isProcessing) return;
            
            const amount = parseFloat(document.getElementById('investment-amount').value);
            
            if (!validateAmount(amount)) return;
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest');
                setTimeout(() => {
                    window.location.href = 'login';
                }, 1500);
                return;
            }
            
            isProcessing = true;
            const button = this;
            const originalText = button.innerHTML;
            const statusElement = document.getElementById('investment-status');
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            button.disabled = true;
            statusElement.textContent = 'Creating your cloud mining investment...';
            statusElement.style.color = 'var(--primary)';
            
            try {
                // Call the same endpoint as the modal
                const response = await fetch(`${API_BASE}/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: currentPlan.id,
                        amount: parseFloat(amount),
                        balanceType: selectedBalance
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Success - show green notification
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${amount.toLocaleString()} has been created`);
                    
                    statusElement.textContent = 'Investment successful! Redirecting...';
                    statusElement.style.color = 'var(--success)';
                    
                    // Redirect to main page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                
                // Show red error notification
                showNotification('error', 'Investment Failed', error.message);
                
                statusElement.textContent = error.message || 'Failed to create investment';
                statusElement.style.color = 'var(--error)';
                
                button.innerHTML = originalText;
                button.disabled = false;
            } finally {
                isProcessing = false;
            }
        });

        // =============================================
        // TRADINGVIEW CHART
        // =============================================
        function initTradingViewChart() {
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BITSTAMP:BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview-chart",
                    "hide_side_toolbar": true,
                    "studies": ["Volume@tv-basicstudies"]
                });
            }
        }

        // =============================================
        // NAVIGATION
        // =============================================
        window.goBack = function() {
            window.location.href = '/';
        };

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Generate complex URL if needed
            const urlParams = new URLSearchParams(window.location.search);
            const planParam = urlParams.get('plan');
            
            if (planParam && !getPlanIdFromUrl()) {
                // Redirect to complex URL
                const complexId = generateComplexId(planParam);
                window.history.replaceState({}, '', `/cloudmining/${complexId}`);
            }
            
            // Load plan data
            loadPlanData();
        });

        // Prevent double investment with back button
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
