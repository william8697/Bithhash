        let userPreferences = { displayAsset: 'btc' };
        let currentPrices = {};
        let currentBTCPrice = 43000;
        let selectedBalance = null;
        let selectedBalanceAmount = 0;
        let investmentInProgress = false;

        // Top assets for price data
        const TOP_ASSETS = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin' },
            { id: 'ethereum', symbol: 'eth', name: 'Ethereum' },
            { id: 'tether', symbol: 'usdt', name: 'Tether' },
            { id: 'binancecoin', symbol: 'bnb', name: 'BNB' },
            { id: 'solana', symbol: 'sol', name: 'Solana' }
        ];

        // =============================================
        // URL PARSING - RESPECT SESSION-BASED URL
        // =============================================
        function parseURLParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Get session and ref parameters (as in index redirect)
            const session = urlParams.get('session');
            const v = urlParams.get('v');
            const ref = urlParams.get('ref');
            
            // Get plan details
            planData.id = urlParams.get('plan');
            planData.name = urlParams.get('name') || 'Basic';
            planData.minAmount = parseFloat(urlParams.get('min')) || 50;
            planData.maxAmount = parseFloat(urlParams.get('max')) || 1000;
            planData.percentage = parseFloat(urlParams.get('percentage')) || 5;
            planData.duration = parseInt(urlParams.get('duration')) || 24;
            
            // Map plan name to index for miner selection
            const planNames = ["Basic", "Standard", "Pro", "Enterprise", "Ultimate", "Institutional"];
            let planIndex = planNames.findIndex(name => 
                name.toLowerCase() === planData.name?.toLowerCase()
            );
            if (planIndex === -1) planIndex = 0;
            
            // Store plan index for miner selection
            planData.index = planIndex;
            
            // Log for debugging (remove in production)
            console.log('URL Parameters:', { session, v, ref, plan: planData });
            
            // Update UI
            document.getElementById('plan-name').textContent = planData.name;
            document.getElementById('plan-id').textContent = planData.id || 'N/A';
            document.getElementById('plan-duration').textContent = planData.duration;
            document.getElementById('plan-percentage').textContent = planData.percentage;
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        const notificationQueue = [];
        let isNotificationShowing = false;

        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) {
                processNotificationQueue();
            }
        }

        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }

            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close"><i class="fas fa-times"></i></div>
            `;

            document.getElementById('notification-center').appendChild(notification);
            
            requestAnimationFrame(() => notification.classList.add('show'));

            notification.querySelector('.notification-close').addEventListener('click', () => {
                closeNotification(notification);
            });

            if (duration > 0) {
                setTimeout(() => {
                    if (notification.parentNode) {
                        closeNotification(notification);
                    }
                }, duration);
            }
        }

        function closeNotification(notification) {
            notification.classList.remove('show');
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
                processNotificationQueue();
            }, 300);
        }

        // =============================================
        // AUTH & BALANCE FETCHING
        // =============================================
        async function checkAuth() {
            const token = localStorage.getItem('jwtToken');
            const userInfo = document.getElementById('user-info');
            
            if (!token) {
                userInfo.innerHTML = `
                    <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
                    <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
                `;
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    await fetchBalances(token);
                    await fetchUserPreferences(token);
                    return true;
                } else {
                    localStorage.removeItem('jwtToken');
                    userInfo.innerHTML = `
                        <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
                        <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
                    `;
                    return false;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                return false;
            }
        }

        async function fetchBalances(token) {
            try {
                const response = await fetch(`${API_BASE}/api/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    
                    // Update UI
                    document.getElementById('main-balance').style.display = 'flex';
                    updateBalancesDisplay();
                    
                    // Render balance options
                    renderBalanceOptions();
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
            }
        }

        async function fetchUserPreferences(token) {
            try {
                const response = await fetch(`${API_BASE}/api/users/preferences`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                    updateBalancesDisplay();
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    currentBTCPrice = data.bitcoin.usd;
                    currentPrices.bitcoin = { usd: currentBTCPrice };
                    updateBalancesDisplay();
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
            }
        }

        function getAssetLogo(symbol) {
            return ASSET_LOGOS[symbol.toLowerCase()] || ASSET_LOGOS.btc;
        }

        function updateBalancesDisplay() {
            const asset = userPreferences.displayAsset;
            const assetData = TOP_ASSETS.find(a => a.symbol === asset) || TOP_ASSETS[0];
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            document.getElementById('main-asset-logo').src = assetLogo;
            document.getElementById('main-asset-amount').textContent = formatNumber(mainAssetAmount);
            document.getElementById('main-asset-symbol').textContent = asset.toUpperCase();
            
            // Update return asset logo
            document.getElementById('return-asset-logo').src = assetLogo;
            document.getElementById('return-asset-logo').style.display = 'inline-block';
        }

        function formatNumber(num) {
            const n = parseFloat(num) || 0;
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
            return n.toFixed(6);
        }

        function formatUSD(num) {
            const n = parseFloat(num) || 0;
            return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // =============================================
        // BALANCE OPTIONS RENDERING
        // =============================================
        function renderBalanceOptions() {
            const container = document.getElementById('balance-selection');
            const asset = userPreferences.displayAsset;
            const assetData = TOP_ASSETS.find(a => a.symbol === asset) || TOP_ASSETS[0];
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            const mainFormatted = userBalances.main.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const maturedFormatted = userBalances.matured.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            const minAmount = planData.minAmount;
            
            container.innerHTML = `
                <div class="balance-option ${userBalances.main >= minAmount ? '' : 'disabled'}" data-balance="main" data-amount="${userBalances.main}" onclick="selectBalance('main', ${userBalances.main})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Main Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}" class="balance-option-asset-logo">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${mainFormatted}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}" class="balance-amount-asset-logo">
                        <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-option ${userBalances.matured >= minAmount ? '' : 'disabled'}" data-balance="matured" data-amount="${userBalances.matured}" onclick="selectBalance('matured', ${userBalances.matured})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Matured Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}" class="balance-option-asset-logo">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${maturedFormatted}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}" class="balance-amount-asset-logo">
                        <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
            
            // Auto-select if one balance qualifies
            if (userBalances.main >= minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        window.selectBalance = function(type, amount) {
            document.querySelectorAll('.balance-option').forEach(opt => opt.classList.remove('selected'));
            
            const selectedOption = document.querySelector(`.balance-option[data-balance="${type}"]`);
            if (selectedOption && !selectedOption.classList.contains('disabled')) {
                selectedOption.classList.add('selected');
                selectedBalance = type;
                selectedBalanceAmount = amount;
                
                const input = document.getElementById('investment-amount');
                input.value = planData.minAmount;
                input.min = planData.minAmount;
                input.max = Math.min(planData.maxAmount, amount);
                
                validateAmount();
                updateExpectedReturn();
                updateInvestButton();
            }
        };

        // =============================================
        // INVESTMENT FORM LOGIC
        // =============================================
        function validateAmount() {
            const input = document.getElementById('investment-amount');
            const error = document.getElementById('amount-error');
            const amount = parseFloat(input.value) || 0;
            
            if (amount < planData.minAmount) {
                error.textContent = `Minimum investment is $${planData.minAmount.toLocaleString()}`;
                return false;
            }
            if (amount > planData.maxAmount) {
                error.textContent = `Maximum investment is $${planData.maxAmount.toLocaleString()}`;
                return false;
            }
            if (selectedBalance && amount > selectedBalanceAmount) {
                error.textContent = `Insufficient balance. Available: $${selectedBalanceAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                return false;
            }
            
            error.textContent = '';
            return true;
        }

        function updateExpectedReturn() {
            const amount = parseFloat(document.getElementById('investment-amount').value) || 0;
            const fee = amount * 0.03; // 3% company fee
            const netAmount = amount - fee;
            const totalReturn = netAmount + (netAmount * planData.percentage / 100);
            
            document.getElementById('return-fiat').textContent = formatUSD(totalReturn);
            
            const asset = userPreferences.displayAsset;
            const assetData = TOP_ASSETS.find(a => a.symbol === asset) || TOP_ASSETS[0];
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            if (price > 0) {
                const assetAmount = totalReturn / price;
                document.getElementById('return-asset-text').textContent = `${formatNumber(assetAmount)} ${asset.toUpperCase()}`;
            }
        }

        function updateInvestButton() {
            const btn = document.getElementById('invest-btn');
            const isValid = validateAmount();
            btn.disabled = !isValid || !selectedBalance || investmentInProgress;
        }

        // =============================================
        // MINER DETAILS RENDERING
        // =============================================
        function renderMinerDetails() {
            const miner = MINERS[planData.index] || MINERS[0];
            
            document.getElementById('miner-image').querySelector('img').src = miner.image;
            document.getElementById('miner-model').textContent = miner.name;
            document.getElementById('miner-hashrate').textContent = miner.hashRate;
            document.getElementById('miner-power').textContent = miner.power;
            document.getElementById('miner-efficiency').textContent = miner.efficiency;
            document.getElementById('miner-year').textContent = miner.year;
        }

        // =============================================
        // TRADINGVIEW CHART
        // =============================================
        function initTradingView() {
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "width": "100%",
                    "height": "200",
                    "symbol": "BITSTAMP:BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview-chart",
                    "hide_side_toolbar": true,
                    "studies": ["Volume@tv-basicstudies"],
                    "show_popup_button": false,
                    "withdateranges": false
                });
            }
        }

        // =============================================
        // INVESTMENT SUBMISSION
        // =============================================
        async function submitInvestment() {
            if (!validateAmount()) return;
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }
            
            const amount = parseFloat(document.getElementById('investment-amount').value);
            const statusEl = document.getElementById('investment-status');
            const btn = document.getElementById('invest-btn');
            
            investmentInProgress = true;
            updateInvestButton();
            
            statusEl.innerHTML = '<span class="inline-spinner"></span> Processing investment...';
            statusEl.style.color = '#00D8FF';
            
            try {
                const response = await fetch(`${API_BASE}/api/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: planData.id,
                        amount: amount,
                        balanceType: selectedBalance
                    })
                });
                
                const responseData = await response.json().catch(() => ({}));
                
                if (response.ok) {
                    statusEl.textContent = 'Investment successful! Redirecting...';
                    statusEl.style.color = '#28a745';
                    
                    showNotification('success', 'Investment Successful', 
                        `Your investment of $${amount.toLocaleString()} has been created successfully.`);
                    
                    // Redirect back to index after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(responseData.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                statusEl.textContent = error.message;
                statusEl.style.color = '#dc3545';
                showNotification('error', 'Investment Failed', error.message);
                
                investmentInProgress = false;
                updateInvestButton();
            }
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        async function init() {
            // Parse URL parameters first
            parseURLParameters();
            
            // Check authentication
            const isAuthenticated = await checkAuth();
            
            if (!isAuthenticated) {
                document.getElementById('loading-text').textContent = 'Redirecting to login...';
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            // Fetch BTC price
            await fetchBTCPrice();
            
            // Render miner details
            renderMinerDetails();
            
            // Initialize TradingView
            initTradingView();
            
            // Set up event listeners
            const amountInput = document.getElementById('investment-amount');
            amountInput.addEventListener('input', () => {
                validateAmount();
                updateExpectedReturn();
                updateInvestButton();
            });
            
            document.getElementById('invest-btn').addEventListener('click', submitInvestment);
            
            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 800);
        }

        // Start the application
        init();
    </script>
</body>
</html>
