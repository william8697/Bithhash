<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Mining Investment · BitHash</title>
    <!-- same theme as index.html – no title/logo, pure investment panel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --success: #28a745;
            --error: #dc3545;
            --warning: #FFB800;
            --border-radius: 12px;
        }

        .investment-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
        }

        /* smooth card-less design - like Binance/Bybit */
        .plan-header {
            margin-bottom: 2rem;
        }

        .plan-category {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .plan-category i {
            font-size: 1rem;
        }

        .plan-name {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .plan-subtitle {
            color: var(--gray);
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 1.5rem;
        }

        /* specs row - clean and minimal */
        .specs-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem 3rem;
            margin: 2rem 0;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .spec-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--gray);
            letter-spacing: 0.3px;
        }

        .spec-value {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .spec-value small {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--gray);
            margin-left: 0.25rem;
        }

        .spec-value.positive {
            color: var(--success);
        }

        /* balance selection - smooth background only on hover/active */
        .balance-section {
            margin: 2.5rem 0 1.5rem;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .section-label i {
            color: var(--primary);
        }

        .balance-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            background: transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            margin-bottom: 0.5rem;
        }

        .balance-option:hover {
            background: rgba(0, 216, 255, 0.05);
            border-color: rgba(0, 216, 255, 0.2);
        }

        .balance-option.selected {
            background: rgba(0, 216, 255, 0.08);
            border-color: var(--primary);
        }

        .balance-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .balance-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .balance-name {
            font-weight: 600;
        }

        .balance-asset {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .balance-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .balance-fiat {
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* investment input - clean, no borders */
        .input-wrapper {
            margin: 1.5rem 0 0.5rem;
        }

        .amount-input-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 0.25rem 0.25rem 0.25rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .amount-input-container:focus-within {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.05);
        }

        .amount-input-container span {
            color: var(--gray);
            font-weight: 500;
            margin-right: 0.5rem;
        }

        .amount-input-container input {
            background: transparent;
            border: none;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
            width: 1px;
            flex: 1;
            min-width: 100px;
        }

        .amount-input-container input:focus {
            outline: none;
        }

        .amount-input-container input[type="number"]::-webkit-inner-spin-button,
        .amount-input-container input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-hints {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.75rem 0.5rem 0;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .range-hint {
            display: flex;
            gap: 1rem;
        }

        .max-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .max-btn:hover {
            background: rgba(0, 216, 255, 0.1);
        }

        .max-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin: 0.5rem 1rem 0;
            min-height: 1.2rem;
        }

        /* return display - subtle green panel */
        .return-preview {
            background: rgba(40, 167, 69, 0.08);
            border-radius: 28px;
            padding: 1.25rem 1.75rem;
            margin: 1.5rem 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--success);
        }

        .return-label {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .return-value {
            text-align: right;
        }

        .return-fiat {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            line-height: 1.2;
        }

        .return-asset {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        .return-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        /* action button */
        .invest-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: #0A0E17;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 216, 255, 0.2);
            margin-top: 0.5rem;
        }

        .invest-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 216, 255, 0.35);
        }

        .invest-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .back-link {
            margin-top: 2rem;
            text-align: center;
        }

        .back-link a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        /* notification system - same as index */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 350px;
            pointer-events: none;
        }

        .notification {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(30px);
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.success {
            background: #d4edda;
            color: #1a1a1a;
            border-left: 4px solid #28a745;
        }

        .notification.error {
            background: rgba(220, 53, 69, 0.95);
            color: white;
            border-left: 4px solid #bd2130;
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .notification-close {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .notification-close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="investment-container" id="investmentContainer">
        <!-- dynamic content will be injected here -->
    </div>

    <div class="notification-center" id="notificationCenter"></div>

    <script>
        (function() {
            // =============================================
            // COMPLETE CLOUD MINING INVESTMENT PANEL
            // ALL FEATURES FROM MODALS, SAME BACKEND ENDPOINTS
            // NO PLACEHOLDERS, FULLY FUNCTIONAL
            // =============================================

            const API_BASE = 'https://bithash-backend.onrender.com/api';
            const token = localStorage.getItem('jwtToken');

            // Asset logos for display
            const ASSET_LOGOS = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
                usdc: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png'
            };

            // Global state
            let planData = null;                // current plan details from URL
            let userBalances = { main: 0, matured: 0 };
            let userPreferences = { displayAsset: 'btc' };
            let btcPrice = 43000;                // fallback
            let selectedBalanceType = null;       // 'main' or 'matured'
            let investmentInProgress = false;

            // DOM elements
            const container = document.getElementById('investmentContainer');
            const notifCenter = document.getElementById('notificationCenter');

            // =============================================
            // HELPER FUNCTIONS
            // =============================================

            function getAssetLogo(symbol) {
                return ASSET_LOGOS[symbol?.toLowerCase()] || ASSET_LOGOS.btc;
            }

            function formatNumber(num, decimals = 6) {
                if (num === undefined || num === null) return '0.00';
                return parseFloat(num).toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: decimals
                });
            }

            function formatUSD(num) {
                if (num === undefined || num === null) return '$0.00';
                return '$' + parseFloat(num).toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            // =============================================
            // NOTIFICATION SYSTEM (same as index)
            // =============================================

            function showNotification(type, title, message, duration = 5000) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                
                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <div class="notification-close">&times;</div>
                `;

                notifCenter.appendChild(notification);

                // Trigger animation
                setTimeout(() => notification.classList.add('show'), 10);

                // Close button
                notification.querySelector('.notification-close').addEventListener('click', () => {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                });

                // Auto close
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.classList.remove('show');
                        setTimeout(() => notification.remove(), 300);
                    }
                }, duration);

                // Vibrate on error
                if (type === 'error' && navigator.vibrate) {
                    navigator.vibrate(200);
                }
            }

            // =============================================
            // FETCH USER DATA (BALANCES + PREFERENCES)
            // =============================================

            async function fetchUserData() {
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please log in to continue');
                    setTimeout(() => window.location.href = 'login', 2000);
                    return false;
                }

                try {
                    // Fetch balances
                    const balResponse = await fetch(`${API_BASE}/users/balances`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!balResponse.ok) {
                        if (balResponse.status === 401) {
                            localStorage.removeItem('jwtToken');
                            showNotification('error', 'Session Expired', 'Please log in again');
                            setTimeout(() => window.location.href = 'login', 2000);
                            return false;
                        }
                        throw new Error('Failed to fetch balances');
                    }

                    const balData = await balResponse.json();
                    userBalances.main = balData.data?.balances?.main || 0;
                    userBalances.matured = balData.data?.balances?.matured || 0;

                    // Fetch preferences
                    const prefResponse = await fetch(`${API_BASE}/users/preferences`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (prefResponse.ok) {
                        const prefData = await prefResponse.json();
                        userPreferences.displayAsset = prefData.data?.preferences?.displayAsset || 'btc';
                    }

                    // Fetch BTC price for conversion
                    try {
                        const priceResponse = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                        if (priceResponse.ok) {
                            const priceData = await priceResponse.json();
                            btcPrice = priceData.bitcoin.usd;
                        }
                    } catch (e) {
                        console.warn('Using fallback BTC price');
                    }

                    return true;

                } catch (error) {
                    console.error('Error fetching user data:', error);
                    showNotification('error', 'Connection Error', 'Failed to load account data');
                    return false;
                }
            }

            // =============================================
            // PARSE PLAN FROM URL (same parameters as modal)
            // =============================================

            function parsePlanFromURL() {
                const params = new URLSearchParams(window.location.search);
                
                try {
                    planData = {
                        id: params.get('id'),
                        name: params.get('name') || 'Cloud Mining Plan',
                        minAmount: parseFloat(params.get('min')),
                        maxAmount: parseFloat(params.get('max')),
                        percentage: parseFloat(params.get('perc')),
                        duration: parseFloat(params.get('dur')),
                        index: parseInt(params.get('idx') || '0')
                    };

                    // Validate required fields
                    if (!planData.id || isNaN(planData.minAmount) || isNaN(planData.maxAmount) || 
                        isNaN(planData.percentage) || isNaN(planData.duration)) {
                        throw new Error('Invalid plan parameters');
                    }

                    return true;
                } catch (error) {
                    console.error('Error parsing plan:', error);
                    showNotification('error', 'Invalid Plan', 'No valid mining plan selected');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                    return false;
                }
            }

            // =============================================
            // RENDER COMPLETE INVESTMENT PANEL
            // =============================================

            function renderPanel() {
                if (!planData) return;

                const asset = userPreferences.displayAsset;
                const assetLogo = getAssetLogo(asset);
                const price = btcPrice; // using BTC as base for asset conversion

                // Calculate asset amounts for display
                const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
                const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;

                // Determine which balances are usable
                const mainUsable = userBalances.main >= planData.minAmount;
                const maturedUsable = userBalances.matured >= planData.minAmount;

                // Set default selected balance if none selected
                if (!selectedBalanceType) {
                    if (mainUsable) selectedBalanceType = 'main';
                    else if (maturedUsable) selectedBalanceType = 'matured';
                }

                const selectedAmount = selectedBalanceType === 'main' ? userBalances.main : 
                                      (selectedBalanceType === 'matured' ? userBalances.matured : 0);

                // Build HTML - completely smooth, no boxes/borders
                container.innerHTML = `
                    <div class="plan-header">
                        <div class="plan-category">
                            <i class="fas fa-cloud"></i>
                            <span>BITCOIN CLOUD MINING</span>
                        </div>
                        <h1 class="plan-name">${planData.name}</h1>
                        <div class="plan-subtitle">SHA-256 ASIC · ${planData.duration}h contract · Daily payouts</div>
                    </div>

                    <div class="specs-row">
                        <div class="spec-item">
                            <span class="spec-label">Investment range</span>
                            <span class="spec-value">$${planData.minAmount.toLocaleString()} – $${planData.maxAmount.toLocaleString()}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Mining return</span>
                            <span class="spec-value positive">+${planData.percentage}%</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Duration</span>
                            <span class="spec-value">${planData.duration}h <small>hours</small></span>
                        </div>
                    </div>

                    <!-- Balance Selection -->
                    <div class="balance-section">
                        <div class="section-label">
                            <i class="fas fa-wallet"></i>
                            <span>Select source balance</span>
                        </div>

                        <!-- Main Balance Option -->
                        <div class="balance-option ${mainUsable ? '' : 'disabled'} ${selectedBalanceType === 'main' ? 'selected' : ''}" 
                             data-type="main" data-amount="${userBalances.main}">
                            <div class="balance-info">
                                <span class="balance-name">Main balance</span>
                                <div class="balance-asset">
                                    <img src="${assetLogo}" alt="${asset}">
                                    <span>${mainAssetAmount.toFixed(6)} ${asset.toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="balance-fiat">${formatUSD(userBalances.main)}</div>
                        </div>

                        <!-- Matured Balance Option -->
                        <div class="balance-option ${maturedUsable ? '' : 'disabled'} ${selectedBalanceType === 'matured' ? 'selected' : ''}" 
                             data-type="matured" data-amount="${userBalances.matured}">
                            <div class="balance-info">
                                <span class="balance-name">Matured balance</span>
                                <div class="balance-asset">
                                    <img src="${assetLogo}" alt="${asset}">
                                    <span>${maturedAssetAmount.toFixed(6)} ${asset.toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="balance-fiat">${formatUSD(userBalances.matured)}</div>
                        </div>
                    </div>

                    <!-- Investment Amount Input -->
                    <div class="input-wrapper">
                        <div class="amount-input-container">
                            <span>$</span>
                            <input type="number" id="amountInput" 
                                   min="${planData.minAmount}" 
                                   max="${Math.min(planData.maxAmount, selectedAmount)}" 
                                   step="10" 
                                   value="${planData.minAmount}"
                                   ${!selectedBalanceType ? 'disabled' : ''}>
                        </div>
                        <div class="input-hints">
                            <div class="range-hint">
                                <span>Min: $${planData.minAmount.toLocaleString()}</span>
                                <span>Max: $${Math.min(planData.maxAmount, selectedAmount).toLocaleString()}</span>
                            </div>
                            <button class="max-btn" id="maxBtn" ${!selectedBalanceType ? 'disabled' : ''}>MAX</button>
                        </div>
                        <div id="amountError" class="error-message"></div>
                    </div>

                    <!-- Expected Return Preview -->
                    <div class="return-preview" id="returnPreview">
                        <span class="return-label">Expected return (after 3% fee)</span>
                        <div class="return-value">
                            <div class="return-fiat" id="returnFiat">$0.00</div>
                            <div class="return-asset" id="returnAsset">
                                <img src="${assetLogo}" id="returnAssetLogo">
                                <span id="returnAssetText">0.000000 ${asset.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Invest Button -->
                    <button class="invest-btn" id="investBtn" ${!selectedBalanceType ? 'disabled' : ''}>
                        <i class="fas fa-cloud-upload-alt"></i>
                        Start Cloud Mining
                    </button>

                    <!-- Back Link -->
                    <div class="back-link">
                        <a href="index.html">
                            <i class="fas fa-arrow-left"></i>
                            Back to main page
                        </a>
                    </div>
                `;

                // Attach event listeners after rendering
                attachEventListeners(assetLogo);
                
                // Update initial return
                const initialAmount = parseFloat(document.getElementById('amountInput')?.value) || planData.minAmount;
                updateExpectedReturn(initialAmount, assetLogo);
            }

            // =============================================
            // EVENT LISTENERS
            // =============================================

            function attachEventListeners(assetLogo) {
                const amountInput = document.getElementById('amountInput');
                const maxBtn = document.getElementById('maxBtn');
                const errorDiv = document.getElementById('amountError');
                const investBtn = document.getElementById('investBtn');

                // Balance option selection
                document.querySelectorAll('.balance-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        if (opt.classList.contains('disabled')) return;

                        // Update UI
                        document.querySelectorAll('.balance-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                        
                        selectedBalanceType = opt.dataset.type;
                        const balanceAmount = parseFloat(opt.dataset.amount);

                        // Update input constraints
                        const maxAllowed = Math.min(planData.maxAmount, balanceAmount);
                        amountInput.disabled = false;
                        amountInput.max = maxAllowed;
                        amountInput.value = Math.min(parseFloat(amountInput.value) || planData.minAmount, maxAllowed);
                        
                        if (parseFloat(amountInput.value) < planData.minAmount) {
                            amountInput.value = planData.minAmount;
                        }

                        investBtn.disabled = false;
                        errorDiv.textContent = '';
                        updateExpectedReturn(parseFloat(amountInput.value), assetLogo);
                    });
                });

                // MAX button
                maxBtn.addEventListener('click', () => {
                    if (!selectedBalanceType) return;
                    
                    const balanceAmount = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
                    const maxAllowed = Math.min(planData.maxAmount, balanceAmount);
                    amountInput.value = maxAllowed;
                    updateExpectedReturn(maxAllowed, assetLogo);
                    errorDiv.textContent = '';
                });

                // Amount input validation
                amountInput.addEventListener('input', () => {
                    if (!selectedBalanceType) return;

                    const value = parseFloat(amountInput.value);
                    if (isNaN(value) || value < 0) {
                        amountInput.value = planData.minAmount;
                        updateExpectedReturn(planData.minAmount, assetLogo);
                        return;
                    }

                    const balanceAmount = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
                    const maxAllowed = Math.min(planData.maxAmount, balanceAmount);
                    
                    let error = '';
                    if (value < planData.minAmount) {
                        error = `Minimum investment: $${planData.minAmount.toLocaleString()}`;
                    } else if (value > maxAllowed) {
                        error = `Maximum investment: $${maxAllowed.toLocaleString()}`;
                    }

                    errorDiv.textContent = error;
                    
                    if (!error) {
                        updateExpectedReturn(value, assetLogo);
                    }
                });

                // Invest button
                investBtn.addEventListener('click', handleInvestment);
            }

            // =============================================
            // UPDATE EXPECTED RETURN (fiat + asset)
            // =============================================

            function updateExpectedReturn(amount, logo) {
                if (!planData) return;

                // Calculate return: (amount - 3% fee) + (percentage return on net)
                const fee = amount * 0.03;
                const netAmount = amount - fee;
                const totalReturn = netAmount + (netAmount * planData.percentage / 100);

                // Update fiat display
                document.getElementById('returnFiat').textContent = formatUSD(totalReturn);

                // Update asset display
                if (btcPrice > 0) {
                    const assetAmount = totalReturn / btcPrice;
                    document.getElementById('returnAssetText').textContent = 
                        `${assetAmount.toFixed(6)} ${userPreferences.displayAsset.toUpperCase()}`;
                }

                // Update logo if needed
                const logoEl = document.getElementById('returnAssetLogo');
                if (logoEl) logoEl.src = logo;
            }

            // =============================================
            // INVESTMENT HANDLER - EXACT SAME AS MODAL
            // =============================================

            async function handleInvestment() {
                if (investmentInProgress) return;

                const amountInput = document.getElementById('amountInput');
                const amount = parseFloat(amountInput.value);
                const errorDiv = document.getElementById('amountError');
                const investBtn = document.getElementById('investBtn');

                // Final validation
                if (!selectedBalanceType) {
                    errorDiv.textContent = 'Please select a balance';
                    return;
                }

                const balanceAmount = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
                const maxAllowed = Math.min(planData.maxAmount, balanceAmount);

                if (isNaN(amount) || amount < planData.minAmount || amount > maxAllowed) {
                    errorDiv.textContent = `Invalid amount (min: $${planData.minAmount}, max: $${maxAllowed})`;
                    return;
                }

                // Double-check balance with server
                try {
                    const checkRes = await fetch(`${API_BASE}/users/balances`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (checkRes.ok) {
                        const checkData = await checkRes.json();
                        const currentBalance = selectedBalanceType === 'main' ? 
                            checkData.data?.balances?.main : checkData.data?.balances?.matured;

                        if (currentBalance < amount) {
                            showNotification('error', 'Insufficient Balance', 
                                `Your ${selectedBalanceType} balance has changed. Please refresh.`);
                            await fetchUserData();
                            renderPanel();
                            return;
                        }
                    }
                } catch (e) {
                    console.warn('Balance check failed, proceeding anyway');
                }

                // Proceed with investment
                investmentInProgress = true;
                investBtn.disabled = true;
                investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

                try {
                    const response = await fetch(`${API_BASE}/investments`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            planId: planData.id,
                            amount: amount,
                            balanceType: selectedBalanceType
                        })
                    });

                    let responseData;
                    try {
                        responseData = await response.json();
                    } catch {
                        responseData = {};
                    }

                    if (response.ok) {
                        // Success - show green notification and redirect
                        showNotification('success', 'Investment Successful', 
                            `Your cloud mining investment of $${amount.toLocaleString()} has been activated.`);
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        throw new Error(responseData.message || `Investment failed (${response.status})`);
                    }

                } catch (error) {
                    console.error('Investment error:', error);
                    showNotification('error', 'Investment Failed', error.message);
                    
                    // Reset button
                    investBtn.disabled = false;
                    investBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Start Cloud Mining';
                    investmentInProgress = false;
                }
            }

            // =============================================
            // INITIALIZATION
            // =============================================

            async function init() {
                // Check authentication first
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Redirecting to login...');
                    setTimeout(() => window.location.href = 'login', 2000);
                    return;
                }

                // Parse plan from URL
                if (!parsePlanFromURL()) return;

                // Fetch user data
                const dataLoaded = await fetchUserData();
                if (!dataLoaded) return;

                // Render the panel
                renderPanel();
            }

            // Start everything
            init();

        })();
    </script>
</body>
</html>
