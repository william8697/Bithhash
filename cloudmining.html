<html lang="en">
<head>

    <style>
        /* ============================================= */
        /* CRYPTO.COM STYLE THEME - NO BOXES, SMOOTH FLOW */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --transition: all 0.2s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: var(--dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Smooth layout - no boxes, just clean flow */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Minimal header - just back button and logo */
        .investment-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(10, 14, 23, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            background: none;
            border: none;
            padding: 8px 0;
        }
        
        .back-button:hover {
            color: var(--primary);
        }
        
        .back-button i {
            font-size: 0.9rem;
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-logo img {
            height: 28px;
            width: auto;
        }
        
        .header-logo span {
            font-weight: 600;
            color: var(--primary);
        }
        
        .header-balance {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .balance-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 115, 232, 0.15);
            border-radius: 30px;
            padding: 6px 14px 6px 10px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(0, 216, 255, 0.15);
        }
        
        .balance-chip i {
            color: var(--primary);
            font-size: 0.8rem;
        }
        
        .balance-chip img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        
        /* Main content - smooth continuous flow */
        .investment-main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            width: 100%;
        }
        
        /* Plan header - clean, no border */
        .plan-header-section {
            margin-bottom: 40px;
        }
        
        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 216, 255, 0.08);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 30px;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }
        
        .plan-title-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .plan-title-row h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #ddd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .plan-btc-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }
        
        .plan-subtitle {
            color: var(--gray);
            font-size: 1rem;
            max-width: 600px;
        }
        
        /* Stats row - clean numbers, no boxes */
        .stats-row {
            display: flex;
            gap: 48px;
            flex-wrap: wrap;
            margin: 32px 0 24px;
            padding: 16px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .stat-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }
        
        .stat-value.success {
            color: var(--success);
        }
        
        .stat-value small {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--gray);
            margin-left: 6px;
        }
        
        /* Two column layout - but still no boxes, just flow */
        .investment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            margin: 40px 0;
        }
        
        @media (max-width: 768px) {
            .investment-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
        
        /* Left column sections - clean text, no borders */
        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        
        .spec-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .spec-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 12px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }
        
        .spec-row:last-child {
            border-bottom: none;
        }
        
        .spec-name {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .spec-value {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .spec-value .highlight {
            color: var(--success);
            font-weight: 700;
        }
        
        /* Miner details - image inline with text */
        .miner-showcase {
            display: flex;
            align-items: center;
            gap: 24px;
            margin: 20px 0 30px;
            flex-wrap: wrap;
        }
        
        .miner-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .miner-image img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            opacity: 0.9;
        }
        
        .miner-specs-compact {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .miner-spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .miner-spec-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
        }
        
        .miner-spec-value {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        /* Balance selection - radio style, no boxes */
        .balance-selector {
            display: flex;
            gap: 24px;
            margin: 20px 0 25px;
            flex-wrap: wrap;
        }
        
        .balance-radio {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .balance-radio input {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--gray);
            border-radius: 50%;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
        }
        
        .balance-radio input:checked {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 0 10px rgba(0, 216, 255, 0.3);
        }
        
        .balance-radio input:checked::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--darker);
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }
        
        .balance-radio-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .balance-radio-content img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .balance-radio-content .balance-fiat {
            color: var(--gray);
            font-size: 0.85rem;
            margin-left: 4px;
        }
        
        .balance-radio.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        
        /* Investment input - clean line */
        .investment-field {
            margin: 30px 0 20px;
        }
        
        .amount-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .amount-header label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray);
        }
        
        .amount-range {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .amount-range span {
            color: var(--primary);
            font-weight: 600;
        }
        
        .amount-input-wrapper {
            position: relative;
            margin-bottom: 8px;
        }
        
        .amount-input-wrapper .currency-symbol {
            position: absolute;
            left: 0;
            top: 12px;
            color: var(--gray);
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        #investment-amount {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            padding: 8px 0 8px 20px;
            outline: none;
            transition: var(--transition);
        }
        
        #investment-amount:focus {
            border-bottom-color: var(--primary);
        }
        
        #investment-amount.error {
            border-bottom-color: var(--error);
        }
        
        .amount-error {
            color: var(--error);
            font-size: 0.8rem;
            min-height: 20px;
        }
        
        /* Expected return - clean success color */
        .return-projection {
            margin: 30px 0 25px;
            padding: 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .return-label {
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        
        .return-fiat {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
            margin-bottom: 8px;
        }
        
        .return-asset {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: var(--gray);
        }
        
        .return-asset img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }
        
        /* Action button */
        .invest-action {
            margin: 30px 0 15px;
        }
        
        .invest-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--darker);
            border: none;
            border-radius: 40px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .invest-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 216, 255, 0.2);
        }
        
        .invest-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .invest-btn i {
            font-size: 1rem;
        }
        
        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
            color: var(--gray);
        }
        
        /* TradingView chart - clean embed */
        .chart-container {
            margin: 20px 0 0;
            height: 280px;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* Notification system */
        .notification-center {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }
        
        .notification {
            background: rgba(30, 30, 30, 0.98);
            backdrop-filter: blur(10px);
            border-left: 4px solid;
            padding: 14px 18px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: start;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            border-left-color: var(--success);
        }
        
        .notification.error {
            border-left-color: var(--error);
        }
        
        .notification i {
            font-size: 1.2rem;
        }
        
        .notification.success i {
            color: var(--success);
        }
        
        .notification.error i {
            color: var(--error);
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .notification-close {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            width: 60px;
            height: 60px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .loading-text {
            margin-top: 16px;
            color: var(--gray);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .investment-main {
                padding: 24px 16px 40px;
            }
            
            .plan-title-row h1 {
                font-size: 1.8rem;
            }
            
            .stats-row {
                gap: 24px;
            }
            
            .stat-value {
                font-size: 1.3rem;
            }
            
            .return-fiat {
                font-size: 1.8rem;
            }
            
            .miner-showcase {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .miner-image {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

    <script>
        // =============================================
        // GLOBAL STATE
        // =============================================
        const AppState = {
            planId: null,
            planName: '',
            minAmount: 0,
            maxAmount: 0,
            percentage: 0,
            duration: 0,
            selectedBalance: null,
            selectedBalanceAmount: 0,
            mainBalance: 0,
            maturedBalance: 0,
            btcPrice: 43000,
            isProcessing: false,
            assetLogos: {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png'
            }
        };

        // Miner database (same as index)
        const MINERS = [
            { 
                name: "Avalon Mini 3", 
                hashRate: "68 TH/s",
                power: "3200W",
                algorithm: "SHA-256",
                efficiency: "47 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg"
            },
            { 
                name: "Fluminer T3", 
                hashRate: "110 TH/s",
                power: "3250W",
                algorithm: "SHA-256",
                efficiency: "29.5 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg"
            },
            { 
                name: "Avalon Q", 
                hashRate: "150 TH/s",
                power: "3420W",
                algorithm: "SHA-256",
                efficiency: "22.8 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg"
            },
            { 
                name: "Antminer S21 Pro", 
                hashRate: "234 TH/s",
                power: "5440W",
                algorithm: "SHA-256",
                efficiency: "23.2 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg"
            },
            { 
                name: "Antminer S21 XP", 
                hashRate: "255 TH/s",
                power: "5445W",
                algorithm: "SHA-256",
                efficiency: "21.4 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg"
            },
            { 
                name: "Antminer S23 Hyd", 
                hashRate: "335 TH/s",
                power: "5300W",
                algorithm: "SHA-256",
                efficiency: "15.8 J/TH",
                image: "https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg"
            }
        ];

        // =============================================
        // URL PARSING - RESPECTS SESSION-BASED URL FORMAT
        // =============================================
        function parseUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Extract all parameters - supports both direct and session-based formats
            AppState.planId = urlParams.get('plan') || urlParams.get('session') || 'default';
            AppState.planName = urlParams.get('name') || 'Bitcoin Mining';
            AppState.minAmount = parseFloat(urlParams.get('min')) || 50;
            AppState.maxAmount = parseFloat(urlParams.get('max')) || 10000;
            AppState.percentage = parseFloat(urlParams.get('percentage')) || 3.5;
            AppState.duration = parseInt(urlParams.get('duration')) || 24;
            
            // If session parameter exists, we might need to fetch plan details
            if (urlParams.has('session') && !urlParams.has('plan')) {
                fetchPlanDetailsFromSession(urlParams.get('session'));
            }
        }

        async function fetchPlanDetailsFromSession(sessionKey) {
            try {
                const response = await fetch(`https://bithash-backend.onrender.com/api/plan-session/${sessionKey}`);
                if (response.ok) {
                    const data = await response.json();
                    AppState.planId = data.planId;
                    AppState.planName = data.planName;
                    AppState.minAmount = data.minAmount;
                    AppState.maxAmount = data.maxAmount;
                    AppState.percentage = data.percentage;
                    AppState.duration = data.duration;
                }
            } catch (error) {
                console.error('Error fetching session plan:', error);
            }
        }

        // =============================================
        // FETCH REAL-TIME BTC PRICE
        // =============================================
        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    AppState.btcPrice = data.bitcoin.usd;
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
                // Keep default
            }
        }

        // =============================================
        // FETCH USER BALANCES
        // =============================================
        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                window.location.href = 'login?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    AppState.mainBalance = data.data?.balances?.main || 0;
                    AppState.maturedBalance = data.data?.balances?.matured || 0;
                    
                    // Update header
                    document.getElementById('headerBalance').style.display = 'block';
                    const btcAmount = AppState.mainBalance / AppState.btcPrice;
                    document.getElementById('mainBalanceDisplay').textContent = btcAmount.toFixed(6);
                    
                    return true;
                } else if (response.status === 401) {
                    localStorage.removeItem('jwtToken');
                    window.location.href = 'login?redirect=' + encodeURIComponent(window.location.href);
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
                showNotification('error', 'Connection Error', 'Failed to fetch balances');
            }
            return false;
        }

                        <span class="stat-value success">+${AppState.percentage}%</span>

                    <div class="stat-item">
                        <span class="stat-label">Duration</span>

                    </div>

                <!-- Two Column Grid -->

                        <!-- Balance Selection (Radio Style) -->

                            <label class="balance-radio ${AppState.mainBalance >= AppState.minAmount ? '' : 'disabled'}" id="mainBalanceOption">

                                <div class="balance-radio-content">
                                    <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                                    <span>Main Balance</span>
                                    <span class="balance-fiat">$${AppState.mainBalance.toLocaleString()}</span>
                                </div>
                            </label>
                            
                            <label class="balance-radio ${AppState.maturedBalance >= AppState.minAmount ? '' : 'disabled'}" id="maturedBalanceOption">
                                <input type="radio" name="balance" value="matured" ${AppState.mainBalance < AppState.minAmount && AppState.maturedBalance >= AppState.minAmount ? 'checked' : ''} ${AppState.maturedBalance >= AppState.minAmount ? '' : 'disabled'}>
                                <div class="balance-radio-content">
                                    <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                                    <span>Matured Balance</span>

                        <!-- Investment Amount Input -->
                        <div class="investment-field">

                                <label>Investment Amount</label>
                                <div class="amount-range">
                                    Min <span>$${AppState.minAmount.toLocaleString()}</span> · Max <span>$${Math.min(AppState.maxAmount, Math.max(AppState.mainBalance, AppState.maturedBalance)).toLocaleString()}</span>
                                </div>
                            </div>
                            
                            <div class="amount-input-wrapper">
                                <span class="currency-symbol">$</span>
                                <input type="number" id="investment-amount" 
                                       value="${AppState.minAmount}" 
                                       min="${AppState.minAmount}" 
                                       max="${Math.min(AppState.maxAmount, Math.max(AppState.mainBalance, AppState.maturedBalance))}" 
                                       step="10">
                            </div>
                            <div class="amount-error" id="amountError"></div>
                        </div>
                        
                        <!-- Expected Return Projection -->
                        <div class="return-projection" id="returnProjection">
                            <div class="return-label">EXPECTED RETURN (AFTER ${AppState.duration} HOURS)</div>
                            <div class="return-fiat" id="returnFiat">$${calculateReturn(AppState.minAmount).toLocaleString()}</div>
                            <div class="return-asset" id="returnAsset">
                                <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                                <span id="returnBtc">${(calculateReturn(AppState.minAmount) / AppState.btcPrice).toFixed(6)} BTC</span>
                            </div>
                        </div>
                        
                        <!-- Action Button -->
                        <div class="invest-action">
                            <button class="invest-btn" id="investBtn" onclick="processInvestment()">
                                <i class="fas fa-cloud"></i>
                                Start Cloud Mining
                            </button>
                            <div class="investment-status" id="investmentStatus"></div>
                        </div>
                    </div>
                    
                    <!-- Right Column: Miner Details & Chart -->
                    <div class="right-column">
                        <div class="section-label">MINER SPECIFICATIONS</div>
                        
                        <!-- Miner Showcase (Compact) -->
                        <div class="miner-showcase">
                            <div class="miner-image">
                                <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                            </div>
                            <div class="miner-specs-compact">
                                <div class="miner-spec-item">
                                    <span class="miner-spec-label">Model</span>
                                    <span class="miner-spec-value">${miner.name}</span>
                                </div>

                                    <span class="miner-spec-label">Hash Rate</span>
                                    <span class="miner-spec-value">${miner.hashRate}</span>

                                    <span class="miner-spec-value">${miner.power}</span>
                                </div>
                                <div class="miner-spec-item">
                                    <span class="miner-spec-label">Efficiency</span>
                                    <span class="miner-spec-value">${miner.efficiency}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Spec List (Compact) -->
                        <div class="spec-list">
                            <div class="spec-row">

                                <span class="spec-value">${miner.algorithm}</span>

                            <div class="spec-row">

                                <span class="spec-value">1.5%</span>

                                <span class="spec-value">Included</span>
                            </div>
                            <div class="spec-row">

                                <span class="spec-value">Daily</span>

                        <div class="section-label" style="margin-top: 30px;">BTC/USD CHART</div>
                        <div class="chart-container" id="tradingviewChart"></div>
                    </div>

            container.innerHTML = html;

            initTradingViewChart();

            document.getElementById('investment-amount').addEventListener('input', validateAndUpdate);
            
            const radios = document.querySelectorAll('input[name="balance"]');
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    AppState.selectedBalance = this.value;
                    const balance = this.value === 'main' ? AppState.mainBalance : AppState.maturedBalance;
                    AppState.selectedBalanceAmount = balance;
                    
                    const input = document.getElementById('investment-amount');
                    const maxVal = Math.min(AppState.maxAmount, balance);
                    input.max = maxVal;
                    
                    if (parseFloat(input.value) > maxVal) {
                        input.value = maxVal;
                    }
                    
                    validateAndUpdate();
                });
            });
            
            // Set initial selected balance
            if (AppState.mainBalance >= AppState.minAmount) {
                AppState.selectedBalance = 'main';
                AppState.selectedBalanceAmount = AppState.mainBalance;
            } else if (AppState.maturedBalance >= AppState.minAmount) {
                AppState.selectedBalance = 'matured';
                AppState.selectedBalanceAmount = AppState.maturedBalance;
            }
            
            // Hide loading overlay
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function calculateReturn(amount) {
            const fee = amount * 0.03; // 3% company fee
            const netAmount = amount - fee;
            return netAmount + (netAmount * AppState.percentage / 100);
        }

        function validateAndUpdate() {
            const input = document.getElementById('investment-amount');
            const errorEl = document.getElementById('amountError');
            const investBtn = document.getElementById('investBtn');
            const amount = parseFloat(input.value) || 0;
            
            let isValid = true;
            let errorMsg = '';
            
            if (amount < AppState.minAmount) {
                errorMsg = `Minimum investment is $${AppState.minAmount.toLocaleString()}`;
                isValid = false;
            } else if (amount > AppState.maxAmount) {
                errorMsg = `Maximum investment is $${AppState.maxAmount.toLocaleString()}`;
                isValid = false;
            } else if (amount > AppState.selectedBalanceAmount) {
                errorMsg = `Insufficient balance. Available: $${AppState.selectedBalanceAmount.toLocaleString()}`;
                isValid = false;
            }
            
            errorEl.textContent = errorMsg;
            investBtn.disabled = !isValid;
            
            if (isValid) {
                const returnAmount = calculateReturn(amount);
                document.getElementById('returnFiat').textContent = '$' + returnAmount.toLocaleString();
                document.getElementById('returnBtc').textContent = (returnAmount / AppState.btcPrice).toFixed(6) + ' BTC';
            }
        }

        function initTradingViewChart() {
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BITSTAMP:BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": true,
                    "allow_symbol_change": false,
                    "container_id": "tradingviewChart",
                    "studies": [],
                    "show_popup_button": false,
                    "autosize": true
                });
            } else {
                document.getElementById('tradingviewChart').innerHTML = '<div style="color: var(--gray); text-align: center; padding: 40px;">Chart loading...</div>';
            }
        }

        // =============================================
        // INVESTMENT PROCESSING - EXACT SAME ENDPOINT AS MODAL
        // =============================================
        async function processInvestment() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => { window.location.href = 'login'; }, 1500);
                return;
            }
            
            if (AppState.isProcessing) return;
            
            const amount = parseFloat(document.getElementById('investment-amount').value);
            const balanceType = AppState.selectedBalance;
            const statusEl = document.getElementById('investmentStatus');
            const investBtn = document.getElementById('investBtn');
            
            // Double-check validation
            if (amount < AppState.minAmount || amount > AppState.maxAmount || amount > AppState.selectedBalanceAmount) {
                showNotification('error', 'Invalid Amount', 'Please check your investment amount');
                return;
            }
            
            AppState.isProcessing = true;
            investBtn.disabled = true;
            statusEl.textContent = 'Processing your investment...';
            statusEl.style.color = 'var(--primary)';
            
            try {
                // EXACT SAME ENDPOINT AS THE MODAL WAS CALLING
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: AppState.planId,
                        amount: amount,
                        balanceType: balanceType
                    })
                });
                
                let responseData;
                try {
                    responseData = await response.json();
                } catch (e) {
                    responseData = { message: 'Investment successful' };
                }
                
                if (response.ok) {
                    // Success - show green notification
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${amount.toLocaleString()} has been created.`);
                    
                    statusEl.textContent = 'Investment successful! Redirecting...';
                    statusEl.style.color = 'var(--success)';
                    
                    // Redirect back to index after 2 seconds (as requested)
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    // Error from server - show red notification
                    throw new Error(responseData.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                
                // Show red error notification
                showNotification('error', 'Investment Failed', error.message);
                
                statusEl.textContent = 'Investment failed. Please try again.';
                statusEl.style.color = 'var(--error)';
                investBtn.disabled = false;
                AppState.isProcessing = false;
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM (GREEN SUCCESS / RED ERROR)
        // =============================================
        function showNotification(type, title, message) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <button class="notification-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            
            container.appendChild(notification);
            
            // Trigger animation
            setTimeout(() => notification.classList.add('show'), 10);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);
        }

        // =============================================
        // NAVIGATION
        // =============================================
        function goBack() {
            window.location.href = 'index.html';
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        window.addEventListener('load', async function() {
            // Parse URL parameters first
            parseUrlParameters();
            
            // Check authentication
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login?redirect=' + encodeURIComponent(window.location.href);
                }, 1500);
                return;
            }
            
            // Fetch real-time data
            await Promise.all([
                fetchBTCPrice(),
                fetchUserBalances()
            ]);
            
            // Render the page
            renderInvestmentPage();
        });

        // Make functions globally available
        window.processInvestment = processInvestment;
        window.goBack = goBack;
    </script>
