    <style>
        /* ============================================= */
        /* CRYPTO.COM COLOR THEME IMPLEMENTATION */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --blue-light: #004488;
            --purple: #784FED;
            --pink: #EC4899;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --blue-gradient: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --security-blue: #1A73E8;
            --security-green: #34A853;
            
            --blue-translucent: rgba(26, 115, 232, 0.25);
            --blue-translucent-hover: rgba(26, 115, 232, 0.4);
            --popular-accent: #FF6B00;
            --popular-accent-light: #FF8533;
            --popular-accent-dark: #E65C00;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 216, 255, 0.3));
        }
        
        .loading-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--gray);
            font-size: 1rem;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Security Badge */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--darker);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 100;
            border-left: 4px solid var(--security-green);
            color: var(--dark);
            border: 1px solid var(--gray-light);
        }
        
        .security-badge i {
            color: var(--security-green);
            font-size: 1rem;
        }

        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            pointer-events: none;
            width: 100%;
            max-width: 350px;
        }
        
        .notification {
            width: 100%;
            padding: 16px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: start;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            background-color: var(--darker);
            border: 1px solid var(--gray-light);
            pointer-events: auto;
            position: relative;
            border-left: 4px solid transparent;
        }
        
        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .notification.success {
            border-left-color: var(--success);
            background: rgba(40, 167, 69, 0.15);
        }
        
        .notification.error {
            border-left-color: var(--error);
            background: rgba(255, 0, 0, 0.15);
        }
        
        .notification i {
            font-size: 1.2rem;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .notification.success i {
            color: var(--success);
        }
        
        .notification.error i {
            color: var(--error);
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 1rem;
        }
        
        .notification-message {
            font-size: 0.85rem;
            line-height: 1.4;
            color: var(--gray);
        }
        
        .notification-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .notification-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--dark);
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--darker);
            box-shadow: var(--box-shadow);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            transition: var(--transition-slow);
            border-bottom: 1px solid var(--gray-light);
            height: 70px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo img {
            height: 32px;
            width: auto;
            transition: var(--transition);
        }

        .logo:hover img {
            transform: scale(1.05);
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-buttons .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
            box-shadow: 0 4px 15px rgba(0, 216, 255, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
            transform: translateY(-2px);
        }

        .btn-gold {
            background: var(--gold-gradient);
            color: var(--darker);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-gold:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* User Balance Bar */
        .user-balance-bar {
            background: var(--lighter);
            border-bottom: 1px solid var(--gray-light);
            padding: 8px 0;
            margin-top: 70px;
            position: sticky;
            top: 70px;
            z-index: 999;
        }

        .balance-items {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            flex-wrap: wrap;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--gray-light);
            font-size: 0.9rem;
        }

        .balance-item i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .balance-asset {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .balance-asset-logo {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        /* Back Button */
        .back-button-container {
            padding: 20px 0 0;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px 0;
        }

        .back-button:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        /* Plan Detail Page */
        .plan-detail-page {
            min-height: calc(100vh - 140px);
            padding: 20px 0 60px;
        }

        .plan-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        /* Left Column */
        .plan-left {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .plan-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--gray-light);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .section-title i {
            font-size: 1.1rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .spec-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
        }

        .spec-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .spec-value.success {
            color: var(--success);
        }

        /* Balance Selection */
        .balance-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .balance-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }

        .balance-option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }

        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--gray);
            position: relative;
        }

        .balance-option.selected .balance-radio {
            border-color: var(--primary);
        }

        .balance-option.selected .balance-radio::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .balance-info {
            flex: 1;
        }

        .balance-label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .balance-amounts {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
        }

        .balance-fiat {
            color: var(--dark);
        }

        .balance-asset-display {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--gray);
        }

        .balance-asset-display img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* Investment Form */
        .investment-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--gray-light);
            border-radius: 12px;
            color: var(--dark);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 6px;
            min-height: 20px;
        }

        /* Expected Return */
        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 8px;
        }

        .return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .return-asset img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Right Column */
        .plan-right {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Miner Details */
        .miner-image-container {
            background: var(--lighter);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid var(--gray-light);
        }

        .miner-image-container img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .miner-specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .miner-spec-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px;
        }

        .miner-spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .miner-spec-value {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* TradingView Chart */
        .tradingview-container {
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--gray-light);
        }

        #tradingview-chart {
            height: 100%;
            width: 100%;
        }

        /* Investment Status */
        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
            margin-top: 16px;
            color: var(--gray);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .plan-detail-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .balance-amounts {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            
            .balance-option {
                padding: 12px;
            }
            
            .specs-grid {
                grid-template-columns: 1fr;
            }
            
            .miner-specs-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .return-fiat {
                font-size: 1.6rem;
            }
            
            .auth-buttons .btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .balance-items {
                justify-content: center;
            }
            
            .plan-section {
                padding: 16px;
            }
            
            .miner-specs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // =============================================
        // URL PARSING & PLAN LOADING
        // =============================================
        
        function parsePlanFromUrl() {
            const hash = window.location.hash.substring(1); // Remove #
            if (!hash) return null;
            
            try {
                // Decode base64
                const decoded = atob(hash);
                const parts = decoded.split('|');
                
                if (parts.length === 6) {
                    return {
                        planId: parts[0],
                        minAmount: parseFloat(parts[1]),
                        maxAmount: parseFloat(parts[2]),
                        percentage: parseFloat(parts[3]),
                        duration: parseInt(parts[4]),
                        planIndex: parseInt(parts[5])
                    };
                }
            } catch (e) {
                console.error('Failed to parse plan from URL:', e);
            }
            
            return null;
        }

        async function loadPlanDetails() {
            const planData = parsePlanFromUrl();
            
            if (!planData) {
                showNotification('error', 'Invalid Plan', 'No valid plan data found. Redirecting...');

                }, 2000);
                return;
            }
            
            currentPlan = planData;
            
            // Update UI with plan details
            document.getElementById('plan-name').textContent = planNames[planData.planIndex] || 'Cloud Mining Plan';
            
            const specsGrid = document.getElementById('plan-specs');
            specsGrid.innerHTML = `

        // =============================================
        // AUTH & BALANCE FUNCTIONS
        // =============================================
        
        async function checkAuthState() {
            const token = localStorage.getItem('jwtToken');
            
            if (!token) {
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-balance-bar').style.display = 'none';
                updateBalanceOptions(null);
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    document.getElementById('auth-buttons').style.display = 'none';
                    await fetchAndUpdateBalances();
                } else {
                    localStorage.removeItem('jwtToken');
                    document.getElementById('auth-buttons').style.display = 'flex';
                    document.getElementById('user-balance-bar').style.display = 'none';
                    updateBalanceOptions(null);
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
        }

        async function fetchAndUpdateBalances() {
            const token = localStorage.getItem('jwtToken');
            
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/balances`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    
                    // Fetch user preferences
                    await fetchUserPreferences();
                    
                    // Update UI
                    updateBalancesWithAsset();
                    document.getElementById('user-balance-bar').style.display = 'block';
                    
                    // Update balance options
                    updateBalanceOptions(userBalances);
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
            }
        }

        async function fetchUserPreferences() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/preferences`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        function updateBalancesWithAsset() {
            const asset = userPreferences.displayAsset;
            const assetData = topAssets.find(a => a.symbol === asset) || topAssets[0];
            const assetLogo = assetData.logo;
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            // Calculate asset amounts
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            // Update main balance
            document.getElementById('main-asset-logo').src = assetLogo;
            document.getElementById('main-asset-amount').textContent = formatNumber(mainAssetAmount);
            document.getElementById('main-asset-symbol').textContent = asset.toUpperCase();
            
            // Update matured balance
            document.getElementById('matured-asset-logo').src = assetLogo;
            document.getElementById('matured-asset-amount').textContent = formatNumber(maturedAssetAmount);
            document.getElementById('matured-asset-symbol').textContent = asset.toUpperCase();
        }

        function updateBalanceOptions(balances) {
            const optionsContainer = document.getElementById('balance-options');
            const investButton = document.getElementById('invest-button');
            
            if (!balances || !currentPlan) {
                optionsContainer.innerHTML = `
                    <div class="balance-option disabled">
                        <div class="balance-radio"></div>
                        <div class="balance-info">
                            <div class="balance-label">Please login to invest</div>
                        </div>
                    </div>
                `;
                investButton.disabled = true;
                return;
            }
            
            const asset = userPreferences.displayAsset;
            const assetData = topAssets.find(a => a.symbol === asset) || topAssets[0];
            const assetLogo = assetData.logo;
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            const mainAssetAmount = price > 0 ? balances.main / price : 0;
            const maturedAssetAmount = price > 0 ? balances.matured / price : 0;
            
            const minAmount = currentPlan.minAmount;
            
            const mainEligible = balances.main >= minAmount;
            const maturedEligible = balances.matured >= minAmount;
            
            optionsContainer.innerHTML = `
                <div class="balance-option ${mainEligible ? '' : 'disabled'}" data-type="main" data-amount="${balances.main}" onclick="selectBalance('main', ${balances.main})">
                    <div class="balance-radio"></div>
                    <div class="balance-info">
                        <div class="balance-label">Main Balance</div>
                        <div class="balance-amounts">
                            <span class="balance-fiat">$${balances.main.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            <span class="balance-asset-display">
                                <img src="${assetLogo}">
                                <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="balance-option ${maturedEligible ? '' : 'disabled'}" data-type="matured" data-amount="${balances.matured}" onclick="selectBalance('matured', ${balances.matured})">
                    <div class="balance-radio"></div>
                    <div class="balance-info">
                        <div class="balance-label">Matured Balance</div>
                        <div class="balance-amounts">
                            <span class="balance-fiat">$${balances.matured.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>

                                <img src="${assetLogo}">
                                <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                            </span>
                        </div>
                    </div>
                </div>
            `;
            
            // Auto-select first eligible balance
            if (mainEligible) {
                selectBalance('main', balances.main);
            } else if (maturedEligible) {
                selectBalance('matured', balances.matured);
            } else {
                investButton.disabled = true;
                document.getElementById('amount-error').textContent = `Minimum investment $${minAmount.toLocaleString()} required`;
            }
        }

        function selectBalance(type, amount) {
            const options = document.querySelectorAll('.balance-option');
            options.forEach(opt => opt.classList.remove('selected'));
            
            const selected = document.querySelector(`.balance-option[data-type="${type}"]`);
            if (selected && !selected.classList.contains('disabled')) {
                selected.classList.add('selected');
                selectedBalanceType = type;
                selectedBalanceAmount = amount;
                
                const investButton = document.getElementById('invest-button');
                investButton.disabled = false;
                
                // Set investment amount to minimum
                const input = document.getElementById('investment-amount');
                input.value = currentPlan.minAmount;
                input.max = Math.min(currentPlan.maxAmount, amount);
                
                validateInvestment();
            }
        }

        // =============================================
        // INVESTMENT VALIDATION & CALCULATION
        // =============================================
        
        function validateInvestment() {
            const input = document.getElementById('investment-amount');
            const errorEl = document.getElementById('amount-error');
            const investButton = document.getElementById('invest-button');
            
            const amount = parseFloat(input.value) || 0;
            const minAmount = currentPlan.minAmount;
            const maxAmount = Math.min(currentPlan.maxAmount, selectedBalanceAmount);
            
            if (amount < minAmount) {
                errorEl.textContent = `Minimum investment is $${minAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            } else if (amount > maxAmount) {
                errorEl.textContent = `Maximum investment is $${maxAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            } else {
                errorEl.textContent = '';
                investButton.disabled = false;
                calculateExpectedReturn(amount);
                return true;
            }
        }

        function calculateExpectedReturn(amount) {
            if (!currentPlan) return;
            
            const miningFee = amount * 0.03; // 3% company fee
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * currentPlan.percentage / 100);
            
            document.getElementById('expected-return-fiat').textContent = formatUSD(totalReturn);
            
            // Calculate in preferred asset
            const asset = userPreferences.displayAsset;
            const assetData = topAssets.find(a => a.symbol === asset) || topAssets[0];
            const assetLogo = assetData.logo;
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            if (price > 0) {
                const assetAmount = totalReturn / price;
                document.getElementById('expected-return-asset-logo').style.display = 'inline-block';
                document.getElementById('expected-return-asset-logo').src = assetLogo;
                document.getElementById('expected-return-asset-text').textContent = `${formatNumber(assetAmount)} ${asset.toUpperCase()}`;
            }
        }

        // =============================================
        // INVESTMENT EXECUTION
        // =============================================
        
        async function executeInvestment() {
            if (isInvesting) return;
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest');
                return;
            }
            
            const amount = parseFloat(document.getElementById('investment-amount').value);
            
            if (!validateInvestment()) return;
            
            isInvesting = true;
            const investButton = document.getElementById('invest-button');
            const statusEl = document.getElementById('investment-status');
            
            investButton.disabled = true;
            statusEl.textContent = 'Processing your investment...';
            statusEl.style.color = 'var(--primary)';
            
            try {
                const response = await fetch(`${API_BASE}/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: currentPlan.planId,
                        amount: amount,
                        balanceType: selectedBalanceType
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    statusEl.textContent = 'Investment successful! Redirecting...';
                    statusEl.style.color = 'var(--success)';
                    
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${amount.toLocaleString()} has been created.`);
                    
                    // Redirect back to index after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
            } catch (error) {
                console.error('Investment error:', error);
                statusEl.textContent = error.message || 'Investment failed';
                statusEl.style.color = 'var(--error)';
                
                showNotification('error', 'Investment Failed', error.message || 'Failed to create investment');
                
                investButton.disabled = false;
                isInvesting = false;
            }
        }

        function initTradingViewChart() {
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BITSTAMP:BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview-chart",
                    "hide_side_toolbar": false,
                    "studies": ["Volume@tv-basicstudies"],
                    "show_popup_button": false
                });
            }
        }

        // =============================================
        // FORMATTING FUNCTIONS
        // =============================================
        
        function formatNumber(num) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            if (numericNum >= 1e3) return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return numericNum.toFixed(6);
        }

        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            return '$' + numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        
        let notificationQueue = [];
        let isNotificationShowing = false;
        
        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) {
                processNotificationQueue();
            }
        }
        
        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }
            
            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;
            
            const notificationCenter = document.getElementById('notification-center');
            notificationCenter.appendChild(notification);
            
            void notification.offsetWidth;
            notification.classList.add('show');
            
            notification.querySelector('.notification-close').addEventListener('click', () => {
                closeNotification(notification);
            });
            
            if (duration > 0) {
                setTimeout(() => {
                    if (notification.parentNode) {
                        closeNotification(notification);
                    }
                }, duration);
            }
        }
        
        function closeNotification(notification) {
            notification.classList.remove('show');
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
                processNotificationQueue();
            }, 400);
        }

        // =============================================
        // NAVIGATION
        // =============================================
        
        function goBack() {
            window.location.href = 'index.html#plans';
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
            
            loadPlanDetails();
            
            // Set up event listeners
            document.getElementById('investment-amount').addEventListener('input', validateInvestment);
            document.getElementById('invest-button').addEventListener('click', executeInvestment);
        });

        // Expose functions globally
        window.selectBalance = selectBalance;
        window.goBack = goBack;
    </script>
</body>
</html>
