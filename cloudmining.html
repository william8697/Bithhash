<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Preconnect to Backend -->
    <link rel="preconnect" href="https://bithash-backend.onrender.com">
    
    <!-- Fonts - Optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <title>Cloud Mining Investment - BitHash</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .investment-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Investment Panel - Smooth, No Borders, Pure Flow */
        .investment-panel {
            width: 100%;
        }

        .plan-header-section {
            margin-bottom: 30px;
        }

        .plan-title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .plan-badge-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 216, 255, 0.15) 0%, rgba(0, 163, 204, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .plan-name-display {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .cloud-mining-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(17, 24, 39, 0.7) 0%, rgba(10, 14, 23, 0.9) 100%);
            backdrop-filter: blur(5px);
            padding: 24px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, rgba(0, 216, 255, 0.08) 0%, rgba(17, 24, 39, 0.9) 100%);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-label i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            margin-bottom: 5px;
        }

        .stat-sub {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .interest-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(40, 167, 69, 0.15);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .miner-detail-section {
            margin: 40px 0;
        }

        .section-label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label i {
            color: var(--primary);
        }

        .miner-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            background: linear-gradient(145deg, rgba(17, 24, 39, 0.5) 0%, rgba(10, 14, 23, 0.8) 100%);
            padding: 30px;
            border-radius: 24px;
            flex-wrap: wrap;
        }

        .miner-image-container {
            flex: 0 0 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
        }

        .miner-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .miner-image-container:hover img {
            transform: scale(1.05);
        }

        .miner-specs {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .spec-item {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            border-left: 3px solid var(--primary);
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .spec-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .spec-unit {
            font-size: 0.8rem;
            color: var(--gray);
            margin-left: 4px;
        }

        .chart-container {
            margin: 40px 0;
            background: linear-gradient(145deg, rgba(17, 24, 39, 0.4) 0%, rgba(10, 14, 23, 0.7) 100%);
            padding: 25px;
            border-radius: 24px;
            height: 300px;
        }

        .investment-form-section {
            margin: 40px 0;
        }

        .balance-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0, 216, 255, 0.05);
            padding: 20px 25px;
            border-radius: 20px;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 216, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .balance-details {
            display: flex;
            flex-direction: column;
        }

        .balance-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
        }

        .balance-amount-small {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--gray);
        }

        .amount-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .amount-input {
            width: 100%;
            padding: 18px 60px 18px 20px;
            font-size: 1.5rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--gray-light);
            border-radius: 16px;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
            transition: var(--transition);
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 216, 255, 0.2);
        }

        .amount-input.error {
            border-color: var(--error);
        }

        .amount-currency {
            position: absolute;
            right: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray);
            pointer-events: none;
        }

        .amount-hint {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .quick-amounts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .quick-amount-btn {
            padding: 8px 16px;
            background: var(--gray-lighter);
            border: none;
            border-radius: 30px;
            color: var(--dark);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .quick-amount-btn:hover {
            background: var(--primary);
            color: var(--darker);
        }

        .return-calculation {
            background: linear-gradient(145deg, rgba(0, 216, 255, 0.05) 0%, rgba(17, 24, 39, 0.5) 100%);
            padding: 25px;
            border-radius: 20px;
            margin: 30px 0;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .calc-row:last-child {
            border-bottom: none;
        }

        .calc-label {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .calc-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .calc-value.highlight {
            color: var(--success);
            font-size: 1.5rem;
        }

        .profit-note {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .profit-note i {
            color: var(--primary);
        }

        .terms-section {
            margin: 30px 0;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
        }

        .term-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .term-item:last-child {
            border-bottom: none;
        }

        .term-icon {
            width: 24px;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .term-text {
            flex: 1;
            font-size: 0.9rem;
        }

        .term-text strong {
            color: var(--primary);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--darker);
            box-shadow: 0 4px 20px rgba(0, 216, 255, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 216, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--dark);
            border: 1px solid var(--gray-light);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .security-note i {
            color: var(--success);
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 216, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }

        .notification {
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: start;
            gap: 12px;
            margin-bottom: 10px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            border-left: 4px solid;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: rgba(40, 167, 69, 0.95);
            color: white;
            border-left-color: #fff;
        }

        .notification.error {
            background: rgba(255, 0, 0, 0.95);
            color: white;
            border-left-color: #fff;
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            body { padding: 15px 12px; }
            .plan-name-display { font-size: 1.8rem; }
            .stat-value { font-size: 1.5rem; }
            .miner-card { flex-direction: column; text-align: center; }
            .miner-image-container { width: 180px; height: 180px; }
            .balance-info { flex-direction: column; align-items: flex-start; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; }
        }

        @media (max-width: 480px) {
            .plan-title-row { gap: 10px; }
            .plan-badge-icon { width: 40px; height: 40px; font-size: 1.5rem; }
            .plan-name-display { font-size: 1.5rem; }
            .stats-grid { gap: 12px; }
            .stat-card { padding: 18px; }
            .amount-input { font-size: 1.2rem; padding: 16px 50px 16px 16px; }
            .quick-amount-btn { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="notification-center" id="notification-center"></div>

    <div class="investment-container">
        <div id="investment-panel" class="investment-panel">
            <!-- Dynamic content will be loaded here -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div style="color: var(--gray); font-size: 0.95rem;">Loading cloud mining plan...</div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // GLOBAL STATE
        // =============================================
        const AppState = {
            planData: null,
            userBalances: { main: 0, matured: 0 },
            investmentInProgress: false,
            selectedAsset: 'btc', // Default display asset
            assetPrice: 0,
            assetLogo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'
        };

        // =============================================
        // NOTIFICATION SYSTEM (Green for success, Red for error)
        // =============================================
        function showNotification(type, title, message, duration = 5000) {
            const container = document.getElementById('notification-center');
            if (!container) return;

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
            `;
            
            container.appendChild(notification);
            
            // Trigger animation
            setTimeout(() => notification.classList.add('show'), 10);
            
            // Auto remove
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 400);
            }, duration);
        }

        // =============================================
        // PARSE PLAN DATA FROM URL
        // =============================================
        function getPlanFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionKey = urlParams.get('session');
            
            if (!sessionKey) {
                showNotification('error', 'Invalid Session', 'No plan selected. Redirecting...');
                setTimeout(() => window.location.href = 'index.html#plans', 2000);
                return null;
            }
            
            try {
                const planDataStr = sessionStorage.getItem(sessionKey);
                if (!planDataStr) {
                    showNotification('error', 'Session Expired', 'Plan data not found. Please select a plan again.');
                    setTimeout(() => window.location.href = 'index.html#plans', 2000);
                    return null;
                }
                
                const planData = JSON.parse(planDataStr);
                // Clean up session storage
                sessionStorage.removeItem(sessionKey);
                
                return planData;
            } catch (error) {
                console.error('Error parsing plan data:', error);
                showNotification('error', 'Invalid Data', 'Failed to load plan details. Please try again.');
                setTimeout(() => window.location.href = 'index.html#plans', 2000);
                return null;
            }
        }

        // =============================================
        // FETCH USER BALANCES (Same endpoint as modal)
        // =============================================
        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue.');
                setTimeout(() => window.location.href = 'login', 2000);
                return false;
            }
            
            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    AppState.userBalances.main = data.data?.balances?.main || 0;
                    AppState.userBalances.matured = data.data?.balances?.matured || 0;
                    
                    // Also fetch user preferences for display asset
                    await fetchUserPreferences();
                    
                    return true;
                } else {
                    if (response.status === 401) {
                        localStorage.removeItem('jwtToken');
                        showNotification('error', 'Session Expired', 'Please login again.');
                        setTimeout(() => window.location.href = 'login', 2000);
                    }
                    return false;
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
                showNotification('error', 'Connection Error', 'Failed to load your balance.');
                return false;
            }
        }

        async function fetchUserPreferences() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/users/preferences', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    AppState.selectedAsset = data.data?.preferences?.displayAsset || 'btc';
                    
                    // Get asset price and logo
                    await fetchAssetPrice(AppState.selectedAsset);
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchAssetPrice(assetSymbol) {
            // Try to get price from various sources (same as index.html)
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    if (assetSymbol === 'btc') {
                        AppState.assetPrice = data.bitcoin?.usd || 43000;
                        AppState.assetLogo = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
                    } else if (assetSymbol === 'eth') {
                        AppState.assetPrice = data.ethereum?.usd || 2300;
                        AppState.assetLogo = 'https://assets.coingecko.com/coins/images/279/large/ethereum.png';
                    }
                }
            } catch (error) {
                console.warn('Using fallback price');
                AppState.assetPrice = assetSymbol === 'btc' ? 43000 : 2300;
                AppState.assetLogo = assetSymbol === 'btc' 
                    ? 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'
                    : 'https://assets.coingecko.com/coins/images/279/large/ethereum.png';
            }
        }

        // =============================================
        // FETCH MINER DETAILS (Same as modal)
        // =============================================
        function getMinerDetails(planIndex) {
            const miners = [
                { name: "Avalon Mini 3", hashRate: "68 TH/s", powerConsumption: "3200W", efficiency: "47 J/TH", algorithm: "SHA-256" },
                { name: "Fluminer T3", hashRate: "110 TH/s", powerConsumption: "3250W", efficiency: "29.5 J/TH", algorithm: "SHA-256" },
                { name: "Avalon Q", hashRate: "150 TH/s", powerConsumption: "3420W", efficiency: "22.8 J/TH", algorithm: "SHA-256" },
                { name: "Antminer S21 Pro", hashRate: "234 TH/s", powerConsumption: "5440W", efficiency: "23.2 J/TH", algorithm: "SHA-256" },
                { name: "Antminer S21 XP", hashRate: "255 TH/s", powerConsumption: "5445W", efficiency: "21.4 J/TH", algorithm: "SHA-256" },
                { name: "Antminer S23 Hyd", hashRate: "335 TH/s", powerConsumption: "5300W", efficiency: "15.8 J/TH", algorithm: "SHA-256" }
            ];
            
            return miners[Math.min(planIndex, miners.length - 1)];
        }

                                <span class="balance-label">Matured Balance</span>
                                <span class="balance-amount">$${AppState.userBalances.matured.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>

                            <span id="amount-error" style="color: var(--error); display: none;"></span>
                        </div>
                        
                        <div class="quick-amounts">
                            <button class="quick-amount-btn" onclick="setQuickAmount(${plan.minAmount})">Min</button>
                            <button class="quick-amount-btn" onclick="setQuickAmount(${Math.floor((plan.minAmount + plan.maxAmount) / 4)})">25%</button>
                            <button class="quick-amount-btn" onclick="setQuickAmount(${Math.floor((plan.minAmount + plan.maxAmount) / 2)})">50%</button>
                            <button class="quick-amount-btn" onclick="setQuickAmount(${Math.floor((plan.minAmount + plan.maxAmount) * 3 / 4)})">75%</button>
                            <button class="quick-amount-btn" onclick="setQuickAmount(${plan.maxAmount})">Max</button>

                    <div class="return-calculation" id="return-calculation">

                            <div class="term-icon"><i class="fas fa-check-circle" style="color: var(--success);"></i></div>
                            <div class="term-text"><strong>Referral Bonus:</strong> 5% commission on referred user's first investment</div>
                        </div>

                            <div class="term-icon"><i class="fas fa-clock"></i></div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" id="invest-button" onclick="processInvestment()">
                            <i class="fas fa-cloud"></i> Start Cloud Mining
                        </button>

                            <i class="fas fa-arrow-left"></i> Back to Plans
                        </button>

            container.innerHTML = html;
            
            // Initialize chart
            initMiningChart(plan);
            
            // Add input listeners
            const amountInput = document.getElementById('investment-amount');
            if (amountInput) {
                amountInput.addEventListener('input', () => updateCalculations(plan));
                amountInput.addEventListener('blur', () => validateAmount(plan));
            }
        }

        // =============================================
        // MINING CHART (Same as modal)
        // =============================================
        function initMiningChart(plan) {
            const container = document.getElementById('mining-chart');
            if (!container) return;
            
            // Clear container
            container.innerHTML = '<canvas id="miningChartCanvas" style="width: 100%; height: 100%;"></canvas>';
            
            const canvas = document.getElementById('miningChartCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            // Generate 24h hash rate data with realistic variation
            const hours = [];
            const hashRates = [];
            const baseHashRate = 100; // Base for visualization
            
            for (let i = 0; i < 24; i++) {
                hours.push(`${i}:00`);
                // Realistic mining variation ±5%
                const variation = 1 + (Math.random() * 0.1 - 0.05);
                hashRates.push(baseHashRate * variation);
            }
            
            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0, 216, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 216, 255, 0)');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: 'Hash Rate (TH/s)',
                        data: hashRates,
                        borderColor: '#00D8FF',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: '#00D8FF',
                        pointBorderColor: '#fff',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        x: { 
                            grid: { display: false, color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8E9BAE', maxRotation: 45 }
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8E9BAE' }
                        }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        // =============================================
        // CALCULATION FUNCTIONS
        // =============================================
        function setQuickAmount(amount) {
            const input = document.getElementById('investment-amount');
            if (input) {
                input.value = amount;
                updateCalculations(AppState.planData);
                validateAmount(AppState.planData);
            }
        }

        function updateCalculations(plan) {
            const input = document.getElementById('investment-amount');
            const calcInvestment = document.getElementById('calc-investment');
            const calcProfit = document.getElementById('calc-profit');
            const calcTotal = document.getElementById('calc-total');
            
            if (!input || !calcInvestment || !calcProfit || !calcTotal) return;
            
            let amount = parseFloat(input.value) || plan.minAmount;
            
            // Clamp to valid range
            amount = Math.max(plan.minAmount, Math.min(plan.maxAmount, amount));
            
            const profit = amount * plan.percentage / 100;
            const total = amount + profit;
            
            calcInvestment.textContent = `$${amount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            calcProfit.textContent = `$${profit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            calcTotal.textContent = `$${total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        function validateAmount(plan) {
            const input = document.getElementById('investment-amount');
            const errorEl = document.getElementById('amount-error');
            
            if (!input || !errorEl) return true;
            
            let amount = parseFloat(input.value) || 0;
            
            if (amount < plan.minAmount) {
                input.classList.add('error');
                errorEl.style.display = 'inline';
                errorEl.textContent = `Minimum amount is $${plan.minAmount}`;
                return false;
            } else if (amount > plan.maxAmount) {
                input.classList.add('error');
                errorEl.style.display = 'inline';
                errorEl.textContent = `Maximum amount is $${plan.maxAmount}`;
                return false;
            } else {
                input.classList.remove('error');
                errorEl.style.display = 'none';
                return true;
            }
        }

        // =============================================
        // INVESTMENT PROCESSING (Same endpoint as modal)
        // =============================================
        async function processInvestment() {
            if (AppState.investmentInProgress) {
                showNotification('warning', 'Processing', 'Please wait, your investment is being processed.');
                return;
            }
            
            const plan = AppState.planData;
            if (!plan) {
                showNotification('error', 'Error', 'Plan data not found.');
                return;
            }
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue.');
                setTimeout(() => window.location.href = 'login', 2000);
                return;
            }
            
            const input = document.getElementById('investment-amount');
            if (!input) return;
            
            let amount = parseFloat(input.value) || 0;
            
            // Validate amount
            if (amount < plan.minAmount || amount > plan.maxAmount) {
                showNotification('error', 'Invalid Amount', `Amount must be between $${plan.minAmount} and $${plan.maxAmount}`);
                return;
            }
            
            // Check if user has sufficient balance (main OR matured)
            if (AppState.userBalances.main < amount && AppState.userBalances.matured < amount) {
                showNotification('error', 'Insufficient Balance', 'You do not have enough funds in main or matured balance.');
                return;
            }
            
            // Set processing state
            AppState.investmentInProgress = true;
            const investBtn = document.getElementById('invest-button');
            const originalText = investBtn.innerHTML;
            investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            investBtn.disabled = true;
            
            try {
                // Determine which balance to use (prioritize main, fallback to matured)
                const useMaturedBalance = AppState.userBalances.main < amount;
                
                // Call the same endpoint as the modal
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: plan.id,
                        amount: amount,
                        useMaturedBalance: useMaturedBalance // Same parameter as modal
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Show success notification (green)
                    showNotification('success', 'Investment Successful!', 
                        `Your cloud mining investment of $${amount.toLocaleString('en-US')} has been activated.`);
                    
                    // Redirect back to index.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    
                } else {
                    const errorData = await response.json();
                    
                    // Show error notification (red)
                    showNotification('error', 'Investment Failed', 
                        errorData.message || 'Failed to process investment. Please try again.');
                    
                    // Reset button
                    investBtn.innerHTML = originalText;
                    investBtn.disabled = false;
                    AppState.investmentInProgress = false;
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                showNotification('error', 'Connection Error', 'Failed to connect to server. Please check your connection.');
                
                // Reset button
                investBtn.innerHTML = originalText;
                investBtn.disabled = false;
                AppState.investmentInProgress = false;
            }
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        async function init() {
            // Get plan from URL
            const plan = getPlanFromUrl();
            if (!plan) return;
            
            AppState.planData = plan;
            
            // Fetch user balances
            const balanceLoaded = await fetchUserBalances();
            if (!balanceLoaded) return;
            
            // Render panel
            renderInvestmentPanel(plan);
        }

        // Start when DOM is ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
    
    <!-- Chart.js for mining chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
