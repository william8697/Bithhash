<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Investment Panel - BitHash Cloud Mining</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== EXACT THEME FROM INDEX.HTML ===== */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== SMOOTH INVESTMENT PANEL - BINANCE/CRYPTO.COM STYLE ===== */
        .investment-container {
            width: 100%;
            max-width: 560px;
            background: transparent;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Plan Header */
        .plan-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .miner-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 216, 255, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(0, 216, 255, 0.2);
        }

        .miner-badge i {
            font-size: 1rem;
        }

        .plan-title {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-family: 'Rowdies', cursive;
            letter-spacing: -0.5px;
        }

        .miner-specs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .miner-specs span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .miner-specs i {
            color: var(--primary);
        }

        /* Key Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .metric-item {
            text-align: center;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--gray);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }

        .metric-value small {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 400;
            margin-left: 2px;
        }

        .metric-value.gain {
            color: var(--success);
        }

        /* Balance Cards */
        .balance-section {
            margin: 30px 0;
        }

        .balance-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .balance-card:hover {
            background: rgba(255,255,255,0.04);
        }

        .balance-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .balance-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 216, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .balance-details {
            display: flex;
            flex-direction: column;
        }

        .balance-label {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .balance-amount {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }

        .balance-note {
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 2px;
        }

        .balance-selector {
            display: flex;
            gap: 8px;
        }

        .balance-source-btn {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid var(--gray-light);
            background: transparent;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
        }

        .balance-source-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--darker);
        }

        .balance-source-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--dark);
        }

        /* Investment Input */
        .investment-input-section {
            margin: 30px 0;
        }

        .input-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .input-header i {
            color: var(--primary);
        }

        .amount-input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .amount-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gray-light);
            padding: 15px 0;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
            outline: none;
            transition: var(--transition);
            text-align: center;
        }

        .amount-input:focus {
            border-bottom-color: var(--primary);
        }

        .amount-input::placeholder {
            color: var(--gray-lighter);
            font-weight: 400;
            font-size: 1.5rem;
        }

        .amount-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .range-indicator {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--gray);
            padding: 0 5px;
        }

        .range-indicator span i {
            font-size: 0.7rem;
            color: var(--primary);
            margin: 0 4px;
        }

        /* Return Calculation */
        .return-preview {
            background: linear-gradient(135deg, rgba(0, 216, 255, 0.05) 0%, rgba(0, 163, 204, 0.05) 100%);
            padding: 25px;
            border-radius: 24px;
            margin: 30px 0;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .preview-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
        }

        .preview-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            color: var(--gray);
        }

        .fee-breakdown {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .fee-breakdown span:first-child i {
            color: var(--primary);
            font-size: 0.8rem;
            margin-right: 6px;
        }

        /* Investment Button */
        .invest-btn {
            width: 100%;
            background: var(--gradient);
            border: none;
            padding: 20px;
            border-radius: 50px;
            color: var(--darker);
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 25px rgba(0, 216, 255, 0.3);
            margin: 20px 0;
        }

        .invest-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 216, 255, 0.4);
        }

        .invest-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .invest-btn i {
            font-size: 1.3rem;
        }

        /* Important Notices (from index) */
        .important-notice {
            background: rgba(255, 184, 0, 0.05);
            border-left: 4px solid var(--warning);
            padding: 16px 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9rem;
            color: var(--gray);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .important-notice i {
            color: var(--warning);
            font-size: 1.1rem;
            margin-top: 2px;
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        /* Notification System (exact from index) */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 350px;
            pointer-events: none;
        }

        .notification {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border-left: 4px solid transparent;
        }

        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }

        .notification.success {
            background: rgba(40, 167, 69, 0.95);
            color: white;
            border-left-color: #1e7e34;
        }

        .notification.error {
            background: rgba(220, 53, 69, 0.95);
            color: white;
            border-left-color: #bd2130;
        }

        .notification i {
            font-size: 1.3rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .notification-close {
            background: none;
            border: none;
            color: white;
            opacity: 0.6;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            transition: var(--transition);
        }

        .notification-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* Loading State */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .plan-title { font-size: 2rem; }
            .metrics-grid { gap: 10px; }
            .metric-value { font-size: 1.1rem; }
            .amount-input { font-size: 2rem; }
            .preview-amount { font-size: 1.6rem; }
            .balance-card { flex-direction: column; align-items: flex-start; gap: 10px; }
            .balance-selector { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div class="notification-center" id="notification-center"></div>

    <div id="investment-container">
        <!-- Dynamic content will be injected here -->
        <div class="loading-container">
            <div class="spinner"></div>
            <div style="color: var(--gray);">Loading mining plan...</div>
        </div>
    </div>

    <script>
        (function() {
            // ========== GLOBAL STATE ==========
            let currentPlan = null;
            let userBalances = {
                main: 0,
                matured: 0
            };
            let selectedSource = 'main'; // 'main' or 'matured'
            let investmentInProgress = false;
            
            // Miners data (same as index.html)
            const miners = [
                { name: "Avalon Mini 3", hashRate: "68 TH/s", power: "3200W" },
                { name: "Fluminer T3", hashRate: "110 TH/s", power: "3250W" },
                { name: "Avalon Q", hashRate: "150 TH/s", power: "3420W" },
                { name: "Antminer S21 Pro", hashRate: "234 TH/s", power: "5440W" },
                { name: "Antminer S21 XP", hashRate: "255 TH/s", power: "5445W" },
                { name: "Antminer S23 Hyd", hashRate: "335 TH/s", power: "5300W" }
            ];
            
            const processorLogos = [
                'https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg',
                'https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg',
                'https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg',
                'https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg',
                'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg',
                'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
            ];

            // ========== NOTIFICATION SYSTEM ==========
            const notificationQueue = [];
            let isNotificationShowing = false;

            function showNotification(type, title, message, duration = 5000) {
                notificationQueue.push({ type, title, message, duration });
                if (!isNotificationShowing) {
                    processNotificationQueue();
                }
            }

            function processNotificationQueue() {
                if (notificationQueue.length === 0) {
                    isNotificationShowing = false;
                    return;
                }

                isNotificationShowing = true;
                const { type, title, message, duration } = notificationQueue.shift();

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';

                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <button class="notification-close">&times;</button>
                `;

                document.getElementById('notification-center').appendChild(notification);

                notification.querySelector('.notification-close').addEventListener('click', () => {
                    closeNotification(notification);
                });

                void notification.offsetWidth;
                notification.classList.add('show');

                if (type === 'error' && 'vibrate' in navigator) {
                    navigator.vibrate([200, 100, 200]);
                }

                if (duration > 0) {
                    setTimeout(() => {
                        if (notification.parentNode) {
                            closeNotification(notification);
                        }
                    }, duration);
                }
            }

            function closeNotification(notification) {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                    processNotificationQueue();
                }, 300);
            }

            // ========== LOAD PLAN FROM SESSION ==========
            function loadPlanFromSession() {
                const urlParams = new URLSearchParams(window.location.search);
                const sessionKey = urlParams.get('session');

                if (!sessionKey) {
                    showNotification('error', 'Invalid Request', 'No mining plan selected. Redirecting...');
                    setTimeout(() => { window.location.href = 'index.html#plans'; }, 2000);
                    return false;
                }

                const stored = sessionStorage.getItem(sessionKey);
                if (!stored) {
                    showNotification('error', 'Session Expired', 'Please select a plan again.');
                    setTimeout(() => { window.location.href = 'index.html#plans'; }, 2000);
                    return false;
                }

                try {
                    currentPlan = JSON.parse(stored);
                    sessionStorage.removeItem(sessionKey); // One-time use
                    return true;
                } catch (e) {
                    console.error('Parse error:', e);
                    showNotification('error', 'Data Error', 'Invalid plan data.');
                    setTimeout(() => { window.location.href = 'index.html#plans'; }, 2000);
                    return false;
                }
            }

            // ========== FETCH BALANCES ==========
            async function fetchUserBalances() {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest.');
                    setTimeout(() => { window.location.href = 'signup'; }, 2000);
                    return false;
                }

                try {
                    const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!response.ok) {
                        if (response.status === 401) {
                            localStorage.removeItem('jwtToken');
                            showNotification('error', 'Session Expired', 'Please login again.');
                            setTimeout(() => { window.location.href = 'login'; }, 2000);
                            return false;
                        }
                        throw new Error('Failed to fetch balances');
                    }

                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    return true;
                } catch (error) {
                    console.error('Balance fetch error:', error);
                    showNotification('error', 'Connection Error', 'Could not fetch your balance. Please try again.');
                    return false;
                }
            }

            // ========== RENDER FULL INVESTMENT PANEL ==========
            function renderInvestmentPanel() {
                if (!currentPlan) return;

                const container = document.getElementById('investment-container');
                const planIndex = currentPlan.planIndex || 0;
                const miner = miners[planIndex % miners.length];
                const processorImage = processorLogos[planIndex % processorLogos.length];
                
                const minAmount = currentPlan.minAmount;
                const maxAmount = currentPlan.maxAmount;
                const percentage = currentPlan.percentage;
                const duration = currentPlan.duration;
                const planName = currentPlan.name || 'Cloud Mining';

                // Calculate which sources are available
                const mainSufficient = userBalances.main >= minAmount;
                const maturedSufficient = userBalances.matured >= minAmount;
                const canInvest = mainSufficient || maturedSufficient;

                // Default to main if available, else matured
                if (mainSufficient) selectedSource = 'main';
                else if (maturedSufficient) selectedSource = 'matured';

                const availableBalance = selectedSource === 'main' ? userBalances.main : userBalances.matured;

                container.innerHTML = `
                    <div class="investment-container">
                        <!-- Plan Header with Miner Image -->
                        <div class="plan-header">
                            <div class="miner-badge">
                                <i class="fas fa-cloud"></i>
                                <span>ACTIVE CLOUD MINING CONTRACT</span>
                            </div>
                            <h1 class="plan-title">${planName}</h1>
                            <div class="miner-specs">
                                <span><i class="fas fa-microchip"></i> ${miner.name}</span>
                                <span><i class="fas fa-bolt"></i> ${miner.hashRate}</span>
                                <span><i class="fas fa-chart-line"></i> SHA-256</span>
                            </div>
                        </div>

                        <!-- Key Metrics -->
                        <div class="metrics-grid">
                            <div class="metric-item">
                                <div class="metric-label">Min Investment</div>
                                <div class="metric-value">$${minAmount.toLocaleString()}</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Max Investment</div>
                                <div class="metric-value">$${maxAmount.toLocaleString()}</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Return Rate</div>
                                <div class="metric-value gain">+${percentage}%</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Duration</div>
                                <div class="metric-value">${duration}h</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Miner Efficiency</div>
                                <div class="metric-value"><small>${miner.power}</small></div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-label">Pool Fee</div>
                                <div class="metric-value"><small>3%</small></div>
                            </div>
                        </div>

                        <!-- Balance Cards -->
                        <div class="balance-section">
                            <div class="balance-card ${selectedSource === 'main' ? 'active' : ''}">
                                <div class="balance-info">
                                    <div class="balance-icon">
                                        <i class="fas fa-wallet"></i>
                                    </div>
                                    <div class="balance-details">
                                        <span class="balance-label">Main Balance</span>
                                        <span class="balance-amount">$${userBalances.main.toFixed(2)}</span>
                                        <span class="balance-note">Available for investment</span>
                                    </div>
                                </div>
                                <div class="balance-selector">
                                    <button class="balance-source-btn ${selectedSource === 'main' ? 'active' : ''}" 
                                            onclick="window.selectSource('main')"
                                            ${!mainSufficient ? 'disabled' : ''}>
                                        Use Main
                                    </button>
                                </div>
                            </div>

                            <div class="balance-card ${selectedSource === 'matured' ? 'active' : ''}">
                                <div class="balance-info">
                                    <div class="balance-icon">
                                        <i class="fas fa-piggy-bank"></i>
                                    </div>
                                    <div class="balance-details">
                                        <span class="balance-label">Matured Balance</span>
                                        <span class="balance-amount">$${userBalances.matured.toFixed(2)}</span>
                                        <span class="balance-note">From completed investments</span>
                                    </div>
                                </div>
                                <div class="balance-selector">
                                    <button class="balance-source-btn ${selectedSource === 'matured' ? 'active' : ''}" 
                                            onclick="window.selectSource('matured')"
                                            ${!maturedSufficient ? 'disabled' : ''}>
                                        Use Matured
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Investment Input -->
                        <div class="investment-input-section">
                            <div class="input-header">
                                <i class="fas fa-coins"></i>
                                <span>Investment Amount (USD)</span>
                            </div>
                            
                            <div class="amount-input-wrapper">
                                <input type="number" class="amount-input" id="investment-amount"
                                       placeholder="${minAmount}" 
                                       min="${minAmount}" 
                                       max="${Math.min(maxAmount, availableBalance)}" 
                                       step="10"
                                       value="${minAmount}"
                                       ${!canInvest ? 'disabled' : ''}>
                            </div>
                            
                            <div class="range-indicator">
                                <span><i class="fas fa-angle-left"></i> Min: $${minAmount.toLocaleString()}</span>
                                <span>Max: $${Math.min(maxAmount, availableBalance).toLocaleString()} <i class="fas fa-angle-right"></i></span>
                            </div>
                        </div>

                        <!-- Return Preview with Fee Breakdown -->
                        <div class="return-preview" id="returnPreview">
                            <div class="preview-row">
                                <span class="preview-label">Estimated Gross Return</span>
                                <span class="preview-amount" id="grossReturn">$${(minAmount * percentage / 100).toFixed(2)}</span>
                            </div>
                            <div class="preview-details">
                                <div class="fee-breakdown">
                                    <span><i class="fas fa-percentage"></i> Company Fee (3%)</span>
                                    <span id="feeAmount">$${(minAmount * 0.03).toFixed(2)}</span>
                                </div>
                                <div class="fee-breakdown" style="color: var(--success);">
                                    <span><i class="fas fa-hand-holding-heart"></i> Net Return</span>
                                    <span id="netReturn">$${(minAmount * percentage / 100 - minAmount * 0.03).toFixed(2)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Important Notice -->
                        <div class="important-notice">
                            <i class="fas fa-info-circle"></i>
                            <div>
                                <strong>Important:</strong> A 3% company fee will be deducted upon plan maturity. 
                                Minimum investment: $${minAmount}. Maximum: $${maxAmount}. 
                                Your investment will be active for ${duration} hours.
                            </div>
                        </div>

                        <!-- Invest Button -->
                        <button class="invest-btn" id="investBtn" ${!canInvest ? 'disabled' : ''}>
                            <i class="fas ${canInvest ? 'fa-cloud-upload-alt' : 'fa-exclamation-circle'}"></i>
                            ${!canInvest ? 'Insufficient Balance' : 'Start Cloud Mining'}
                        </button>

                        <!-- Back Link -->
                        <div class="back-link">
                            <a href="index.html#plans"><i class="fas fa-arrow-left"></i> Back to Mining Plans</a>
                        </div>
                    </div>
                `;

                // Attach event listeners
                const amountInput = document.getElementById('investment-amount');
                if (amountInput) {
                    amountInput.addEventListener('input', updateReturnPreview);
                    // Initial update
                    updateReturnPreview();
                }

                document.getElementById('investBtn')?.addEventListener('click', startInvestment);
            }

            // ========== UPDATE RETURN PREVIEW ==========
            function updateReturnPreview() {
                const amountInput = document.getElementById('investment-amount');
                const grossSpan = document.getElementById('grossReturn');
                const feeSpan = document.getElementById('feeAmount');
                const netSpan = document.getElementById('netReturn');

                if (!amountInput || !grossSpan || !feeSpan || !netSpan || !currentPlan) return;

                let amount = parseFloat(amountInput.value) || currentPlan.minAmount;
                
                // Clamp to valid range
                const availableBalance = selectedSource === 'main' ? userBalances.main : userBalances.matured;
                const maxAllowed = Math.min(currentPlan.maxAmount, availableBalance);
                
                if (amount < currentPlan.minAmount) amount = currentPlan.minAmount;
                if (amount > maxAllowed) amount = maxAllowed;
                
                const grossReturn = amount * (currentPlan.percentage / 100);
                const fee = amount * 0.03; // 3% company fee
                const netReturn = grossReturn - fee;

                grossSpan.textContent = '$' + grossReturn.toFixed(2);
                feeSpan.textContent = '$' + fee.toFixed(2);
                netSpan.textContent = '$' + netReturn.toFixed(2);
            }

            // ========== SELECT BALANCE SOURCE ==========
            window.selectSource = function(source) {
                if (!currentPlan) return;
                
                selectedSource = source;
                const availableBalance = source === 'main' ? userBalances.main : userBalances.matured;
                const maxAllowed = Math.min(currentPlan.maxAmount, availableBalance);
                
                // Re-render panel to show active state and update max
                renderInvestmentPanel();
                
                const amountInput = document.getElementById('investment-amount');
                if (amountInput) {
                    amountInput.max = maxAllowed;
                    if (parseFloat(amountInput.value) > maxAllowed) {
                        amountInput.value = maxAllowed;
                    }
                    updateReturnPreview();
                }
            };

            // ========== INVESTMENT LOGIC ==========
            async function startInvestment() {
                if (investmentInProgress) {
                    showNotification('warning', 'In Progress', 'Please wait, your investment is being processed.');
                    return;
                }

                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Not Logged In', 'Redirecting to login...');
                    setTimeout(() => { window.location.href = 'login'; }, 1500);
                    return;
                }

                const amountInput = document.getElementById('investment-amount');
                if (!amountInput) return;

                const amount = parseFloat(amountInput.value);
                const availableBalance = selectedSource === 'main' ? userBalances.main : userBalances.matured;

                // Validate amount
                if (isNaN(amount) || amount < currentPlan.minAmount || amount > currentPlan.maxAmount) {
                    showNotification('error', 'Invalid Amount', 
                        `Amount must be between $${currentPlan.minAmount} and $${currentPlan.maxAmount}.`);
                    return;
                }

                if (amount > availableBalance) {
                    showNotification('error', 'Insufficient Balance', 
                        `You don't have enough funds in ${selectedSource} balance.`);
                    return;
                }

                investmentInProgress = true;
                const investBtn = document.getElementById('investBtn');
                if (investBtn) {
                    investBtn.disabled = true;
                    investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Investment...';
                }

                try {
                    const response = await fetch('https://bithash-backend.onrender.com/api/investments/create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            planId: currentPlan.id,
                            amount: amount,
                            source: selectedSource
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Calculate return for success message
                        const grossReturn = amount * (currentPlan.percentage / 100);
                        const netReturn = grossReturn - (amount * 0.03);
                        
                        showNotification('success', 'Investment Successful!', 
                            `Your investment of $${amount.toFixed(2)} is now mining. Expected net return: $${netReturn.toFixed(2)} after ${currentPlan.duration}h.`);

                        // Redirect back to main page after success
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        throw new Error(data.message || 'Investment failed');
                    }

                } catch (error) {
                    console.error('Investment error:', error);
                    showNotification('error', 'Investment Failed', error.message || 'Could not complete investment.');

                    if (investBtn) {
                        investBtn.disabled = false;
                        investBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Start Cloud Mining';
                    }
                    investmentInProgress = false;
                }
            }

            // ========== INITIALIZATION ==========
            (async function init() {
                // Load plan from session
                if (!loadPlanFromSession()) return;

                // Fetch user balances
                const balanceOk = await fetchUserBalances();
                if (!balanceOk) return;

                // Render the full panel
                renderInvestmentPanel();
            })();

        })();
    </script>
</body>
</html>
