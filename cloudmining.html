<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash Cloud Mining | Plan Details & Investment</title>
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --dark: #FFFFFF;
            --light: #0A0E17;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --border-radius: 8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Smooth, borderless design like Binance/Bybit */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo img {
            height: 32px;
            width: auto;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .back-button {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--gray);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .balance-bar {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .balances {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .balance-item i {
            color: var(--primary);
        }

        .balance-amount {
            color: white;
            font-weight: 600;
            margin-left: 4px;
        }

        /* Main content - smooth, no boxes/borders */
        .plan-detail-container {
            padding: 40px 0;
            flex: 1;
        }

        .plan-header {
            margin-bottom: 40px;
        }

        .plan-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .plan-subtitle {
            color: var(--gray);
            font-size: 1rem;
        }

        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .plan-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }

        /* Left column - plan specs */
        .specs-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 30px;
            border-radius: 16px;
        }

        .specs-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .spec-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .spec-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .spec-value.small {
            font-size: 1rem;
        }

        .spec-value .gain {
            color: var(--success);
        }

        /* Right column - investment panel */
        .investment-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 30px;
            border-radius: 16px;
        }

        .balance-selector {
            margin-bottom: 24px;
        }

        .balance-label {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 12px;
        }

        .balance-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .balance-option {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .balance-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }

        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-option.disabled:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .balance-option-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--gray);
            font-size: 0.8rem;
        }

        .balance-option-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .balance-amount-fiat {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .balance-amount-asset {
            font-size: 0.8rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .balance-amount-asset img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .investment-form {
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .amount-input-wrapper {
            position: relative;
        }

        .amount-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            transition: all 0.2s;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .amount-input.error {
            border-color: var(--error);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 6px;
            min-height: 20px;
        }

        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .return-fiat {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 8px;
        }

        .return-asset {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .return-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .invest-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: var(--secondary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.3);
        }

        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .invest-button.loading {
            position: relative;
            color: transparent;
        }

        .invest-button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--secondary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Miner details section */
        .miner-section {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 30px;
            border-radius: 16px;
        }

        .miner-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .miner-content {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .miner-content {
                grid-template-columns: 1fr;
            }
        }

        .miner-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
        }

        .miner-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .miner-spec-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .miner-spec-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .miner-spec-value {
            font-weight: 600;
        }

        /* TradingView chart */
        .chart-section {
            margin-top: 30px;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
        }

        /* Notification system */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            width: 100%;
            max-width: 350px;
        }

        .notification {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            border-left: 4px solid transparent;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification.success i {
            color: var(--success);
        }

        .notification.error i {
            color: var(--error);
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .notification-close {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Investment processing indicator */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .processing-overlay.active {
            display: flex;
        }

        .processing-content {
            text-align: center;
        }

        .processing-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .processing-text {
            color: white;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Investment Processing Overlay -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-content">
            <div class="processing-spinner"></div>
            <div class="processing-text" id="processingText">Processing investment...</div>
        </div>
    </div>

    <!-- Notification System -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='index.html'">
                    <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                    <span>BitHash</span>
                </div>
                <button class="back-button" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-left"></i>
                    Back to Plans
                </button>
            </div>
        </div>
    </header>

    <!-- Balance Bar (shown when logged in) -->
    <div class="balance-bar" id="balanceBar" style="display: none;">
        <div class="container">
            <div class="balances" id="balancesContainer">
                <!-- Dynamic balance display -->
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="plan-detail-container" id="planDetailContainer">
            <!-- Dynamic content will be loaded here -->
        </div>
    </div>

    <script>
        // =============================================
        // PRODUCTION READY CLOUD MINING PANEL
        // =============================================

        // Configuration
        const API_BASE = 'https://bithash-backend.onrender.com/api';
        const ASSET_LOGOS = {
            btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
            eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
            usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
            bnb: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
            sol: 'https://assets.coingecko.com/coins/images/4128/large/solana.png'
        };

        // Global state
        let currentPlan = null;
        let userBalances = { main: 0, matured: 0 };
        let userPreferences = { displayAsset: 'btc' };
        let currentBTCPrice = 43000;
        let selectedBalanceType = null;
        let isProcessing = false;
        let investmentInProgress = false;

        // Get URL parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                session: params.get('session'),
                v: params.get('v'),
                ref: params.get('ref'),
                planId: params.get('plan') // Added for direct plan access
            };
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <button class="notification-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            
            container.appendChild(notification);
            
            // Trigger animation
            setTimeout(() => notification.classList.add('show'), 10);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);
        }

        // =============================================
        // AUTHENTICATION & BALANCE FETCHING
        // =============================================
        async function checkAuth() {
            const token = localStorage.getItem('jwtToken');
            const balanceBar = document.getElementById('balanceBar');
            const authButtons = document.getElementById('auth-buttons');
            
            if (!token) {
                balanceBar.style.display = 'none';
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    await fetchBalances();
                    await fetchUserPreferences();
                    balanceBar.style.display = 'block';
                    return true;
                } else {
                    localStorage.removeItem('jwtToken');
                    balanceBar.style.display = 'none';
                    return false;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                balanceBar.style.display = 'none';
                return false;
            }
        }

        async function fetchBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    updateBalanceDisplay();
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
            }
        }

        async function fetchUserPreferences() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/preferences`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    currentBTCPrice = data.bitcoin.usd;
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
            }
        }

        function updateBalanceDisplay() {
            const container = document.getElementById('balancesContainer');
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            
            const mainAssetAmount = currentBTCPrice > 0 ? userBalances.main / currentBTCPrice : 0;
            const maturedAssetAmount = currentBTCPrice > 0 ? userBalances.matured / currentBTCPrice : 0;
            
            container.innerHTML = `
                <div class="balance-item">
                    <i class="fas fa-wallet"></i>
                    <span>Main Balance:</span>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <img src="${assetLogo}" style="width: 16px; height: 16px; border-radius: 50%;">
                        <span class="balance-amount">${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                    <span style="color: var(--gray); margin-left: 8px;">($${formatUSD(userBalances.main)})</span>
                </div>
                <div class="balance-item">
                    <i class="fas fa-piggy-bank"></i>
                    <span>Matured Balance:</span>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <img src="${assetLogo}" style="width: 16px; height: 16px; border-radius: 50%;">
                        <span class="balance-amount">${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                    <span style="color: var(--gray); margin-left: 8px;">($${formatUSD(userBalances.matured)})</span>
                </div>
            `;
        }

        // =============================================
        // PLAN DATA FETCHING
        // =============================================
        async function fetchPlanData() {
            const urlParams = getUrlParams();
            
            // First, validate session
            if (!urlParams.session) {
                showNotification('error', 'Invalid Session', 'No valid session found. Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // Store session info
            sessionStorage.setItem('miningSession', urlParams.session);
            sessionStorage.setItem('miningRef', urlParams.ref);
            
            try {
                // Fetch all plans
                const response = await fetch(`${API_BASE}/plans`);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch plans');
                }
                
                const data = await response.json();
                const plans = data.data?.plans || [];
                
                // Get plan from URL or use first plan
                let planId = urlParams.planId;
                let selectedPlan = null;
                
                if (planId) {
                    selectedPlan = plans.find(p => p.id === planId);
                }
                
                // If no plan specified or plan not found, use the first one
                if (!selectedPlan && plans.length > 0) {
                    selectedPlan = plans[0];
                }
                
                if (!selectedPlan) {
                    throw new Error('No plans available');
                }
                
                currentPlan = selectedPlan;
                renderPlanDetails(selectedPlan);
                
            } catch (error) {
                console.error('Error fetching plan:', error);
                showNotification('error', 'Error', 'Failed to load plan details. Using fallback data.');
                
                // Fallback plan data
                currentPlan = {
                    id: 'fallback-plan',
                    name: 'Bitcoin Cloud Mining',
                    minAmount: 50,
                    maxAmount: 10000,
                    percentage: 15,
                    duration: 24,
                    description: 'Professional Bitcoin cloud mining plan with SHA-256 ASIC miners.'
                };
                renderPlanDetails(currentPlan);
            }
        }

        // =============================================

        // =============================================
        // BALANCE OPTIONS
        // =============================================
        function updateBalanceOptions() {
            const container = document.getElementById('balanceOptions');
            if (!container || !currentPlan) return;
            
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const minAmount = currentPlan.minAmount;
            
            const mainAssetAmount = currentBTCPrice > 0 ? userBalances.main / currentBTCPrice : 0;
            const maturedAssetAmount = currentBTCPrice > 0 ? userBalances.matured / currentBTCPrice : 0;
            
            container.innerHTML = `
                <div class="balance-option ${userBalances.main >= minAmount ? '' : 'disabled'}" 
                     data-type="main" 
                     data-amount="${userBalances.main}"
                     onclick="selectBalance('main', ${userBalances.main})">
                    <div class="balance-option-header">
                        <span class="balance-option-name">Main Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${formatUSD(userBalances.main)}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}">
                        <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-option ${userBalances.matured >= minAmount ? '' : 'disabled'}" 
                     data-type="matured" 
                     data-amount="${userBalances.matured}"
                     onclick="selectBalance('matured', ${userBalances.matured})">
                    <div class="balance-option-header">
                        <span class="balance-option-name">Matured Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${formatUSD(userBalances.matured)}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}">
                        <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
            
            // Auto-select first available balance
            if (userBalances.main >= minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        function selectBalance(type, amount) {
            // Remove selection from all options
            document.querySelectorAll('.balance-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Select clicked option if not disabled
            const selectedOption = document.querySelector(`.balance-option[data-type="${type}"]`);
            if (selectedOption && !selectedOption.classList.contains('disabled')) {
                selectedOption.classList.add('selected');
                selectedBalanceType = type;
                
                // Update investment input
                const input = document.getElementById('investmentAmount');
                const minAmount = currentPlan.minAmount;
                const maxAmount = Math.min(currentPlan.maxAmount, amount);
                
                if (input) {
                    input.value = minAmount;
                    input.max = maxAmount;
                    validateInvestment();
                }
                
                // Enable invest button
                document.getElementById('investButton').disabled = false;
            }
        }

        // =============================================
        // INVESTMENT VALIDATION & CALCULATION
        // =============================================
        function setupEventListeners(plan) {
            const input = document.getElementById('investmentAmount');
            const investButton = document.getElementById('investButton');
            
            if (input) {
                input.addEventListener('input', validateInvestment);
            }
            
            if (investButton) {
                investButton.addEventListener('click', handleInvestment);
            }
        }

        function validateInvestment() {
            const input = document.getElementById('investmentAmount');
            const errorEl = document.getElementById('amountError');
            const investButton = document.getElementById('investButton');
            
            if (!input || !errorEl || !currentPlan || !selectedBalanceType) return;
            
            const amount = parseFloat(input.value) || 0;
            const minAmount = currentPlan.minAmount;
            const maxAmount = parseFloat(input.max) || currentPlan.maxAmount;
            
            // Clear previous error
            errorEl.textContent = '';
            input.classList.remove('error');
            
            // Validation
            if (amount < minAmount) {
                errorEl.textContent = `Minimum investment is $${minAmount.toLocaleString()}`;
                input.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount > maxAmount) {
                errorEl.textContent = `Maximum investment is $${maxAmount.toLocaleString()}`;
                input.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            // Update expected return
            updateExpectedReturn(amount);
            investButton.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            if (!currentPlan) return;
            
            const percentage = currentPlan.percentage;
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * percentage / 100);
            
            document.getElementById('returnFiat').textContent = `$${formatUSD(totalReturn)}`;
            
            // Asset conversion
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const assetAmount = currentBTCPrice > 0 ? totalReturn / currentBTCPrice : 0;
            
            document.getElementById('returnAssetLogo').src = assetLogo;
            document.getElementById('returnAssetText').textContent = `${formatNumber(assetAmount)} ${asset.toUpperCase()}`;
        }

        // =============================================
        // INVESTMENT HANDLING (EXACT MODAL LOGIC)
        // =============================================
        async function handleInvestment() {
            // Prevent double investment
            if (investmentInProgress) {
                showNotification('error', 'Investment in Progress', 'Please wait for your current investment to complete.');
                return;
            }
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest.');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }
            
            const amount = parseFloat(document.getElementById('investmentAmount').value);
            const planId = currentPlan.id;
            const balanceType = selectedBalanceType;
            
            // Final validation
            if (!validateInvestment()) return;
            
            // Show processing overlay
            investmentInProgress = true;
            const processingOverlay = document.getElementById('processingOverlay');
            const processingText = document.getElementById('processingText');
            const investButton = document.getElementById('investButton');
            
            processingOverlay.classList.add('active');
            processingText.textContent = 'Processing cloud mining investment...';
            investButton.disabled = true;
            
            try {
                // Call EXACT same endpoint as modals
                const response = await fetch(`${API_BASE}/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: planId,
                        amount: amount,
                        balanceType: balanceType
                    })
                });
                
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = { message: 'Investment processed successfully' };
                }
                
                if (response.ok) {
                    // Success - green notification
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${formatUSD(amount)} has been created.`);
                    
                    processingText.textContent = 'Investment successful! Redirecting...';
                    
                    // Refresh balances
                    await fetchBalances();
                    
                    // Redirect back to index after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                
                // Error - red notification
                showNotification('error', 'Investment Failed', 
                    error.message || 'There was an error processing your investment.');
                
                processingOverlay.classList.remove('active');
                investButton.disabled = false;
                investmentInProgress = false;
            }
        }

        // =============================================
        // TRADINGVIEW CHART
        // =============================================
        function initTradingView() {
            // Load TradingView script if not already loaded
            if (typeof TradingView === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://s3.tradingview.com/tv.js';
                script.async = true;
                script.onload = createWidget;
                document.head.appendChild(script);
            } else {
                createWidget();
            }
        }

        function createWidget() {
            if (typeof TradingView === 'undefined') return;
            
            new TradingView.widget({
                "width": "100%",
                "height": "200",
                "symbol": "BITSTAMP:BTCUSD",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "container_id": "tradingviewChart",
                "studies": [],
                "show_popup_button": false,
                "popup_width": "1000",
                "popup_height": "650"
            });
        }

        // =============================================
        // FORMATTING FUNCTIONS
        // =============================================
        function formatNumber(num) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            if (numericNum >= 1e3) return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return numericNum.toFixed(6);
        }

        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        window.addEventListener('load', async function() {
            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 500);
            
            // Check authentication
            await checkAuth();
            
            // Fetch BTC price
            await fetchBTCPrice();
            
            // Fetch and render plan
            await fetchPlanData();
            
            // Auto-refresh balances every 30 seconds if logged in
            if (localStorage.getItem('jwtToken')) {
                setInterval(fetchBalances, 30000);
                setInterval(fetchBTCPrice, 60000);
            }
        });

        // Clean up on unload
        window.addEventListener('beforeunload', function() {
            investmentInProgress = false;
        });
    </script>
