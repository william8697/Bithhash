<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash Cloud Mining | Professional Bitcoin Mining Investment</title>
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0C10;
            --bg-secondary: #111317;
            --bg-tertiary: #1A1D24;
            --surface: #1E2128;
            --surface-hover: #2A2E38;
            --primary: #00D8FF;
            --primary-glow: rgba(0, 216, 255, 0.2);
            --success: #16C784;
            --success-glow: rgba(22, 199, 132, 0.15);
            --error: #EA3943;
            --warning: #F0B90B;
            --text-primary: #FFFFFF;
            --text-secondary: #848E9C;
            --text-tertiary: #5F6A7A;
            --border: #2A2E38;
            --border-light: #363B45;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .logo span {
            font-weight: 600;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
            color: var(--text-primary);
            transform: translateX(-2px);
        }

        /* Balance Bar */
        .balance-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }

        .balance-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 24px;
            justify-content: flex-end;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--surface);
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .balance-item i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .balance-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .balance-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .balance-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 4px;
        }

        .balance-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .balance-asset span {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 24px;
        }

        /* Plan Header */
        .plan-header {
            margin-bottom: 40px;
        }

        .plan-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .plan-breadcrumb i {
            font-size: 0.7rem;
        }

        .plan-breadcrumb span {
            color: var(--text-primary);
        }

        .plan-title-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .plan-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .plan-badge {
            background: rgba(0, 216, 255, 0.1);
            border: 1px solid rgba(0, 216, 255, 0.2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .plan-badge i {
            font-size: 0.7rem;
        }

        .plan-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 8px;
        }

        /* Grid Layout */
        .plan-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) {
            .plan-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: var(--border-light);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            color: var(--primary);
            font-size: 1rem;
        }

        /* Specs Grid */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .spec-item {
            padding: 16px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .spec-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .spec-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
        }

        .spec-value.small {
            font-size: 1.1rem;
        }

        .spec-value .success {
            color: var(--success);
        }

        .spec-note {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* Balance Selector */
        .balance-selector {
            margin-bottom: 24px;
        }

        .selector-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .balance-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .balance-option {
            padding: 16px;
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .balance-option:hover:not(.disabled) {
            background: var(--surface-hover);
            border-color: var(--border-light);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.05);
        }

        .balance-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .option-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .option-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .option-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .option-fiat {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'Manrope', sans-serif;
        }

        .option-crypto {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .option-crypto img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* Investment Form */
        .investment-form {
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .form-label span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-label .balance-hint {
            color: var(--primary);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface-hover);
        }

        .input-wrapper input.error {
            border-color: var(--error);
        }

        .input-suffix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 6px;
            min-height: 20px;
        }

        /* Return Display */
        .return-display {
            background: rgba(22, 199, 132, 0.05);
            border: 1px solid rgba(22, 199, 132, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
            margin-bottom: 8px;
        }

        .return-crypto {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .return-crypto img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Invest Button */
        .invest-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), #00A3CC);
            border: none;
            border-radius: 16px;
            color: var(--bg-primary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .invest-button i {
            font-size: 1rem;
        }

        /* Miner Details */
        .miner-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .miner-grid {
                grid-template-columns: 1fr;
            }
        }

        .miner-image {
            width: 120px;
            height: 120px;
            background: var(--surface);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .miner-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .miner-spec {
            padding: 12px;
            background: var(--surface);
            border-radius: 12px;
        }

        .miner-spec-label {
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .miner-spec-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Chart */
        .chart-container {
            margin-top: 24px;
            height: 200px;
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Notifications */
        .notification-center {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            width: 320px;
        }

        .notification {
            background: var(--bg-secondary);
            border-left: 4px solid transparent;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.success i {
            color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        .notification.error i {
            color: var(--error);
        }

        .notification-icon {
            font-size: 1.2rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .notification-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Processing Overlay */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .processing-overlay.active {
            display: flex;
        }

        .processing-content {
            text-align: center;
        }

        .processing-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .processing-text {
            color: var(--text-primary);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Processing Overlay -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-content">
            <div class="processing-spinner"></div>
            <div class="processing-text" id="processingText">Processing investment...</div>
        </div>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">

    <!-- Balance Bar (shown when logged in) -->
    <div class="balance-bar" id="balanceBar" style="display: none;">
        <div class="balance-container" id="balanceContainer">

        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Dynamic content will be loaded here -->
    </main>

    <script>
        // =============================================
        // PRODUCTION READY CLOUD MINING INVESTMENT PANEL

        const API_BASE = 'https://bithash-backend.onrender.com/api';
        const ASSET_LOGOS = {

        // Miner database
        const MINERS = [

            },
            {

                image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
            },
            {
                name: 'Avalon Mini 3',
                hashRate: '68 TH/s',
                power: '3200W',
                algorithm: 'SHA-256',
                efficiency: '47 J/TH',
                cooling: 'Air Cooling',
                image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg'
            }
        ];

        // Global state
        let currentPlan = null;
        let userBalances = { main: 0, matured: 0 };
        let userPreferences = { displayAsset: 'btc' };
        let currentBTCPrice = 43000;
        let selectedBalanceType = null;
        let investmentInProgress = false;
        let sessionData = null;

        // =============================================
        // URL PARAMETER HANDLING
        // =============================================
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                session: params.get('session'),
                v: params.get('v'),
                ref: params.get('ref'),
                plan: params.get('plan'),
                name: params.get('name'),
                min: params.get('min') ? parseFloat(params.get('min')) : null,
                max: params.get('max') ? parseFloat(params.get('max')) : null,
                percentage: params.get('percentage') ? parseFloat(params.get('percentage')) : null,
                duration: params.get('duration') ? parseInt(params.get('duration')) : null
            };
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon} notification-icon"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <button class="notification-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 10);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 300);
                }
            }, 5000);
        }

        // =============================================
        // AUTHENTICATION & BALANCE FETCHING
        // =============================================
        async function checkAuth() {
            const token = localStorage.getItem('jwtToken');
            const balanceBar = document.getElementById('balanceBar');
            
            if (!token) {
                balanceBar.style.display = 'none';
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    await fetchBalances();
                    await fetchUserPreferences();
                    await fetchBTCPrice();
                    balanceBar.style.display = 'block';
                    return true;
                } else {
                    localStorage.removeItem('jwtToken');
                    balanceBar.style.display = 'none';
                    return false;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                balanceBar.style.display = 'none';
                return false;
            }
        }

        async function fetchBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    updateBalanceDisplay();
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
            }
        }

        async function fetchUserPreferences() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${API_BASE}/users/preferences`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    currentBTCPrice = data.bitcoin.usd;
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
            }
        }

        function updateBalanceDisplay() {
            const container = document.getElementById('balanceContainer');
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            
            const mainAssetAmount = currentBTCPrice > 0 ? userBalances.main / currentBTCPrice : 0;
            const maturedAssetAmount = currentBTCPrice > 0 ? userBalances.matured / currentBTCPrice : 0;
            
            container.innerHTML = `
                <div class="balance-item">
                    <i class="fas fa-wallet"></i>
                    <span class="balance-label">Main</span>
                    <span class="balance-value">$${formatUSD(userBalances.main)}</span>
                    <div class="balance-asset">
                        <img src="${assetLogo}" alt="${asset}">
                        <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-item">
                    <i class="fas fa-clock"></i>
                    <span class="balance-label">Matured</span>
                    <span class="balance-value">$${formatUSD(userBalances.matured)}</span>
                    <div class="balance-asset">
                        <img src="${assetLogo}" alt="${asset}">
                        <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }

        // =============================================
        // PLAN DATA INITIALIZATION
        // =============================================
        async function initializePlan() {
            const params = getUrlParams();
            
            // Validate session
            if (!params.session) {
                showNotification('error', 'Invalid Session', 'No valid session found. Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // Store session data
            sessionData = {
                session: params.session,
                v: params.v,
                ref: params.ref
            };
            sessionStorage.setItem('miningSession', params.session);
            sessionStorage.setItem('miningRef', params.ref);

            // Try to fetch plan from API first
            try {
                const response = await fetch(`${API_BASE}/plans`);
                if (response.ok) {
                    const data = await response.json();
                    const plans = data.data?.plans || [];
                    
                    // Find plan by ID if provided
                    if (params.plan) {
                        currentPlan = plans.find(p => p.id === params.plan);
                    }
                    
                    // If no plan found but we have URL parameters, create plan object
                    if (!currentPlan && params.name && params.min && params.max && params.percentage && params.duration) {
                        currentPlan = {
                            id: params.plan || 'fallback-plan',
                            name: params.name,
                            minAmount: params.min,
                            maxAmount: params.max,
                            percentage: params.percentage,
                            duration: params.duration
                        };
                    }
                    
                    // If still no plan, use first available
                    if (!currentPlan && plans.length > 0) {
                        currentPlan = plans[0];
                    }
                }
            } catch (error) {
                console.error('Error fetching plans:', error);
            }

            // Final fallback
            if (!currentPlan) {
                currentPlan = {
                    id: 'standard-plan',
                    name: params.name || 'Bitcoin Cloud Mining',
                    minAmount: params.min || 50,
                    maxAmount: params.max || 10000,
                    percentage: params.percentage || 15,
                    duration: params.duration || 24
                };
            }

            renderPlanDetails();
        }

        // =============================================
        // RENDER PLAN DETAILS
        // =============================================
        function renderPlanDetails() {
            const mainContent = document.getElementById('mainContent');
            
            // Select miner based on plan
            const minerIndex = Math.abs(currentPlan.id?.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) || 0) % MINERS.length;
            const miner = MINERS[minerIndex];
            
            const planName = currentPlan.name || 'Bitcoin Cloud Mining';
            const cleanName = planName.replace(/[^a-zA-Z0-9\s]/g, '');
            
            mainContent.innerHTML = `
                <div class="plan-header">
                    <div class="plan-breadcrumb">
                        <span>Plans</span>
                        <i class="fas fa-chevron-right"></i>
                        <span>${cleanName}</span>
                    </div>
                    <div class="plan-title-wrapper">
                        <h1 class="plan-title">${cleanName}</h1>
                        <div class="plan-badge">
                            <i class="fas fa-bolt"></i>
                            ${currentPlan.duration}h Contract
                        </div>
                    </div>
                    <p class="plan-subtitle">Professional Bitcoin mining with SHA-256 ASIC infrastructure</p>
                </div>

                <div class="plan-grid">
                    <!-- Left Column - Plan Specifications -->
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-microchip"></i>
                            Plan Specifications
                        </div>
                        <div class="specs-grid">
                            <div class="spec-item">
                                <div class="spec-label">Investment Range</div>
                                <div class="spec-value">$${formatNumberWithCommas(currentPlan.minAmount)} - $${formatNumberWithCommas(currentPlan.maxAmount)}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Return Rate</div>
                                <div class="spec-value"><span class="success">+${currentPlan.percentage}%</span></div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Contract Duration</div>
                                <div class="spec-value">${currentPlan.duration} hours</div>
                                <div class="spec-note">Daily mining rewards</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Minimum Investment</div>
                                <div class="spec-value small">$${formatNumberWithCommas(currentPlan.minAmount)}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Maximum Investment</div>
                                <div class="spec-value small">$${formatNumberWithCommas(currentPlan.maxAmount)}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Company Fee</div>
                                <div class="spec-value small">3%</div>
                                <div class="spec-note">Deducted at maturity</div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column - Investment Panel -->
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-cloud-upload-alt"></i>
                            Start Mining
                        </div>
                        
                        <!-- Balance Selection -->
                        <div class="balance-selector">
                            <div class="selector-label">Select payment balance</div>
                            <div class="balance-options" id="balanceOptions">
                                <!-- Dynamically populated -->
                            </div>
                        </div>

                        <!-- Investment Form -->
                        <div class="investment-form">
                            <div class="form-group">
                                <div class="form-label">
                                    <span>Investment amount (USD)</span>
                                    <span class="balance-hint" onclick="setMaxAmount()">Use max</span>
                                </div>
                                <div class="input-wrapper">
                                    <input type="number" 
                                           id="investmentAmount"
                                           placeholder="0.00"
                                           min="${currentPlan.minAmount}"
                                           max="${currentPlan.maxAmount}"
                                           step="10"
                                           oninput="validateInvestment()">
                                    <span class="input-suffix">USD</span>
                                </div>
                                <div class="error-message" id="amountError"></div>
                            </div>

                            <div class="return-display" id="returnDisplay">
                                <div class="return-fiat" id="returnFiat">$0.00</div>
                                <div class="return-crypto" id="returnCrypto">
                                    <img src="${ASSET_LOGOS.btc}" alt="BTC">
                                    <span id="returnCryptoText">0.000000 BTC</span>
                                </div>
                            </div>

                            <button class="invest-button" id="investButton" onclick="handleInvestment()" disabled>
                                <i class="fas fa-cloud"></i>
                                Start Cloud Mining
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Miner Details -->
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-cog"></i>
                        Dedicated Mining Hardware
                    </div>
                    <div class="miner-grid">
                        <div class="miner-image">
                            <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                        </div>
                        <div class="miner-specs">
                            <div class="miner-spec">
                                <div class="miner-spec-label">Model</div>
                                <div class="miner-spec-value">${miner.name}</div>
                            </div>
                            <div class="miner-spec">
                                <div class="miner-spec-label">Hash Rate</div>
                                <div class="miner-spec-value">${miner.hashRate}</div>
                            </div>
                            <div class="miner-spec">
                                <div class="miner-spec-label">Power</div>
                                <div class="miner-spec-value">${miner.power}</div>
                            </div>
                            <div class="miner-spec">
                                <div class="miner-spec-label">Algorithm</div>
                                <div class="miner-spec-value">${miner.algorithm}</div>
                            </div>
                            <div class="miner-spec">
                                <div class="miner-spec-label">Efficiency</div>
                                <div class="miner-spec-value">${miner.efficiency}</div>
                            </div>
                            <div class="miner-spec">
                                <div class="miner-spec-label">Cooling</div>
                                <div class="miner-spec-value">${miner.cooling}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TradingView Chart -->
                <div class="chart-container" id="tradingviewChart"></div>
            `;

            updateBalanceOptions();
            initTradingView();
        }

        // =============================================
        // BALANCE OPTIONS
        // =============================================
        function updateBalanceOptions() {
            const container = document.getElementById('balanceOptions');
            if (!container || !currentPlan) return;
            
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const minAmount = currentPlan.minAmount;
            
            const mainAssetAmount = currentBTCPrice > 0 ? userBalances.main / currentBTCPrice : 0;
            const maturedAssetAmount = currentBTCPrice > 0 ? userBalances.matured / currentBTCPrice : 0;
            
            container.innerHTML = `
                <div class="balance-option ${userBalances.main >= minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('main', ${userBalances.main})">
                    <div class="option-header">
                        <span class="option-name">Main Balance</span>
                        <div class="option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="option-fiat">$${formatUSD(userBalances.main)}</div>
                    <div class="option-crypto">
                        <img src="${assetLogo}">
                        <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-option ${userBalances.matured >= minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('matured', ${userBalances.matured})">
                    <div class="option-header">
                        <span class="option-name">Matured Balance</span>
                        <div class="option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="option-fiat">$${formatUSD(userBalances.matured)}</div>
                    <div class="option-crypto">
                        <img src="${assetLogo}">
                        <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
            
            // Auto-select first available
            if (userBalances.main >= minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        function selectBalance(type, amount) {
            // Remove selection from all options
            document.querySelectorAll('.balance-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Select clicked option
            const selectedOption = Array.from(document.querySelectorAll('.balance-option')).find(opt => 
                !opt.classList.contains('disabled') && opt.innerHTML.includes(type === 'main' ? 'Main Balance' : 'Matured Balance')
            );
            
            if (selectedOption) {
                selectedOption.classList.add('selected');
                selectedBalanceType = type;
                
                // Update input
                const input = document.getElementById('investmentAmount');
                if (input) {
                    input.value = currentPlan.minAmount;
                    input.max = Math.min(currentPlan.maxAmount, amount);
                    validateInvestment();
                }
            }
        }

        function setMaxAmount() {
            if (!selectedBalanceType) return;
            
            const balanceAmount = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
            const maxAllowed = Math.min(currentPlan.maxAmount, balanceAmount);
            
            const input = document.getElementById('investmentAmount');
            if (input) {
                input.value = maxAllowed;
                validateInvestment();
            }
        }

        // =============================================
        // INVESTMENT VALIDATION
        // =============================================
        function validateInvestment() {
            const input = document.getElementById('investmentAmount');
            const errorEl = document.getElementById('amountError');
            const investButton = document.getElementById('investButton');
            
            if (!input || !errorEl || !currentPlan || !selectedBalanceType) {
                if (investButton) investButton.disabled = true;
                return false;
            }
            
            const amount = parseFloat(input.value) || 0;
            const minAmount = currentPlan.minAmount;
            const maxAmount = parseFloat(input.max) || currentPlan.maxAmount;
            const balanceAmount = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
            
            errorEl.textContent = '';
            input.classList.remove('error');
            
            if (amount < minAmount) {
                errorEl.textContent = `Minimum investment is $${formatNumberWithCommas(minAmount)}`;
                input.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount > maxAmount) {
                errorEl.textContent = `Maximum investment is $${formatNumberWithCommas(maxAmount)}`;
                input.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            if (amount > balanceAmount) {
                errorEl.textContent = `Insufficient balance. Available: $${formatUSD(balanceAmount)}`;
                input.classList.add('error');
                investButton.disabled = true;
                return false;
            }
            
            // Update expected return
            updateExpectedReturn(amount);
            investButton.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            if (!currentPlan) return;
            
            const percentage = currentPlan.percentage;
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * percentage / 100);
            
            document.getElementById('returnFiat').textContent = `$${formatUSD(totalReturn)}`;
            
            const asset = userPreferences.displayAsset;
            const assetLogo = ASSET_LOGOS[asset] || ASSET_LOGOS.btc;
            const assetAmount = currentBTCPrice > 0 ? totalReturn / currentBTCPrice : 0;
            
            document.getElementById('returnCrypto').innerHTML = `
                <img src="${assetLogo}" alt="${asset.toUpperCase()}">
                <span>${formatNumber(assetAmount)} ${asset.toUpperCase()}</span>
            `;
        }

        // =============================================
        // INVESTMENT HANDLER
        // =============================================
        async function handleInvestment() {
            if (investmentInProgress) {
                showNotification('error', 'Investment in Progress', 'Please wait for your current investment to complete.');
                return;
            }
            
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest.');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }
            
            const amount = parseFloat(document.getElementById('investmentAmount').value);
            const planId = currentPlan.id;
            const balanceType = selectedBalanceType;
            
            if (!validateInvestment()) return;
            
            investmentInProgress = true;
            const processingOverlay = document.getElementById('processingOverlay');
            const processingText = document.getElementById('processingText');
            const investButton = document.getElementById('investButton');
            
            processingOverlay.classList.add('active');
            processingText.textContent = 'Processing cloud mining investment...';
            investButton.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: planId,
                        amount: amount,
                        balanceType: balanceType,
                        session: sessionData?.session,
                        ref: sessionData?.ref
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${formatUSD(amount)} has been created.`);
                    
                    processingText.textContent = 'Investment successful! Redirecting...';
                    
                    await fetchBalances();
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                
                showNotification('error', 'Investment Failed', 
                    error.message || 'There was an error processing your investment.');
                
                processingOverlay.classList.remove('active');
                investButton.disabled = false;
                investmentInProgress = false;
            }
        }

        // =============================================
        // TRADINGVIEW CHART
        // =============================================
        function initTradingView() {
            if (typeof TradingView === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://s3.tradingview.com/tv.js';
                script.async = true;
                script.onload = createWidget;
                document.head.appendChild(script);
            } else {
                createWidget();
            }
        }

        function createWidget() {
            if (typeof TradingView === 'undefined') return;
            
            new TradingView.widget({
                "width": "100%",
                "height": "200",
                "symbol": "BITSTAMP:BTCUSD",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "container_id": "tradingviewChart"
            });
        }

        // =============================================
        // FORMATTING FUNCTIONS
        // =============================================
        function formatNumber(num) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            if (numericNum >= 1e3) return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return numericNum.toFixed(6);
        }

        function formatNumberWithCommas(num) {
            return parseFloat(num || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        window.addEventListener('load', async function() {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 500);
            
            await checkAuth();
            await initializePlan();
            
            if (localStorage.getItem('jwtToken')) {
                setInterval(fetchBalances, 30000);
                setInterval(fetchBTCPrice, 60000);
            }
        });

        window.addEventListener('beforeunload', function() {
            investmentInProgress = false;
        });
    </script>
</body>
</html>
