        /* CRITICAL CSS - LOADS IMMEDIATELY */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;

        /* Smooth page - no boxes, borders, or blocks */
        .investment-panel {
            min-height: 100vh;
            padding-top: 80px;

            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }
        
        /* Header - smooth integration */

            margin-bottom: 40px;
            position: relative;
        }
        
        .back-navigation {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 30px;
            transition: var(--transition);
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .back-navigation:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
        
        .back-navigation i {
            font-size: 0.8rem;
        }
        
        /* Main content area - completely smooth, no boxes */
        .plan-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }
        
        /* Left Column */
        .plan-info-section {
            position: relative;
        }
        
        .plan-title-wrapper {
            margin-bottom: 30px;
        }
        
        .plan-category {
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
        
        .plan-name {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;

            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .plan-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .plan-meta i {

            margin-right: 5px;
        }
        
        /* Performance stats - no boxes, just text */
        .performance-stats {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .stat-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        .stat-label {

        }
        
        .stat-value {

        }
        
        .stat-value.highlight {

        }
        
        .stat-value.accent {

        }
        
        .stat-note {

            font-size: 0.8rem;
            margin-left: 10px;

        /* Action button - single smooth element */

            opacity: 1;
        }
        
        /* Chart section */
        .chart-section {
            margin-top: 60px;
        }
        
        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }
        
        /* Notifications - smooth floating */
        .notification-center {
            position: fixed;
            top: 90px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 350px;
        }
        
        .notification {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            transform: translateX(30px);
            opacity: 0;
            transition: var(--transition);
            pointer-events: auto;
            border-left: 4px solid transparent;
        }
        
        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .notification.success {
            border-left-color: var(--success);
        }
        
        .notification.error {
            border-left-color: var(--error);
        }
        
        .notification i {
            margin-right: 10px;
        }
        
        /* Loading state */
        .loading-panel {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--gray);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 216, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .plan-detail-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .plan-name {
                font-size: 2.2rem;
            }
            
            .price-range {
                font-size: 1.8rem;
            }
            
            .investment-input {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            
            .plan-name {
                font-size: 1.8rem;
            }
            
            .stat-value {
                font-size: 1.2rem;
            }
            
            .balance-options {
                flex-direction: column;
                gap: 15px;
            }
            
            .return-amount-fiat {
                font-size: 2rem;
            }
            
            .miner-specs {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .plan-name {
                font-size: 1.5rem;
            }
            
            .price-range {
                font-size: 1.5rem;
            }
            
            .investment-input {
                font-size: 1.2rem;
            }
            
            .notification-center {
                right: 15px;
                left: 15px;
                max-width: none;
            }
        }
        
        /* No boxes, borders, or blocks - everything flows */
        hr, .card, .box, .border, .panel, .container-box {
            display: none;
        }
    </style>
</head>

            };

            // Miner database - production data
            const MINER_DATABASE = [
                {

                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg'
                },
                {
                    id: 'antminer-s21-xp',
                    name: 'Antminer S21 XP',
                    hashRate: '255 TH/s',
                    powerConsumption: '5445W',
                    algorithm: 'SHA-256',
                    efficiency: '21.4 J/TH',
                    releaseYear: '2024',
                    manufacturer: 'Bitmain',

                {

                    name: 'Antminer S23 Hyd',

                    powerConsumption: '5300W',

                }
            ];

            // =============================================
            // CORE UTILITIES
            // =============================================
            const formatNumber = (num) => {
                const value = parseFloat(num) || 0;
                if (value >= 1e9) return (value / 1e9).toFixed(2) + 'B';
                if (value >= 1e6) return (value / 1e6).toFixed(2) + 'M';
                if (value >= 1e3) return value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return value.toFixed(6);
            };

            const formatUSD = (num) => {
                const value = parseFloat(num) || 0;
                return '$' + value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            };

            const formatAssetAmount = (amount, symbol) => {
                return `${formatNumber(amount)} ${symbol.toUpperCase()}`;
            };

            const getAssetLogo = (symbol) => {
                return ASSET_LOGOS[symbol.toLowerCase()] || ASSET_LOGOS.btc;
            };

            const getToken = () => localStorage.getItem('jwtToken');

            // =============================================
            // NOTIFICATION SYSTEM (Green success / Red error)
            // =============================================
            const showNotification = (type, title, message, duration = 5000) => {
                AppState.notificationQueue.push({ type, title, message, duration });
                if (!AppState.isShowingNotification) {
                    processNotificationQueue();
                }
            };

            const processNotificationQueue = () => {
                if (AppState.notificationQueue.length === 0) {
                    AppState.isShowingNotification = false;
                    return;
                }

                AppState.isShowingNotification = true;
                const { type, title, message, duration } = AppState.notificationQueue.shift();

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <strong>${title}</strong> - ${message}
                `;

                const container = document.getElementById('notificationCenter');
                container.appendChild(notification);

                // Force reflow for animation
                void notification.offsetWidth;
                notification.classList.add('show');

                if (type === 'error' && navigator.vibrate) {
                    navigator.vibrate([200, 100, 200]);
                }

                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                        processNotificationQueue();
                    }, 400);
                }, duration);
            };

            // =============================================
            // API CALLS (Same endpoints as modals)
            // =============================================
            const apiCall = async (endpoint, options = {}) => {
                const token = getToken();
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                try {
                    const response = await fetch(`${CONFIG.API_BASE_URL}${endpoint}`, {
                        ...options,
                        headers
                    });

                    let data;
                    try {
                        data = await response.json();
                    } catch (e) {
                        data = { status: response.status === 200 ? 'success' : 'error' };
                    }

                    if (!response.ok) {
                        throw new Error(data.message || `API error: ${response.status}`);
                    }

                    return data;
                } catch (error) {
                    console.error(`API call failed: ${endpoint}`, error);
                    throw error;
                }
            };

            // =============================================
            // FETCH PLAN DETAILS (From URL parameter)
            // =============================================
            const getPlanIdFromUrl = () => {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('id');
            };

            const fetchPlanDetails = async (planId) => {
                try {
                    const data = await apiCall(`${CONFIG.PLANS_ENDPOINT}/${planId}`);
                    return data.data?.plan || null;
                } catch (error) {
                    console.error('Failed to fetch plan details:', error);
                    showNotification('error', 'Error', 'Failed to load plan details. Please try again.');
                    return null;
                }
            };

            // =============================================
            // FETCH USER BALANCES (Same as modals)
            // =============================================
            const fetchUserBalances = async () => {
                const token = getToken();
                if (!token) return null;

                try {
                    const data = await apiCall(CONFIG.BALANCES_ENDPOINT);
                    return data.data?.balances || { main: 0, matured: 0 };
                } catch (error) {
                    console.error('Failed to fetch balances:', error);
                    return null;
                }
            };

            // =============================================
            // FETCH USER PREFERENCES
            // =============================================
            const fetchUserPreferences = async () => {
                const token = getToken();
                if (!token) return { displayAsset: 'btc' };

                try {
                    const data = await apiCall(CONFIG.USER_PREFERENCES);
                    return data.data?.preferences || { displayAsset: 'btc' };
                } catch (error) {
                    console.error('Failed to fetch preferences:', error);
                    return { displayAsset: 'btc' };
                }
            };

            // =============================================
            // FETCH BTC PRICE (For asset conversion)
            // =============================================
            const fetchBTCPrice = async () => {
                try {
                    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                    if (response.ok) {
                        const data = await response.json();
                        return data.bitcoin?.usd || 43000;
                    }
                } catch (error) {
                    console.error('Failed to fetch BTC price:', error);
                }
                return 43000; // Fallback
            };

            // =============================================
            // VALIDATE INVESTMENT (Prevent double investment)
            // =============================================
            const validateInvestment = async (amount, balanceType) => {
                if (AppState.isInvesting) {
                    showNotification('error', 'Processing', 'An investment is already in progress. Please wait.');
                    return false;
                }

                const token = getToken();
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest.');
                    setTimeout(() => window.location.href = 'login', 2000);
                    return false;
                }

                if (!amount || amount <= 0) {
                    showNotification('error', 'Invalid Amount', 'Please enter a valid investment amount.');
                    return false;
                }

                const plan = AppState.currentPlan;
                if (!plan) {
                    showNotification('error', 'Error', 'Plan details not found.');
                    return false;
                }

                if (amount < plan.minAmount) {
                    showNotification('error', 'Below Minimum', `Minimum investment is ${formatUSD(plan.minAmount)}.`);
                    return false;
                }

                if (amount > plan.maxAmount) {
                    showNotification('error', 'Above Maximum', `Maximum investment is ${formatUSD(plan.maxAmount)}.`);
                    return false;
                }

                // Verify balance from server (prevent stale data)
                try {
                    const balances = await fetchUserBalances();
                    if (!balances) {
                        showNotification('error', 'Error', 'Unable to verify balance.');
                        return false;
                    }

                    const availableBalance = balanceType === 'main' ? balances.main : balances.matured;
                    if (availableBalance < amount) {
                        showNotification('error', 'Insufficient Balance', 
                            `You have ${formatUSD(availableBalance)} available in your ${balanceType} balance.`);
                        return false;
                    }

                    AppState.userBalances = balances;
                    return true;
                } catch (error) {
                    console.error('Balance validation failed:', error);
                    showNotification('error', 'Validation Failed', 'Unable to verify your balance. Please try again.');
                    return false;
                }
            };

            // =============================================
            // CREATE INVESTMENT (Same endpoint as modal)
            // =============================================
            const createInvestment = async (planId, amount, balanceType) => {
                if (!await validateInvestment(amount, balanceType)) {
                    return false;
                }

                AppState.isInvesting = true;
                const statusElement = document.getElementById('investmentStatus');
                const investButton = document.getElementById('investButton');

                try {
                    if (statusElement) {
                        statusElement.textContent = 'Processing your cloud mining investment...';
                        statusElement.style.color = 'var(--primary)';
                    }
                    if (investButton) investButton.disabled = true;

                    const data = await apiCall(CONFIG.INVESTMENT_ENDPOINT, {
                        method: 'POST',
                        body: JSON.stringify({
                            planId: planId,
                            amount: parseFloat(amount),
                            balanceType: balanceType
                        })
                    });

                    showNotification('success', 'Investment Successful!', 
                        `Your cloud mining investment of ${formatUSD(amount)} has been created.`);

                    if (statusElement) {
                        statusElement.textContent = 'Investment successful! Redirecting...';
                        statusElement.style.color = 'var(--success)';
                    }

                    // Redirect back to main page after success
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);

                    return true;

                } catch (error) {
                    console.error('Investment creation failed:', error);
                    
                    let errorMessage = 'Failed to create investment. Please try again.';
                    if (error.message.includes('insufficient')) {
                        errorMessage = 'Insufficient balance for this investment.';
                    } else if (error.message.includes('already')) {
                        errorMessage = 'You already have an active investment in this plan.';
                    }

                    showNotification('error', 'Investment Failed', errorMessage);

                    if (statusElement) {
                        statusElement.textContent = errorMessage;
                        statusElement.style.color = 'var(--error)';
                    }

                    return false;

                } finally {
                    AppState.isInvesting = false;
                    if (investButton) investButton.disabled = false;
                }
            };

            // =============================================
            // RENDER PLAN DETAILS (Main panel content)
            // =============================================
            const renderPlanDetails = async (plan) => {
                if (!plan) {
                    document.getElementById('panelContent').innerHTML = `
                        <div style="text-align: center; padding: 100px 0; color: var(--gray);">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                            <p>Plan not found or unavailable.</p>
                            <button onclick="window.location.href='index.html'" 
                                    style="background: none; border: none; color: var(--primary); margin-top: 20px; cursor: pointer;">
                                Return to Mining Plans
                            </button>
                        </div>
                    `;
                    return;
                }

                AppState.currentPlan = plan;

                // Fetch latest data
                const [balances, preferences, btcPrice] = await Promise.all([
                    fetchUserBalances(),
                    fetchUserPreferences(),
                    fetchBTCPrice()
                ]);

                if (balances) AppState.userBalances = balances;
                if (preferences) AppState.preferences = preferences;
                AppState.btcPrice = btcPrice;

                const asset = AppState.preferences.displayAsset;
                const assetLogo = getAssetLogo(asset);
                
                // Calculate asset amounts for display
                const mainAssetAmount = AppState.btcPrice > 0 ? AppState.userBalances.main / AppState.btcPrice : 0;
                const maturedAssetAmount = AppState.btcPrice > 0 ? AppState.userBalances.matured / AppState.btcPrice : 0;

                // Determine miner details (based on plan index for consistency with modal)
                const minerIndex = (parseInt(plan.id) || 0) % MINER_DATABASE.length;
                const miner = MINER_DATABASE[minerIndex];

                // Build features list
                const features = [
                    { icon: 'fa-bolt', text: 'SHA-256 ASIC Mining' },
                    { icon: 'fa-plug', text: 'No electricity costs' },
                    { icon: 'fa-shield-alt', text: '3% fee upon maturity' },
                    { icon: 'fa-clock', text: `${plan.duration} hour duration` },
                    { icon: 'fa-chart-line', text: 'Daily mining updates' }
                ];

                const minAmountFormatted = formatUSD(plan.minAmount);
                const maxAmountFormatted = formatUSD(plan.maxAmount);

                // Build HTML - completely smooth, no boxes or borders
                const html = `
                    <div class="plan-detail-grid">
                        <!-- Left Column: Plan Information -->
                        <div class="plan-info-section">
                            <div class="plan-title-wrapper">
                                <span class="plan-category">Bitcoin Cloud Mining</span>
                                <h1 class="plan-name">${plan.name || 'Mining Plan'}</h1>
                                <div class="plan-meta">
                                    <span><i class="fas fa-hashtag"></i> Plan ID: ${plan.id}</span>
                                    <span><i class="fas fa-microchip"></i> ${miner.name}</span>
                                </div>
                            </div>

                            <div class="performance-stats">
                                <div class="stat-row">
                                    <span class="stat-label">Investment Range</span>
                                    <span class="stat-value accent">${minAmountFormatted} – ${maxAmountFormatted}</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Mining Return</span>
                                    <span class="stat-value highlight">+${plan.percentage}%</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Duration</span>
                                    <span class="stat-value">${plan.duration} hours <span class="stat-note">(approx. ${Math.round(plan.duration/24)} days)</span></span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Company Fee</span>
                                    <span class="stat-value">3% <span class="stat-note">deducted at maturity</span></span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Hash Rate Allocation</span>
                                    <span class="stat-value">${(plan.minAmount * 0.00001).toFixed(2)} TH/s <span class="stat-note">per $100</span></span>
                                </div>
                            </div>

                            <div class="plan-description-detailed">
                                <p>This Bitcoin cloud mining plan allocates dedicated SHA-256 hash power from our ${miner.name} ASIC miners. Your investment is converted into active mining capacity in our industrial data centers, with daily mining rewards distributed automatically.</p>
                                <p>All mining operations are conducted using enterprise-grade hardware with 99.9% uptime guarantee. Mining rewards are calculated based on actual Bitcoin mined by the network and your share of the total hash rate.</p>
                            </div>

                            <ul class="features-list">
                                ${features.map(f => `
                                    <li><i class="fas ${f.icon}"></i> ${f.text}</li>
                                `).join('')}
                            </ul>
                        </div>

                        <!-- Right Column: Investment Section -->
                        <div class="investment-section">
                            <div class="price-display">
                                <div class="price-range">
                                    ${minAmountFormatted} <span>min.</span>
                                </div>
                                <div class="return-badge">
                                    <i class="fas fa-chart-line"></i> +${plan.percentage}% expected return
                                </div>
                            </div>

                            ${getToken() ? `
                                <!-- Balance Selector (Only for logged-in users) -->
                                <div class="balance-selector">
                                    <span class="selector-label">Select balance source</span>
                                    <div class="balance-options">
                                        <div class="balance-option ${AppState.userBalances.main >= plan.minAmount ? '' : 'disabled'}" 
                                             onclick="window.selectBalance('main', ${AppState.userBalances.main})">
                                            <div class="balance-option-type">Main Balance</div>
                                            <div class="balance-option-amount">${formatUSD(AppState.userBalances.main)}</div>
                                            <div class="balance-option-asset">
                                                <img src="${assetLogo}" alt="${asset}">
                                                <span>${formatAssetAmount(mainAssetAmount, asset)}</span>
                                            </div>
                                        </div>
                                        <div class="balance-option ${AppState.userBalances.matured >= plan.minAmount ? '' : 'disabled'}" 
                                             onclick="window.selectBalance('matured', ${AppState.userBalances.matured})">
                                            <div class="balance-option-type">Matured Balance</div>
                                            <div class="balance-option-amount">${formatUSD(AppState.userBalances.matured)}</div>
                                            <div class="balance-option-asset">
                                                <img src="${assetLogo}" alt="${asset}">
                                                <span>${formatAssetAmount(maturedAssetAmount, asset)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Investment Input -->
                                <div class="investment-input-wrapper">
                                    <div class="investment-input-label">
                                        <span>Investment amount</span>
                                        <span>Min: ${minAmountFormatted}</span>
                                    </div>
                                    <div class="investment-input-container">
                                        <span class="investment-input-currency">$</span>
                                        <input type="number" class="investment-input" id="investmentAmount" 
                                               placeholder="${plan.minAmount}" min="${plan.minAmount}" max="${plan.maxAmount}" 
                                               step="10" value="${plan.minAmount}">
                                    </div>
                                    <div class="investment-limits">
                                        <span>Max: ${maxAmountFormatted}</span>
                                        <span id="availableBalance">Available: ${formatUSD(AppState.userBalances.main)}</span>
                                    </div>
                                    <div class="amount-error" id="amountError"></div>
                                </div>

                                <!-- Expected Return -->
                                <div class="expected-return">
                                    <div class="return-label">Expected return at maturity</div>
                                    <div class="return-amount-fiat" id="expectedReturnFiat">${formatUSD(plan.minAmount * (1 + plan.percentage/100) * 0.97)}</div>
                                    <div class="return-amount-asset" id="expectedReturnAsset">
                                        <img src="${assetLogo}" alt="${asset}">
                                        <span>${formatAssetAmount((plan.minAmount * (1 + plan.percentage/100) * 0.97) / AppState.btcPrice, asset)}</span>
                                    </div>
                                </div>

                                <!-- Investment Button -->
                                <button class="invest-action-btn" id="investButton" onclick="window.handleInvest()">
                                    <i class="fas fa-cloud"></i>
                                    Start Cloud Mining
                                </button>
                                <div class="investment-status" id="investmentStatus"></div>
                            ` : `
                                <!-- Login Prompt for non-authenticated users -->
                                <div style="margin: 60px 0;">
                                    <p style="color: var(--gray); margin-bottom: 30px;">Please log in or create an account to start cloud mining.</p>
                                    <button class="invest-action-btn" onclick="window.location.href='signup'">
                                        <i class="fas fa-user-plus"></i>
                                        Create Account
                                    </button>
                                    <button class="invest-action-btn" onclick="window.location.href='login'" 
                                            style="background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px;">
                                        <i class="fas fa-sign-in-alt"></i>
                                        Log In
                                    </button>
                                </div>
                            `}

                            <!-- Miner Information - Always visible -->
                            <div class="miner-info">
                                <h3 class="miner-title">Miner Specifications</h3>
                                <img src="${miner.image}" alt="${miner.name}" class="miner-image" 
                                     onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                                <div class="miner-specs">
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Model</div>
                                        <div class="miner-spec-value">${miner.name}</div>
                                    </div>
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Hash Rate</div>
                                        <div class="miner-spec-value">${miner.hashRate}</div>
                                    </div>
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Power</div>
                                        <div class="miner-spec-value">${miner.powerConsumption}</div>
                                    </div>
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Algorithm</div>
                                        <div class="miner-spec-value">${miner.algorithm}</div>
                                    </div>
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Efficiency</div>
                                        <div class="miner-spec-value">${miner.efficiency}</div>
                                    </div>
                                    <div class="miner-spec-item">
                                        <div class="miner-spec-label">Manufacturer</div>
                                        <div class="miner-spec-value">${miner.manufacturer}</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Chart Section -->
                            <div class="chart-section">
                                <h3 class="miner-title">BTC/USD Chart</h3>
                                <div class="chart-container" id="tradingviewChart"></div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('panelContent').innerHTML = html;

                // Initialize selected balance
                if (AppState.userBalances.main >= plan.minAmount) {
                    window.selectBalance('main', AppState.userBalances.main);
                } else if (AppState.userBalances.matured >= plan.minAmount) {
                    window.selectBalance('matured', AppState.userBalances.matured);
                }

                // Setup investment input listener
                const input = document.getElementById('investmentAmount');
                if (input) {
                    input.addEventListener('input', handleInvestmentInput);
                }

                // Initialize TradingView chart
                initTradingViewChart();
            };

            // =============================================
            // EVENT HANDLERS
            // =============================================
            window.selectBalance = (type, amount) => {
                const options = document.querySelectorAll('.balance-option');
                options.forEach(opt => opt.classList.remove('selected'));
                
                const selected = document.querySelector(`.balance-option[onclick*="'${type}'"]`);
                if (selected && !selected.classList.contains('disabled')) {
                    selected.classList.add('selected');
                    AppState.selectedBalance = type;
                    AppState.selectedBalanceAmount = amount;

                    const availableSpan = document.getElementById('availableBalance');
                    if (availableSpan) {
                        availableSpan.textContent = `Available: ${formatUSD(amount)}`;
                    }

                    // Re-validate current input
                    const input = document.getElementById('investmentAmount');
                    if (input) {
                        handleInvestmentInput({ target: input });
                    }
                }
            };

            const handleInvestmentInput = (e) => {
                const amount = parseFloat(e.target.value) || 0;
                const plan = AppState.currentPlan;
                const errorEl = document.getElementById('amountError');
                const investButton = document.getElementById('investButton');
                const fiatEl = document.getElementById('expectedReturnFiat');
                const assetEl = document.getElementById('expectedReturnAsset');
                
                if (!plan) return;

                // Clear previous error
                errorEl.textContent = '';

                // Validate
                if (amount < plan.minAmount) {
                    errorEl.textContent = `Minimum investment is ${formatUSD(plan.minAmount)}`;
                    if (investButton) investButton.disabled = true;
                } else if (amount > plan.maxAmount) {
                    errorEl.textContent = `Maximum investment is ${formatUSD(plan.maxAmount)}`;
                    if (investButton) investButton.disabled = true;
                } else if (amount > AppState.selectedBalanceAmount) {
                    errorEl.textContent = `Insufficient balance. Available: ${formatUSD(AppState.selectedBalanceAmount)}`;
                    if (investButton) investButton.disabled = true;
                } else {
                    if (investButton) investButton.disabled = false;
                    
                    // Calculate expected return
                    const miningFee = amount * 0.03;
                    const netInvestment = amount - miningFee;
                    const totalReturn = netInvestment + (netInvestment * plan.percentage / 100);
                    
                    fiatEl.textContent = formatUSD(totalReturn);
                    
                    const assetAmount = totalReturn / AppState.btcPrice;
                    const asset = AppState.preferences.displayAsset;
                    const assetLogo = getAssetLogo(asset);
                    
                    assetEl.innerHTML = `
                        <img src="${assetLogo}" alt="${asset}">
                        <span>${formatAssetAmount(assetAmount, asset)}</span>
                    `;
                }
            };

            window.handleInvest = async () => {
                const input = document.getElementById('investmentAmount');
                if (!input) return;

                const amount = parseFloat(input.value) || 0;
                const plan = AppState.currentPlan;
                
                if (!plan) {
                    showNotification('error', 'Error', 'Plan information not available.');
                    return;
                }

                await createInvestment(plan.id, amount, AppState.selectedBalance);
            };

            // =============================================
            // TRADINGVIEW CHART INITIALIZATION
            // =============================================
            const initTradingViewChart = () => {
                if (typeof TradingView !== 'undefined') {
                    new TradingView.widget({
                        "width": "100%",
                        "height": "200",
                        "symbol": "BITSTAMP:BTCUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "allow_symbol_change": false,
                        "container_id": "tradingviewChart",
                        "hide_side_toolbar": true,
                        "hide_top_toolbar": true,
                        "save_image": false,
                        "studies": [],
                        "show_popup_button": false,
                        "autosize": true
                    });
                } else {
                    // Fallback if TradingView not loaded
                    const container = document.getElementById('tradingviewChart');
                    if (container) {
                        container.innerHTML = '<div style="color: var(--gray); text-align: center; padding: 40px;">Chart loading...</div>';
                        
                        // Try loading TradingView script
                        const script = document.createElement('script');
                        script.src = 'https://s3.tradingview.com/tv.js';
                        script.async = true;
                        script.onload = () => initTradingViewChart();
                        document.head.appendChild(script);
                    }
                }
            };

            // =============================================
            // BACK NAVIGATION HANDLER
            // =============================================
            window.handleBackNavigation = () => {
                // If investment in progress, warn user
                if (AppState.isInvesting) {
                    if (confirm('An investment is in progress. Are you sure you want to leave?')) {
                        window.location.href = 'index.html';
                    }
                } else {
                    window.location.href = 'index.html';
                }
            };

            // =============================================
            // INITIALIZATION
            // =============================================
            const init = async () => {
                const planId = getPlanIdFromUrl();
                
                if (!planId) {
                    // No plan ID - redirect to main page
                    window.location.href = 'index.html';
                    return;
                }

                // Show loading state
                const loadingTemplate = document.getElementById('loadingTemplate');
                const panelContent = document.getElementById('panelContent');
                panelContent.innerHTML = loadingTemplate.innerHTML;

                // Fetch plan details
                const plan = await fetchPlanDetails(planId);
                
                if (plan) {
                    await renderPlanDetails(plan);
                } else {
                    panelContent.innerHTML = `
                        <div style="text-align: center; padding: 100px 0; color: var(--gray);">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                            <p>Cloud mining plan not found or unavailable.</p>
                            <button onclick="window.location.href='index.html'" 
                                    style="background: none; border: none; color: var(--primary); margin-top: 20px; cursor: pointer;">
                                Return to Mining Plans
                            </button>
                        </div>
                    `;
                }

                // Check for any pending investments on page load
                const token = getToken();
                if (token) {
                    checkAndCompleteInvestments();
                }
            };

            // =============================================
            // CHECK AND COMPLETE MATURED INVESTMENTS
            // (Same logic as modal)
            // =============================================
            const checkAndCompleteInvestments = async () => {
                const token = getToken();
                if (!token) return;

                try {
                    const data = await apiCall('/investments/active');
                    const investments = data.data?.investments || [];
                    const now = new Date();

                    for (const inv of investments) {
                        if (inv.status === 'active') {
                            const endDate = new Date(inv.endDate);
                            if (endDate <= now) {
                                await completeInvestment(inv.id);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error checking investments:', error);
                }
            };

            const completeInvestment = async (investmentId) => {
                try {
                    await apiCall(`/investments/${investmentId}/complete`, { method: 'POST' });
                    showNotification('success', 'Investment Matured', 
                        'Your cloud mining investment has completed! Returns added to your matured balance.');
                    
                    // Refresh balances if on page
                    if (getToken()) {
                        const balances = await fetchUserBalances();
                        if (balances) AppState.userBalances = balances;
                    }
                } catch (error) {
                    console.error('Error completing investment:', error);
                }
            };

            // Start the application
            document.addEventListener('DOMContentLoaded', init);

            // Handle page unload (prevent accidental navigation during investment)
            window.addEventListener('beforeunload', (e) => {
                if (AppState.isInvesting) {
                    e.preventDefault();
                    e.returnValue = 'An investment is in progress. Are you sure you want to leave?';
                }
            });

        })();
    </script>

    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
</body>
</html>
