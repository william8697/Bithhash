    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================= */
        /* COMPLETE RESET - NO BORDERS, NO BOXES */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0E17;
            color: #FFFFFF;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================= */
        /* COLOR THEME - MATCHING INDEX.HTML EXACTLY */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, #00D8FF 0%, #00A3CC 100%);
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            --transition: all 0.2s ease;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            --font-xs: 0.75rem;
            --font-sm: 0.875rem;
            --font-md: 1rem;
            --font-lg: 1.125rem;
            --font-xl: 1.25rem;
            --font-2xl: 1.5rem;
            --font-3xl: 2rem;
        }
        
        /* ============================================= */
        /* SMOOTH FLOWING LAYOUT - NO BORDERS/BOXES */
        /* ============================================= */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg);
        }
        
        /* Minimal header - just enough for navigation */
        .minimal-header {
            padding: var(--spacing-md) 0;
            background: var(--darker);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(10, 14, 23, 0.95);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
        }
        
        .logo img {
            height: 32px;
            width: auto;
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: var(--font-lg);
            color: var(--primary);
        }
        
        .security-indicator {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--gray);
            font-size: var(--font-xs);
        }
        
        .security-indicator i {
            color: var(--success);
        }
        
        /* Main content - smooth flowing */
        .main-content {
            flex: 1;
            padding: var(--spacing-2xl) 0;
        }
        
        /* Back navigation - minimal */
        .back-nav {
            margin-bottom: var(--spacing-xl);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
            font-size: var(--font-sm);
        }
        
        .back-nav:hover {
            color: var(--primary);
        }
        
        .back-nav i {
            font-size: var(--font-xs);
        }
        
        /* Session info - subtle */
        .session-info {
            display: flex;
            justify-content: flex-end;
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-xs);
            color: var(--gray);
            gap: var(--spacing-md);
        }
        
        .session-info span {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .session-info i {
            color: var(--primary);
            font-size: var(--font-xs);
        }
        
        /* Plan header - large and prominent */
        .plan-header-section {
            margin-bottom: var(--spacing-2xl);
        }
        
        .plan-category {
            color: var(--primary);
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .plan-title {
            font-size: var(--font-3xl);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--spacing-xs);
        }
        
        .plan-subtitle {
            color: var(--gray);
            font-size: var(--font-lg);
            font-weight: 300;
        }
        
        /* Key metrics - flowing horizontal */
        .key-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-xl);
            margin: var(--spacing-xl) 0;
            padding: var(--spacing-lg) 0;
            border-top: 1px solid rgba(142, 155, 174, 0.1);
            border-bottom: 1px solid rgba(142, 155, 174, 0.1);
        }
        
        .metric-item {
            flex: 1;
            min-width: 140px;
        }
        
        .metric-label {
            color: var(--gray);
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .metric-label i {
            color: var(--primary);
            font-size: var(--font-xs);
        }
        
        .metric-value {
            font-size: var(--font-xl);
            font-weight: 600;
        }
        
        .metric-value small {
            font-size: var(--font-sm);
            color: var(--gray);
            font-weight: 400;
            margin-left: var(--spacing-xs);
        }
        
        .metric-value .gain {
            color: var(--success);
        }
        
        .metric-value .fee {
            color: var(--gray);
            font-size: var(--font-sm);
            font-weight: 400;
        }
        
        /* Main grid - different layouts for PC and mobile */
        .investment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-2xl);
            margin: var(--spacing-2xl) 0;
        }
        
        /* Left column - Plan details */
        .plan-details-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }
        
        .detail-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .detail-group-title {
            font-size: var(--font-lg);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .detail-group-title i {
            color: var(--primary);
        }
        
        .miner-showcase {
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-wrap: wrap;
        }
        
        .miner-image {
            width: 140px;
            height: 140px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            padding: var(--spacing-md);
        }
        
        .miner-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
            flex: 1;
        }
        
        .spec-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .spec-label {
            color: var(--gray);
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .spec-value {
            font-size: var(--font-md);
            font-weight: 600;
        }
        
        .spec-value small {
            color: var(--gray);
            font-size: var(--font-xs);
            font-weight: 400;
            margin-left: var(--spacing-xs);
        }
        
        .facility-info {
            background: rgba(0, 216, 255, 0.03);
            padding: var(--spacing-lg);
            border-radius: 24px;
        }
        
        .facility-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
        }
        
        .facility-label {
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .facility-label i {
            color: var(--primary);
            font-size: var(--font-sm);
        }
        
        .facility-value {
            font-weight: 600;
        }
        
        .facility-value.success {
            color: var(--success);
        }
        
        .facility-divider {
            height: 1px;
            background: rgba(142, 155, 174, 0.1);
            margin: var(--spacing-sm) 0;
        }
        
        /* Right column - Investment panel */
        .investment-panel {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
        }
        
        .balance-selector {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .balance-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.02);
            padding: var(--spacing-lg);
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .balance-card:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        
        .balance-card.selected {
            background: rgba(0, 216, 255, 0.08);
            outline: 2px solid var(--primary);
        }
        
        .balance-card.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }
        
        .balance-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .balance-name i {
            color: var(--primary);
        }
        
        .balance-asset {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--gray);
            font-size: var(--font-xs);
        }
        
        .balance-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        .balance-fiat {
            font-size: var(--font-xl);
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
        }
        
        .balance-crypto {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--gray);
            font-size: var(--font-sm);
        }
        
        .balance-crypto img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        
        .investment-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .input-group label {
            color: var(--gray);
            font-size: var(--font-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .input-group label i {
            color: var(--primary);
            font-size: var(--font-xs);
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: var(--spacing-xs);
        }
        
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: var(--spacing-md);
            color: white;
            font-size: var(--font-lg);
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            outline: none;
        }
        
        .input-wrapper input::placeholder {
            color: rgba(142, 155, 174, 0.3);
        }
        
        .input-currency {
            padding: 0 var(--spacing-md);
            color: var(--gray);
            font-size: var(--font-md);
            font-weight: 500;
        }
        
        .quick-amounts {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
            margin-top: var(--spacing-xs);
        }
        
        .quick-amount {
            background: rgba(255, 255, 255, 0.02);
            border: none;
            color: var(--gray);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: 30px;
            font-size: var(--font-xs);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .quick-amount:hover {
            background: var(--primary);
            color: var(--darker);
        }
        
        .amount-error {
            color: var(--error);
            font-size: var(--font-xs);
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .return-calculation {
            background: rgba(40, 167, 69, 0.05);
            padding: var(--spacing-lg);
            border-radius: 20px;
        }
        
        .return-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
        }
        
        .return-label {
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .return-label i {
            color: var(--primary);
        }
        
        .return-value {
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }
        
        .return-value.success {
            color: var(--success);
            font-size: var(--font-lg);
        }
        
        .net-income {
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid rgba(142, 155, 174, 0.1);
            font-size: var(--font-lg);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .net-income span:last-child {
            color: var(--success);
        }
        
        .invest-button {
            background: var(--gradient);
            border: none;
            padding: var(--spacing-lg);
            border-radius: 40px;
            color: var(--darker);
            font-weight: 700;
            font-size: var(--font-lg);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }
        
        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 216, 255, 0.2);
        }
        
        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .invest-button i {
            font-size: var(--font-md);
        }
        
        .investment-status {
            text-align: center;
            font-size: var(--font-sm);
            min-height: 24px;
            color: var(--gray);
        }
        
        /* Facility breakdown - prominent */
        .facility-breakdown {
            margin: var(--spacing-xl) 0;
            background: rgba(0, 216, 255, 0.02);
            padding: var(--spacing-xl);
            border-radius: 40px;
        }
        
        .breakdown-title {
            font-size: var(--font-lg);
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .breakdown-title i {
            color: var(--primary);
        }
        
        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-xl);
        }
        
        .breakdown-item {
            text-align: center;
        }
        
        .breakdown-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 216, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-md);
            color: var(--primary);
            font-size: var(--font-xl);
        }
        
        .breakdown-label {
            color: var(--gray);
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-xs);
        }
        
        .breakdown-amount {
            font-size: var(--font-lg);
            font-weight: 600;
        }
        
        .breakdown-amount.success {
            color: var(--success);
        }
        
        .breakdown-amount.warning {
            color: var(--warning);
        }
        
        /* Notification system */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 350px;
        }
        
        .notification {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(30px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-left: 4px solid transparent;
        }
        
        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .notification.success {
            background: #d4edda;
            color: #1a1a1a;
            border-left-color: #28a745;
        }
        
        .notification.error {
            background: rgba(255, 0, 0, 0.95);
            color: white;
            border-left-color: #cc0000;
        }
        
        .notification i {
            font-size: 20px;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* ============================================= */
        /* MOBILE LAYOUT - COMPLETELY DIFFERENT STRUCTURE */
        /* ============================================= */
        @media (max-width: 768px) {
            .investment-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-xl);
            }
            
            .key-metrics {
                flex-direction: column;
                gap: var(--spacing-lg);
            }
            
            .metric-item {
                width: 100%;
            }
            
            .miner-showcase {
                flex-direction: column;
                text-align: center;
            }
            
            .miner-specs {
                width: 100%;
            }
            
            .balance-options {
                grid-template-columns: 1fr;
            }
            
            .breakdown-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-lg);
            }
            
            .plan-title {
                font-size: var(--font-2xl);
            }
            
            .plan-subtitle {
                font-size: var(--font-md);
            }
            
            .session-info {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-xs);
            }
            
            .facility-breakdown {
                padding: var(--spacing-lg);
            }
            
            .notification-center {
                left: 20px;
                right: 20px;
                max-width: none;
            }
            
            .invest-button {
                padding: var(--spacing-md);
                font-size: var(--font-md);
            }
            
            .balance-fiat {
                font-size: var(--font-lg);
            }
            
            .input-wrapper input {
                font-size: var(--font-md);
            }
            
            .return-value.success {
                font-size: var(--font-md);
            }
        }
        
        /* ============================================= */
        /* EXTRA SMALL DEVICES */
        /* ============================================= */
        @media (max-width: 480px) {
            .container {
                padding: 0 var(--spacing-md);
            }
            
            .plan-title {
                font-size: var(--font-xl);
            }
            
            .miner-image {
                width: 100px;
                height: 100px;
            }
            
            .miner-specs {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }
            
            .balance-card {
                padding: var(--spacing-md);
            }
            
            .quick-amounts {
                justify-content: center;
            }
            
            .quick-amount {
                flex: 1;
                text-align: center;
            }
            
            .notification {
                padding: 12px 16px;
            }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            width: 60px;
            height: 60px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        .loading-text {
            margin-top: 20px;
            color: var(--gray);
        }
        
        /* Double-click prevention overlay */
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        
        .processing-overlay.active {
            display: flex;
        }
        
        .processing-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 216, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .processing-text {
            color: white;
            font-size: var(--font-lg);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading your mining contract...</div>
    </div>

    <!-- Processing Overlay - Prevents Double Investment -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-spinner"></div>
        <div class="processing-text">Processing your investment...</div>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Minimal Header -->
    <header class="minimal-header">
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='index.html'">
                    <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                    <span class="logo-text">BitHash</span>
                </div>
                <div class="security-indicator">
                    <i class="fas fa-shield-alt"></i>
                    <span>256-bit AES</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content - Smooth Single Flow -->
    <main class="main-content">
        <div class="container">
            <!-- Back Navigation -->
            <div class="back-nav" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Mining Plans</span>
            </div>

            <!-- Session Information - From URL -->
            <div class="session-info" id="sessionInfo">
                <!-- Dynamically populated from URL parameters -->
            </div>

            <!-- Plan Header - Changes Based on Selected Plan -->
            <div class="plan-header-section" id="planHeader">
                <div class="plan-category">
                    <i class="fas fa-cloud"></i>
                    <span id="planCategory">Bitcoin Cloud Mining</span>
                </div>
                <h1 class="plan-title" id="planTitle">Loading Plan Details...</h1>
                <div class="plan-subtitle" id="planSubtitle">SHA-256 ASIC Mining Contract</div>
            </div>

            <!-- Key Metrics - Flowing Horizontal -->
            <div class="key-metrics" id="keyMetrics">
                <!-- Dynamically populated -->
            </div>

            <!-- Main Investment Grid - Different Layouts for PC/Mobile -->
            <div class="investment-grid">
                <!-- Left Column - Plan Details (PC) / Top Section (Mobile) -->
                <div class="plan-details-section">
                    <!-- Miner Details -->
                    <div class="detail-group">
                        <div class="detail-group-title">
                            <i class="fas fa-microchip"></i>
                            <span>Miner Specifications</span>
                        </div>
                        <div class="miner-showcase" id="minerShowcase">
                            <!-- Dynamically populated -->
                        </div>
                    </div>

                    <!-- Facility & Fee Breakdown -->
                    <div class="detail-group">
                        <div class="detail-group-title">
                            <i class="fas fa-building"></i>
                            <span>Facility Allocation</span>
                        </div>
                        <div class="facility-info" id="facilityInfo">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </div>

                <!-- Right Column - Investment Panel -->
                <div class="investment-panel">
                    <!-- Balance Selection -->
                    <div class="balance-selector">
                        <div class="detail-group-title">
                            <i class="fas fa-wallet"></i>
                            <span>Select Funding Source</span>
                        </div>
                        <div class="balance-options" id="balanceOptions">
                            <!-- Dynamically populated -->
                        </div>
                    </div>

                    <!-- Investment Form -->
                    <div class="investment-form">
                        <div class="input-group">
                            <label>
                                <i class="fas fa-coins"></i>
                                <span>Investment Amount (USD)</span>
                            </label>
                            <div class="input-wrapper">
                                <input type="number" id="investmentAmount" placeholder="0.00" min="0" step="10">
                                <span class="input-currency">USD</span>
                            </div>
                            <div class="quick-amounts">
                                <button class="quick-amount" onclick="setQuickAmount(100)">$100</button>
                                <button class="quick-amount" onclick="setQuickAmount(500)">$500</button>
                                <button class="quick-amount" onclick="setQuickAmount(1000)">$1,000</button>
                                <button class="quick-amount" onclick="setQuickAmount(5000)">$5,000</button>
                            </div>
                            <div class="amount-error" id="amountError"></div>
                        </div>

                        <!-- Return Calculation -->
                        <div class="return-calculation" id="returnCalculation">
                            <!-- Dynamically updated -->
                        </div>

                        <!-- Invest Button -->
                        <button class="invest-button" id="investButton" onclick="processInvestment()">
                            <i class="fas fa-cloud"></i>
                            <span>Start Cloud Mining</span>
                        </button>
                        <div class="investment-status" id="investmentStatus"></div>
                    </div>
                </div>
            </div>

            <!-- Facility Breakdown Section - Prominent -->
            <div class="facility-breakdown" id="facilityBreakdown">
                <!-- Dynamically populated -->
            </div>
        </div>
    </main>

    <script>
        // =============================================
        // PRODUCTION-READY IMPLEMENTATION
        // =============================================
        
        // Global state
        const AppState = {
            sessionKey: null,
            timestamp: null,
            ref: null,
            planId: null,
            planName: null,
            minAmount: null,
            maxAmount: null,
            percentage: null,
            duration: null,
            selectedBalance: 'main',
            selectedBalanceAmount: 0,
            mainBalance: 0,
            maturedBalance: 0,
            btcPrice: 43000,
            isProcessing: false,
            userAsset: 'btc',
            userAssetLogo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
            minerData: {
                basic: {
                    name: 'Avalon Mini 3',
                    hashRate: '68 TH/s',
                    power: '3200W',
                    efficiency: '47 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg'
                },
                standard: {
                    name: 'Fluminer T3',
                    hashRate: '110 TH/s',
                    power: '3250W',
                    efficiency: '29.5 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg'
                },
                pro: {
                    name: 'Avalon Q',
                    hashRate: '150 TH/s',
                    power: '3420W',
                    efficiency: '22.8 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg'
                },
                enterprise: {
                    name: 'Antminer S21 Pro',
                    hashRate: '234 TH/s',
                    power: '5440W',
                    efficiency: '23.2 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg'
                },
                ultimate: {
                    name: 'Antminer S21 XP',
                    hashRate: '255 TH/s',
                    power: '5445W',
                    efficiency: '21.4 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
                },
                institutional: {
                    name: 'Antminer S23 Hyd',
                    hashRate: '335 TH/s',
                    power: '5300W',
                    efficiency: '15.8 J/TH',
                    algorithm: 'SHA-256',
                    image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image-20l26-01-12%20at%2011.43.03%20AM.jpeg'
                }
            }
        };

        // =============================================
        // INITIALIZATION - PARSE URL PARAMETERS
        // =============================================
        function initFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Session-based parameters (from index redirect)
            AppState.sessionKey = urlParams.get('session');
            AppState.timestamp = urlParams.get('v');
            AppState.ref = urlParams.get('ref');
            
            // Plan parameters (passed as query params)
            AppState.planId = urlParams.get('plan');
            AppState.planName = urlParams.get('name') || 'Basic';
            AppState.minAmount = parseFloat(urlParams.get('min')) || 50;
            AppState.maxAmount = parseFloat(urlParams.get('max')) || 1000;
            AppState.percentage = parseFloat(urlParams.get('percentage')) || 5;
            AppState.duration = parseInt(urlParams.get('duration')) || 24;

            // Display session info
            displaySessionInfo();
            
            // Validate required parameters
            if (!AppState.planId) {
                showNotification('error', 'Invalid Session', 'No mining plan selected. Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return false;
            }
            
            return true;
        }

        function displaySessionInfo() {
            const sessionDiv = document.getElementById('sessionInfo');
            if (AppState.sessionKey) {
                sessionDiv.innerHTML = `
                    <span><i class="fas fa-fingerprint"></i> Session: ${AppState.sessionKey.substring(0, 8)}...</span>
                    <span><i class="fas fa-clock"></i> ${new Date(parseInt(AppState.timestamp)).toLocaleString()}</span>
                    <span><i class="fas fa-link"></i> Ref: ${AppState.ref || 'N/A'}</span>
                `;
            }
        }

        // =============================================
        // FETCH USER DATA (BALANCES, PREFERENCES)
        // =============================================
        async function fetchUserData() {
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to continue');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                    return false;
                }

                // Fetch balances
                const balanceResponse = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (balanceResponse.ok) {
                    const balanceData = await balanceResponse.json();
                    AppState.mainBalance = balanceData.data?.balances?.main || 0;
                    AppState.maturedBalance = balanceData.data?.balances?.matured || 0;
                }

                // Fetch user preferences
                const prefsResponse = await fetch('https://bithash-backend.onrender.com/api/users/preferences', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (prefsResponse.ok) {
                    const prefsData = await prefsResponse.json();
                    AppState.userAsset = prefsData.data?.preferences?.displayAsset || 'btc';
                }

                // Fetch BTC price
                await fetchBTCPrice();

                return true;
            } catch (error) {
                console.error('Error fetching user data:', error);
                showNotification('error', 'Connection Error', 'Failed to load account data');
                return false;
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    AppState.btcPrice = data.bitcoin.usd;
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
            }
        }

        function getUserAssetLogo(asset) {
            const logos = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
                bnb: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
                sol: 'https://assets.coingecko.com/coins/images/4128/large/solana.png'
            };
            return logos[asset] || logos.btc;
        }

        // =============================================
        // RENDER PLAN DETAILS
        // =============================================
        function renderPlanDetails() {
            // Set plan header
            document.getElementById('planTitle').textContent = `${AppState.planName} Mining Plan`;
            document.getElementById('planSubtitle').textContent = `${AppState.percentage}% Return • ${AppState.duration}h Duration`;
            document.getElementById('planCategory').innerHTML = `<i class="fas fa-cloud"></i> ${AppState.planName} Plan`;

            // Key metrics
            const keyMetrics = document.getElementById('keyMetrics');
            const minFormatted = AppState.minAmount.toLocaleString();
            const maxFormatted = AppState.maxAmount.toLocaleString();
            
            keyMetrics.innerHTML = `
                <div class="metric-item">
                    <div class="metric-label"><i class="fas fa-coins"></i> Investment Range</div>
                    <div class="metric-value">$${minFormatted} <small>to</small> $${maxFormatted}</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label"><i class="fas fa-chart-line"></i> Return Rate</div>
                    <div class="metric-value"><span class="gain">+${AppState.percentage}%</span></div>
                </div>
                <div class="metric-item">
                    <div class="metric-label"><i class="fas fa-clock"></i> Duration</div>
                    <div class="metric-value">${AppState.duration} <small>hours</small></div>
                </div>
                <div class="metric-item">
                    <div class="metric-label"><i class="fas fa-percentage"></i> Facility Fee</div>
                    <div class="metric-value"><span class="fee">3%</span></div>
                </div>
            `;

            // Miner showcase
            const minerKey = AppState.planName.toLowerCase() || 'basic';
            const miner = AppState.minerData[minerKey] || AppState.minerData.basic;
            
            document.getElementById('minerShowcase').innerHTML = `
                <img src="${miner.image}" alt="${miner.name}" class="miner-image" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                <div class="miner-specs">
                    <div class="spec-item">
                        <span class="spec-label">Model</span>
                        <span class="spec-value">${miner.name}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Hash Rate</span>
                        <span class="spec-value">${miner.hashRate}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Power</span>
                        <span class="spec-value">${miner.power}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Efficiency</span>
                        <span class="spec-value">${miner.efficiency}</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Algorithm</span>
                        <span class="spec-value">${miner.algorithm}</span>
                    </div>
                </div>
            `;

            // Facility info
            document.getElementById('facilityInfo').innerHTML = `
                <div class="facility-row">
                    <span class="facility-label"><i class="fas fa-bolt"></i> Data Center</span>
                    <span class="facility-value">North America (85% Renewable)</span>
                </div>
                <div class="facility-row">
                    <span class="facility-label"><i class="fas fa-microchip"></i> Miner Allocation</span>
                    <span class="facility-value">Dedicated Hash Rate</span>
                </div>
                <div class="facility-divider"></div>
                <div class="facility-row">
                    <span class="facility-label"><i class="fas fa-chart-pie"></i> To Facility (Hardware/Power)</span>
                    <span class="facility-value">97% of Investment</span>
                </div>
                <div class="facility-row">
                    <span class="facility-label"><i class="fas fa-coins"></i> Net Mining Power</span>
                    <span class="facility-value success">${AppState.percentage}% Return</span>
                </div>
            `;

            // Facility breakdown
            document.getElementById('facilityBreakdown').innerHTML = `
                <div class="breakdown-title">
                    <i class="fas fa-chart-pie"></i>
                    <span>Where Your Investment Goes</span>
                </div>
                <div class="breakdown-grid">
                    <div class="breakdown-item">
                        <div class="breakdown-icon"><i class="fas fa-plug"></i></div>
                        <div class="breakdown-label">Hardware & Infrastructure</div>
                        <div class="breakdown-amount">80%</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-icon"><i class="fas fa-bolt"></i></div>
                        <div class="breakdown-label">Electricity & Cooling</div>
                        <div class="breakdown-amount">15%</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-icon"><i class="fas fa-tools"></i></div>
                        <div class="breakdown-label">Maintenance & Operations</div>
                        <div class="breakdown-amount">5%</div>
                    </div>
                </div>
                <div style="margin-top: var(--spacing-lg); text-align: center; color: var(--gray);">
                    Your net return: <span class="success">+${AppState.percentage}%</span> after facility costs
                </div>
            `;
        }

        // =============================================
        // BALANCE OPTIONS RENDERING
        // =============================================
        function renderBalanceOptions() {
            const container = document.getElementById('balanceOptions');
            const assetLogo = getUserAssetLogo(AppState.userAsset);
            const mainAssetAmount = AppState.btcPrice > 0 ? AppState.mainBalance / AppState.btcPrice : 0;
            const maturedAssetAmount = AppState.btcPrice > 0 ? AppState.maturedBalance / AppState.btcPrice : 0;
            
            container.innerHTML = `
                <div class="balance-card ${AppState.mainBalance >= AppState.minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('main', ${AppState.mainBalance})"
                     data-balance="main">
                    <div class="balance-header">
                        <span class="balance-name"><i class="fas fa-wallet"></i> Main Balance</span>
                        <span class="balance-asset">
                            <img src="${assetLogo}">
                            ${AppState.userAsset.toUpperCase()}
                        </span>
                    </div>
                    <div class="balance-fiat">$${AppState.mainBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-crypto">
                        <img src="${assetLogo}">
                        <span>${mainAssetAmount.toFixed(6)} ${AppState.userAsset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-card ${AppState.maturedBalance >= AppState.minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('matured', ${AppState.maturedBalance})"
                     data-balance="matured">
                    <div class="balance-header">
                        <span class="balance-name"><i class="fas fa-piggy-bank"></i> Matured Balance</span>
                        <span class="balance-asset">
                            <img src="${assetLogo}">
                            ${AppState.userAsset.toUpperCase()}
                        </span>
                    </div>
                    <div class="balance-fiat">$${AppState.maturedBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-crypto">
                        <img src="${assetLogo}">
                        <span>${maturedAssetAmount.toFixed(6)} ${AppState.userAsset.toUpperCase()}</span>
                    </div>
                </div>
            `;

            // Auto-select if possible
            if (AppState.mainBalance >= AppState.minAmount) {
                selectBalance('main', AppState.mainBalance);
            } else if (AppState.maturedBalance >= AppState.minAmount) {
                selectBalance('matured', AppState.maturedBalance);
            }

            // Update investment input constraints
            updateInvestmentConstraints();
        }

        function selectBalance(type, amount) {
            document.querySelectorAll('.balance-card').forEach(c => c.classList.remove('selected'));
            const selected = document.querySelector(`.balance-card[data-balance="${type}"]`);
            if (selected && !selected.classList.contains('disabled')) {
                selected.classList.add('selected');
                AppState.selectedBalance = type;
                AppState.selectedBalanceAmount = amount;
                
                const input = document.getElementById('investmentAmount');
                input.min = AppState.minAmount;
                input.max = Math.min(AppState.maxAmount, amount);
                input.value = AppState.minAmount;
                
                validateAndCalculate();
            }
        }

        function setQuickAmount(amount) {
            const input = document.getElementById('investmentAmount');
            if (amount >= AppState.minAmount && amount <= AppState.maxAmount && amount <= AppState.selectedBalanceAmount) {
                input.value = amount;
                validateAndCalculate();
            }
        }

        function updateInvestmentConstraints() {
            const input = document.getElementById('investmentAmount');
            input.min = AppState.minAmount;
            input.max = Math.min(AppState.maxAmount, AppState.selectedBalanceAmount);
            input.placeholder = `Min $${AppState.minAmount}`;
        }

        // =============================================
        // VALIDATION AND CALCULATION
        // =============================================
        function validateAndCalculate() {
            const input = document.getElementById('investmentAmount');
            const amount = parseFloat(input.value) || 0;
            const errorDiv = document.getElementById('amountError');
            const statusDiv = document.getElementById('investmentStatus');
            const investBtn = document.getElementById('investButton');

            // Clear previous errors
            errorDiv.innerHTML = '';
            statusDiv.innerHTML = '';

            if (amount < AppState.minAmount) {
                errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Minimum investment is $${AppState.minAmount.toLocaleString()}`;
                investBtn.disabled = true;
                return false;
            }

            if (amount > AppState.maxAmount) {
                errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Maximum investment is $${AppState.maxAmount.toLocaleString()}`;
                investBtn.disabled = true;
                return false;
            }

            if (amount > AppState.selectedBalanceAmount) {
                errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Insufficient ${AppState.selectedBalance} balance`;
                investBtn.disabled = true;
                return false;
            }

            investBtn.disabled = false;
            calculateReturns(amount);
            return true;
        }

        function calculateReturns(amount) {
            const facilityFee = amount * 0.03;
            const netToFacility = amount - facilityFee;
            const grossReturn = netToFacility * (1 + AppState.percentage / 100);
            const netReturn = grossReturn; // After facility already accounted
            
            const assetLogo = getUserAssetLogo(AppState.userAsset);
            const returnInAsset = AppState.btcPrice > 0 ? netReturn / AppState.btcPrice : 0;

            document.getElementById('returnCalculation').innerHTML = `
                <div class="return-row">
                    <span class="return-label"><i class="fas fa-arrow-right"></i> Investment Amount</span>
                    <span class="return-value">$${amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
                <div class="return-row">
                    <span class="return-label"><i class="fas fa-building"></i> To Facility (Hardware/Power)</span>
                    <span class="return-value">$${(amount - facilityFee).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
                <div class="return-row">
                    <span class="return-label"><i class="fas fa-chart-line"></i> Expected Return (+${AppState.percentage}%)</span>
                    <span class="return-value success">$${netReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
                <div class="net-income">
                    <span><i class="fas fa-coins"></i> Net Income</span>
                    <span>$${(netReturn - amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
                <div style="margin-top: var(--spacing-sm); text-align: center; color: var(--gray); font-size: var(--font-xs); display: flex; align-items: center; justify-content: center; gap: var(--spacing-xs);">
                    <img src="${assetLogo}" style="width: 14px; height: 14px; border-radius: 50%;">
                    <span>≈ ${returnInAsset.toFixed(6)} ${AppState.userAsset.toUpperCase()}</span>
                </div>
            `;
        }

        // =============================================
        // INVESTMENT PROCESSING
        // =============================================
        async function processInvestment() {
            // Double-click prevention
            if (AppState.isProcessing) {
                showNotification('warning', 'Processing', 'Your previous request is still being processed');
                return;
            }

            const amount = parseFloat(document.getElementById('investmentAmount').value);
            
            // Validate one more time
            if (!validateAndCalculate()) {
                return;
            }

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }

            // Show processing overlay
            AppState.isProcessing = true;
            document.getElementById('processingOverlay').classList.add('active');
            document.getElementById('investButton').disabled = true;

            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: AppState.planId,
                        amount: amount,
                        balanceType: AppState.selectedBalance,
                        sessionKey: AppState.sessionKey,
                        ref: AppState.ref
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Success notification
                    showNotification('success', 'Investment Successful!', 
                        `Your cloud mining investment of $${amount.toLocaleString()} has been activated.`);

                    // Redirect to index.html after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Investment failed');
                }
            } catch (error) {
                console.error('Investment error:', error);
                
                // Error notification
                showNotification('error', 'Investment Failed', 
                    error.message || 'There was an error processing your investment. Please try again.');

                // Hide processing overlay
                document.getElementById('processingOverlay').classList.remove('active');
                document.getElementById('investButton').disabled = false;
                AppState.isProcessing = false;
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message, duration = 5000) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 
                        'fa-info-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        document.getElementById('investmentAmount').addEventListener('input', validateAndCalculate);

        // =============================================
        // INITIALIZATION
        // =============================================
        window.addEventListener('load', async function() {
            // Hide loading overlay after 1 second
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1000);

            // Parse URL parameters
            if (!initFromUrl()) return;

            // Fetch user data
            const userDataLoaded = await fetchUserData();
            if (!userDataLoaded) return;

            // Render the page
            renderPlanDetails();
            renderBalanceOptions();

            // Set up input validation
            const input = document.getElementById('investmentAmount');
            input.addEventListener('input', validateAndCalculate);
        });
    </script>
</body>
</html>
