<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Minimal SEO - This is a subpage, no titles/logos -->
    <title>Investment Panel - BitHash Cloud Mining</title>
    
    <!-- Google Fonts - Same as index -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS Inline - Shows content immediately -->
    <style>
        /* Minimal Critical CSS - Loads instantly */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            opacity: 1;
            transition: opacity 0.3s;
            line-height: 1.6;
            padding: 20px;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
    
    <!-- Defer Non-Critical CSS -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- TradingView Widget - Loaded asynchronously -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var tvScript = document.createElement('script');
                tvScript.src = 'https://s3.tradingview.com/tv.js';
                tvScript.async = true;
                document.body.appendChild(tvScript);
            }, 500);
        });
    </script>
    
    <style>
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --blue-translucent: rgba(26, 115, 232, 0.25);
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Investment Panel Container - Smooth as crypto.com/binance */
        .investment-panel {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0;
            position: relative;
            background: transparent;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 216, 255, 0.3));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Notification Center - Same as index */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
            width: 100%;
            max-width: 350px;
        }

        .notification {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: start;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            background-color: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            position: relative;
        }

        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }

        .notification.success {
            background-color: #d4edda;
            color: #1a1a1a;
            border-left: 4px solid #28a745;
            border: 1px solid #c3e6cb;
        }

        .notification.error {
            background-color: rgba(255, 0, 0, 0.95);
            color: white;
            border-left: 4px solid #cc0000;
        }

        .notification.warning {
            background-color: rgba(255, 184, 0, 0.95);
            color: var(--darker);
        }

        .notification i {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }

        .notification-message {
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .notification-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-close:hover {
            background-color: rgba(0, 0, 0, 0.2);
            transform: rotate(90deg);
        }

        /* Investment Container - Modal Layout */
        .investment-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            background: transparent;
        }

        /* Plan Header */
        .plan-header-section {
            background: linear-gradient(135deg, #1a1a2a 0%, #0f0f1a 100%);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .plan-title-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .plan-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--darker);
            box-shadow: 0 10px 20px rgba(0, 216, 255, 0.3);
        }

        .plan-name-large {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
        }

        .plan-badge-large {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 216, 255, 0.2);
        }

        .plan-badge-large i {
            font-size: 1rem;
        }

        /* Key Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .metric-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            border-color: rgba(0, 216, 255, 0.2);
        }

        .metric-label {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-label i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .metric-sub {
            color: var(--gray);
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* Two Column Layout - Like Modal */
        .investment-main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 25px;
        }

        /* Investment Form Card */
        .investment-form-card {
            background: linear-gradient(135deg, #1a1a2a 0%, #0f0f1a 100%);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title i {
            color: var(--primary);
        }

        .amount-input-group {
            margin-bottom: 25px;
        }

        .amount-label {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .amount-input-container {
            position: relative;
            margin-bottom: 15px;
        }

        .amount-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--gray-light);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 216, 255, 0.1);
        }

        .amount-input.error {
            border-color: var(--error);
        }

        .amount-currency {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1.2rem;
            font-weight: 500;
        }

        .amount-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preset-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gray-light);
            border-radius: 30px;
            color: var(--gray);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .preset-btn:hover {
            background: var(--primary);
            color: var(--darker);
            border-color: var(--primary);
        }

        /* Balance Info */
        .balance-info {
            background: rgba(0, 216, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid var(--primary);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .balance-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .balance-amount {
            font-weight: 600;
            color: white;
        }

        .balance-amount.highlight {
            color: var(--success);
            font-size: 1.1rem;
        }

        /* Returns Calculator */
        .returns-calculator {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
        }

        .return-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .return-item:last-child {
            border-bottom: none;
        }

        .return-label {
            color: var(--gray);
        }

        .return-value {
            font-weight: 600;
            color: var(--success);
        }

        .return-value.total {
            font-size: 1.2rem;
            color: var(--primary);
        }

        /* Investment Button */
        .invest-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--darker);
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 216, 255, 0.4);
        }

        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .invest-button i {
            font-size: 1.2rem;
        }

        /* Miner Details Card */
        .miner-details-card {
            background: linear-gradient(135deg, #1a1a2a 0%, #0f0f1a 100%);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .miner-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .miner-image {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .miner-specs {
            flex: 1;
        }

        .miner-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
        }

        .miner-model {
            color: var(--gray);
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .miner-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 216, 255, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .spec-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 12px;
        }

        .spec-label {
            color: var(--gray);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .spec-value {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .spec-unit {
            color: var(--gray);
            font-size: 0.8rem;
            margin-left: 3px;
        }

        /* TradingView Chart - Copy pasted from modal */
        .tradingview-chart-container {
            margin-top: 30px;
            height: 300px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        #tradingview-chart {
            width: 100%;
            height: 100%;
        }

        /* Contract Terms */
        .contract-terms {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .terms-title {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terms-list {
            list-style: none;
        }

        .terms-list li {
            color: var(--gray);
            font-size: 0.9rem;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .terms-list li:last-child {
            border-bottom: none;
        }

        .terms-list li i {
            color: var(--primary);
            font-size: 0.8rem;
            width: 16px;
        }

        /* Company Fee Notice */
        .fee-notice {
            background: rgba(255, 184, 0, 0.1);
            border-left: 4px solid var(--warning);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fee-notice i {
            color: var(--warning);
            font-size: 1.2rem;
        }

        .fee-notice span {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .investment-main-grid {
                grid-template-columns: 1fr;
            }
            
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .plan-name-large {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .plan-title-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .plan-icon-large {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            
            .plan-name-large {
                font-size: 1.8rem;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .metric-value {
                font-size: 1.5rem;
            }
            
            .miner-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .miner-image {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 480px) {
            .investment-form-card,
            .miner-details-card,
            .plan-header-section {
                padding: 20px;
            }
            
            .amount-input {
                font-size: 1.2rem;
                padding: 12px 16px;
            }
            
            .amount-presets {
                gap: 5px;
            }
            
            .preset-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .specs-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Prevent double investment */
        .invest-button.processing {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Loading spinner for button */
        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->

    <!-- Main Investment Panel - Pure investment interface, no titles/logos -->

        <div class="investment-container" id="investment-container">
            <!-- Content will be dynamically populated based on the selected plan -->
        </div>
    </div>

    <script>

        ];

        // Plan names
        const planNames = ["Basic", "Standard", "Pro", "Enterprise", "Ultimate", "Institutional"];

        // =============================================
        // INITIALIZATION - Get plan data from sessionStorage
        // =============================================
        async function initializeInvestmentPanel() {
            // Show loading overlay
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            try {
                // Get session key from URL
                const urlParams = new URLSearchParams(window.location.search);
                const sessionKey = urlParams.get('session');
                
                if (!sessionKey) {
                    showNotification('error', 'Invalid Session', 'No investment plan selected. Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html#plans';
                    }, 2000);
                    return;
                }

                // Retrieve plan data from sessionStorage
                const planDataJson = sessionStorage.getItem(sessionKey);
                if (!planDataJson) {
                    showNotification('error', 'Session Expired', 'Investment session expired. Please select a plan again.');
                    setTimeout(() => {
                        window.location.href = 'index.html#plans';
                    }, 2000);
                    return;
                }

                currentPlan = JSON.parse(planDataJson);
                
                // Validate plan data
                if (!currentPlan || !currentPlan.id) {
                    throw new Error('Invalid plan data');
                }

                // Fetch user balances
                await fetchUserBalances();
                
                // Render the investment panel
                renderInvestmentPanel();
                
                // Initialize TradingView chart
                initTradingViewChart();
                
                // Hide loading overlay
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                }, 500);

            } catch (error) {
                console.error('Initialization error:', error);
                showNotification('error', 'Error', 'Failed to load investment panel. Please try again.');
                setTimeout(() => {
                    window.location.href = 'index.html#plans';
                }, 2000);
            }
        }

        // =============================================
        // FETCH USER BALANCES - Same endpoint as modal
        // =============================================
        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => {
                    window.location.href = 'login';
                }, 2000);
                return;
            }

            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                } else if (response.status === 401) {
                    localStorage.removeItem('jwtToken');
                    showNotification('error', 'Session Expired', 'Please login again');
                    setTimeout(() => {
                        window.location.href = 'login';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
                showNotification('error', 'Connection Error', 'Failed to fetch balances');
            }
        }

        // =============================================
        // RENDER INVESTMENT PANEL - Copy pasted from modal
        // =============================================
        function renderInvestmentPanel() {
            const container = document.getElementById('investment-container');
            if (!container) return;

            const planIndex = currentPlan.planIndex || 0;
            const miner = miners[Math.min(planIndex, miners.length - 1)];
            const planDisplayName = currentPlan.name || planNames[planIndex % planNames.length];
            
            // Calculate estimated returns (based on percentage)
            const minAmount = currentPlan.minAmount || 0;
            const maxAmount = currentPlan.maxAmount || 0;
            const percentage = currentPlan.percentage || 0;
            const duration = currentPlan.duration || 0;
            
            const estimatedReturn = minAmount * (percentage / 100);
            const estimatedTotal = minAmount + estimatedReturn;
            const dailyReturn = duration > 0 ? estimatedReturn / duration : 0;

            // Determine which balances are sufficient
            const hasMainBalance = userBalances.main >= minAmount;
            const hasMaturedBalance = userBalances.matured >= minAmount;
            const canInvest = hasMainBalance || hasMaturedBalance;

            // Default to main balance if available, otherwise matured
            selectedBalanceType = hasMainBalance ? 'main' : (hasMaturedBalance ? 'matured' : 'main');
            currentInvestmentAmount = minAmount;

            container.innerHTML = `
                <!-- Plan Header Section -->
                <div class="plan-header-section">
                    <div class="plan-title-row">
                        <div class="plan-icon-large">
                            <i class="fas fa-cloud"></i>
                        </div>
                        <div>
                            <h1 class="plan-name-large">${planDisplayName} Plan</h1>
                            <div class="plan-badge-large">
                                <i class="fas fa-microchip"></i>
                                <span>SHA-256 ASIC Mining • ${miner.name}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Key Metrics Grid - Exactly like modal -->
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-label">
                                <i class="fas fa-coins"></i>
                                <span>Min Investment</span>
                            </div>
                            <div class="metric-value">$${formatNumber(minAmount)}</div>
                            <div class="metric-sub">USD</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">
                                <i class="fas fa-coins"></i>
                                <span>Max Investment</span>
                            </div>
                            <div class="metric-value">$${formatNumber(maxAmount)}</div>
                            <div class="metric-sub">USD</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">
                                <i class="fas fa-percentage"></i>
                                <span>Return Rate</span>
                            </div>
                            <div class="metric-value" style="color: var(--success);">+${percentage}%</div>
                            <div class="metric-sub">Fixed return</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">
                                <i class="fas fa-clock"></i>
                                <span>Duration</span>
                            </div>
                            <div class="metric-value">${duration}h</div>
                            <div class="metric-sub">${Math.floor(duration/24)} days ${duration%24}h</div>
                        </div>
                    </div>
                </div>

                <!-- Main Investment Grid - Two Columns Like Modal -->
                <div class="investment-main-grid">
                    <!-- Left Column: Investment Form -->
                    <div class="investment-form-card">
                        <h3 class="form-title">
                            <i class="fas fa-pen"></i>
                            Enter Investment Amount
                        </h3>

                        <!-- Amount Input -->
                        <div class="amount-input-group">
                            <div class="amount-label">
                                <span>Amount (USD)</span>
                                <span>Min: $${formatNumber(minAmount)} | Max: $${formatNumber(maxAmount)}</span>
                            </div>
                            <div class="amount-input-container">
                                <input type="number" 
                                       class="amount-input" 
                                       id="investment-amount" 
                                       value="${minAmount}"
                                       min="${minAmount}"
                                       max="${maxAmount}"
                                       step="10"
                                       placeholder="Enter amount">
                                <span class="amount-currency">USD</span>
                            </div>
                            <div class="amount-presets">
                                <button class="preset-btn" onclick="setAmount(${minAmount})">Min</button>
                                <button class="preset-btn" onclick="setAmount(${Math.min(minAmount * 2, maxAmount)})">2x Min</button>
                                <button class="preset-btn" onclick="setAmount(${Math.floor((minAmount + maxAmount) / 2)})">50%</button>
                                <button class="preset-btn" onclick="setAmount(${maxAmount})">Max</button>
                            </div>
                        </div>

                        <!-- Balance Selection - Like Modal -->
                        <div class="balance-info">
                            <div class="balance-row">
                                <span class="balance-label">
                                    <i class="fas fa-wallet" style="margin-right: 5px;"></i>
                                    Available Main Balance:
                                </span>
                                <span class="balance-amount ${hasMainBalance ? 'highlight' : ''}" 
                                      onclick="selectBalanceType('main')"
                                      style="cursor: pointer;">
                                    $${formatNumber(userBalances.main)}
                                </span>
                            </div>
                            <div class="balance-row">
                                <span class="balance-label">
                                    <i class="fas fa-piggy-bank" style="margin-right: 5px;"></i>
                                    Available Matured Balance:
                                </span>
                                <span class="balance-amount ${hasMaturedBalance ? 'highlight' : ''}" 
                                      onclick="selectBalanceType('matured')"
                                      style="cursor: pointer;">
                                    $${formatNumber(userBalances.matured)}
                                </span>
                            </div>
                            <div style="margin-top: 10px; font-size: 0.85rem; color: var(--gray);">
                                <i class="fas fa-info-circle"></i>
                                Click on a balance to use it for investment
                            </div>
                        </div>

                        <!-- Returns Calculator - Exactly like modal -->
                        <div class="returns-calculator">
                            <div style="margin-bottom: 15px; color: white; font-weight: 600;">
                                <i class="fas fa-chart-line" style="margin-right: 8px; color: var(--primary);"></i>
                                Estimated Returns
                            </div>
                            <div class="return-item">
                                <span class="return-label">Investment Amount:</span>
                                <span class="return-value" id="display-investment">$${formatNumber(minAmount)}</span>
                            </div>
                            <div class="return-item">
                                <span class="return-label">Return (${percentage}%):</span>
                                <span class="return-value" style="color: var(--success);" id="display-return">$${formatNumber(estimatedReturn)}</span>
                            </div>
                            <div class="return-item">
                                <span class="return-label">Daily Average:</span>
                                <span class="return-value" id="display-daily">$${formatNumber(dailyReturn)}</span>
                            </div>
                            <div class="return-item">
                                <span class="return-label">Company Fee (3% of profit):</span>
                                <span class="return-value" id="display-fee">$${formatNumber(estimatedReturn * 0.03)}</span>
                            </div>
                            <div class="return-item">
                                <span class="return-label" style="font-weight: 600;">Total Return After Fee:</span>
                                <span class="return-value total" id="display-total">$${formatNumber(minAmount + (estimatedReturn * 0.97))}</span>
                            </div>
                        </div>

                        <!-- Company Fee Notice - Same as modal -->
                        <div class="fee-notice">
                            <i class="fas fa-percentage"></i>
                            <span>A 3% company fee will be deducted from profits upon plan maturity</span>
                        </div>

                        <!-- Investment Button -->
                        <button class="invest-button" 
                                id="invest-button"
                                onclick="processInvestment()"
                                ${!canInvest ? 'disabled' : ''}
                                title="${!canInvest ? 'Insufficient balance' : 'Click to invest'}">
                            <i class="fas fa-cloud"></i>
                            ${canInvest ? 'Start Cloud Mining' : 'Insufficient Balance'}
                        </button>
                    </div>

                    <!-- Right Column: Miner Details & Chart -->
                    <div class="miner-details-card">
                        <div class="miner-header">
                            <div class="miner-image">
                                <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                            </div>
                            <div class="miner-specs">
                                <h2 class="miner-name">${miner.name}</h2>
                                <div class="miner-model">${miner.model}</div>
                                <div class="miner-badge">
                                    <i class="fas fa-bolt"></i>
                                    <span>Active Mining</span>
                                </div>
                            </div>
                        </div>

                        <!-- Miner Specifications -->
                        <div class="specs-grid">
                            <div class="spec-item">
                                <div class="spec-label">Hash Rate</div>
                                <div class="spec-value">${miner.hashRate}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Power Consumption</div>
                                <div class="spec-value">${miner.powerConsumption}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Efficiency</div>
                                <div class="spec-value">${miner.efficiency}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Algorithm</div>
                                <div class="spec-value">SHA-256</div>
                            </div>
                        </div>

                        <!-- TradingView Chart - Same as modal -->
                        <div class="tradingview-chart-container">
                            <div id="tradingview-chart"></div>
                        </div>

                        <!-- Contract Terms - Same as modal -->
                        <div class="contract-terms">
                            <h4 class="terms-title">
                                <i class="fas fa-file-contract"></i>
                                Contract Terms
                            </h4>
                            <ul class="terms-list">
                                <li><i class="fas fa-check-circle"></i> Daily mining rewards distributed automatically</li>
                                <li><i class="fas fa-check-circle"></i> Principal returned at maturity + ${percentage}% profit</li>
                                <li><i class="fas fa-check-circle"></i> 3% company fee deducted from profit only</li>
                                <li><i class="fas fa-check-circle"></i> No maintenance fees or hidden costs</li>
                                <li><i class="fas fa-check-circle"></i> Real-time mining dashboard access</li>
                                <li><i class="fas fa-check-circle"></i> 24/7 customer support</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;

            // Add event listeners
            document.getElementById('investment-amount').addEventListener('input', updateReturns);
            
            // Set initial selected balance type indicator
            highlightSelectedBalance();
        }

        // =============================================
        // TRADINGVIEW CHART - Copy pasted from modal
        // =============================================
        function initTradingViewChart() {
            const container = document.getElementById('tradingview-chart');
            if (!container) return;

            // Clear container
            container.innerHTML = '';

            // Check if TradingView is loaded
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BTCUSDT",
                    "interval": "15",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview-chart",
                    "hide_side_toolbar": false,
                    "studies": ["Volume@tv-basicstudies"],
                    "show_popup_button": false,
                    "withdateranges": true,
                    "details": false,
                    "calendar": false,
                    "hide_legend": false,
                    "save_image": false
                });
            } else {
                // If TradingView not loaded yet, show placeholder and retry
                container.innerHTML = '<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gray);">Loading TradingView Chart...</div>';
                
                // Retry after a delay
                setTimeout(() => {
                    if (typeof TradingView !== 'undefined') {
                        initTradingViewChart();
                    }
                }, 2000);
            }
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        function formatNumber(num) {
            if (num === undefined || num === null) return '0';
            const numericNum = parseFloat(num);
            if (isNaN(numericNum)) return '0';
            return numericNum.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function setAmount(amount) {
            const input = document.getElementById('investment-amount');
            if (input) {
                input.value = amount;
                updateReturns();
            }
        }

        function selectBalanceType(type) {
            selectedBalanceType = type;
            highlightSelectedBalance();
        }

        function highlightSelectedBalance() {
            const mainBalance = document.querySelector('.balance-row:first-child .balance-amount');
            const maturedBalance = document.querySelector('.balance-row:last-child .balance-amount');
            
            if (mainBalance) {
                if (selectedBalanceType === 'main') {
                    mainBalance.style.color = 'var(--primary)';
                    mainBalance.style.fontWeight = '700';
                } else {
                    mainBalance.style.color = '';
                    mainBalance.style.fontWeight = '';
                }
            }
            
            if (maturedBalance) {
                if (selectedBalanceType === 'matured') {
                    maturedBalance.style.color = 'var(--primary)';
                    maturedBalance.style.fontWeight = '700';
                } else {
                    maturedBalance.style.color = '';
                    maturedBalance.style.fontWeight = '';
                }
            }
        }

        function updateReturns() {
            const input = document.getElementById('investment-amount');
            if (!input || !currentPlan) return;

            let amount = parseFloat(input.value) || 0;
            const minAmount = currentPlan.minAmount || 0;
            const maxAmount = currentPlan.maxAmount || 0;
            
            // Clamp amount to valid range
            if (amount < minAmount) {
                amount = minAmount;
                input.value = minAmount;
            } else if (amount > maxAmount) {
                amount = maxAmount;
                input.value = maxAmount;
            }

            const percentage = currentPlan.percentage || 0;
            const duration = currentPlan.duration || 0;
            
            const estimatedReturn = amount * (percentage / 100);
            const estimatedTotal = amount + estimatedReturn;
            const dailyReturn = duration > 0 ? estimatedReturn / duration : 0;
            const companyFee = estimatedReturn * 0.03;
            const totalAfterFee = amount + (estimatedReturn * 0.97);

            // Update display
            document.getElementById('display-investment').textContent = `$${formatNumber(amount)}`;
            document.getElementById('display-return').textContent = `$${formatNumber(estimatedReturn)}`;
            document.getElementById('display-daily').textContent = `$${formatNumber(dailyReturn)}`;
            document.getElementById('display-fee').textContent = `$${formatNumber(companyFee)}`;
            document.getElementById('display-total').textContent = `$${formatNumber(totalAfterFee)}`;

            currentInvestmentAmount = amount;
        }

        // =============================================
        // PROCESS INVESTMENT - Same endpoint as modal
        // =============================================
        async function processInvestment() {
            // Prevent double investment
            if (isProcessing) {
                showNotification('warning', 'Processing', 'Please wait for current transaction to complete');
                return;
            }

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => {
                    window.location.href = 'login';
                }, 2000);
                return;
            }

            // Validate investment amount
            const amount = currentInvestmentAmount;
            const minAmount = currentPlan.minAmount || 0;
            const maxAmount = currentPlan.maxAmount || 0;

            if (amount < minAmount || amount > maxAmount) {
                showNotification('error', 'Invalid Amount', `Amount must be between $${formatNumber(minAmount)} and $${formatNumber(maxAmount)}`);
                return;
            }

            // Check selected balance
            const availableBalance = selectedBalanceType === 'main' ? userBalances.main : userBalances.matured;
            if (amount > availableBalance) {
                showNotification('error', 'Insufficient Balance', `You don't have enough ${selectedBalanceType} balance`);
                return;
            }

            // Disable button and show processing
            isProcessing = true;
            const investButton = document.getElementById('invest-button');
            const originalText = investButton.innerHTML;
            investButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            investButton.disabled = true;

            try {
                // Prepare investment data - same structure as modal
                const investmentData = {
                    planId: currentPlan.id,
                    amount: amount,
                    balanceType: selectedBalanceType, // 'main' or 'matured'
                    timestamp: Date.now()
                };

                // Send investment request - same endpoint as modal
                const response = await fetch('https://bithash-backend.onrender.com/api/investments/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(investmentData)
                });

                const data = await response.json();

                if (response.ok) {
                    // Show success notification
                    showNotification('success', 'Investment Successful', 
                        `Your investment of $${formatNumber(amount)} in ${currentPlan.name} plan has been confirmed. Redirecting...`);
                    
                    // Clear session storage
                    const urlParams = new URLSearchParams(window.location.search);
                    const sessionKey = urlParams.get('session');
                    if (sessionKey) {
                        sessionStorage.removeItem(sessionKey);
                    }
                    
                    // Redirect back to index.html after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html#plans';
                    }, 2000);
                } else {
                    // Handle specific error codes
                    if (response.status === 400) {
                        showNotification('error', 'Investment Failed', data.message || 'Invalid investment request');
                    } else if (response.status === 401) {
                        localStorage.removeItem('jwtToken');
                        showNotification('error', 'Session Expired', 'Please login again');
                        setTimeout(() => {
                            window.location.href = 'login';
                        }, 2000);
                    } else if (response.status === 409) {
                        showNotification('error', 'Duplicate Investment', 'You cannot invest twice at the same time');
                    } else {
                        showNotification('error', 'Investment Failed', data.message || 'An error occurred');
                    }
                    
                    // Reset button
                    investButton.innerHTML = originalText;
                    investButton.disabled = false;
                }
            } catch (error) {
                console.error('Investment error:', error);
                showNotification('error', 'Connection Error', 'Failed to process investment. Please try again.');
                
                // Reset button
                investButton.innerHTML = originalText;
                investButton.disabled = false;
            } finally {
                isProcessing = false;
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM - Same as index
        // =============================================
        const notificationQueue = [];
        let isNotificationShowing = false;

        function showNotification(type, title, message, duration = 5000) {
            notificationQueue.push({ type, title, message, duration });
            if (!isNotificationShowing) {
                processNotificationQueue();
            }
        }

        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isNotificationShowing = false;
                return;
            }

            isNotificationShowing = true;
            const { type, title, message, duration } = notificationQueue.shift();

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;

            const icon = type === 'error' ? 'fa-exclamation-circle' : 
                        type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle';

            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;

            const notificationCenter = document.getElementById('notification-center');
            notificationCenter.appendChild(notification);

            void notification.offsetWidth;
            notification.classList.add('show');

            if (type === 'error' && 'vibrate' in navigator) {
                navigator.vibrate([200, 100, 200]);
            }

            notification.querySelector('.notification-close').addEventListener('click', () => {
                closeNotification(notification);
            });

            if (duration > 0) {
                setTimeout(() => {
                    if (notification.parentNode) {
                        closeNotification(notification);
                    }
                }, duration);
            }
        }

        function closeNotification(notification) {
            notification.classList.remove('show');

            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
                processNotificationQueue();
            }, 400);
        }

        // =============================================
        // START
        // =============================================
        document.addEventListener('DOMContentLoaded', initializeInvestmentPanel);

        // Handle back button - clear session on page unload
        window.addEventListener('beforeunload', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionKey = urlParams.get('session');
            if (sessionKey) {
                // Don't remove immediately, but we'll handle it on successful investment
                // This prevents accidental clearing
            }
        });

        // Expose functions globally
        window.setAmount = setAmount;
        window.selectBalanceType = selectBalanceType;
        window.processInvestment = processInvestment;
    </script>
</body>
