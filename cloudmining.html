    <style>
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --success-dark: #1e7e34;
            --error: #FF0000;
            --error-dark: #cc0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --success-gradient: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            --error-gradient: linear-gradient(135deg, var(--error) 0%, var(--error-dark) 100%);
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --blue-translucent: rgba(26, 115, 232, 0.25);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 216, 255, 0.3));
        }
        
        .loading-text {
            margin-top: 20px;
            font-weight: 500;
            color: var(--gray);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        /* Notification System */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 350px;
        }
        
        .notification {
            width: 100%;
            padding: 16px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }
        
        .notification.success {
            background: var(--success-gradient);
            color: white;
        }
        
        .notification.error {
            background: var(--error-gradient);
            color: white;
        }
        
        .notification i {
            font-size: 1.2rem;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        
        .notification-message {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .notification-close {
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition);
            font-size: 1rem;
        }
        
        .notification-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }
        
        /* Main Header */
        header {
            background-color: var(--darker);
            box-shadow: var(--box-shadow);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-light);
            height: 70px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo img {
            height: 32px;
            width: auto;
        }
        
        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
        }
        
        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            padding: 8px 12px;
            border-radius: var(--border-radius);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .back-button:hover {
            color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }
        
        .back-button i {
            font-size: 0.8rem;
        }
        
        /* Main Content */
        main {
            margin-top: 70px;
            padding: 40px 0;
            flex: 1;
        }
        
        .investment-panel {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Plan Header */
        .plan-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .plan-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }
        
        .plan-header .subtitle {
            color: var(--gray);
            font-size: 1rem;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--lighter);
            border-radius: var(--border-radius);
            padding: 20px;
            border: 1px solid var(--gray-light);
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }
        
        .stat-value .highlight {
            color: var(--primary);
        }
        
        .stat-value .gain {
            color: var(--success);
        }
        
        /* Miner Details */
        .miner-section {
            background: var(--lighter);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-light);
        }
        
        .miner-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .miner-section h2 i {
            color: var(--primary);
        }
        
        .miner-content {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        
        .miner-image {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .miner-specs {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .spec-label {
            color: var(--gray);
            font-size: 0.75rem;
        }
        
        .spec-value {
            font-weight: 600;
            color: var(--dark);
        }
        
        /* Balance Selection */
        .balance-section {
            background: var(--lighter);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--gray-light);
        }
        
        .balance-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .balance-section h2 i {
            color: var(--primary);
        }
        
        .balance-options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .balance-option {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        
        .balance-option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }
        
        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .balance-option-label {
            font-weight: 600;
            color: var(--dark);
        }
        
        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .balance-option-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        .balance-option-asset span {
            font-size: 0.7rem;
            color: var(--gray);
        }
        
        .balance-amount-fiat {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
            font-family: 'Manrope', sans-serif;
        }
        
        .balance-amount-asset {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .balance-amount-asset img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        
        /* Investment Form */
        .investment-form {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--border-radius);
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: var(--darker);
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            color: var(--dark);
            font-size: 1rem;
            transition: var(--transition);
            font-family: 'Manrope', sans-serif;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 216, 255, 0.2);
        }
        
        .form-control.error {
            border-color: var(--error);
        }
        
        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 5px;
            min-height: 20px;
        }
        
        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }
        
        .return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
            margin-bottom: 8px;
        }
        
        .return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--gray);
            font-size: 1rem;
        }
        
        .return-asset img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .btn {
            padding: 16px 20px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: var(--darker);
            box-shadow: 0 4px 15px rgba(0, 216, 255, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: var(--success-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 15px;
            min-height: 20px;
        }
        
        .status-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .status-loading i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .security-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 216, 255, 0.05);
            border-radius: var(--border-radius);
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .security-info i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        .mining-video {
            margin-top: 30px;
            border-radius: var(--border-radius);
            overflow: hidden;
            max-height: 200px;
        }
        
        .mining-video video {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .miner-content {
                flex-direction: column;
                text-align: center;
            }
            
            .miner-specs {
                width: 100%;
            }
            
            .balance-options {
                flex-direction: column;
            }
            
            .plan-header h1 {
                font-size: 1.8rem;
            }
            
            .stat-value {
                font-size: 1.2rem;
            }
            
            .return-fiat {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .plan-header h1 {
                font-size: 1.5rem;
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .miner-section,
            .balance-section {
                padding: 20px;
            }
            
            .balance-option-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>

                algorithm: "SHA-256",
                efficiency: "15.8 J/TH",
                releaseYear: "2025",
                image: "https://www.dropbox.com/scl/fi/lz60ouvvbr565du5afcwx/WhatsApp-Image-20l26-01-12-at-11.43.03-AM.jpeg?rlkey=dgnhcskve2p0gq6npr2igjidf&raw=1"
            }
        ];

        // =============================================
        // INITIALIZATION - Parse URL parameters
        // =============================================
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Parse plan details from URL
            currentInvestment.planId = urlParams.get('plan');
            currentInvestment.planName = urlParams.get('name');
            currentInvestment.minAmount = parseFloat(urlParams.get('min')) || 0;
            currentInvestment.maxAmount = parseFloat(urlParams.get('max')) || 0;
            currentInvestment.percentage = parseFloat(urlParams.get('percentage')) || 0;
            currentInvestment.duration = parseInt(urlParams.get('duration')) || 0;

            // Validate required parameters
            if (!currentInvestment.planId || !currentInvestment.planName) {
                showNotification('error', 'Invalid Request', 'Missing investment details. Redirecting...');
                setTimeout(() => {
                    window.location.href = 'index';
                }, 2000);
                return;
            }

            // Check authentication
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => {
                    window.location.href = 'login';
                }, 2000);
                return;
            }

            // Load all data
            loadUserData();
        }

        // =============================================
        // LOAD USER DATA
        // =============================================
        async function loadUserData() {
            try {
                const token = localStorage.getItem('jwtToken');
                
                // Load balances
                const balanceResponse = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (balanceResponse.ok) {
                    const balanceData = await balanceResponse.json();
                    userBalances.main = balanceData.data?.balances?.main || 0;
                    userBalances.matured = balanceData.data?.balances?.matured || 0;
                }

                // Load preferences
                await fetchUserPreferences();
                
                // Load BTC price for conversions
                await fetchBTCPrice();
                
                // Render the panel
                renderInvestmentPanel();
                
                // Hide loading overlay
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                }, 500);
                
            } catch (error) {
                console.error('Error loading user data:', error);
                showNotification('error', 'Connection Error', 'Failed to load your data');
            }
        }

        async function fetchUserPreferences() {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/users/preferences', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchBTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    currentBTCPrice = data.bitcoin.usd;
                    currentPrices['bitcoin'] = { usd: currentBTCPrice };
                }
            } catch (error) {
                console.error('Error fetching BTC price:', error);
            }
        }

        // =============================================
        // RENDER INVESTMENT PANEL
        // =============================================
        function renderInvestmentPanel() {
            const panel = document.getElementById('investment-panel');
            const planIndex = (parseInt(currentInvestment.planId) - 1) % miners.length;
            const miner = miners[planIndex];
            
            const minFormatted = currentInvestment.minAmount.toLocaleString('en-US');
            const maxFormatted = currentInvestment.maxAmount.toLocaleString('en-US');
            
            const asset = userPreferences.displayAsset;
            const assetData = topAssets.find(a => a.symbol === asset) || topAssets[0];
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            panel.innerHTML = `
                <div class="plan-header">
                    <h1>${currentInvestment.planName} Plan</h1>
                    <div class="subtitle">Complete your Bitcoin cloud mining investment</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Investment Range</div>
                        <div class="stat-value">$${minFormatted} - $${maxFormatted}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Mining Return</div>
                        <div class="stat-value"><span class="gain">+${currentInvestment.percentage}%</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Duration</div>
                        <div class="stat-value">${currentInvestment.duration} hours</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Company Fee</div>
                        <div class="stat-value">3% upon maturity</div>
                    </div>
                </div>
                
                <div class="miner-section">
                    <h2><i class="fas fa-microchip"></i> Assigned Miner</h2>
                    <div class="miner-content">
                        <div class="miner-image">
                            <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                        </div>
                        <div class="miner-specs">
                            <div class="spec-item">
                                <span class="spec-label">Model</span>
                                <span class="spec-value">${miner.name}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Hash Rate</span>
                                <span class="spec-value">${miner.hashRate}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Power</span>
                                <span class="spec-value">${miner.powerConsumption}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Algorithm</span>
                                <span class="spec-value">${miner.algorithm}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Efficiency</span>
                                <span class="spec-value">${miner.efficiency}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Release</span>
                                <span class="spec-value">${miner.releaseYear}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="balance-section">
                    <h2><i class="fas fa-wallet"></i> Select Balance</h2>
                    <div class="balance-options">
                        <div class="balance-option ${userBalances.main >= currentInvestment.minAmount ? '' : 'disabled'}" 
                             onclick="selectBalance('main', ${userBalances.main})">
                            <div class="balance-option-header">
                                <span class="balance-option-label">Main Balance</span>
                                <div class="balance-option-asset">
                                    <img src="${assetLogo}">
                                    <span>${asset.toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="balance-amount-fiat">$${formatFiat(userBalances.main)}</div>
                            <div class="balance-amount-asset">
                                <img src="${assetLogo}">
                                <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                            </div>
                        </div>
                        
                        <div class="balance-option ${userBalances.matured >= currentInvestment.minAmount ? '' : 'disabled'}" 
                             onclick="selectBalance('matured', ${userBalances.matured})">
                            <div class="balance-option-header">
                                <span class="balance-option-label">Matured Balance</span>
                                <div class="balance-option-asset">
                                    <img src="${assetLogo}">
                                    <span>${asset.toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="balance-amount-fiat">$${formatFiat(userBalances.matured)}</div>
                            <div class="balance-amount-asset">
                                <img src="${assetLogo}">
                                <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="investment-form">
                        <div class="form-group">
                            <label>Investment Amount (USD)</label>
                            <input type="number" class="form-control" id="investment-amount" 
                                   placeholder="Enter amount" min="${currentInvestment.minAmount}" 
                                   max="${Math.min(currentInvestment.maxAmount, Math.max(userBalances.main, userBalances.matured))}"
                                   step="10" oninput="validateAmount(this.value)">
                            <div class="error-message" id="amount-error"></div>
                        </div>
                        
                        <div class="expected-return" id="expected-return">
                            <div class="return-fiat" id="return-fiat">$0.00</div>
                            <div class="return-asset" id="return-asset">
                                <img src="${assetLogo}">
                                <span>0.000000 ${asset.toUpperCase()}</span>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary" id="invest-button" onclick="processInvestment()" disabled>
                            <i class="fas fa-cloud"></i>
                            Start Cloud Mining
                        </button>
                        
                        <div class="investment-status" id="investment-status"></div>
                    </div>
                </div>
                
                <div class="security-info">
                    <i class="fas fa-shield-alt"></i>
                    <span>Your investment is secured with 256-bit AES encryption. Funds are held in multi-signature wallets.</span>
                </div>
                
                <div class="mining-video">
                    <video autoplay loop muted playsinline>
                        <source src="https://media.bithashcapital.live/plans/banners/Cryptocurrency%20Bitcoins%20mining%20in%204K%20UHD%20flat%20animation%20(1).mp4" type="video/mp4">
                    </video>
                </div>
            `;
            
            // Auto-select balance if only one is eligible
            if (userBalances.main >= currentInvestment.minAmount && userBalances.matured < currentInvestment.minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= currentInvestment.minAmount && userBalances.main < currentInvestment.minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        // =============================================
        // BALANCE SELECTION
        // =============================================
        function selectBalance(type, amount) {
            const options = document.querySelectorAll('.balance-option');
            options.forEach(opt => opt.classList.remove('selected'));
            
            const selectedOption = Array.from(options).find(opt => 
                opt.innerHTML.includes(type === 'main' ? 'Main Balance' : 'Matured Balance')
            );
            
            if (selectedOption && !selectedOption.classList.contains('disabled')) {
                selectedOption.classList.add('selected');
                currentInvestment.selectedBalance = type;
                currentInvestment.selectedBalanceAmount = amount;
                
                const input = document.getElementById('investment-amount');
                if (input) {
                    input.value = currentInvestment.minAmount;
                    input.max = Math.min(currentInvestment.maxAmount, amount);
                    validateAmount(input.value);
                }
            }
        }

        // =============================================
        // AMOUNT VALIDATION
        // =============================================
        function validateAmount(value) {
            const amount = parseFloat(value) || 0;
            const errorElement = document.getElementById('amount-error');
            const investButton = document.getElementById('invest-button');
            
            errorElement.textContent = '';
            
            if (!currentInvestment.selectedBalance) {
                errorElement.textContent = 'Please select a balance first';
                investButton.disabled = true;
                return false;
            }
            
            if (amount < currentInvestment.minAmount) {
                errorElement.textContent = `Minimum investment is $${formatFiat(currentInvestment.minAmount)}`;
                investButton.disabled = true;
                return false;
            }
            
            if (amount > currentInvestment.maxAmount) {
                errorElement.textContent = `Maximum investment is $${formatFiat(currentInvestment.maxAmount)}`;
                investButton.disabled = true;
                return false;
            }
            
            if (amount > currentInvestment.selectedBalanceAmount) {
                const balanceType = currentInvestment.selectedBalance === 'main' ? 'Main' : 'Matured';
                errorElement.textContent = `Insufficient ${balanceType} balance. Available: $${formatFiat(currentInvestment.selectedBalanceAmount)}`;
                investButton.disabled = true;
                return false;
            }
            
            investButton.disabled = false;
            updateExpectedReturn(amount);
            return true;
        }

        // =============================================
        // EXPECTED RETURN CALCULATION
        // =============================================
        function updateExpectedReturn(amount) {
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * currentInvestment.percentage / 100);
            
            document.getElementById('return-fiat').textContent = formatUSD(totalReturn);
            
            const asset = userPreferences.displayAsset;
            const assetData = topAssets.find(a => a.symbol === asset) || topAssets[0];
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[assetData.id]?.usd || currentBTCPrice;
            
            if (price > 0) {
                const assetAmount = totalReturn / price;
                document.getElementById('return-asset').innerHTML = `
                    <img src="${assetLogo}">
                    <span>${formatNumber(assetAmount)} ${asset.toUpperCase()}</span>
                `;
            }
        }

        // =============================================
        // PROCESS INVESTMENT - EXACT SAME ENDPOINT AS MODAL
        // =============================================
        async function processInvestment() {
            const amount = parseFloat(document.getElementById('investment-amount').value);
            const investButton = document.getElementById('invest-button');
            const statusElement = document.getElementById('investment-status');
            
            if (currentInvestment.isProcessing) return;
            
            if (!validateAmount(amount)) return;
            
            currentInvestment.isProcessing = true;
            investButton.disabled = true;
            
            statusElement.innerHTML = '<div class="status-loading"><i class="fas fa-spinner"></i> Processing your investment...</div>';
            
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: currentInvestment.planId,
                        amount: amount,
                        balanceType: currentInvestment.selectedBalance
                    })
                });
                
                const responseData = await response.json();
                
                if (response.ok) {
                    // Success - Green notification
                    showNotification('success', 'Investment Successful', 
                        `Your cloud mining investment of $${formatFiat(amount)} has been created.`);
                    
                    statusElement.innerHTML = '<span style="color: var(--success);">✓ Investment successful! Redirecting...</span>';
                    
                    // Redirect to index after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index';
                    }, 2000);
                    
                } else {
                    // Error - Red notification
                    throw new Error(responseData.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                
                showNotification('error', 'Investment Failed', error.message);
                
                statusElement.innerHTML = `<span style="color: var(--error);">✗ ${error.message}</span>`;
                
                investButton.disabled = false;
                currentInvestment.isProcessing = false;
            }
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        function getAssetLogo(symbol) {
            const assetMap = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
                bnb: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
                sol: 'https://assets.coingecko.com/coins/images/4128/large/solana.png',
                usdc: 'https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png',
                xrp: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png',
                doge: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png'
            };
            return assetMap[symbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        }

        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return num.toFixed(6);
        }

        function formatFiat(num) {
            return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatUSD(num) {
            return '$' + formatFiat(num);
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        let notificationQueue = [];
        let isShowingNotification = false;

        function showNotification(type, title, message) {
            notificationQueue.push({ type, title, message });
            if (!isShowingNotification) {
                processNotificationQueue();
            }
        }

        function processNotificationQueue() {
            if (notificationQueue.length === 0) {
                isShowingNotification = false;
                return;
            }
            
            isShowingNotification = true;
            const { type, title, message } = notificationQueue.shift();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">&times;</div>
            `;
            
            document.getElementById('notification-center').appendChild(notification);
            
            requestAnimationFrame(() => {
                notification.classList.add('show');
            });
            
            notification.querySelector('.notification-close').addEventListener('click', () => {
                closeNotification(notification);
            });
            
            setTimeout(() => {
                closeNotification(notification);
            }, 5000);
        }

        function closeNotification(notification) {
            notification.classList.remove('show');
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
                processNotificationQueue();
            }, 400);
        }

        // =============================================
        // AUTO-PLAY VIDEOS
        // =============================================
        function initVideos() {
            const videos = document.querySelectorAll('video');
            videos.forEach(video => {
                video.setAttribute('autoplay', '');
                video.setAttribute('loop', '');
                video.setAttribute('muted', '');
                video.setAttribute('playsinline', '');
                
                video.addEventListener('contextmenu', (e) => e.preventDefault());
                
                const playVideo = () => {
                    video.play().catch(() => {});
                };
                
                playVideo();
            });
        }

        // =============================================
        // START
        // =============================================
        window.addEventListener('load', init);
        window.addEventListener('load', initVideos);
    </script>
</body>
</html>
