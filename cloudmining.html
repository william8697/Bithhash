<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | institutional cloud mining · enterprise</title>
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    <!-- Google Fonts · enterprise stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET & GLOBAL ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #03050a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #132b36 0%, #03050a 70%);
        }

        /* ========== DESIGN TOKENS – ENTERPRISE NEUTRAL ========== */
        :root {
            --bg-deep: #03050a;
            --bg-elevated: #0e141b;
            --bg-card: rgba(18, 26, 36, 0.75);
            --bg-card-solid: #121e2a;
            --border-subtle: rgba(66, 180, 205, 0.18);
            --border-active: rgba(0, 230, 255, 0.4);
            --primary-glow: #00e5ff;
            --primary-dim: #009dbb;
            --text-main: #ffffff;
            --text-muted: #93a7b9;
            --text-soft: #cbd5e1;
            --accent-emerald: #2bd4bd;
            --accent-amber: #f5b042;
            --error: #ff5f6d;
            --success: #2bd4a5;
            --grad-card: linear-gradient(145deg, rgba(22, 36, 48, 0.8) 0%, rgba(10, 20, 30, 0.95) 100%);
            --glass-border: 1px solid rgba(0, 255, 255, 0.08);
            --shadow-heavy: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 230, 255, 0.1) inset;
            --shadow-lift: 0 20px 35px -10px #00000080, 0 0 0 1px #00e5ff1a inset;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition: all 0.25s cubic-bezier(0.3, 0, 0.2, 1);
        }

        /* ========== TYPOGRAPHY SCALE ========== */
        h1, h2, h3, .heading-xl {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* ========== HEADER – minimal, sleek ========== */
        .enterprise-header {
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            background: rgba(3, 5, 10, 0.6);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #0b1a24;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #00e5ff40;
        }
        .logo-icon img {
            width: 28px;
            height: 28px;
            opacity: 0.95;
        }
        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(130deg, #ffffff, #b0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
        }
        .nav-links a {
            color: var(--text-soft);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            letter-spacing: 0.3px;
        }
        .nav-links a:hover { color: #fff; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .user-balance {
            background: rgba(0, 229, 255, 0.04);
            border-radius: 40px;
            padding: 0.5rem 1.25rem 0.5rem 1rem;
            border: 1px solid #00e5ff1a;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .balance-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .balance-chip i {
            color: #00e5ff;
            font-size: 0.9rem;
        }
        .balance-chip span {
            font-weight: 600;
            color: white;
        }
        .auth-buttons {
            display: flex;
            gap: 0.75rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2f4b5e;
            color: #e1f0fa;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
        }
        .btn-outline:hover {
            border-color: #00e5ff;
            color: white;
            background: rgba(0, 229, 255, 0.05);
        }
        .btn-primary {
            background: #00e5ff;
            color: #03050a;
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px #00e5ff30;
        }
        .btn-primary:hover {
            background: #7ff0ff;
            transform: scale(1.02);
        }
        .btn-back {
            background: #1a2a33;
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-back:hover { background: #253b48; }

        /* ========== MAIN CONTAINER – smooth monolithic block ========== */
        .main-container {
            max-width: 1440px;
            margin: 2rem auto 4rem;
            padding: 0 2rem;
        }

        /* ========== PLAN HERO – no visual split ========== */
        .plan-context {
            margin-bottom: 3rem;
        }
        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #13202b;
            border-radius: 40px;
            padding: 0.4rem 1.2rem 0.4rem 0.8rem;
            border: 1px solid #00e5ff26;
            margin-bottom: 1.5rem;
        }
        .plan-badge i {
            color: #00e5ff;
            font-size: 1rem;
        }
        .plan-badge span {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #b0e0ff;
        }
        .plan-title {
            font-size: 3.4rem;
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(140deg, #fff, #b4f0ff, #8ce0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .plan-subtitle {
            font-size: 1.2rem;
            color: #869eaf;
            max-width: 650px;
        }

        /* ========== UNIQUE LAYOUT: left canvas + right terminal ========== */
        .enterprise-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        /* left side — miner intelligence */
        .miner-specs-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-xl);
            border: var(--glass-border);
            box-shadow: var(--shadow-heavy);
            padding: 2rem;
            transition: var(--transition);
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6e8a9c;
            margin-bottom: 2rem;
        }
        .section-label i {
            color: #00e5ff;
            font-size: 1.1rem;
        }

        .hardware-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem 1.5rem;
        }
        .hardware-item {
            background: #101a24;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid #253946;
            transition: 0.2s;
        }
        .hardware-item:hover {
            border-color: #00e5ff40;
            background: #0f1d2b;
        }
        .hardware-label {
            color: #688396;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-bottom: 0.5rem;
        }
        .hardware-value {
            font-size: 1.7rem;
            font-weight: 600;
            font-family: 'Space Grotesk', monospace;
            line-height: 1.2;
        }
        .hardware-value small {
            font-size: 0.9rem;
            color: #7d99ab;
            font-weight: 400;
        }
        .hardware-detail {
            display: flex;
            justify-content: space-between;
            margin-top: 0.75rem;
            color: #b0c7d7;
            font-size: 0.9rem;
        }

        .miner-profile {
            margin-top: 2.5rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            background: #0b131e;
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            border: 1px solid #1e3240;
        }
        .miner-avatar {
            width: 100px;
            height: 100px;
            border-radius: 18px;
            background: #12212e;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a4b60;
        }
        .miner-avatar img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px #00e5ff60);
        }
        .miner-meta p {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0.5rem 0;
            color: #acc4d4;
        }
        .miner-meta i {
            width: 20px;
            color: #00e5ff;
        }

        /* right side — investment terminal (enterprise dark) */
        .investment-terminal {
            background: #0d131c;
            border-radius: var(--radius-xl);
            border: 1px solid #1e3343;
            box-shadow: 0 30px 60px -20px #000000, 0 0 0 1px #00e5ff12 inset;
            padding: 2.2rem 2rem;
            position: sticky;
            top: 100px;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed #2c4457;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
        }
        .terminal-header i {
            font-size: 1.6rem;
            color: #00e5ff;
        }
        .terminal-header h3 {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .balance-source {
            background: #0a121c;
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1.8rem;
        }
        .source-title {
            color: #819eb1;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
            display: flex;
            gap: 8px;
        }
        .source-options {
            display: flex;
            gap: 12px;
        }
        .source-card {
            flex: 1;
            background: #101e2b;
            border: 1px solid #253f50;
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .source-card.selected {
            border-color: #00e5ff;
            background: #0f2635;
            box-shadow: 0 0 0 2px #00e5ff20;
        }
        .source-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .source-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }
        .source-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #a3c2d6;
        }
        .source-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        .source-amount {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 8px 0 4px;
        }
        .source-fiat {
            font-size: 0.8rem;
            color: #7496ab;
        }

        .input-block {
            margin-bottom: 1.5rem;
        }
        .input-block label {
            display: block;
            font-size: 0.85rem;
            color: #9bb6c9;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }
        .input-field {
            width: 100%;
            background: #0c1b26;
            border: 1px solid #284256;
            border-radius: 18px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            color: white;
            font-weight: 500;
            transition: var(--transition);
        }
        .input-field:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px #00e5ff20;
        }
        .input-field:disabled {
            opacity: 0.6;
        }
        .amount-error {
            color: #ff5f6d;
            font-size: 0.8rem;
            margin-top: 0.4rem;
            min-height: 1.2rem;
        }

        /* return forecast */
        .return-forecast {
            background: linear-gradient(145deg, #0b1b29, #041016);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #00e5ff1f;
            margin: 2rem 0;
            text-align: center;
        }
        .forecast-label {
            color: #94b7cd;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .forecast-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #2bd4bd;
            line-height: 1.2;
        }
        .forecast-btc {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 1rem;
            color: #b0d5ec;
        }
        .forecast-btc img {
            width: 22px;
            border-radius: 50%;
        }

        .invest-action {
            width: 100%;
            background: linear-gradient(95deg, #00e5ff, #0095b7);
            border: none;
            border-radius: 40px;
            padding: 1.2rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: #03050a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 30px #00b8d480;
        }
        .invest-action:hover:not(:disabled) {
            background: #88f0ff;
            transform: translateY(-3px);
        }
        .invest-action:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .invest-status {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
            color: #00e5ff;
        }

        /* chart – clean integration */
        .chart-embed {
            margin-top: 3rem;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            border: var(--glass-border);
            padding: 1.8rem;
        }
        .tradingview-container {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            background: #0b141e;
            border: 1px solid #1c3445;
        }

        /* loading / notification (reuse old classes but with new design) */
        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #03050a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
        }
        .loading-overlay.hidden { opacity:0; pointer-events:none; }
        .loading-logo { width:70px; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.6; } }

        .notification-center {
            position: fixed; top:20px; right:20px; z-index:10000;
            display: flex; flex-direction: column; gap:10px;
            max-width: 360px;
        }
        .notification {
            background: #14222e;
            border-left: 4px solid #00e5ff;
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(12px);
            color: white;
            box-shadow: 0 20px 35px -10px black;
            transform: translateX(120%);
            transition: 0.3s;
        }
        .notification.show { transform: translateX(0); }

        @media (max-width: 1100px) {
            .enterprise-grid { grid-template-columns: 1fr; }
            .investment-terminal { position: static; }
        }
        @media (max-width: 700px) {
            .hardware-grid { grid-template-columns: 1fr; }
            .miner-profile { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <!-- loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div style="color:#819eb1; margin-top:1rem;">loading institutional data …</div>
    </div>
    <div class="notification-center" id="notificationCenter"></div>

    <!-- header slim -->
    <header class="enterprise-header">
        <div class="header-left">
            <div class="logo-group" onclick="window.location.href='index.html'" style="cursor:pointer;">
                <div class="logo-icon"><img src="https://media.bithashcapital.live/circular_dark_background%20(1).png"></div>
                <span class="logo-text">BitHash</span>
            </div>
            <nav class="nav-links">
                <a href="index.html#plans">infrastructure</a>
                <a href="index.html#how-it-works">technology</a>
                <a href="dashboard">dashboard</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="user-balance" id="userInfo"></div>
            <button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> back</button>
        </div>
    </header>

    <!-- main monolithic block -->
    <main class="main-container" id="mainContent"></main>

    <script>
        // ---------- ENTERPRISE STATE ----------
        const AppState = {
            sessionKey: null,
            planDetails: null,
            userBalances: { main: 0, matured: 0 },
            selectedBalance: 'main',
            selectedBalanceAmount: 0,
            currentBTCPrice: 44250, // realistic
            userPreferences: { displayAsset: 'btc' },
            investmentInProgress: false,
            planIndex: 0
        };

        const topAssets = [{ id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' }];

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            AppState.sessionKey = urlParams.get('session');
            const planId = urlParams.get('plan'), planName = urlParams.get('name'),
                  minAmount = urlParams.get('min'), maxAmount = urlParams.get('max'),
                  percentage = urlParams.get('percentage'), duration = urlParams.get('duration');
            if (!AppState.sessionKey && !planId) {
                showNotification('error', 'session required', 'redirecting...');
                setTimeout(() => window.location.href = 'index.html', 1500); return;
            }
            if (planId && minAmount && maxAmount && percentage && duration) {
                AppState.planDetails = {
                    id: planId, name: planName || 'Professional',
                    minAmount: parseFloat(minAmount), maxAmount: parseFloat(maxAmount),
                    percentage: parseFloat(percentage), duration: parseFloat(duration)
                };
                if (AppState.planDetails.minAmount >= 50000) AppState.planIndex = 5;
                else if (AppState.planDetails.minAmount >= 10000) AppState.planIndex = 4;
                else if (AppState.planDetails.minAmount >= 5000) AppState.planIndex = 3;
                else if (AppState.planDetails.minAmount >= 1000) AppState.planIndex = 2;
                else if (AppState.planDetails.minAmount >= 500) AppState.planIndex = 1;
                else AppState.planIndex = 0;
            }
            await initializePage();
        });

        async function initializePage() {
            try {
                const token = localStorage.getItem('jwtToken');
                if (token) await fetchUserBalances(); else updateAuthUI();
                if (!AppState.planDetails) await loadPlanDetailsFromSession();
                await fetchBTCPrice();
                renderEnterprisePlan();
                setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 400);
            } catch (e) {
                console.error(e); showNotification('error','failed to load','please refresh');
            }
        }

        async function loadPlanDetailsFromSession() {
            const token = localStorage.getItem('jwtToken');
            const headers = token ? { Authorization: `Bearer ${token}` } : {};
            const resp = await fetch('https://bithash-backend.onrender.com/api/plans', { headers });
            const data = await resp.json();
            const plans = data.data?.plans || [];
            const planId = AppState.sessionKey.split('_')[0];
            const plan = plans.find(p => p.id === planId);
            if (!plan) throw new Error('plan missing');
            AppState.planDetails = plan;
            if (plan.minAmount >= 50000) AppState.planIndex = 5;
            else if (plan.minAmount >= 10000) AppState.planIndex = 4;
            else if (plan.minAmount >= 5000) AppState.planIndex = 3;
            else if (plan.minAmount >= 1000) AppState.planIndex = 2;
            else if (plan.minAmount >= 500) AppState.planIndex = 1;
            else AppState.planIndex = 0;
        }

        async function fetchBTCPrice() {
            try {
                const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (r.ok) { const d = await r.json(); AppState.currentBTCPrice = d.bitcoin.usd; }
            } catch { }
        }

        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            const r = await fetch('https://bithash-backend.onrender.com/api/users/balances', { headers: { Authorization: `Bearer ${token}` } });
            if (r.ok) { const d = await r.json(); AppState.userBalances.main = d.data?.balances?.main || 0; AppState.userBalances.matured = d.data?.balances?.matured || 0; updateUserInfo(); }
        }

        function updateAuthUI() {
            document.getElementById('userInfo').innerHTML = `<div class="auth-buttons"><button class="btn-outline" onclick="window.location.href='login'">login</button><button class="btn-primary" onclick="window.location.href='signup'">sign up</button></div>`;
        }
        function updateUserInfo() {
            document.getElementById('userInfo').innerHTML = `
                <div class="balance-chip"><i class="fas fa-wallet"></i><span>$${AppState.userBalances.main.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>
                <div class="balance-chip"><i class="fas fa-clock"></i><span>$${AppState.userBalances.matured.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>
            `;
        }

        // ---------- RENDER ENTERPRISE LAYOUT ----------
        function renderEnterprisePlan() {
            const plan = AppState.planDetails;
            if (!plan) return;
            const planNames = ["Foundation", "Edge", "Core", "Summit", "Flagship", "Institutional"];
            const displayName = plan.name || planNames[AppState.planIndex] || "Enterprise";

            // realistic miner data with facility fee reference
            const miners = [
                { name: "Avalon A12", hash: "78 TH/s", power: "2950W", eff: "37.8 J/TH", chip: "7nm", cooling: "air", manuf: "Canaan", year: "2024", img: "https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg" },
                { name: "MicroBT M60", hash: "118 TH/s", power: "3300W", eff: "28.0 J/TH", chip: "6nm", cooling: "air", manuf: "MicroBT", year: "2024", img: "https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg" },
                { name: "Canaan Avalon Q", hash: "155 TH/s", power: "3500W", eff: "22.6 J/TH", chip: "5nm", cooling: "immersion", manuf: "Canaan", year: "2025", img: "https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg" },
                { name: "Bitmain S21 Pro", hash: "234 TH/s", power: "5440W", eff: "23.2 J/TH", chip: "5nm", cooling: "air", manuf: "Bitmain", year: "2024", img: "https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg" },
                { name: "Bitmain S21 XP", hash: "270 TH/s", power: "5550W", eff: "20.5 J/TH", chip: "4nm", cooling: "advanced", manuf: "Bitmain", year: "2024", img: "https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg" },
                { name: "Bitmain S23 Hydro", hash: "345 TH/s", power: "5420W", eff: "15.7 J/TH", chip: "3nm", cooling: "hydro", manuf: "Bitmain", year: "2025", img: "https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.03%20AM%20(1).jpeg" }
            ];
            const miner = miners[AppState.planIndex] || miners[0];

            const dailyEst = (plan.minAmount * plan.percentage / 100 / (plan.duration / 24)).toFixed(8);
            const facilityFeePercent = 3; // facility fee (ex-maintenance)
            const netMultiplier = 1 + (plan.percentage/100) - (facilityFeePercent/100);
            const exampleReturn = plan.minAmount * netMultiplier;

            document.getElementById('mainContent').innerHTML = `
                <div class="plan-context">
                    <div class="plan-badge"><i class="fas fa-microchip"></i><span>● ACTIVE NODE · ${displayName} CONTRACT</span></div>
                    <h1 class="plan-title">${displayName} <span style="color:#b0f0ff;">mining</span></h1>
                    <p class="plan-subtitle">Dedicated SHA-256 hashrate · ${miner.name} · facility fee 3%</p>
                </div>
                <div class="enterprise-grid">
                    <!-- left: miner intelligence -->
                    <div class="miner-specs-panel">
                        <div class="section-label"><i class="fas fa-cube"></i> HARDWARE PROFILE</div>
                        <div class="hardware-grid">
                            <div class="hardware-item"><div class="hardware-label">hashrate (nominal)</div><div class="hardware-value">${miner.hash}</div><div class="hardware-detail"><span>SHA‑256</span><span>●</span></div></div>
                            <div class="hardware-item"><div class="hardware-label">power draw</div><div class="hardware-value">${miner.power}</div><div class="hardware-detail"><span>efficiency ${miner.eff}</span></div></div>
                            <div class="hardware-item"><div class="hardware-label">chip / node</div><div class="hardware-value">${miner.chip}</div><div class="hardware-detail"><span>${miner.manuf}</span></div></div>
                            <div class="hardware-item"><div class="hardware-label">cooling</div><div class="hardware-value">${miner.cooling}</div><div class="hardware-detail"><span>immersion ready</span></div></div>
                        </div>
                        <div class="miner-profile">
                            <div class="miner-avatar"><img src="${miner.img}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'"></div>
                            <div class="miner-meta">
                                <p><i class="fas fa-tag"></i> ${miner.name} (${miner.year})</p>
                                <p><i class="fas fa-chart-line"></i> est. daily output: ${dailyEst} BTC / $${(dailyEst * AppState.currentBTCPrice).toFixed(0)}</p>
                                <p><i class="fas fa-bolt"></i> facility fee: 3% deducted at maturity</p>
                            </div>
                        </div>
                    </div>

                    <!-- right: investment terminal -->
                    <div class="investment-terminal">
                        <div class="terminal-header"><i class="fas fa-terminal"></i><h3>allocate hashrate</h3></div>
                        ${renderBalanceSelector()}
                        <div class="input-block">
                            <label><i class="far fa-credit-card" style="margin-right:6px;"></i>investment amount (USD)</label>
                            <input type="number" class="input-field" id="investmentAmount" min="${plan.minAmount}" max="${Math.min(plan.maxAmount, AppState.selectedBalanceAmount)}" step="10" value="${plan.minAmount}" ${!localStorage.getItem('jwtToken') ? 'disabled' : ''}>
                            <div class="amount-error" id="amountError"></div>
                        </div>

                        <div class="return-forecast" id="expectedReturn">
                            <div class="forecast-label">projected return · after facility fee</div>
                            <div class="forecast-number" id="returnFiat">$${exampleReturn.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
                            <div class="forecast-btc" id="returnAsset"><img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png"><span id="returnAssetText">${(exampleReturn/AppState.currentBTCPrice).toFixed(6)} BTC</span></div>
                        </div>

                        <button class="invest-action" id="investButton" ${!localStorage.getItem('jwtToken') ? 'disabled' : ''} onclick="handleInvestment()"><i class="fas fa-cloud-upload-alt"></i> start contract</button>
                        <div class="invest-status" id="investmentStatus"></div>
                    </div>
                </div>

                <!-- chart -->
                <div class="chart-embed">
                    <div class="section-label"><i class="fas fa-chart-area"></i> BTC/USDT · market stream</div>
                    <div class="tradingview-container" id="tradingviewChart"></div>
                </div>
            `;

            initializeTradingView();
            setupListeners();
            if (localStorage.getItem('jwtToken')) autoSelectBalance();
        }

        function renderBalanceSelector() {
            if (!localStorage.getItem('jwtToken')) return `<div style="padding:1rem;background:#0c1b26;border-radius:20px;margin-bottom:1.5rem;text-align:center;color:#7d99ab;"><i class="fas fa-lock"></i> sign in to allocate funds</div>`;
            const main = AppState.userBalances.main, mat = AppState.userBalances.matured, min = AppState.planDetails.minAmount, price = AppState.currentBTCPrice;
            const mainBTC = price>0? main/price:0, matBTC = price>0? mat/price:0;
            return `
                <div class="balance-source">
                    <div class="source-title"><i class="fas fa-layer-group"></i> SELECT BALANCE TIER</div>
                    <div class="source-options">
                        <div class="source-card ${main>=min?'':'disabled'}" id="balanceMain" onclick="selectBalance('main', ${main})">
                            <div class="source-label">main<span class="source-asset"><img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png"> BTC</span></div>
                            <div class="source-amount">$${main.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
                            <div class="source-fiat">≈ ${mainBTC.toFixed(5)} BTC</div>
                        </div>
                        <div class="source-card ${mat>=min?'':'disabled'}" id="balanceMatured" onclick="selectBalance('matured', ${mat})">
                            <div class="source-label">matured<span class="source-asset"><img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png"> BTC</span></div>
                            <div class="source-amount">$${mat.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
                            <div class="source-fiat">≈ ${matBTC.toFixed(5)} BTC</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectBalance(type, amount) {
            document.getElementById('balanceMain')?.classList.remove('selected');
            document.getElementById('balanceMatured')?.classList.remove('selected');
            const el = document.getElementById(type==='main'?'balanceMain':'balanceMatured');
            if (el && !el.classList.contains('disabled')) {
                el.classList.add('selected');
                AppState.selectedBalance = type; AppState.selectedBalanceAmount = amount;
                const inp = document.getElementById('investmentAmount');
                if (inp) {
                    inp.max = Math.min(AppState.planDetails.maxAmount, amount);
                    validateAmount(parseFloat(inp.value)||0); updateReturn(parseFloat(inp.value)||0);
                }
            }
        }

        function autoSelectBalance() {
            if (AppState.userBalances.main >= AppState.planDetails.minAmount) selectBalance('main', AppState.userBalances.main);
            else if (AppState.userBalances.matured >= AppState.planDetails.minAmount) selectBalance('matured', AppState.userBalances.matured);
        }

        function setupListeners() {
            const inp = document.getElementById('investmentAmount');
            inp?.addEventListener('input', function(e) {
                const amt = parseFloat(e.target.value)||0;
                validateAmount(amt); updateReturn(amt);
            });
            setTimeout(() => { const v = parseFloat(inp?.value)||0; validateAmount(v); }, 100);
        }

        function validateAmount(amt) {
            const err = document.getElementById('amountError'), btn = document.getElementById('investButton'), plan = AppState.planDetails;
            err.textContent = '';
            if (isNaN(amt) || amt <=0) { err.textContent = 'invalid amount'; btn.disabled = true; return false; }
            if (amt < plan.minAmount) { err.textContent = `minimum $${plan.minAmount.toLocaleString()}`; btn.disabled = true; return false; }
            if (amt > plan.maxAmount) { err.textContent = `maximum $${plan.maxAmount.toLocaleString()}`; btn.disabled = true; return false; }
            if (amt > AppState.selectedBalanceAmount) { err.textContent = `balance insufficient ($${AppState.selectedBalanceAmount.toLocaleString()})`; btn.disabled = true; return false; }
            btn.disabled = false; return true;
        }

        function updateReturn(amt) {
            const plan = AppState.planDetails, fee = amt * 0.03, net = amt - fee, total = net + net * plan.percentage/100;
            document.getElementById('returnFiat').textContent = '$'+total.toLocaleString(undefined,{minimumFractionDigits:2});
            const btc = total / AppState.currentBTCPrice;
            document.getElementById('returnAssetText').textContent = btc.toFixed(6) + ' BTC';
        }

        async function handleInvestment() {
            if (AppState.investmentInProgress) return showNotification('warn','in progress','please wait');
            const token = localStorage.getItem('jwtToken');
            if (!token) { showNotification('error','auth required','login first'); return; }
            const amt = parseFloat(document.getElementById('investmentAmount').value);
            if (!validateAmount(amt)) return;
            AppState.investmentInProgress = true;
            const btn = document.getElementById('investButton'), status = document.getElementById('investmentStatus');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> submitting'; status.textContent = 'allocating hashrate ...';
            try {
                const res = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST', headers: { 'Content-Type':'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify({ planId: AppState.planDetails.id, amount: amt, balanceType: AppState.selectedBalance })
                });
                const data = await res.json();
                if (res.ok) {
                    status.textContent = '✔ contract active – redirecting'; status.style.color = '#2bd4a5';
                    showNotification('success','deployment started', `$${amt.toLocaleString()} allocated`);
                    setTimeout(()=> window.location.href='index.html', 2000);
                } else throw new Error(data.message || 'failed');
            } catch (e) {
                status.textContent = e.message; status.style.color = '#ff5f6d';
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> start contract';
                showNotification('error','investment error', e.message);
            } finally { AppState.investmentInProgress = false; }
        }

        function initializeTradingView() {
            if (typeof TradingView !== 'undefined') new TradingView.widget({ container_id:'tradingviewChart', symbol:'BINANCE:BTCUSDT', interval:'60', theme:'dark', style:'1', locale:'en', height:300, width:'100%', hide_side_toolbar:false, studies:[] });
            else { const s = document.createElement('script'); s.src = 'https://s3.tradingview.com/tv.js'; s.async = true; s.onload = initializeTradingView; document.head.appendChild(s); }
        }

        function showNotification(type, title, msg) {
            const nc = document.getElementById('notificationCenter');
            const n = document.createElement('div'); n.className = 'notification show';
            n.innerHTML = `<div style="display:flex;gap:12px;"><i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}" style="color:#00e5ff;"></i><div><div style="font-weight:600;">${title}</div><div style="font-size:0.85rem;">${msg}</div></div></div>`;
            nc.appendChild(n); setTimeout(()=> { n.remove(); }, 5000);
        }

        window.selectBalance = selectBalance; window.handleInvestment = handleInvestment;
    </script>
</body>
</html>
