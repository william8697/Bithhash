<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Investment Panel - BitHash Cloud Mining</title>
    
    <!-- Google Fonts - Optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== THEME COLORS FROM INDEX.HTML ===== */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #996515;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --border-radius: 8px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== SMOOTH, BORDERLESS INVESTMENT PANEL ===== */
        .investment-panel {
            width: 100%;
            max-width: 460px;
            background: transparent;
            padding: 30px 25px;
            animation: fadeSlideUp 0.4s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header with plan identity — clean, no borders */
        .plan-identity {
            text-align: center;
            margin-bottom: 40px;
        }

        .miner-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 216, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .miner-icon i {
            font-size: 32px;
            color: var(--primary);
        }

        .plan-name {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .miner-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--gray);
        }

        .miner-tag i {
            color: var(--primary);
            font-size: 0.8rem;
        }

        /* ===== TERMS ROW - SMOOTH FLEX LAYOUT ===== */
        .terms-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .term-item {
            text-align: center;
        }

        .term-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .term-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
        }

        .term-value small {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--gray);
            margin-left: 2px;
        }

        .return-value {
            color: var(--success);
        }

        /* ===== BALANCE DISPLAY — CRISP ===== */
        .balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 16px 20px;
            margin-bottom: 25px;
            border-radius: 100px;
            font-size: 0.95rem;
        }

        .balance-label {
            color: var(--gray);
            font-weight: 500;
        }

        .balance-amount {
            font-weight: 700;
            color: var(--dark);
        }

        .balance-amount i {
            color: var(--primary);
            margin-right: 6px;
            font-size: 0.85rem;
        }

        /* ===== AMOUNT INPUT — NO BORDERS, JUST UNDERLINE ===== */
        .input-group {
            margin-bottom: 35px;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .input-label i {
            color: var(--primary);
        }

        .amount-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gray-light);
            padding: 12px 0;
            font-size: 2rem;
            font-weight: 600;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
            outline: none;
            transition: var(--transition);
            text-align: center;
        }

        .amount-input:focus {
            border-bottom-color: var(--primary);
        }

        .amount-input::placeholder {
            color: var(--gray-lighter);
            font-weight: 400;
            font-size: 1.2rem;
        }

        .range-hint {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--gray);
            padding: 0 5px;
        }

        .range-hint span:first-child i,
        .range-hint span:last-child i {
            font-size: 0.6rem;
            margin: 0 4px;
            color: var(--primary);
        }

        /* ===== RETURN PREVIEW — SMOOTH ===== */
        .return-preview {
            background: rgba(0, 216, 255, 0.03);
            padding: 22px;
            border-radius: 24px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-label {
            color: var(--gray);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .preview-amount {
            text-align: right;
        }

        .preview-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            line-height: 1.2;
        }

        .preview-sub {
            font-size: 0.8rem;
            color: var(--gray);
        }

        /* ===== INVEST BUTTON — FLOATING, NO BORDERS ===== */
        .invest-button {
            width: 100%;
            background: var(--gradient);
            border: none;
            padding: 18px 24px;
            border-radius: 60px;
            color: var(--darker);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 28px rgba(0, 216, 255, 0.25);
            margin-top: 20px;
        }

        .invest-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 216, 255, 0.4);
        }

        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .invest-button i {
            font-size: 1.2rem;
        }

        /* ===== NOTIFICATION SYSTEM (SAME AS INDEX) ===== */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 350px;
            pointer-events: none;
        }

        .notification {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(30px) scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .notification.show {
            transform: translateX(0) scale(1);
            opacity: 1;
        }

        .notification.success {
            background: rgba(40, 167, 69, 0.95);
            color: white;
            border-left: 4px solid #1e7e34;
        }

        .notification.error {
            background: rgba(220, 53, 69, 0.95);
            color: white;
            border-left: 4px solid #bd2130;
        }

        .notification i {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .notification-close {
            background: none;
            border: none;
            color: white;
            opacity: 0.6;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            transition: var(--transition);
        }

        .notification-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* ===== BACK LINK ===== */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        /* ===== LOADING STATE ===== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--gray-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* responsive */
        @media (max-width: 480px) {
            .investment-panel { padding: 20px 15px; }
            .plan-name { font-size: 1.8rem; }
            .terms-grid { gap: 15px; }
            .term-value { font-size: 1.2rem; }
            .amount-input { font-size: 1.8rem; }
            .return-preview { padding: 18px; }
            .preview-number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="notification-center" id="notification-center"></div>

    <div id="investment-panel-container">
        <!-- dynamic panel injected via js -->
    </div>

    <script>
        (function() {
            // ========== GLOBALS ==========
            let currentPlan = null;
            let userBalances = { main: 0, matured: 0 };
            let investmentInProgress = false;
            const notificationQueue = [];
            let isNotificationShowing = false;

            // ========== HELPER: show notification (same as index) ==========
            function showNotification(type, title, message, duration = 5000) {
                notificationQueue.push({ type, title, message, duration });
                if (!isNotificationShowing) processNotificationQueue();
            }

            function processNotificationQueue() {
                if (notificationQueue.length === 0) {
                    isNotificationShowing = false;
                    return;
                }
                isNotificationShowing = true;
                const { type, title, message, duration } = notificationQueue.shift();

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';

                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <button class="notification-close">&times;</button>
                `;

                document.getElementById('notification-center').appendChild(notification);

                notification.querySelector('.notification-close').addEventListener('click', () => {
                    closeNotification(notification);
                });

                void notification.offsetWidth;
                notification.classList.add('show');

                if (duration > 0) {
                    setTimeout(() => {
                        if (notification.parentNode) closeNotification(notification);
                    }, duration);
                }
            }

            function closeNotification(notification) {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) notification.remove();
                    processNotificationQueue();
                }, 300);
            }

            // ========== LOAD PLAN FROM SESSIONSTORAGE (unique complicated key) ==========
            function loadPlanFromSession() {
                const urlParams = new URLSearchParams(window.location.search);
                const sessionKey = urlParams.get('session');  // unique key like plan_timestamp_random

                if (!sessionKey) {
                    showNotification('error', 'Invalid Request', 'No plan selected. Redirecting...');
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                    return false;
                }

                const stored = sessionStorage.getItem(sessionKey);
                if (!stored) {
                    showNotification('error', 'Session Expired', 'Plan data not found. Please select again.');
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                    return false;
                }

                try {
                    currentPlan = JSON.parse(stored);
                    // clean up sessionStorage immediately (one-time use)
                    sessionStorage.removeItem(sessionKey);
                    return true;
                } catch (e) {
                    console.error('Failed to parse plan', e);
                    showNotification('error', 'Data Error', 'Invalid plan data.');
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                    return false;
                }
            }

            // ========== FETCH USER BALANCES ==========
            async function fetchUserBalances() {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest.');
                    setTimeout(() => { window.location.href = 'signup'; }, 1500);
                    return false;
                }

                try {
                    const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!response.ok) throw new Error('Failed to fetch balances');
                    const data = await response.json();
                    userBalances.main = data.data?.balances?.main || 0;
                    userBalances.matured = data.data?.balances?.matured || 0;
                    return true;
                } catch (error) {
                    console.error('Balance fetch error:', error);
                    showNotification('error', 'Connection Error', 'Could not fetch your balance.');
                    return false;
                }
            }

            // ========== RENDER THE INVESTMENT PANEL (smooth, borderless) ==========
            function renderPanel() {
                if (!currentPlan) return;

                const container = document.getElementById('investment-panel-container');
                const minAmount = currentPlan.minAmount;
                const maxAmount = currentPlan.maxAmount;
                const percentage = currentPlan.percentage;
                const duration = currentPlan.duration;
                const planName = currentPlan.name || 'Cloud Mining';
                const minerIndex = currentPlan.planIndex || 0;
                const miners = [
                    { name: 'Avalon Mini 3', icon: 'fa-microchip' },
                    { name: 'Fluminer T3', icon: 'fa-microchip' },
                    { name: 'Avalon Q', icon: 'fa-microchip' },
                    { name: 'Antminer S21 Pro', icon: 'fa-microchip' },
                    { name: 'Antminer S21 XP', icon: 'fa-microchip' },
                    { name: 'Antminer S23 Hyd', icon: 'fa-microchip' }
                ];
                const miner = miners[minerIndex % miners.length];

                const mainBalance = userBalances.main;
                const maturedBalance = userBalances.matured;
                const canUseMain = mainBalance >= minAmount;
                const canUseMatured = maturedBalance >= minAmount;
                const investable = canUseMain || canUseMatured;

                // HTML structure — pure, no boxes/borders
                container.innerHTML = `
                    <div class="investment-panel">
                        <div class="plan-identity">
                            <div class="miner-icon">
                                <i class="fas ${miner.icon}"></i>
                            </div>
                            <h1 class="plan-name">${planName}</h1>
                            <div class="miner-tag">
                                <i class="fas fa-server"></i> ${miner.name}
                                <i class="fas fa-circle" style="font-size: 4px; margin: 0 6px;"></i>
                                <i class="fas fa-bolt"></i> SHA-256
                            </div>
                        </div>

                        <div class="terms-grid">
                            <div class="term-item">
                                <div class="term-label">Range</div>
                                <div class="term-value">$${minAmount.toLocaleString()} <small>– $${maxAmount.toLocaleString()}</small></div>
                            </div>
                            <div class="term-item">
                                <div class="term-label">Return</div>
                                <div class="term-value return-value">+${percentage}%</div>
                            </div>
                            <div class="term-item">
                                <div class="term-label">Duration</div>
                                <div class="term-value">${duration}h</div>
                            </div>
                        </div>

                        <div class="balance-row">
                            <span class="balance-label"><i class="fas fa-wallet" style="margin-right: 6px;"></i>Main balance</span>
                            <span class="balance-amount"><i class="fas fa-dollar-sign"></i>${mainBalance.toFixed(2)}</span>
                        </div>
                        <div class="balance-row" style="margin-top: -15px;">
                            <span class="balance-label"><i class="fas fa-piggy-bank" style="margin-right: 6px;"></i>Matured balance</span>
                            <span class="balance-amount"><i class="fas fa-dollar-sign"></i>${maturedBalance.toFixed(2)}</span>
                        </div>

                        <div class="input-group">
                            <div class="input-label">
                                <i class="fas fa-coins"></i> Investment amount (USD)
                            </div>
                            <input type="number" id="investment-amount" class="amount-input" 
                                   placeholder="${minAmount}" min="${minAmount}" max="${maxAmount}" step="10" 
                                   ${!investable ? 'disabled' : ''}>
                            <div class="range-hint">
                                <span><i class="fas fa-angle-left"></i> min $${minAmount.toLocaleString()}</span>
                                <span>max $${maxAmount.toLocaleString()} <i class="fas fa-angle-right"></i></span>
                            </div>
                        </div>

                        <div class="return-preview" id="return-preview">
                            <span class="preview-label">Est. return</span>
                            <div class="preview-amount">
                                <span class="preview-number" id="est-return">$0.00</span>
                                <div class="preview-sub">after ${duration}h (excl. 3% fee)</div>
                            </div>
                        </div>

                        <button class="invest-button" id="invest-btn" ${!investable ? 'disabled' : ''}>
                            <i class="fas fa-cloud-upload-alt"></i>
                            ${!investable ? 'Insufficient balance' : 'Start Cloud Mining'}
                        </button>

                        <div class="back-link">
                            <a href="index.html#plans"><i class="fas fa-arrow-left"></i> Back to plans</a>
                        </div>
                    </div>
                `;

                // attach event listeners
                const amountInput = document.getElementById('investment-amount');
                const estSpan = document.getElementById('est-return');
                const investBtn = document.getElementById('invest-btn');

                if (amountInput) {
                    amountInput.addEventListener('input', () => {
                        const val = parseFloat(amountInput.value) || 0;
                        const rawReturn = val * (percentage / 100);
                        estSpan.textContent = '$' + rawReturn.toFixed(2);
                    });
                    // set default to minAmount
                    amountInput.value = minAmount;
                    estSpan.textContent = '$' + (minAmount * (percentage / 100)).toFixed(2);
                }

                if (investBtn) {
                    investBtn.addEventListener('click', startInvestment);
                }
            }

            // ========== INVESTMENT LOGIC (same as modal, with redirect) ==========
            async function startInvestment() {
                if (investmentInProgress) {
                    showNotification('warning', 'In Progress', 'Please wait, your investment is being processed.');
                    return;
                }

                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Not Logged In', 'Redirecting to login...');
                    setTimeout(() => { window.location.href = 'login'; }, 1500);
                    return;
                }

                const amountInput = document.getElementById('investment-amount');
                if (!amountInput) return;
                const amount = parseFloat(amountInput.value);

                if (isNaN(amount) || amount < currentPlan.minAmount || amount > currentPlan.maxAmount) {
                    showNotification('error', 'Invalid Amount', `Please enter an amount between $${currentPlan.minAmount} and $${currentPlan.maxAmount}.`);
                    return;
                }

                // check balance again (double-check)
                if (userBalances.main < amount && userBalances.matured < amount) {
                    showNotification('error', 'Insufficient Balance', 'You do not have enough funds.');
                    return;
                }

                investmentInProgress = true;
                const investBtn = document.getElementById('invest-btn');
                if (investBtn) {
                    investBtn.disabled = true;
                    investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                }

                // decide which balance to use (main first, then matured)
                const useMain = userBalances.main >= amount;

                try {
                    const response = await fetch('https://bithash-backend.onrender.com/api/investments/create', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            planId: currentPlan.id,
                            amount: amount,
                            source: useMain ? 'main' : 'matured'
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showNotification('success', 'Investment Successful', 
                            `Your cloud mining investment of $${amount.toFixed(2)} is now active.`);

                        // Redirect to main page after short delay
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        throw new Error(data.message || 'Investment failed');
                    }

                } catch (error) {
                    console.error('Investment error:', error);
                    showNotification('error', 'Investment Failed', error.message || 'Could not complete investment.');

                    if (investBtn) {
                        investBtn.disabled = false;
                        investBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Start Cloud Mining';
                    }
                    investmentInProgress = false;
                }
            }

            // ========== MAIN INIT ==========
            (async function init() {
                // 1. load plan from unique session key
                if (!loadPlanFromSession()) return;

                // 2. fetch user balances (required before render)
                const balanceOk = await fetchUserBalances();
                if (!balanceOk) {
                    // if failed, still try to render but with zeros, but better to stop
                    return;
                }

                // 3. render the panel
                renderPanel();
            })();

        })();
    </script>
</body>
</html>
