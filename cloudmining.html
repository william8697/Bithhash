<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- Enhanced SEO Meta Tags -->
    <title>BitHash Cloud Mining | Bitcoin Mining Plan Details</title>
    <meta name="description" content="Start Bitcoin cloud mining with BitHash. View detailed plan specifications, miner specs, and real-time investment calculator.">
    <meta name="robots" content="index, follow">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #dc3545;
            --gold: #D4AF37;
            --border-radius: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 60px;
            height: 60px;
            animation: pulse 1.5s infinite;
        }

        .loading-text {
            margin-top: 16px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* Header */
        header {
            background: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            height: 64px;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo img {
            width: 32px;
            height: 32px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }

        nav ul {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        nav a {
            color: var(--dark);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--primary);
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: var(--darker);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--darker);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        /* User Balance Bar */
        .user-balance-container {
            position: fixed;
            top: 64px;
            width: 100%;
            background: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            z-index: 999;
            padding: 12px 0;
        }

        .user-balances {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 24px;
        }

        .user-balance {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 216, 255, 0.1);
            border: 1px solid rgba(0, 216, 255, 0.2);
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .user-balance:hover {
            background: rgba(0, 216, 255, 0.15);
            border-color: var(--primary);
        }

        .balance-asset-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-asset-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 9999;
            max-width: 350px;
        }

        .notification {
            padding: 16px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(100%);
            opacity: 0;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid var(--success);
        }

        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid var(--error);
        }

        .notification.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid var(--warning);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .notification-close {
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition);
        }

        .notification-close:hover {
            opacity: 1;
        }

        /* Main Content */
        main {
            max-width: 1400px;
            margin: 140px auto 60px;
            padding: 0 24px;
        }

        /* Plan Header */
        .plan-header-section {
            margin-bottom: 40px;
        }

        .plan-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .plan-subtitle {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Grid Layout */
        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        /* Left Column */
        .specs-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--primary);
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .spec-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .spec-label {
            color: var(--gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }

        .spec-value {
            font-size: 1.3rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }

        .spec-value.small {
            font-size: 1rem;
        }

        .spec-value.success {
            color: var(--success);
        }

        .balance-selection {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 32px;
        }

        .balance-options {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .balance-option {
            flex: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }

        .balance-option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.05);
        }

        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .balance-option-label {
            font-weight: 600;
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .balance-option-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .balance-amount-fiat {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .balance-amount-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .balance-amount-asset img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .investment-form {
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gray-light);
            border-radius: 12px;
            color: var(--dark);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 6px;
            min-height: 20px;
        }

        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            text-align: center;
        }

        .expected-return-label {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .expected-return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 8px;
        }

        .expected-return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .expected-return-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .invest-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--darker);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .invest-btn:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .invest-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 16px;
            min-height: 24px;
        }

        /* Right Column */
        .miner-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .miner-image {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .miner-image img {
            width: auto;
            height: 100%;
            object-fit: contain;
        }

        .miner-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .miner-info-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .miner-info-label {
            color: var(--gray);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .miner-info-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 32px;
        }

        .tradingview-container {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Security Badge */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--darker);
            padding: 12px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            border: 1px solid var(--gray-light);
            z-index: 999;
        }

        .security-badge i {
            color: var(--success);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .plan-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            
            .specs-section,
            .balance-selection,
            .miner-section,
            .chart-section {
                padding: 24px;
            }
        }

        @media (max-width: 768px) {
            main {
                margin: 120px auto 40px;
                padding: 0 16px;
            }
            
            .plan-title {
                font-size: 2rem;
            }
            
            .specs-grid {
                grid-template-columns: 1fr;
            }
            
            .balance-options {
                flex-direction: column;
            }
            
            .miner-info-grid {
                grid-template-columns: 1fr;
            }
            
            .user-balances {
                flex-direction: column;
                gap: 12px;
            }
            
            .user-balance {
                width: 100%;
            }
            
            nav {
                display: none;
            }
            
            .auth-buttons {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .plan-title {
                font-size: 1.5rem;
            }
            
            .specs-section,
            .balance-selection,
            .miner-section,
            .chart-section {
                padding: 20px;
            }
            
            .spec-value {
                font-size: 1.1rem;
            }
            
            .expected-return-fiat {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading Plan Details...</div>
    </div>

    <!-- Security Badge -->
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>256-bit AES Encrypted</span>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">BitHash</span>
            </div>
            
            <nav>
                <ul>
                    <li><a href="index.html#plans">Plans</a></li>
                    <li><a href="index.html#how-it-works">How It Works</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
            
            <div class="auth-buttons" id="authButtons">
                <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
                <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </header>

    <!-- User Balance Bar -->
    <div class="user-balance-container" id="userBalanceContainer" style="display: none;">
        <div class="user-balances">
            <div class="user-balance" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-wallet"></i>
                <div class="balance-asset-row" id="mainBalanceDisplay" style="display: none;">
                    <img src="" class="balance-asset-logo" id="mainBalanceLogo">
                    <span id="mainBalanceAmount">0.000000</span>

            </div>
            <div class="user-balance" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-piggy-bank"></i>

                    <img src="" class="balance-asset-logo" id="maturedBalanceLogo">
                    <span id="maturedBalanceAmount">0.000000</span>
                    <span id="maturedBalanceSymbol">BTC</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Plans
        </a>

        <div class="plan-header-section">
            <h1 class="plan-title" id="planTitle">Loading Plan...</h1>
            <div class="plan-subtitle" id="planSubtitle"></div>
        </div>

        <div class="plan-grid">
            <!-- Left Column -->
            <div>
                <!-- Plan Specifications -->
                <div class="specs-section">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        Plan Specifications
                    </h2>
                    <div class="specs-grid" id="specsGrid">
                        <!-- Populated dynamically -->
                    </div>
                </div>

                <!-- Balance Selection & Investment -->
                <div class="balance-selection">
                    <h2 class="section-title">
                        <i class="fas fa-wallet"></i>
                        Select Balance & Invest
                    </h2>
                    
                    <div class="balance-options" id="balanceOptions">
                        <!-- Populated dynamically -->
                    </div>

                    <div class="investment-form">
                        <div class="form-group">
                            <label>Investment Amount ($)</label>
                            <input type="number" class="form-control" id="investmentAmount" placeholder="Enter amount">
                            <div class="amount-error" id="amountError"></div>
                        </div>

                        <div class="expected-return">
                            <div class="expected-return-label">Expected Return (after fee)</div>
                            <div class="expected-return-fiat" id="expectedReturnFiat">$0.00</div>
                            <div class="expected-return-asset" id="expectedReturnAsset">
                                <img src="" id="expectedReturnLogo" style="display: none;">
                                <span id="expectedReturnText">0.000000 BTC</span>
                            </div>
                        </div>

                        <button class="invest-btn" id="investBtn" disabled>
                            <i class="fas fa-cloud"></i>
                            Start Cloud Mining
                        </button>
                        <div class="investment-status" id="investmentStatus"></div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <!-- Miner Details -->
                <div class="miner-section">
                    <h2 class="section-title">
                        <i class="fas fa-microchip"></i>
                        Miner Specifications
                    </h2>
                    
                    <div class="miner-image" id="minerImage">
                        <!-- Populated dynamically -->
                    </div>
                    
                    <div class="miner-info-grid" id="minerInfo">
                        <!-- Populated dynamically -->
                    </div>
                </div>

                <!-- BTC Chart -->
                <div class="chart-section">
                    <h2 class="section-title">
                        <i class="fas fa-chart-line"></i>
                        BTC/USD Chart
                    </h2>
                    <div class="tradingview-container" id="tradingviewChart"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // =============================================
        // GLOBAL STATE
        // =============================================
        const API_BASE = 'https://bithash-backend.onrender.com/api';
        
        let currentPlan = null;
        let userBalances = { main: 0, matured: 0 };
        let userPreferences = { displayAsset: 'btc' };
        let currentPrices = {};
        let currentBTCPrice = 43000;
        let selectedBalanceType = null;
        let selectedBalanceAmount = 0;
        let isInvesting = false;

        // Miner data (matches modal implementation)
        const miners = [
            { 
                name: 'Avalon Mini 3', 
                hashRate: '68 TH/s',
                power: '3200W',
                algorithm: 'SHA-256',
                efficiency: '47 J/TH',
                year: '2023',
                image: 'https://www.dropbox.com/scl/fi/9b69f9sll2gj6ozzjb58d/WhatsApp-Image-2025-12-13-at-1.27.06-AM.jpeg?rlkey=ea4rqkom2ubwvwvki83yd3lgr&raw=1'
            },
            { 
                name: 'Fluminer T3', 
                hashRate: '110 TH/s',
                power: '3250W',
                algorithm: 'SHA-256',
                efficiency: '29.5 J/TH',
                year: '2024',
                image: 'https://www.dropbox.com/scl/fi/nmapzrnkx9kcvk839tzte/WhatsApp-Image-2026-01-12-at-11.43.02-AM.jpeg?rlkey=3tde1g2bnuyjnh4v26frl58rz&raw=1'
            },
            { 
                name: 'Avalon Q', 
                hashRate: '150 TH/s',
                power: '3420W',
                algorithm: 'SHA-256',

        // Asset logos
        function getAssetLogo(symbol) {
            const logos = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png'
            };
            return logos[symbol.toLowerCase()] || logos.btc;
        }

        // =============================================
        // URL PARAMETERS - GET PLAN ID
        // =============================================
        function getPlanIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // =============================================
        // API CALLS
        // =============================================
        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem('jwtToken');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });
                
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.message || `API call failed: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API call error:', error);
                throw error;
            }
        }

        // =============================================
        // LOAD PLAN DATA
        // =============================================
        async function loadPlanData() {
            const planId = getPlanIdFromUrl();
            
            if (!planId) {
                showNotification('error', 'Error', 'No plan ID specified');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            try {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                
                // Fetch plan details
                const plansResponse = await apiCall('/plans');
                const plans = plansResponse.data?.plans || [];
                currentPlan = plans.find(p => p.id === planId);
                
                if (!currentPlan) {
                    throw new Error('Plan not found');
                }

                // Get plan index for miner selection
                const planIndex = plans.findIndex(p => p.id === planId);
                const minerIndex = Math.min(Math.max(planIndex, 0), miners.length - 1);
                const miner = miners[minerIndex];

                // Update UI
                updatePlanUI(currentPlan, miner);
                
                // Load balances if logged in
                const token = localStorage.getItem('jwtToken');
                if (token) {
                    await loadUserBalances();
                }

                // Initialize TradingView
                initializeTradingView();

                // Setup listeners
                setupInvestmentListeners();

            } catch (error) {
                console.error('Error loading plan:', error);
                showNotification('error', 'Error', 'Failed to load plan details');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function updatePlanUI(plan, miner) {
            // Header
            document.getElementById('planTitle').textContent = `${plan.name || 'Cloud Mining'} Plan`;
            document.getElementById('planSubtitle').textContent = `Bitcoin cloud mining with ${plan.percentage}% return`;

            // Specifications
            const specsGrid = document.getElementById('specsGrid');
            specsGrid.innerHTML = `
                <div class="spec-item">
                    <div class="spec-label">Investment Range</div>
                    <div class="spec-value">$${plan.minAmount.toLocaleString()} - $${plan.maxAmount.toLocaleString()}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Return Rate</div>
                    <div class="spec-value success">+${plan.percentage}%</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Duration</div>
                    <div class="spec-value">${plan.duration} hours</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Minimum Investment</div>
                    <div class="spec-value small">$${plan.minAmount.toLocaleString()}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Maximum Investment</div>
                    <div class="spec-value small">$${plan.maxAmount.toLocaleString()}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Company Fee</div>
                    <div class="spec-value small">3% upon maturity</div>
                </div>
            `;

            // Miner details
            document.getElementById('minerImage').innerHTML = `
                <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
            `;

            document.getElementById('minerInfo').innerHTML = `
                <div class="miner-info-item">
                    <div class="miner-info-label">Model</div>
                    <div class="miner-info-value">${miner.name}</div>
                </div>
                <div class="miner-info-item">
                    <div class="miner-info-label">Hash Rate</div>
                    <div class="miner-info-value">${miner.hashRate}</div>
                </div>
                <div class="miner-info-item">
                    <div class="miner-info-label">Power</div>
                    <div class="miner-info-value">${miner.power}</div>
                </div>
                <div class="miner-info-item">
                    <div class="miner-info-label">Algorithm</div>
                    <div class="miner-info-value">${miner.algorithm}</div>
                </div>
                <div class="miner-info-item">
                    <div class="miner-info-label">Efficiency</div>
                    <div class="miner-info-value">${miner.efficiency}</div>
                </div>
                <div class="miner-info-item">
                    <div class="miner-info-label">Release Year</div>
                    <div class="miner-info-value">${miner.year}</div>
                </div>
            `;

        // =============================================
        // USER BALANCES
        // =============================================
        async function loadUserBalances() {
            try {
                const response = await apiCall('/users/balances');
                userBalances.main = response.data?.balances?.main || 0;
                userBalances.matured = response.data?.balances?.matured || 0;
                
                // Load preferences
                await loadUserPreferences();
                
                document.getElementById('userBalanceContainer').style.display = 'block';
                document.getElementById('authButtons').style.display = 'none';
                
                updateBalanceDisplay();
                updateBalanceOptions();
                
            } catch (error) {
                console.error('Error loading balances:', error);
            }
        }

        async function loadUserPreferences() {
            try {
                const response = await apiCall('/users/preferences');
                userPreferences.displayAsset = response.data?.preferences?.displayAsset || 'btc';
            } catch (error) {
                console.error('Error loading preferences:', error);
            }
        }

        function updateBalanceDisplay() {
            const asset = userPreferences.displayAsset;
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[asset]?.usd || currentBTCPrice;
            
            // Main balance
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            document.getElementById('mainBalanceLogo').src = assetLogo;
            document.getElementById('mainBalanceAmount').textContent = formatNumber(mainAssetAmount);
            document.getElementById('mainBalanceSymbol').textContent = asset.toUpperCase();
            document.getElementById('mainBalanceDisplay').style.display = 'flex';
            
            // Matured balance
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            document.getElementById('maturedBalanceLogo').src = assetLogo;
            document.getElementById('maturedBalanceAmount').textContent = formatNumber(maturedAssetAmount);
            document.getElementById('maturedBalanceSymbol').textContent = asset.toUpperCase();
            document.getElementById('maturedBalanceDisplay').style.display = 'flex';
        }

        function updateBalanceOptions() {
            if (!currentPlan) return;
            
            const token = localStorage.getItem('jwtToken');
            const balanceOptions = document.getElementById('balanceOptions');
            
            if (!token) {
                balanceOptions.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--gray);">
                        <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 16px;"></i>
                        <p>Please login to invest</p>
                        <button class="btn btn-primary" onclick="window.location.href='login.html'" style="margin-top: 16px;">
                            Login
                        </button>
                    </div>
                `;
                return;
            }

            const asset = userPreferences.displayAsset;
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[asset]?.usd || currentBTCPrice;
            
            const mainAssetAmount = price > 0 ? userBalances.main / price : 0;
            const maturedAssetAmount = price > 0 ? userBalances.matured / price : 0;
            
            const minAmount = currentPlan.minAmount;
            
            balanceOptions.innerHTML = `
                <div class="balance-option ${userBalances.main >= minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('main', ${userBalances.main})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Main Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${userBalances.main.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}">
                        <span>${formatNumber(mainAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
                <div class="balance-option ${userBalances.matured >= minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('matured', ${userBalances.matured})">
                    <div class="balance-option-header">
                        <span class="balance-option-label">Matured Balance</span>
                        <div class="balance-option-asset">
                            <img src="${assetLogo}">
                            <span>${asset.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="balance-amount-fiat">$${userBalances.matured.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="balance-amount-asset">
                        <img src="${assetLogo}">
                        <span>${formatNumber(maturedAssetAmount)} ${asset.toUpperCase()}</span>
                    </div>
                </div>
            `;
            
            // Auto-select if one balance qualifies
            if (userBalances.main >= minAmount) {
                selectBalance('main', userBalances.main);
            } else if (userBalances.matured >= minAmount) {
                selectBalance('matured', userBalances.matured);
            }
        }

        function selectBalance(type, amount) {
            if (!currentPlan || amount < currentPlan.minAmount) return;
            
            document.querySelectorAll('.balance-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            selectedBalanceType = type;
            selectedBalanceAmount = amount;
            
            const input = document.getElementById('investmentAmount');
            input.value = currentPlan.minAmount;
            input.min = currentPlan.minAmount;
            input.max = Math.min(currentPlan.maxAmount, amount);
            
            validateInvestment();
            updateExpectedReturn();
        }

        // =============================================
        // INVESTMENT LOGIC (EXACT MATCH TO MODAL)
        // =============================================
        function setupInvestmentListeners() {
            const input = document.getElementById('investmentAmount');
            input.addEventListener('input', () => {
                validateInvestment();
                updateExpectedReturn();
            });
        }

        function validateInvestment() {
            const amount = parseFloat(document.getElementById('investmentAmount').value) || 0;
            const errorElement = document.getElementById('amountError');
            const investBtn = document.getElementById('investBtn');
            
            if (!selectedBalanceType) {
                errorElement.textContent = 'Please select a balance';
                investBtn.disabled = true;
                return false;
            }
            
            if (!currentPlan) {
                errorElement.textContent = 'Plan data not loaded';
                investBtn.disabled = true;
                return false;
            }
            
            if (amount < currentPlan.minAmount) {
                errorElement.textContent = `Minimum investment: $${currentPlan.minAmount.toLocaleString()}`;
                investBtn.disabled = true;
                return false;
            }
            
            if (amount > currentPlan.maxAmount) {
                errorElement.textContent = `Maximum investment: $${currentPlan.maxAmount.toLocaleString()}`;
                investBtn.disabled = true;
                return false;
            }
            
            if (amount > selectedBalanceAmount) {
                errorElement.textContent = `Insufficient balance. Available: $${selectedBalanceAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                investBtn.disabled = true;
                return false;
            }
            
            errorElement.textContent = '';
            investBtn.disabled = false;
            return true;
        }

        function updateExpectedReturn() {
            const amount = parseFloat(document.getElementById('investmentAmount').value) || 0;
            
            if (!currentPlan || amount < currentPlan.minAmount) {
                document.getElementById('expectedReturnFiat').textContent = '$0.00';
                document.getElementById('expectedReturnText').textContent = '0.000000 BTC';
                return;
            }
            
            // Calculate return (same as modal)
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * currentPlan.percentage / 100);
            
            // Update fiat
            document.getElementById('expectedReturnFiat').textContent = 
                '$' + totalReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            // Update asset
            const asset = userPreferences.displayAsset;
            const assetLogo = getAssetLogo(asset);
            const price = currentPrices[asset]?.usd || currentBTCPrice;
            
            if (price > 0) {
                const assetAmount = totalReturn / price;
                document.getElementById('expectedReturnLogo').src = assetLogo;
                document.getElementById('expectedReturnLogo').style.display = 'inline-block';
                document.getElementById('expectedReturnText').textContent = 
                    `${formatNumber(assetAmount)} ${asset.toUpperCase()}`;
            }
        }

        document.getElementById('investBtn').addEventListener('click', async function() {
            if (isInvesting) return;
            
            const amount = parseFloat(document.getElementById('investmentAmount').value);
            
            if (!validateInvestment()) return;
            
            isInvesting = true;
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            
            try {
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                    return;
                }
                
                document.getElementById('investmentStatus').textContent = 'Processing your investment...';
                document.getElementById('investmentStatus').style.color = 'var(--primary)';
                
                // EXACT SAME ENDPOINT AND FORMAT AS MODAL
                const response = await fetch(`${API_BASE}/investments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: currentPlan.id,
                        amount: amount,
                        balanceType: selectedBalanceType
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('investmentStatus').textContent = 'Investment successful! Redirecting...';
                    document.getElementById('investmentStatus').style.color = 'var(--success)';
                    
                    showNotification('success', 'Success', 'Cloud mining investment started successfully');
                    
                    // Redirect back to index.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
                
            } catch (error) {
                console.error('Investment error:', error);
                document.getElementById('investmentStatus').textContent = error.message;
                document.getElementById('investmentStatus').style.color = 'var(--error)';
                
                showNotification('error', 'Investment Failed', error.message);
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                isInvesting = false;
            }
        });

        // =============================================
        // TRADING VIEW
        // =============================================
        function initializeTradingView() {
            const container = document.getElementById('tradingviewChart');
            
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "BITSTAMP:BTCUSD",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingviewChart",
                    "studies": ["Volume@tv-basicstudies"],
                    "hide_side_toolbar": false,
                    "save_image": false
                });
            } else {
                container.innerHTML = '<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gray);">Loading Chart...</div>';
                
                // Load TradingView script if not present
                const script = document.createElement('script');
                script.src = 'https://s3.tradingview.com/tv.js';
                script.async = true;
                script.onload = () => initializeTradingView();
                document.head.appendChild(script);
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message, duration = 5000) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close">
                    <i class="fas fa-times"></i>
                </div>
            `;
            
            container.appendChild(notification);
            
            notification.querySelector('.notification-close').addEventListener('click', () => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            });
            
            setTimeout(() => notification.classList.add('show'), 10);
            
            if (duration > 0) {
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.classList.remove('show');
                        setTimeout(() => notification.remove(), 300);
                    }
                }, duration);
            }
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        function formatNumber(num) {
            const value = parseFloat(num) || 0;
            if (value >= 1e6) return (value / 1e6).toFixed(2) + 'M';
            if (value >= 1e3) return (value / 1e3).toFixed(2) + 'K';
            return value.toFixed(6);
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadPlanData();
            
            // Check auth state
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                document.getElementById('authButtons').style.display = 'flex';
            }
        });
    </script>
