<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash Cloud Mining | Professional Mining Dashboard</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================= */
        /* MODERN CRYPTO EXCHANGE DESIGN SYSTEM — SMOOTH SINGLE BLOCK */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --success: #28a745;
            --success-dark: #1e7e34;
            --error: #dc3545;
            --error-dark: #bd2130;
            --warning: #ffc107;
            --bg-primary: #0A0E17;
            --bg-secondary: #111827;
            --bg-tertiary: #1F2937;
            --text-primary: #FFFFFF;
            --text-secondary: #8E9BAE;
            --text-muted: #6B7280;
            --border-light: rgba(255, 255, 255, 0.1);
            --border-medium: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.05);
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --gradient-gold: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 6px 12px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.2);
            --shadow-glow: 0 0 20px rgba(0, 216, 255, 0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* ============================================= */
        /* NOTIFICATION SYSTEM */
        /* ============================================= */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 380px;
            width: 100%;
        }

        .notification {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid transparent;
            transform: translateX(120%);
            opacity: 0;
            transition: var(--transition);
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.success {
            border-left-color: var(--success);
            background: rgba(40, 167, 69, 0.1);
        }

        .notification.success i {
            color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
            background: rgba(220, 53, 69, 0.1);
        }

        .notification.error i {
            color: var(--error);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .notification-close {
            cursor: pointer;
            opacity: 0.6;
            transition: var(--transition);
        }

        .notification-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* ============================================= */
        /* LOADING OVERLAY */
        /* ============================================= */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite;
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* ============================================= */
        /* HEADER — flows without borders */
        /* ============================================= */
        header {
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .balance-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 216, 255, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(0, 216, 255, 0.2);
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .balance-item i {
            color: var(--primary);
        }

        .balance-amount {
            font-weight: 600;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient);
            color: #0A0E17;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #0A0E17;
        }

        .btn-back {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 8px 20px;
            border: none;
        }

        .btn-back:hover {
            background: var(--bg-secondary);
            transform: translateX(-4px);
        }

        /* ============================================= */
        /* MAIN CONTAINER — seamless single block */
        /* ============================================= */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            background: transparent;
            border: none;
            outline: none;
        }

        /* no card borders, everything flows */
        .plan-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .plan-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 216, 255, 0.1);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(0, 216, 255, 0.2);
            margin-bottom: 20px;
        }

        .plan-badge i {
            color: var(--primary);
        }

        .plan-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .plan-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* grid without borders */
        .details-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-bottom: 40px;
            background: transparent;
        }

        /* left column items blend */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* cards now are just smooth backgrounds, no borders */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            border: none;
            box-shadow: none;
        }

        .card:hover {
            box-shadow: var(--shadow-glow);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .card-title i {
            font-size: 1.1rem;
        }

        /* Specs Grid */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .spec-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .spec-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .spec-value.success {
            color: var(--success);
        }

        /* Miner details — no borders, just smooth */
        .miner-container {
            display: flex;
            gap: 24px;
        }

        .miner-image {
            width: 140px;
            height: 140px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--bg-tertiary);
            flex-shrink: 0;
        }

        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .miner-specs {
            flex: 1;
        }

        .miner-spec-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .miner-spec-row:last-child {
            border-bottom: none;
        }

        .miner-spec-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .miner-spec-value {
            font-weight: 600;
        }

        /* ============================================= */
        /* INVESTMENT PANEL — completely integrated */
        /* ============================================= */
        .investment-panel {
            background: linear-gradient(135deg, rgba(0, 216, 255, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
            border-radius: var(--radius-lg);
            padding: 28px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 100px;
            border: none;
            box-shadow: none;
        }

        .balance-selector {
            margin-bottom: 28px;
        }

        .balance-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-options {
            display: flex;
            gap: 12px;
        }

        .balance-option {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
        }

        .balance-option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }

        .balance-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .balance-option-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .balance-option-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .balance-option-amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .balance-option-fiat {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Investment Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 216, 255, 0.1);
        }

        .form-control:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .amount-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 6px;
            min-height: 20px;
        }

        /* Expected Return */
        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .return-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .return-fiat {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 6px;
        }

        .return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .return-asset img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        .action-button {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            background: var(--gradient);
            color: #0A0E17;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .investment-status {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 16px;
            min-height: 24px;
            color: var(--primary);
        }

        /* ============================================= */
        /* CHART SECTION — borderless blending */
        /* ============================================= */
        .chart-section {
            margin-top: 40px;
        }

        .tradingview-container {
            width: 100%;
            height: 350px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--card-bg);
            border: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }

        @media (max-width: 1024px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
            .investment-panel {
                position: static;
            }
            .nav-links {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                padding: 0 16px;
            }
            .balance-badge {
                display: none;
            }
            .miner-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .miner-image {
                width: 180px;
                height: 180px;
            }
            .plan-title {
                font-size: 2rem;
            }
            .specs-grid {
                grid-template-columns: 1fr;
            }
            .balance-options {
                flex-direction: column;
            }
            .tradingview-container {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 0 16px;
            }
            .card {
                padding: 20px;
            }
            .plan-title {
                font-size: 1.6rem;
            }
            .return-fiat {
                font-size: 1.8rem;
            }
            .balance-option-amount {
                font-size: 1.1rem;
            }
            .tradingview-container {
                height: 250px;
            }
            .btn-back span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading Plan Details...</div>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">BitHash</span>
            </div>

            <div class="nav-links">
                <a href="index.html#plans">Plans</a>
                <a href="index.html#how-it-works">How It Works</a>
                <a href="dashboard">Dashboard</a>
            </div>

            <div class="user-info" id="userInfo">
                <!-- Dynamically populated -->
            </div>

            <button class="btn btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-container" id="mainContent">
        <!-- Dynamically populated by JavaScript -->
    </div>

    <script>
        // =============================================
        // PROFESSIONAL CLOUD MINING IMPLEMENTATION
        // =============================================

        // Global State
        const AppState = {
            sessionKey: null,
            timestamp: null,
            ref: null,
            planDetails: null,
            userBalances: {
                main: 0,
                matured: 0
            },
            selectedBalance: 'main',
            selectedBalanceAmount: 0,
            isInvesting: false,
            currentBTCPrice: 43000,
            userPreferences: {
                displayAsset: 'btc'
            },
            investmentInProgress: false,
            planIndex: 0
        };

        // Asset Data
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' }
        ];

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Parse URL parameters from index.html redirect
            const urlParams = new URLSearchParams(window.location.search);
            AppState.sessionKey = urlParams.get('session');
            AppState.timestamp = urlParams.get('v');
            AppState.ref = urlParams.get('ref');

            // Also check for direct plan parameters (fallback)
            const planId = urlParams.get('plan');
            const planName = urlParams.get('name');
            const minAmount = urlParams.get('min');
            const maxAmount = urlParams.get('max');
            const percentage = urlParams.get('percentage');
            const duration = urlParams.get('duration');

            if (!AppState.sessionKey && !planId) {
                showNotification('error', 'Invalid Session', 'No plan selected. Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // If we have direct parameters, use them
            if (planId && minAmount && maxAmount && percentage && duration) {
                AppState.planDetails = {
                    id: planId,
                    name: planName || 'Professional Plan',
                    minAmount: parseFloat(minAmount),
                    maxAmount: parseFloat(maxAmount),
                    percentage: parseFloat(percentage),
                    duration: parseFloat(duration)
                };
                
                // Determine plan index based on minAmount
                if (AppState.planDetails.minAmount >= 50000) AppState.planIndex = 5;
                else if (AppState.planDetails.minAmount >= 10000) AppState.planIndex = 4;
                else if (AppState.planDetails.minAmount >= 5000) AppState.planIndex = 3;
                else if (AppState.planDetails.minAmount >= 1000) AppState.planIndex = 2;
                else if (AppState.planDetails.minAmount >= 500) AppState.planIndex = 1;
                else AppState.planIndex = 0;
            }

            // Initialize the page
            await initializePage();
        });

        async function initializePage() {
            try {
                // Check authentication
                const token = localStorage.getItem('jwtToken');
                if (token) {
                    await fetchUserBalances();
                } else {
                    updateAuthUI();
                }

                // If plan details not set from URL, fetch from API
                if (!AppState.planDetails) {
                    await loadPlanDetailsFromSession();
                }

                // Fetch BTC price
                await fetchBTCPrice();

                // Render the page
                renderPlanDetails();

                // Hide loading overlay
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 500);

            } catch (error) {
                console.error('Initialization error:', error);
                showNotification('error', 'Error', 'Failed to load page. Please try again.');

        async function loadPlanDetailsFromSession() {
            try {
                const token = localStorage.getItem('jwtToken');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

                // Fetch all plans
                const response = await fetch('https://bithash-backend.onrender.com/api/plans', { headers });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch plans');
                }

                const data = await response.json();
                const plans = data.data?.plans || [];

                // Get plan ID from session (format: planId_timestamp_random)
                const planId = AppState.sessionKey.split('_')[0];
                
                if (!planId) {
                    throw new Error('Plan not found in session');
                }

                // Find the plan
                const plan = plans.find(p => p.id === planId);
                
                if (!plan) {
                    throw new Error('Plan not found');
                }

                // Store plan details
                AppState.planDetails = plan;

                // Determine plan index based on minAmount
                if (plan.minAmount >= 50000) AppState.planIndex = 5;
                else if (plan.minAmount >= 10000) AppState.planIndex = 4;
                else if (plan.minAmount >= 5000) AppState.planIndex = 3;
                else if (plan.minAmount >= 1000) AppState.planIndex = 2;
                else if (plan.minAmount >= 500) AppState.planIndex = 1;
                else AppState.planIndex = 0;

            } catch (error) {
                console.error('Error loading plan:', error);
                throw error;
            }
        }

        // =============================================
        // INVESTMENT LOGIC

        function selectBalance(type, amount) {
            // Remove selected class from all options
            document.getElementById('balanceMain')?.classList.remove('selected');
            document.getElementById('balanceMatured')?.classList.remove('selected');

            // Add selected class to chosen option
            const selectedEl = document.getElementById(type === 'main' ? 'balanceMain' : 'balanceMatured');
            if (selectedEl && !selectedEl.classList.contains('disabled')) {
                selectedEl.classList.add('selected');
                AppState.selectedBalance = type;
                AppState.selectedBalanceAmount = amount;

                // Update investment amount limits
                const investmentInput = document.getElementById('investmentAmount');
                if (investmentInput) {
                    const maxAmount = Math.min(AppState.planDetails.maxAmount, amount);
                    investmentInput.max = maxAmount;
                    investmentInput.min = AppState.planDetails.minAmount;
                    
                    if (investmentInput.value) {
                        validateAmount(parseFloat(investmentInput.value));
                        updateExpectedReturn(parseFloat(investmentInput.value));
                    }
                }
            }
        }

        function autoSelectBalance() {
            const mainBalance = AppState.userBalances.main;
            const maturedBalance = AppState.userBalances.matured;
            const minAmount = AppState.planDetails.minAmount;

            if (mainBalance >= minAmount) {
                selectBalance('main', mainBalance);
            } else if (maturedBalance >= minAmount) {
                selectBalance('matured', maturedBalance);
            }
        }

        function setupInvestmentListeners() {
            const investmentInput = document.getElementById('investmentAmount');
            
            investmentInput.addEventListener('input', function(e) {
                const amount = parseFloat(e.target.value) || 0;
                validateAmount(amount);
                updateExpectedReturn(amount);
            });

            // Trigger initial validation
            setTimeout(() => {
                const amount = parseFloat(investmentInput.value) || 0;
                validateAmount(amount);
            }, 100);
        }

        function validateAmount(amount) {
            const errorElement = document.getElementById('amountError');
            const investButton = document.getElementById('investButton');
            const plan = AppState.planDetails;
            
            errorElement.textContent = '';

            if (isNaN(amount) || amount <= 0) {
                errorElement.textContent = 'Please enter a valid amount';
                investButton.disabled = true;
                return false;
            }

            if (amount < plan.minAmount) {
                errorElement.textContent = `Minimum investment is $${plan.minAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            }

            if (amount > plan.maxAmount) {
                errorElement.textContent = `Maximum investment is $${plan.maxAmount.toLocaleString()}`;
                investButton.disabled = true;
                return false;
            }

            if (amount > AppState.selectedBalanceAmount) {
                const formattedBalance = AppState.selectedBalanceAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                errorElement.textContent = `Insufficient balance. Available: $${formattedBalance}`;
                investButton.disabled = true;
                return false;
            }

            investButton.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            const plan = AppState.planDetails;
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * plan.percentage / 100);
            
            document.getElementById('returnFiat').textContent = `$${totalReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const price = AppState.currentBTCPrice;
            const asset = AppState.userPreferences.displayAsset;
            const assetAmount = price > 0 ? totalReturn / price : 0;
            
            document.getElementById('returnAssetText').textContent = `${assetAmount.toFixed(6)} ${asset.toUpperCase()}`;
        }

        async function handleInvestment() {
            // Prevent double investment
            if (AppState.investmentInProgress) {
                showNotification('warning', 'Please Wait', 'An investment is already in progress');
                return;
            }

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to invest');
                setTimeout(() => window.location.href = 'login', 1500);
                return;
            }

            const amount = parseFloat(document.getElementById('investmentAmount').value);
            
            if (!validateAmount(amount)) {
                return;
            }

            // Set investing flag
            AppState.investmentInProgress = true;
            
            const investButton = document.getElementById('investButton');
            const statusElement = document.getElementById('investmentStatus');
            
            investButton.disabled = true;
            investButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            statusElement.textContent = 'Processing your cloud mining investment...';
            statusElement.style.color = 'var(--primary)';

            try {
                // Create investment - EXACT SAME FORMAT AS MODAL
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: AppState.planDetails.id,
                        amount: amount,
                        balanceType: AppState.selectedBalance
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    statusElement.textContent = 'Investment successful! Redirecting...';
                    statusElement.style.color = 'var(--success)';
                    
                    showNotification('success', 'Success!', 
                        `Your cloud mining investment of $${amount.toLocaleString()} has been created.`);

                    // Redirect back to index after success
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);

                } else {
                    throw new Error(data.message || 'Investment failed');
                }

            } catch (error) {
                console.error('Investment error:', error);
                
                statusElement.textContent = error.message || 'Failed to create investment';
                statusElement.style.color = 'var(--error)';
                
                showNotification('error', 'Investment Failed', error.message || 'Please try again later');
                
                investButton.disabled = false;
                investButton.innerHTML = '<i class="fas fa-cloud"></i> Start Cloud Mining';
            } finally {
                AppState.investmentInProgress = false;
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message, duration = 5000) {
            const notificationCenter = document.getElementById('notificationCenter');
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            
            notification.innerHTML = `
                <i class="fas ${icon}"></i>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">&times;</div>
            `;
            
            notificationCenter.appendChild(notification);
            
            // Trigger animation
            setTimeout(() => notification.classList.add('show'), 10);
            
            // Auto remove after duration
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.classList.remove('show');
                    setTimeout(() => notification.remove(), 400);
                }
            }, duration);
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        function formatNumber(num) {
            const numericNum = parseFloat(num) || 0;
            if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
            if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            if (numericNum >= 1e3) return (numericNum / 1e3).toFixed(2) + 'K';
            return numericNum.toFixed(6);
        }

        function formatUSD(num) {
            const numericNum = parseFloat(num) || 0;
            return '$' + numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // Expose functions to global scope
        window.selectBalance = selectBalance;
        window.handleInvestment = handleInvestment;
    </script>
