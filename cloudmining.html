<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- SEO Meta -->
    <title>BitHash Cloud Mining | Plan Details & Investment</title>
    <meta name="description" content="Bitcoin cloud mining plan details. Invest in SHA-256 ASIC mining with daily returns.">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Fonts - optimized sizes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0E17;
            --bg-secondary: #111827;
            --text-primary: #FFFFFF;
            --text-secondary: #9AA5B5;
            --accent: #00D8FF;
            --accent-hover: #33E0FF;
            --success: #28a745;
            --error: #dc3545;
            --warning: #FFB800;
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(20, 25, 40, 0.7);
            
            /* Font sizes - professional scale */
            --text-xs: 0.75rem;   /* 12px */
            --text-sm: 0.875rem;   /* 14px */
            --text-base: 1rem;     /* 16px */
            --text-lg: 1.125rem;   /* 18px */
            --text-xl: 1.25rem;    /* 20px */
            --text-2xl: 1.5rem;    /* 24px */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            font-size: var(--text-base);
            padding-bottom: 90px; /* Space for mobile invest button */
        }

        /* ===== NOTIFICATION SYSTEM ===== */
        .notification-center {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 340px;
            width: calc(100% - 32px);
            pointer-events: none;
        }

        .notification {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border-left: 4px solid transparent;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            font-size: var(--text-sm);
        }

        .notification.show { transform: translateX(0); }
        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        .notification.success i { color: var(--success); }
        .notification.error i { color: var(--error); }
        
        .notification i { font-size: 1.1rem; flex-shrink: 0; }
        .notification-content { flex: 1; }
        .notification-title { font-weight: 600; margin-bottom: 2px; }
        .notification-message { color: var(--text-secondary); font-size: var(--text-xs); }
        .notification-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; }

        /* ===== HEADER ===== */
        header {
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo img { height: 28px; width: auto; }
        .logo span { font-weight: 600; font-size: var(--text-base); color: var(--accent); }

        .balance-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: var(--text-sm);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .balance-display i { color: var(--accent); font-size: var(--text-sm); }
        .balance-amount { font-weight: 600; }
        .balance-asset { display: flex; align-items: center; gap: 4px; color: var(--text-secondary); }
        .balance-asset img { width: 14px; height: 14px; border-radius: 50%; }

        /* ===== MAIN CONTENT ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Back button */
        .back-button {
            margin: 16px 0 8px;
        }
        .back-button a {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: var(--text-sm);
        }
        .back-button a:hover { color: var(--accent); }

        /* Plan header - more compact */
        .plan-header {
            margin: 8px 0 20px;
        }
        .plan-title {
            font-size: var(--text-2xl);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .plan-subtitle {
            color: var(--text-secondary);
            font-size: var(--text-sm);
        }

        /* Stats grid - compact */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin: 16px 0 24px;
        }
        .stat-item {
            background: var(--bg-secondary);
            padding: 16px 12px;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: var(--text-lg);
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }
        .stat-value small { font-size: var(--text-xs); color: var(--text-secondary); font-weight: normal; }
        .stat-value.positive { color: var(--success); }

        /* Two column layout */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        /* Miner section */
        .miner-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }
        .miner-title {
            font-size: var(--text-base);
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .miner-title i { color: var(--accent); font-size: var(--text-base); }

        .miner-image {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .miner-image img { width: auto; height: 100%; max-width: 100%; object-fit: contain; }

        .miner-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .miner-spec { display: flex; flex-direction: column; gap: 2px; }
        .spec-label { color: var(--text-secondary); font-size: var(--text-xs); text-transform: uppercase; }
        .spec-value { font-weight: 600; font-size: var(--text-sm); }

        /* Investment section */
        .investment-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        /* Balance options - compact */
        .balance-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 16px 0;
        }
        .balance-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .balance-card:hover:not(.disabled) { background: rgba(255, 255, 255, 0.08); }
        .balance-card.selected { border-color: var(--accent); background: rgba(0, 216, 255, 0.1); }
        .balance-card.disabled { opacity: 0.4; cursor: not-allowed; }

        .balance-type {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: var(--text-sm);
        }
        .balance-type i { color: var(--accent); font-size: var(--text-xs); }
        .balance-fiat {
            font-size: var(--text-lg);
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            margin-bottom: 4px;
        }
        .balance-crypto {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: var(--text-xs);
        }
        .balance-crypto img { width: 12px; height: 12px; border-radius: 50%; }

        /* Investment form */
        .investment-form { margin: 16px 0; }
        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: var(--text-xs);
            margin-bottom: 4px;
        }
        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: 'Manrope', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .input-error { color: var(--error); font-size: var(--text-xs); margin-top: 4px; min-height: 18px; }
        .input-hint { font-size: var(--text-xs); color: var(--text-secondary); margin-top: 4px; }

        /* Return display */
        .return-display {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            margin: 16px 0;
        }
        .return-fiat {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
            margin-bottom: 4px;
        }
        .return-crypto {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: var(--text-xs);
        }
        .return-crypto img { width: 14px; height: 14px; border-radius: 50%; }

        /* Desktop invest button */
        .invest-button-desktop {
            width: 100%;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .invest-button-desktop:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .invest-button-desktop:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Mobile fixed invest button */
        .invest-button-mobile {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .invest-button-mobile button {
            width: 100%;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: var(--text-base);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .invest-button-mobile button:disabled { opacity: 0.5; cursor: not-allowed; }

        .investment-status { text-align: center; font-size: var(--text-xs); margin-top: 12px; min-height: 18px; }

        /* Chart section - optional on mobile */
        .chart-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            margin: 20px 0;
        }
        .chart-title {
            font-size: var(--text-base);
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-title i { color: var(--accent); }
        .tradingview-container { width: 100%; height: 250px; border-radius: 10px; overflow: hidden; }

        /* Notice */
        .notice {
            background: rgba(255, 184, 0, 0.1);
            border: 1px solid rgba(255, 184, 0, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 16px 0 24px;
            font-size: var(--text-sm);
        }
        .notice i { color: var(--warning); font-size: var(--text-base); }
        .notice-content { flex: 1; }
        .notice-title { font-weight: 600; margin-bottom: 2px; font-size: var(--text-sm); }
        .notice-text { color: var(--text-secondary); font-size: var(--text-xs); }

        /* Loading state */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            :root {
                --text-xs: 0.7rem;    /* 11px */
                --text-sm: 0.8rem;     /* 13px */
                --text-base: 0.9rem;    /* 14px */
                --text-lg: 1rem;        /* 16px */
                --text-xl: 1.1rem;      /* 18px */
                --text-2xl: 1.3rem;     /* 21px */
            }

            body { padding-bottom: 80px; }

            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .details-grid { grid-template-columns: 1fr; gap: 16px; }
            
            .balance-options { grid-template-columns: 1fr; gap: 6px; }
            .balance-card { padding: 10px; }
            
            .invest-button-desktop { display: none; }
            .invest-button-mobile { display: block; }
            
            .miner-image { height: 120px; }
            .tradingview-container { height: 200px; }
            
            .header-container { height: 56px; padding: 0 12px; }
            .logo img { height: 24px; }
            .balance-display { padding: 5px 10px; }
            
            .back-button { margin: 12px 0 4px; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 12px; }
            .stats-grid { gap: 1px; }
            .stat-item { padding: 12px 8px; }
            
            .balance-fiat { font-size: var(--text-base); }
            
            .miner-specs { grid-template-columns: 1fr 1fr; gap: 8px; }
            
            .notification-center {
                top: 12px;
                right: 12px;
                max-width: calc(100% - 24px);
            }
            
            .balance-display span:not(.balance-amount) { display: none; }
        }

        /* Hide mobile button on desktop */
        @media (min-width: 769px) {
            .invest-button-mobile { display: none; }
        }
    </style>
</head>
<body>
    <!-- Notification System -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span>BitHash</span>
            </div>
            
            <div class="balance-display" onclick="window.location.href='dashboard'">
                <i class="fas fa-wallet"></i>
                <span class="balance-amount" id="balanceAmount">$0.00</span>
                <div class="balance-asset" id="balanceAsset">
                    <img src="" id="balanceAssetLogo" alt="">
                    <span id="balanceAssetAmount">0.000000</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Back Button -->
        <div class="back-button">
            <a href="javascript:history.back()">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <div>Loading plan details...</div>
        </div>

        <!-- Content (hidden initially) -->
        <div id="content" style="display: none;">
            <!-- Plan Header -->
            <div class="plan-header">
                <h1 class="plan-title" id="planName"></h1>
                <div class="plan-subtitle" id="planDescription"></div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Min</div>
                    <div class="stat-value" id="minAmount">$0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Max</div>
                    <div class="stat-value" id="maxAmount">$0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Return</div>
                    <div class="stat-value positive" id="returnRate">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Duration</div>
                    <div class="stat-value" id="duration">0h</div>
                </div>
            </div>

            <!-- Two Column Grid -->
            <div class="details-grid">
                <!-- Miner Section -->
                <div class="miner-section">
                    <div class="miner-title">
                        <i class="fas fa-microchip"></i>
                        Miner
                    </div>
                    
                    <div class="miner-image">
                        <img src="" alt="Miner" id="minerImage">
                    </div>
                    
                    <div class="miner-specs" id="minerSpecs"></div>
                </div>

                <!-- Investment Section (Desktop) -->
                <div class="investment-section">
                    <div class="miner-title">
                        <i class="fas fa-cloud"></i>
                        Invest
                    </div>

                    <!-- Balance Selection -->
                    <div class="balance-options" id="balanceOptions"></div>

                    <!-- Investment Form -->
                    <div class="investment-form">
                        <div class="input-group">
                            <label>Amount (USD)</label>
                            <div class="input-wrapper">
                                <input type="number" id="investmentAmount" placeholder="Enter amount" step="1">
                            </div>
                            <div class="input-error" id="amountError"></div>
                            <div class="input-hint" id="amountHint"></div>
                        </div>

                        <!-- Expected Return -->
                        <div class="return-display">
                            <div class="return-fiat" id="expectedReturnFiat">$0.00</div>
                            <div class="return-crypto" id="expectedReturnCrypto">
                                <img src="" id="expectedReturnLogo" alt="">
                                <span id="expectedReturnAmount">0.000000 BTC</span>
                            </div>
                        </div>

                        <!-- Desktop Invest Button -->
                        <button class="invest-button-desktop" id="investButtonDesktop" disabled>
                            <i class="fas fa-cloud"></i>
                            Start Mining
                        </button>
                        <div class="investment-status" id="investmentStatus"></div>
                    </div>
                </div>
            </div>

            <!-- Chart Section (Optional on mobile) -->
            <div class="chart-section">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i>
                    BTC/USD
                </div>
                <div class="tradingview-container" id="tradingviewChart"></div>
            </div>

            <!-- Important Notice -->
            <div class="notice">
                <i class="fas fa-info-circle"></i>
                <div class="notice-content">
                    <div class="notice-title">Note</div>
                    <div class="notice-text">3% fee deducted at maturity. Daily payouts.</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Fixed Invest Button -->
    <div class="invest-button-mobile" id="mobileInvestContainer">
        <button id="investButtonMobile" disabled>
            <i class="fas fa-cloud"></i>
            Start Cloud Mining
        </button>
    </div>

    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <script>
        (function() {
            'use strict';

            // ===== CONFIGURATION =====
            const CONFIG = {
                API_BASE: 'https://bithash-backend.onrender.com/api',
                BTC_LOGO: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'
            };

            // ===== STATE =====
            const State = {
                sessionKey: null,
                planId: null,
                planData: null,
                userBalances: { main: 0, matured: 0 },
                preferences: { displayAsset: 'btc' },
                btcPrice: 43000,
                selectedBalance: null,
                selectedBalanceAmount: 0,
                isInvesting: false
            };

            // ===== NOTIFICATION SYSTEM =====
            const NotificationSystem = {
                queue: [],
                isShowing: false,

                show(type, title, message, duration = 4000) {
                    this.queue.push({ type, title, message, duration });
                    if (!this.isShowing) this.process();
                },

                process() {
                    if (this.queue.length === 0) { this.isShowing = false; return; }
                    
                    this.isShowing = true;
                    const { type, title, message, duration } = this.queue.shift();

                    const container = document.getElementById('notificationCenter');
                    const notification = document.createElement('div');
                    notification.className = `notification ${type}`;
                    notification.innerHTML = `
                        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                        <div class="notification-content">
                            <div class="notification-title">${title}</div>
                            <div class="notification-message">${message}</div>
                        </div>
                        <button class="notification-close">&times;</button>
                    `;

                    container.appendChild(notification);
                    setTimeout(() => notification.classList.add('show'), 10);

                    notification.querySelector('.notification-close').addEventListener('click', () => {
                        notification.classList.remove('show');
                        setTimeout(() => { notification.remove(); this.process(); }, 300);
                    });

                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.classList.remove('show');
                            setTimeout(() => { notification.remove(); this.process(); }, 300);
                        }
                    }, duration);
                }
            };

            // ===== UTILITIES =====
            const Utils = {
                formatUSD(amount) {
                    return '$' + parseFloat(amount || 0).toLocaleString('en-US', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });
                },

                formatNumber(num, decimals = 6) {
                    const value = parseFloat(num || 0);
                    if (value >= 1e9) return (value / 1e9).toFixed(2) + 'B';
                    if (value >= 1e6) return (value / 1e6).toFixed(2) + 'M';
                    if (value >= 1e3) return value.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                    return value.toFixed(decimals);
                },

                getAssetLogo() {
                    return CONFIG.BTC_LOGO;
                },

                parseURLParameters() {
                    const params = new URLSearchParams(window.location.search);
                    return {
                        session: params.get('session'),
                        v: params.get('v'),
                        ref: params.get('ref')
                    };
                },

                calculateReturn(amount, percentage) {
                    const fee = amount * 0.03;
                    const netAmount = amount - fee;
                    const profit = netAmount * (percentage / 100);
                    return netAmount + profit;
                },

                validateAmount(amount, min, max, balance) {
                    if (!amount || amount <= 0) return 'Enter valid amount';
                    if (amount < min) return `Min $${min.toLocaleString()}`;
                    if (amount > max) return `Max $${max.toLocaleString()}`;
                    if (amount > balance) return `Insufficient balance`;
                    return null;
                }
            };

            // ===== API =====
            const API = {
                async get(endpoint) {
                    const token = localStorage.getItem('jwtToken');
                    if (!token) throw new Error('No authentication token');
                    
                    const response = await fetch(`${CONFIG.API_BASE}${endpoint}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!response.ok) throw new Error(`API error: ${response.status}`);
                    return response.json();
                },

                async post(endpoint, body) {
                    const token = localStorage.getItem('jwtToken');
                    if (!token) throw new Error('No authentication token');
                    
                    const response = await fetch(`${CONFIG.API_BASE}${endpoint}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error(`API error: ${response.status}`);
                    return response.json();
                }
            };

            // ===== INITIALIZATION =====
            async function initialize() {
                try {
                    const params = Utils.parseURLParameters();
                    State.sessionKey = params.session;

                    if (!State.sessionKey) {
                        NotificationSystem.show('error', 'Error', 'Invalid session');
                        setTimeout(() => window.location.href = 'index.html', 1500);
                        return;
                    }

                    // Extract plan ID
                    const sessionParts = State.sessionKey.split('_');
                    State.planId = sessionParts[0];

                    const token = localStorage.getItem('jwtToken');
                    if (!token) {
                        NotificationSystem.show('error', 'Login Required', 'Please login to continue');
                        setTimeout(() => window.location.href = 'login', 1500);
                        return;
                    }

                    await Promise.all([
                        loadUserData(),
                        loadPlanDetails(),
                        loadBTCPrice()
                    ]);

                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('content').style.display = 'block';

                    initTradingViewChart();
                    setupEventListeners();

                } catch (error) {
                    console.error('Init error:', error);
                    NotificationSystem.show('error', 'Error', error.message);
                    document.getElementById('loadingState').innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="color: var(--error); font-size: 1.5rem;"></i>
                        <p>Failed to load</p>
                        <button onclick="location.reload()" style="
                            background: var(--accent);
                            border: none;
                            color: var(--bg-primary);
                            padding: 8px 16px;
                            border-radius: 8px;
                            font-size: 0.8rem;
                            cursor: pointer;
                        ">Retry</button>
                    `;
                }
            }

            async function loadUserData() {
                try {
                    const [balancesData, prefsData] = await Promise.all([
                        API.get('/users/balances'),
                        API.get('/users/preferences').catch(() => ({ data: { preferences: { displayAsset: 'btc' } } }))
                    ]);

                    State.userBalances = {
                        main: balancesData.data?.balances?.main || 0,
                        matured: balancesData.data?.balances?.matured || 0
                    };

                    State.preferences = {
                        displayAsset: prefsData.data?.preferences?.displayAsset || 'btc'
                    };

                    updateBalanceDisplay();

                } catch (error) {
                    console.error('Error loading user data:', error);
                }
            }

            async function loadPlanDetails() {
                try {
                    const response = await API.get('/plans');
                    const plans = response.data?.plans || [];
                    
                    State.planData = plans.find(p => p.id === State.planId);
                    
                    if (!State.planData) {
                        const index = parseInt(State.planId?.split('_')[1]) || 0;
                        State.planData = plans[index % plans.length];
                    }

                    if (!State.planData) throw new Error('Plan not found');
                    
                    renderPlanDetails();

                } catch (error) {
                    console.error('Error loading plan details:', error);
                    throw error;
                }
            }

            async function loadBTCPrice() {
                try {
                    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                    if (response.ok) {
                        const data = await response.json();
                        State.btcPrice = data.bitcoin.usd;
                    }
                } catch (error) {
                    console.error('Error loading BTC price:', error);
                }
            }

            // ===== RENDERING =====
            function renderPlanDetails() {
                const plan = State.planData;
                const planNames = ['Basic', 'Standard', 'Pro', 'Enterprise', 'Ultimate', 'Institutional'];
                const planIndex = parseInt(State.planId?.split('_')[1]) || 0;
                const planName = planNames[planIndex % planNames.length] || 'Cloud';

                document.getElementById('planName').textContent = `${planName} Plan`;
                document.getElementById('planDescription').textContent = `${plan.percentage}% return · ${plan.duration}h mining`;

                document.getElementById('minAmount').textContent = Utils.formatUSD(plan.minAmount);
                document.getElementById('maxAmount').textContent = Utils.formatUSD(plan.maxAmount);
                document.getElementById('returnRate').textContent = `+${plan.percentage}%`;
                document.getElementById('duration').textContent = `${plan.duration}h`;

                renderMinerDetails(planIndex);
                renderBalanceOptions();

                document.getElementById('amountHint').innerHTML = `
                    <i class="fas fa-info-circle"></i>
                    Min ${Utils.formatUSD(plan.minAmount)} · Max ${Utils.formatUSD(plan.maxAmount)}
                `;
            }

            function renderMinerDetails(index) {
                const miners = [
                    { name: "Avalon Mini 3", hash: "68 TH/s", power: "3.2kW", eff: "47 J/TH" },
                    { name: "Fluminer T3", hash: "110 TH/s", power: "3.25kW", eff: "29.5 J/TH" },
                    { name: "Avalon Q", hash: "150 TH/s", power: "3.42kW", eff: "22.8 J/TH" },
                    { name: "S21 Pro", hash: "234 TH/s", power: "5.44kW", eff: "23.2 J/TH" },
                    { name: "S21 XP", hash: "255 TH/s", power: "5.45kW", eff: "21.4 J/TH" },
                    { name: "S23 Hyd", hash: "335 TH/s", power: "5.30kW", eff: "15.8 J/TH" }
                ];

                const images = [
                    'https://www.dropbox.com/scl/fi/9b69f9sll2gj6ozzjb58d/WhatsApp-Image-2025-12-13-at-1.27.06-AM.jpeg?rlkey=ea4rqkom2ubwvwvki83yd3lgr&raw=1',
                    'https://www.dropbox.com/scl/fi/nmapzrnkx9kcvk839tzte/WhatsApp-Image-2026-01-12-at-11.43.02-AM.jpeg?rlkey=3tde1g2bnuyjnh4v26frl58rz&raw=1',
                    'https://www.dropbox.com/scl/fi/yvbb5aexy5ssxqlowadkl/WhatsApp-Image-l2026-01-12-at-11.43.03-AM.jpeg?rlkey=b4mks0p68perwqum12cg8841m&raw=1',
                    'https://www.dropbox.com/scl/fi/ya1o0lgg1l0tuzss619rg/WhatsApp-Imageg-2026-01-12-at-11.43.02-AM.jpeg?rlkey=s0du0qllprsui00c1fnoaemvy&raw=1',
                    'https://www.dropbox.com/scl/fi/v43ux1dnqj1usc6eocvsl/WhatsApp-Imagek-2026-01-12-at-11.43.02-AM.jpeg?rlkey=xqh93bl1onk3b2qiajezoxpje&raw=1',
                    'https://www.dropbox.com/scl/fi/lz60ouvvbr565du5afcwx/WhatsApp-Image-20l26-01-12-at-11.43.03-AM.jpeg?rlkey=dgnhcskve2p0gq6npr2igjidf&raw=1'
                ];

                const miner = miners[index % miners.length];
                
                document.getElementById('minerImage').src = images[index % images.length];
                document.getElementById('minerImage').onerror = function() { 
                    this.src = CONFIG.BTC_LOGO; 
                };

                document.getElementById('minerSpecs').innerHTML = `
                    <div class="miner-spec"><span class="spec-label">Model</span><span class="spec-value">${miner.name}</span></div>
                    <div class="miner-spec"><span class="spec-label">Hash</span><span class="spec-value">${miner.hash}</span></div>
                    <div class="miner-spec"><span class="spec-label">Power</span><span class="spec-value">${miner.power}</span></div>
                    <div class="miner-spec"><span class="spec-label">Efficiency</span><span class="spec-value">${miner.eff}</span></div>
                `;
            }

            function renderBalanceOptions() {
                const container = document.getElementById('balanceOptions');
                const minAmount = State.planData?.minAmount || 0;
                
                const assetLogo = Utils.getAssetLogo();
                const assetSymbol = State.preferences.displayAsset.toUpperCase();

                const mainCrypto = State.btcPrice > 0 ? State.userBalances.main / State.btcPrice : 0;
                const maturedCrypto = State.btcPrice > 0 ? State.userBalances.matured / State.btcPrice : 0;

                container.innerHTML = `
                    <div class="balance-card ${State.userBalances.main >= minAmount ? '' : 'disabled'}" 
                         data-balance="main" data-amount="${State.userBalances.main}">
                        <div class="balance-type">
                            <i class="fas fa-wallet"></i> Main
                        </div>
                        <div class="balance-fiat">${Utils.formatUSD(State.userBalances.main)}</div>
                        <div class="balance-crypto">
                            <img src="${assetLogo}" alt=""> ${Utils.formatNumber(mainCrypto)} ${assetSymbol}
                        </div>
                    </div>
                    <div class="balance-card ${State.userBalances.matured >= minAmount ? '' : 'disabled'}" 
                         data-balance="matured" data-amount="${State.userBalances.matured}">
                        <div class="balance-type">
                            <i class="fas fa-piggy-bank"></i> Matured
                        </div>
                        <div class="balance-fiat">${Utils.formatUSD(State.userBalances.matured)}</div>
                        <div class="balance-crypto">
                            <img src="${assetLogo}" alt=""> ${Utils.formatNumber(maturedCrypto)} ${assetSymbol}
                        </div>
                    </div>
                `;

                // Add click handlers
                document.querySelectorAll('.balance-card').forEach(card => {
                    card.addEventListener('click', () => {
                        if (!card.classList.contains('disabled')) {
                            const balance = card.dataset.balance;
                            const amount = parseFloat(card.dataset.amount);
                            selectBalance(balance, amount);
                        }
                    });
                });

                // Auto-select
                if (State.userBalances.main >= minAmount) {
                    selectBalance('main', State.userBalances.main);
                } else if (State.userBalances.matured >= minAmount) {
                    selectBalance('matured', State.userBalances.matured);
                }
            }

            function selectBalance(type, amount) {
                document.querySelectorAll('.balance-card').forEach(c => c.classList.remove('selected'));
                const selectedCard = document.querySelector(`.balance-card[data-balance="${type}"]`);
                if (selectedCard) {
                    selectedCard.classList.add('selected');
                    State.selectedBalance = type;
                    State.selectedBalanceAmount = amount;

                    const minAmount = State.planData?.minAmount || 0;
                    const input = document.getElementById('investmentAmount');
                    input.value = minAmount;
                    input.max = Math.min(State.planData?.maxAmount || Infinity, amount);
                    
                    validateInvestment();
                }
            }

            function updateBalanceDisplay() {
                const total = State.userBalances.main + State.userBalances.matured;
                document.getElementById('balanceAmount').textContent = Utils.formatUSD(total);

                if (State.btcPrice > 0) {
                    const cryptoAmount = total / State.btcPrice;
                    document.getElementById('balanceAssetLogo').src = Utils.getAssetLogo();
                    document.getElementById('balanceAssetAmount').textContent = Utils.formatNumber(cryptoAmount);
                }
            }

            function updateExpectedReturn() {
                const amount = parseFloat(document.getElementById('investmentAmount').value) || 0;
                const percentage = State.planData?.percentage || 0;
                
                if (amount > 0) {
                    const totalReturn = Utils.calculateReturn(amount, percentage);
                    document.getElementById('expectedReturnFiat').textContent = Utils.formatUSD(totalReturn);

                    if (State.btcPrice > 0) {
                        const cryptoAmount = totalReturn / State.btcPrice;
                        document.getElementById('expectedReturnLogo').src = Utils.getAssetLogo();
                        document.getElementById('expectedReturnAmount').textContent = 
                            `${Utils.formatNumber(cryptoAmount)} BTC`;
                    }
                } else {
                    document.getElementById('expectedReturnFiat').textContent = '$0.00';
                    document.getElementById('expectedReturnAmount').textContent = '0.000000 BTC';
                }
            }

            function validateInvestment() {
                const amount = parseFloat(document.getElementById('investmentAmount').value) || 0;
                const minAmount = State.planData?.minAmount || 0;
                const maxAmount = State.planData?.maxAmount || 0;
                const errorEl = document.getElementById('amountError');
                const desktopBtn = document.getElementById('investButtonDesktop');
                const mobileBtn = document.getElementById('investButtonMobile');

                const error = Utils.validateAmount(amount, minAmount, maxAmount, State.selectedBalanceAmount);
                
                if (error) {
                    errorEl.textContent = error;
                    desktopBtn.disabled = true;
                    mobileBtn.disabled = true;
                } else {
                    errorEl.textContent = '';
                    desktopBtn.disabled = false;
                    mobileBtn.disabled = false;
                }

                updateExpectedReturn();
            }

            // ===== INVESTMENT SUBMISSION =====
            async function submitInvestment() {
                if (State.isInvesting) {
                    NotificationSystem.show('error', 'Processing', 'Please wait');
                    return;
                }

                const amount = parseFloat(document.getElementById('investmentAmount').value);
                const error = Utils.validateAmount(amount, State.planData.minAmount, State.planData.maxAmount, State.selectedBalanceAmount);
                
                if (error) {
                    NotificationSystem.show('error', 'Invalid Amount', error);
                    return;
                }

                State.isInvesting = true;
                const desktopBtn = document.getElementById('investButtonDesktop');
                const mobileBtn = document.getElementById('investButtonMobile');
                const statusEl = document.getElementById('investmentStatus');
                
                desktopBtn.disabled = true;
                mobileBtn.disabled = true;
                statusEl.textContent = 'Processing...';
                statusEl.style.color = 'var(--accent)';

                try {
                    await API.post('/investments', {
                        planId: State.planData.id,
                        amount: amount,
                        balanceType: State.selectedBalance,
                        sessionKey: State.sessionKey
                    });

                    statusEl.textContent = 'Success! Redirecting...';
                    statusEl.style.color = 'var(--success)';
                    
                    NotificationSystem.show('success', 'Investment Created', 
                        `${Utils.formatUSD(amount)} invested successfully`);

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);

                } catch (error) {
                    console.error('Investment error:', error);
                    statusEl.textContent = error.message || 'Failed';
                    statusEl.style.color = 'var(--error)';
                    
                    NotificationSystem.show('error', 'Investment Failed', error.message);

                    State.isInvesting = false;
                    desktopBtn.disabled = false;
                    mobileBtn.disabled = false;
                }
            }

            // ===== TRADINGVIEW =====
            function initTradingViewChart() {
                if (typeof TradingView !== 'undefined') {
                    new TradingView.widget({
                        "width": "100%",
                        "height": "100%",
                        "symbol": "BITSTAMP:BTCUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "allow_symbol_change": false,
                        "container_id": "tradingviewChart",
                        "hide_side_toolbar": true,
                        "studies": [],
                        "show_popup_button": false
                    });
                }
            }

            // ===== EVENT LISTENERS =====
            function setupEventListeners() {
                const amountInput = document.getElementById('investmentAmount');
                amountInput.addEventListener('input', validateInvestment);
                
                document.getElementById('investButtonDesktop').addEventListener('click', submitInvestment);
                document.getElementById('investButtonMobile').addEventListener('click', submitInvestment);
            }

            // Start
            document.addEventListener('DOMContentLoaded', initialize);

        })();
    </script>
</body>
</html>
