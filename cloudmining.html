<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitHash Cloud Mining - Investment Panel</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Widget -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #dc3545;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --blue-translucent: rgba(26, 115, 232, 0.25);
            --blue-translucent-hover: rgba(26, 115, 232, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Notification System */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }

        .notification {
            padding: 16px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            opacity: 0;
            transition: var(--transition);
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.success {
            background: #d4edda;
            color: #155724;
            border-left-color: var(--success);
        }

        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: var(--error);
        }

        .notification i {
            font-size: 1.2rem;
        }

        .notification-close {
            margin-left: auto;
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition);
        }

        .notification-close:hover {
            opacity: 1;
        }

        /* Main Container */
        .investment-panel {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--light);
        }

        /* Header Section - Minimal */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-light);
        }

        .plan-title {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary) 0%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .plan-subtitle {
            color: var(--gray);
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .close-panel {
            background: var(--gray-lighter);
            border: none;
            color: var(--dark);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .close-panel:hover {
            background: var(--error);
            transform: rotate(90deg);
        }

        /* Main Grid Layout - Exactly Like Modal */
        .investment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* Left Column */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Plan Specifications Card */
        .specs-card {
            background: var(--lighter);
            border-radius: var(--border-radius-lg);
            padding: 25px;
            border: 1px solid var(--gray-light);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .spec-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: var(--border-radius);
            border-left: 3px solid var(--primary);
        }

        .spec-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark);
        }

        .spec-value.success {
            color: var(--success);
        }

        /* Balance Selection Card */
        .balance-card {
            background: var(--lighter);
            border-radius: var(--border-radius-lg);
            padding: 25px;
            border: 1px solid var(--gray-light);
        }

        .balance-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .balance-option {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--border-radius);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .balance-option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }

        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-option-label {
            font-weight: 600;
            color: var(--dark);
        }

        .balance-option-asset {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .balance-option-asset-logo {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .balance-option-asset-symbol {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .balance-amount-fiat {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }

        .balance-amount-asset {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .balance-amount-asset-logo {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* Investment Form */
        .investment-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            color: var(--dark);
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .amount-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 5px;
            min-height: 20px;
        }

        /* Expected Return Display */
        .expected-return {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .expected-return-fiat {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            font-family: 'Manrope', sans-serif;
            margin-bottom: 5px;
        }

        .expected-return-asset {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .expected-return-asset-logo {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        /* Invest Button */
        .invest-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: var(--border-radius);
            color: var(--darker);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .invest-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 216, 255, 0.3);
        }

        .invest-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .investment-status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* Miner Details Card */
        .miner-card {
            background: var(--lighter);
            border-radius: var(--border-radius-lg);
            padding: 25px;
            border: 1px solid var(--gray-light);
        }

        .miner-image {
            width: 100%;
            height: 200px;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .miner-image img {
            width: auto;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .miner-specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .miner-spec-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: var(--border-radius);
        }

        .miner-spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .miner-spec-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--dark);
        }

        /* TradingView Chart Card */
        .chart-card {
            background: var(--lighter);
            border-radius: var(--border-radius-lg);
            padding: 25px;
            border: 1px solid var(--gray-light);
        }

        .tradingview-container {
            width: 100%;
            height: 350px;
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-top: 15px;
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .investment-grid {
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .investment-grid {
                grid-template-columns: 1fr;
            }
            
            .investment-panel {
                padding: 20px 15px;
            }
            
            .plan-title {
                font-size: 1.6rem;
            }
            
            .specs-grid {
                grid-template-columns: 1fr;
            }
            
            .miner-specs-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .tradingview-container {
                height: 250px;
            }
            
            .expected-return-fiat {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .miner-specs-grid {
                grid-template-columns: 1fr;
            }
            
            .balance-option-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .balance-amount-fiat {
                font-size: 1.2rem;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--lighter);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray);
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Plan Details...</div>
    </div>

    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>

    <!-- Main Investment Panel -->
    <div class="investment-panel">
        <!-- Header -->
        <div class="panel-header">
            <div>
                <h1 class="plan-title" id="planTitle">Loading...</h1>
                <div class="plan-subtitle" id="planSubtitle">Bitcoin Cloud Mining Plan</div>
            </div>
            <button class="close-panel" onclick="closePanel()" title="Return to Dashboard">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Main Grid -->
        <div class="investment-grid">
            <!-- Left Column -->
            <div class="left-column">
                <!-- Plan Specifications -->
                <div class="specs-card">
                    <div class="card-title">
                        <i class="fas fa-info-circle"></i>
                        Plan Specifications
                    </div>
                    <div class="specs-grid" id="specsGrid">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <!-- Balance Selection & Investment Form -->
                <div class="balance-card">
                    <div class="card-title">
                        <i class="fas fa-wallet"></i>
                        Select Balance
                    </div>
                    
                    <div class="balance-options" id="balanceOptions">
                        <!-- Dynamically populated -->
                    </div>

                    <div class="investment-form">
                        <div class="form-group">
                            <label>Investment Amount ($)</label>
                            <input type="number" class="form-control" id="investmentAmount" placeholder="Enter amount">
                            <div class="amount-error" id="amountError"></div>
                        </div>

                        <div class="expected-return">
                            <div class="expected-return-fiat" id="expectedReturnFiat">$0.00</div>
                            <div class="expected-return-asset" id="expectedReturnAsset">
                                <img src="" class="expected-return-asset-logo" id="expectedReturnLogo" style="display: none;">
                                <span id="expectedReturnText">0.000000 BTC</span>
                            </div>
                        </div>

                        <button class="invest-btn" id="investBtn" onclick="processInvestment()">
                            <i class="fas fa-cloud"></i>
                            Start Cloud Mining
                        </button>
                        <div class="investment-status" id="investmentStatus"></div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="right-column">
                <!-- Miner Details -->
                <div class="miner-card">
                    <div class="card-title">
                        <i class="fas fa-microchip"></i>
                        Miner Specifications
                    </div>
                    
                    <div class="miner-image" id="minerImage">
                        <!-- Dynamically populated -->
                    </div>
                    
                    <div class="miner-specs-grid" id="minerSpecs">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <!-- TradingView Chart -->
                <div class="chart-card">
                    <div class="card-title">
                        <i class="fas fa-chart-line"></i>
                        BTC/USD Chart
                    </div>
                    <div class="tradingview-container" id="tradingviewChart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // GLOBAL STATE
        // =============================================
        const AppState = {
            planId: null,
            minAmount: 0,
            maxAmount: 0,
            percentage: 0,
            duration: 0,
            planName: '',
            planIndex: 0,
            selectedBalance: null,
            selectedBalanceAmount: 0,
            userBalances: { main: 0, matured: 0 },
            currentPrices: {},
            currentBTCPrice: 43000,
            userPreferences: { displayAsset: 'btc' },
            isProcessing: false
        };

        // Top Assets for logos
        const topAssets = [
            { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin' },
            { id: 'ethereum', symbol: 'eth', name: 'Ethereum' }
        ];

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Get plan details from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            AppState.planId = urlParams.get('planId');
            AppState.minAmount = parseFloat(urlParams.get('min')) || 0;
            AppState.maxAmount = parseFloat(urlParams.get('max')) || 0;
            AppState.percentage = parseFloat(urlParams.get('percentage')) || 0;
            AppState.duration = parseInt(urlParams.get('duration')) || 0;
            AppState.planName = urlParams.get('name') || 'Cloud Mining Plan';
            AppState.planIndex = parseInt(urlParams.get('index')) || 0;

            // Check authentication
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Authentication Required', 'Please login to continue');
                setTimeout(() => {
                    window.location.href = 'login';
                }, 2000);
                return;
            }

            // Load initial data
            await Promise.all([
                fetchUserBalances(),
                fetchUserPreferences(),
                fetchCurrentPrices()
            ]);

            // Render the panel
            renderPanel();
            
            // Hide loading overlay
            document.getElementById('loadingOverlay').classList.add('hidden');
        });

        // =============================================
        // API CALLS
        // =============================================
        async function fetchUserBalances() {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    AppState.userBalances.main = data.data?.balances?.main || 0;
                    AppState.userBalances.matured = data.data?.balances?.matured || 0;
                }
            } catch (error) {
                console.error('Error fetching balances:', error);
            }
        }

        async function fetchUserPreferences() {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch('https://bithash-backend.onrender.com/api/users/preferences', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    AppState.userPreferences.displayAsset = data.data?.preferences?.displayAsset || 'btc';
                }
            } catch (error) {
                console.error('Error fetching preferences:', error);
            }
        }

        async function fetchCurrentPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                if (response.ok) {
                    const data = await response.json();
                    AppState.currentBTCPrice = data.bitcoin?.usd || 43000;
                    AppState.currentPrices.bitcoin = { usd: AppState.currentBTCPrice };
                }
            } catch (error) {
                console.error('Error fetching prices:', error);
            }
        }

        function getAssetLogo(symbol) {
            const logos = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png'
            };
            return logos[symbol.toLowerCase()] || logos.btc;
        }

        // =============================================
        // RENDERING
        // =============================================
        function renderPanel() {
            // Set titles
            document.getElementById('planTitle').textContent = AppState.planName;
            document.getElementById('planSubtitle').textContent = `Bitcoin Cloud Mining Plan with ${AppState.percentage}% Return`;

            // Render specifications
            renderSpecifications();

            // Render balance options
            renderBalanceOptions();

            // Render miner details
            renderMinerDetails();

            // Initialize TradingView chart
            initializeTradingViewChart();

            // Set up input listener
            document.getElementById('investmentAmount').addEventListener('input', handleAmountInput);
        }

        function renderSpecifications() {
            const minFormatted = AppState.minAmount.toLocaleString('en-US');
            const maxFormatted = AppState.maxAmount.toLocaleString('en-US');
            const miningFee = (AppState.minAmount * 0.03).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const specsGrid = document.getElementById('specsGrid');
            specsGrid.innerHTML = `
                <div class="spec-item">
                    <div class="spec-label">Investment Range</div>
                    <div class="spec-value">$${minFormatted} - $${maxFormatted}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Return Rate</div>
                    <div class="spec-value success">+${AppState.percentage}%</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Duration</div>
                    <div class="spec-value">${AppState.duration} hours</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Minimum Investment</div>
                    <div class="spec-value">$${minFormatted}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Maximum Investment</div>
                    <div class="spec-value">$${maxFormatted}</div>
                </div>
                <div class="spec-item">
                    <div class="spec-label">Company Fee</div>

            const maturedBalance = AppState.userBalances.matured;

                <div class="balance-option ${maturedBalance >= AppState.minAmount ? '' : 'disabled'}" 
                     onclick="selectBalance('matured', ${maturedBalance})">

                    <div class="balance-amount-asset">

        // =============================================
        // BALANCE SELECTION
        // =============================================
        function selectBalance(type, amount) {
            const options = document.querySelectorAll('.balance-option');
            options.forEach(opt => opt.classList.remove('selected'));

            const selectedOption = document.querySelector(`.balance-option[onclick*="${type}"]`);
            if (selectedOption && !selectedOption.classList.contains('disabled')) {
                selectedOption.classList.add('selected');
                AppState.selectedBalance = type;
                AppState.selectedBalanceAmount = amount;

                const input = document.getElementById('investmentAmount');
                input.value = AppState.minAmount;
                input.min = AppState.minAmount;
                input.max = Math.min(AppState.maxAmount, amount);
                
                validateAmount(AppState.minAmount);
                updateExpectedReturn(AppState.minAmount);
            }
        }

        // =============================================
        // AMOUNT HANDLING
        // =============================================
        function handleAmountInput(e) {
            const amount = parseFloat(e.target.value) || 0;
            validateAmount(amount);
            updateExpectedReturn(amount);
        }

        function validateAmount(amount) {
            const errorElement = document.getElementById('amountError');
            const investBtn = document.getElementById('investBtn');

            if (!AppState.selectedBalance) {
                errorElement.textContent = 'Please select a balance first';
                investBtn.disabled = true;
                return false;
            }

            if (isNaN(amount) || amount <= 0) {
                errorElement.textContent = 'Please enter a valid amount';
                investBtn.disabled = true;
                return false;
            }

            if (amount < AppState.minAmount) {
                errorElement.textContent = `Minimum investment is $${AppState.minAmount.toLocaleString('en-US')}`;
                investBtn.disabled = true;
                return false;
            }

            if (amount > AppState.maxAmount) {
                errorElement.textContent = `Maximum investment is $${AppState.maxAmount.toLocaleString('en-US')}`;
                investBtn.disabled = true;
                return false;
            }

            if (amount > AppState.selectedBalanceAmount) {
                const formatted = AppState.selectedBalanceAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                errorElement.textContent = `Insufficient balance. Available: $${formatted}`;
                investBtn.disabled = true;
                return false;
            }

            errorElement.textContent = '';
            investBtn.disabled = false;
            return true;
        }

        function updateExpectedReturn(amount) {
            const miningFee = amount * 0.03;
            const netInvestment = amount - miningFee;
            const totalReturn = netInvestment + (netInvestment * AppState.percentage / 100);

            const fiatElement = document.getElementById('expectedReturnFiat');
            const assetTextElement = document.getElementById('expectedReturnText');
            const logoElement = document.getElementById('expectedReturnLogo');

            fiatElement.textContent = `$${totalReturn.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            const asset = AppState.userPreferences.displayAsset;
            const assetLogo = getAssetLogo(asset);
            const price = AppState.currentBTCPrice;

            if (price && price > 0) {
                const assetAmount = totalReturn / price;
                logoElement.style.display = 'inline-block';
                logoElement.src = assetLogo;
                assetTextElement.textContent = `${assetAmount.toFixed(6)} ${asset.toUpperCase()}`;
            } else {
                logoElement.style.display = 'none';
                assetTextElement.textContent = `0.000000 ${asset.toUpperCase()}`;
            }
        }

        // =============================================
        // INVESTMENT PROCESSING
        // =============================================
        async function processInvestment() {
            if (AppState.isProcessing) return;

            const amount = parseFloat(document.getElementById('investmentAmount').value);
            
            if (!validateAmount(amount)) return;

            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Session Expired', 'Please login again');
                setTimeout(() => window.location.href = 'login', 1500);
                return;
            }

            AppState.isProcessing = true;
            const investBtn = document.getElementById('investBtn');
            const statusElement = document.getElementById('investmentStatus');

            investBtn.disabled = true;
            statusElement.textContent = 'Processing your cloud mining investment...';
            statusElement.style.color = 'var(--primary)';

            try {
                const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        planId: AppState.planId,
                        amount: amount,
                        balanceType: AppState.selectedBalance
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusElement.textContent = 'Investment successful! Redirecting...';
                    statusElement.style.color = 'var(--success)';
                    
                    showNotification('success', 'Success!', 
                        `Your cloud mining investment of $${amount.toLocaleString('en-US')} has been created.`);

                    // Redirect back to index.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Investment failed');
                }
            } catch (error) {
                console.error('Investment error:', error);
                statusElement.textContent = error.message || 'Failed to create investment';
                statusElement.style.color = 'var(--error)';
                investBtn.disabled = false;
                
                showNotification('error', 'Investment Failed', error.message || 'Please try again');
            } finally {
                AppState.isProcessing = false;
            }
        }

        // =============================================
        // NOTIFICATION SYSTEM
        // =============================================
        function showNotification(type, title, message) {
            const container = document.getElementById('notificationCenter');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <div>
                    <strong>${title}</strong><br>
                    <small>${message}</small>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">&times;</div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

        // =============================================
        // PANEL CLOSE
        // =============================================
        function closePanel() {
            window.location.href = 'index.html';
        }

        // Make functions globally available
        window.selectBalance = selectBalance;
        window.processInvestment = processInvestment;
        window.closePanel = closePanel;
        window.showNotification = showNotification;
    </script>
