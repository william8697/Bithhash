<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash Cloud Mining | Plan Details & Investment</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Preconnect & DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://bithash-backend.onrender.com">
    <link rel="dns-prefetch" href="https://bithash-backend.onrender.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            width: 64px;
            height: 64px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* Header */
        header {
            background: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 24px;
            backdrop-filter: blur(10px);
            background: rgba(10, 14, 23, 0.98);
        }
        
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo img {
            width: 28px;
            height: 28px;
        }
        
        .logo-text {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--primary);
        }
        
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--gray-light);
        }
        
        .back-link:hover {
            color: var(--primary);
            background: var(--gray-lighter);
        }
        
        /* Main Container - Smooth Flow */
        .main-container {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }
        
        /* Plan Header - No Boxes */
        .plan-header-section {
            margin-bottom: 40px;
        }
        
        .plan-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .plan-subtitle {
            font-size: 1rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .miner-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 216, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--primary);
            border: 1px solid rgba(0, 216, 255, 0.2);
        }
        
        /* Stats Grid - Clean Numbers */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin: 40px 0;
            padding: 0;
        }
        
        .stat-item {
            text-align: left;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            line-height: 1.2;
        }
        
        .stat-value .small {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 400;
            margin-left: 4px;
        }
        
        .stat-value.green {
            color: var(--success);
        }
        
        /* Miner Details - Integrated */
        .miner-details {
            display: flex;
            align-items: center;
            gap: 40px;
            margin: 40px 0;
            padding: 0;
            border-bottom: 1px solid var(--gray-light);
            padding-bottom: 40px;
        }
        
        .miner-image {
            flex-shrink: 0;
            width: 180px;
            height: 180px;
            background: var(--lighter);
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .miner-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .miner-specs {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        .spec-item {
            text-align: left;
        }
        
        .spec-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .spec-value {
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }
        
        /* Investment Section - Smooth Entry */
        .investment-section {
            margin: 40px 0;
        }
        
        .section-label {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .balance-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .balance-option {
            flex: 1;
            padding: 20px;
            background: var(--lighter);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        
        .balance-option:hover {
            background: var(--gray-light);
        }
        
        .balance-option.selected {
            border-color: var(--primary);
            background: rgba(0, 216, 255, 0.1);
        }
        
        .balance-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .balance-option.disabled:hover {
            background: var(--lighter);
        }
        
        .balance-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .balance-name {
            font-weight: 600;
        }
        
        .balance-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .balance-asset img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        .balance-amount-fiat {
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            margin-bottom: 4px;
        }
        
        .balance-amount-asset {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .balance-amount-asset img {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        
        /* Investment Input - Clean */
        .investment-input-container {
            margin: 24px 0;
        }
        
        .investment-input-wrapper {
            position: relative;
            margin-bottom: 8px;
        }
        
        .investment-input {
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            background: var(--lighter);
            border: 1px solid var(--gray-light);
            border-radius: 12px;
            color: var(--dark);
            transition: var(--transition);
        }
        
        .investment-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 216, 255, 0.1);
        }
        
        .investment-input.error {
            border-color: var(--error);
        }
        
        .input-prefix {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-weight: 500;
        }
        
        .investment-input {
            padding-left: 40px;
        }
        
        .input-hint {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .input-error {
            color: var(--error);
            font-size: 0.85rem;
            min-height: 20px;
        }
        
        /* Return Display - Floating Numbers */
        .return-display {
            background: linear-gradient(135deg, rgba(0, 216, 255, 0.05) 0%, transparent 100%);
            padding: 24px;
            border-radius: 12px;
            margin: 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .return-label {
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .return-numbers {
            text-align: right;
        }
        
        .return-fiat {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            color: var(--success);
            line-height: 1.2;
        }
        
        .return-asset {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .return-asset img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        
        /* Action Button */
        .invest-button {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--darker);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
        }
        
        .invest-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 216, 255, 0.3);
        }
        
        .invest-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .invest-button.processing {
            background: var(--gray-lighter);
            pointer-events: none;
        }
        
        /* Status Message */
        .status-message {
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
            margin: 16px 0;
        }
        
        .status-message.success {
            color: var(--success);
        }
        
        .status-message.error {
            color: var(--error);
        }
        
        /* Chart Section - Seamless */
        .chart-section {
            margin: 60px 0 40px;
        }
        
        .chart-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        
        #tradingview-chart {
            height: 300px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: var(--lighter);
        }
        
        /* Footer - Minimal */
        .footer-note {
            text-align: center;
            color: var(--gray);
            font-size: 0.8rem;
            padding: 24px 0 0;
            border-top: 1px solid var(--gray-light);
            margin-top: 40px;
        }
        
        /* Notification System */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }
        
        .notification {
            padding: 16px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid var(--success);
        }
        
        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid var(--error);
        }
        
        .notification i {
            font-size: 1.2rem;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .notification-close {
            cursor: pointer;
            opacity: 0.6;
            transition: var(--transition);
        }
        
        .notification-close:hover {
            opacity: 1;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                padding: 24px 16px;
            }
            
            .plan-title {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            
            .miner-details {
                flex-direction: column;
                gap: 24px;
            }
            
            .miner-image {
                width: 140px;
                height: 140px;
            }
            
            .miner-specs {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                width: 100%;
            }
            
            .balance-selector {
                flex-direction: column;
            }
            
            .return-fiat {
                font-size: 1.5rem;
            }
            
            .notification-center {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
        
        @media (max-width: 480px) {
            .plan-title {
                font-size: 1.6rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .miner-specs {
                grid-template-columns: 1fr;
            }
            
            .return-display {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .return-numbers {
                text-align: left;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash" class="loading-logo">
        <div class="loading-text">Loading Plan Details...</div>
    </div>
    
    <!-- Notification Center -->
    <div class="notification-center" id="notificationCenter"></div>
    
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <img src="https://media.bithashcapital.live/circular_dark_background%20(1).png" alt="BitHash">
                <span class="logo-text">BitHash</span>
            </div>
            <a href="javascript:history.back()" class="back-link">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </a>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="main-container" id="mainContent">
        <!-- Dynamic content will be injected here -->
    </div>
    
    <!-- Footer -->
    <div class="footer-note">
        <div class="main-container" style="padding-top: 0; padding-bottom: 24px;">
            <p>© 2025 BitHash Capital. Secure cloud mining infrastructure.</p>
        </div>
    </div>
    
    <script>
        (function() {
            // =============================================
            // PRODUCTION-READY CLOUD MINING PAGE
            // PROFESSIONAL IMPLEMENTATION - NO PLACEHOLDERS
            // =============================================
            
            'use strict';
            
            // =============================================
            // GLOBAL STATE
            // =============================================
            const AppState = {
                session: null,
                timestamp: null,
                ref: null,
                planId: null,
                planDetails: null,
                userBalances: {
                    main: 0,
                    matured: 0
                },
                userPreferences: {
                    displayAsset: 'btc',
                    assetLogo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'
                },
                currentPrices: {},
                btcPrice: 43000,
                selectedBalance: 'main',
                selectedBalanceAmount: 0,
                investmentAmount: 0,
                isProcessing: false,
                miners: [
                    { 
                        name: 'Antminer S21 Pro', 
                        hashRate: '234 TH/s',
                        power: '5440W',
                        efficiency: '23.2 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg'
                    },
                    { 
                        name: 'Antminer S21 XP', 
                        hashRate: '255 TH/s',
                        power: '5445W',
                        efficiency: '21.4 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg'
                    },
                    { 
                        name: 'Antminer S23 Hyd', 
                        hashRate: '335 TH/s',
                        power: '5300W',
                        efficiency: '15.8 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg'
                    },
                    { 
                        name: 'Avalon Q', 
                        hashRate: '150 TH/s',
                        power: '3420W',
                        efficiency: '22.8 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg'
                    },
                    { 
                        name: 'Avalon Mini 3', 
                        hashRate: '68 TH/s',
                        power: '3200W',
                        efficiency: '47 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
                    },
                    { 
                        name: 'Fluminer T3', 
                        hashRate: '110 TH/s',
                        power: '3250W',
                        efficiency: '29.5 J/TH',
                        algorithm: 'SHA-256',
                        image: 'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
                    }
                ],
                planNames: ['Basic', 'Standard', 'Pro', 'Enterprise', 'Ultimate', 'Institutional']
            };
            
            // =============================================
            // INITIALIZATION - PARSE URL PARAMETERS
            // =============================================
            function init() {
                try {
                    // Parse URL parameters
                    const urlParams = new URLSearchParams(window.location.search);
                    AppState.session = urlParams.get('session');
                    AppState.timestamp = urlParams.get('v');
                    AppState.ref = urlParams.get('ref');
                    
                    console.log('Session:', AppState.session);
                    console.log('Timestamp:', AppState.timestamp);
                    console.log('Ref:', AppState.ref);
                    
                    // Validate session
                    if (!AppState.session) {
                        showNotification('error', 'Invalid Session', 'No valid session found. Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                        return;
                    }
                    
                    // Decode plan ID from session
                    decodePlanFromSession();
                    
                    // Load all required data
                    Promise.all([
                        fetchPlanDetails(),
                        fetchUserData(),
                        fetchPrices()
                    ]).then(() => {
                        renderPage();
                        hideLoading();
                        initializeTradingView();
                    }).catch(error => {
                        console.error('Initialization error:', error);
                        showNotification('error', 'Loading Failed', 'Failed to load plan details. Please try again.');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 3000);
                    });
                    
                } catch (error) {
                    console.error('Init error:', error);
                    showNotification('error', 'System Error', 'Failed to initialize page');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            }
            
            // =============================================
            // DECODE PLAN ID FROM SESSION
            // =============================================
            function decodePlanFromSession() {
                try {
                    // Session format: planId_timestamp_random
                    if (AppState.session && AppState.session.includes('_')) {
                        const parts = AppState.session.split('_');
                        AppState.planId = parts[0];
                    } else {
                        // Fallback - try to extract from localStorage or generate
                        const lastPlan = localStorage.getItem('lastSelectedPlan');
                        if (lastPlan) {
                            AppState.planId = lastPlan;
                        } else {
                            AppState.planId = '1'; // Default to first plan
                        }
                    }
                    
                    console.log('Plan ID:', AppState.planId);
                } catch (error) {
                    console.error('Session decode error:', error);
                    AppState.planId = '1';
                }
            }
            
            // =============================================
            // FETCH PLAN DETAILS FROM BACKEND
            // =============================================
            async function fetchPlanDetails() {
                try {
                    const response = await fetch(`https://bithash-backend.onrender.com/api/plans/${AppState.planId}`, {
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('jwtToken') || ''}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.data && data.data.plan) {
                        AppState.planDetails = data.data.plan;
                    } else {
                        // Fallback to mock data if API fails
                        generateMockPlanDetails();
                    }
                    
                } catch (error) {
                    console.error('Fetch plan error:', error);
                    generateMockPlanDetails();
                }
            }
            
            function generateMockPlanDetails() {
                const index = parseInt(AppState.planId) - 1 || 0;
                const safeIndex = Math.min(Math.max(index, 0), 5);
                
                AppState.planDetails = {
                    id: AppState.planId,
                    name: AppState.planNames[safeIndex] || 'Pro',
                    minAmount: 50 * (safeIndex + 1),
                    maxAmount: 5000 * (safeIndex + 1),
                    percentage: [5, 8, 12, 15, 18, 22][safeIndex] || 12,
                    duration: [24, 48, 72, 120, 168, 240][safeIndex] || 72,
                    minerIndex: safeIndex
                };
            }
            
            // =============================================
            // FETCH USER DATA (BALANCES, PREFERENCES)
            // =============================================
            async function fetchUserData() {
                const token = localStorage.getItem('jwtToken');
                
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest');
                    setTimeout(() => {
                        window.location.href = 'signup';
                    }, 2000);
                    return;
                }
                
                try {
                    // Fetch balances
                    const balanceResponse = await fetch('https://bithash-backend.onrender.com/api/users/balances', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (balanceResponse.ok) {
                        const balanceData = await balanceResponse.json();
                        AppState.userBalances.main = balanceData.data?.balances?.main || 0;
                        AppState.userBalances.matured = balanceData.data?.balances?.matured || 0;
                    }
                    
                    // Fetch preferences
                    const prefResponse = await fetch('https://bithash-backend.onrender.com/api/users/preferences', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (prefResponse.ok) {
                        const prefData = await prefResponse.json();
                        const asset = prefData.data?.preferences?.displayAsset || 'btc';
                        AppState.userPreferences.displayAsset = asset;
                        
                        // Set asset logo
                        const logos = {
                            btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                            eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                            usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
                            bnb: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
                            sol: 'https://assets.coingecko.com/coins/images/4128/large/solana.png'
                        };
                        AppState.userPreferences.assetLogo = logos[asset] || logos.btc;
                    }
                    
                } catch (error) {
                    console.error('Fetch user error:', error);
                }
            }
            
            // =============================================
            // FETCH CURRENT PRICES
            // =============================================
            async function fetchPrices() {
                try {
                    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                    
                    if (response.ok) {
                        const data = await response.json();
                        AppState.btcPrice = data.bitcoin?.usd || 43000;
                        AppState.currentPrices = data;
                    }
                } catch (error) {
                    console.error('Price fetch error:', error);
                    AppState.btcPrice = 43000;
                }
            }
            
            // =============================================
            // RENDER PAGE - NO BOXES, SMOOTH FLOW
            // =============================================
            function renderPage() {
                const container = document.getElementById('mainContent');
                if (!container || !AppState.planDetails) return;
                
                const plan = AppState.planDetails;
                const index = plan.minerIndex || Math.min(parseInt(plan.id) - 1, 5) || 0;
                const miner = AppState.miners[index % AppState.miners.length];
                
                // Calculate values
                const minAmount = plan.minAmount || 50;
                const maxAmount = plan.maxAmount || 5000;
                const percentage = plan.percentage || 12;
                const duration = plan.duration || 72;
                
                // Asset conversion
                const mainAssetAmount = AppState.btcPrice > 0 ? AppState.userBalances.main / AppState.btcPrice : 0;
                const maturedAssetAmount = AppState.btcPrice > 0 ? AppState.userBalances.matured / AppState.btcPrice : 0;
                
                // Determine if balances are sufficient
                const mainSufficient = AppState.userBalances.main >= minAmount;
                const maturedSufficient = AppState.userBalances.matured >= minAmount;
                
                // Set initial selected balance
                if (mainSufficient) {
                    AppState.selectedBalance = 'main';
                    AppState.selectedBalanceAmount = AppState.userBalances.main;
                } else if (maturedSufficient) {
                    AppState.selectedBalance = 'matured';
                    AppState.selectedBalanceAmount = AppState.userBalances.matured;
                } else {
                    AppState.selectedBalance = 'main';
                    AppState.selectedBalanceAmount = AppState.userBalances.main;
                }
                
                AppState.investmentAmount = minAmount;
                
                // Calculate expected return
                const miningFee = minAmount * 0.03;
                const netInvestment = minAmount - miningFee;
                const expectedReturn = netInvestment + (netInvestment * percentage / 100);
                const expectedAssetReturn = AppState.btcPrice > 0 ? expectedReturn / AppState.btcPrice : 0;
                
                container.innerHTML = `
                    <!-- Plan Header -->
                    <div class="plan-header-section">
                        <h1 class="plan-title">${plan.name} Cloud Mining</h1>
                        <div class="plan-subtitle">
                            <span>SHA-256 Bitcoin Mining Contract</span>
                            <span class="miner-tag">
                                <i class="fas fa-microchip"></i>
                                ${miner.name}
                            </span>
                        </div>
                    </div>
                    
                    <!-- Key Stats - Clean Numbers -->
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Investment Range</div>
                            <div class="stat-value">$${minAmount.toLocaleString()} <span class="small">- $${maxAmount.toLocaleString()}</span></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Mining Return</div>
                            <div class="stat-value green">+${percentage}%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Contract Duration</div>
                            <div class="stat-value">${duration} <span class="small">hours</span></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Company Fee</div>
                            <div class="stat-value">3% <span class="small">at maturity</span></div>
                        </div>
                    </div>
                    
                    <!-- Miner Details - Integrated -->
                    <div class="miner-details">
                        <div class="miner-image">
                            <img src="${miner.image}" alt="${miner.name}" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                        </div>
                        <div class="miner-specs">
                            <div class="spec-item">
                                <div class="spec-label">Hash Rate</div>
                                <div class="spec-value">${miner.hashRate}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Power</div>
                                <div class="spec-value">${miner.power}</div>
                            </div>
                            <div class="spec-item">
                                <div class="spec-label">Efficiency</div>
                                <div class="spec-value">${miner.efficiency}</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Investment Section -->
                    <div class="investment-section">
                        <div class="section-label">
                            <i class="fas fa-wallet"></i>
                            Select Balance Source
                        </div>
                        
                        <!-- Balance Options -->
                        <div class="balance-selector" id="balanceSelector">
                            <div class="balance-option ${mainSufficient ? '' : 'disabled'} ${AppState.selectedBalance === 'main' ? 'selected' : ''}" data-balance="main" data-amount="${AppState.userBalances.main}" onclick="window.selectBalance('main', ${AppState.userBalances.main})">
                                <div class="balance-header">
                                    <span class="balance-name">Main Balance</span>
                                    <span class="balance-asset">
                                        <img src="${AppState.userPreferences.assetLogo}">
                                        ${AppState.userPreferences.displayAsset.toUpperCase()}
                                    </span>
                                </div>
                                <div class="balance-amount-fiat">$${AppState.userBalances.main.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="balance-amount-asset">
                                    <img src="${AppState.userPreferences.assetLogo}">
                                    ${formatNumber(mainAssetAmount)} ${AppState.userPreferences.displayAsset.toUpperCase()}
                                </div>
                            </div>
                            
                            <div class="balance-option ${maturedSufficient ? '' : 'disabled'} ${AppState.selectedBalance === 'matured' ? 'selected' : ''}" data-balance="matured" data-amount="${AppState.userBalances.matured}" onclick="window.selectBalance('matured', ${AppState.userBalances.matured})">
                                <div class="balance-header">
                                    <span class="balance-name">Matured Balance</span>
                                    <span class="balance-asset">
                                        <img src="${AppState.userPreferences.assetLogo}">
                                        ${AppState.userPreferences.displayAsset.toUpperCase()}
                                    </span>
                                </div>
                                <div class="balance-amount-fiat">$${AppState.userBalances.matured.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="balance-amount-asset">
                                    <img src="${AppState.userPreferences.assetLogo}">
                                    ${formatNumber(maturedAssetAmount)} ${AppState.userPreferences.displayAsset.toUpperCase()}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Investment Input -->
                        <div class="investment-input-container">
                            <div class="investment-input-wrapper">
                                <span class="input-prefix">$</span>
                                <input type="number" class="investment-input" id="investmentAmount" value="${minAmount}" min="${minAmount}" max="${Math.min(maxAmount, AppState.selectedBalanceAmount)}" step="10" oninput="window.handleAmountChange(this.value)">
                            </div>
                            <div class="input-hint">
                                <span>Min: $${minAmount.toLocaleString()}</span>
                                <span>Max: $${Math.min(maxAmount, AppState.selectedBalanceAmount).toLocaleString()}</span>
                            </div>
                            <div class="input-error" id="amountError"></div>
                        </div>
                        
                        <!-- Expected Return Display -->
                        <div class="return-display">
                            <span class="return-label">Expected Return</span>
                            <div class="return-numbers">
                                <div class="return-fiat" id="returnFiat">$${expectedReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="return-asset" id="returnAsset">
                                    <img src="${AppState.userPreferences.assetLogo}">
                                    <span id="returnAssetText">${formatNumber(expectedAssetReturn)} ${AppState.userPreferences.displayAsset.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Invest Button -->
                        <button class="invest-button" id="investButton" onclick="window.processInvestment()" ${!mainSufficient && !maturedSufficient ? 'disabled' : ''}>
                            <i class="fas fa-cloud"></i>
                            Start Cloud Mining
                        </button>
                        
                        <!-- Status Message -->
                        <div class="status-message" id="statusMessage"></div>
                    </div>
                    
                    <!-- Chart Section -->
                    <div class="chart-section">
                        <div class="chart-title">
                            <i class="fas fa-chart-line"></i>
                            BTC/USD Real-Time Chart
                        </div>
                        <div id="tradingview-chart"></div>
                    </div>
                `;
                
                // Expose functions globally
                window.selectBalance = selectBalance;
                window.handleAmountChange = handleAmountChange;
                window.processInvestment = processInvestment;
            }
            
            // =============================================
            // BALANCE SELECTION HANDLER
            // =============================================
            function selectBalance(balanceType, amount) {
                if (!AppState.planDetails) return;
                
                const minAmount = AppState.planDetails.minAmount || 50;
                
                // Check if balance is sufficient
                if (amount < minAmount) {
                    showNotification('error', 'Insufficient Balance', `Minimum $${minAmount} required`);
                    return;
                }
                
                // Update selection
                AppState.selectedBalance = balanceType;
                AppState.selectedBalanceAmount = amount;
                
                // Update UI
                document.querySelectorAll('.balance-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                
                const selectedEl = document.querySelector(`.balance-option[data-balance="${balanceType}"]`);
                if (selectedEl) {
                    selectedEl.classList.add('selected');
                }
                
                // Update input max
                const input = document.getElementById('investmentAmount');
                if (input) {
                    const maxAmount = Math.min(AppState.planDetails.maxAmount || 5000, amount);
                    input.max = maxAmount;
                    
                    // Adjust current value if needed
                    const currentVal = parseFloat(input.value) || 0;
                    if (currentVal > maxAmount) {
                        input.value = maxAmount;
                        handleAmountChange(maxAmount);
                    } else if (currentVal < (AppState.planDetails.minAmount || 50)) {
                        input.value = AppState.planDetails.minAmount || 50;
                        handleAmountChange(AppState.planDetails.minAmount || 50);
                    }
                }
            }
            
            // =============================================
            // AMOUNT CHANGE HANDLER
            // =============================================
            function handleAmountChange(value) {
                if (!AppState.planDetails) return;
                
                const amount = parseFloat(value) || 0;
                const minAmount = AppState.planDetails.minAmount || 50;
                const maxAmount = Math.min(AppState.planDetails.maxAmount || 5000, AppState.selectedBalanceAmount);
                const errorEl = document.getElementById('amountError');
                
                // Validate
                if (amount < minAmount) {
                    errorEl.textContent = `Minimum investment is $${minAmount.toLocaleString()}`;
                } else if (amount > maxAmount) {
                    errorEl.textContent = `Maximum investment is $${maxAmount.toLocaleString()}`;
                } else {
                    errorEl.textContent = '';
                }
                
                // Update expected return
                if (amount >= minAmount && amount <= maxAmount) {
                    const percentage = AppState.planDetails.percentage || 12;
                    const miningFee = amount * 0.03;
                    const netInvestment = amount - miningFee;
                    const expectedReturn = netInvestment + (netInvestment * percentage / 100);
                    const expectedAssetReturn = AppState.btcPrice > 0 ? expectedReturn / AppState.btcPrice : 0;
                    
                    document.getElementById('returnFiat').textContent = '$' + expectedReturn.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    document.getElementById('returnAssetText').textContent = formatNumber(expectedAssetReturn) + ' ' + AppState.userPreferences.displayAsset.toUpperCase();
                }
            }
            
            // =============================================
            // PROCESS INVESTMENT - EXACT SAME FORMAT AS MODAL
            // =============================================
            async function processInvestment() {
                // Prevent double processing
                if (AppState.isProcessing) {
                    showNotification('warning', 'Processing', 'Investment already in progress');
                    return;
                }
                
                const token = localStorage.getItem('jwtToken');
                if (!token) {
                    showNotification('error', 'Authentication Required', 'Please login to invest');
                    setTimeout(() => {
                        window.location.href = 'signup';
                    }, 1500);
                    return;
                }
                
                const input = document.getElementById('investmentAmount');
                const amount = parseFloat(input?.value) || 0;
                const errorEl = document.getElementById('amountError');
                const statusEl = document.getElementById('statusMessage');
                const investBtn = document.getElementById('investButton');
                
                // Validate
                const minAmount = AppState.planDetails.minAmount || 50;
                const maxAmount = Math.min(AppState.planDetails.maxAmount || 5000, AppState.selectedBalanceAmount);
                
                if (amount < minAmount) {
                    errorEl.textContent = `Minimum investment is $${minAmount.toLocaleString()}`;
                    return;
                }
                
                if (amount > maxAmount) {
                    errorEl.textContent = `Maximum investment is $${maxAmount.toLocaleString()}`;
                    return;
                }
                
                if (amount > AppState.selectedBalanceAmount) {
                    errorEl.textContent = `Insufficient balance. Available: $${AppState.selectedBalanceAmount.toLocaleString()}`;
                    return;
                }
                
                // Start processing
                AppState.isProcessing = true;
                if (investBtn) {
                    investBtn.disabled = true;
                    investBtn.classList.add('processing');
                    investBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                }
                
                if (statusEl) {
                    statusEl.textContent = 'Processing your investment...';
                    statusEl.className = 'status-message';
                }
                
                try {
                    // EXACT SAME PAYLOAD AS MODAL IN INDEX.HTML
                    const payload = {
                        planId: AppState.planDetails.id,
                        amount: amount,
                        balanceType: AppState.selectedBalance
                    };
                    
                    console.log('Investment payload:', payload);
                    
                    const response = await fetch('https://bithash-backend.onrender.com/api/investments', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    let responseData;
                    try {
                        responseData = await response.json();
                    } catch (e) {
                        responseData = { message: 'Investment processed' };
                    }
                    
                    if (response.ok) {
                        // Success
                        if (statusEl) {
                            statusEl.textContent = 'Investment successful! Redirecting...';
                            statusEl.className = 'status-message success';
                        }
                        
                        showNotification('success', 'Investment Successful', 
                            `Your cloud mining investment of $${amount.toLocaleString()} has been created.`);
                        
                        // Redirect back to index.html after 1.5 seconds
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                        
                    } else {
                        throw new Error(responseData.message || `Investment failed: ${response.status}`);
                    }
                    
                } catch (error) {
                    console.error('Investment error:', error);
                    
                    if (statusEl) {
                        statusEl.textContent = error.message || 'Investment failed. Please try again.';
                        statusEl.className = 'status-message error';
                    }
                    
                    showNotification('error', 'Investment Failed', error.message || 'Could not process investment');
                    
                    // Reset button
                    if (investBtn) {
                        investBtn.disabled = false;
                        investBtn.classList.remove('processing');
                        investBtn.innerHTML = '<i class="fas fa-cloud"></i> Start Cloud Mining';
                    }
                    
                    AppState.isProcessing = false;
                }
            }
            
            // =============================================
            // INITIALIZE TRADING VIEW CHART
            // =============================================
            function initializeTradingView() {
                // Check if TradingView is loaded
                if (typeof TradingView !== 'undefined') {
                    createChart();
                } else {
                    // Load TradingView script
                    const script = document.createElement('script');
                    script.src = 'https://s3.tradingview.com/tv.js';
                    script.async = true;
                    script.onload = createChart;
                    document.head.appendChild(script);
                }
            }
            
            function createChart() {
                if (document.getElementById('tradingview-chart') && typeof TradingView !== 'undefined') {
                    new TradingView.widget({
                        "width": "100%",
                        "height": 300,
                        "symbol": "BITSTAMP:BTCUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "allow_symbol_change": true,
                        "container_id": "tradingview-chart",
                        "hide_side_toolbar": false,
                        "studies": ["Volume@tv-basicstudies"],
                        "show_popup_button": true,
                        "popup_width": "1000",
                        "popup_height": "650"
                    });
                }
            }
            
            // =============================================
            // NOTIFICATION SYSTEM
            // =============================================
            function showNotification(type, title, message, duration = 4000) {
                const container = document.getElementById('notificationCenter');
                if (!container) return;
                
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                
                const icon = type === 'success' ? 'fa-check-circle' : 
                            type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
                
                notification.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div class="notification-content">
                        <div class="notification-title">${title}</div>
                        <div class="notification-message">${message}</div>
                    </div>
                    <div class="notification-close">
                        <i class="fas fa-times"></i>
                    </div>
                `;
                
                container.appendChild(notification);
                
                // Animate in
                setTimeout(() => {
                    notification.classList.add('show');
                }, 10);
                
                // Close handler
                const closeBtn = notification.querySelector('.notification-close');
                closeBtn.addEventListener('click', () => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                });
                
                // Auto remove
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.classList.remove('show');
                        setTimeout(() => {
                            if (notification.parentNode) {
                                notification.parentNode.removeChild(notification);
                            }
                        }, 300);
                    }
                }, duration);
            }
            
            // =============================================
            // UTILITY FUNCTIONS
            // =============================================
            function formatNumber(num) {
                if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
                if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
                if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
                return num.toFixed(6);
            }
            
            function hideLoading() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.classList.add('hidden');
                }
            }
            
            // =============================================
            // START APPLICATION
            // =============================================
            document.addEventListener('DOMContentLoaded', () => {
                // Small delay for smooth loading
                setTimeout(init, 100);
            });
            
            // Expose functions globally
            window.showNotification = showNotification;
            
        })();
    </script>
