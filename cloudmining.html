<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cloud Mining · BitHash</title>
    <!-- same theme colour as index.html, no title/logo clutter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- crypto.com / binance style smoothness, no borders/blocks visual, only smooth panels -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#0a0a0f;
            color:#fff;
            font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            line-height:1.5;
            -webkit-font-smoothing:antialiased;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }
        :root{
            --bg:#0a0a0f;
            --surface:#14151a;
            --surface-light:#1e1f24;
            --primary:#00d8ff;
            --primary-dark:#00a3cc;
            --success:#28a745;
            --error:#ff3b3b;
            --gray:#8e9aae;
            --border-subtle:rgba(255,255,255,0.06);
        }
        .investment-panel{
            max-width:1200px;
            margin:2rem auto;
            padding:0 1.5rem;
            width:100%;
            flex:1;
        }
        /* smooth card – no borders, just subtle background */
        .panel-card{
            background:var(--surface);
            border-radius:32px;
            padding:2rem 2.5rem;
            box-shadow:0 20px 40px -12px rgba(0,0,0,0.8);
            backdrop-filter:blur(2px);
        }
        .plan-header-compact{
            display:flex;
            align-items:center;
            gap:1rem;
            margin-bottom:2rem;
        }
        .plan-header-compact h2{
            font-size:2rem;
            font-weight:600;
            letter-spacing:-0.01em;
            background:linear-gradient(to right,#fff,var(--primary));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .miner-badge{
            background:rgba(0,216,255,0.1);
            padding:0.3rem 1rem;
            border-radius:40px;
            font-size:0.85rem;
            color:var(--primary);
            display:inline-flex;
            align-items:center;
            gap:0.4rem;
        }
        .grid-2col{
            display:grid;
            grid-template-columns:1.2fr 0.8fr;
            gap:2rem;
            margin-top:1.5rem;
        }
        .spec-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:1.2rem;
        }
        .spec-item{
            background:var(--surface-light);
            padding:1.2rem 1.5rem;
            border-radius:20px;
        }
        .spec-label{
            color:var(--gray);
            font-size:0.8rem;
            text-transform:uppercase;
            letter-spacing:0.3px;
        }
        .spec-value{
            font-size:1.5rem;
            font-weight:600;
            font-family:'Manrope',sans-serif;
            line-height:1.3;
        }
        .spec-value small{font-size:0.9rem;color:var(--gray);font-weight:400;}
        .balance-selector{
            background:var(--surface-light);
            border-radius:28px;
            padding:1.5rem;
            margin-bottom:1.5rem;
        }
        .balance-option{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:1rem 1.2rem;
            background:rgba(255,255,255,0.02);
            border-radius:18px;
            margin-bottom:0.8rem;
            cursor:pointer;
            transition:0.15s ease;
            border:1.5px solid transparent;
        }
        .balance-option:hover{background:rgba(255,255,255,0.05);}
        .balance-option.selected{
            border-color:var(--primary);
            background:rgba(0,216,255,0.07);
        }
        .balance-option.disabled{opacity:0.4;pointer-events:none;}
        .balance-name{font-weight:600;display:flex;align-items:center;gap:0.6rem;}
        .balance-amount{font-family:'Manrope',sans-serif;font-weight:600;}
        .asset-logo{width:24px;height:24px;border-radius:50%;object-fit:cover;}
        .input-group{
            background:var(--surface-light);
            border-radius:24px;
            padding:0.2rem 1.5rem;
            display:flex;
            align-items:center;
            border:1px solid transparent;
            transition:0.2s;
        }
        .input-group:focus-within{border-color:var(--primary);}
        .input-group input{
            background:transparent;
            border:none;
            padding:1.2rem 0;
            font-size:1.2rem;
            width:100%;
            color:#fff;
            outline:none;
            font-family:'Manrope',sans-serif;
        }
        .input-group span{color:var(--gray);font-weight:500;}
        .error-msg{color:var(--error);font-size:0.85rem;margin:0.5rem 0 0 1rem;min-height:1.5rem;}
        .return-box{
            background:rgba(40,167,69,0.08);
            border-radius:24px;
            padding:1.2rem 1.8rem;
            margin:1.5rem 0;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        .return-fiat{font-size:1.8rem;font-weight:700;color:var(--success);}
        .return-asset{display:flex;align-items:center;gap:0.6rem;color:var(--gray);}
        .btn-invest{
            background:linear-gradient(145deg,#00d8ff,#0099cc);
            border:none;
            width:100%;
            padding:1.3rem;
            border-radius:40px;
            font-weight:700;
            font-size:1.2rem;
            color:#0a0a0f;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:0.8rem;
            cursor:pointer;
            transition:0.2s;
            box-shadow:0 8px 20px rgba(0,216,255,0.2);
        }
        .btn-invest:hover:not(:disabled){transform:scale(1.02);background:linear-gradient(145deg,#33e0ff,#00b3e6);}
        .btn-invest:disabled{opacity:0.5;cursor:not-allowed;box-shadow:none;}
        .miner-visual{
            background:var(--surface-light);
            border-radius:32px;
            padding:1.8rem;
            text-align:center;
            margin-bottom:1.5rem;
        }
        .miner-visual img{
            max-width:100%;
            max-height:200px;
            object-fit:contain;
            filter:drop-shadow(0 10px 15px rgba(0,216,255,0.2));
        }
        .spec-mini-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:0.8rem;
            background:var(--surface-light);
            border-radius:24px;
            padding:1.2rem;
        }
        .mini-item{
            background:rgba(0,0,0,0.2);
            border-radius:16px;
            padding:0.8rem 1rem;
        }
        .mini-label{color:var(--gray);font-size:0.7rem;text-transform:uppercase;}
        .mini-value{font-weight:600;font-size:1rem;}
        .back-link{
            color:var(--gray);
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:0.5rem;
            margin-bottom:1.5rem;
            font-size:0.95rem;
        }
        .back-link:hover{color:var(--primary);}
        .status-badge{
            background:rgba(0,216,255,0.1);
            border-radius:100px;
            padding:0.3rem 1rem;
            font-size:0.8rem;
            color:var(--primary);
            border:1px solid rgba(0,216,255,0.2);
        }
        .notification-center{
            position:fixed;top:20px;right:20px;z-index:9999;
            display:flex;flex-direction:column;gap:10px;
            pointer-events:none;
        }
        .notification{
            background:#1e1f28;border-left:6px solid;border-radius:16px;
            padding:1rem 1.5rem;box-shadow:0 12px 30px rgba(0,0,0,0.5);
            display:flex;align-items:center;gap:1rem;
            transform:translateX(120%);animation:slideIn 0.3s forwards;
            pointer-events:auto;
            max-width:360px;
        }
        .notification.success{border-color:var(--success);}
        .notification.error{border-color:var(--error);}
        .notification i{font-size:1.4rem;}
        .notification.success i{color:var(--success);}
        .notification.error i{color:var(--error);}
        @keyframes slideIn{to{transform:translateX(0);}}
    </style>
</head>
<body>
    <div class="investment-panel" id="investmentRoot">
        <!-- back navigation (smooth, no header) -->
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to main</a>

        <!-- main panel: all content dynamic, no boxes/borders visible – smooth background card -->
        <div class="panel-card" id="dynamicPanel">
            <!-- filled by javascript, never static placeholders -->
        </div>
    </div>

    <!-- notification container (green/red popups) -->
    <div class="notification-center" id="notificationCenter"></div>

    <script>
        (function() {
            // ---------- global theme colours & helpers ----------
            const API_BASE = 'https://bithash-backend.onrender.com/api';
            let currentPlan = null;
            let userBalances = { main: 0, matured: 0 };
            let btcPrice = 43000;            // fallback
            let preferredAsset = 'btc';       // same as index
            let investmentInProgress = false;  // prevent double investment

            // asset logo map (same as index)
            const assetLogoMap = {
                btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
                eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
                usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png'
            };
            const defaultLogo = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';

            // ---------- get plan from URL (query param ?planId=xxx) ----------
            function getPlanIdFromUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('planId');
            }

            // ---------- show notification (green/red) ----------
            function showNotification(type, title, message) {
                const center = document.getElementById('notificationCenter');
                const notif = document.createElement('div');
                notif.className = `notification ${type}`;
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                notif.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div>
                        <div style="font-weight:600;">${title}</div>
                        <div style="font-size:0.85rem; opacity:0.9;">${message}</div>
                    </div>
                `;
                center.appendChild(notif);
                setTimeout(() => {
                    if (notif.parentNode) notif.remove();
                }, 5000);
            }

            // ---------- fetch plan details & balances ----------
            async function loadPlanAndRender() {
                const planId = getPlanIdFromUrl();
                if (!planId) {
                    document.getElementById('dynamicPanel').innerHTML = '<div style="padding:3rem;text-align:center;color:var(--gray);">No plan selected. <a href="index.html" style="color:var(--primary);">Go back</a></div>';
                    return;
                }

                try {
                    // fetch all plans and pick the one with matching id
                    const plansRes = await fetch(`${API_BASE}/plans`);
                    if (!plansRes.ok) throw new Error('Failed to fetch plans');
                    const plansData = await plansRes.json();
                    const plans = plansData.data?.plans || [];
                    currentPlan = plans.find(p => p.id === planId);
                    if (!currentPlan) throw new Error('Plan not found');

                    // fetch user balances if logged in
                    const token = localStorage.getItem('jwtToken');
                    if (token) {
                        const balRes = await fetch(`${API_BASE}/users/balances`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (balRes.ok) {
                            const balData = await balRes.json();
                            userBalances.main = balData.data?.balances?.main || 0;
                            userBalances.matured = balData.data?.balances?.matured || 0;
                        }
                        // fetch user preferred asset (optional)
                        try {
                            const prefRes = await fetch(`${API_BASE}/users/preferences`, {
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                            if (prefRes.ok) {
                                const pref = await prefRes.json();
                                preferredAsset = pref.data?.preferences?.displayAsset || 'btc';
                            }
                        } catch (e) {}
                    }

                    // fetch btc price from market data (or keep fallback)
                    try {
                        const priceRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                        if (priceRes.ok) {
                            const priceJson = await priceRes.json();
                            btcPrice = priceJson.bitcoin?.usd || 43000;
                        }
                    } catch (e) {}

                    renderInvestmentPanel();

                } catch (err) {
                    console.error(err);
                    document.getElementById('dynamicPanel').innerHTML = `<div style="padding:2rem;color:var(--error);">Error loading plan. <a href="index.html" style="color:var(--primary);">Back</a></div>`;
                }
            }

            // ---------- render full panel (pure, no borders/blocks visible) ----------
            function renderInvestmentPanel() {
                const container = document.getElementById('dynamicPanel');
                if (!currentPlan) return;

                const plan = currentPlan;
                const minAmount = plan.minAmount || 0;
                const maxAmount = plan.maxAmount || 100000;
                const percentage = plan.percentage || 0;
                const duration = plan.duration || 24;

                // miner images array matching index order
                const minerImages = [
                    'https://media.bithashcapital.live/plans/WhatsApp%20Image%202025-12-13%20at%201.27.06%20AM.jpeg',
                    'https://media.bithashcapital.live/plans/WhatsApp%20Image%202026-01-12%20at%2011.43.02%20AM.jpeg',
                    'https://media.bithashcapital.live/plans/WhatsApp%20Image%20l2026-01-12%20at%2011.43.03%20AM.jpeg',
                    'https://media.bithashcapital.live/plans/WhatsApp%20Imageg%202026-01-12%20at%2011.43.02%20AM.jpeg',
                    'https://media.bithashcapital.live/plans/WhatsApp%20Imagek%202026-01-12%20at%2011.43.02%20AM.jpeg'
                ];
                const minerNames = ['Avalon Mini 3', 'Fluminer T3', 'Avalon Q', 'Antminer S21 Pro', 'Antminer S21 XP'];
                const randomIndex = (plan.id.length % minerNames.length);
                const minerName = minerNames[randomIndex] || 'Antminer S21';
                const minerImg = minerImages[randomIndex] || minerImages[0];
                const hashRate = ['68 TH/s','110 TH/s','150 TH/s','234 TH/s','255 TH/s'][randomIndex] || '110 TH/s';
                const power = ['3200W','3250W','3420W','5440W','5445W'][randomIndex] || '3250W';

                const logo = assetLogoMap[preferredAsset] || defaultLogo;
                const mainAssetAmount = btcPrice > 0 ? userBalances.main / btcPrice : 0;
                const maturedAssetAmount = btcPrice > 0 ? userBalances.matured / btcPrice : 0;

                // html structure – no visible borders, everything smooth radius
                container.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
                        <div class="plan-header-compact">
                            <i class="fas fa-cloud" style="color:var(--primary); font-size:2rem;"></i>
                            <h2>${plan.name || 'Cloud Plan'}</h2>
                        </div>
                        <span class="status-badge"><i class="fas fa-circle" style="font-size:0.5rem; color:var(--success); margin-right:0.3rem;"></i> active mining</span>
                    </div>

                    <div class="grid-2col">
                        <!-- left column: specs + balance + investment -->
                        <div>
                            <div class="spec-grid">
                                <div class="spec-item">
                                    <div class="spec-label">investment range</div>
                                    <div class="spec-value">$${minAmount.toLocaleString()} – $${maxAmount.toLocaleString()}</div>
                                </div>
                                <div class="spec-item">
                                    <div class="spec-label">return</div>
                                    <div class="spec-value" style="color:var(--success);">+${percentage}%</div>
                                </div>
                                <div class="spec-item">
                                    <div class="spec-label">duration</div>
                                    <div class="spec-value">${duration}h</div>
                                </div>
                                <div class="spec-item">
                                    <div class="spec-label">company fee</div>
                                    <div class="spec-value">3%<small> upon maturity</small></div>
                                </div>
                            </div>

                            <!-- balance selector (exactly like modal) -->
                            <div class="balance-selector" style="margin-top:1.8rem;">
                                <div style="margin-bottom:1rem; color:var(--gray);"><i class="fas fa-wallet" style="margin-right:0.5rem;"></i>Select balance</div>
                                <div class="balance-option" id="optMain" data-type="main" data-amount="${userBalances.main}">
                                    <span class="balance-name"><i class="fas fa-circle" style="color:var(--primary); font-size:0.7rem;"></i> Main balance</span>
                                    <span class="balance-amount">$${userBalances.main.toLocaleString(undefined,{minimumFractionDigits:2})}</span>
                                    <span style="margin-left:0.5rem; display:flex; align-items:center; gap:0.2rem;"><img src="${logo}" class="asset-logo"> ${mainAssetAmount.toFixed(6)} ${preferredAsset.toUpperCase()}</span>
                                </div>
                                <div class="balance-option" id="optMatured" data-type="matured" data-amount="${userBalances.matured}">
                                    <span class="balance-name"><i class="fas fa-circle" style="color:var(--gold, #ffb800); font-size:0.7rem;"></i> Matured balance</span>
                                    <span class="balance-amount">$${userBalances.matured.toLocaleString(undefined,{minimumFractionDigits:2})}</span>
                                    <span style="margin-left:0.5rem; display:flex; align-items:center; gap:0.2rem;"><img src="${logo}" class="asset-logo"> ${maturedAssetAmount.toFixed(6)} ${preferredAsset.toUpperCase()}</span>
                                </div>
                            </div>

                            <!-- investment input -->
                            <div style="margin:1.5rem 0 0.5rem;">
                                <div class="input-group">
                                    <input type="number" id="investAmount" placeholder="${minAmount}" min="${minAmount}" max="${maxAmount}" step="10" value="${minAmount}">
                                    <span>USD</span>
                                </div>
                                <div class="error-msg" id="amountError"></div>
                            </div>

                            <!-- expected return -->
                            <div class="return-box">
                                <div style="font-weight:500;">Expected return</div>
                                <div style="text-align:right;">
                                    <div class="return-fiat" id="returnFiat">$0</div>
                                    <div class="return-asset" id="returnAsset"><img src="${logo}" class="asset-logo" id="returnAssetLogo"><span id="returnAssetText">0 BTC</span></div>
                                </div>
                            </div>

                            <!-- invest button -->
                            <button class="btn-invest" id="investBtn"><i class="fas fa-cloud-arrow-up"></i> Start cloud mining</button>
                            <div style="text-align:center; margin-top:1rem; font-size:0.8rem; color:var(--gray);" id="investStatus"></div>
                        </div>

                        <!-- right column: miner visual + specs -->
                        <div>
                            <div class="miner-visual">
                                <img src="${minerImg}" alt="miner" onerror="this.src='https://media.bithashcapital.live/circular_dark_background%20(1).png'">
                            </div>
                            <div class="spec-mini-grid">
                                <div class="mini-item"><div class="mini-label">model</div><div class="mini-value">${minerName}</div></div>
                                <div class="mini-item"><div class="mini-label">hash rate</div><div class="mini-value">${hashRate}</div></div>
                                <div class="mini-item"><div class="mini-label">power</div><div class="mini-value">${power}</div></div>
                                <div class="mini-item"><div class="mini-label">algorithm</div><div class="mini-value">SHA-256</div></div>
                            </div>
                        </div>
                    </div>
                `;

                // attach event listeners after render
                attachListeners(minAmount, maxAmount, percentage, logo);
            }

            function attachListeners(minAmount, maxAmount, percentage, assetLogo) {
                const mainOpt = document.getElementById('optMain');
                const maturedOpt = document.getElementById('optMatured');
                const amountInput = document.getElementById('investAmount');
                const errorSpan = document.getElementById('amountError');
                const returnFiat = document.getElementById('returnFiat');
                const returnAssetText = document.getElementById('returnAssetText');
                const returnAssetLogo = document.getElementById('returnAssetLogo');
                const investBtn = document.getElementById('investBtn');
                const statusDiv = document.getElementById('investStatus');

                let selectedBalanceType = null;
                let selectedBalanceAmount = 0;

                // determine default selectable
                if (userBalances.main >= minAmount) {
                    mainOpt.classList.add('selected');
                    selectedBalanceType = 'main';
                    selectedBalanceAmount = userBalances.main;
                } else if (userBalances.matured >= minAmount) {
                    maturedOpt.classList.add('selected');
                    selectedBalanceType = 'matured';
                    selectedBalanceAmount = userBalances.matured;
                } else {
                    // none eligible
                    mainOpt.classList.add('disabled');
                    maturedOpt.classList.add('disabled');
                    investBtn.disabled = true;
                }

                // balance click handlers
                mainOpt.addEventListener('click', () => {
                    if (userBalances.main < minAmount) return;
                    mainOpt.classList.add('selected');
                    maturedOpt.classList.remove('selected');
                    selectedBalanceType = 'main';
                    selectedBalanceAmount = userBalances.main;
                    validateAndUpdate();
                });
                maturedOpt.addEventListener('click', () => {
                    if (userBalances.matured < minAmount) return;
                    maturedOpt.classList.add('selected');
                    mainOpt.classList.remove('selected');
                    selectedBalanceType = 'matured';
                    selectedBalanceAmount = userBalances.matured;
                    validateAndUpdate();
                });

                function validateAndUpdate() {
                    const amount = parseFloat(amountInput.value) || 0;
                    let error = '';
                    if (amount < minAmount) error = `Minimum $${minAmount}`;
                    else if (amount > maxAmount) error = `Maximum $${maxAmount}`;
                    else if (selectedBalanceAmount < amount) error = `Insufficient balance ($${selectedBalanceAmount.toFixed(2)} available)`;
                    errorSpan.innerText = error;
                    investBtn.disabled = error !== '' || investmentInProgress;
                    // update expected return
                    if (!error) {
                        const fee = amount * 0.03;
                        const net = amount - fee;
                        const total = net + (net * percentage / 100);
                        returnFiat.innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
                        if (btcPrice > 0) {
                            const assetVal = total / btcPrice;
                            returnAssetText.innerText = assetVal.toFixed(6) + ' ' + preferredAsset.toUpperCase();
                        } else {
                            returnAssetText.innerText = '0.00 ' + preferredAsset.toUpperCase();
                        }
                    } else {
                        returnFiat.innerText = '$0';
                        returnAssetText.innerText = '0 ' + preferredAsset.toUpperCase();
                    }
                    if (returnAssetLogo) returnAssetLogo.src = assetLogo;
                }

                amountInput.addEventListener('input', validateAndUpdate);
                // initial update
                validateAndUpdate();

                // invest click
                investBtn.addEventListener('click', async () => {
                    if (investmentInProgress) return;
                    const amount = parseFloat(amountInput.value) || 0;
                    if (!selectedBalanceType || amount < minAmount || amount > maxAmount || amount > selectedBalanceAmount) {
                        validateAndUpdate();
                        return;
                    }
                    const token = localStorage.getItem('jwtToken');
                    if (!token) {
                        showNotification('error', 'Auth required', 'Please log in');
                        setTimeout(() => window.location.href = 'login', 1500);
                        return;
                    }

                    investmentInProgress = true;
                    investBtn.disabled = true;
                    statusDiv.innerText = 'processing investment...';

                    try {
                        const response = await fetch(`${API_BASE}/investments`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                planId: currentPlan.id,
                                amount: amount,
                                balanceType: selectedBalanceType
                            })
                        });
                        const data = await response.json();
                        if (response.ok) {
                            showNotification('success', 'Investment successful', `$${amount} mining started`);
                            statusDiv.innerText = 'success! redirecting...';
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1500);
                        } else {
                            throw new Error(data.message || 'investment failed');
                        }
                    } catch (err) {
                        showNotification('error', 'Investment error', err.message);
                        statusDiv.innerText = '';
                        investmentInProgress = false;
                        investBtn.disabled = false;
                        validateAndUpdate();
                    }
                });
            }

            // initial load
            loadPlanAndRender();
        })();
    </script>
</body>
</html>
