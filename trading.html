<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <title>BitHash Capital | Trading</title>
    <meta name="description" content="Professional cryptocurrency trading platform with real-time Binance data. Trade crypto with advanced charting and order book.">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Chart Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>
    
    <style>
        /* ============================================= */
        /* COLOR SYSTEM - CONSISTENT WITH INDEX.HTML */
        /* ============================================= */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --blue: #003366;
            --gold: #D4AF37;
            --success: #228B22;
            --warning: #FFB800;
            --error: #FF0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ========== COMPACT HEADER (Logo | Pair Selector | Price | 24h Stats | Actions) ========== */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 0;
            border-bottom: 1px solid var(--border);
            height: 80px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 150px;
        }

        .logo img {
            height: 32px;
            width: auto;
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }

        /* Center Header Section - Pair Info */
        .header-pair-section {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--bg-surface);
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }

        .pair-selector-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 40px;
            background: var(--bg-hover);
        }

        .pair-logos-header {
            display: flex;
            align-items: center;
        }

        .pair-logos-header img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }

        .pair-logos-header img:first-child {
            margin-right: -8px;
            z-index: 2;
        }

        .pair-name-header {
            font-weight: 700;
            font-size: 1rem;
        }

        .header-price-info {
            text-align: right;
        }

        .header-current-price {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .header-change {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .header-change.positive { background: rgba(34, 139, 34, 0.15); color: var(--positive); }
        .header-change.negative { background: rgba(255, 0, 0, 0.15); color: var(--negative); }

        /* Stats in Header */
        .header-stats {
            display: flex;
            gap: 24px;
            margin-left: 20px;
        }

        .header-stat {
            text-align: left;
        }

        .header-stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .header-stat-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Right Header Actions */
        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #000000;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* User Balance Bar */
        .user-balance-bar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            position: fixed;
            top: 80px;
            width: 100%;
            z-index: 999;
        }

        .user-balance-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .balance-items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(247, 166, 0, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(247, 166, 0, 0.2);
        }

        .balance-item i {
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* ========== MAIN TRADING LAYOUT ========== */
        /* PROPORTIONS: LEFT 22% | CENTER 56% | RIGHT 22% */
        .trading-container {
            margin-top: 148px;
            padding: 0 20px 60px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        .trading-grid {
            display: grid;
            grid-template-columns: 22% 56% 22%;
            gap: 16px;
        }

        /* Left Panel - Order Book & Recent Trades */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .order-book {
            padding: 8px;
        }

        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.1s;
        }

        .order-book-row:hover {
            background: var(--bg-hover);
        }

        .order-book-price.positive {
            color: var(--positive);
        }

        .order-book-price.negative {
            color: var(--negative);
        }

        .spread-row {
            text-align: center;
            padding: 10px;
            background: var(--bg-hover);
            margin: 8px 0;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .spread-row .accent {
            color: var(--accent);
            font-weight: 600;
        }

        /* Recent Trades */
        .recent-trades {
            max-height: 300px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr 0.8fr;
            padding: 6px 12px;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .trade-buy {
            color: var(--positive);
        }

        .trade-sell {
            color: var(--negative);
        }

        /* Center Panel - Chart */
        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Chart Container - BIGGEST element */
        .chart-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            height: 500px;
            overflow: hidden;
        }

        #tradingview-chart {
            width: 100%;
            height: 100%;
        }

        /* Right Panel - Trading Form & History */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .trading-form {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .order-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .order-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-hover);
            transition: all 0.2s;
        }

        .order-tab.buy.active {
            background: var(--positive);
            color: white;
        }

        .order-tab.sell.active {
            background: var(--negative);
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .order-action-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .order-action-btn.buy {
            background: var(--positive);
            color: white;
        }

        .order-action-btn.buy:hover:not(:disabled) {
            background: #1a6e1a;
        }

        .order-action-btn.sell {
            background: var(--negative);
            color: white;
        }

        .order-action-btn.sell:hover:not(:disabled) {
            background: #cc0000;
        }

        .order-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .insufficient-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .insufficient-buttons .btn {
            flex: 1;
        }

        /* Trade History Section - only shows history for current pair */
        .history-panel {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .history-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-row {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr 0.8fr;
            padding: 8px 12px;
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .history-empty {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Pair Search Dropdown */
        .pair-search-container {
            position: relative;
        }

        .pair-search-input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .pair-search-input:focus {
            border-color: var(--accent);
        }

        .pair-search-dropdown {
            position: absolute;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
            margin-top: 5px;
        }

        .pair-search-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .pair-search-item:hover {
            background: var(--bg-card);
        }

        .pair-search-item img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Footer Ticker */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 100;
        }

        .ticker-content {
            display: inline-block;
            animation: tickerScroll 40s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            margin: 0 20px;
            font-size: 0.8rem;
        }

        .ticker-item .positive {
            color: var(--positive);
        }

        .ticker-item .negative {
            color: var(--negative);
        }

        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 10000;
            max-width: 350px;
        }

        .notification {
            background: var(--bg-hover);
            border-left: 4px solid;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        .notification.info { border-left-color: var(--accent); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .trading-grid {
                grid-template-columns: 28% 44% 28%;
            }
            .header-stats {
                display: none;
            }
        }

        @media (max-width: 992px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
            .left-panel, .right-panel {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .header-pair-section {
                padding: 4px 12px;
            }
            .header-current-price {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .left-panel, .right-panel {
                grid-template-columns: 1fr;
            }
            .balance-items {
                width: 100%;
                justify-content: center;
            }
            .header-stats {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
    <div class="loading-text"><i class="fas fa-chart-line"></i> Loading Trading Platform...</div>
</div>

<!-- ========== HEADER ========== -->
<header>
    <div class="header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo">
            <span class="logo-text">₿itHash</span>
        </div>
        
        <!-- Center: Pair Selector + Live Price + Stats -->
        <div class="header-pair-section">
            <div class="pair-selector-btn" id="pair-selector-btn">
                <div class="pair-logos-header" id="header-pair-logos">
                    <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" alt="USDT">
                </div>
                <span class="pair-name-header" id="header-pair-name">BTC/USDT</span>
            </div>
            
            <div class="header-price-info">
                <div class="header-current-price" id="header-current-price">$0.00</div>
                <span class="header-change" id="header-change">0.00%</span>
            </div>
            
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-label">24h High</div>
                    <div class="header-stat-value" id="header-high">$0.00</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-label">24h Low</div>
                    <div class="header-stat-value" id="header-low">$0.00</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-label">24h Volume</div>
                    <div class="header-stat-value" id="header-volume">0</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-label">24h Change</div>
                    <div class="header-stat-value" id="header-change-stat">0.00%</div>
                </div>
            </div>
        </div>
        
        <div class="auth-buttons" id="auth-buttons">
            <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</header>

<!-- User Balance Bar -->
<div class="user-balance-bar" id="user-balance-bar" style="display: none;">
    <div class="user-balance-content">
        <div class="balance-items" id="user-balances">
            <div class="balance-item" id="selected-asset-balance">
                <i class="fas fa-coins"></i>
                <span id="selected-asset-balance-value">0.00000000</span>
                <span id="selected-asset-symbol">BTC</span>
            </div>
        </div>
        <div>
            <button class="btn btn-outline" onclick="window.location.href='deposit.html'" style="padding: 4px 12px; font-size: 0.75rem;">
                <i class="fas fa-plus"></i> Deposit
            </button>
        </div>
    </div>
</div>

<div class="notification-center" id="notification-center"></div>

<!-- ========== MAIN TRADING LAYOUT ========== -->
<div class="trading-container">
    <div class="trading-grid">
        <!-- LEFT COLUMN: Order Book + Recent Trades -->
        <div class="left-panel">
            <!-- Order Book -->
            <div class="panel-card">
                <div class="panel-header"><i class="fas fa-book"></i> Order Book</div>
                <div class="order-book">
                    <div class="order-book-header">
                        <span>Price (USDT)</span>
                        <span>Amount</span>
                        <span>Total</span>
                    </div>
                    <div id="order-book-asks"></div>
                    <div class="spread-row" id="spread-info">
                        Spread: <span class="accent">0.00</span> (0.00%)
                    </div>
                    <div id="order-book-bids"></div>
                </div>
            </div>
            
            <!-- Recent Trades -->
            <div class="panel-card">
                <div class="panel-header"><i class="fas fa-clock"></i> Recent Trades</div>
                <div class="recent-trades" id="recent-trades"></div>
            </div>
        </div>
        
        <!-- CENTER COLUMN: PAIR SEARCH + CHART (MAIN FOCUS) -->
        <div class="center-panel">
            <!-- Pair Search -->
            <div class="pair-search-container">
                <input type="text" class="pair-search-input" id="pair-search" placeholder="Search pair (e.g., BTCUSDT, ETHUSDT)...">
                <div id="pair-dropdown" class="pair-search-dropdown" style="display: none;"></div>
            </div>
            
            <!-- Chart - BIGGEST element -->
            <div class="chart-container">
                <div id="tradingview-chart"></div>
            </div>
        </div>
        
        <!-- RIGHT COLUMN: Trade Box + Trade History -->
        <div class="right-panel">
            <!-- Trading Form -->
            <div class="trading-form">
                <div class="order-tabs">
                    <div class="order-tab buy active" id="tab-buy" onclick="setOrderSide('buy')">Buy</div>
                    <div class="order-tab sell" id="tab-sell" onclick="setOrderSide('sell')">Sell</div>
                </div>
                
                <div id="trading-form-content">
                    <div class="form-group">
                        <label>Price (USDT)</label>
                        <input type="number" class="form-input" id="order-price" step="0.01" placeholder="Market price">
                        <div class="balance-info">≈ Last price</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" class="form-input" id="order-amount" step="0.0001" placeholder="0.0000">
                        <div class="balance-info">
                            <span id="order-balance-label">Available: 0.00000000</span>
                            <span id="order-total-value">≈ $0.00</span>
                        </div>
                    </div>
                    
                    <button class="order-action-btn buy" id="order-submit-btn" onclick="executeOrder()">Buy BTC</button>
                </div>
                
                <div id="insufficient-balance-message" style="display: none;">
                    <div class="insufficient-buttons">
                        <button class="btn btn-primary" onclick="window.location.href='deposit.html'">
                            <i class="fas fa-plus-circle"></i> Deposit
                        </button>
                        <button class="btn btn-outline" id="convert-btn" onclick="openConvertPage()">
                            <i class="fas fa-exchange-alt"></i> Convert
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Trade History Section - only shows history for current pair -->
            <div class="history-panel">
                <div class="history-header"><i class="fas fa-history"></i> Trade History</div>
                <div class="history-list" id="trade-history-list">
                    <div class="history-empty">No trades yet for this pair</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer Ticker -->
<div class="footer-ticker" id="footer-ticker"></div>

<script>
    // =============================================
    // GLOBAL STATE
    // =============================================
    let currentPair = null;
    let currentPairSymbol = 'BTCUSDT';
    let currentPairBase = 'BTC';
    let currentPairQuote = 'USDT';
    let currentPrice = 0;
    let currentChange24h = 0;
    let orderSide = 'buy';
    let userAssets = {};
    let userMainBalance = 0;
    let userMaturedBalance = 0;
    let allPairs = [];
    let filteredPairs = [];
    let isLoggedIn = false;
    let tickerUpdateInterval = null;
    let orderBookUpdateInterval = null;
    let tradesUpdateInterval = null;
    
    // Logo cache
    const logoCache = {};
    
    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    
    function showNotification(type, title, message) {
        const container = document.getElementById('notification-center');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <strong>${title}</strong><br>
            <small>${message}</small>
        `;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }
    
    function formatNumber(num, decimals = 8) {
        if (num === null || num === undefined) return '0.00000000';
        return parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }
    
    function formatUSD(num) {
        if (num === null || num === undefined) return '$0.00';
        return '$' + parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    // =============================================
    // FETCH USER BALANCES
    // =============================================
    async function fetchUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            isLoggedIn = false;
            document.getElementById('auth-buttons').style.display = 'flex';
            document.getElementById('user-balance-bar').style.display = 'none';
            return;
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                userMainBalance = parseFloat(data.main) || 0;
                userMaturedBalance = parseFloat(data.matured) || 0;
                isLoggedIn = true;
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-balance-bar').style.display = 'block';
            } else {
                isLoggedIn = false;
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-balance-bar').style.display = 'none';
            }
            
            await fetchUserAssets();
        } catch (error) {
            console.error('Error fetching balances:', error);
        }
    }
    
    async function fetchUserAssets() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                userAssets = {};
                data.forEach(asset => {
                    userAssets[asset.symbol.toLowerCase()] = parseFloat(asset.balance) || 0;
                });
                updateAssetBalanceDisplay();
            }
        } catch (error) {
            console.error('Error fetching assets:', error);
        }
    }
    
    function updateAssetBalanceDisplay() {
        const balance = userAssets[currentPairBase.toLowerCase()] || 0;
        document.getElementById('selected-asset-balance-value').textContent = formatNumber(balance, 8);
        document.getElementById('selected-asset-symbol').textContent = currentPairBase;
        document.getElementById('order-balance-label').innerHTML = `Available: ${formatNumber(balance, 8)} ${currentPairBase}`;
        
        if (isLoggedIn) {
            const hasBalance = balance > 0;
            const hasUSDT = (userMainBalance + userMaturedBalance) > 0;
            
            if (orderSide === 'buy') {
                if (hasUSDT) {
                    document.getElementById('trading-form-content').style.display = 'block';
                    document.getElementById('insufficient-balance-message').style.display = 'none';
                } else {
                    document.getElementById('trading-form-content').style.display = 'none';
                    document.getElementById('insufficient-balance-message').style.display = 'block';
                }
            } else {
                if (hasBalance) {
                    document.getElementById('trading-form-content').style.display = 'block';
                    document.getElementById('insufficient-balance-message').style.display = 'none';
                } else {
                    document.getElementById('trading-form-content').style.display = 'none';
                    document.getElementById('insufficient-balance-message').style.display = 'block';
                }
            }
        } else {
            document.getElementById('trading-form-content').style.display = 'none';
            document.getElementById('insufficient-balance-message').style.display = 'block';
        }
    }
    
    function openConvertPage() {
        window.location.href = 'dashboard.html?tab=convert';
    }
    
    // =============================================
    // FETCH PAIR LOGOS - ACCURATE AND SPECIFIC
    // =============================================
    async function fetchAssetLogo(assetSymbol) {
        if (logoCache[assetSymbol]) return logoCache[assetSymbol];
        
        const assetMap = {
            'btc': 'bitcoin',
            'eth': 'ethereum',
            'usdt': 'tether',
            'bnb': 'binancecoin',
            'sol': 'solana',
            'xrp': 'xrp',
            'ada': 'cardano',
            'doge': 'dogecoin',
            'trx': 'tron',
            'dot': 'polkadot',
            'matic': 'polygon',
            'ltc': 'litecoin',
            'avax': 'avalanche-2',
            'shib': 'shiba-inu',
            'uni': 'uniswap',
            'link': 'chainlink',
            'atom': 'cosmos',
            'etc': 'ethereum-classic',
            'xlm': 'stellar',
            'algo': 'algorand'
        };
        
        const coinId = assetMap[assetSymbol.toLowerCase()];
        if (!coinId) {
            logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            return logoCache[assetSymbol];
        }
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}`);
            if (response.ok) {
                const data = await response.json();
                const logo = data.image?.small || data.image?.thumb;
                if (logo) {
                    logoCache[assetSymbol] = logo;
                    return logo;
                }
            }
        } catch (error) {
            console.warn(`Failed to fetch logo for ${assetSymbol}:`, error);
        }
        
        logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        return logoCache[assetSymbol];
    }
    
    async function updatePairLogos() {
        const baseLogo = await fetchAssetLogo(currentPairBase);
        const quoteLogo = await fetchAssetLogo(currentPairQuote);
        
        document.getElementById('header-pair-logos').innerHTML = `
            <img src="${baseLogo}" alt="${currentPairBase}">
            <img src="${quoteLogo}" alt="${currentPairQuote}">
        `;
    }
    
    // =============================================
    // FETCH BINANCE PAIRS
    // =============================================
    async function fetchBinancePairs() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            if (response.ok) {
                const data = await response.json();
                allPairs = data.symbols
                    .filter(s => s.status === 'TRADING')
                    .map(s => ({
                        symbol: s.symbol,
                        baseAsset: s.baseAsset,
                        quoteAsset: s.quoteAsset,
                        basePrecision: s.baseAssetPrecision,
                        quotePrecision: s.quoteAssetPrecision
                    }));
                
                filteredPairs = allPairs.filter(p => p.quoteAsset === 'USDT');
                console.log(`Loaded ${allPairs.length} trading pairs, ${filteredPairs.length} USDT pairs`);
                return true;
            }
        } catch (error) {
            console.error('Error fetching Binance pairs:', error);
        }
        return false;
    }
    
    // =============================================
    // SELECT PAIR - FULL PAGE RELOAD
    // =============================================
    function selectPair(pairSymbol) {
        if (pairSymbol === currentPairSymbol) return;
        // Full page reload with new pair
        window.location.href = `trading.html?symbol=${pairSymbol}`;
    }
    
    // =============================================
    // LOAD TRADE HISTORY FOR CURRENT PAIR FROM DATABASE
    // =============================================
    async function loadTradeHistoryForPair() {
        const token = localStorage.getItem('jwtToken');
        const historyContainer = document.getElementById('trade-history-list');
        
        if (!token) {
            historyContainer.innerHTML = '<div class="history-empty">Login to view trade history</div>';
            return;
        }
        
        try {
            const response = await fetch(`https://bithash-backend-1.onrender.com/api/trading/history?symbol=${currentPairSymbol}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const trades = await response.json();
                if (trades && trades.length > 0) {
                    historyContainer.innerHTML = trades.map(trade => `
                        <div class="history-row">
                            <span style="color: ${trade.side === 'buy' ? 'var(--positive)' : 'var(--negative)'}">${trade.side.toUpperCase()}</span>
                            <span>${formatNumber(trade.amount, 4)}</span>
                            <span>${formatUSD(trade.price)}</span>
                            <span>${new Date(trade.timestamp).toLocaleTimeString()}</span>
                        </div>
                    `).join('');
                } else {
                    historyContainer.innerHTML = '<div class="history-empty">No trades yet for this pair</div>';
                }
            } else {
                historyContainer.innerHTML = '<div class="history-empty">Unable to load history</div>';
            }
        } catch (error) {
            console.error('Error loading trade history:', error);
            historyContainer.innerHTML = '<div class="history-empty">Error loading history</div>';
        }
    }
    
    // =============================================
    // TRADINGVIEW CHART - MATCHES EXACT PAIR USER IS TRADING
    // =============================================
    let tradingViewWidget = null;
    
    function createTradingViewChart(symbol) {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        
        if (typeof TradingView !== 'undefined') {
            tradingViewWidget = new TradingView.widget({
                "autosize": true,
                "symbol": `BINANCE:${symbol}`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#151A21",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">Loading Chart...</div>';
        }
    }
    
    // =============================================
    // BINANCE REAL-TIME DATA
    // =============================================
    
    async function fetchTicker() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPairSymbol}`);
            if (response.ok) {
                const data = await response.json();
                currentPrice = parseFloat(data.lastPrice);
                currentChange24h = parseFloat(data.priceChangePercent);
                
                // Update header
                document.getElementById('header-current-price').textContent = formatUSD(currentPrice);
                document.getElementById('header-pair-name').textContent = `${currentPairBase}/${currentPairQuote}`;
                document.title = `${currentPairBase}/${currentPairQuote} | $${formatNumber(currentPrice, 2)} | BitHash Trading`;
                
                const changeClass = currentChange24h >= 0 ? 'positive' : 'negative';
                const changeSign = currentChange24h >= 0 ? '+' : '';
                document.getElementById('header-change').textContent = `${changeSign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('header-change').className = `header-change ${changeClass}`;
                document.getElementById('header-change-stat').textContent = `${changeSign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('header-change-stat').style.color = currentChange24h >= 0 ? 'var(--positive)' : 'var(--negative)';
                
                document.getElementById('header-high').textContent = formatUSD(parseFloat(data.highPrice));
                document.getElementById('header-low').textContent = formatUSD(parseFloat(data.lowPrice));
                
                const volume = parseFloat(data.volume);
                const quoteVolume = parseFloat(data.quoteVolume);
                document.getElementById('header-volume').textContent = `${formatNumber(volume, 0)} ${currentPairBase}`;
                
                document.getElementById('order-price').value = currentPrice.toFixed(2);
                updateOrderTotal();
            }
        } catch (error) {
            console.error('Error fetching ticker:', error);
        }
    }
    
    async function fetchOrderBook() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPairSymbol}&limit=10`);
            if (response.ok) {
                const data = await response.json();
                
                const asksContainer = document.getElementById('order-book-asks');
                asksContainer.innerHTML = data.asks.slice(0, 8).reverse().map(ask => {
                    const price = parseFloat(ask[0]);
                    const amount = parseFloat(ask[1]);
                    const total = price * amount;
                    return `
                        <div class="order-book-row" onclick="setOrderPrice(${price})">
                            <span class="order-book-price negative">${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span>${formatUSD(total)}</span>
                        </div>
                    `;
                }).join('');
                
                const bidsContainer = document.getElementById('order-book-bids');
                bidsContainer.innerHTML = data.bids.slice(0, 8).map(bid => {
                    const price = parseFloat(bid[0]);
                    const amount = parseFloat(bid[1]);
                    const total = price * amount;
                    return `
                        <div class="order-book-row" onclick="setOrderPrice(${price})">
                            <span class="order-book-price positive">${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span>${formatUSD(total)}</span>
                        </div>
                    `;
                }).join('');
                
                const bestAsk = parseFloat(data.asks[0][0]);
                const bestBid = parseFloat(data.bids[0][0]);
                const spread = bestAsk - bestBid;
                const spreadPercent = (spread / bestAsk) * 100;
                document.getElementById('spread-info').innerHTML = `Spread: <span class="accent">${formatUSD(spread)}</span> (${spreadPercent.toFixed(4)}%)`;
            }
        } catch (error) {
            console.error('Error fetching order book:', error);
        }
    }
    
    async function fetchRecentTrades() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPairSymbol}&limit=20`);
            if (response.ok) {
                const data = await response.json();
                const container = document.getElementById('recent-trades');
                container.innerHTML = data.map(trade => {
                    const isBuy = !trade.isBuyerMaker;
                    const price = parseFloat(trade.price);
                    const amount = parseFloat(trade.qty);
                    const time = new Date(trade.time).toLocaleTimeString();
                    return `
                        <div class="trade-row">
                            <span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span>
                            <span>${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span style="font-size: 0.65rem; color: var(--text-muted);">${time}</span>
                        </div>
                    `;
                }).join('');
            }
        } catch (error) {
            console.error('Error fetching recent trades:', error);
        }
    }
    
    function setOrderPrice(price) {
        document.getElementById('order-price').value = price.toFixed(2);
        updateOrderTotal();
    }
    
    function updateOrderTotal() {
        const amount = parseFloat(document.getElementById('order-amount').value) || 0;
        const price = parseFloat(document.getElementById('order-price').value) || 0;
        const total = amount * price;
        document.getElementById('order-total-value').innerHTML = `≈ ${formatUSD(total)}`;
    }
    
    function setOrderSide(side) {
        orderSide = side;
        const buyTab = document.getElementById('tab-buy');
        const sellTab = document.getElementById('tab-sell');
        const submitBtn = document.getElementById('order-submit-btn');
        
        if (side === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            submitBtn.className = 'order-action-btn buy';
            submitBtn.innerHTML = `Buy ${currentPairBase}`;
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            submitBtn.className = 'order-action-btn sell';
            submitBtn.innerHTML = `Sell ${currentPairBase}`;
        }
        
        updateAssetBalanceDisplay();
    }
    
    async function executeOrder() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            showNotification('error', 'Authentication Required', 'Please login to trade');
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }
        
        const price = parseFloat(document.getElementById('order-price').value);
        const amount = parseFloat(document.getElementById('order-amount').value);
        
        if (!amount || amount <= 0) {
            showNotification('error', 'Invalid Amount', 'Please enter a valid amount');
            return;
        }
        
        const total = price * amount;
        
        if (orderSide === 'buy') {
            const availableUSDT = userMainBalance + userMaturedBalance;
            if (total > availableUSDT) {
                showNotification('error', 'Insufficient Balance', `You need ${formatUSD(total)} but have ${formatUSD(availableUSDT)}`);
                return;
            }
        } else {
            const availableAsset = userAssets[currentPairBase.toLowerCase()] || 0;
            if (amount > availableAsset) {
                showNotification('error', 'Insufficient Balance', `You have ${formatNumber(availableAsset, 8)} ${currentPairBase}`);
                return;
            }
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    symbol: currentPairSymbol,
                    side: orderSide,
                    type: 'market',
                    price: price,
                    amount: amount,
                    total: total
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                showNotification('success', 'Order Executed', `${orderSide.toUpperCase()} ${formatNumber(amount, 6)} ${currentPairBase} at ${formatUSD(price)}`);
                document.getElementById('order-amount').value = '';
                updateOrderTotal();
                await fetchUserBalances();
                await fetchUserAssets();
                await loadTradeHistoryForPair();
            } else {
                const error = await response.json();
                showNotification('error', 'Order Failed', error.message || 'Please try again');
            }
        } catch (error) {
            console.error('Order execution error:', error);
            showNotification('error', 'Order Failed', 'Network error. Please try again.');
        }
    }
    
    function startRealTimeUpdates() {
        if (tickerUpdateInterval) clearInterval(tickerUpdateInterval);
        if (orderBookUpdateInterval) clearInterval(orderBookUpdateInterval);
        if (tradesUpdateInterval) clearInterval(tradesUpdateInterval);
        
        fetchTicker();
        fetchOrderBook();
        fetchRecentTrades();
        
        tickerUpdateInterval = setInterval(fetchTicker, 2000);
        orderBookUpdateInterval = setInterval(fetchOrderBook, 1000);
        tradesUpdateInterval = setInterval(fetchRecentTrades, 2000);
    }
    
    // =============================================
    // FOOTER TICKER
    // =============================================
    async function initFooterTicker() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            if (response.ok) {
                const data = await response.json();
                const topPairs = data
                    .filter(t => t.symbol.endsWith('USDT'))
                    .slice(0, 30)
                    .map(t => {
                        const change = parseFloat(t.priceChangePercent);
                        const changeClass = change >= 0 ? 'positive' : 'negative';
                        const changeSign = change >= 0 ? '+' : '';
                        return `
                            <span class="ticker-item">
                                ${t.symbol.replace('USDT', '/USDT')}: ${formatUSD(parseFloat(t.lastPrice))}
                                <span class="${changeClass}">${changeSign}${change.toFixed(2)}%</span>
                            </span>
                        `;
                    }).join('');
                
                const tickerContainer = document.getElementById('footer-ticker');
                tickerContainer.innerHTML = `
                    <div class="ticker-content">
                        ${topPairs.repeat(2)}
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error loading footer ticker:', error);
        }
    }
    
    // =============================================
    // PAIR SEARCH DROPDOWN
    // =============================================
    function setupPairSearch() {
        const searchInput = document.getElementById('pair-search');
        const dropdown = document.getElementById('pair-dropdown');
        
        searchInput.addEventListener('input', async (e) => {
            const searchTerm = e.target.value.toUpperCase();
            if (searchTerm.length < 1) {
                dropdown.style.display = 'none';
                return;
            }
            
            const matches = filteredPairs
                .filter(p => p.symbol.includes(searchTerm))
                .slice(0, 15);
            
            if (matches.length > 0) {
                dropdown.style.display = 'block';
                // Fetch logos for each match
                let itemsHtml = '';
                for (const pair of matches) {
                    const baseLogo = await fetchAssetLogo(pair.baseAsset);
                    itemsHtml += `
                        <div class="pair-search-item" onclick="selectPair('${pair.symbol}')">
                            <img src="${baseLogo}" alt="${pair.baseAsset}" style="width: 24px; height: 24px; border-radius: 50%;">
                            <div>
                                <div><strong>${pair.baseAsset}/${pair.quoteAsset}</strong></div>
                                <div style="font-size: 0.7rem; color: var(--text-muted);">${pair.symbol}</div>
                            </div>
                        </div>
                    `;
                }
                dropdown.innerHTML = itemsHtml;
            } else {
                dropdown.style.display = 'none';
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }
    
    // =============================================
    // URL PARAMETER HANDLING
    // =============================================
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    // =============================================
    // INITIALIZATION
    // =============================================
    async function init() {
        await fetchBinancePairs();
        
        // Get pair from URL or default to BTCUSDT
        const urlSymbol = getUrlParameter('symbol');
        if (urlSymbol) {
            let pairSymbol = urlSymbol.toUpperCase();
            if (!pairSymbol.includes('USDT')) {
                pairSymbol = pairSymbol + 'USDT';
            }
            if (allPairs.some(p => p.symbol === pairSymbol)) {
                currentPairSymbol = pairSymbol;
            } else {
                currentPairSymbol = 'BTCUSDT';
            }
        } else {
            currentPairSymbol = 'BTCUSDT';
        }
        
        const pairInfo = allPairs.find(p => p.symbol === currentPairSymbol);
        if (pairInfo) {
            currentPairBase = pairInfo.baseAsset;
            currentPairQuote = pairInfo.quoteAsset;
        } else {
            currentPairBase = currentPairSymbol.replace('USDT', '');
            currentPairQuote = 'USDT';
        }
        
        document.getElementById('header-pair-name').textContent = `${currentPairBase}/${currentPairQuote}`;
        document.title = `${currentPairBase}/${currentPairQuote} | BitHash Trading`;
        
        await updatePairLogos();
        await fetchUserBalances();
        await initFooterTicker();
        await loadTradeHistoryForPair();
        
        createTradingViewChart(currentPairSymbol);
        startRealTimeUpdates();
        setupPairSearch();
        
        document.getElementById('order-amount').addEventListener('input', updateOrderTotal);
        
        document.getElementById('loading-overlay').classList.add('hidden');
        
        // Refresh history and balances periodically
        setInterval(() => {
            if (isLoggedIn) {
                loadTradeHistoryForPair();
                fetchUserBalances();
            }
        }, 30000);
    }
    
    // Expose functions globally
    window.setOrderPrice = setOrderPrice;
    window.setOrderSide = setOrderSide;
    window.executeOrder = executeOrder;
    window.selectPair = selectPair;
    window.openConvertPage = openConvertPage;
    
    init();
</script>
</body>
</html>
