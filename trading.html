<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <title>BitHash Capital | Trading</title>
    <meta name="description" content="Professional cryptocurrency trading platform with real-time Binance data. Trade crypto with advanced charting and order book.">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Chart Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #00A15C;
            --negative: #FF4D4D;
            --blue: #003366;
            --gold: #D4AF37;
            --success: #00A15C;
            --warning: #FFB800;
            --error: #FF4D4D;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            display: none;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Header */
        header {
            background-color: var(--bg-base);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }

        .header-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Main Trading Layout - PC */
        .trading-wrapper {
            width: 100%;
        }

        /* PC Layout (≥992px) */
        @media (min-width: 992px) {
            .main-grid {
                display: grid;
                grid-template-columns: 300px 1fr 340px;
                gap: 0;
                max-width: 1600px;
                margin: 0 auto;
            }

            .order-book-section {
                border-right: 1px solid var(--border);
                background: var(--bg-card);
                height: calc(100vh - 280px);
                overflow-y: auto;
            }

            .chart-section {
                background: var(--bg-card);
            }

            .trade-section {
                border-left: 1px solid var(--border);
                background: var(--bg-card);
            }

            .horizontal-sections {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0;
                max-width: 1600px;
                margin: 0 auto;
                border-top: 1px solid var(--border);
            }

            .recent-trades-container {
                border-right: 1px solid var(--border);
                background: var(--bg-card);
            }

            .history-container {
                background: var(--bg-card);
            }
        }

        /* Mobile Layout (<992px) */
        @media (max-width: 991px) {
            .mobile-header {
                padding: 16px;
                background: var(--bg-card);
                border-bottom: 1px solid var(--border);
            }

            .mobile-action-bar {
                display: flex;
                gap: 12px;
                padding: 12px 16px;
                background: var(--bg-surface);
                border-bottom: 1px solid var(--border);
            }

            .mobile-action-bar .btn {
                flex: 1;
                text-align: center;
            }

            .mobile-stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                padding: 16px;
                background: var(--bg-card);
                border-bottom: 1px solid var(--border);
            }

            .mobile-tabs {
                display: flex;
                gap: 4px;
                padding: 12px 16px;
                background: var(--bg-surface);
                border-bottom: 1px solid var(--border);
            }

            .mobile-tab {
                flex: 1;
                text-align: center;
                padding: 10px;
                border-radius: 8px;
                background: var(--bg-hover);
                cursor: pointer;
                font-weight: 600;
                font-size: 0.85rem;
            }

            .mobile-tab.active {
                background: var(--accent);
                color: #000;
            }

            .mobile-content {
                min-height: 400px;
                background: var(--bg-card);
            }

            .floating-buy-sell {
                position: fixed;
                bottom: 70px;
                left: 16px;
                right: 16px;
                display: flex;
                gap: 12px;
                z-index: 100;
            }

            .floating-buy-sell .btn-buy,
            .floating-buy-sell .btn-sell {
                flex: 1;
                padding: 14px;
                border-radius: 40px;
                font-weight: 700;
                text-align: center;
                cursor: pointer;
            }

            .floating-buy-sell .btn-buy {
                background: var(--positive);
                color: white;
            }

            .floating-buy-sell .btn-sell {
                background: var(--negative);
                color: white;
            }

            .footer-ticker-mobile {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--bg-surface);
                border-top: 1px solid var(--border);
                padding: 8px;
                overflow-x: auto;
                white-space: nowrap;
                z-index: 100;
            }

            body {
                padding-bottom: 120px;
            }
        }

        /* Common Styles */
        .pair-header {
            padding: 16px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pair-logos {
            display: flex;
            align-items: center;
        }

        .pair-logos img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .pair-logos img:first-child {
            margin-right: -12px;
            z-index: 2;
        }

        .pair-logos img:last-child {
            z-index: 1;
        }

        .pair-name-price {
            display: flex;
            flex-direction: column;
        }

        .pair-name {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .pair-price {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .pair-change {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .pair-change.positive {
            background: rgba(0, 161, 92, 0.15);
            color: var(--positive);
        }

        .pair-change.negative {
            background: rgba(255, 77, 77, 0.15);
            color: var(--negative);
        }

        .stats-row {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Order Book */
        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 12px 16px;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 6px 16px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.1s;
        }

        .order-book-row:hover {
            background: var(--bg-hover);
        }

        .order-book-price.positive {
            color: var(--positive);
        }

        .order-book-price.negative {
            color: var(--negative);
        }

        .spread-row {
            text-align: center;
            padding: 10px;
            background: var(--bg-hover);
            margin: 8px 0;
            font-size: 0.8rem;
        }

        /* Chart */
        .chart-container {
            height: 450px;
            width: 100%;
        }

        #tradingview-chart {
            width: 100%;
            height: 100%;
        }

        /* Trade Box */
        .trade-box {
            padding: 20px;
        }

        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            background: var(--bg-hover);
        }

        .order-tab.buy.active {
            background: var(--positive);
            color: white;
        }

        .order-tab.sell.active {
            background: var(--negative);
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .percent-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .percent-btn {
            flex: 1;
            padding: 6px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        .percent-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .order-action-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 16px;
        }

        .order-action-btn.buy {
            background: var(--positive);
            color: white;
        }

        .order-action-btn.sell {
            background: var(--negative);
            color: white;
        }

        .order-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Recent Trades - Horizontal container, vertical list */
        .recent-trades-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 100px;
            padding: 8px 16px;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .trade-buy {
            color: var(--positive);
            font-weight: 600;
        }

        .trade-sell {
            color: var(--negative);
            font-weight: 600;
        }

        /* History Section */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 1fr 120px;
            padding: 8px 16px;
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .history-header {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 1fr 120px;
            padding: 10px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .panel-header {
            padding: 12px 16px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        /* Pair Search */
        .pair-search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .pair-search-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
        }

        .pair-search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
        }

        .pair-search-item {
            padding: 10px 12px;
            cursor: pointer;
        }

        .pair-search-item:hover {
            background: var(--bg-card);
        }

        /* Notification */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            max-width: 350px;
        }

        .notification {
            background: var(--bg-hover);
            border-left: 4px solid;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        .notification.info { border-left-color: var(--accent); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
</div>

<div class="notification-center" id="notification-center"></div>

<!-- Main Content -->
<div class="trading-wrapper" id="app"></div>

<script>
    // =============================================
    // GLOBAL STATE
    // =============================================
    let currentPairSymbol = 'BTCUSDT';
    let currentPairBase = 'BTC';
    let currentPairQuote = 'USDT';
    let currentPrice = 0;
    let currentChange24h = 0;
    let orderSide = 'buy';
    let userAssets = {};
    let userMainBalance = 0;
    let userMaturedBalance = 0;
    let allPairs = [];
    let isLoggedIn = false;
    let tradeHistory = [];
    let logoCache = {};

    // Trading intervals
    let tickerInterval, orderBookInterval, tradesInterval;

    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    function showNotification(type, title, message) {
        const container = document.getElementById('notification-center');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }

    function formatNumber(num, decimals = 8) {
        if (num === null || num === undefined) return '0.00000000';
        return parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }

    function formatUSD(num) {
        if (num === null || num === undefined) return '$0.00';
        return '$' + parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    // =============================================
    // FETCH USER DATA
    // =============================================
    async function fetchUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            isLoggedIn = false;
            return;
        }
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                userMainBalance = parseFloat(data.main) || 0;
                userMaturedBalance = parseFloat(data.matured) || 0;
                isLoggedIn = true;
                await fetchUserAssets();
                await fetchTradeHistory();
            } else {
                isLoggedIn = false;
            }
        } catch (error) {
            console.error('Error fetching balances:', error);
        }
    }

    async function fetchUserAssets() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                userAssets = {};
                data.forEach(asset => {
                    userAssets[asset.symbol.toLowerCase()] = parseFloat(asset.balance) || 0;
                });
                renderUI();
            }
        } catch (error) {
            console.error('Error fetching assets:', error);
        }
    }

    async function fetchTradeHistory() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        try {
            const response = await fetch(`https://bithash-backend-1.onrender.com/api/trading/history/${currentPairSymbol}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                tradeHistory = data;
                renderUI();
            }
        } catch (error) {
            console.error('Error fetching history:', error);
        }
    }

    // =============================================
    // PAIR LOGOS
    // =============================================
    async function fetchAssetLogo(assetSymbol) {
        if (logoCache[assetSymbol]) return logoCache[assetSymbol];
        const assetMap = {
            'btc': 'bitcoin', 'eth': 'ethereum', 'usdt': 'tether', 'bnb': 'binancecoin',
            'sol': 'solana', 'xrp': 'xrp', 'ada': 'cardano', 'doge': 'dogecoin'
        };
        const coinId = assetMap[assetSymbol.toLowerCase()];
        if (!coinId) return 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}`);
            if (response.ok) {
                const data = await response.json();
                const logo = data.image?.small;
                if (logo) {
                    logoCache[assetSymbol] = logo;
                    return logo;
                }
            }
        } catch (error) {}
        return 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
    }

    // =============================================
    // BINANCE DATA FETCHING
    // =============================================
    async function fetchBinancePairs() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            if (response.ok) {
                const data = await response.json();
                allPairs = data.symbols.filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT');
                return true;
            }
        } catch (error) { console.error(error); }
        return false;
    }

    async function fetchTicker() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPairSymbol}`);
            if (response.ok) {
                const data = await response.json();
                currentPrice = parseFloat(data.lastPrice);
                currentChange24h = parseFloat(data.priceChangePercent);
                renderUI();
            }
        } catch (error) { console.error(error); }
    }

    async function fetchOrderBook() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPairSymbol}&limit=10`);
            if (response.ok) {
                const data = await response.json();
                renderOrderBook(data);
            }
        } catch (error) { console.error(error); }
    }

    async function fetchRecentTrades() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPairSymbol}&limit=20`);
            if (response.ok) {
                const data = await response.json();
                renderRecentTrades(data);
            }
        } catch (error) { console.error(error); }
    }

    // =============================================
    // RENDER FUNCTIONS
    // =============================================
    async function renderUI() {
        const logos = await Promise.all([fetchAssetLogo(currentPairBase), fetchAssetLogo(currentPairQuote)]);
        const availableAsset = userAssets[currentPairBase.toLowerCase()] || 0;
        const availableUSDT = userMainBalance + userMaturedBalance;
        const totalValue = availableAsset * currentPrice;

        document.getElementById('app').innerHTML = `
            ${window.innerWidth >= 992 ? renderPCLayout(logos, availableAsset, availableUSDT) : renderMobileLayout(logos, availableAsset, availableUSDT)}
        `;
        attachEventListeners();
    }

    function renderPCLayout(logos, assetBalance, usdtBalance) {
        const changeClass = currentChange24h >= 0 ? 'positive' : 'negative';
        const changeSign = currentChange24h >= 0 ? '+' : '';
        return `
            <!-- PC Header -->
            <header>
                <div class="header-container">
                    <div class="pair-info">
                        <div class="pair-logos">
                            <img src="${logos[0]}" alt="${currentPairBase}">
                            <img src="${logos[1]}" alt="${currentPairQuote}">
                        </div>
                        <div class="pair-name-price">
                            <span class="pair-name">${currentPairBase}/${currentPairQuote}</span>
                            <span class="pair-price">${formatUSD(currentPrice)}</span>
                        </div>
                        <span class="pair-change ${changeClass}">${changeSign}${currentChange24h.toFixed(2)}%</span>
                        <div class="stats-row">
                            <div class="stat-item"><span class="stat-label">24h High</span><span class="stat-value">${formatUSD(currentPrice * 1.02)}</span></div>
                            <div class="stat-item"><span class="stat-label">24h Low</span><span class="stat-value">${formatUSD(currentPrice * 0.98)}</span></div>
                            <div class="stat-item"><span class="stat-label">24h Volume</span><span class="stat-value">79,759 ${currentPairBase}</span></div>
                            <div class="stat-item"><span class="stat-label">24h Change</span><span class="stat-value ${changeClass}">${changeSign}${currentChange24h.toFixed(2)}%</span></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Grid -->
            <div class="main-grid">
                <div class="order-book-section"><div id="order-book-content"></div></div>
                <div class="chart-section"><div class="chart-container"><div id="tradingview-chart"></div></div></div>
                <div class="trade-section"><div id="trade-box-content"></div></div>
            </div>

            <!-- Horizontal Recent Trades & History -->
            <div class="horizontal-sections">
                <div class="recent-trades-container"><div class="panel-header">Recent Trades</div><div id="recent-trades-list" class="recent-trades-list"></div></div>
                <div class="history-container"><div class="panel-header">Trade History</div><div id="history-list" class="history-list"></div></div>
            </div>
        `;
    }

    function renderMobileLayout(logos, assetBalance, usdtBalance) {
        const changeClass = currentChange24h >= 0 ? 'positive' : 'negative';
        const changeSign = currentChange24h >= 0 ? '+' : '';
        return `
            <div class="mobile-header">
                <div class="pair-info">
                    <div class="pair-logos"><img src="${logos[0]}"><img src="${logos[1]}"></div>
                    <div><span class="pair-name">${currentPairBase}/${currentPairQuote}</span><div class="pair-price">${formatUSD(currentPrice)}</div></div>
                    <span class="pair-change ${changeClass}">${changeSign}${currentChange24h.toFixed(2)}%</span>
                </div>
            </div>
            <div class="mobile-action-bar">
                <button class="btn btn-buy" onclick="setOrderSideAndShow('buy')">Buy</button>
                <button class="btn btn-sell" onclick="setOrderSideAndShow('sell')">Sell</button>
                <button class="btn btn-outline" onclick="window.location.href='deposit.html'">Deposit</button>
            </div>
            <div class="chart-container" style="height:300px"><div id="tradingview-chart"></div></div>
            <div class="mobile-stats">
                <div><div class="stat-label">High</div><div class="stat-value">${formatUSD(currentPrice * 1.02)}</div></div>
                <div><div class="stat-label">Low</div><div class="stat-value">${formatUSD(currentPrice * 0.98)}</div></div>
                <div><div class="stat-label">Volume</div><div class="stat-value">${formatNumber(79759, 0)}</div></div>
                <div><div class="stat-label">24h %</div><div class="stat-value ${changeClass}">${changeSign}${currentChange24h.toFixed(2)}%</div></div>
            </div>
            <div class="mobile-tabs">
                <div class="mobile-tab active" data-tab="orderbook">Order Book</div>
                <div class="mobile-tab" data-tab="trades">Trades</div>
                <div class="mobile-tab" data-tab="history">History</div>
            </div>
            <div class="mobile-content" id="mobile-content"><div id="order-book-content"></div></div>
            <div class="floating-buy-sell">
                <div class="btn-buy" onclick="openBuyModal()">Buy ${currentPairBase}</div>
                <div class="btn-sell" onclick="openSellModal()">Sell ${currentPairBase}</div>
            </div>
            <div class="footer-ticker-mobile" id="footer-ticker"></div>
        `;
    }

    function renderOrderBook(data) {
        const container = document.getElementById('order-book-content');
        if (!container) return;
        const asks = data.asks.slice(0, 8).reverse();
        const bids = data.bids.slice(0, 8);
        const bestAsk = parseFloat(data.asks[0][0]);
        const bestBid = parseFloat(data.bids[0][0]);
        const spread = bestAsk - bestBid;
        const spreadPercent = (spread / bestAsk) * 100;
        container.innerHTML = `
            <div class="order-book-header"><span>Price (USDT)</span><span>Amount</span><span>Total</span></div>
            <div id="asks">${asks.map(a => `<div class="order-book-row" onclick="setOrderPrice(${parseFloat(a[0])})"><span class="order-book-price negative">${formatUSD(parseFloat(a[0]))}</span><span>${formatNumber(parseFloat(a[1]), 4)}</span><span>${formatUSD(parseFloat(a[0]) * parseFloat(a[1]))}</span></div>`).join('')}</div>
            <div class="spread-row">Spread: <span class="accent">${formatUSD(spread)}</span> (${spreadPercent.toFixed(4)}%)</div>
            <div id="bids">${bids.map(b => `<div class="order-book-row" onclick="setOrderPrice(${parseFloat(b[0])})"><span class="order-book-price positive">${formatUSD(parseFloat(b[0]))}</span><span>${formatNumber(parseFloat(b[1]), 4)}</span><span>${formatUSD(parseFloat(b[0]) * parseFloat(b[1]))}</span></div>`).join('')}</div>
        `;
    }

    function renderRecentTrades(trades) {
        const container = document.getElementById('recent-trades-list');
        if (!container) return;
        container.innerHTML = trades.slice(0, 8).map(t => {
            const isBuy = !t.isBuyerMaker;
            return `<div class="trade-row"><span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span><span>${formatUSD(parseFloat(t.price))}</span><span>${formatNumber(parseFloat(t.qty), 4)}</span><span>${new Date(t.time).toLocaleTimeString()}</span></div>`;
        }).join('');
    }

    function renderTradeBox() {
        const container = document.getElementById('trade-box-content');
        if (!container) return;
        const assetBalance = userAssets[currentPairBase.toLowerCase()] || 0;
        const usdtBalance = userMainBalance + userMaturedBalance;
        const label = orderSide === 'buy' ? `Available USDT: ${formatUSD(usdtBalance)}` : `Available ${currentPairBase}: ${formatNumber(assetBalance, 8)}`;
        container.innerHTML = `
            <div class="trade-box">
                <div class="order-tabs">
                    <div class="order-tab buy ${orderSide === 'buy' ? 'active' : ''}" onclick="setOrderSide('buy')">Buy</div>
                    <div class="order-tab sell ${orderSide === 'sell' ? 'active' : ''}" onclick="setOrderSide('sell')">Sell</div>
                </div>
                <div class="form-group"><label>Price (USDT)</label><input type="number" class="form-input" id="order-price" value="${currentPrice.toFixed(2)}" step="0.01"></div>
                <div class="form-group"><label>Amount</label><input type="number" class="form-input" id="order-amount" step="0.0001" placeholder="0.0000"><div class="balance-info"><span>${label}</span><span id="order-total">≈ $0.00</span></div></div>
                <div class="percent-buttons"><div class="percent-btn" onclick="setPercent(25)">25%</div><div class="percent-btn" onclick="setPercent(50)">50%</div><div class="percent-btn" onclick="setPercent(75)">75%</div><div class="percent-btn" onclick="setPercent(100)">100%</div></div>
                <button class="order-action-btn ${orderSide}" onclick="executeOrder()">${orderSide === 'buy' ? 'Buy' : 'Sell'} ${currentPairBase}</button>
            </div>
        `;
        document.getElementById('order-amount')?.addEventListener('input', updateOrderTotal);
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        if (!container) return;
        if (!tradeHistory.length) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">No trade history for this pair</div>';
            return;
        }
        container.innerHTML = `<div class="history-header"><span>Side</span><span>Price</span><span>Amount</span><span>Total</span><span>Time</span></div>` +
            tradeHistory.map(h => `<div class="history-row"><span style="color: ${h.side === 'buy' ? 'var(--positive)' : 'var(--negative)'}">${h.side.toUpperCase()}</span><span>${formatUSD(h.price)}</span><span>${formatNumber(h.amount, 6)}</span><span>${formatUSD(h.total)}</span><span>${new Date(h.createdAt).toLocaleString()}</span></div>`).join('');
    }

    // =============================================
    // TRADING FUNCTIONS
    // =============================================
    function setOrderSide(side) {
        orderSide = side;
        renderTradeBox();
    }

    function setPercent(percent) {
        const amountInput = document.getElementById('order-amount');
        if (!amountInput) return;
        const assetBalance = userAssets[currentPairBase.toLowerCase()] || 0;
        const usdtBalance = userMainBalance + userMaturedBalance;
        if (orderSide === 'buy') {
            const maxAmount = usdtBalance / currentPrice;
            amountInput.value = (maxAmount * percent / 100).toFixed(6);
        } else {
            amountInput.value = (assetBalance * percent / 100).toFixed(6);
        }
        updateOrderTotal();
    }

    function updateOrderTotal() {
        const amount = parseFloat(document.getElementById('order-amount')?.value) || 0;
        const price = parseFloat(document.getElementById('order-price')?.value) || currentPrice;
        const totalSpan = document.getElementById('order-total');
        if (totalSpan) totalSpan.innerHTML = `≈ ${formatUSD(amount * price)}`;
    }

    function setOrderPrice(price) {
        const priceInput = document.getElementById('order-price');
        if (priceInput) priceInput.value = price.toFixed(2);
        updateOrderTotal();
    }

    async function executeOrder() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { showNotification('error', 'Login Required', 'Please login to trade'); setTimeout(() => window.location.href = 'login.html', 1500); return; }
        const price = parseFloat(document.getElementById('order-price')?.value) || currentPrice;
        const amount = parseFloat(document.getElementById('order-amount')?.value);
        if (!amount || amount <= 0) { showNotification('error', 'Invalid Amount', 'Please enter a valid amount'); return; }
        const total = price * amount;
        const assetBalance = userAssets[currentPairBase.toLowerCase()] || 0;
        const usdtBalance = userMainBalance + userMaturedBalance;
        if (orderSide === 'buy' && total > usdtBalance) { showNotification('error', 'Insufficient USDT', `Need ${formatUSD(total)} but have ${formatUSD(usdtBalance)}`); return; }
        if (orderSide === 'sell' && amount > assetBalance) { showNotification('error', 'Insufficient Balance', `Have ${formatNumber(assetBalance, 8)} ${currentPairBase}`); return; }
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/order', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ symbol: currentPairSymbol, side: orderSide, type: 'market', price, amount, total })
            });
            if (response.ok) {
                showNotification('success', 'Order Executed', `${orderSide.toUpperCase()} ${formatNumber(amount, 6)} ${currentPairBase}`);
                document.getElementById('order-amount').value = '';
                await fetchUserBalances();
                await fetchTradeHistory();
                updateOrderTotal();
            } else { const error = await response.json(); showNotification('error', 'Order Failed', error.message); }
        } catch (error) { showNotification('error', 'Network Error', 'Please try again'); }
    }

    // =============================================
    // CHART & NAVIGATION
    // =============================================
    let tradingViewWidget = null;
    function createTradingViewChart() {
        const container = document.getElementById('tradingview-chart');
        if (!container) return;
        if (tradingViewWidget) tradingViewWidget.remove();
        if (typeof TradingView !== 'undefined') {
            tradingViewWidget = new TradingView.widget({ "autosize": true, "symbol": `BINANCE:${currentPairSymbol}`, "interval": "15", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "enable_publishing": false, "allow_symbol_change": false, "container_id": "tradingview-chart" });
        } else { container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;">Loading Chart...</div>'; }
    }

    async function selectPair(pairSymbol) {
        if (pairSymbol === currentPairSymbol) return;
        currentPairSymbol = pairSymbol;
        const pairInfo = allPairs.find(p => p.symbol === pairSymbol);
        if (pairInfo) { currentPairBase = pairInfo.baseAsset; currentPairQuote = pairInfo.quoteAsset; }
        else { currentPairBase = pairSymbol.replace('USDT', ''); currentPairQuote = 'USDT'; }
        if (tickerInterval) clearInterval(tickerInterval);
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        await fetchUserBalances();
        await fetchTradeHistory();
        createTradingViewChart();
        fetchTicker();
        fetchOrderBook();
        fetchRecentTrades();
        tickerInterval = setInterval(fetchTicker, 2000);
        orderBookInterval = setInterval(fetchOrderBook, 1000);
        tradesInterval = setInterval(fetchRecentTrades, 2000);
        renderUI();
        window.location.reload(); // Reload page on pair change as requested
    }

    function attachEventListeners() {
        document.querySelectorAll('.mobile-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                const contentDiv = document.getElementById('mobile-content');
                if (tabName === 'orderbook') fetchOrderBook();
                else if (tabName === 'trades') fetchRecentTrades();
                else if (tabName === 'history') renderHistory();
            });
        });
    }

    window.setOrderSide = setOrderSide;
    window.setOrderPrice = setOrderPrice;
    window.executeOrder = executeOrder;
    window.selectPair = selectPair;
    window.setPercent = setPercent;
    window.setOrderSideAndShow = (side) => { setOrderSide(side); document.querySelector('.floating-buy-sell')?.scrollIntoView({ behavior: 'smooth' }); };
    window.openBuyModal = () => setOrderSide('buy');
    window.openSellModal = () => setOrderSide('sell');

    async function init() {
        await fetchBinancePairs();
        await fetchUserBalances();
        createTradingViewChart();
        fetchTicker();
        fetchOrderBook();
        fetchRecentTrades();
        tickerInterval = setInterval(fetchTicker, 2000);
        orderBookInterval = setInterval(fetchOrderBook, 1000);
        tradesInterval = setInterval(fetchRecentTrades, 2000);
        renderUI();
        document.getElementById('loading-overlay')?.classList.add('hidden');
        setInterval(() => fetchUserBalances(), 30000);
    }
    init();
</script>
</body>
</html>
