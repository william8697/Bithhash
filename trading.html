<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitHash | Trading Terminal</title>
    <meta name="description" content="Professional crypto trading terminal with real-time Binance data. Trade crypto with USDT pairs, live order book, and charts.">
    
    <!-- Favicon & Fonts (matching index.html) -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        
        /* Header & Navigation */
        .trading-header {
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img { height: 32px; }
        .logo-text { font-family: 'Rowdies', sans-serif; font-weight: 700; font-size: 1.3rem; color: white; }
        .pair-search-area {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .pair-search-area i { color: var(--text-muted); }
        #pairSearchInput {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            min-width: 200px;
            outline: none;
        }
        .selected-pair-display {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-hover);
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .pair-logos { display: flex; gap: 4px; align-items: center; }
        .pair-logos img { width: 28px; height: 28px; border-radius: 50%; }
        .price-ticker { font-weight: 700; font-size: 1.3rem; }
        .change-badge { font-size: 0.85rem; padding: 2px 8px; border-radius: 20px; }
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        
        /* Trading Grid */
        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 16px;
            margin: 20px 0;
        }
        /* Order Book */
        .orderbook-panel, .trades-panel, .chart-panel, .trade-panel, .stats-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 16px;
        }
        .panel-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .orderbook-header { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.7rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .orderbook-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; cursor: pointer; }
        .orderbook-row:hover { background: var(--bg-hover); }
        .bid-price { color: var(--positive); }
        .ask-price { color: var(--negative); }
        .spread-info { text-align: center; margin: 8px 0; font-size: 0.75rem; color: var(--text-muted); }
        
        /* Recent Trades */
        .trade-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }
        
        /* Chart */
        .chart-container { height: 380px; width: 100%; }
        
        /* Trade Form */
        .trade-tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .trade-tab { flex: 1; text-align: center; padding: 10px; border-radius: 40px; background: var(--bg-hover); cursor: pointer; font-weight: 600; }
        .trade-tab.active.buy { background: var(--positive); color: white; }
        .trade-tab.active.sell { background: var(--negative); color: white; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .trade-input { width: 100%; background: var(--bg-base); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; font-size: 1rem; }
        .balance-info { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; text-align: right; }
        .trade-btn { width: 100%; padding: 14px; border-radius: 40px; font-weight: 700; border: none; margin-top: 12px; cursor: pointer; transition: 0.2s; }
        .trade-btn.buy { background: var(--positive); color: white; }
        .trade-btn.sell { background: var(--negative); color: white; }
        .trade-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .insufficient-actions { display: flex; gap: 12px; margin-top: 16px; }
        .insufficient-actions button { flex: 1; padding: 10px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .deposit-btn { background: var(--accent); color: #000; }
        .convert-btn { background: var(--bg-hover); color: white; border: 1px solid var(--border); }
        
        /* Market Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-item { background: var(--bg-hover); padding: 10px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); }
        .stat-value { font-weight: 700; font-size: 1rem; }
        
        /* Pair Dropdown */
        .pair-dropdown {
            position: absolute;
            top: 70px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pair-dropdown.show { display: block; }
        .pair-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }
        .pair-option:hover { background: var(--bg-hover); }
        .pair-option img { width: 24px; height: 24px; border-radius: 50%; }
        
        /* Footer Ticker */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 90;
        }
        .ticker-content {
            display: inline-block;
            animation: ticker 60s linear infinite;
        }
        .ticker-item { display: inline-block; margin-right: 32px; font-size: 0.8rem; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .trading-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="trading-header">
    <div class="container header-flex">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">
            <span class="logo-text">₿itHash</span>
        </div>
        <div style="position: relative;">
            <div class="pair-search-area" id="pairSearchArea">
                <i class="fas fa-search"></i>
                <input type="text" id="pairSearchInput" placeholder="Search pair... BTCUSDT, ETHUSDT" autocomplete="off">
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="pair-dropdown" id="pairDropdown"></div>
        </div>
        <div class="selected-pair-display" id="selectedPairDisplay">
            <div class="pair-logos" id="pairLogos">
                <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" id="baseLogo">
                <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" id="quoteLogo">
            </div>
            <div>
                <span id="selectedPairSymbol">BTC/USDT</span>
                <div><span id="livePrice" class="price-ticker">$0.00</span> <span id="priceChange" class="change-badge">0.00%</span></div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="trading-grid">
        <!-- LEFT: Order Book -->
        <div class="orderbook-panel">
            <div class="panel-title"><i class="fas fa-book"></i> Order Book</div>
            <div class="orderbook-header"><span>Price (USDT)</span><span>Amount</span><span>Total</span></div>
            <div id="asksContainer"></div>
            <div class="spread-info" id="spreadInfo">Spread: --</div>
            <div id="bidsContainer"></div>
        </div>
        
        <!-- CENTER: Chart -->
        <div class="chart-panel">
            <div class="panel-title"><i class="fas fa-chart-line"></i> Chart</div>
            <div id="tradingview-chart" class="chart-container"></div>
            <div class="stats-grid" id="marketStats">
                <div class="stat-item"><div class="stat-label">24h High</div><div class="stat-value" id="high24h">-</div></div>
                <div class="stat-item"><div class="stat-label">24h Low</div><div class="stat-value" id="low24h">-</div></div>
                <div class="stat-item"><div class="stat-label">24h Volume</div><div class="stat-value" id="volume24h">-</div></div>
                <div class="stat-item"><div class="stat-label">Weighted Avg</div><div class="stat-value" id="weightedAvg">-</div></div>
            </div>
        </div>
        
        <!-- RIGHT: Trade & Recent Trades -->
        <div>
            <div class="trade-panel" style="margin-bottom: 16px;">
                <div class="panel-title">Trade (USDT)</div>
                <div class="trade-tabs">
                    <div class="trade-tab buy active" data-side="buy">Buy</div>
                    <div class="trade-tab sell" data-side="sell">Sell</div>
                </div>
                <div id="tradeForm">
                    <div class="input-group">
                        <label>Amount (USDT)</label>
                        <input type="number" id="tradeAmount" class="trade-input" placeholder="0.00" step="any">
                        <div class="balance-info">Available: <span id="availableBalanceUSD">$0.00</span></div>
                    </div>
                    <div class="input-group">
                        <label>Price (USDT)</label>
                        <input type="text" id="tradePrice" class="trade-input" readonly placeholder="Market price">
                    </div>
                    <div class="input-group">
                        <label>Total / You will receive</label>
                        <input type="text" id="tradeTotal" class="trade-input" readonly placeholder="0.00">
                    </div>
                    <button id="actionTradeBtn" class="trade-btn buy">Buy</button>
                    <div id="insufficientActions" style="display:none;" class="insufficient-actions">
                        <button class="deposit-btn" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button>
                        <button class="convert-btn" id="insufficientConvertBtn"><i class="fas fa-exchange-alt"></i> Convert</button>
                    </div>
                </div>
            </div>
            <div class="trades-panel">
                <div class="panel-title"><i class="fas fa-history"></i> Recent Trades</div>
                <div id="recentTradesList" style="max-height: 280px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<div class="footer-ticker" id="footerTicker"></div>

<script>
    // ----------------------------- GLOBAL STATE -----------------------------
    let currentPair = { symbol: 'BTCUSDT', base: 'BTC', quote: 'USDT' };
    let allPairs = [];           // all Binance USDT pairs
    let filteredPairs = [];
    let balanceUSD = 0;          // user's main balance (USD value)
    let cryptoBalance = {};      // { symbol: balance } for selected crypto
    let currentOrderSide = 'buy';
    let currentPrice = 0;
    let currentChange24 = 0;
    let orderBookData = { bids: [], asks: [] };
    let tickerInterval = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let userBalancesInterval = null;
    let token = localStorage.getItem('jwtToken');
    
    // Logo cache from CoinGecko
    const coinLogoCache = new Map();
    
    // ----------------------------- HELPER FUNCTIONS -----------------------------
    function formatNumber(num, decimals=2) {
        if (num === undefined || num === null) return '0.00';
        let val = parseFloat(num);
        if (isNaN(val)) return '0.00';
        if (val >= 1e9) return (val/1e9).toFixed(2)+'B';
        if (val >= 1e6) return (val/1e6).toFixed(2)+'M';
        return val.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function formatCrypto(amount) { return parseFloat(amount || 0).toFixed(6); }
    
    // Fetch asset logos from CoinGecko
    async function fetchCoinLogo(coinId) {
        if (coinLogoCache.has(coinId)) return coinLogoCache.get(coinId);
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId.toLowerCase()}`);
            if (res.ok) {
                const data = await res.json();
                const logo = data.image?.small || `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
                coinLogoCache.set(coinId, logo);
                return logo;
            }
        } catch(e) {}
        return `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
    }
    
    async function updatePairLogos(base, quote) {
        const baseLogo = await fetchCoinLogo(base);
        const quoteLogo = await fetchCoinLogo(quote);
        document.getElementById('baseLogo').src = baseLogo;
        document.getElementById('quoteLogo').src = quoteLogo;
        document.getElementById('selectedPairSymbol').innerText = `${base}/${quote}`;
    }
    
    // Fetch all USDT pairs from Binance (efficient caching)
    async function fetchAllPairs() {
        if (allPairs.length > 0) return allPairs;
        try {
            const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            const data = await res.json();
            const symbols = data.symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING');
            allPairs = symbols.map(s => ({ symbol: s.symbol, base: s.baseAsset, quote: s.quoteAsset }));
            filteredPairs = [...allPairs];
            renderPairDropdown();
        } catch(e) { console.error('Pair fetch error:', e); }
        return allPairs;
    }
    
    function renderPairDropdown(searchTerm='') {
        const dropdown = document.getElementById('pairDropdown');
        const term = searchTerm.toLowerCase();
        const filtered = filteredPairs.filter(p => p.symbol.toLowerCase().includes(term));
        if (!dropdown) return;
        dropdown.innerHTML = '';
        filtered.slice(0, 50).forEach(pair => {
            const div = document.createElement('div');
            div.className = 'pair-option';
            div.innerHTML = `<img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" class="pair-option-logo" data-symbol="${pair.base}">
                             <span><strong>${pair.symbol}</strong></span>`;
            div.onclick = () => selectPair(pair);
            dropdown.appendChild(div);
        });
        // async load logos for dropdown
        filtered.slice(0, 50).forEach(async pair => {
            const img = dropdown.querySelector(`.pair-option-logo[data-symbol="${pair.base}"]`);
            if(img) img.src = await fetchCoinLogo(pair.base);
        });
    }
    
    async function selectPair(pair) {
        currentPair = { symbol: pair.symbol, base: pair.base, quote: pair.quote };
        document.getElementById('pairSearchInput').value = pair.symbol;
        document.getElementById('pairDropdown').classList.remove('show');
        await updatePairLogos(pair.base, pair.quote);
        // Reset UI and fetch new data
        await fetchTickerData();
        await fetchOrderBook();
        await fetchRecentTrades();
        initTradingViewChart();
        updateTitlePrice();
        await fetchCryptoBalance();
        await checkBalanceSufficiency();
        // Restart intervals
        if (tickerInterval) clearInterval(tickerInterval);
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        tickerInterval = setInterval(fetchTickerData, 3000);
        orderBookInterval = setInterval(fetchOrderBook, 2000);
        tradesInterval = setInterval(fetchRecentTrades, 3000);
    }
    
    async function fetchTickerData() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPair.symbol}`);
            const data = await res.json();
            currentPrice = parseFloat(data.lastPrice);
            currentChange24 = parseFloat(data.priceChangePercent);
            document.getElementById('livePrice').innerHTML = `$${formatNumber(currentPrice)}`;
            const changeEl = document.getElementById('priceChange');
            changeEl.innerText = `${currentChange24 >= 0 ? '+' : ''}${currentChange24.toFixed(2)}%`;
            changeEl.className = `change-badge ${currentChange24 >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('high24h').innerText = formatNumber(data.highPrice);
            document.getElementById('low24h').innerText = formatNumber(data.lowPrice);
            document.getElementById('volume24h').innerText = formatNumber(data.volume);
            document.getElementById('weightedAvg').innerText = formatNumber(data.weightedAvgPrice);
            document.getElementById('tradePrice').value = formatNumber(currentPrice);
            updateTotalEstimate();
            updateTitlePrice();
        } catch(e) {}
    }
    
    async function fetchOrderBook() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPair.symbol}&limit=15`);
            const data = await res.json();
            orderBookData.asks = data.asks.slice(0, 8);
            orderBookData.bids = data.bids.slice(0, 8);
            renderOrderBook();
        } catch(e) {}
    }
    
    function renderOrderBook() {
        const asksContainer = document.getElementById('asksContainer');
        const bidsContainer = document.getElementById('bidsContainer');
        asksContainer.innerHTML = '';
        bidsContainer.innerHTML = '';
        orderBookData.asks.reverse().forEach(ask => {
            const price = parseFloat(ask[0]);
            const amount = parseFloat(ask[1]);
            const total = price * amount;
            const row = document.createElement('div');
            row.className = 'orderbook-row';
            row.onclick = () => { document.getElementById('tradePrice').value = price.toFixed(2); updateTotalEstimate(); };
            row.innerHTML = `<span class="ask-price">${price.toFixed(2)}</span><span>${amount.toFixed(4)}</span><span>${total.toFixed(2)}</span>`;
            asksContainer.appendChild(row);
        });
        orderBookData.bids.forEach(bid => {
            const price = parseFloat(bid[0]);
            const amount = parseFloat(bid[1]);
            const total = price * amount;
            const row = document.createElement('div');
            row.className = 'orderbook-row';
            row.onclick = () => { document.getElementById('tradePrice').value = price.toFixed(2); updateTotalEstimate(); };
            row.innerHTML = `<span class="bid-price">${price.toFixed(2)}</span><span>${amount.toFixed(4)}</span><span>${total.toFixed(2)}</span>`;
            bidsContainer.appendChild(row);
        });
        const bestAsk = orderBookData.asks[0] ? parseFloat(orderBookData.asks[0][0]) : 0;
        const bestBid = orderBookData.bids[0] ? parseFloat(orderBookData.bids[0][0]) : 0;
        const spread = bestAsk - bestBid;
        const spreadPercent = bestAsk ? (spread / bestAsk * 100).toFixed(4) : 0;
        document.getElementById('spreadInfo').innerHTML = `Spread: ${spread.toFixed(4)} USDT (${spreadPercent}%)`;
    }
    
    async function fetchRecentTrades() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPair.symbol}&limit=20`);
            const trades = await res.json();
            const container = document.getElementById('recentTradesList');
            container.innerHTML = '';
            trades.forEach(t => {
                const isBuy = t.isBuyerMaker === false;
                const div = document.createElement('div');
                div.className = `trade-row ${isBuy ? 'trade-buy' : 'trade-sell'}`;
                div.innerHTML = `<span>${isBuy ? 'BUY' : 'SELL'}</span><span>${parseFloat(t.price).toFixed(2)}</span><span>${parseFloat(t.qty).toFixed(4)}</span><span>${new Date(t.time).toLocaleTimeString()}</span>`;
                container.appendChild(div);
            });
        } catch(e) {}
    }
    
    function initTradingViewChart() {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": `${currentPair.symbol}`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center;">Loading Chart...</div>';
        }
    }
    
    async function fetchUserBalances() {
        if (!token) return 0;
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) {
                const data = await res.json();
                balanceUSD = parseFloat(data.main || 0);
                document.getElementById('availableBalanceUSD').innerText = `$${formatNumber(balanceUSD)}`;
                return balanceUSD;
            }
        } catch(e) {}
        return 0;
    }
    
    async function fetchCryptoBalance() {
        if (!token) { cryptoBalance[currentPair.base] = 0; return; }
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) {
                const assets = await res.json();
                const target = assets.find(a => a.symbol.toLowerCase() === currentPair.base.toLowerCase());
                cryptoBalance[currentPair.base] = target ? parseFloat(target.balance) : 0;
            }
        } catch(e) { cryptoBalance[currentPair.base] = 0; }
    }
    
    async function checkBalanceSufficiency() {
        if (!token) { disableTradeButtons(true, 'Login to trade'); return; }
        const side = currentOrderSide;
        const amountUSD = parseFloat(document.getElementById('tradeAmount').value) || 0;
        if (side === 'buy') {
            const sufficient = amountUSD <= balanceUSD;
            document.getElementById('actionTradeBtn').style.display = sufficient ? 'block' : 'none';
            document.getElementById('insufficientActions').style.display = sufficient ? 'none' : 'flex';
            document.getElementById('actionTradeBtn').disabled = !sufficient;
        } else {
            // sell: need crypto balance
            const cryptoAmt = amountUSD / currentPrice;
            const sufficient = cryptoAmt <= (cryptoBalance[currentPair.base] || 0);
            document.getElementById('actionTradeBtn').style.display = sufficient ? 'block' : 'none';
            document.getElementById('insufficientActions').style.display = sufficient ? 'none' : 'flex';
            document.getElementById('actionTradeBtn').disabled = !sufficient;
        }
    }
    
    function disableTradeButtons(disabled, tooltip='') {
        const btn = document.getElementById('actionTradeBtn');
        btn.disabled = disabled;
        if(disabled) btn.title = tooltip;
        else btn.title = '';
    }
    
    function updateTotalEstimate() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        const price = parseFloat(document.getElementById('tradePrice').value) || currentPrice;
        const total = amount;
        document.getElementById('tradeTotal').value = formatNumber(total) + ' USDT';
        if(currentOrderSide === 'sell') {
            const cryptoAmount = amount / price;
            document.getElementById('tradeTotal').value = formatCrypto(cryptoAmount) + ` ${currentPair.base}`;
        } else {
            document.getElementById('tradeTotal').value = formatNumber(total) + ' USDT';
        }
        checkBalanceSufficiency();
    }
    
    async function executeTrade() {
        if (!token) { alert('Please login to trade'); window.location.href='login.html'; return; }
        const side = currentOrderSide;
        const amountUSD = parseFloat(document.getElementById('tradeAmount').value);
        const price = parseFloat(document.getElementById('tradePrice').value);
        if (!amountUSD || amountUSD <= 0) { alert('Enter valid amount'); return; }
        if (side === 'buy' && amountUSD > balanceUSD) { alert('Insufficient balance. Please deposit.'); return; }
        if (side === 'sell') {
            const cryptoNeeded = amountUSD / price;
            if (cryptoNeeded > (cryptoBalance[currentPair.base] || 0)) { alert(`Insufficient ${currentPair.base} balance.`); return; }
        }
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/trading/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    symbol: currentPair.symbol,
                    side: side,
                    type: 'market',
                    amount: amountUSD,
                    price: price
                })
            });
            if(res.ok) {
                alert(`${side.toUpperCase()} order placed: ${amountUSD} USDT of ${currentPair.symbol}`);
                await fetchUserBalances();
                await fetchCryptoBalance();
                document.getElementById('tradeAmount').value = '';
                updateTotalEstimate();
            } else {
                const err = await res.json();
                alert('Order failed: ' + (err.message || 'Unknown error'));
            }
        } catch(e) { alert('Network error'); }
    }
    
    function updateTitlePrice() {
        document.title = `${currentPair.symbol} | $${formatNumber(currentPrice)} | BitHash Trading`;
    }
    
    async function loadInitialPairFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let symbol = urlParams.get('symbol');
        if (symbol) {
            const upper = symbol.toUpperCase();
            const matched = allPairs.find(p => p.base === upper || p.symbol === `${upper}USDT`);
            if(matched) await selectPair(matched);
            else await selectPair(allPairs.find(p => p.symbol === 'BTCUSDT') || {symbol:'BTCUSDT',base:'BTC',quote:'USDT'});
        } else {
            await selectPair(allPairs.find(p => p.symbol === 'BTCUSDT') || {symbol:'BTCUSDT',base:'BTC',quote:'USDT'});
        }
    }
    
    // Footer ticker with top movers
    async function initFooterTicker() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const topPairs = data.filter(t => t.symbol.endsWith('USDT')).slice(0, 20);
            const tickerDiv = document.getElementById('footerTicker');
            const inner = document.createElement('div');
            inner.className = 'ticker-content';
            topPairs.forEach(p => {
                const change = parseFloat(p.priceChangePercent);
                const cls = change >= 0 ? 'positive' : 'negative';
                inner.innerHTML += `<span class="ticker-item">${p.symbol} <span class="${cls}">${change.toFixed(2)}%</span> $${parseFloat(p.lastPrice).toFixed(2)}</span>`;
            });
            tickerDiv.innerHTML = '';
            tickerDiv.appendChild(inner);
            // duplicate for seamless loop
            const clone = inner.cloneNode(true);
            tickerDiv.appendChild(clone);
        } catch(e) {}
    }
    
    // Event Listeners
    document.getElementById('pairSearchInput').addEventListener('input', (e) => {
        const term = e.target.value;
        renderPairDropdown(term);
        document.getElementById('pairDropdown').classList.add('show');
    });
    document.getElementById('pairSearchArea').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('pairDropdown').classList.toggle('show');
        renderPairDropdown(document.getElementById('pairSearchInput').value);
    });
    document.addEventListener('click', (e) => {
        if(!e.target.closest('#pairSearchArea') && !e.target.closest('.pair-dropdown')) {
            document.getElementById('pairDropdown').classList.remove('show');
        }
    });
    document.getElementById('tradeAmount').addEventListener('input', updateTotalEstimate);
    document.querySelectorAll('.trade-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            document.querySelectorAll('.trade-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentOrderSide = tab.getAttribute('data-side');
            const btn = document.getElementById('actionTradeBtn');
            if(currentOrderSide === 'buy') { btn.className = 'trade-btn buy'; btn.innerText = 'Buy'; }
            else { btn.className = 'trade-btn sell'; btn.innerText = 'Sell'; }
            updateTotalEstimate();
            checkBalanceSufficiency();
        });
    });
    document.getElementById('actionTradeBtn').addEventListener('click', executeTrade);
    document.getElementById('insufficientConvertBtn').addEventListener('click', () => {
        window.location.href = 'dashboard.html#convert-section';
    });
    
    // Main init
    (async function init() {
        token = localStorage.getItem('jwtToken');
        await fetchAllPairs();
        await fetchUserBalances();
        await fetchCryptoBalance();
        await loadInitialPairFromUrl();
        await fetchTickerData();
        await fetchOrderBook();
        await fetchRecentTrades();
        initTradingViewChart();
        initFooterTicker();
        userBalancesInterval = setInterval(async () => {
            await fetchUserBalances();
            await fetchCryptoBalance();
            checkBalanceSufficiency();
        }, 15000);
    })();
</script>
</body>
