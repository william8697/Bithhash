<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">ETH/USDT | BitHash Trading</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0C10;
            --bg-secondary: #0F1117;
            --bg-card: #15171E;
            --bg-hover: #1E2128;
            --border: #2A2D35;
            --text-primary: #FFFFFF;
            --text-secondary: #8A8F98;
            --text-muted: #5E636E;
            --green: #00C49A;
            --red: #F6465D;
            --yellow: #F0B90B;
            --blue: #2B7DF7;
            --accent: var(--yellow);
            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main Layout */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 24px;
            flex-shrink: 0;
        }
        .pair-info { display: flex; align-items: center; gap: 12px; }
        .pair-logos { display: flex; align-items: center; }
        .pair-logo { width: 32px; height: 32px; border-radius: 50%; background: #1E2128; object-fit: cover; }
        .pair-logo:last-child { margin-left: -8px; }
        .pair-name { font-weight: 700; font-size: 18px; }
        .pair-label { font-size: 12px; color: var(--text-secondary); margin-left: 6px; }
        .price-container { text-align: right; }
        .live-price { font-size: 28px; font-weight: 600; font-family: var(--font-mono); transition: background 0.1s; }
        .live-price.flash-green { background: rgba(0, 196, 154, 0.2); }
        .live-price.flash-red { background: rgba(246, 70, 93, 0.2); }
        .price-change { font-size: 13px; }
        .price-change.positive { color: var(--green); }
        .price-change.negative { color: var(--red); }
        .stats { display: flex; gap: 24px; margin-left: auto; }
        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: 600; font-family: var(--font-mono); }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 360px 1fr 320px;
            gap: 1px;
            background: var(--border);
            flex: 1;
            min-height: 0;
        }

        /* Left Panel - Order Book */
        .panel {
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .order-book-rows {
            flex: 1;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .order-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            cursor: pointer;
            position: relative;
        }
        .order-row:hover { background: var(--bg-hover); }
        .depth-bar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            opacity: 0.2;
            pointer-events: none;
        }
        .price.sell { color: var(--red); }
        .price.buy { color: var(--green); }
        .amount, .total { text-align: right; color: var(--text-secondary); }
        .current-price-bar {
            padding: 8px 12px;
            background: rgba(240, 185, 11, 0.1);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-family: var(--font-mono);
        }
        .spread-info { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border); }

        /* Center Panel - Chart */
        .chart-panel { background: var(--bg-primary); }
        .chart-toolbar {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .timeframe-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .timeframe-btn.active, .timeframe-btn:hover { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .chart-container { flex: 1; min-height: 0; position: relative; }
        #tv-chart { width: 100%; height: 100%; }
        .order-line { position: absolute; pointer-events: none; }
        .order-lines-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }

        /* Right Panel - Trading */
        .order-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-secondary);
        }
        .order-tab.buy.active { color: var(--green); border-bottom: 2px solid var(--green); background: rgba(0, 196, 154, 0.05); }
        .order-tab.sell.active { color: var(--red); border-bottom: 2px solid var(--red); background: rgba(246, 70, 93, 0.05); }
        .order-form { padding: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .percentage-btns { display: flex; gap: 8px; margin: 12px 0; }
        .percent-btn {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .action-btn.buy { background: var(--green); color: white; }
        .action-btn.sell { background: var(--red); color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Bottom Panels */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            height: 280px;
            flex-shrink: 0;
        }
        .trades-panel, .orders-panel { background: var(--bg-card); overflow: hidden; display: flex; flex-direction: column; }
        .trades-header, .orders-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 8px 12px;
            font-size: 11px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .trades-list, .orders-list {
            flex: 1;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .trade-row, .order-row-item {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
        }
        .trade-price.buy { color: var(--green); }
        .trade-price.sell { color: var(--red); }
        .cancel-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }
        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
        }
        .status-open { background: rgba(240, 185, 11, 0.2); color: var(--yellow); }
        .status-filled { background: rgba(0, 196, 154, 0.2); color: var(--green); }
        .status-partial { background: rgba(240, 185, 11, 0.2); color: var(--yellow); }

        /* Footer Ticker */
        .ticker {
            height: 36px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        .ticker-content {
            display: flex;
            gap: 40px;
            position: absolute;
            white-space: nowrap;
            animation: ticker-scroll 30s linear infinite;
        }
        .ticker-content:hover { animation-play-state: paused; }
        .ticker-item { display: inline-flex; gap: 8px; align-items: center; font-size: 12px; font-family: var(--font-mono); }
        .ticker-price.positive { color: var(--green); }
        .ticker-price.negative { color: var(--red); }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .notification-container {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 1000;
        }
        .notification {
            background: var(--bg-card);
            border-left: 3px solid var(--yellow);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 6px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1200px) {
            .main-grid { grid-template-columns: 300px 1fr 280px; }
        }
        @media (max-width: 992px) {
            .main-grid { grid-template-columns: 1fr; }
            .stats { display: none; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    <div class="notification-container" id="notifications"></div>

    <div class="app">
        <div class="header">
            <div class="pair-info">
                <div class="pair-logos" id="pairLogos"></div>
                <div><span class="pair-name" id="pairSymbol">Loading...</span><span class="pair-label" id="pairLabel"></span></div>
            </div>
            <div class="price-container">
                <div class="live-price" id="livePrice">$0.00</div>
                <div class="price-change" id="priceChange">0.00%</div>
            </div>
            <div class="stats" id="stats"></div>
        </div>

        <div class="main-grid">
            <!-- Order Book -->
            <div class="panel">
                <div class="panel-header">Order Book <i class="fas fa-chart-line"></i></div>
                <div class="order-book-header"><span>Price(USDT)</span><span>Amount</span><span>Total</span></div>
                <div class="order-book-rows" id="orderBookRows"></div>
                <div class="current-price-bar" id="currentPriceBar"></div>
                <div class="spread-info" id="spreadInfo"></div>
            </div>

            <!-- Chart -->
            <div class="chart-panel" style="display: flex; flex-direction: column;">
                <div class="chart-toolbar" id="chartToolbar"></div>
                <div class="chart-container" id="chartContainer">
                    <div id="tv-chart"></div>
                </div>
            </div>

            <!-- Trading Panel -->
            <div class="panel">
                <div class="order-tabs">
                    <button class="order-tab buy active" data-side="buy">Buy</button>
                    <button class="order-tab sell" data-side="sell">Sell</button>
                </div>
                <div class="order-form" id="orderForm">
                    <div class="form-group">
                        <div class="form-label"><span>Order Type</span></div>
                        <div style="display: flex; gap: 8px;">
                            <button class="percent-btn" data-type="limit" style="flex:1;">Limit</button>
                            <button class="percent-btn" data-type="market" style="flex:1;">Market</button>
                        </div>
                    </div>
                    <div class="form-group" id="priceGroup">
                        <div class="form-label"><span>Price (USDT)</span><span id="priceHint">≈ $0.00</span></div>
                        <input type="number" class="form-input" id="orderPrice" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <div class="form-label"><span>Amount</span><span>Available: <span id="availableBalance">0.00</span> <span id="availableAsset">USDT</span></span></div>
                        <input type="number" class="form-input" id="orderAmount" step="any" placeholder="0.00">
                    </div>
                    <div class="percentage-btns">
                        <button class="percent-btn" data-percent="25">25%</button>
                        <button class="percent-btn" data-percent="50">50%</button>
                        <button class="percent-btn" data-percent="75">75%</button>
                        <button class="percent-btn" data-percent="100">100%</button>
                    </div>
                    <div class="form-group">
                        <div class="form-label"><span>Total</span><span>≈ <span id="totalValue">0.00</span> USDT</span></div>
                        <input type="text" class="form-input" id="orderTotal" readonly placeholder="0.00">
                    </div>
                    <button class="action-btn buy" id="placeOrderBtn">Buy</button>
                </div>
            </div>
        </div>

        <div class="bottom-grid">
            <div class="trades-panel">
                <div class="panel-header">Market Trades</div>
                <div class="trades-header"><span>Price(USDT)</span><span>Amount</span><span>Time</span></div>
                <div class="trades-list" id="tradesList"></div>
            </div>
            <div class="orders-panel">
                <div class="panel-header">Open Orders</div>
                <div class="orders-header"><span>Pair</span><span>Price</span><span>Amount</span><span>Status</span><span>Action</span></div>
                <div class="orders-list" id="ordersList"></div>
            </div>
        </div>

        <div class="ticker" id="ticker"></div>
    </div>

    <!-- TradingView Charting Library -->
    <script type="text/javascript" src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <script>
        // =============================================
        // SPOT TRADING DASHBOARD - FULL 1:1 IMPLEMENTATION
        // =============================================
        
        const CONFIG = {
            BACKEND: 'https://bithash-backend.onrender.com',
            WS_URL: 'wss://stream.binance.com:9443/ws',
            REST_URL: 'https://api.binance.com/api/v3'
        };

        // State
        let currentSymbol = 'BTCUSDT';
        let currentBase = 'BTC';
        let currentQuote = 'USDT';
        let currentPrice = 0;
        let previousPrice = 0;
        let priceChange24h = 0;
        let priceChangePercent = 0;
        let orderBook = { bids: [], asks: [] };
        let marketTrades = [];
        let openOrders = [];
        let userBalances = { USDT: 0 };
        let ws = null;
        let chart = null;
        let candlestickSeries = null;
        let volumeSeries = null;
        let orderLines = new Map();
        let currentOrderType = 'limit';
        let currentSide = 'buy';
        let isAuthenticated = false;
        let tickerData = {};

        // Auth token
        const token = localStorage.getItem('jwtToken');
        
        // Helper functions
        function formatPrice(price) { return `$${parseFloat(price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; }
        function formatAmount(amt) { return parseFloat(amt || 0).toFixed(6); }
        function formatNumber(num) { return parseFloat(num || 0).toLocaleString(); }
        
        function showNotification(title, message, type = 'info') {
            const container = document.getElementById('notifications');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Fetch pair logos from database (backend)
        async function fetchPairLogos(symbol) {
            try {
                const response = await fetch(`${CONFIG.BACKEND}/api/market/pair/${symbol}/logos`);
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (e) { console.warn('Logo fetch failed, using fallback'); }
            return { baseLogo: `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`, quoteLogo: `https://assets.coingecko.com/coins/images/325/large/Tether.png` };
        }

        async function updatePairUI() {
            const logos = await fetchPairLogos(currentSymbol);
            document.getElementById('pairLogos').innerHTML = `
                <img src="${logos.baseLogo}" class="pair-logo" onerror="this.src='https://assets.coingecko.com/coins/images/1/large/bitcoin.png'">
                <img src="${logos.quoteLogo}" class="pair-logo" onerror="this.src='https://assets.coingecko.com/coins/images/325/large/Tether.png'">
            `;
            document.getElementById('pairSymbol').textContent = `${currentBase}/${currentQuote}`;
            document.getElementById('pairLabel').textContent = currentBase;
            document.title = `${currentBase}/${currentQuote} | BitHash Trading`;
        }

        // Fetch pair data from database
        async function fetchPairDataFromDB(symbol) {
            try {
                const response = await fetch(`${CONFIG.BACKEND}/api/market/pair/${symbol}/data`);
                if (response.ok) return await response.json();
            } catch (e) { console.warn('DB fetch failed'); }
            return null;
        }

        // WebSocket for real-time consistency across devices
        function initWebSocket() {
            if (ws) ws.close();
            const streams = [`${currentSymbol.toLowerCase()}@depth20@100ms`, `${currentSymbol.toLowerCase()}@trade`, `${currentSymbol.toLowerCase()}@ticker`];
            ws = new WebSocket(`${CONFIG.WS_URL}/${streams.join('/')}`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.e === 'depthUpdate') updateOrderBook(data);
                else if (data.e === 'trade') handleTrade(data);
                else if (data.e === '24hrTicker') updateTicker(data);
            };
            ws.onerror = () => setTimeout(initWebSocket, 3000);
        }

        function updateOrderBook(data) {
            if (data.b) data.b.forEach(([p, q]) => { if (parseFloat(q) === 0) orderBook.bids = orderBook.bids.filter(b => b[0] !== parseFloat(p)); else orderBook.bids.push([parseFloat(p), parseFloat(q)]); });
            if (data.a) data.a.forEach(([p, q]) => { if (parseFloat(q) === 0) orderBook.asks = orderBook.asks.filter(a => a[0] !== parseFloat(p)); else orderBook.asks.push([parseFloat(p), parseFloat(q)]); });
            orderBook.bids.sort((a,b) => b[0] - a[0]);
            orderBook.asks.sort((a,b) => a[0] - b[0]);
            orderBook.bids = orderBook.bids.slice(0, 15);
            orderBook.asks = orderBook.asks.slice(0, 15);
            renderOrderBook();
        }

        function renderOrderBook() {
            const container = document.getElementById('orderBookRows');
            if (!container) return;
            let html = '';
            const maxTotal = Math.max(...[...orderBook.asks, ...orderBook.bids].map(([p, a]) => p * a), 1);
            
            [...orderBook.asks].reverse().forEach(([price, amount]) => {
                const total = price * amount;
                const depth = (total / maxTotal) * 100;
                html += `<div class="order-row" onclick="setOrderPrice(${price})">
                    <div class="depth-bar" style="width:${depth}%;background:var(--red);right:0;"></div>
                    <span class="price sell">${formatPrice(price)}</span>
                    <span class="amount">${formatAmount(amount)}</span>
                    <span class="total">${formatPrice(total)}</span>
                </div>`;
            });
            
            const spread = orderBook.asks[0]?.[0] - orderBook.bids[0]?.[0] || 0;
            const spreadPercent = orderBook.asks[0]?.[0] ? (spread / orderBook.asks[0][0]) * 100 : 0;
            document.getElementById('spreadInfo').innerHTML = `Spread: ${formatPrice(spread)} (${spreadPercent.toFixed(2)}%)`;
            document.getElementById('currentPriceBar').innerHTML = `<span>${formatPrice(currentPrice)}</span><span>24h: ${priceChangePercent >= 0 ? '+' : ''}${priceChangePercent.toFixed(2)}%</span>`;
            
            [...orderBook.bids].forEach(([price, amount]) => {
                const total = price * amount;
                const depth = (total / maxTotal) * 100;
                html += `<div class="order-row" onclick="setOrderPrice(${price})">
                    <div class="depth-bar" style="width:${depth}%;background:var(--green);"></div>
                    <span class="price buy">${formatPrice(price)}</span>
                    <span class="amount">${formatAmount(amount)}</span>
                    <span class="total">${formatPrice(total)}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function handleTrade(data) {
            previousPrice = currentPrice;
            currentPrice = parseFloat(data.p);
            const trade = { price: currentPrice, amount: parseFloat(data.q), time: new Date(data.T).toLocaleTimeString(), isBuyerMaker: data.m };
            marketTrades.unshift(trade);
            if (marketTrades.length > 50) marketTrades.pop();
            renderTrades();
            
            const priceEl = document.getElementById('livePrice');
            priceEl.classList.add(currentPrice >= previousPrice ? 'flash-green' : 'flash-red');
            setTimeout(() => priceEl.classList.remove('flash-green', 'flash-red'), 200);
            priceEl.textContent = formatPrice(currentPrice);
            
            if (candlestickSeries) candlestickSeries.update({ time: Math.floor(Date.now() / 1000), open: previousPrice, high: Math.max(previousPrice, currentPrice), low: Math.min(previousPrice, currentPrice), close: currentPrice });
        }

        function updateTicker(data) {
            priceChange24h = parseFloat(data.p);
            priceChangePercent = parseFloat(data.P);
            document.getElementById('priceChange').innerHTML = `${priceChangePercent >= 0 ? '+' : ''}${priceChangePercent.toFixed(2)}%`;
            document.getElementById('priceChange').className = `price-change ${priceChangePercent >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><span class="stat-label">24h High</span><span class="stat-value">${formatPrice(data.h)}</span></div>
                <div class="stat"><span class="stat-label">24h Low</span><span class="stat-value">${formatPrice(data.l)}</span></div>
                <div class="stat"><span class="stat-label">24h Vol</span><span class="stat-value">${formatNumber(data.v)}</span></div>
            `;
        }

        function renderTrades() {
            const container = document.getElementById('tradesList');
            if (!container) return;
            container.innerHTML = marketTrades.slice(0, 30).map(t => `
                <div class="trade-row">
                    <span class="trade-price ${t.isBuyerMaker ? 'sell' : 'buy'}">${formatPrice(t.price)}</span>
                    <span>${formatAmount(t.amount)}</span>
                    <span>${t.time}</span>
                </div>
            `).join('');
        }

        // Chart with backend data (custom datafeed simulation)
        async function initChart() {
            const chartContainer = document.getElementById('tv-chart');
            chart = LightweightCharts.createChart(chartContainer, { width: chartContainer.clientWidth, height: 400, layout: { background: { color: '#0A0C10' }, textColor: '#8A8F98' }, grid: { vertLines: { color: '#1E2128' }, horzLines: { color: '#1E2128' } }, crosshair: { mode: LightweightCharts.CrosshairMode.Normal } });
            candlestickSeries = chart.addCandlestickSeries({ upColor: '#00C49A', downColor: '#F6465D', borderVisible: false, wickUpColor: '#00C49A', wickDownColor: '#F6465D' });
            volumeSeries = chart.addHistogramSeries({ color: '#2A2D35', priceFormat: { type: 'volume' }, priceScaleId: '' });
            chart.timeScale().fitContent();
            
            // Load klines from backend
            async function loadKlines() {
                try {
                    const res = await fetch(`${CONFIG.REST_URL}/klines?symbol=${currentSymbol}&interval=15m&limit=200`);
                    const data = await res.json();
                    const candles = data.map(c => ({ time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]) }));
                    candlestickSeries.setData(candles);
                    volumeSeries.setData(candles.map(c => ({ time: c.time, value: c.volume, color: c.close >= c.open ? '#00C49A20' : '#F6465D20' })));
                } catch (e) { console.error('Klines error', e); }
            }
            loadKlines();
            
            // Real-time candle update via WS
            let lastCandle = null;
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.e === 'trade' && candlestickSeries) {
                    const time = Math.floor(Date.now() / 1000);
                    const minute = Math.floor(time / 60) * 60;
                    if (!lastCandle || lastCandle.time !== minute) {
                        if (lastCandle) candlestickSeries.update(lastCandle);
                        lastCandle = { time: minute, open: currentPrice, high: currentPrice, low: currentPrice, close: currentPrice };
                    } else {
                        lastCandle.high = Math.max(lastCandle.high, currentPrice);
                        lastCandle.low = Math.min(lastCandle.low, currentPrice);
                        lastCandle.close = currentPrice;
                    }
                    candlestickSeries.update(lastCandle);
                }
            };
            
            window.addEventListener('resize', () => { chart.applyOptions({ width: chartContainer.clientWidth }); });
        }

        // Order lines on chart
        function updateOrderLines() {
            if (!chart) return;
            orderLines.forEach((line, id) => chart.removeLine(line));
            orderLines.clear();
            openOrders.forEach(order => {
                if (order.status === 'open' || order.status === 'partial') {
                    const line = chart.addLineSeries({ color: order.side === 'buy' ? '#00C49A' : '#F6465D', lineWidth: 2, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
                    line.setData([{ time: Math.floor(Date.now() / 1000) - 3600, value: order.price }, { time: Math.floor(Date.now() / 1000), value: order.price }]);
                    orderLines.set(order.id, line);
                }
            });
        }

        // Load open orders from backend
        async function loadOpenOrders() {
            if (!token) return;
            try {
                const res = await fetch(`${CONFIG.BACKEND}/api/trading/orders/open?symbol=${currentSymbol}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) openOrders = await res.json();
                else openOrders = [];
                renderOrders();
                updateOrderLines();
            } catch (e) { openOrders = []; }
        }

        async function loadBalances() {
            if (!token) return;
            try {
                const res = await fetch(`${CONFIG.BACKEND}/api/users/balances`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) userBalances = (await res.json()).data || { USDT: 0 };
                updateBalanceDisplay();
            } catch (e) {}
        }

        function updateBalanceDisplay() {
            const balance = currentSide === 'buy' ? userBalances.USDT : (userBalances[currentBase] || 0);
            document.getElementById('availableBalance').textContent = formatAmount(balance);
            document.getElementById('availableAsset').textContent = currentSide === 'buy' ? 'USDT' : currentBase;
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) return;
            if (openOrders.length === 0) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);">No open orders</div>'; return; }
            container.innerHTML = openOrders.map(order => `
                <div class="order-row-item">
                    <span>${order.symbol}</span>
                    <span>${formatPrice(order.price)}</span>
                    <span>${formatAmount(order.amount)}</span>
                    <span><span class="status-badge status-${order.status === 'open' ? 'open' : 'partial'}">${order.status}</span></span>
                    <span><button class="cancel-btn" onclick="cancelOrder('${order.id}')">Cancel</button></span>
                </div>
            `).join('');
        }

        async function cancelOrder(orderId) {
            if (!token) return;
            try {
                await fetch(`${CONFIG.BACKEND}/api/trading/orders/cancel`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ orderId }) });
                showNotification('Order Cancelled', `Order ${orderId} cancelled`, 'success');
                loadOpenOrders();
                loadBalances();
            } catch (e) { showNotification('Error', 'Failed to cancel order', 'error'); }
        }

        async function placeOrder() {
            if (!token) { showNotification('Auth Required', 'Please login to trade', 'error'); return; }
            const amount = parseFloat(document.getElementById('orderAmount').value);
            let price = currentPrice;
            if (currentOrderType === 'limit') price = parseFloat(document.getElementById('orderPrice').value);
            if (!amount || amount <= 0) { showNotification('Invalid', 'Enter valid amount', 'error'); return; }
            
            const total = price * amount;
            if (currentSide === 'buy' && total > userBalances.USDT) { showNotification('Insufficient Balance', `Need ${formatPrice(total)} USDT`, 'error'); return; }
            if (currentSide === 'sell' && amount > (userBalances[currentBase] || 0)) { showNotification('Insufficient Balance', `Need ${formatAmount(amount)} ${currentBase}`, 'error'); return; }
            
            try {
                const endpoint = currentSide === 'buy' ? '/api/trading/orders/buy' : '/api/trading/orders/sell';
                const res = await fetch(`${CONFIG.BACKEND}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: currentSymbol, type: currentOrderType, price, amount })
                });
                if (res.ok) {
                    showNotification('Order Placed', `${currentSide.toUpperCase()} ${formatAmount(amount)} ${currentBase}`, 'success');
                    document.getElementById('orderAmount').value = '';
                    document.getElementById('orderTotal').value = '';
                    loadOpenOrders();
                    loadBalances();
                } else { const err = await res.json(); showNotification('Order Failed', err.message, 'error'); }
            } catch (e) { showNotification('Error', 'Network error', 'error'); }
        }

        function setOrderPrice(price) { document.getElementById('orderPrice').value = price; calculateTotal(); }
        function calculateTotal() {
            const price = currentOrderType === 'limit' ? parseFloat(document.getElementById('orderPrice').value) || currentPrice : currentPrice;
            const amount = parseFloat(document.getElementById('orderAmount').value) || 0;
            const total = price * amount;
            document.getElementById('totalValue').textContent = total.toFixed(2);
            document.getElementById('orderTotal').value = total.toFixed(2);
            document.getElementById('priceHint').innerHTML = `≈ ${formatPrice(price)}`;
        }
        
        function setPercentage(percent) {
            const balance = currentSide === 'buy' ? userBalances.USDT : (userBalances[currentBase] || 0);
            let amount = 0;
            if (currentSide === 'buy') amount = (balance / currentPrice) * (percent / 100);
            else amount = balance * (percent / 100);
            document.getElementById('orderAmount').value = amount.toFixed(6);
            calculateTotal();
        }

        // Ticker footer
        async function loadTickerData() {
            try {
                const res = await fetch(`${CONFIG.REST_URL}/ticker/24hr`);
                const data = await res.json();
                const topPairs = data.filter(p => p.symbol.endsWith('USDT')).slice(0, 30);
                const tickerContent = topPairs.map(p => `<span class="ticker-item"><strong>${p.symbol}</strong><span class="ticker-price ${parseFloat(p.priceChangePercent) >= 0 ? 'positive' : 'negative'}">${parseFloat(p.lastPrice).toFixed(2)} ${parseFloat(p.priceChangePercent) >= 0 ? '▲' : '▼'} ${Math.abs(parseFloat(p.priceChangePercent)).toFixed(2)}%</span></span>`).join('');
                document.getElementById('ticker').innerHTML = `<div class="ticker-content">${tickerContent}${tickerContent}</div>`;
            } catch(e) {}
        }

        // Event listeners
        document.querySelectorAll('.order-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                currentSide = btn.dataset.side;
                document.querySelectorAll('.order-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('placeOrderBtn').className = `action-btn ${currentSide}`;
                document.getElementById('placeOrderBtn').textContent = currentSide === 'buy' ? `Buy ${currentBase}` : `Sell ${currentBase}`;
                updateBalanceDisplay();
                calculateTotal();
            });
        });
        
        document.querySelectorAll('[data-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentOrderType = btn.dataset.type;
                document.getElementById('priceGroup').style.display = currentOrderType === 'limit' ? 'block' : 'none';
                calculateTotal();
            });
        });
        
        document.querySelectorAll('[data-percent]').forEach(btn => {
            btn.addEventListener('click', () => setPercentage(parseInt(btn.dataset.percent)));
        });
        
        document.getElementById('orderAmount').addEventListener('input', calculateTotal);
        document.getElementById('orderPrice').addEventListener('input', calculateTotal);
        document.getElementById('placeOrderBtn').addEventListener('click', placeOrder);
        
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', () => { /* timeframe change handled by chart lib */ });
        });
        
        // Initialize
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const symbol = urlParams.get('symbol') || 'BTC';
            currentBase = symbol.toUpperCase();
            currentSymbol = `${currentBase}USDT`;
            
            await updatePairUI();
            await fetchPairDataFromDB(currentSymbol);
            initWebSocket();
            await initChart();
            loadOpenOrders();
            loadBalances();
            loadTickerData();
            setInterval(() => { loadOpenOrders(); loadBalances(); }, 3000);
            setInterval(loadTickerData, 10000);
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        
        init();
        window.setOrderPrice = setOrderPrice;
        window.cancelOrder = cancelOrder;
    </script>
</body>
</html>
