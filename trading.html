<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <title>BitHash Capital | Trading</title>
    <meta name="description" content="Professional cryptocurrency trading platform with real-time Binance data. Trade crypto with advanced charting and order book.">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Chart Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>
    
    <style>
        /* ============================================= */
        /* ENHANCED COLOR SYSTEM - DEEPER, MORE POLISHED */
        /* ============================================= */
        :root {
            --bg-base: #0A0C10;
            --bg-surface: #0F1117;
            --bg-card: #151922;
            --bg-hover: #1C212C;
            --border: #232832;
            --border-light: #2A303C;
            --text-primary: #F0F3FA;
            --text-secondary: #9BA3B5;
            --text-muted: #5F687B;
            --accent: #F7A600;
            --accent-hover: #FFB82E;
            --accent-glow: rgba(247, 166, 0, 0.15);
            --positive: #00C853;
            --positive-bg: rgba(0, 200, 83, 0.08);
            --negative: #FF3B3B;
            --negative-bg: rgba(255, 59, 59, 0.08);
            --blue: #1E6DFF;
            --gold: #D4AF37;
            --success: #00C853;
            --warning: #FFC107;
            --error: #FF3B3B;
            --card-radius: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Loading Overlay - Enhanced */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0F1117 0%, #0A0C10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.8s infinite ease-in-out;
            filter: drop-shadow(0 0 12px rgba(247, 166, 0, 0.3));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.96); opacity: 0.8; }
            50% { transform: scale(1.06); opacity: 1; }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header - Refined */
        header {
            background-color: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            height: 64px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform var(--transition-fast);
        }
        .logo:hover {
            transform: scale(1.02);
        }

        .logo img {
            height: 34px;
            width: auto;
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Trade Navigation Pills - Cleaner */
        .trade-nav {
            display: flex;
            gap: 6px;
            background: var(--bg-surface);
            padding: 5px;
            border-radius: 44px;
            border: 1px solid var(--border);
        }

        .trade-nav-btn {
            padding: 8px 24px;
            border-radius: 40px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .trade-nav-btn.active {
            background: var(--accent);
            color: #000000;
            box-shadow: 0 2px 8px rgba(247, 166, 0, 0.25);
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #000000;
            box-shadow: 0 2px 6px rgba(247, 166, 0, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 166, 0, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(247, 166, 0, 0.05);
        }

        /* User Balance Bar - Glass effect */
        .user-balance-bar {
            background-color: rgba(15, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            position: fixed;
            top: 64px;
            width: 100%;
            z-index: 999;
        }

        .user-balance-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .balance-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(247, 166, 0, 0.08);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(247, 166, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .balance-item i {
            color: var(--accent);
            font-size: 1rem;
        }

        /* Main Trading Layout */
        .trading-container {
            margin-top: 136px;
            padding: 0 24px 24px;
            max-width: 1640px;
            margin-left: auto;
            margin-right: auto;
        }

        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 20px;
        }

        /* Left Panel - Order Book & Recent Trades */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-card {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: border-color var(--transition-fast), box-shadow 0.2s;
        }
        .panel-card:hover {
            border-color: var(--border-light);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.7px;
            background: rgba(0, 0, 0, 0.2);
        }

        .order-book {
            padding: 10px;
        }

        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition-fast);
            border-radius: 8px;
        }

        .order-book-row:hover {
            background: var(--bg-hover);
        }

        .order-book-price.positive {
            color: var(--positive);
            font-weight: 600;
        }

        .order-book-price.negative {
            color: var(--negative);
            font-weight: 600;
        }

        .spread-row {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            margin: 12px 0;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .spread-row .accent {
            color: var(--accent);
            font-weight: 700;
        }

        /* Recent Trades */
        .recent-trades {
            max-height: 320px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr 0.9fr;
            padding: 8px 14px;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border);
            gap: 6px;
        }

        .trade-buy {
            color: var(--positive);
            font-weight: 700;
        }

        .trade-sell {
            color: var(--negative);
            font-weight: 700;
        }

        /* Center Panel - Chart & Stats */
        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Pair Selector - Modern */
        .pair-selector {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            padding: 16px 20px;
            border: 1px solid var(--border);
        }

        .pair-search-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pair-search-input {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 44px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all var(--transition-fast);
        }

        .pair-search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .selected-pair-display {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 0 4px;
            flex-wrap: wrap;
        }

        .pair-logos {
            display: flex;
            align-items: center;
        }

        .pair-logos img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            background: var(--bg-base);
        }

        .pair-logos img:first-child {
            margin-right: -12px;
            z-index: 2;
        }

        .pair-name {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .pair-price {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .pair-change {
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 700;
        }

        .pair-change.positive {
            background: var(--positive-bg);
            color: var(--positive);
        }

        .pair-change.negative {
            background: var(--negative-bg);
            color: var(--negative);
        }

        /* Stats Grid - Refined */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px 12px;
            border: 1px solid var(--border);
            transition: transform var(--transition-fast), border-color var(--transition-fast);
        }
        .stat-card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            border: 1px solid var(--border);
            height: 420px;
            overflow: hidden;
        }

        #tradingview-chart {
            width: 100%;
            height: 100%;
        }

        /* Right Panel - Trading Form */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .trading-form {
            background: var(--bg-card);
            border-radius: var(--card-radius);
            border: 1px solid var(--border);
            padding: 22px;
        }

        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            background: var(--bg-hover);
            transition: all var(--transition-fast);
        }

        .order-tab.buy.active {
            background: var(--positive);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 200, 83, 0.3);
        }

        .order-tab.sell.active {
            background: var(--negative);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 59, 59, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .order-action-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 44px;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: 14px;
            letter-spacing: 0.5px;
        }

        .order-action-btn.buy {
            background: var(--positive);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 200, 83, 0.2);
        }

        .order-action-btn.buy:hover:not(:disabled) {
            background: #00b347;
            transform: scale(1.01);
        }

        .order-action-btn.sell {
            background: var(--negative);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 59, 59, 0.2);
        }

        .order-action-btn.sell:hover:not(:disabled) {
            background: #e32e2e;
            transform: scale(1.01);
        }

        .order-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .insufficient-buttons {
            display: flex;
            gap: 14px;
            margin-top: 16px;
        }

        .insufficient-buttons .btn {
            flex: 1;
            text-align: center;
        }

        /* Pair Search Dropdown - Enhanced */
        .pair-search-dropdown {
            position: absolute;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-height: 340px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
            margin-top: 6px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .pair-search-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-bottom: 1px solid var(--border);
        }

        .pair-search-item:hover {
            background: var(--bg-hover);
        }

        /* Footer Ticker - Improved */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 100;
        }

        .ticker-content {
            display: inline-block;
            animation: tickerScroll 45s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            margin: 0 24px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .ticker-item .positive {
            color: var(--positive);
            font-weight: 700;
        }

        .ticker-item .negative {
            color: var(--negative);
            font-weight: 700;
        }

        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Notification Center - Airy */
        .notification-center {
            position: fixed;
            top: 88px;
            right: 24px;
            z-index: 10000;
            max-width: 360px;
        }

        .notification {
            background: var(--bg-surface);
            border-left: 4px solid;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            animation: slideIn 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
        }

        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        .notification.info { border-left-color: var(--accent); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive refinements */
        @media (max-width: 1200px) {
            .trading-grid {
                grid-template-columns: 280px 1fr 300px;
                gap: 16px;
            }
        }

        @media (max-width: 992px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
            .left-panel, .right-panel {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .left-panel, .right-panel {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .balance-items {
                width: 100%;
                justify-content: center;
            }
            .trading-container {
                padding: 0 16px 16px;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
    <div class="loading-text"><i class="fas fa-chart-line"></i> Loading Trading Platform...</div>
</div>

<header>
    <div class="header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo">
            <span class="logo-text">₿itHash</span>
        </div>
        
        <div class="trade-nav">
            <button class="trade-nav-btn active" onclick="window.location.href='trading.html'">Spot Trading</button>
            <button class="trade-nav-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
        </div>
        
        <div class="auth-buttons" id="auth-buttons">
            <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</header>

<div class="user-balance-bar" id="user-balance-bar" style="display: none;">
    <div class="user-balance-content">
        <div class="balance-items" id="user-balances">
            <div class="balance-item" id="selected-asset-balance">
                <i class="fas fa-coins"></i>
                <span id="selected-asset-balance-value">0.00000000</span>
                <span id="selected-asset-symbol">BTC</span>
            </div>
        </div>
        <div>
            <button class="btn btn-outline" onclick="window.location.href='deposit.html'" style="padding: 4px 12px; font-size: 0.75rem;">
                <i class="fas fa-plus"></i> Deposit
            </button>
        </div>
    </div>
</div>

<div class="notification-center" id="notification-center"></div>

<div class="trading-container">
    <div class="trading-grid">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <!-- Order Book -->
            <div class="panel-card">
                <div class="panel-header">Order Book</div>
                <div class="order-book">
                    <div class="order-book-header">
                        <span>Price (USDT)</span>
                        <span>Amount</span>
                        <span>Total</span>
                    </div>
                    <div id="order-book-asks"></div>
                    <div class="spread-row" id="spread-info">
                        Spread: <span class="accent">0.00</span> (0.00%)
                    </div>
                    <div id="order-book-bids"></div>
                </div>
            </div>
            
            <!-- Recent Trades -->
            <div class="panel-card">
                <div class="panel-header">Recent Trades</div>
                <div class="recent-trades" id="recent-trades"></div>
            </div>
        </div>
        
        <!-- CENTER PANEL -->
        <div class="center-panel">
            <!-- Pair Selector -->
            <div class="pair-selector">
                <div class="pair-search-container">
                    <div style="position: relative; flex: 1;">
                        <input type="text" class="pair-search-input" id="pair-search" placeholder="Search pair (e.g., BTCUSDT, ETHUSDT)...">
                        <div id="pair-dropdown" class="pair-search-dropdown" style="display: none; position: absolute; width: 100%;"></div>
                    </div>
                </div>
                <div class="selected-pair-display" id="selected-pair-display">
                    <div class="pair-logos" id="pair-logos">
                        <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                        <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" alt="USDT">
                    </div>
                    <div>
                        <span class="pair-name" id="pair-name">BTC/USDT</span>
                        <div class="pair-price" id="pair-price">$0.00</div>
                    </div>
                    <div id="pair-change-container">
                        <span class="pair-change" id="pair-change">0.00%</span>
                    </div>
                </div>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">24h High</div>
                    <div class="stat-value" id="stat-high">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">24h Low</div>
                    <div class="stat-value" id="stat-low">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">24h Volume</div>
                    <div class="stat-value small" id="stat-volume">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">24h Change</div>
                    <div class="stat-value" id="stat-change">0.00%</div>
                </div>
            </div>
            
            <!-- Chart -->
            <div class="chart-container">
                <div id="tradingview-chart"></div>
            </div>
        </div>
        
        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="trading-form">
                <div class="order-tabs">
                    <div class="order-tab buy active" id="tab-buy" onclick="setOrderSide('buy')">Buy</div>
                    <div class="order-tab sell" id="tab-sell" onclick="setOrderSide('sell')">Sell</div>
                </div>
                
                <div id="trading-form-content">
                    <div class="form-group">
                        <label>Price (USDT)</label>
                        <input type="number" class="form-input" id="order-price" step="0.01" placeholder="Market price">
                        <div class="balance-info">≈ Last price</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" class="form-input" id="order-amount" step="0.0001" placeholder="0.0000">
                        <div class="balance-info">
                            <span id="order-balance-label">Available: 0.00000000</span>
                            <span id="order-total-value">≈ $0.00</span>
                        </div>
                    </div>
                    
                    <button class="order-action-btn buy" id="order-submit-btn" onclick="executeOrder()">Buy BTC</button>
                </div>
                
                <div id="insufficient-balance-message" style="display: none;">
                    <div class="insufficient-buttons">
                        <button class="btn btn-primary" onclick="window.location.href='deposit.html'">
                            <i class="fas fa-plus-circle"></i> Deposit
                        </button>
                        <button class="btn btn-outline" id="convert-btn" onclick="openConvertPage()">
                            <i class="fas fa-exchange-alt"></i> Convert
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer-ticker" id="footer-ticker"></div>

<script>
    // =============================================
    // GLOBAL STATE
    // =============================================
    let currentPair = null;
    let currentPairSymbol = 'BTCUSDT';
    let currentPairBase = 'BTC';
    let currentPairQuote = 'USDT';
    let currentPrice = 0;
    let currentChange24h = 0;
    let orderSide = 'buy';
    let userAssets = {};
    let userMainBalance = 0;
    let userMaturedBalance = 0;
    let allPairs = [];
    let filteredPairs = [];
    let binanceWebSocket = null;
    let tickerInterval = null;
    let currentCryptoId = null;
    let priceUpdateInterval = null;
    let orderBookUpdateInterval = null;
    let tradesUpdateInterval = null;
    let tickerUpdateInterval = null;
    let isLoggedIn = false;
    
    // CoinGecko logo cache
    const logoCache = {};
    
    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    
    function showNotification(type, title, message) {
        const container = document.getElementById('notification-center');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <strong>${title}</strong><br>
            <small>${message}</small>
        `;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }
    
    function formatNumber(num, decimals = 8) {
        if (num === null || num === undefined) return '0.00000000';
        return parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        });
    }
    
    function formatUSD(num) {
        if (num === null || num === undefined) return '$0.00';
        return '$' + parseFloat(num).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    // =============================================
    // FETCH USER BALANCES (SAME AS DASHBOARD)
    // =============================================
    async function fetchUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            isLoggedIn = false;
            document.getElementById('auth-buttons').style.display = 'flex';
            document.getElementById('user-balance-bar').style.display = 'none';
            return;
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                userMainBalance = parseFloat(data.main) || 0;
                userMaturedBalance = parseFloat(data.matured) || 0;
                isLoggedIn = true;
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-balance-bar').style.display = 'block';
            } else {
                isLoggedIn = false;
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-balance-bar').style.display = 'none';
            }
            
            await fetchUserAssets();
        } catch (error) {
            console.error('Error fetching balances:', error);
        }
    }
    
    async function fetchUserAssets() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                userAssets = {};
                data.forEach(asset => {
                    userAssets[asset.symbol.toLowerCase()] = parseFloat(asset.balance) || 0;
                });
                updateAssetBalanceDisplay();
            }
        } catch (error) {
            console.error('Error fetching assets:', error);
        }
    }
    
    function updateAssetBalanceDisplay() {
        const balance = userAssets[currentPairBase.toLowerCase()] || 0;
        document.getElementById('selected-asset-balance-value').textContent = formatNumber(balance, 8);
        document.getElementById('selected-asset-symbol').textContent = currentPairBase;
        document.getElementById('order-balance-label').innerHTML = `Available: ${formatNumber(balance, 8)} ${currentPairBase}`;
        
        // Check if user has sufficient balance for selling
        if (isLoggedIn) {
            const hasBalance = balance > 0;
            const hasUSDT = (userMainBalance + userMaturedBalance) > 0;
            
            if (orderSide === 'buy') {
                if (hasUSDT) {
                    document.getElementById('trading-form-content').style.display = 'block';
                    document.getElementById('insufficient-balance-message').style.display = 'none';
                } else {
                    document.getElementById('trading-form-content').style.display = 'none';
                    document.getElementById('insufficient-balance-message').style.display = 'block';
                }
            } else {
                if (hasBalance) {
                    document.getElementById('trading-form-content').style.display = 'block';
                    document.getElementById('insufficient-balance-message').style.display = 'none';
                } else {
                    document.getElementById('trading-form-content').style.display = 'none';
                    document.getElementById('insufficient-balance-message').style.display = 'block';
                }
            }
        } else {
            document.getElementById('trading-form-content').style.display = 'none';
            document.getElementById('insufficient-balance-message').style.display = 'block';
        }
    }
    
    function openConvertPage() {
        window.location.href = 'dashboard.html?tab=convert';
    }
    
    // =============================================
    // FETCH PAIR LOGOS FROM COINGECKO
    // =============================================
    async function fetchAssetLogo(assetSymbol) {
        if (logoCache[assetSymbol]) return logoCache[assetSymbol];
        
        const assetMap = {
            'btc': 'bitcoin',
            'eth': 'ethereum',
            'usdt': 'tether',
            'bnb': 'binancecoin',
            'sol': 'solana',
            'xrp': 'xrp',
            'ada': 'cardano',
            'doge': 'dogecoin',
            'trx': 'tron',
            'dot': 'polkadot',
            'matic': 'polygon',
            'ltc': 'litecoin',
            'avax': 'avalanche-2',
            'shib': 'shiba-inu',
            'uni': 'uniswap'
        };
        
        const coinId = assetMap[assetSymbol.toLowerCase()];
        if (!coinId) {
            logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            return logoCache[assetSymbol];
        }
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}`);
            if (response.ok) {
                const data = await response.json();
                const logo = data.image?.small || data.image?.thumb;
                if (logo) {
                    logoCache[assetSymbol] = logo;
                    return logo;
                }
            }
        } catch (error) {
            console.warn(`Failed to fetch logo for ${assetSymbol}:`, error);
        }
        
        logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        return logoCache[assetSymbol];
    }
    
    async function updatePairLogos() {
        const baseLogo = await fetchAssetLogo(currentPairBase);
        const quoteLogo = await fetchAssetLogo(currentPairQuote);
        
        document.getElementById('pair-logos').innerHTML = `
            <img src="${baseLogo}" alt="${currentPairBase}">
            <img src="${quoteLogo}" alt="${currentPairQuote}">
        `;
    }
    
    // =============================================
    // FETCH BINANCE PAIRS
    // =============================================
    async function fetchBinancePairs() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            if (response.ok) {
                const data = await response.json();
                allPairs = data.symbols
                    .filter(s => s.status === 'TRADING')
                    .map(s => ({
                        symbol: s.symbol,
                        baseAsset: s.baseAsset,
                        quoteAsset: s.quoteAsset,
                        basePrecision: s.baseAssetPrecision,
                        quotePrecision: s.quoteAssetPrecision
                    }));
                
                // Default filter to USDT pairs first
                filteredPairs = allPairs.filter(p => p.quoteAsset === 'USDT');
                
                // Store all pairs for search
                console.log(`Loaded ${allPairs.length} trading pairs, ${filteredPairs.length} USDT pairs`);
                return true;
            }
        } catch (error) {
            console.error('Error fetching Binance pairs:', error);
        }
        return false;
    }
    
    // =============================================
    // SELECT PAIR
    // =============================================
    async function selectPair(pairSymbol) {
        currentPairSymbol = pairSymbol;
        const pairInfo = allPairs.find(p => p.symbol === pairSymbol);
        if (pairInfo) {
            currentPairBase = pairInfo.baseAsset;
            currentPairQuote = pairInfo.quoteAsset;
        } else {
            currentPairBase = pairSymbol.replace('USDT', '');
            currentPairQuote = 'USDT';
        }
        
        document.getElementById('pair-name').textContent = `${currentPairBase}/${currentPairQuote}`;
        document.title = `${currentPairBase}/${currentPairQuote} | BitHash Trading | $${formatNumber(currentPrice, 2)}`;
        
        await updatePairLogos();
        updateAssetBalanceDisplay();
        
        // Update chart
        createTradingViewChart(currentPairSymbol);
        
        // Restart real-time updates
        startRealTimeUpdates();
    }
    
    // =============================================
    // PAIR SEARCH FUNCTIONALITY
    // =============================================
    function setupPairSearch() {
        const searchInput = document.getElementById('pair-search');
        const dropdown = document.getElementById('pair-dropdown');
        
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toUpperCase();
            if (searchTerm.length < 1) {
                dropdown.style.display = 'none';
                return;
            }
            
            const matches = filteredPairs
                .filter(p => p.symbol.includes(searchTerm))
                .slice(0, 15);
            
            if (matches.length > 0) {
                dropdown.style.display = 'block';
                dropdown.innerHTML = matches.map(p => `
                    <div class="pair-search-item" onclick="selectPair('${p.symbol}')">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span>${p.baseAsset}/${p.quoteAsset}</span>
                            <span style="color: var(--text-muted); font-size: 0.7rem;">${p.symbol}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                dropdown.style.display = 'none';
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }
    
    // =============================================
    // TRADINGVIEW CHART
    // =============================================
    let tradingViewWidget = null;
    
    function createTradingViewChart(symbol) {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        
        if (typeof TradingView !== 'undefined') {
            tradingViewWidget = new TradingView.widget({
                "autosize": true,
                "symbol": `BINANCE:${symbol}`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#151A21",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gray);">Loading Chart...</div>';
        }
    }
    
    // =============================================
    // BINANCE REAL-TIME DATA
    // =============================================
    
    async function fetchTicker() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPairSymbol}`);
            if (response.ok) {
                const data = await response.json();
                currentPrice = parseFloat(data.lastPrice);
                currentChange24h = parseFloat(data.priceChangePercent);
                
                document.getElementById('pair-price').textContent = formatUSD(currentPrice);
                document.title = `${currentPairBase}/${currentPairQuote} | $${formatNumber(currentPrice, 2)} | BitHash Trading`;
                
                const changeClass = currentChange24h >= 0 ? 'positive' : 'negative';
                const changeSign = currentChange24h >= 0 ? '+' : '';
                document.getElementById('pair-change').textContent = `${changeSign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('pair-change').className = `pair-change ${changeClass}`;
                document.getElementById('stat-change').textContent = `${changeSign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('stat-change').style.color = currentChange24h >= 0 ? 'var(--positive)' : 'var(--negative)';
                
                document.getElementById('stat-high').textContent = formatUSD(parseFloat(data.highPrice));
                document.getElementById('stat-low').textContent = formatUSD(parseFloat(data.lowPrice));
                
                const volume = parseFloat(data.volume);
                const quoteVolume = parseFloat(data.quoteVolume);
                document.getElementById('stat-volume').textContent = `${formatNumber(volume, 0)} ${currentPairBase} / ${formatUSD(quoteVolume)}`;
                
                document.getElementById('order-price').value = currentPrice.toFixed(2);
                updateOrderTotal();
            }
        } catch (error) {
            console.error('Error fetching ticker:', error);
        }
    }
    
    async function fetchOrderBook() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPairSymbol}&limit=10`);
            if (response.ok) {
                const data = await response.json();
                
                // Render Asks (Sell orders - red)
                const asksContainer = document.getElementById('order-book-asks');
                asksContainer.innerHTML = data.asks.slice(0, 8).reverse().map(ask => {
                    const price = parseFloat(ask[0]);
                    const amount = parseFloat(ask[1]);
                    const total = price * amount;
                    return `
                        <div class="order-book-row" onclick="setOrderPrice(${price})">
                            <span class="order-book-price negative">${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span>${formatUSD(total)}</span>
                        </div>
                    `;
                }).join('');
                
                // Render Bids (Buy orders - green)
                const bidsContainer = document.getElementById('order-book-bids');
                bidsContainer.innerHTML = data.bids.slice(0, 8).map(bid => {
                    const price = parseFloat(bid[0]);
                    const amount = parseFloat(bid[1]);
                    const total = price * amount;
                    return `
                        <div class="order-book-row" onclick="setOrderPrice(${price})">
                            <span class="order-book-price positive">${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span>${formatUSD(total)}</span>
                        </div>
                    `;
                }).join('');
                
                // Calculate spread
                const bestAsk = parseFloat(data.asks[0][0]);
                const bestBid = parseFloat(data.bids[0][0]);
                const spread = bestAsk - bestBid;
                const spreadPercent = (spread / bestAsk) * 100;
                document.getElementById('spread-info').innerHTML = `Spread: <span class="accent">${formatUSD(spread)}</span> (${spreadPercent.toFixed(4)}%)`;
            }
        } catch (error) {
            console.error('Error fetching order book:', error);
        }
    }
    
    async function fetchRecentTrades() {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPairSymbol}&limit=20`);
            if (response.ok) {
                const data = await response.json();
                const container = document.getElementById('recent-trades');
                container.innerHTML = data.map(trade => {
                    const isBuy = !trade.isBuyerMaker;
                    const price = parseFloat(trade.price);
                    const amount = parseFloat(trade.qty);
                    const time = new Date(trade.time).toLocaleTimeString();
                    return `
                        <div class="trade-row">
                            <span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span>
                            <span>${formatUSD(price)}</span>
                            <span>${formatNumber(amount, 4)}</span>
                            <span style="font-size: 0.65rem; color: var(--text-muted);">${time}</span>
                        </div>
                    `;
                }).join('');
            }
        } catch (error) {
            console.error('Error fetching recent trades:', error);
        }
    }
    
    function setOrderPrice(price) {
        document.getElementById('order-price').value = price.toFixed(2);
        updateOrderTotal();
    }
    
    function updateOrderTotal() {
        const amount = parseFloat(document.getElementById('order-amount').value) || 0;
        const price = parseFloat(document.getElementById('order-price').value) || 0;
        const total = amount * price;
        document.getElementById('order-total-value').innerHTML = `≈ ${formatUSD(total)}`;
    }
    
    function setOrderSide(side) {
        orderSide = side;
        const buyTab = document.getElementById('tab-buy');
        const sellTab = document.getElementById('tab-sell');
        const submitBtn = document.getElementById('order-submit-btn');
        
        if (side === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            submitBtn.className = 'order-action-btn buy';
            submitBtn.innerHTML = `Buy ${currentPairBase}`;
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            submitBtn.className = 'order-action-btn sell';
            submitBtn.innerHTML = `Sell ${currentPairBase}`;
        }
        
        updateAssetBalanceDisplay();
    }
    
    async function executeOrder() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            showNotification('error', 'Authentication Required', 'Please login to trade');
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }
        
        const price = parseFloat(document.getElementById('order-price').value);
        const amount = parseFloat(document.getElementById('order-amount').value);
        
        if (!amount || amount <= 0) {
            showNotification('error', 'Invalid Amount', 'Please enter a valid amount');
            return;
        }
        
        const total = price * amount;
        
        if (orderSide === 'buy') {
            const availableUSDT = userMainBalance + userMaturedBalance;
            if (total > availableUSDT) {
                showNotification('error', 'Insufficient Balance', `You need ${formatUSD(total)} but have ${formatUSD(availableUSDT)}`);
                return;
            }
        } else {
            const availableAsset = userAssets[currentPairBase.toLowerCase()] || 0;
            if (amount > availableAsset) {
                showNotification('error', 'Insufficient Balance', `You have ${formatNumber(availableAsset, 8)} ${currentPairBase}`);
                return;
            }
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    symbol: currentPairSymbol,
                    side: orderSide,
                    type: 'market',
                    price: price,
                    amount: amount,
                    total: total
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                showNotification('success', 'Order Executed', `${orderSide.toUpperCase()} ${formatNumber(amount, 6)} ${currentPairBase} at ${formatUSD(price)}`);
                document.getElementById('order-amount').value = '';
                updateOrderTotal();
                await fetchUserBalances();
                await fetchUserAssets();
            } else {
                const error = await response.json();
                showNotification('error', 'Order Failed', error.message || 'Please try again');
            }
        } catch (error) {
            console.error('Order execution error:', error);
            showNotification('error', 'Order Failed', 'Network error. Please try again.');
        }
    }
    
    function startRealTimeUpdates() {
        if (tickerUpdateInterval) clearInterval(tickerUpdateInterval);
        if (orderBookUpdateInterval) clearInterval(orderBookUpdateInterval);
        if (tradesUpdateInterval) clearInterval(tradesUpdateInterval);
        if (priceUpdateInterval) clearInterval(priceUpdateInterval);
        
        fetchTicker();
        fetchOrderBook();
        fetchRecentTrades();
        
        tickerUpdateInterval = setInterval(fetchTicker, 2000);
        orderBookUpdateInterval = setInterval(fetchOrderBook, 1000);
        tradesUpdateInterval = setInterval(fetchRecentTrades, 2000);
        priceUpdateInterval = setInterval(() => {
            const price = currentPrice;
            if (price) {
                document.getElementById('order-price').value = price.toFixed(2);
            }
        }, 3000);
    }
    
    // =============================================
    // FOOTER TICKER
    // =============================================
    async function initFooterTicker() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            if (response.ok) {
                const data = await response.json();
                const topPairs = data
                    .filter(t => t.symbol.endsWith('USDT'))
                    .slice(0, 30)
                    .map(t => {
                        const change = parseFloat(t.priceChangePercent);
                        const changeClass = change >= 0 ? 'positive' : 'negative';
                        const changeSign = change >= 0 ? '+' : '';
                        return `
                            <span class="ticker-item">
                                ${t.symbol.replace('USDT', '/USDT')}: ${formatUSD(parseFloat(t.lastPrice))}
                                <span class="${changeClass}">${changeSign}${change.toFixed(2)}%</span>
                            </span>
                        `;
                    }).join('');
                
                const tickerContainer = document.getElementById('footer-ticker');
                tickerContainer.innerHTML = `
                    <div class="ticker-content">
                        ${topPairs.repeat(2)}
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error loading footer ticker:', error);
        }
    }
    
    // =============================================
    // URL PARAMETER HANDLING
    // =============================================
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    
    // =============================================
    // INITIALIZATION
    // =============================================
    async function init() {
        document.getElementById('loading-overlay').classList.add('hidden');
        
        await fetchBinancePairs();
        await fetchUserBalances();
        await initFooterTicker();
        
        setupPairSearch();
        
        document.getElementById('order-amount').addEventListener('input', updateOrderTotal);
        
        const urlSymbol = getUrlParameter('symbol');
        if (urlSymbol) {
            let pairSymbol = urlSymbol.toUpperCase();
            if (!pairSymbol.includes('USDT')) {
                pairSymbol = pairSymbol + 'USDT';
            }
            if (allPairs.some(p => p.symbol === pairSymbol)) {
                await selectPair(pairSymbol);
            } else {
                await selectPair('BTCUSDT');
            }
        } else {
            await selectPair('BTCUSDT');
        }
        
        await updatePairLogos();
        
        setInterval(() => {
            fetchUserBalances();
        }, 30000);
    }
    
    window.setOrderPrice = setOrderPrice;
    window.setOrderSide = setOrderSide;
    window.executeOrder = executeOrder;
    window.selectPair = selectPair;
    window.openConvertPage = openConvertPage;
    
    init();
</script>
</body>
</html>
