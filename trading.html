<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">ETH/USDT | BitHash Trading</title>
    
    <!-- Preconnect to APIs -->
    <link rel="preconnect" href="https://api.binance.com">
    <link rel="preconnect" href="https://api.bithashcapital.live">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://s3.tradingview.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <style>
        /* ============================================= */
        /* PROFESSIONAL TRADING INTERFACE - LIKE BINANCE */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #02c076;
            --success-dark: #019e5f;
            --warning: #F0B90B;
            --error: #f6465d;
            --error-dark: #d13b4f;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            
            --border-color: #2a2a3a;
            --hover-bg: rgba(255, 255, 255, 0.03);
            --active-bg: rgba(0, 216, 255, 0.08);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Manrope', monospace;
            
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--darker);
            color: var(--dark);
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            line-height: 1.5;
            padding-bottom: 32px; /* For footer ticker */
        }

        /* ============================================= */
        /* TRADING PAGE LAYOUT - NEW GRID SYSTEM */
        /* ============================================= */
        .trading-app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--darker);
            overflow: hidden;
        }

        /* MAIN LAYOUT GRID (MANDATORY) */
        .trading-layout {
            display: grid;
            grid-template-columns: 60% 20% 20%;
            grid-template-rows: 100%;
            height: calc(100vh - 64px - 280px); /* header + bottom panel */
            gap: 1px;
            background-color: var(--border-color);
            margin: 0;
            padding: 0;
        }
        
        /* Grid Children Styling */
        .grid-chart-area {
            background-color: var(--lighter);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .grid-orderbook-area {
            background-color: var(--lighter);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .grid-trade-panel-area {
            background-color: var(--lighter);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* BOTTOM TABS & TABLE */
        .bottom-tabs-container {
            height: 280px;
            background-color: var(--lighter);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            margin-top: 1px;
        }
        
        .bottom-tabs {
            display: flex;
            gap: var(--spacing-xl);
            padding: 0 var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }
        
        .bottom-tab {
            font-size: 0.85rem;
            color: var(--gray);
            cursor: pointer;
            padding: var(--spacing-md) 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .bottom-tab:hover {
            color: var(--dark);
        }
        
        .bottom-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .table-content {
            flex: 1;
            overflow: auto;
            padding: var(--spacing-sm);
        }

        /* Header (Top Bar) */
        .pair-header {
            height: 64px;
            min-height: 64px;
            background-color: var(--darker);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-xl);
            gap: 32px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .pair-header::-webkit-scrollbar {
            display: none;
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-shrink: 0;
        }

        .favorite-icon {
            color: var(--gray);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .favorite-icon.active {
            color: var(--gold);
        }

        .pair-logos {
            display: flex;
            align-items: center;
        }

        .pair-logo {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--darker);
        }

        .pair-logo:last-child {
            margin-left: -8px;
        }

        .pair-name {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.2px;
        }

        .pair-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-left: var(--spacing-xs);
        }

        .live-price-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .live-price {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: var(--font-mono);
            line-height: 1.2;
            transition: background-color 0.2s ease;
            letter-spacing: -0.5px;
        }

        .live-price.flash-green {
            background-color: rgba(2, 192, 118, 0.15);
        }

        .live-price.flash-red {
            background-color: rgba(246, 70, 93, 0.15);
        }

        .live-price-small {
            font-size: 0.8rem;
            color: var(--gray);
            font-family: var(--font-mono);
        }

        .market-stats {
            display: flex;
            gap: 28px;
            flex-shrink: 0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 0.85rem;
            font-weight: 500;
            font-family: var(--font-mono);
        }

        .stat-value.positive {
            color: var(--success);
        }

        .stat-value.negative {
            color: var(--error);
        }

        /* Order Book Styles */
        .order-book-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-sm) 0;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s ease;
        }

        .order-book-row:hover {
            background-color: var(--hover-bg);
        }

        .depth-bar {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            opacity: 0.1;
            pointer-events: none;
            transition: width 0.2s ease;
        }

        .sell-depth {
            background-color: var(--error);
        }

        .buy-depth {
            background-color: var(--success);
        }

        .order-book-price {
            text-align: right;
            font-weight: 500;
        }

        .order-book-price.sell {
            color: var(--error);
        }

        .order-book-price.buy {
            color: var(--success);
        }

        .order-book-amount, .order-book-total {
            text-align: right;
            color: var(--gray);
        }

        .current-price-row {
            background-color: rgba(0, 216, 255, 0.05);
            padding: var(--spacing-sm) var(--spacing-md);
            margin: var(--spacing-sm) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-family: var(--font-mono);
            border-left: 3px solid var(--primary);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        /* Recent Trades Tab inside Order Book */
        .recent-trades-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-xs) 0;
        }
        
        .trade-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            font-size: 0.8rem;
            font-family: var(--font-mono);
            transition: background-color 0.2s ease;
        }
        
        .trade-row.flash-green {
            background-color: rgba(2, 192, 118, 0.1);
        }
        
        .trade-row.flash-red {
            background-color: rgba(246, 70, 93, 0.1);
        }
        
        .trade-price.buy {
            color: var(--success);
        }
        
        .trade-price.sell {
            color: var(--error);
        }

        /* Trade Panel Styles */
        .order-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .order-tab {
            flex: 1;
            padding: var(--spacing-md);
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            color: var(--gray);
            border-bottom: 2px solid transparent;
        }

        .order-tab.buy.active {
            color: var(--success);
            border-bottom-color: var(--success);
        }

        .order-tab.sell.active {
            color: var(--error);
            border-bottom-color: var(--error);
        }

        .order-form {
            padding: var(--spacing-lg);
            flex: 1;
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: var(--spacing-xs);
        }

        .form-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            background-color: var(--darker);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: var(--spacing-sm) var(--spacing-md);
            color: var(--dark);
            font-size: 0.85rem;
            font-family: var(--font-mono);
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-suffix {
            position: absolute;
            right: var(--spacing-md);
            color: var(--gray);
            font-size: 0.75rem;
        }

        .percentage-buttons {
            display: flex;
            gap: var(--spacing-sm);
            margin: var(--spacing-md) 0;
        }

        .percentage-btn {
            flex: 1;
            background-color: var(--darker);
            border: 1px solid var(--border-color);
            color: var(--gray);
            padding: var(--spacing-sm) 0;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: var(--spacing-md);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: var(--spacing-sm);
        }

        .action-btn.buy {
            background-color: var(--success);
            color: white;
        }

        .action-btn.sell {
            background-color: var(--error);
            color: white;
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chart Specifics */
        .chart-tabs {
            display: flex;
            gap: var(--spacing-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .chart-tab {
            font-size: 0.8rem;
            color: var(--gray);
            cursor: pointer;
            padding: var(--spacing-xs) 0;
            border-bottom: 2px solid transparent;
        }
        
        .chart-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .chart-controls {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }
        
        .timeframe-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--gray);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        
        .timeframe-btn.active {
            background-color: var(--primary);
            color: var(--darker);
            border-color: var(--primary);
        }
        
        #tradingview-chart {
            flex: 1;
            min-height: 0;
            background: #0B0E11;
        }
        
        /* Tables for bottom */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .data-table th, .data-table td {
            padding: var(--spacing-sm);
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        /* Footer Ticker */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32px;
            background: #0B0E11;
            border-top: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            z-index: 999;
        }
        
        .ticker-track {
            display: flex;
            width: max-content;
            animation: scrollTicker 40s linear infinite;
        }
        
        @keyframes scrollTicker {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        
        .ticker-item {
            display: flex;
            gap: 8px;
            padding: 0 24px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            color: #EAECEF;
        }
        .ticker-item span { color: #848E9C; }
        .ticker-up { color: #0ECB81; }
        .ticker-down { color: #F6465D; }
        
        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="trading-app">
        <!-- HEADER (TOP BAR) -->
        <div class="pair-header" id="pairHeader">
            <div class="pair-info">
                <i class="far fa-star favorite-icon" id="favoriteBtn"></i>
                <div class="pair-logos" id="pairLogos"></div>
                <div>
                    <span class="pair-name" id="pairSymbol">Loading...</span>
                    <span class="pair-label" id="pairBase"></span>
                </div>
            </div>
            <div class="live-price-container">
                <span class="live-price" id="livePrice">$0.00</span>
                <span class="live-price-small" id="livePriceUSD">$0.00</span>
            </div>
            <div class="market-stats" id="marketStats"></div>
        </div>

        <!-- MAIN GRID LAYOUT (60% CHART | 20% ORDER BOOK | 20% TRADE PANEL) -->
        <div class="trading-layout">
            <!-- CHART AREA (60%) -->
            <div class="grid-chart-area">
                <div class="chart-tabs">
                    <span class="chart-tab active" onclick="switchChartTab('chart')">Chart</span>
                    <span class="chart-tab" onclick="switchChartTab('overview')">Overview</span>
                    <span class="chart-tab" onclick="switchChartTab('data')">Data</span>
                    <span class="chart-tab" onclick="switchChartTab('feed')">Feed</span>
                </div>
                <div class="chart-controls" id="timeframeControls">
                    <button class="timeframe-btn active" onclick="changeTimeframe('1m')">1m</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('5m')">5m</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('15m')">15m</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('30m')">30m</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('1h')">1h</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('4h')">4h</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('1D')">1D</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('1W')">1W</button>
                    <button class="timeframe-btn" onclick="changeTimeframe('1M')">1M</button>
                </div>
                <div id="tradingview-chart" style="flex:1"></div>
                <div style="padding: 4px 12px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; font-size: 10px; color: var(--gray);">
                    <span>Time / UTC</span>
                    <span>Log Scale Toggle</span>
                </div>
            </div>

            <!-- ORDER BOOK AREA (20%) + Recent Trades Tab -->
            <div class="grid-orderbook-area">
                <div class="order-tabs" style="border-bottom: 1px solid var(--border-color);">
                    <button class="order-tab active" id="tabOrderBookBtn" style="flex:1" onclick="switchOrderBookTab('book')">Order Book</button>
                    <button class="order-tab" id="tabRecentTradesBtn" style="flex:1" onclick="switchOrderBookTab('trades')">Recent Trades</button>
                </div>
                <div id="orderBookContainer" style="flex:1; display: flex; flex-direction: column;">
                    <div class="order-book-header" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px 12px; font-size: 0.7rem; color: var(--gray); border-bottom: 1px solid var(--border-color);">
                        <span style="text-align: right;">Price</span>
                        <span style="text-align: right;">Quantity</span>
                        <span style="text-align: right;">Total</span>
                    </div>
                    <div id="orderBookList" class="order-book-content"></div>
                </div>
                <div id="recentTradesContainer" style="flex:1; display: none; flex-direction: column;">
                    <div class="trades-header" style="display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 8px 12px; border-bottom: 1px solid var(--border-color);">
                        <span>Price</span><span style="text-align:right">Amount</span><span style="text-align:right">Time</span>
                    </div>
                    <div id="recentTradesList" class="recent-trades-list"></div>
                </div>
            </div>

            <!-- TRADE PANEL (20%) -->
            <div class="grid-trade-panel-area">
                <div class="order-tabs">
                    <button class="order-tab buy active" onclick="switchOrderTab('buy')">Buy</button>
                    <button class="order-tab sell" onclick="switchOrderTab('sell')">Sell</button>
                </div>
                <div class="order-type-selector" style="display: flex; gap: 8px; padding: 12px;">
                    <button class="order-type-btn active" onclick="switchOrderType('limit')">Limit</button>
                    <button class="order-type-btn" onclick="switchOrderType('market')">Market</button>
                    <button class="order-type-btn" onclick="switchOrderType('tp/sl')">TP/SL</button>
                </div>
                <div class="order-form">
                    <div class="form-group">
                        <div class="form-label"><span>Available Balance</span><span id="availBalance">0.00 USDT</span></div>
                    </div>
                    <div class="form-group" id="priceInputGroup">
                        <div class="form-label"><span>Price (USDT)</span></div>
                        <div class="form-input-container">
                            <input type="number" class="form-input" id="orderPrice" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="form-label"><span>Quantity</span></div>
                        <div class="form-input-container">
                            <input type="number" class="form-input" id="orderAmount" step="0.000001" placeholder="0.00">
                        </div>
                    </div>
                    <div class="percentage-buttons">
                        <button class="percentage-btn" onclick="setQuantityPercent(25)">25%</button>
                        <button class="percentage-btn" onclick="setQuantityPercent(50)">50%</button>
                        <button class="percentage-btn" onclick="setQuantityPercent(75)">75%</button>
                        <button class="percentage-btn" onclick="setQuantityPercent(100)">100%</button>
                    </div>
                    <div class="form-group">
                        <div class="form-label"><span>Order Value</span><span id="orderValueDisplay">0.00 USDT</span></div>
                    </div>
                    <div class="form-group">
                        <div class="form-label"><span>Max Buy Amount</span><span id="maxBuyAmount">0.00</span></div>
                    </div>
                    <button class="action-btn buy" id="tradeActionBtn" onclick="submitOrder()">Buy</button>
                    <div style="margin-top: 12px; display: flex; gap: 12px;">
                        <button class="percentage-btn" onclick="showAuthModal()">Sign Up</button>
                        <button class="percentage-btn" onclick="showAuthModal()">Log In</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM TABS (Open Orders, Positions...) -->
        <div class="bottom-tabs-container">
            <div class="bottom-tabs">
                <span class="bottom-tab active" onclick="switchBottomTab('openOrders')">Open Orders</span>
                <span class="bottom-tab" onclick="switchBottomTab('positions')">Positions</span>
                <span class="bottom-tab" onclick="switchBottomTab('orderHistory')">Order History</span>
                <span class="bottom-tab" onclick="switchBottomTab('tradeHistory')">Trade History</span>
                <span class="bottom-tab" onclick="switchBottomTab('assets')">Assets</span>
            </div>
            <div class="table-content" id="bottomTableContent">
                <!-- Table content will be injected here -->
                <table class="data-table" id="dynamicTable">
                    <thead><tr><th>No open orders</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- FOOTER TICKER -->
    <div class="footer-ticker">
        <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal hidden" id="authModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div style="background:#12161C; padding:24px; border-radius:12px; text-align:center;"><h3>Login Required</h3><button onclick="closeAuthModal()">Close</button></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // --- Global State & Config ---
        let currentSymbol = 'BTCUSDT';
        let currentBase = 'BTC';
        let currentPrice = 50000;
        let userBalance = 10000; // USDT
        let ws = null;
        let orderBookData = { bids: [], asks: [] };
        let recentTrades = [];
        let chartWidget = null;
        let currentOrderSide = 'buy';
        let currentOrderType = 'limit';
        let tickerData = {};

        // DOM Elements
        const livePriceEl = document.getElementById('livePrice');
        const pairSymbolEl = document.getElementById('pairSymbol');
        
        // --- WebSocket Real-time Data (Binance) ---
        function initWebSocket() {
            if(ws) ws.close();
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@depth20@100ms/${currentSymbol.toLowerCase()}@trade`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if(data.e === 'depthUpdate') {
                    updateOrderBook(data);
                } else if(data.e === 'trade') {
                    addNewTrade(data);
                }
            };
            ws.onerror = (err) => console.error("WebSocket error", err);
        }

        function updateOrderBook(data) {
            if(data.b) data.b.forEach(([p, q]) => updateBookSide(orderBookData.bids, p, q));
            if(data.a) data.a.forEach(([p, q]) => updateBookSide(orderBookData.asks, p, q));
            orderBookData.bids.sort((a,b) => b[0]-a[0]);
            orderBookData.asks.sort((a,b) => a[0]-b[0]);
            renderOrderBook();
        }
        function updateBookSide(side, price, qty) {
            let idx = side.findIndex(i => i[0] == price);
            if(qty == 0 && idx !== -1) side.splice(idx,1);
            else if(idx !== -1) side[idx] = [parseFloat(price), parseFloat(qty)];
            else if(qty != 0) side.push([parseFloat(price), parseFloat(qty)]);
        }

        function addNewTrade(trade) {
            let t = { price: parseFloat(trade.p), amount: parseFloat(trade.q), time: Date.now(), side: trade.m ? 'sell' : 'buy' };
            recentTrades.unshift(t);
            if(recentTrades.length > 50) recentTrades.pop();
            if(document.getElementById('recentTradesContainer').style.display !== 'none') renderRecentTrades();
            // Update price ticker
            previousPrice = currentPrice;
            currentPrice = t.price;
            updatePriceUI();
        }

        function renderOrderBook() {
            const container = document.getElementById('orderBookList');
            if(!container) return;
            let html = '';
            let maxTotal = 0;
            let allTotals = [...orderBookData.asks.map(([p,a])=>p*a), ...orderBookData.bids.map(([p,a])=>p*a)];
            maxTotal = Math.max(...allTotals, 1);
            [...orderBookData.asks].reverse().forEach(([price, amount]) => {
                let total = price * amount;
                let width = (total/maxTotal)*100;
                html += `<div class="order-book-row" onclick="setPriceInTrade(${price})">
                            <div class="depth-bar sell-depth" style="width:${width}%"></div>
                            <span class="order-book-price sell">${formatUSD(price)}</span>
                            <span class="order-book-amount">${amount.toFixed(4)}</span>
                            <span class="order-book-total">${formatUSD(total)}</span>
                         </div>`;
            });
            html += `<div class="current-price-row"><span class="current-price-value">${formatUSD(currentPrice)}</span><span></span></div>`;
            orderBookData.bids.forEach(([price, amount]) => {
                let total = price * amount;
                let width = (total/maxTotal)*100;
                html += `<div class="order-book-row" onclick="setPriceInTrade(${price})">
                            <div class="depth-bar buy-depth" style="width:${width}%"></div>
                            <span class="order-book-price buy">${formatUSD(price)}</span>
                            <span class="order-book-amount">${amount.toFixed(4)}</span>
                            <span class="order-book-total">${formatUSD(total)}</span>
                         </div>`;
            });
            container.innerHTML = html;
        }

        function renderRecentTrades() {
            const listDiv = document.getElementById('recentTradesList');
            if(!listDiv) return;
            let html = '';
            recentTrades.slice(0,30).forEach(t => {
                let cls = t.side === 'buy' ? 'buy' : 'sell';
                let time = new Date(t.time).toLocaleTimeString();
                html += `<div class="trade-row flash-${cls}"><span class="trade-price ${cls}">${formatUSD(t.price)}</span><span class="trade-amount">${t.amount.toFixed(4)}</span><span class="trade-time">${time}</span></div>`;
            });
            listDiv.innerHTML = html;
        }

        function updatePriceUI() {
            livePriceEl.innerText = formatUSD(currentPrice);
            document.getElementById('livePriceUSD').innerText = formatUSD(currentPrice);
            let change = ((currentPrice - 50000)/50000)*100;
            document.getElementById('marketStats').innerHTML = `<div class="stat-item"><span class="stat-label">24h Change</span><span class="stat-value ${change>=0?'positive':'negative'}">${change.toFixed(2)}%</span></div>`;
        }

        // --- Trade Panel Logic ---
        function switchOrderTab(tab) {
            currentOrderSide = tab;
            document.querySelectorAll('.order-tab.buy, .order-tab.sell').forEach(btn => btn.classList.remove('active'));
            if(tab === 'buy') document.querySelector('.order-tab.buy').classList.add('active');
            else document.querySelector('.order-tab.sell').classList.add('active');
            document.getElementById('tradeActionBtn').className = `action-btn ${tab}`;
            document.getElementById('tradeActionBtn').innerHTML = tab === 'buy' ? 'Buy' : 'Sell';
        }
        function switchOrderType(type) {
            currentOrderType = type;
            const priceGroup = document.getElementById('priceInputGroup');
            if(type === 'market') priceGroup.style.display = 'none';
            else priceGroup.style.display = 'block';
        }
        function setQuantityPercent(percent) {
            let balance = userBalance;
            if(currentOrderSide === 'buy') {
                let amount = (balance / currentPrice) * (percent/100);
                document.getElementById('orderAmount').value = amount.toFixed(6);
            } else {
                let qty = (balance / currentPrice) * (percent/100);
                document.getElementById('orderAmount').value = qty.toFixed(6);
            }
            updateOrderValue();
        }
        function updateOrderValue() {
            let price = currentOrderType === 'limit' ? parseFloat(document.getElementById('orderPrice').value) || currentPrice : currentPrice;
            let qty = parseFloat(document.getElementById('orderAmount').value) || 0;
            let value = price * qty;
            document.getElementById('orderValueDisplay').innerText = value.toFixed(2) + ' USDT';
            document.getElementById('maxBuyAmount').innerText = (userBalance / price).toFixed(6);
        }
        function setPriceInTrade(price) {
            document.getElementById('orderPrice').value = price;
            updateOrderValue();
        }
        async function submitOrder() {
            alert(`Order Placed: ${currentOrderSide.toUpperCase()} ${currentOrderType} ${document.getElementById('orderAmount').value} ${currentBase} at ${currentOrderType==='limit'?document.getElementById('orderPrice').value:currentPrice}`);
            // Here integrate real backend call.
        }

        // --- Chart Integration (TradingView) ---
        function initChart() {
            if(typeof TradingView !== 'undefined') {
                chartWidget = new TradingView.widget({
                    "autosize": true,
                    "symbol": `BINANCE:${currentSymbol}`,
                    "interval": "15",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "container_id": "tradingview-chart"
                });
            }
        }
        function changeTimeframe(tf) {
            if(chartWidget) chartWidget.setChartType(1);
        }
        function switchChartTab(tab) {
            // placeholder for chart tab switching
        }

        // --- Order Book / Recent Tabs Switch ---
        function switchOrderBookTab(tab) {
            const bookDiv = document.getElementById('orderBookContainer');
            const tradesDiv = document.getElementById('recentTradesContainer');
            const bookBtn = document.getElementById('tabOrderBookBtn');
            const tradesBtn = document.getElementById('tabRecentTradesBtn');
            if(tab === 'book') {
                bookDiv.style.display = 'flex';
                tradesDiv.style.display = 'none';
                bookBtn.classList.add('active');
                tradesBtn.classList.remove('active');
                renderOrderBook();
            } else {
                bookDiv.style.display = 'none';
                tradesDiv.style.display = 'flex';
                tradesBtn.classList.add('active');
                bookBtn.classList.remove('active');
                renderRecentTrades();
            }
        }

        // --- Footer Ticker (Real WebSocket) ---
        let tickerPairs = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT'];
        let tickerItems = [];
        function initTicker() {
            let track = document.getElementById('tickerTrack');
            let html = '';
            tickerPairs.forEach(p => { html += `<div class="ticker-item" data-symbol="${p}">${p} <span id="ticker-${p}">loading...</span></div>`; });
            track.innerHTML = html + html; // duplicate for infinite
            // Connect to ticker stream
            let tickerWs = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
            tickerWs.onmessage = (ev) => {
                let data = JSON.parse(ev.data);
                data.forEach(t => {
                    let sym = t.s;
                    if(tickerPairs.includes(sym)) {
                        let price = parseFloat(t.c);
                        let change = parseFloat(t.P);
                        let el = document.getElementById(`ticker-${sym}`);
                        if(el) {
                            let cls = change >= 0 ? 'ticker-up' : 'ticker-down';
                            el.innerHTML = `${price.toFixed(2)} ${change.toFixed(2)}%`;
                            el.className = cls;
                        }
                        // Store for click interaction
                        tickerData[sym] = {price, change};
                    }
                });
            };
            // Click event to switch pair
            document.querySelectorAll('.ticker-item').forEach(item => {
                item.addEventListener('click', () => {
                    let sym = item.dataset.symbol;
                    if(sym) window.location.href = `trading.html?symbol=${sym.replace('USDT','')}`;
                });
            });
        }

        // --- Bottom Tables (Open Orders, Positions etc) ---
        function switchBottomTab(tab) {
            let table = document.getElementById('dynamicTable');
            let html = `<thead><tr><th>Pair</th><th>Type</th><th>Side</th><th>Price</th><th>Amount</th><th>Filled %</th><th>Status</th><th>Action</th></tr></thead><tbody><tr><td colspan="8">No data (simulated)</td></tr></tbody>`;
            table.innerHTML = html;
        }

        // --- UI Helpers ---
        function formatUSD(num) { return '$' + num.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }
        function showAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        // --- Initial Load ---
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let symbolParam = urlParams.get('symbol');
            if(symbolParam) {
                currentBase = symbolParam.toUpperCase();
                currentSymbol = currentBase + 'USDT';
            }
            pairSymbolEl.innerText = `${currentBase}/USDT`;
            initWebSocket();
            initChart();
            initTicker();
            // fetch initial order book
            fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=20`).then(r=>r.json()).then(data=>{
                orderBookData.bids = data.bids.map(b=>[parseFloat(b[0]), parseFloat(b[1])]);
                orderBookData.asks = data.asks.map(a=>[parseFloat(a[0]), parseFloat(a[1])]);
                renderOrderBook();
            });
            fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`).then(r=>r.json()).then(data=>{ currentPrice = parseFloat(data.price); updatePriceUI(); });
            setInterval(()=> updateOrderValue(), 200);
        })();
    </script>
</body>
</html>
