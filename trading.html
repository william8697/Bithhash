<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BitHash | Advanced Trading</title>
    <meta name="description" content="Professional cryptocurrency trading terminal with real-time charts, order book, and instant execution.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&display=swap" rel="stylesheet">
    
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>
    
    <style>
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --primary: #F7A600;
            --primary-dark: #E69500;
            --success: #228B22;
            --error: #FF0000;
            --warning: #FFB800;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }
        .container { width: 100%; max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img { height: 32px; width: auto; }
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        .btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #000000; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: rgba(247,166,0,0.1); border-color: var(--accent); }
        .btn-danger { background: var(--negative); color: white; }
        .btn-danger:hover { background: #cc0000; }
        .btn-success { background: var(--positive); color: white; }
        
        .user-balance-container {
            background-color: var(--bg-surface);
            padding: 8px 0;
            position: fixed;
            top: 70px;
            width: 100%;
            z-index: 999;
            border-bottom: 1px solid var(--border);
        }
        .user-balances { display: flex; justify-content: flex-end; gap: 20px; align-items: center; flex-wrap: wrap; }
        .user-balance {
            background: rgba(247,166,0,0.1);
            border: 1px solid rgba(247,166,0,0.3);
            border-radius: 12px;
            padding: 6px 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        .balance-asset-row { display: flex; align-items: center; gap: 6px; }
        .balance-asset-logo { width: 20px; height: 20px; border-radius: 50%; }
        
        /* Notification System */
        .notification-center {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        .notification {
            background: var(--bg-hover);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Trading Layout */
        .trading-container { margin-top: 130px; padding: 20px 0; }
        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
        }
        @media (max-width: 1200px) { .trading-grid { grid-template-columns: 1fr; gap: 16px; } }
        
        /* Asset Header */
        .asset-header {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .asset-info { display: flex; align-items: center; gap: 16px; }
        .asset-info img { width: 48px; height: 48px; border-radius: 50%; }
        .asset-name { font-size: 1.5rem; font-weight: 700; }
        .asset-symbol { color: var(--text-muted); font-size: 0.9rem; }
        .asset-price { font-size: 2rem; font-weight: 700; }
        .price-change { font-size: 0.9rem; margin-left: 12px; }
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        
        /* Order Book */
        .order-book-panel, .recent-trades-panel, .order-entry-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .panel-header {
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .order-book-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .order-book-row:hover { background: var(--bg-hover); }
        .order-book-price.positive { color: var(--positive); }
        .order-book-price.negative { color: var(--negative); }
        .current-price-bar {
            text-align: center;
            padding: 8px;
            background: var(--bg-hover);
            margin: 8px 0;
            font-weight: 700;
            color: var(--accent);
        }
        
        /* Order Entry */
        .order-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: var(--bg-hover);
        }
        .order-tab.buy.active { background: var(--positive); color: white; }
        .order-tab.sell.active { background: var(--negative); color: white; }
        .order-form-group { margin-bottom: 16px; }
        .order-form-group label { display: block; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 6px; }
        .order-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        .order-input:focus { outline: none; border-color: var(--accent); }
        .order-balance-info { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.75rem; color: var(--text-secondary); }
        .order-action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }
        .order-action-btn.buy { background: var(--positive); color: white; }
        .order-action-btn.sell { background: var(--negative); color: white; }
        .order-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Chart */
        .chart-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            height: 500px;
            border: 1px solid var(--border);
        }
        #tradingview-chart { width: 100%; height: 100%; }
        
        /* Deposit/Convert Overlay */
        .action-overlay {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--accent);
        }
        .action-overlay h3 { margin-bottom: 16px; }
        .action-overlay p { color: var(--text-secondary); margin-bottom: 24px; }
        .action-buttons { display: flex; gap: 16px; justify-content: center; }
        
        /* Convert Modal (inline) */
        .convert-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .convert-modal.active { visibility: visible; opacity: 1; }
        .convert-content {
            background: var(--bg-surface);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            border: 1px solid var(--border);
        }
        .convert-step { margin-bottom: 20px; }
        .asset-selector-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .asset-selector-item:hover { background: var(--bg-hover); }
        .asset-selector-item img { width: 32px; height: 32px; border-radius: 50%; }
        .fee-info { font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; text-align: center; }
        
        footer {
            background: var(--bg-surface);
            padding: 30px 0;
            margin-top: 50px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) { .chart-panel { height: 350px; } .user-balances { justify-content: center; } }
    </style>
</head>
<body>

<header>
    <div class="container header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">
            <span class="logo-text">₿itHash</span>
        </div>
        <div class="auth-buttons" id="auth-buttons" style="display: flex;">
            <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</header>

<div class="user-balance-container" id="user-balance-container" style="display: none;">
    <div class="container">
        <div class="user-balances" id="user-balances"></div>
    </div>
</div>

<div class="notification-center" id="notification-center"></div>

<div class="container trading-container">
    <div class="asset-header" id="asset-header">
        <div class="asset-info">
            <img id="asset-logo" src="" alt="">
            <div>
                <h1 class="asset-name" id="asset-name">Loading...</h1>
                <span class="asset-symbol" id="asset-symbol"></span>
            </div>
        </div>

            <div class="asset-price" id="asset-price">$0.00</div>
            <span class="price-change" id="price-change"></span>
        </div>
    </div>

    <div class="trading-grid">
        <!-- Left: Order Book -->
        <div class="order-book-panel">
            <div class="panel-header">Order Book <i class="fas fa-book"></i></div>
            <div id="order-book-content"></div>
        </div>

        <!-- Center: Chart -->
        <div class="chart-panel">
            <div id="tradingview-chart"></div>
        </div>

        <!-- Right: Order Entry & Recent Trades -->
        <div>
            <div class="order-entry-panel" id="order-entry-panel">
                <div class="order-tabs">
                    <div class="order-tab buy active" id="tab-buy" onclick="setOrderTab('buy')">Buy</div>
                    <div class="order-tab sell" id="tab-sell" onclick="setOrderTab('sell')">Sell</div>
                </div>
                <div id="order-form-container">
                    <!-- Dynamic content: either trade form or deposit/convert overlay -->
                </div>
            </div>
            <div class="recent-trades-panel" style="margin-top: 16px;">
                <div class="panel-header">Recent Trades</div>
                <div id="recent-trades-list"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p>&copy; 2026 BitHash LLC. All rights reserved.</p>
    </div>
</footer>

<!-- Convert Modal (identical endpoint as dashboard) -->
<div id="convert-modal" class="convert-modal">
    <div class="convert-content">
        <h3 style="margin-bottom: 16px;">Convert Crypto <span style="font-size:0.7rem; background:rgba(247,166,0,0.2); padding:2px 8px; border-radius:20px;">0.5% Fee</span></h3>
        <div id="convert-step-1" class="convert-step">
            <label>Select asset to convert from:</label>
            <div id="convert-from-list" style="max-height: 250px; overflow-y: auto; margin-top: 10px;"></div>
        </div>
        <div id="convert-step-2" class="convert-step" style="display: none;">
            <label>Select target crypto:</label>
            <div id="convert-to-list" style="max-height: 250px; overflow-y: auto; margin-top: 10px;"></div>
        </div>
        <div id="convert-step-3" class="convert-step" style="display: none;">
            <label>Amount to convert:</label>
            <input type="number" id="convert-amount" class="order-input" placeholder="Enter amount" step="any">
            <div id="convert-estimate" class="fee-info" style="margin-top: 10px;">You will receive: 0.000000</div>
            <button class="btn btn-primary" style="width:100%; margin-top: 15px;" onclick="executeConvert()">Confirm Conversion</button>
        </div>
        <button class="btn btn-outline" style="width:100%; margin-top: 12px;" onclick="closeConvertModal()">Cancel</button>
    </div>
</div>

<script>
    // ========== GLOBAL STATE ==========
    let currentSymbol = null;
    let currentAssetData = null;
    let currentPrice = 0;
    let priceChange24h = 0;
    let userBalances = { main: 0, matured: 0 };
    let userCryptoBalances = {};  // { btc: 0.123, eth: 0.5, ... }
    let selectedOrderTab = 'buy';
    let orderBookInterval = null;
    let tradesInterval = null;
    let priceInterval = null;
    let allTargetAssets = [];
    let convertFromAsset = null;
    let convertToAsset = null;
    let allMarketAssets = [];
    
    // DOM Elements
    const authBtns = document.getElementById('auth-buttons');
    const balanceContainer = document.getElementById('user-balance-container');
    
    // ========== HELPER FUNCTIONS ==========
    function showNotification(type, title, message, duration = 4000) {
        const container = document.getElementById('notification-center');
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.borderLeftColor = type === 'error' ? 'var(--error)' : type === 'success' ? 'var(--positive)' : 'var(--accent)';
        notif.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><div><strong>${title}</strong><br><small>${message}</small></div>`;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), duration);
    }
    
    function formatNumber(num, decimals = 6) {
        if (num === undefined || num === null) return '0';
        const n = parseFloat(num);
        if (isNaN(n)) return '0';
        if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
        return n.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }
    
    function formatUSD(num) { return '$' + formatNumber(num, 2); }
    
    // ========== FETCH ASSET DATA (same backend as Trending/Top Movers) ==========
    async function fetchAllMarketData() {
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/market/assets');
            if (res.ok) {
                const data = await res.json();
                allMarketAssets = data.data || [];
                return allMarketAssets;
            }
        } catch(e) { console.warn('Market data fetch error', e); }
        return [];
    }
    
    async function loadCurrentCrypto(symbol) {
        if (!symbol) return;
        const assets = await fetchAllMarketData();
        const asset = assets.find(a => a.symbol.toLowerCase() === symbol.toLowerCase());
        if (asset) {
            currentAssetData = asset;
            currentPrice = asset.current_price || 0;
            priceChange24h = asset.price_change_percentage_24h || 0;
            document.getElementById('asset-name').innerText = asset.name || symbol.toUpperCase();
            document.getElementById('asset-symbol').innerText = asset.symbol.toUpperCase();
            document.getElementById('asset-price').innerText = formatUSD(currentPrice);
            const changeElem = document.getElementById('price-change');
            changeElem.innerHTML = `${priceChange24h >= 0 ? '▲' : '▼'} ${Math.abs(priceChange24h).toFixed(2)}% (24h)`;
            changeElem.className = `price-change ${priceChange24h >= 0 ? 'positive' : 'negative'}`;
            const logoUrl = asset.image || `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
            document.getElementById('asset-logo').src = logoUrl;
            loadTradingViewChart(symbol);
        } else {
            // fallback
            document.getElementById('asset-name').innerText = symbol.toUpperCase();
            document.getElementById('asset-symbol').innerText = symbol.toUpperCase();
            document.getElementById('asset-price').innerText = '$0.00';
            loadTradingViewChart(symbol);
        }
        startRealTimeUpdates(symbol);
    }
    
    function loadTradingViewChart(symbol) {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": `${symbol.toUpperCase()}USDT`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart"
            });
        } else {
            container.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--gray);">Loading chart...</div>';
        }
    }
    
    // ========== USER BALANCES (same endpoint as dashboard My Assets) ==========
    async function fetchUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return false;
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                userBalances.main = parseFloat(data.main) || 0;
                userBalances.matured = parseFloat(data.matured) || 0;
                return true;
            }
        } catch(e) { console.error('Balance fetch error', e); }
        return false;
    }
    
    async function fetchUserCryptoBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const assets = await res.json();
                userCryptoBalances = {};
                assets.forEach(asset => {
                    userCryptoBalances[asset.symbol.toLowerCase()] = parseFloat(asset.balance) || 0;
                });
            }
        } catch(e) { console.error('Crypto balances error', e); }
    }
    
    async function updateUIWithBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            authBtns.style.display = 'flex';
            balanceContainer.style.display = 'none';
            return;
        }
        await fetchUserBalances();
        await fetchUserCryptoBalances();
        authBtns.style.display = 'none';
        balanceContainer.style.display = 'block';
        const balancesDiv = document.getElementById('user-balances');
        const totalFiat = userBalances.main + userBalances.matured;
        balancesDiv.innerHTML = `
            <div class="user-balance"><i class="fas fa-wallet"></i><div class="balance-asset-row"><img src="https://flagcdn.com/w40/us.png" class="balance-asset-logo"><span>${formatUSD(totalFiat)}</span><span>USD</span></div></div>
            <div class="user-balance"><i class="fas fa-coins"></i><div class="balance-asset-row"><img src="${currentAssetData?.image || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'}" class="balance-asset-logo"><span>${formatNumber(userCryptoBalances[currentSymbol?.toLowerCase()] || 0, 8)}</span><span>${currentSymbol?.toUpperCase() || ''}</span></div></div>
        `;
        // Check if user has balance of selected crypto
        const hasBalance = (userCryptoBalances[currentSymbol?.toLowerCase()] || 0) > 0;
        renderOrderForm(hasBalance);
    }
    
    // ========== ORDER FORM (Buy/Sell vs Deposit/Convert) ==========
    function renderOrderForm(hasBalance) {
        const container = document.getElementById('order-form-container');
        if (!hasBalance) {
            container.innerHTML = `
                <div class="action-overlay">
                    <h3><i class="fas fa-exclamation-triangle"></i> Insufficient Balance</h3>
                    <p>You don't have enough ${currentSymbol?.toUpperCase() || 'crypto'} to sell. Buy or deposit to start trading.</p>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="redirectDeposit()"><i class="fas fa-plus-circle"></i> Deposit</button>
                        <button class="btn btn-outline" onclick="openConvertModal()"><i class="fas fa-exchange-alt"></i> Convert</button>
                    </div>
                </div>
            `;
            return;
        }
        const balanceAmount = userCryptoBalances[currentSymbol?.toLowerCase()] || 0;
        const mainUsd = userBalances.main + userBalances.matured;
        container.innerHTML = `
            <div class="order-form-group">
                <label>Price (USD)</label>
                <input type="text" class="order-input" id="trade-price" value="${formatUSD(currentPrice)}" readonly>
            </div>
            <div class="order-form-group">
                <label>Amount (USD)</label>
                <input type="number" class="order-input" id="trade-amount" placeholder="Enter amount in USD" step="0.01" min="1">
                <div class="order-balance-info">
                    <span>Available: <span id="available-balance-display">${selectedOrderTab === 'buy' ? formatUSD(mainUsd) : formatNumber(balanceAmount, 8) + ' ' + currentSymbol?.toUpperCase()}</span></span>
                    <span>≈ <span id="estimated-asset">0.000000</span> ${currentSymbol?.toUpperCase()}</span>
                </div>
            </div>
            <button class="order-action-btn ${selectedOrderTab === 'buy' ? 'buy' : 'sell'}" id="execute-order-btn" onclick="executeOrder()">${selectedOrderTab === 'buy' ? 'Buy' : 'Sell'} ${currentSymbol?.toUpperCase()}</button>
        `;
        const amountInput = document.getElementById('trade-amount');
        if (amountInput) {
            amountInput.addEventListener('input', updateEstimate);
            updateEstimate();
        }
    }
    
    function updateEstimate() {
        const amount = parseFloat(document.getElementById('trade-amount')?.value) || 0;
        const price = currentPrice;
        if (price > 0) {
            const assetQty = amount / price;
            document.getElementById('estimated-asset').innerText = formatNumber(assetQty, 8);
        }
        const availableSpan = document.getElementById('available-balance-display');
        if (availableSpan) {
            if (selectedOrderTab === 'buy') {
                const totalUsd = userBalances.main + userBalances.matured;
                availableSpan.innerText = formatUSD(totalUsd);
            } else {
                const cryptoBal = userCryptoBalances[currentSymbol?.toLowerCase()] || 0;
                availableSpan.innerText = formatNumber(cryptoBal, 8) + ' ' + currentSymbol?.toUpperCase();
            }
        }
    }
    
    function setOrderTab(tab) {
        selectedOrderTab = tab;
        document.getElementById('tab-buy').classList.toggle('active', tab === 'buy');
        document.getElementById('tab-sell').classList.toggle('active', tab === 'sell');
        const hasBalance = (userCryptoBalances[currentSymbol?.toLowerCase()] || 0) > 0;
        renderOrderForm(hasBalance);
    }
    
    async function executeOrder() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { showNotification('error', 'Not Logged In', 'Please login to trade'); setTimeout(() => window.location.href='login.html', 1500); return; }
        const amountUSD = parseFloat(document.getElementById('trade-amount')?.value);
        if (!amountUSD || amountUSD <= 0) { showNotification('error', 'Invalid Amount', 'Please enter a valid amount'); return; }
        const totalUsd = userBalances.main + userBalances.matured;
        if (selectedOrderTab === 'buy' && amountUSD > totalUsd) {
            showNotification('error', 'Insufficient USD Balance', 'Please deposit funds');
            return;
        }
        if (selectedOrderTab === 'sell') {
            const cryptoBal = userCryptoBalances[currentSymbol?.toLowerCase()] || 0;
            const estimatedQty = amountUSD / currentPrice;
            if (estimatedQty > cryptoBal) {
                showNotification('error', 'Insufficient Crypto Balance', `You have ${formatNumber(cryptoBal, 8)} ${currentSymbol?.toUpperCase()}`);
                return;
            }
        }
        const endpoint = selectedOrderTab === 'buy' ? 'https://bithash-backend-1.onrender.com/api/buy' : 'https://bithash-backend-1.onrender.com/api/sell';
        const body = {
            asset: currentSymbol,
            amountUSD: amountUSD,
            assetAmount: amountUSD / currentPrice,
            price: currentPrice
        };
        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                showNotification('success', 'Order Executed', `${selectedOrderTab.toUpperCase()} ${amountUSD} USD worth of ${currentSymbol?.toUpperCase()}`);
                await updateUIWithBalances();
                await fetchOrderBook(currentSymbol);
                await fetchRecentTrades(currentSymbol);
            } else {
                const err = await res.json();
                showNotification('error', 'Order Failed', err.message || 'Transaction failed');
            }
        } catch(e) { showNotification('error', 'Network Error', 'Please try again'); }
    }
    
    // ========== ORDER BOOK (from backend) ==========
    async function fetchOrderBook(symbol) {
        try {
            const res = await fetch(`https://bithash-backend-1.onrender.com/api/market/orderbook/${symbol}`);
            if (res.ok) {
                const data = await res.json();
                renderOrderBook(data);
            } else {
                // fallback mock
                renderOrderBook(generateMockOrderBook(currentPrice));
            }
        } catch(e) { console.warn(e); }
    }
    
    function renderOrderBook(book) {
        const container = document.getElementById('order-book-content');
        let html = '';
        if (book.asks && book.asks.length) {
            book.asks.slice(0, 8).forEach(ask => {
                html += `<div class="order-book-row"><span class="order-book-price negative">${formatUSD(ask[0])}</span><span>${formatNumber(ask[1], 4)}</span><span>${formatUSD(ask[0] * ask[1])}</span></div>`;
            });
        }
        html += `<div class="current-price-bar">${formatUSD(currentPrice)}</div>`;
        if (book.bids && book.bids.length) {
            book.bids.slice(0, 8).forEach(bid => {
                html += `<div class="order-book-row"><span class="order-book-price positive">${formatUSD(bid[0])}</span><span>${formatNumber(bid[1], 4)}</span><span>${formatUSD(bid[0] * bid[1])}</span></div>`;
            });
        }
        container.innerHTML = html || '<div style="text-align:center;padding:20px;">No order book data</div>';
    }
    
    function generateMockOrderBook(price) {
        const asks = [], bids = [];
        for (let i=1; i<=10; i++) { asks.push([price * (1 + i*0.001), Math.random() * 2]); bids.push([price * (1 - i*0.001), Math.random() * 2]); }
        return { asks, bids };
    }
    
    async function fetchRecentTrades(symbol) {
        try {
            const res = await fetch(`https://bithash-backend-1.onrender.com/api/market/trades/${symbol}?limit=15`);
            if (res.ok) {
                const trades = await res.json();
                renderRecentTrades(trades);
            }
        } catch(e) { console.warn(e); }
    }
    
    function renderRecentTrades(trades) {
        const container = document.getElementById('recent-trades-list');
        if (!trades || !trades.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">No recent trades</div>'; return; }
        let html = '';
        trades.forEach(t => {
            const isBuy = t.side === 'buy';
            html += `<div class="order-book-row"><span class="${isBuy ? 'positive' : 'negative'}">${isBuy ? 'BUY' : 'SELL'}</span><span>${formatUSD(t.price)}</span><span>${formatNumber(t.amount, 4)}</span><span>${new Date(t.timestamp).toLocaleTimeString()}</span></div>`;
        });
        container.innerHTML = html;
    }
    
    function startRealTimeUpdates(symbol) {
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        orderBookInterval = setInterval(() => fetchOrderBook(symbol), 3000);
        tradesInterval = setInterval(() => fetchRecentTrades(symbol), 4000);
    }
    
    // ========== CONVERT FEATURE (same endpoint as dashboard) ==========
    async function loadTargetAssets() {
        const token = localStorage.getItem('jwtToken');
        if (!token) return;
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/convert/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                allTargetAssets = data.assets || [];
            } else {
                allTargetAssets = [];
            }
        } catch(e) { console.warn(e); }
    }
    
    function openConvertModal() {
        const modal = document.getElementById('convert-modal');
        modal.classList.add('active');
        convertFromAsset = null;
        convertToAsset = null;
        document.getElementById('convert-step-1').style.display = 'block';
        document.getElementById('convert-step-2').style.display = 'none';
        document.getElementById('convert-step-3').style.display = 'none';
        const fromList = document.getElementById('convert-from-list');
        const userAssets = Object.keys(userCryptoBalances).filter(sym => userCryptoBalances[sym] > 0).map(sym => ({
            symbol: sym,
            name: sym.toUpperCase(),
            logo: `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`,
            balance: userCryptoBalances[sym]
        }));
        if (userAssets.length === 0) {
            fromList.innerHTML = '<div class="asset-selector-item">No assets available to convert</div>';
            return;
        }
        fromList.innerHTML = '';
        userAssets.forEach(asset => {
            const div = document.createElement('div');
            div.className = 'asset-selector-item';
            div.innerHTML = `<img src="${asset.logo}"><div><strong>${asset.name}</strong><br><small>Balance: ${formatNumber(asset.balance, 6)}</small></div>`;
            div.onclick = () => selectFromAsset(asset);
            fromList.appendChild(div);
        });
    }
    
    function selectFromAsset(asset) {
        convertFromAsset = asset;
        document.getElementById('convert-step-1').style.display = 'none';
        document.getElementById('convert-step-2').style.display = 'block';
        const toList = document.getElementById('convert-to-list');
        const available = allTargetAssets.filter(a => a.symbol !== asset.symbol);
        toList.innerHTML = '';
        available.forEach(crypto => {
            const div = document.createElement('div');
            div.className = 'asset-selector-item';
            div.innerHTML = `<img src="${crypto.logo || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'}"><div><strong>${crypto.name}</strong><br><small>${crypto.symbol.toUpperCase()}</small></div>`;
            div.onclick = () => selectToAsset(crypto);
            toList.appendChild(div);
        });
    }
    
    function selectToAsset(asset) {
        convertToAsset = asset;
        document.getElementById('convert-step-2').style.display = 'none';
        document.getElementById('convert-step-3').style.display = 'block';
        document.getElementById('convert-amount').value = '';
        document.getElementById('convert-estimate').innerHTML = 'You will receive: 0.000000';
        document.getElementById('convert-amount').oninput = () => estimateConvert();
    }
    
    function estimateConvert() {
        const amount = parseFloat(document.getElementById('convert-amount').value);
        if (!convertFromAsset || !convertToAsset || !amount) return;
        const fromPrice = currentPrice; // approximate using current crypto price
        const toPrice = currentPrice; // in real backend would fetch both; for demo use same ratio
        const estimated = (amount * fromPrice) / (toPrice || 1);
        const afterFee = estimated * (1 - 0.005);
        document.getElementById('convert-estimate').innerHTML = `You will receive: ${formatNumber(afterFee, 8)} ${convertToAsset.symbol.toUpperCase()}`;
    }
    
    async function executeConvert() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { showNotification('error', 'Login Required', 'Please login'); return; }
        const amount = parseFloat(document.getElementById('convert-amount').value);
        if (!amount || amount <= 0) { showNotification('error', 'Invalid Amount', 'Enter positive amount'); return; }
        if (amount > convertFromAsset.balance) { showNotification('error', 'Insufficient Balance', `You have ${formatNumber(convertFromAsset.balance, 6)} ${convertFromAsset.symbol.toUpperCase()}`); return; }
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ fromAsset: convertFromAsset.symbol, toAsset: convertToAsset.symbol, amount: amount })
            });
            if (res.ok) {
                showNotification('success', 'Conversion Complete', `${amount} ${convertFromAsset.symbol.toUpperCase()} converted to ${convertToAsset.symbol.toUpperCase()}`);
                closeConvertModal();
                await updateUIWithBalances();
                await fetchOrderBook(currentSymbol);
            } else {
                const err = await res.json();
                showNotification('error', 'Conversion Failed', err.message);
            }
        } catch(e) { showNotification('error', 'Network Error', 'Try again'); }
    }
    
    function closeConvertModal() {
        document.getElementById('convert-modal').classList.remove('active');
    }
    
    function redirectDeposit() { window.location.href = 'deposit.html'; }
    
    // ========== INITIALIZATION ==========
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const symbol = urlParams.get('symbol');
        if (!symbol) { document.getElementById('asset-name').innerText = 'Invalid Request'; return; }
        currentSymbol = symbol.toLowerCase();
        await fetchAllMarketData();
        await loadCurrentCrypto(currentSymbol);
        await loadTargetAssets();
        await updateUIWithBalances();
        setOrderTab('buy');
        
        // check token and start polling
        const token = localStorage.getItem('jwtToken');
        if (token) {
            setInterval(updateUIWithBalances, 15000);
        }
    }
    
    window.executeOrder = executeOrder;
    window.setOrderTab = setOrderTab;
    window.openConvertModal = openConvertModal;
    window.closeConvertModal = closeConvertModal;
    window.executeConvert = executeConvert;
    window.redirectDeposit = redirectDeposit;
    
    init();
</script>
</body>
</html>
