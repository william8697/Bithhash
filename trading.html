<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitHash | Advanced Crypto Trading</title>
    <meta name="description" content="Professional crypto trading platform with real-time order book, charting, and instant execution.">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        /* ============================================= */
        /* COLOR SYSTEM - MATCHING INDEX.HTML */
        /* ============================================= */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --primary: #F7A600;
            --primary-dark: #E69500;
            --success: #228B22;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header Styles */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            transition: var(--transition);
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo img {
            height: 32px;
            width: auto;
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000000;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid #2A2F36;
        }
        
        .btn-outline:hover {
            background: rgba(247, 166, 0, 0.1);
            border-color: var(--accent);
        }
        
        .btn-buy {
            background: var(--positive);
            color: white;
        }
        
        .btn-buy:hover {
            background: #1a6e1a;
        }
        
        .btn-sell {
            background: var(--negative);
            color: white;
        }
        
        .btn-sell:hover {
            background: #cc0000;
        }
        
        .btn-deposit {
            background: var(--gold);
            color: #000000;
        }
        
        .btn-convert {
            background: linear-gradient(135deg, #1A73E8, #0D5BBD);
            color: white;
        }
        
        /* Trading Page Specific */
        .trading-section {
            padding: 100px 0 40px;
        }
        
        .crypto-header {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid var(--border);
        }
        
        .crypto-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .crypto-info img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
        }
        
        .crypto-name h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        
        .crypto-name .symbol {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .crypto-price {
            text-align: right;
        }
        
        .current-price {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .price-change {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .price-change.positive { color: var(--positive); }
        .price-change.negative { color: var(--negative); }
        
        /* Trading Grid */
        .trading-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        
        /* Chart Section */
        .chart-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .timeframes {
            display: flex;
            gap: 8px;
        }
        
        .timeframe-btn {
            background: var(--bg-hover);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .timeframe-btn.active {
            background: var(--accent);
            color: #000000;
        }
        
        .chart-container {
            width: 100%;
            height: 400px;
        }
        
        /* Order Book */
        .order-book-section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .order-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .order-tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .order-tab.buy.active {
            background: rgba(34, 139, 34, 0.15);
            color: var(--positive);
            border-bottom: 2px solid var(--positive);
        }
        
        .order-tab.sell.active {
            background: rgba(255, 0, 0, 0.15);
            color: var(--negative);
            border-bottom: 2px solid var(--negative);
        }
        
        .order-panel {
            padding: 20px;
        }
        
        .balance-display {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .balance-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .balance-amount {
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .price-input, .amount-input {
            margin-bottom: 16px;
        }
        
        .price-input label, .amount-input label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        
        .price-input input, .amount-input input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .price-input input:focus, .amount-input input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .estimated-total {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 10px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .action-buttons .btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
        }
        
        .insufficient-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
        }
        
        .insufficient-message .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }
        
        /* Market Info Section */
        .market-info-section {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        
        .market-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        
        .market-card .label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        
        .market-card .value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        /* Order Book List */
        .order-book-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .order-row:hover {
            background: var(--bg-hover);
        }
        
        .order-price.buy { color: var(--positive); }
        .order-price.sell { color: var(--negative); }
        
        /* Notification */
        .notification-center {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }
        
        .notification {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        .notification.warning { border-left-color: var(--warning); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loading-logo {
            width: 60px;
            height: 60px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
            .market-info-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .crypto-header {
                flex-direction: column;
                text-align: center;
            }
            .crypto-price {
                text-align: center;
            }
            .market-info-section {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
        
        /* Security Badge */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-hover);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            border-left: 3px solid var(--success);
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="security-badge">

    <header>

                <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">

                                    <button class="btn btn-deposit" id="deposit-btn"><i class="fas fa-plus-circle"></i> Deposit</button>

    <script>
        // === Configuration ===
        const BACKEND_URL = 'https://bithash-backend-1.onrender.com';
        let currentSymbol = null;
        let currentCryptoData = null;
        let currentPrices = {};
        let userBalances = { main: 0, active: 0, matured: 0 };
        let currentSide = 'buy';
        let priceChart = null;
        let chartHistoryData = [];
        let chartInterval = '15';
        let socket = null;
        let orderBookInterval = null;
        
        // === Helper Functions ===
        function formatUSD(num) {
            const n = parseFloat(num) || 0;
            if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
            return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        function formatNumber(num, decimals = 6) {
            const n = parseFloat(num) || 0;
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
            return n.toFixed(decimals);
        }
        
        function showNotification(type, title, message) {
            const container = document.getElementById('notification-center');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                <div><strong>${title}</strong><br><small>${message}</small></div>
            `;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 5000);
        }
        
        // === Get URL Parameters ===
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                symbol: params.get('symbol'),
                session: params.get('session'),
                t: params.get('t')
            };
        }
        
        // === Fetch Crypto Details from Backend ===
        async function fetchCryptoDetails(symbol) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/market/asset/${symbol}`);
                if (response.ok) {
                    const data = await response.json();
                    return data.data;
                }
                // Fallback to market assets endpoint
                const marketResponse = await fetch(`${BACKEND_URL}/api/market/assets`);
                if (marketResponse.ok) {
                    const marketData = await marketResponse.json();
                    const asset = marketData.data.find(a => a.symbol === symbol);
                    if (asset) return asset;
                }
                return null;
            } catch (error) {
                console.error('Error fetching crypto details:', error);
                return null;
            }
        }
        
        // === Fetch Current Price ===
        async function fetchCurrentPrice(symbol) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/market/price/${symbol}`);
                if (response.ok) {
                    const data = await response.json();
                    return data.price;
                }
                return null;
            } catch (error) {
                return null;
            }
        }
        
        // === Fetch Chart History ===
        async function fetchChartHistory(symbol, interval) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/market/history/${symbol}?interval=${interval}&limit=100`);
                if (response.ok) {
                    const data = await response.json();
                    return data.data || [];
                }
                return null;
            } catch (error) {
                return null;
            }
        }
        
        // === Fetch Order Book ===
        async function fetchOrderBook(symbol) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/market/orderbook/${symbol}`);
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
                return null;
            } catch (error) {
                return null;
            }
        }
        
        // === Fetch User Balances ===
        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return null;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = parseFloat(data.main) || 0;
                    userBalances.active = parseFloat(data.active) || 0;
                    userBalances.matured = parseFloat(data.matured) || 0;
                    return userBalances;
                }
                return null;
            } catch (error) {
                return null;
            }
        }
        
        // === Check if User Has Balance ===
        function hasSufficientBalance() {
            const totalAvailable = userBalances.main + userBalances.matured;
            return totalAvailable > 0;
        }
        
        // === Execute Trade ===
        async function executeTrade(side, amount, price) {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Not Logged In', 'Please login to trade');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return false;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/trading/order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        symbol: currentSymbol,
                        side: side,
                        amount: parseFloat(amount),
                        price: parseFloat(price),
                        type: 'market'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showNotification('success', 'Order Executed', `${side.toUpperCase()} order for ${formatUSD(amount)} completed`);
                    await fetchUserBalances();
                    updateBalanceDisplay();
                    return true;
                } else {
                    const error = await response.json();
                    showNotification('error', 'Order Failed', error.message || 'Transaction failed');
                    return false;
                }
            } catch (error) {
                showNotification('error', 'Network Error', 'Failed to execute order');
                return false;
            }
        }
        
        // === Redirect to Deposit ===
        function redirectToDeposit() {
            window.location.href = 'deposit.html';
        }
        
        // === Open Convert Modal (matching dashboard) ===
        function redirectToConvert() {
            // This redirects to dashboard's convert functionality
            // The dashboard has the convert feature
            window.location.href = 'dashboard.html#convert';
        }
        
        // === Update UI Based on Balance ===
        function updateTradingUI() {
            const hasBalance = hasSufficientBalance();
            const buyBtn = document.getElementById('buy-btn');
            const sellBtn = document.getElementById('sell-btn');
            const insufficientPanel = document.getElementById('insufficient-panel');
            const actionButtons = document.getElementById('action-buttons');
            
            if (!hasBalance) {
                actionButtons.style.display = 'none';
                insufficientPanel.style.display = 'block';
            } else {
                actionButtons.style.display = 'flex';
                insufficientPanel.style.display = 'none';
            }
        }
        
        function updateBalanceDisplay() {
            const totalAvailable = userBalances.main + userBalances.matured;
            document.getElementById('available-balance').textContent = formatUSD(totalAvailable);
        }
        
        // === Render Crypto Header ===
        function renderCryptoHeader(data) {
            const header = document.getElementById('crypto-header');
            const price = data.current_price || 0;
            const change = data.price_change_percentage_24h || 0;
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const changeSign = change >= 0 ? '+' : '';
            
            header.innerHTML = `
                <div class="crypto-info">
                    <img src="${data.image || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'}" alt="${data.name}">
                    <div class="crypto-name">
                        <h1>${data.name || data.symbol?.toUpperCase()}</h1>
                        <span class="symbol">${data.symbol?.toUpperCase()}</span>
                    </div>
                </div>
                <div class="crypto-price">
                    <div class="current-price">${formatUSD(price)}</div>
                    <div class="price-change ${changeClass}">
                        <i class="fas fa-arrow-${change >= 0 ? 'up' : 'down'}"></i>
                        ${changeSign}${change.toFixed(2)}% (24h)
                    </div>
                </div>
            `;
        }
        
        // === Render Market Info ===
        function renderMarketInfo(data) {
            const container = document.getElementById('market-info');
            const marketCap = data.market_cap || 0;
            const volume = data.total_volume || 0;
            const high24h = data.high_24h || 0;
            const low24h = data.low_24h || 0;
            
            container.innerHTML = `
                <div class="market-card">
                    <div class="label">Market Cap</div>
                    <div class="value">${formatUSD(marketCap)}</div>
                </div>
                <div class="market-card">
                    <div class="label">24h Volume</div>
                    <div class="value">${formatUSD(volume)}</div>
                </div>
                <div class="market-card">
                    <div class="label">24h High</div>
                    <div class="value">${formatUSD(high24h)}</div>
                </div>
                <div class="market-card">
                    <div class="label">24h Low</div>
                    <div class="value">${formatUSD(low24h)}</div>
                </div>
            `;
        }
        
        // === Render Order Book ===
        function renderOrderBook(orderBook) {
            const container = document.getElementById('order-book-entries');
            if (!orderBook) {
                container.innerHTML = '<div class="order-row">Loading order book...</div>';
                return;
            }
            
            let html = '';
            // Show asks (sell orders) first
            if (orderBook.asks && orderBook.asks.length) {
                orderBook.asks.slice(0, 8).forEach(ask => {
                    const [price, amount] = ask;
                    const total = price * amount;
                    html += `
                        <div class="order-row" onclick="document.getElementById('order-price').value = ${price.toFixed(2)}">
                            <span class="order-price sell">$${price.toFixed(2)}</span>
                            <span>${amount.toFixed(4)}</span>
                            <span>$${total.toFixed(2)}</span>
                        </div>
                    `;
                });
            }
            
            // Separator
            if (currentCryptoData) {
                html += `<div class="order-row" style="background: var(--accent); color: #000; font-weight: bold; text-align: center; margin: 4px 0;">
                    <span colspan="3">${formatUSD(currentCryptoData.current_price || 0)}</span>
                </div>`;
            }
            
            // Show bids (buy orders)
            if (orderBook.bids && orderBook.bids.length) {
                orderBook.bids.slice(0, 8).forEach(bid => {
                    const [price, amount] = bid;
                    const total = price * amount;
                    html += `
                        <div class="order-row" onclick="document.getElementById('order-price').value = ${price.toFixed(2)}">
                            <span class="order-price buy">$${price.toFixed(2)}</span>
                            <span>${amount.toFixed(4)}</span>
                            <span>$${total.toFixed(2)}</span>
                        </div>
                    `;
                });
            }
            
            container.innerHTML = html;
        }
        
        // === Initialize Chart ===
        async function initChart(symbol, interval) {
            const history = await fetchChartHistory(symbol, interval);
            if (history && history.length) {
                chartHistoryData = history;
                const prices = history.map(h => h.close || h.price);
                const labels = history.map((h, i) => i);
                
                if (priceChart) {
                    priceChart.destroy();
                }
                
                const ctx = document.getElementById('price-chart').getContext('2d');
                priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `${symbol?.toUpperCase()} Price`,
                            data: prices,
                            borderColor: '#F7A600',
                            backgroundColor: 'rgba(247, 166, 0, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => `$${ctx.raw.toFixed(2)}`
                                }
                            }
                        },
                        scales: {
                            y: {
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#B7BDC6', callback: (v) => '$' + v.toFixed(2) }
                            },
                            x: { grid: { display: false }, ticks: { display: false } }
                        }
                    }
                });
            }
        }
        
        // === Update Chart with New Interval ===
        async function updateChartInterval(interval) {
            chartInterval = interval;
            await initChart(currentSymbol, interval);
        }
        
        // === Setup Real-time Updates via Socket ===
        function setupSocket() {
            socket = io(BACKEND_URL, {
                transports: ['websocket'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                console.log('Socket connected for trading');
                if (currentSymbol) {
                    socket.emit('subscribe_ticker', currentSymbol);
                }
            });
            
            socket.on('ticker_update', (data) => {
                if (data.symbol === currentSymbol && currentCryptoData) {
                    currentCryptoData.current_price = data.price;
                    document.querySelector('.current-price').textContent = formatUSD(data.price);
                    if (priceChart && chartHistoryData.length) {
                        chartHistoryData.push({ close: data.price, timestamp: Date.now() });
                        if (chartHistoryData.length > 100) chartHistoryData.shift();
                        priceChart.data.datasets[0].data = chartHistoryData.map(d => d.close || d.price);
                        priceChart.update('none');
                    }
                }
            });
            
            socket.on('disconnect', () => {
                console.log('Socket disconnected');
            });
        }
        
        // === Start Order Book Polling ===
        function startOrderBookPolling() {
            if (orderBookInterval) clearInterval(orderBookInterval);
            orderBookInterval = setInterval(async () => {
                if (currentSymbol) {
                    const orderBook = await fetchOrderBook(currentSymbol);
                    if (orderBook) renderOrderBook(orderBook);
                }
            }, 2000);
        }
        
        // === Initialize Trading Page ===
        async function initTradingPage() {
            const params = getUrlParams();
            currentSymbol = params.symbol;
            
            if (!currentSymbol) {
                showNotification('error', 'Invalid Request', 'No cryptocurrency selected');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            // Check authentication and fetch balances
            const token = localStorage.getItem('jwtToken');
            if (token) {
                document.getElementById('auth-buttons').style.display = 'none';
                await fetchUserBalances();
                updateBalanceDisplay();
                updateTradingUI();
            } else {
                document.getElementById('auth-buttons').style.display = 'flex';
                updateTradingUI();
            }
            
            // Fetch crypto details
            currentCryptoData = await fetchCryptoDetails(currentSymbol);
            if (currentCryptoData) {
                renderCryptoHeader(currentCryptoData);
                renderMarketInfo(currentCryptoData);
                await initChart(currentSymbol, chartInterval);
            } else {
                showNotification('error', 'Data Error', 'Could not load cryptocurrency data');
            }
            
            // Fetch initial order book
            const orderBook = await fetchOrderBook(currentSymbol);
            if (orderBook) renderOrderBook(orderBook);
            
            // Start real-time updates
            startOrderBookPolling();
            setupSocket();
            
            document.getElementById('loading-overlay').classList.add('hidden');
        }
        
        // === Event Listeners ===
        function bindEvents() {
            // Tab switching
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentSide = tab.dataset.side;
                });
            });
            
            // Buy button
            document.getElementById('buy-btn').addEventListener('click', async () => {
                const amount = document.getElementById('order-amount').value;
                const price = document.getElementById('order-price').value || currentCryptoData?.current_price;
                if (!amount || amount <= 0) {
                    showNotification('error', 'Invalid Amount', 'Please enter a valid amount');
                    return;
                }
                await executeTrade('buy', amount, price);
                document.getElementById('order-amount').value = '';
            });
            
            // Sell button
            document.getElementById('sell-btn').addEventListener('click', async () => {
                const amount = document.getElementById('order-amount').value;
                const price = document.getElementById('order-price').value || currentCryptoData?.current_price;
                if (!amount || amount <= 0) {
                    showNotification('error', 'Invalid Amount', 'Please enter a valid amount');
                    return;
                }
                await executeTrade('sell', amount, price);
                document.getElementById('order-amount').value = '';
            });
            
            // Amount input - calculate total
            document.getElementById('order-amount').addEventListener('input', () => {
                const amount = document.getElementById('order-amount').value;
                const price = document.getElementById('order-price').value || currentCryptoData?.current_price;
                if (amount && price) {
                    const total = parseFloat(amount) * parseFloat(price);
                    document.getElementById('estimated-total').textContent = formatUSD(total);
                } else {
                    document.getElementById('estimated-total').textContent = '$0.00';
                }
            });
            
            // Price input - update total
            document.getElementById('order-price').addEventListener('input', () => {
                const amount = document.getElementById('order-amount').value;
                const price = document.getElementById('order-price').value;
                if (amount && price) {
                    const total = parseFloat(amount) * parseFloat(price);
                    document.getElementById('estimated-total').textContent = formatUSD(total);
                }
            });
            
            // Timeframe buttons
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const interval = btn.dataset.interval;
                    await updateChartInterval(interval);
                });
            });
            
            // Deposit button
            document.getElementById('deposit-btn')?.addEventListener('click', redirectToDeposit);
            document.getElementById('convert-btn')?.addEventListener('click', redirectToConvert);
        }
        
        // === Page Load ===
        window.addEventListener('load', () => {
            initTradingPage();
            bindEvents();
        });
        
        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            if (orderBookInterval) clearInterval(orderBookInterval);
            if (socket) socket.disconnect();
        });
    </script>
</body>
</html>
