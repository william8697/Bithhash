<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BitHash | Trading Terminal</title>
    <meta name="description" content="Professional crypto trading terminal with real-time Binance data, order book, and fast execution.">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Socket.IO & Chart.js -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- TradingView Lightweight Charts (optional but professional) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --buy: #228B22;
            --sell: #FF0000;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* header similar to index */
        header {
            background-color: var(--bg-base);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 0;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo img {
            height: 36px;
        }
        .logo span {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-primary);
        }
        .balance-badge {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }
        .deposit-btn {
            background: var(--accent);
            color: #000;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        /* Trading Grid Layout */
        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 16px;
            margin: 20px 0;
        }
        @media (max-width: 1100px) {
            .trading-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Panel Styles */
        .panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Pair Selector */
        .pair-selector {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .pair-search {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .pair-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .pair-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pair-item:hover, .pair-item.active {
            background: var(--bg-hover);
        }
        .pair-item img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Order Book */
        .order-book-rows {
            max-height: 400px;
            overflow-y: auto;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        .bid-price { color: var(--positive); }
        .ask-price { color: var(--negative); }

        /* Recent Trades */
        .trade-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }

        /* Chart Container */
        .chart-container {
            height: 400px;
            width: 100%;
            padding: 12px;
        }
        #candlestick-chart {
            width: 100%;
            height: 100%;
        }

        /* Market Stats */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px;
            background: var(--bg-surface);
            border-radius: 12px;
            margin: 12px;
        }
        .stat-card {
            flex: 1;
            background: var(--bg-card);
            padding: 8px 12px;
            border-radius: 12px;
        }

        /* Order Entry */
        .order-tabs {
            display: flex;
            gap: 10px;
            padding: 12px;
        }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            background: var(--bg-hover);
        }
        .order-tab.buy.active { background: var(--buy); color: white; }
        .order-tab.sell.active { background: var(--sell); color: white; }
        .order-form {
            padding: 12px;
        }
        .order-input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin: 8px 0;
        }
        .order-action {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            margin-top: 12px;
            cursor: pointer;
        }
        .order-action.buy { background: var(--buy); color: white; }
        .order-action.sell { background: var(--sell); color: white; }
        .order-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .insufficient-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-deposit, .btn-convert {
            flex: 1;
            background: var(--accent);
            color: #000;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .fee-note {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="container header-flex">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">
            <span>BitHash</span>
        </div>
        <div class="balance-badge" id="cryptoBalanceDisplay">
            <i class="fas fa-coins"></i> <span id="selectedAssetBalance">0.000000</span> <span id="balanceAssetSymbol">BTC</span>
        </div>
        <div>
            <button class="deposit-btn" id="headerDepositBtn">Deposit</button>
        </div>
    </div>
</header>

<main class="container">
    <!-- Pair Selection Area -->
    <div class="pair-selector">
        <input type="text" class="pair-search" id="pairSearchInput" placeholder="Search pair (e.g., BTCUSDT, ETHUSDT)...">
        <div class="pair-list" id="pairList"></div>
    </div>

    <div class="trading-grid">
        <!-- LEFT COLUMN: Order Book & Recent Trades -->
        <div>
            <div class="panel">
                <div class="panel-header">Order Book <span id="orderBookSymbol">BTC/USDT</span></div>
                <div class="order-book-rows" id="orderBookContainer">
                    <div class="order-row"><span>Loading bids...</span><span></span></div>
                </div>
            </div>
            <div class="panel" style="margin-top: 16px;">
                <div class="panel-header">Recent Trades</div>
                <div id="recentTradesContainer" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- CENTER: Chart + Market Stats + Order Entry -->
        <div>
            <div class="panel">
                <div class="panel-header">
                    <span><span id="chartSymbol">BTC</span>/USDT <span id="livePrice">—</span></span>
                    <span id="priceChange24h" style="font-size: 0.8rem;">—</span>
                </div>
                <div class="chart-container">
                    <div id="candlestick-chart"></div>
                </div>
                <div class="stats-grid" id="marketStats">
                    <div class="stat-card">24h High: <span id="high24h">—</span></div>
                    <div class="stat-card">24h Low: <span id="low24h">—</span></div>
                    <div class="stat-card">24h Vol: <span id="volume24h">—</span></div>
                    <div class="stat-card">Spread: <span id="spread">—</span></div>
                </div>
            </div>

            <!-- Order Entry Panel -->
            <div class="panel" style="margin-top: 16px;">
                <div class="order-tabs">
                    <div class="order-tab buy active" data-side="buy">Buy</div>
                    <div class="order-tab sell" data-side="sell">Sell</div>
                </div>
                <div class="order-form" id="orderFormPanel">
                    <label>Amount (USDT)</label>
                    <input type="number" id="tradeAmountUSD" class="order-input" placeholder="Enter USDT amount" step="10" min="10">
                    <label>Price (USDT)</label>
                    <input type="number" id="tradePrice" class="order-input" placeholder="Market price" step="0.01" readonly>
                    <div id="orderActionContainer">
                        <button class="order-action buy" id="executeOrderBtn">Buy</button>
                    </div>
                    <div class="fee-note"><i class="fas fa-info-circle"></i> 0.1% trading fee</div>
                </div>
                <!-- Insufficient balance fallback -->
                <div id="insufficientBalanceUI" style="display: none; padding: 12px;">
                    <p style="color: var(--text-secondary); margin-bottom: 10px;">Insufficient balance for this trade.</p>
                    <div class="insufficient-buttons">
                        <button class="btn-deposit" id="insufficientDepositBtn">Deposit</button>
                        <button class="btn-convert" id="insufficientConvertBtn">Convert</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: My Asset Balance (selected crypto) -->
        <div class="panel">
            <div class="panel-header">My <span id="assetNameHeader">BTC</span> Balance</div>
            <div style="padding: 20px; text-align: center;">
                <div style="font-size: 2rem; font-weight: 700;" id="myCryptoBalance">0.000000</div>
                <div style="color: var(--text-muted);" id="myCryptoBalanceUSD">$0.00</div>
                <div id="balanceActionButtons" style="margin-top: 20px;">
                    <button class="btn-deposit" id="balanceDepositBtn">Deposit</button>
                    <button class="btn-convert" id="balanceConvertBtn" style="margin-top: 10px;">Convert</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    // ----------------------------- GLOBALS -----------------------------
    const BACKEND_URL = 'https://bithash-backend-1.onrender.com';
    let currentPair = { base: 'btc', quote: 'usdt', symbol: 'BTCUSDT' };
    let allPairs = [];          // list of { symbol, baseAsset, quoteAsset }
    let currentPrice = 0;
    let chart = null;
    let series = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let tickerInterval = null;
    let klineInterval = null;
    let userBalances = { main: 0, active: 0, matured: 0 };
    let cryptoBalances = {};    // { btc: 0.123, eth: ... }
    let selectedCryptoBalance = 0;
    let currentOrderSide = 'buy';
    let jwtToken = localStorage.getItem('jwtToken');

    // DOM elements
    const pairListDiv = document.getElementById('pairList');
    const pairSearch = document.getElementById('pairSearchInput');
    const orderBookContainer = document.getElementById('orderBookContainer');
    const recentTradesContainer = document.getElementById('recentTradesContainer');
    const livePriceSpan = document.getElementById('livePrice');
    const priceChangeSpan = document.getElementById('priceChange24h');
    const high24hSpan = document.getElementById('high24h');
    const low24hSpan = document.getElementById('low24h');
    const volume24hSpan = document.getElementById('volume24h');
    const spreadSpan = document.getElementById('spread');
    const tradeAmountUSD = document.getElementById('tradeAmountUSD');
    const tradePrice = document.getElementById('tradePrice');
    const executeBtn = document.getElementById('executeOrderBtn');
    const myCryptoBalanceSpan = document.getElementById('myCryptoBalance');
    const myCryptoBalanceUSDSpan = document.getElementById('myCryptoBalanceUSD');
    const selectedAssetBalanceSpan = document.getElementById('selectedAssetBalance');
    const balanceAssetSymbolSpan = document.getElementById('balanceAssetSymbol');
    const assetNameHeader = document.getElementById('assetNameHeader');
    const insufficientUI = document.getElementById('insufficientBalanceUI');
    const orderActionContainer = document.getElementById('orderActionContainer');
    const orderFormPanel = document.getElementById('orderFormPanel');

    // Helper: fetch from backend
    async function apiGet(endpoint) {
        const res = await fetch(`${BACKEND_URL}${endpoint}`, {
            headers: jwtToken ? { 'Authorization': `Bearer ${jwtToken}` } : {}
        });
        return res.ok ? await res.json() : null;
    }

    // 1. Fetch all Binance pairs (filter USDT first, but allow search)
    async function fetchAllBinancePairs() {
        try {
            const proxyUrl = `${BACKEND_URL}/api/binance/exchange-info`;
            const data = await apiGet('/api/binance/exchange-info');
            if (data && data.symbols) {
                // filter active USDT pairs, also include other quote assets but we'll enforce USDT for trading
                let symbols = data.symbols.filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT');
                symbols = symbols.map(s => ({
                    symbol: s.symbol,
                    baseAsset: s.baseAsset.toLowerCase(),
                    quoteAsset: s.quoteAsset.toLowerCase()
                }));
                // also include popular non-USDT for lookup but trading only USDT pairs
                allPairs = symbols;
                renderPairList(allPairs.slice(0, 100));
            } else throw new Error('No pairs');
        } catch (err) {
            console.error('Failed to fetch pairs', err);
            // fallback static
            allPairs = [
                { symbol: 'BTCUSDT', baseAsset: 'btc', quoteAsset: 'usdt' },
                { symbol: 'ETHUSDT', baseAsset: 'eth', quoteAsset: 'usdt' },
                { symbol: 'BNBUSDT', baseAsset: 'bnb', quoteAsset: 'usdt' },
                { symbol: 'SOLUSDT', baseAsset: 'sol', quoteAsset: 'usdt' },
                { symbol: 'XRPUSDT', baseAsset: 'xrp', quoteAsset: 'usdt' }
            ];
            renderPairList(allPairs);
        }
    }

    // Render pair list with logos from CoinGecko
    function renderPairList(pairs) {
        pairListDiv.innerHTML = '';
        pairs.forEach(pair => {
            const base = pair.baseAsset;
            const div = document.createElement('div');
            div.className = `pair-item ${currentPair.symbol === pair.symbol ? 'active' : ''}`;
            div.innerHTML = `
                <img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/${base}.png" 
                     onerror="this.src='https://assets.coingecko.com/coins/images/1/large/bitcoin.png'">
                <span><strong>${base.toUpperCase()}</strong> / USDT</span>
            `;
            div.onclick = () => switchTradingPair(pair.symbol, base);
            pairListDiv.appendChild(div);
        });
    }

    // 2. Switch pair: reset intervals, fetch new data
    async function switchTradingPair(symbol, baseAsset) {
        if (!symbol) return;
        currentPair = { symbol, base: baseAsset, quote: 'usdt' };
        document.title = `${baseAsset.toUpperCase()}/USDT | BitHash Trading`;
        assetNameHeader.innerText = baseAsset.toUpperCase();
        balanceAssetSymbolSpan.innerText = baseAsset.toUpperCase();
        document.getElementById('orderBookSymbol').innerText = `${baseAsset.toUpperCase()}/USDT`;
        document.getElementById('chartSymbol').innerText = baseAsset.toUpperCase();
        
        // Clear intervals
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        if (tickerInterval) clearInterval(tickerInterval);
        if (klineInterval) clearInterval(klineInterval);
        
        // Fetch initial data
        await fetchOrderBook();
        await fetchRecentTrades();
        await fetch24hrTicker();
        await fetchKlines();
        updateSelectedCryptoBalance();
        
        // Set intervals
        orderBookInterval = setInterval(() => fetchOrderBook(), 2000);
        tradesInterval = setInterval(() => fetchRecentTrades(), 3000);
        tickerInterval = setInterval(() => fetch24hrTicker(), 3000);
        klineInterval = setInterval(() => fetchKlines(), 60000);
    }

    // Binance endpoints via backend proxy
    async function fetchOrderBook() {
        try {
            const data = await apiGet(`/api/binance/depth?symbol=${currentPair.symbol}&limit=20`);
            if (data && data.bids && data.asks) {
                let bidsHtml = '', asksHtml = '';
                const bids = data.bids.slice(0, 10);
                const asks = data.asks.slice(0, 10);
                bids.forEach(b => { bidsHtml += `<div class="order-row"><span class="bid-price">${parseFloat(b[0]).toFixed(2)}</span><span>${parseFloat(b[1]).toFixed(4)}</span></div>`; });
                asks.forEach(a => { asksHtml += `<div class="order-row"><span class="ask-price">${parseFloat(a[0]).toFixed(2)}</span><span>${parseFloat(a[1]).toFixed(4)}</span></div>`; });
                orderBookContainer.innerHTML = `<div style="color: var(--positive); font-weight: 600;">Bids</div>${bidsHtml}<div style="margin-top: 8px; color: var(--negative); font-weight: 600;">Asks</div>${asksHtml}`;
                if (bids[0] && asks[0]) {
                    const bestBid = parseFloat(bids[0][0]);
                    const bestAsk = parseFloat(asks[0][0]);
                    const spread = (bestAsk - bestBid).toFixed(2);
                    spreadSpan.innerText = `${spread} USDT (${((spread/bestBid)*100).toFixed(4)}%)`;
                }
            }
        } catch(e) { console.warn(e); }
    }

    async function fetchRecentTrades() {
        try {
            const data = await apiGet(`/api/binance/trades?symbol=${currentPair.symbol}&limit=20`);
            if (Array.isArray(data)) {
                let html = '';
                data.forEach(t => {
                    const isBuy = t.isBuyerMaker === false;
                    html += `<div class="trade-row">
                        <span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span>
                        <span>${parseFloat(t.price).toFixed(2)}</span>
                        <span>${parseFloat(t.qty).toFixed(4)}</span>
                        <span style="font-size:0.7rem;">${new Date(t.time).toLocaleTimeString()}</span>
                    </div>`;
                });
                recentTradesContainer.innerHTML = html;
            }
        } catch(e) {}
    }

    async function fetch24hrTicker() {
        try {
            const data = await apiGet(`/api/binance/ticker?symbol=${currentPair.symbol}`);
            if (data) {
                currentPrice = parseFloat(data.lastPrice);
                livePriceSpan.innerText = `$${currentPrice.toFixed(2)}`;
                tradePrice.value = currentPrice.toFixed(2);
                const change = parseFloat(data.priceChangePercent).toFixed(2);
                const changeClass = change >= 0 ? 'positive' : 'negative';
                priceChangeSpan.innerHTML = `<span style="color: var(--${change >= 0 ? 'positive' : 'negative'})">${change}%</span>`;
                high24hSpan.innerText = `$${parseFloat(data.highPrice).toFixed(2)}`;
                low24hSpan.innerText = `$${parseFloat(data.lowPrice).toFixed(2)}`;
                volume24hSpan.innerText = `${parseFloat(data.volume).toFixed(2)} ${currentPair.base.toUpperCase()}`;
                document.title = `${currentPair.base.toUpperCase()}/USDT $${currentPrice.toFixed(2)} | BitHash`;
            }
        } catch(e) {}
    }

    async function fetchKlines() {
        try {
            const data = await apiGet(`/api/binance/klines?symbol=${currentPair.symbol}&interval=1h&limit=100`);
            if (data && Array.isArray(data)) {
                const candleData = data.map(k => ({ time: k[0] / 1000, open: parseFloat(k[1]), high: parseFloat(k[2]), low: parseFloat(k[3]), close: parseFloat(k[4]) }));
                if (!chart) {
                    const chartContainer = document.getElementById('candlestick-chart');
                    chart = LightweightCharts.createChart(chartContainer, { width: chartContainer.clientWidth, height: 350, layout: { background: { color: '#151A21' }, textColor: '#B7BDC6' }, grid: { vertLines: { color: '#1E2329' }, horzLines: { color: '#1E2329' } } });
                    series = chart.addCandlestickSeries({ upColor: '#228B22', downColor: '#FF0000', borderVisible: false, wickUpColor: '#228B22', wickDownColor: '#FF0000' });
                    series.setData(candleData);
                    chart.timeScale().fitContent();
                    window.addEventListener('resize', () => { chart.applyOptions({ width: chartContainer.clientWidth }); });
                } else {
                    series.setData(candleData);
                }
            }
        } catch(e) { console.warn(e); }
    }

    // ----------------------------- USER BALANCE & MY ASSETS -----------------------------
    async function fetchUserBalances() {
        if (!jwtToken) return;
        const data = await apiGet('/api/users/balances');
        if (data) {
            userBalances.main = data.main || 0;
            userBalances.active = data.active || 0;
            userBalances.matured = data.matured || 0;
        }
    }

    async function fetchCryptoBalances() {
        if (!jwtToken) return;
        const assets = await apiGet('/api/users/assets');
        if (Array.isArray(assets)) {
            cryptoBalances = {};
            assets.forEach(a => { cryptoBalances[a.symbol.toLowerCase()] = a.balance || 0; });
            updateSelectedCryptoBalance();
        }
    }

    function updateSelectedCryptoBalance() {
        const base = currentPair.base.toLowerCase();
        const balance = cryptoBalances[base] || 0;
        selectedCryptoBalance = balance;
        myCryptoBalanceSpan.innerText = balance.toFixed(8);
        selectedAssetBalanceSpan.innerText = balance.toFixed(8);
        const usdValue = balance * currentPrice;
        myCryptoBalanceUSDSpan.innerText = `$${usdValue.toFixed(2)}`;
        // check if sufficient balance for sell side
        checkTradeEligibility();
    }

    function checkTradeEligibility() {
        if (!jwtToken) {
            showInsufficientUI(true);
            return;
        }
        const amountUSD = parseFloat(tradeAmountUSD.value) || 0;
        const requiredBaseAmount = amountUSD / currentPrice;
        if (currentOrderSide === 'buy') {
            const availableUSD = userBalances.main + userBalances.matured;
            if (availableUSD >= amountUSD && amountUSD > 0) {
                showInsufficientUI(false);
            } else {
                showInsufficientUI(true);
            }
        } else {
            // sell: need crypto balance
            if (selectedCryptoBalance >= requiredBaseAmount && amountUSD > 0) {
                showInsufficientUI(false);
            } else {
                showInsufficientUI(true);
            }
        }
    }

    function showInsufficientUI(insufficient) {
        if (insufficient) {
            orderActionContainer.style.display = 'none';
            insufficientUI.style.display = 'block';
        } else {
            orderActionContainer.style.display = 'block';
            insufficientUI.style.display = 'none';
        }
    }

    // Redirects
    function redirectDeposit() { window.location.href = 'deposit.html'; }
    function redirectConvert() { window.location.href = 'dashboard.html'; } // convert modal in dash

    // ----------------------------- EXECUTE TRADE (BUY/SELL) -----------------------------
    async function executeTrade() {
        if (!jwtToken) {
            alert('Please login to trade');
            window.location.href = 'login.html';
            return;
        }
        const amountUSD = parseFloat(tradeAmountUSD.value);
        const price = parseFloat(tradePrice.value);
        if (!amountUSD || amountUSD < 10) { alert('Minimum trade $10'); return; }
        const side = currentOrderSide;
        const baseAsset = currentPair.base;
        const quoteAsset = 'usdt';
        const baseAmount = amountUSD / price;

        // double-check balance
        if (side === 'buy') {
            const availableUSD = userBalances.main + userBalances.matured;
            if (availableUSD < amountUSD) { showInsufficientUI(true); return; }
        } else {
            if (selectedCryptoBalance < baseAmount) { showInsufficientUI(true); return; }
        }

        try {
            const response = await fetch(`${BACKEND_URL}/api/trading/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                body: JSON.stringify({
                    symbol: currentPair.symbol,
                    side: side,
                    type: 'market',
                    amount: amountUSD,
                    price: price,
                    baseAmount: baseAmount
                })
            });
            if (response.ok) {
                alert(`${side.toUpperCase()} order executed: ${baseAmount.toFixed(6)} ${baseAsset.toUpperCase()}`);
                // refresh balances
                await fetchUserBalances();
                await fetchCryptoBalances();
                tradeAmountUSD.value = '';
                checkTradeEligibility();
            } else {
                const err = await response.json();
                alert(`Order failed: ${err.message || 'Insufficient funds'}`);
            }
        } catch(e) { alert('Network error'); }
    }

    // Toggle buy/sell tab
    function setOrderSide(side) {
        currentOrderSide = side;
        const buyTab = document.querySelector('.order-tab.buy');
        const sellTab = document.querySelector('.order-tab.sell');
        if (side === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            executeBtn.className = 'order-action buy';
            executeBtn.innerText = 'Buy';
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            executeBtn.className = 'order-action sell';
            executeBtn.innerText = 'Sell';
        }
        checkTradeEligibility();
    }

    // Filter pair list by search
    function filterPairs() {
        const term = pairSearch.value.toLowerCase();
        const filtered = allPairs.filter(p => p.symbol.toLowerCase().includes(term) || p.baseAsset.includes(term));
        renderPairList(filtered.slice(0, 100));
    }

    // Fetch pair logos from CoinGecko (dynamic)
    async function fetchAssetLogos() {
        // no need to store globally, just on demand
    }

    // Initial load
    async function init() {
        await fetchAllBinancePairs();
        if (!jwtToken) {
            document.getElementById('cryptoBalanceDisplay').innerHTML = '<i class="fas fa-lock"></i> Login to trade';
            orderActionContainer.style.display = 'none';
            insufficientUI.style.display = 'block';
            document.querySelector('#insufficientDepositBtn').onclick = () => window.location.href='login.html';
            document.querySelector('#insufficientConvertBtn').onclick = () => window.location.href='login.html';
        } else {
            await fetchUserBalances();
            await fetchCryptoBalances();
        }
        // default pair BTCUSDT
        const defaultPair = allPairs.find(p => p.symbol === 'BTCUSDT') || allPairs[0];
        if (defaultPair) switchTradingPair(defaultPair.symbol, defaultPair.baseAsset);
        
        // Event listeners
        pairSearch.addEventListener('input', filterPairs);
        tradeAmountUSD.addEventListener('input', () => checkTradeEligibility());
        executeBtn.addEventListener('click', executeTrade);
        document.querySelectorAll('.order-tab').forEach(tab => {
            tab.addEventListener('click', (e) => setOrderSide(e.currentTarget.dataset.side));
        });
        document.getElementById('headerDepositBtn').onclick = redirectDeposit;
        document.getElementById('balanceDepositBtn').onclick = redirectDeposit;
        document.getElementById('balanceConvertBtn').onclick = redirectConvert;
        document.getElementById('insufficientDepositBtn').onclick = redirectDeposit;
        document.getElementById('insufficientConvertBtn').onclick = redirectConvert;
        setOrderSide('buy');
    }

    // Additional: fetch live price every 2 seconds for tab title
    setInterval(() => {
        if (currentPrice) document.title = `${currentPair.base.toUpperCase()}/USDT $${currentPrice.toFixed(2)} | BitHash`;
    }, 3000);

    init();
</script>
</body>
</html>
