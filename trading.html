<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BitHash | Advanced Trading</title>
    <meta name="description" content="Real-time crypto trading terminal with live order book, charts, and instant execution.">
    
    <!-- Socket.IO & TradingView -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon (same as dashboard) -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        /* EXACT COLOR SYSTEM & FONTS FROM DASHBOARD */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --success: #228B22;
            --warning: #FFB800;
            --error: #FF0000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* Header (identical to dashboard) */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img {
            height: 32px;
        }
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        .btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            background: rgba(247,166,0,0.1);
            border-color: var(--accent);
        }
        /* Main Trading Layout */
        .trading-container {
            margin-top: 90px;
            padding: 20px 0;
        }
        /* Pair selector with logos */
        .pair-selector-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .pair-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .pair-search {
            flex: 2;
            min-width: 240px;
            position: relative;
        }
        .pair-search input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .pair-search input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .pair-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 4px;
        }
        .pair-dropdown.show {
            display: block;
        }
        .pair-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border);
        }
        .pair-option:hover {
            background: var(--bg-hover);
        }
        .pair-option img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }
        .pair-option span {
            font-weight: 500;
        }
        .selected-pair-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-hover);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(247,166,0,0.3);
        }
        .selected-pair-badge img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .selected-pair-badge .price {
            font-weight: 700;
            font-size: 1.2rem;
            margin-left: 8px;
        }
        .grid-3col {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 20px;
        }
        /* Order Book Panel */
        .orderbook-panel, .trades-panel, .ticker-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 16px;
        }
        .panel-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .orderbook-asks, .orderbook-bids {
            font-size: 0.85rem;
        }
        .orderbook-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-family: monospace;
        }
        .orderbook-price.positive { color: var(--positive); }
        .orderbook-price.negative { color: var(--negative); }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }
        /* Trading Chart */
        .chart-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 8px;
            height: 480px;
        }
        #tradingview-widget {
            width: 100%;
            height: 100%;
        }
        /* Order Entry */
        .order-entry {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
        }
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-hover);
        }
        .order-tab.buy.active { background: var(--positive); color: white; }
        .order-tab.sell.active { background: var(--negative); color: white; }
        .order-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 8px 0;
        }
        .order-action {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            border: none;
            cursor: pointer;
        }
        .order-action.buy { background: var(--positive); color: white; }
        .order-action.sell { background: var(--negative); color: white; }
        .order-action:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Market Stats Row */
        .stats-row {
            display: flex;
            gap: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .stat-item {
            flex: 1;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .stat-value {
            font-weight: 700;
            font-size: 1rem;
        }
        /* Footer Ticker */
        .ticker-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 99;
            font-size: 0.8rem;
        }
        .ticker-content {
            display: inline-block;
            animation: tickerScroll 40s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            margin-right: 40px;
        }
        .ticker-positive { color: var(--positive); }
        .ticker-negative { color: var(--negative); }
        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        /* Deposit/Convert buttons when insufficient */
        .insufficient-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .insufficient-actions .btn { flex: 1; }
        @media (max-width: 1000px) {
            .grid-3col { grid-template-columns: 1fr; gap: 16px; }
            .chart-panel { height: 380px; }
        }
    </style>
</head>
<body>
<header>
    <div class="container header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">
            <span class="logo-text"><span>₿</span>itHash</span>
        </div>
        <div class="auth-buttons" id="auth-buttons"></div>
    </div>
</header>

<div class="container trading-container">
    <!-- Pair Selection with Logos -->
    <div class="pair-selector-section">
        <div class="pair-selector">
            <div class="pair-search">
                <input type="text" id="pairSearchInput" placeholder="Search pair (e.g., BTCUSDT, ETHUSDT)" autocomplete="off">
                <div class="pair-dropdown" id="pairDropdown"></div>
            </div>
            <div class="selected-pair-badge" id="selectedPairBadge">
                <img id="selectedBaseLogo" src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="logo">
                <strong id="selectedPairSymbol">BTC/USDT</strong>
                <span class="price" id="selectedPairPrice">$0.00</span>
                <span id="selectedPairChange" style="font-size:0.8rem;"></span>
            </div>
        </div>
    </div>

    <!-- Market Stats -->
    <div class="stats-row" id="marketStats">
        <div class="stat-item"><div class="stat-label">24h High</div><div class="stat-value" id="statHigh">-</div></div>
        <div class="stat-item"><div class="stat-label">24h Low</div><div class="stat-value" id="statLow">-</div></div>
        <div class="stat-item"><div class="stat-label">24h Volume</div><div class="stat-value" id="statVolume">-</div></div>
        <div class="stat-item"><div class="stat-label">24h Change</div><div class="stat-value" id="statChange">-</div></div>
        <div class="stat-item"><div class="stat-label">Spread</div><div class="stat-value" id="statSpread">-</div></div>
    </div>

    <!-- Main Trading Grid -->
    <div class="grid-3col">
        <!-- Order Book (Depth) -->
        <div class="orderbook-panel">
            <div class="panel-header"><i class="fas fa-book"></i> Order Book</div>
            <div style="margin-bottom: 12px; text-align:center; font-size:0.7rem; color:var(--text-secondary);">Sell Orders (Asks)</div>
            <div id="orderbookAsks" class="orderbook-asks"></div>
            <div style="margin: 12px 0; text-align:center; border-top:1px solid var(--border); padding-top:8px;" id="currentMidPrice"></div>
            <div style="margin-top: 12px; text-align:center; font-size:0.7rem; color:var(--text-secondary);">Buy Orders (Bids)</div>
            <div id="orderbookBids" class="orderbook-bids"></div>
        </div>

        <!-- TradingView Chart -->
        <div class="chart-panel">
            <div id="tradingview-widget"></div>
        </div>

        <!-- Recent Trades & Order Entry -->
        <div>
            <div class="trades-panel" style="margin-bottom: 20px;">
                <div class="panel-header"><i class="fas fa-history"></i> Recent Trades</div>
                <div id="recentTradesList" style="max-height: 220px; overflow-y: auto;"></div>
            </div>
            <div class="order-entry">
                <div class="order-tabs">
                    <div class="order-tab buy active" data-side="buy">Buy</div>
                    <div class="order-tab sell" data-side="sell">Sell</div>
                </div>
                <div id="orderForm">
                    <div class="balance-row"><span>Available USDT:</span> <span id="availableUSDT">$0.00</span></div>
                    <div class="balance-row"><span>Available Crypto:</span> <span id="availableCrypto">0.0000</span></div>
                    <input type="number" id="orderAmountUSD" class="order-input" placeholder="Amount (USDT)" step="1" min="1">
                    <div class="balance-row"><span>≈ Crypto amount:</span> <span id="cryptoEstimate">0.0000</span></div>
                    <button id="executeOrderBtn" class="order-action buy">Buy</button>
                    <div id="insufficientActions" style="display:none;" class="insufficient-actions">
                        <button class="btn btn-primary" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button>
                        <button class="btn btn-outline" id="convertFallbackBtn"><i class="fas fa-exchange-alt"></i> Convert</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="ticker-footer" id="tickerFooter">
    <div class="ticker-content" id="tickerContent">Loading market ticker...</div>
</div>

<script>
    // ---------- GLOBALS ----------
    let currentPair = { base: 'BTC', quote: 'USDT', symbol: 'BTCUSDT' };
    let allBinancePairs = [];      // { symbol, baseAsset, quoteAsset }
    let cachedPairLogos = {};      // baseAsset -> coingecko logo url
    let currentTicker = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let tickerInterval = null;
    let userAssets = {};            // { BTC: balance, USDT: balance (from /api/users/balances)
    let userCryptoBalances = {};    // only crypto assets
    let currentOrderSide = 'buy';
    let tvWidget = null;
    
    // Backend & Binance endpoints
    const BACKEND_BALANCES = 'https://bithash-backend-1.onrender.com/api/users/balances';
    const BINANCE_EXCHANGE_INFO = 'https://api.binance.com/api/v3/exchangeInfo';
    const BINANCE_TICKER = (s) => `https://api.binance.com/api/v3/ticker/24hr?symbol=${s}`;
    const BINANCE_ORDER_BOOK = (s) => `https://api.binance.com/api/v3/depth?symbol=${s}&limit=15`;
    const BINANCE_TRADES = (s) => `https://api.binance.com/api/v3/trades?symbol=${s}&limit=20`;
    
    // Coingecko logo cache
    const COINGECKO_LIST = 'https://api.coingecko.com/api/v3/coins/list';
    let coinGeckoIds = {};
    
    // Helper functions
    function formatNumber(num, decimals=2) {
        if (isNaN(num)) return '0.00';
        return Number(num).toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
    }
    function formatCrypto(amt) { return amt.toFixed(6); }
    
    // Fetch all Binance USDT pairs (and other quote assets but we filter later)
    async function loadBinancePairs() {
        try {
            const res = await fetch(BINANCE_EXCHANGE_INFO);
            const data = await res.json();
            const symbols = data.symbols.filter(s => s.status === 'TRADING');
            allBinancePairs = symbols.map(s => ({ symbol: s.symbol, base: s.baseAsset, quote: s.quoteAsset }));
            // Prefilter for dropdown: show all pairs, but trading only USDT pairs for simplicity, but user can select any, execution only when quote=USDT
            console.log(`Loaded ${allBinancePairs.length} trading pairs`);
            renderPairDropdown();
        } catch(e) { console.error('Binance pairs load error', e); }
    }
    
    // Load logos from Coingecko (efficient caching)
    async function loadCoinGeckoIds() {
        try {
            const res = await fetch(COINGECKO_LIST);
            const list = await res.json();
            list.forEach(coin => { coinGeckoIds[coin.symbol.toLowerCase()] = coin.id; });
        } catch(e) { console.warn('Coingecko list failed', e); }
    }
    
    async function getAssetLogo(baseAsset) {
        if (cachedPairLogos[baseAsset]) return cachedPairLogos[baseAsset];
        const symbolLower = baseAsset.toLowerCase();
        const coinId = coinGeckoIds[symbolLower];
        if (coinId) {
            const logoUrl = `https://assets.coingecko.com/coins/images/1/large/${coinId}.png`; // fallback pattern
            // Actually better: use static coingecko image api
            const imgUrl = `https://www.coingecko.com/coins/${coinId}/thumb.png`;
            cachedPairLogos[baseAsset] = imgUrl;
            return imgUrl;
        }
        // fallback generic
        return 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
    }
    
    async function updatePairLogosUI() {
        const baseLogo = await getAssetLogo(currentPair.base);
        document.getElementById('selectedBaseLogo').src = baseLogo;
        document.getElementById('selectedPairSymbol').innerHTML = `${currentPair.base}/${currentPair.quote}`;
    }
    
    // Render dropdown with all USDT pairs + search
    function renderPairDropdown(filter='') {
        const dropdown = document.getElementById('pairDropdown');
        let filtered = allBinancePairs;
        if (filter) {
            filtered = allBinancePairs.filter(p => p.symbol.toLowerCase().includes(filter.toLowerCase()) || p.base.toLowerCase().includes(filter));
        }
        // Prioritize USDT pairs for cleaner UI
        filtered = filtered.filter(p => p.quote === 'USDT').slice(0, 60);
        if (filtered.length === 0) {
            dropdown.innerHTML = '<div class="pair-option">No pairs found</div>';
            return;
        }
        dropdown.innerHTML = '';
        for (const pair of filtered) {
            const option = document.createElement('div');
            option.className = 'pair-option';
            (async () => {
                const logo = await getAssetLogo(pair.base);
                option.innerHTML = `<img src="${logo}" onerror="this.src='https://assets.coingecko.com/coins/images/1/large/bitcoin.png'"><span>${pair.base}/${pair.quote}</span><span style="margin-left:auto; font-size:0.7rem;">${pair.symbol}</span>`;
            })();
            option.onclick = () => {
                currentPair = { base: pair.base, quote: pair.quote, symbol: pair.symbol };
                updatePairLogosUI();
                document.getElementById('pairSearchInput').value = `${pair.base}/${pair.quote}`;
                dropdown.classList.remove('show');
                // Reload all trading data
                loadTradingDataForPair();
                initTradingViewChart();
                document.title = `${currentPair.base}/${currentPair.quote} | ${currentTicker?.lastPrice || '...'} | BitHash Trade`;
            };
            dropdown.appendChild(option);
        }
    }
    
    // Fetch real-time 24hr ticker & update stats
    async function fetchTicker() {
        if (!currentPair.symbol) return;
        try {
            const res = await fetch(BINANCE_TICKER(currentPair.symbol));
            const data = await res.json();
            currentTicker = data;
            const lastPrice = parseFloat(data.lastPrice);
            const change = parseFloat(data.priceChangePercent);
            document.getElementById('selectedPairPrice').innerHTML = `$${formatNumber(lastPrice)}`;
            document.getElementById('selectedPairChange').innerHTML = `${change >=0 ? '+' : ''}${change.toFixed(2)}%`;
            document.getElementById('statHigh').innerText = `$${formatNumber(data.highPrice)}`;
            document.getElementById('statLow').innerText = `$${formatNumber(data.lowPrice)}`;
            document.getElementById('statVolume').innerText = `${formatNumber(data.volume,0)} ${currentPair.base}`;
            const changeElem = document.getElementById('statChange');
            changeElem.innerHTML = `${change >=0 ? '▲' : '▼'} ${change.toFixed(2)}%`;
            changeElem.style.color = change >=0 ? 'var(--positive)' : 'var(--negative)';
            document.title = `${currentPair.base}/${currentPair.quote} $${formatNumber(lastPrice)} | BitHash Trade`;
            // spread will be updated from orderBook
        } catch(e) { console.warn('ticker error'); }
    }
    
    async function fetchOrderBook() {
        try {
            const res = await fetch(BINANCE_ORDER_BOOK(currentPair.symbol));
            const data = await res.json();
            const asks = data.asks.slice(0, 12).map(a => ({price: parseFloat(a[0]), qty: parseFloat(a[1])}));
            const bids = data.bids.slice(0, 12).map(b => ({price: parseFloat(b[0]), qty: parseFloat(b[1])}));
            renderOrderBook(asks, bids);
            if (asks.length && bids.length) {
                const spread = asks[0].price - bids[0].price;
                document.getElementById('statSpread').innerText = `$${spread.toFixed(2)} (${((spread/bids[0].price)*100).toFixed(4)}%)`;
            }
        } catch(e) {}
    }
    
    function renderOrderBook(asks, bids) {
        const asksDiv = document.getElementById('orderbookAsks');
        const bidsDiv = document.getElementById('orderbookBids');
        asksDiv.innerHTML = asks.reverse().map(a => `<div class="orderbook-row"><span class="orderbook-price negative">${formatNumber(a.price)}</span><span>${formatCrypto(a.qty)}</span><span>$${(a.price*a.qty).toFixed(2)}</span></div>`).join('');
        bidsDiv.innerHTML = bids.map(b => `<div class="orderbook-row"><span class="orderbook-price positive">${formatNumber(b.price)}</span><span>${formatCrypto(b.qty)}</span><span>$${(b.price*b.qty).toFixed(2)}</span></div>`).join('');
        if (bids.length && asks.length) {
            document.getElementById('currentMidPrice').innerHTML = `<span style="color:var(--accent);">${formatNumber(bids[0].price)} / ${formatNumber(asks[0].price)}</span>`;
        }
    }
    
    async function fetchRecentTrades() {
        try {
            const res = await fetch(BINANCE_TRADES(currentPair.symbol));
            const trades = await res.json();
            const container = document.getElementById('recentTradesList');
            container.innerHTML = trades.slice(0, 20).map(t => {
                const isBuy = t.isBuyerMaker ? false : true;
                return `<div class="trade-item"><span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span><span>${formatNumber(parseFloat(t.price))}</span><span>${formatCrypto(parseFloat(t.qty))}</span><span>${new Date(t.time).toLocaleTimeString()}</span></div>`;
            }).join('');
        } catch(e) {}
    }
    
    // Load user crypto balances from backend (same endpoint as dashboard)
    async function loadUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { document.getElementById('auth-buttons').innerHTML = `<button class="btn btn-outline" onclick="location.href='login.html'">Login</button><button class="btn btn-primary" onclick="location.href='signup.html'">Sign Up</button>`; return; }
        document.getElementById('auth-buttons').innerHTML = `<span style="color:var(--text-secondary); margin-right:12px;"><i class="fas fa-user"></i> Dashboard</span><button class="btn btn-outline" onclick="location.href='dashboard.html'">Portfolio</button>`;
        try {
            const res = await fetch(BACKEND_BALANCES, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const data = await res.json();
                // data format: { main, active, matured, pnl ... }   // USD values only? No, balances are in USD.
                // For crypto balances we need /api/users/assets from dashboard logic.
                // We'll also fetch /api/users/assets for crypto holdings
                const assetsRes = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', { headers: { 'Authorization': `Bearer ${token}` } });
                if (assetsRes.ok) {
                    const assetsData = await assetsRes.json();
                    userCryptoBalances = {};
                    assetsData.forEach(a => { userCryptoBalances[a.symbol.toUpperCase()] = a.balance; });
                }
                // USDT balance: we derive from main balance? Actually main is USD fiat, but trading uses USDT as quote.
                // The requirement: "Balances must always be shown in crypto (not fiat). Only display the balance of the selected crypto."
                // For USDT balance we check user's USDT asset from /api/users/assets, otherwise fallback to 0.
                const usdtBal = userCryptoBalances['USDT'] || 0;
                const cryptoBal = userCryptoBalances[currentPair.base] || 0;
                document.getElementById('availableUSDT').innerHTML = `$${formatNumber(usdtBal)} USDT`;
                document.getElementById('availableCrypto').innerHTML = `${formatCrypto(cryptoBal)} ${currentPair.base}`;
                // Update order form buttons based on sufficiency
                updateOrderButtonState();
            }
        } catch(e) { console.error('balance fetch', e); }
    }
    
    function updateOrderButtonState() {
        const token = localStorage.getItem('jwtToken');
        const insuffDiv = document.getElementById('insufficientActions');
        const executeBtn = document.getElementById('executeOrderBtn');
        const amount = parseFloat(document.getElementById('orderAmountUSD').value) || 0;
        const usdtBalance = parseFloat(document.getElementById('availableUSDT').innerText.replace(/[^0-9.-]/g, '')) || 0;
        const cryptoBalance = parseFloat(document.getElementById('availableCrypto').innerText.split(' ')[0]) || 0;
        const price = currentTicker ? parseFloat(currentTicker.lastPrice) : 0;
        let sufficient = false;
        if (currentOrderSide === 'buy') {
            sufficient = (amount > 0 && usdtBalance >= amount);
        } else {
            const cryptoNeeded = amount / price;
            sufficient = (amount > 0 && cryptoBalance >= cryptoNeeded);
        }
        if (!token) { executeBtn.disabled = true; insuffDiv.style.display = 'none'; return; }
        if (!sufficient && amount > 0) {
            executeBtn.style.display = 'none';
            insuffDiv.style.display = 'flex';
            executeBtn.disabled = true;
        } else {
            executeBtn.style.display = 'block';
            insuffDiv.style.display = 'none';
            executeBtn.disabled = false;
        }
    }
    
    async function executeTrade() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { alert('Please login to trade'); location.href='login.html'; return; }
        const amountUSD = parseFloat(document.getElementById('orderAmountUSD').value);
        if (!amountUSD || amountUSD <= 0) { alert('Enter valid amount'); return; }
        const usdtBalance = parseFloat(document.getElementById('availableUSDT').innerText.replace(/[^0-9.-]/g, '')) || 0;
        const cryptoBalance = parseFloat(document.getElementById('availableCrypto').innerText.split(' ')[0]) || 0;
        const price = currentTicker ? parseFloat(currentTicker.lastPrice) : 0;
        if (currentOrderSide === 'buy' && amountUSD > usdtBalance) { alert('Insufficient USDT balance'); return; }
        if (currentOrderSide === 'sell') {
            const cryptoAmount = amountUSD / price;
            if (cryptoAmount > cryptoBalance) { alert(`Insufficient ${currentPair.base} balance`); return; }
        }
        // Place order via backend (simulate market order)
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ symbol: currentPair.symbol, side: currentOrderSide, type: 'market', amount: amountUSD, price: price })
            });
            if (response.ok) {
                alert(`Order executed: ${currentOrderSide.toUpperCase()} ${amountUSD} USDT of ${currentPair.base}`);
                document.getElementById('orderAmountUSD').value = '';
                loadUserBalances();  // refresh balances
                updateOrderButtonState();
            } else { alert('Order failed'); }
        } catch(e) { alert('Network error'); }
    }
    
    // Real-time polling
    function startRealtimeUpdates() {
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        if (tickerInterval) clearInterval(tickerInterval);
        orderBookInterval = setInterval(() => fetchOrderBook(), 2000);
        tradesInterval = setInterval(() => fetchRecentTrades(), 3000);
        tickerInterval = setInterval(() => { fetchTicker(); loadUserBalances(); }, 5000);
        fetchOrderBook(); fetchRecentTrades(); fetchTicker(); loadUserBalances();
    }
    
    // TradingView chart (clean instance)
    function initTradingViewChart() {
        const container = document.getElementById('tradingview-widget');
        if (tvWidget) tvWidget.remove();
        container.innerHTML = '';
        if (typeof TradingView !== 'undefined') {
            tvWidget = new TradingView.widget({
                autosize: true,
                symbol: `BINANCE:${currentPair.symbol}`,
                interval: '15',
                timezone: 'Etc/UTC',
                theme: 'dark',
                style: '1',
                locale: 'en',
                enable_publishing: false,
                allow_symbol_change: false,
                container_id: 'tradingview-widget',
                studies: ['Volume@tv-basicstudies']
            });
        } else {
            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center;">Loading Chart...</div>';
        }
    }
    
    // Load all data for selected pair
    async function loadTradingDataForPair() {
        updatePairLogosUI();
        startRealtimeUpdates();
        initTradingViewChart();
    }
    
    // Footer ticker (fetch top 10 USDT pairs and animate)
    async function loadTickerFooter() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const all = await res.json();
            const usdtPairs = all.filter(t => t.symbol.endsWith('USDT')).slice(0, 20);
            const html = usdtPairs.map(p => {
                const change = parseFloat(p.priceChangePercent);
                const cls = change >=0 ? 'ticker-positive' : 'ticker-negative';
                return `<span class="ticker-item"><strong>${p.symbol.replace('USDT','')}</strong> ${parseFloat(p.lastPrice).toFixed(2)} <span class="${cls}">${change.toFixed(2)}%</span></span>`;
            }).join('');
            const container = document.getElementById('tickerContent');
            container.innerHTML = html + html;
        } catch(e) {}
    }
    
    // Convert fallback: call same convert logic as dashboard
    document.getElementById('convertFallbackBtn')?.addEventListener('click', () => {
        window.location.href = 'dashboard.html?openConvert=true';
    });
    
    // Event listeners
    document.getElementById('pairSearchInput').addEventListener('input', (e) => {
        const dropdown = document.getElementById('pairDropdown');
        renderPairDropdown(e.target.value);
        dropdown.classList.add('show');
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.pair-search')) document.getElementById('pairDropdown').classList.remove('show');
    });
    document.querySelectorAll('.order-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            const side = e.target.getAttribute('data-side');
            currentOrderSide = side;
            document.querySelector('.order-tab.buy').classList.remove('active');
            document.querySelector('.order-tab.sell').classList.remove('active');
            tab.classList.add('active');
            const btn = document.getElementById('executeOrderBtn');
            btn.className = `order-action ${side}`;
            btn.innerText = side === 'buy' ? 'Buy' : 'Sell';
            updateOrderButtonState();
        });
    });
    document.getElementById('orderAmountUSD').addEventListener('input', () => {
        const amount = parseFloat(document.getElementById('orderAmountUSD').value) || 0;
        const price = currentTicker ? parseFloat(currentTicker.lastPrice) : 0;
        const cryptoEst = amount / price;
        document.getElementById('cryptoEstimate').innerText = formatCrypto(cryptoEst) + ` ${currentPair.base}`;
        updateOrderButtonState();
    });
    document.getElementById('executeOrderBtn').addEventListener('click', executeTrade);
    
    // Initialization
    (async function init() {
        await loadCoinGeckoIds();
        await loadBinancePairs();
        // get pair from URL complex parameter (like index.html passes symbol)
        const urlParams = new URLSearchParams(window.location.search);
        const symbolParam = urlParams.get('symbol');
        if (symbolParam) {
            const upperSym = symbolParam.toUpperCase();
            const matched = allBinancePairs.find(p => p.base === upperSym && p.quote === 'USDT');
            if (matched) {
                currentPair = { base: matched.base, quote: 'USDT', symbol: matched.symbol };
            }
        }
        await updatePairLogosUI();
        document.getElementById('selectedPairSymbol').innerHTML = `${currentPair.base}/${currentPair.quote}`;
        document.getElementById('pairSearchInput').value = `${currentPair.base}/${currentPair.quote}`;
        startRealtimeUpdates();
        initTradingViewChart();
        loadUserBalances();
        loadTickerFooter();
        setInterval(loadTickerFooter, 30000);
    })();
</script>
