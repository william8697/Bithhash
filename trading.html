<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Dynamic Title - Updates with Live Price -->
    <title id="dynamic-title">Loading... | BitHash Trading</title>
    
    <!-- Enhanced SEO Meta Tags -->
    <meta name="description" content="Professional cryptocurrency trading platform. Real-time order books, charts, and market data for 40+ assets.">
    <meta name="keywords" content="crypto trading, bitcoin trading, ethereum trading, order book, live charts, Binance-style trading">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="BitHash Trading Platform">
    <meta property="og:description" content="Trade cryptocurrencies with professional-grade tools and real-time market data">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.bithashcapital.live/trading">
    <meta property="og:image" content="https://media.bithashcapital.live/circular_dark_background%20(1).png">
    
    <!-- Favicon - Same as index.html -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        /* ============================================= */
        /* EXACT COLOR THEME FROM INDEX.HTML - PRESERVED */
        /* ============================================= */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --blue-dark: #002244;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --box-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Order Book Colors */
            --bid-color: rgba(40, 167, 69, 0.15);
            --ask-color: rgba(255, 0, 0, 0.15);
            --bid-color-hover: rgba(40, 167, 69, 0.25);
            --ask-color-hover: rgba(255, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: var(--light);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ============================================= */
        /* TRADING PAGE SPECIFIC LAYOUT */
        /* ============================================= */
        
        .trading-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--light);
            padding-top: 60px; /* Header height */
            height: 100vh;
            overflow: hidden;
        }

        /* Header - Minimal, No Auth Buttons */
        .trading-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo img {
            height: 32px;
            width: auto;
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .back-to-main {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .back-to-main:hover {
            background: var(--gray-light);
            color: var(--dark);
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-login {
            padding: 6px 16px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-login:hover {
            background: var(--primary);
            color: var(--darker);
        }

        .btn-signup {
            padding: 6px 16px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gradient);
            color: var(--darker);
            border: none;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 216, 255, 0.3);
        }

        /* ============================================= */
        /* SECTION 1 - TRADING PAIR HEADER (60px) */
        /* ============================================= */
        .pair-header {
            height: 60px;
            background-color: var(--darker);
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
            flex-shrink: 0;
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .favorite-icon {
            color: var(--gray);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .favorite-icon.active {
            color: var(--gold);
        }

        .pair-icons {
            display: flex;
            align-items: center;
        }

        .pair-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .pair-name {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .pair-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-left: 5px;
        }

        .live-price-container {
            display: flex;
            flex-direction: column;
        }

        .live-price {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            line-height: 1.2;
        }

        .live-price.usd {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .price-change {
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .price-change.positive {
            color: var(--success);
        }

        .price-change.negative {
            color: var(--error);
        }

        .market-stats {
            display: flex;
            gap: 25px;
            margin-left: auto;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
        }

        .token-info {
            display: flex;
            gap: 8px;
        }

        .token-tag {
            padding: 4px 8px;
            background: var(--gray-light);
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--gray);
        }

        /* ============================================= */
        /* MAIN TRADING AREA - 3 COLUMN LAYOUT */
        /* ============================================= */
        .main-trading-area {
            display: flex;
            flex: 1;
            min-height: 0; /* Critical for flex scrolling */
            overflow: hidden;
            border-bottom: 1px solid var(--gray-light);
        }

        /* Left Panel - Order Book (320px) */
        .order-book-panel {
            width: 320px;
            background-color: var(--darker);
            border-right: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .panel-title {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-icon {
            color: var(--gray);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .precision-selector {
            padding: 4px 8px;
            background: var(--gray-light);
            border: 1px solid var(--gray-lighter);
            border-radius: 4px;
            color: var(--dark);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 0.7rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-light);
            flex-shrink: 0;
        }

        .order-book-header span {
            text-align: right;
        }

        .order-book-header span:first-child {
            text-align: left;
        }

        .order-book-asks {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            display: flex;
            flex-direction: column-reverse; /* Asks from top to bottom */
        }

        .order-book-bids {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .order-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 2px 16px;
            font-size: 0.8rem;
            font-family: 'Manrope', monospace;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }

        .order-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .order-row.ask {
            color: var(--error);
        }

        .order-row.bid {
            color: var(--success);
        }

        .order-row span {
            text-align: right;
            z-index: 1;
        }

        .order-row span:first-child {
            text-align: left;
        }

        .depth-bar {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            background: currentColor;
            opacity: 0.1;
            pointer-events: none;
            transition: width 0.2s;
        }

        .order-row.ask .depth-bar {
            background: var(--error);
        }

        .order-row.bid .depth-bar {
            background: var(--success);
        }

        .current-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--gray-light);
            border-top: 1px solid var(--gray-lighter);
            border-bottom: 1px solid var(--gray-lighter);
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Manrope', sans-serif;
            flex-shrink: 0;
        }

        .current-price {
            color: var(--primary);
        }

        .price-direction {
            font-size: 0.8rem;
        }

        .price-direction.up {
            color: var(--success);
        }

        .price-direction.down {
            color: var(--error);
        }

        /* Center Panel - Chart */
        .chart-panel {
            flex: 1;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-tabs {
            display: flex;
            padding: 8px 16px;
            border-bottom: 1px solid var(--gray-light);
            gap: 20px;
            flex-shrink: 0;
        }

        .chart-tab {
            color: var(--gray);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .chart-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid var(--gray-light);
            flex-shrink: 0;
        }

        .timeframes {
            display: flex;
            gap: 8px;
        }

        .timeframe-btn {
            padding: 4px 8px;
            background: transparent;
            border: none;
            color: var(--gray);
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .timeframe-btn:hover {
            background: var(--gray-light);
            color: var(--dark);
        }

        .timeframe-btn.active {
            background: var(--primary);
            color: var(--darker);
        }

        .chart-tools {
            display: flex;
            gap: 10px;
            color: var(--gray);
        }

        .chart-tools i {
            cursor: pointer;
            font-size: 0.9rem;
        }

        .chart-tools i:hover {
            color: var(--primary);
        }

        #tradingview-chart {
            flex: 1;
            min-height: 0;
        }

        /* Right Panel - Market Pairs (300px) */
        .market-pairs-panel {
            width: 300px;
            background-color: var(--darker);
            border-left: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pair-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-light);
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--gray-light);
            border: 1px solid var(--gray-lighter);
            border-radius: var(--border-radius);
            color: var(--dark);
            font-size: 0.9rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .pair-tabs {
            display: flex;
            padding: 8px 16px;
            border-bottom: 1px solid var(--gray-light);
            gap: 10px;
        }

        .pair-tab {
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--gray);
            border-radius: 4px;
        }

        .pair-tab:hover {
            background: var(--gray-light);
        }

        .pair-tab.active {
            background: var(--primary);
            color: var(--darker);
        }

        .pairs-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 0.7rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-light);
        }

        .pairs-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .pair-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            align-items: center;
        }

        .pair-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .pair-row.active {
            background: rgba(0, 216, 255, 0.1);
            border-left: 3px solid var(--primary);
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pair-icon-small {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .pair-symbol {
            font-weight: 500;
        }

        .pair-price {
            text-align: right;
            font-family: 'Manrope', monospace;
        }

        .pair-change {
            text-align: right;
            font-size: 0.8rem;
        }

        .pair-change.positive {
            color: var(--success);
        }

        .pair-change.negative {
            color: var(--error);
        }

        .leverage-badge {
            background: var(--gray-light);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.6rem;
            margin-left: 5px;
        }

        /* ============================================= */
        /* TRADE INTERACTION AREA */
        /* ============================================= */
        .trade-interaction-area {
            display: flex;
            height: 300px;
            border-bottom: 1px solid var(--gray-light);
        }

        /* Order Book Extension (Left) */
        .order-book-extension {
            width: 320px;
            background-color: var(--darker);
            border-right: 1px solid var(--gray-light);
            overflow-y: auto;
        }

        .extension-content {
            padding: 12px 16px;
        }

        .extension-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--gray);
            font-size: 0.8rem;
        }

        /* Buy/Sell Panel (Center) */
        .buy-sell-panel {
            flex: 1;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .order-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .order-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gray-light);
        }

        .order-tab.buy.active {
            background: var(--success);
            color: white;
        }

        .order-tab.sell.active {
            background: var(--error);
            color: white;
        }

        .order-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.8rem;
        }

        .form-input {
            padding: 10px 12px;
            background: var(--light);
            border: 1px solid var(--gray-light);
            border-radius: 6px;
            color: var(--dark);
            font-size: 0.9rem;
            font-family: 'Manrope', monospace;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .balance-info {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .percentage-slider {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }

        .percent-btn {
            flex: 1;
            padding: 6px;
            background: var(--gray-light);
            border: 1px solid var(--gray-lighter);
            border-radius: 4px;
            color: var(--gray);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .percent-btn:hover {
            background: var(--primary);
            color: var(--darker);
        }

        .total-display {
            padding: 10px;
            background: var(--gray-light);
            border-radius: 6px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .action-btn {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .action-btn.buy {
            background: var(--success);
            color: white;
        }

        .action-btn.buy:hover:not(:disabled) {
            background: #2ecc71;
            transform: translateY(-2px);
        }

        .action-btn.sell {
            background: var(--error);
            color: white;
        }

        .action-btn.sell:hover:not(:disabled) {
            background: #e74c3c;
            transform: translateY(-2px);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-prompt {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: var(--gray);
        }

        /* Market Trades Panel (Right) */
        .market-trades-panel {
            width: 300px;
            background-color: var(--darker);
            border-left: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .trades-tabs {
            display: flex;
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-light);
            gap: 15px;
        }

        .trades-tab {
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--gray);
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }

        .trades-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .trades-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 0.7rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-light);
        }

        .trades-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 16px;
            font-size: 0.8rem;
            font-family: 'Manrope', monospace;
            animation: flash 0.2s;
        }

        @keyframes flash {
            0% { background: transparent; }
            50% { background: rgba(40, 167, 69, 0.1); }
            100% { background: transparent; }
        }

        .trade-row.sell {
            color: var(--error);
        }

        .trade-row.buy {
            color: var(--success);
        }

        .trade-row span {
            text-align: right;
        }

        .trade-row span:first-child {
            text-align: left;
        }

        /* ============================================= */
        /* ORDERS / HISTORY PANEL (BOTTOM) */
        /* ============================================= */
        .orders-history-panel {
            height: 200px;
            background-color: var(--darker);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .orders-tabs {
            display: flex;
            padding: 8px 16px;
            border-bottom: 1px solid var(--gray-light);
            gap: 20px;
            flex-shrink: 0;
        }

        .orders-tab {
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--gray);
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }

        .orders-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .orders-table-container {
            flex: 1;
            overflow: auto;
            padding: 0 16px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .orders-table th {
            text-align: left;
            padding: 12px 8px;
            color: var(--gray);
            font-weight: 500;
            border-bottom: 1px solid var(--gray-light);
            position: sticky;
            top: 0;
            background: var(--darker);
        }

        .orders-table td {
            padding: 8px;
            border-bottom: 1px solid var(--gray-light);
            color: var(--dark);
        }

        .orders-table .buy {
            color: var(--success);
        }

        .orders-table .sell {
            color: var(--error);
        }

        .cancel-btn {
            padding: 4px 8px;
            background: var(--gray-light);
            border: 1px solid var(--gray-lighter);
            border-radius: 4px;
            color: var(--gray);
            font-size: 0.7rem;
            cursor: pointer;
        }

        .cancel-btn:hover {
            background: var(--error);
            color: white;
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--gray-light) 25%, var(--gray-lighter) 50%, var(--gray-light) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
            margin: 5px 0;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Notifications */
        .notification-center {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .notification {
            padding: 12px 16px;
            background: var(--darker);
            border-left: 4px solid var(--primary);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-lg);
            color: var(--dark);
            font-size: 0.9rem;
            pointer-events: auto;
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .order-book-panel,
            .order-book-extension {
                width: 280px;
            }
            
            .market-pairs-panel,
            .market-trades-panel {
                width: 250px;
            }
        }

        @media (max-width: 992px) {
            .pair-header {
                flex-wrap: wrap;
                height: auto;
                padding: 10px;
            }
            
            .market-stats {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .main-trading-area {
                flex-direction: column;
            }
            
            .order-book-panel,
            .chart-panel,
            .market-pairs-panel {
                width: 100%;
                height: 300px;
            }
            
            .trade-interaction-area {
                flex-direction: column;
                height: auto;
            }
            
            .order-book-extension,
            .buy-sell-panel,
            .market-trades-panel {
                width: 100%;
                height: 250px;
            }
        }

        @media (max-width: 768px) {
            .pair-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .market-stats {
                margin-left: 0;
            }
            
            .pair-info {
                width: 100%;
                justify-content: space-between;
            }
            
            .live-price-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Notification Center -->

    <script>
        // =============================================
        // GLOBAL STATE & CONFIGURATION
        // =============================================
        
        // Get symbol from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let currentSymbol = (urlParams.get('symbol') || 'BTCUSDT').toUpperCase();
        
        // Ensure proper format (e.g., BTCUSDT, ETHUSDT)
        if (!currentSymbol.endsWith('USDT')) {
            currentSymbol = currentSymbol.replace('USD', '') + 'USDT';
        }
        
        const baseAsset = currentSymbol.replace('USDT', '');
        const quoteAsset = 'USDT';
        
        // API Endpoints
        const BACKEND_URL = 'https://bithash-backend.onrender.com';
        const BINANCE_API = 'https://api.binance.com/api/v3';
        const BINANCE_WS = 'wss://stream.binance.com:9443/ws';
        
        // State
        let isAuthenticated = false;
        let userBalances = { main: 0, matured: 0 };
        let currentPrice = 0;
        let priceChange24h = 0;
        let orderBook = { bids: [], asks: [] };
        let trades = [];
        let allPairs = [];
        let favoritePairs = JSON.parse(localStorage.getItem('favoritePairs') || '[]');
        let precision = 0.01;
        let currentOrderTab = 'buy';
        let wsConnection = null;
        
        // Asset icons mapping
        const assetIcons = {
            'BTC': 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
            'ETH': 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
            'BNB': 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
            'SOL': 'https://assets.coingecko.com/coins/images/4128/large/solana.png',
            'XRP': 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png',
            'ADA': 'https://assets.coingecko.com/coins/images/975/large/cardano.png',
            'DOGE': 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png',
            'DOT': 'https://assets.coingecko.com/coins/images/12171/large/polkadot.png',
            'LINK': 'https://assets.coingecko.com/coins/images/877/large/chainlink-new-logo.png',
            'MATIC': 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png',
            'AVAX': 'https://assets.coingecko.com/coins/images/12559/large/Avalanche_Circle_RedWhite.png',
            'UNI': 'https://assets.coingecko.com/coins/images/12504/large/uni.jpg',
            'ATOM': 'https://assets.coingecko.com/coins/images/1481/large/cosmos_hub.png',
            'LTC': 'https://assets.coingecko.com/coins/images/2/large/litecoin.png',
            'BCH': 'https://assets.coingecko.com/coins/images/780/large/bitcoin-cash-circle.png',
            'ALGO': 'https://assets.coingecko.com/coins/images/4380/large/download.png',
            'NEAR': 'https://assets.coingecko.com/coins/images/10365/large/near_icon.png',
            'FIL': 'https://assets.coingecko.com/coins/images/12817/large/filecoin.png',
            'VET': 'https://assets.coingecko.com/coins/images/1167/large/VET_Token_Icon.png',
            'FTM': 'https://assets.coingecko.com/coins/images/4001/large/Fantom_round.png',
            'SAND': 'https://assets.coingecko.com/coins/images/12129/large/sandbox_logo.jpg',
            'MANA': 'https://assets.coingecko.com/coins/images/878/large/decentraland-mana.png',
            'AXS': 'https://assets.coingecko.com/coins/images/13029/large/axie_infinity_logo.png',
            'AAVE': 'https://assets.coingecko.com/coins/images/12645/large/AAVE.png',
            'MKR': 'https://assets.coingecko.com/coins/images/1364/large/Mark_Maker.png',
            'SNX': 'https://assets.coingecko.com/coins/images/3406/large/SNX.png',
            'CRV': 'https://assets.coingecko.com/coins/images/12124/large/Curve.png',
            'COMP': 'https://assets.coingecko.com/coins/images/10775/large/COMP.png',
            'YFI': 'https://assets.coingecko.com/coins/images/11849/large/yfi-192x192.png',
            'SUSHI': 'https://assets.coingecko.com/coins/images/12271/large/512x512_Logo_no_chop.png',
            '1INCH': 'https://assets.coingecko.com/coins/images/13469/large/1inch-token.png',
            'ENJ': 'https://assets.coingecko.com/coins/images/1102/large/enjin-coin-logo.png',
            'ZIL': 'https://assets.coingecko.com/coins/images/2687/large/Zilliqa-logo.png',
            'KSM': 'https://assets.coingecko.com/coins/images/12176/large/polkadot_cross.png',
            'RUNE': 'https://assets.coingecko.com/coins/images/13675/large/THORChain_Rune.png',
            'LUNA': 'https://assets.coingecko.com/coins/images/12140/large/Terra.png',
            'UST': 'https://assets.coingecko.com/coins/images/15462/large/terrausd.png',
            'ANC': 'https://assets.coingecko.com/coins/images/15025/large/anchor.png',
            'MIR': 'https://assets.coingecko.com/coins/images/15295/large/mirror_logo_transparent.png',
            'STMX': 'https://assets.coingecko.com/coins/images/13624/large/stmx.png',
            'KAVA': 'https://assets.coingecko.com/coins/images/9761/large/kava.png'
        };

        // =============================================
        // INITIALIZATION
        // =============================================
        
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthStatus();
            await loadAllPairs();
            await loadPairData(currentSymbol);
            initializeWebSocket(currentSymbol.toLowerCase());
            setupEventListeners();
            updateAuthUI();
            
            // Update page title with symbol
            document.getElementById('dynamic-title').textContent = `${baseAsset}/${quoteAsset} - Loading... | BitHash Trading`;
        });

        // =============================================
        // AUTHENTICATION FUNCTIONS
        // =============================================
        
        async function checkAuthStatus() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                isAuthenticated = false;
                return;
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    isAuthenticated = true;
                    await fetchUserBalances();
                } else {
                    localStorage.removeItem('jwtToken');
                    isAuthenticated = false;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                isAuthenticated = false;
            }
        }

        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userBalances = {
                        main: data.data?.balances?.main || 0,
                        matured: data.data?.balances?.matured || 0
                    };
                    updateBuySellPanel();
                }
            } catch (error) {
                console.error('Failed to fetch balances:', error);
            }
        }

        function updateAuthUI() {
            const authStatus = document.getElementById('auth-status');
            
            if (isAuthenticated) {
                authStatus.innerHTML = `
                    <span style="color: var(--success);"><i class="fas fa-check-circle"></i> Connected</span>
                `;
            } else {
                authStatus.innerHTML = `
                    <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
                    <button class="btn-signup" onclick="window.location.href='signup.html'">Sign Up</button>
                `;
            }
        }

        // =============================================
        // PAIR DATA LOADING
        // =============================================
        
        async function loadAllPairs() {
            try {
                // Fetch top 40 USDT pairs from Binance
                const response = await fetch(`${BINANCE_API}/ticker/24hr`);
                const data = await response.json();
                
                // Filter for USDT pairs and sort by volume
                allPairs = data
                    .filter(item => item.symbol.endsWith('USDT'))
                    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                    .slice(0, 40)
                    .map(item => ({
                        symbol: item.symbol,
                        base: item.symbol.replace('USDT', ''),
                        quote: 'USDT',
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        volume: parseFloat(item.quoteVolume)
                    }));
                
                renderPairsList();
            } catch (error) {
                console.error('Failed to load pairs:', error);
                // Fallback to static list
                allPairs = generateStaticPairs();
                renderPairsList();
            }
        }

        function generateStaticPairs() {
            const bases = ['BTC', 'ETH', 'BNB', 'SOL', 'XRP', 'ADA', 'DOGE', 'DOT', 'LINK', 'MATIC', 'AVAX', 'UNI', 'ATOM', 'LTC', 'BCH', 'ALGO', 'NEAR', 'FIL', 'VET', 'FTM', 'SAND', 'MANA', 'AXS', 'AAVE', 'MKR', 'SNX', 'CRV', 'COMP', 'YFI', 'SUSHI', '1INCH', 'ENJ', 'ZIL', 'KSM', 'RUNE', 'LUNA', 'UST', 'ANC', 'MIR', 'STMX'];
            
            return bases.map((base, index) => ({
                symbol: `${base}USDT`,
                base: base,
                quote: 'USDT',
                price: base === 'BTC' ? 43000 + (Math.random() * 1000) : 
                       base === 'ETH' ? 2300 + (Math.random() * 50) :
                       Math.random() * 100 + 10,
                change: (Math.random() * 10) - 5,
                volume: Math.random() * 1e9
            }));
        }

        function renderPairsList() {
            const container = document.getElementById('pairs-list');
            container.innerHTML = '';
            
            allPairs.forEach(pair => {
                const row = document.createElement('div');
                row.className = `pair-row ${pair.symbol === currentSymbol ? 'active' : ''}`;
                row.onclick = () => switchPair(pair.symbol);
                
                const icon = assetIcons[pair.base] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
                const changeClass = pair.change >= 0 ? 'positive' : 'negative';
                const changeSign = pair.change >= 0 ? '+' : '';
                
                row.innerHTML = `
                    <div class="pair-info">
                        <img src="${icon}" class="pair-icon-small" onerror="this.src='https://assets.coingecko.com/coins/images/1/large/bitcoin.png'">
                        <span class="pair-symbol">${pair.base}/${pair.quote}</span>
                        ${pair.base === 'BTC' || pair.base === 'ETH' ? '<span class="leverage-badge">5x</span>' : ''}
                    </div>
                    <span class="pair-price">$${formatNumber(pair.price, true)}</span>
                    <span class="pair-change ${changeClass}">${changeSign}${pair.change.toFixed(2)}%</span>
                `;
                
                container.appendChild(row);
            });
        }

        async function switchPair(newSymbol) {
            if (newSymbol === currentSymbol) return;
            
            // Close old WebSocket
            if (wsConnection) {
                wsConnection.close();
            }
            
            // Update URL without reloading
            const url = new URL(window.location);
            url.searchParams.set('symbol', newSymbol);
            window.history.pushState({}, '', url);
            
            currentSymbol = newSymbol;
            
            // Reload data
            await loadPairData(currentSymbol);
            initializeWebSocket(currentSymbol.toLowerCase());
            
            // Update active state in pairs list
            document.querySelectorAll('.pair-row').forEach(row => {
                row.classList.remove('active');
                if (row.querySelector('.pair-symbol')?.textContent.replace('/', '') === newSymbol) {
                    row.classList.add('active');
                }
            });
        }

        async function loadPairData(symbol) {
            try {
                // Show loading states
                showLoading();
                
                // Fetch 24hr ticker
                const tickerResponse = await fetch(`${BINANCE_API}/ticker/24hr?symbol=${symbol}`);
                const tickerData = await tickerResponse.json();
                
                currentPrice = parseFloat(tickerData.lastPrice);
                priceChange24h = parseFloat(tickerData.priceChangePercent);
                
                // Fetch order book
                await fetchOrderBook(symbol);
                
                // Fetch recent trades
                await fetchRecentTrades(symbol);
                
                // Update UI
                updatePairHeader(tickerData);
                initializeTradingViewChart(symbol);
                
                // Update page title with live price
                updatePageTitle();
                
            } catch (error) {
                console.error('Failed to load pair data:', error);
                showNotification('error', 'Data Error', 'Failed to load market data');
            }
        }

        function updatePairHeader(tickerData) {
            // Update pair info
            document.getElementById('base-icon').src = assetIcons[baseAsset] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            document.getElementById('pair-name').textContent = `${baseAsset}/${quoteAsset}`;
            document.getElementById('pair-label').textContent = getAssetName(baseAsset);
            
            // Update favorite icon
            const favIcon = document.getElementById('favorite-icon');
            if (favoritePairs.includes(currentSymbol)) {
                favIcon.className = 'fas fa-star favorite-icon active';
            } else {
                favIcon.className = 'far fa-star favorite-icon';
            }
            
            // Update price
            const price = parseFloat(tickerData.lastPrice) || currentPrice;
            const change = parseFloat(tickerData.priceChangePercent) || priceChange24h;
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const changeSign = change >= 0 ? '+' : '';
            
            document.getElementById('live-price').textContent = formatUSD(price);
            document.getElementById('live-price-usd').textContent = formatUSD(price);
            document.getElementById('price-change').innerHTML = `${changeSign}${change.toFixed(2)}%`;
            document.getElementById('price-change').className = `price-change ${changeClass}`;
            
            // Update market stats
            const statsHtml = `
                <div class="stat-item">
                    <span class="stat-label">24h Change</span>
                    <span class="stat-value ${changeClass}">${changeSign}${change.toFixed(2)}%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">24h High</span>
                    <span class="stat-value">$${formatNumber(tickerData.highPrice)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">24h Low</span>
                    <span class="stat-value">$${formatNumber(tickerData.lowPrice)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">24h Vol(${baseAsset})</span>
                    <span class="stat-value">${formatNumber(tickerData.volume)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">24h Vol(USDT)</span>
                    <span class="stat-value">$${formatNumber(tickerData.quoteVolume, true)}</span>
                </div>
            `;
            
            document.getElementById('market-stats').innerHTML = statsHtml;
            
            // Update token info
            document.getElementById('token-info').innerHTML = `
                <span class="token-tag">${baseAsset}</span>
                <span class="token-tag">POW</span>
                <span class="token-tag">Payments</span>
            `;
        }

        function getAssetName(symbol) {
            const names = {
                'BTC': 'Bitcoin',
                'ETH': 'Ethereum',
                'BNB': 'BNB',
                'SOL': 'Solana',
                'XRP': 'XRP',
                'ADA': 'Cardano',
                'DOGE': 'Dogecoin',
                'DOT': 'Polkadot',
                'LINK': 'Chainlink',
                'MATIC': 'Polygon',
                'AVAX': 'Avalanche'
            };
            return names[symbol] || symbol;
        }

        function updatePageTitle() {
            const direction = priceChange24h >= 0 ? '↑' : '↓';
            document.getElementById('dynamic-title').textContent = 
                `${baseAsset}/${quoteAsset} - ${formatUSD(currentPrice)} ${direction} ${Math.abs(priceChange24h).toFixed(2)}% | BitHash Trading`;
        }

        // =============================================
        // ORDER BOOK FUNCTIONS
        // =============================================
        
        async function fetchOrderBook(symbol) {
            try {
                const response = await fetch(`${BINANCE_API}/depth?symbol=${symbol}&limit=100`);
                const data = await response.json();
                
                // Process bids and asks
                orderBook.bids = data.bids.map(([price, amount]) => ({
                    price: parseFloat(price),
                    amount: parseFloat(amount),
                    total: parseFloat(price) * parseFloat(amount)
                }));
                
                orderBook.asks = data.asks.map(([price, amount]) => ({
                    price: parseFloat(price),
                    amount: parseFloat(amount),
                    total: parseFloat(price) * parseFloat(amount)
                }));
                
                renderOrderBook();
            } catch (error) {
                console.error('Failed to fetch order book:', error);
            }
        }

        function renderOrderBook() {
            const asksContainer = document.getElementById('order-book-asks');
            const bidsContainer = document.getElementById('order-book-bids');
            
            // Calculate max total for depth bars
            const allTotals = [...orderBook.asks, ...orderBook.bids].map(item => item.total);
            const maxTotal = Math.max(...allTotals, 1);
            
            // Render asks (sell orders) - highest price first
            asksContainer.innerHTML = '';
            orderBook.asks.slice(0, 15).forEach(ask => {
                const depthWidth = (ask.total / maxTotal) * 100;
                const row = createOrderRow(ask, 'ask', depthWidth);
                asksContainer.appendChild(row);
            });
            
            // Update current price row
            const currentPriceRow = document.getElementById('current-price-value');
            const priceDirection = document.getElementById('price-direction');
            
            currentPriceRow.textContent = formatUSD(currentPrice);
            
            if (orderBook.asks.length > 0 && orderBook.bids.length > 0) {
                const bestAsk = orderBook.asks[0]?.price || 0;
                const bestBid = orderBook.bids[0]?.price || 0;
                
                if (currentPrice > (bestAsk + bestBid) / 2) {
                    priceDirection.innerHTML = '<i class="fas fa-arrow-up"></i>';
                    priceDirection.className = 'price-direction up';
                } else {
                    priceDirection.innerHTML = '<i class="fas fa-arrow-down"></i>';
                    priceDirection.className = 'price-direction down';
                }
            }
            
            // Render bids (buy orders) - highest price first
            bidsContainer.innerHTML = '';
            orderBook.bids.slice(0, 15).forEach(bid => {
                const depthWidth = (bid.total / maxTotal) * 100;
                const row = createOrderRow(bid, 'bid', depthWidth);
                bidsContainer.appendChild(row);
            });
        }

        function createOrderRow(order, type, depthWidth) {
            const row = document.createElement('div');
            row.className = `order-row ${type}`;
            row.onclick = () => setOrderPrice(order.price);
            
            const priceFormatted = formatUSD(order.price, false);
            const amountFormatted = formatNumber(order.amount, false);
            const totalFormatted = formatUSD(order.total, true);
            
            row.innerHTML = `
                <span>$${priceFormatted}</span>
                <span>${amountFormatted}</span>
                <span>$${totalFormatted}</span>
                <div class="depth-bar" style="width: ${depthWidth}%;"></div>
            `;
            
            return row;
        }

        // =============================================
        // RECENT TRADES FUNCTIONS
        // =============================================
        
        async function fetchRecentTrades(symbol) {
            try {
                const response = await fetch(`${BINANCE_API}/trades?symbol=${symbol}&limit=50`);
                const data = await response.json();
                
                trades = data.map(trade => ({
                    price: parseFloat(trade.price),
                    amount: parseFloat(trade.qty),
                    time: new Date(trade.time),
                    isBuyerMaker: trade.isBuyerMaker
                }));
                
                renderRecentTrades();
            } catch (error) {
                console.error('Failed to fetch trades:', error);
            }
        }

        function renderRecentTrades() {
            const container = document.getElementById('market-trades-list');
            container.innerHTML = '';
            
            trades.slice(0, 30).forEach(trade => {
                const row = document.createElement('div');
                const type = trade.isBuyerMaker ? 'sell' : 'buy';
                row.className = `trade-row ${type}`;
                
                const time = trade.time.toLocaleTimeString();
                const priceFormatted = formatUSD(trade.price, false);
                const amountFormatted = formatNumber(trade.amount, false);
                
                row.innerHTML = `
                    <span>$${priceFormatted}</span>
                    <span>${amountFormatted}</span>
                    <span>${time}</span>
                `;
                
                container.appendChild(row);
            });
        }

        // =============================================
        // WEBSOCKET CONNECTION (Real-time updates)
        // =============================================
        
        function initializeWebSocket(symbol) {
            const streamName = `${symbol}@depth20@100ms/${symbol}@trade`;
            const ws = new WebSocket(`${BINANCE_WS}/${streamName}`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.e === 'depthUpdate') {
                    // Update order book
                    updateOrderBookFromWS(data);
                } else if (data.e === 'trade') {
                    // Add new trade
                    addNewTrade(data);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            wsConnection = ws;
        }

        function updateOrderBookFromWS(data) {
            // Simplified: just refetch full order book every few seconds
            // In production, implement proper order book incremental update
            setTimeout(() => fetchOrderBook(currentSymbol), 100);
        }

        function addNewTrade(tradeData) {
            const newTrade = {
                price: parseFloat(tradeData.p),
                amount: parseFloat(tradeData.q),
                time: new Date(tradeData.T),
                isBuyerMaker: tradeData.m
            };
            
            trades.unshift(newTrade);
            if (trades.length > 50) trades.pop();
            
            // Update current price
            currentPrice = newTrade.price;
            
            // Update UI
            renderRecentTrades();
            updateCurrentPrice();
            
            // Flash effect on price
            flashPrice();
        }

        function updateCurrentPrice() {
            document.getElementById('live-price').textContent = formatUSD(currentPrice);
            document.getElementById('live-price-usd').textContent = formatUSD(currentPrice);
            document.getElementById('current-price-value').textContent = formatUSD(currentPrice);
            
            // Update page title
            updatePageTitle();
        }

        function flashPrice() {
            const priceElement = document.getElementById('live-price');
            priceElement.style.transition = 'background-color 0.2s';
            priceElement.style.backgroundColor = priceChange24h >= 0 ? 'rgba(40, 167, 69, 0.2)' : 'rgba(255, 0, 0, 0.2)';
            
            setTimeout(() => {
                priceElement.style.backgroundColor = 'transparent';
            }, 200);
        }

        // =============================================
        // BUY/SELL PANEL FUNCTIONS
        // =============================================
        
        function updateBuySellPanel() {
            const container = document.getElementById('buy-sell-panel');
            
            if (!isAuthenticated) {
                container.innerHTML = `
                    <div class="login-prompt">
                        <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>Please login to trade</p>
                        <button class="btn-login" onclick="window.location.href='login.html'" style="margin-top: 10px;">Login</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="order-tabs">
                    <div class="order-tab buy active" onclick="switchOrderTab('buy')">Buy</div>
                    <div class="order-tab sell" onclick="switchOrderTab('sell')">Sell</div>
                </div>
                <div class="order-form">
                    <div class="form-group">
                        <div class="form-label">
                            <span>Price (USDT)</span>
                            <span class="balance-info">≈ $${formatUSD(currentPrice)}</span>
                        </div>
                        <input type="number" class="form-input" id="order-price" value="${currentPrice.toFixed(2)}" step="0.01">
                    </div>
                    <div class="form-group">
                        <div class="form-label">
                            <span>Amount (USDT)</span>
                            <span class="balance-info">Available: $${formatUSD(userBalances.main)}</span>
                        </div>
                        <input type="number" class="form-input" id="order-amount" placeholder="0.00" step="10" min="10">
                    </div>
                    <div class="percentage-slider">
                        <button class="percent-btn" onclick="setPercentage(25)">25%</button>
                        <button class="percent-btn" onclick="setPercentage(50)">50%</button>
                        <button class="percent-btn" onclick="setPercentage(75)">75%</button>
                        <button class="percent-btn" onclick="setPercentage(100)">100%</button>
                    </div>
                    <div class="total-display">
                        <span>Total</span>
                        <span id="order-total">$0.00</span>
                    </div>
                    <button class="action-btn buy" id="order-action-btn" onclick="executeOrder()">Buy ${baseAsset}</button>
                </div>
            `;
            
            // Add event listeners
            document.getElementById('order-amount').addEventListener('input', updateOrderTotal);
            document.getElementById('order-price').addEventListener('input', updateOrderTotal);
        }

        function switchOrderTab(tab) {
            currentOrderTab = tab;
            const buyTab = document.querySelector('.order-tab.buy');
            const sellTab = document.querySelector('.order-tab.sell');
            const actionBtn = document.getElementById('order-action-btn');
            
            if (tab === 'buy') {
                buyTab.classList.add('active');
                sellTab.classList.remove('active');
                actionBtn.className = 'action-btn buy';
                actionBtn.textContent = `Buy ${baseAsset}`;
            } else {
                sellTab.classList.add('active');
                buyTab.classList.remove('active');
                actionBtn.className = 'action-btn sell';
                actionBtn.textContent = `Sell ${baseAsset}`;
            }
        }

        function setPercentage(percent) {
            const balance = userBalances.main;
            const amount = (balance * percent / 100).toFixed(2);
            document.getElementById('order-amount').value = amount;
            updateOrderTotal();
        }

        function updateOrderTotal() {
            const amount = parseFloat(document.getElementById('order-amount')?.value) || 0;
            const price = parseFloat(document.getElementById('order-price')?.value) || currentPrice;
            const total = amount * price;
            document.getElementById('order-total').textContent = formatUSD(total);
        }

        function setOrderPrice(price) {
            if (document.getElementById('order-price')) {
                document.getElementById('order-price').value = price.toFixed(2);
                updateOrderTotal();
            }
        }

        async function executeOrder() {
            if (!isAuthenticated) {
                showNotification('error', 'Authentication Required', 'Please login to trade');
                return;
            }
            
            const amount = parseFloat(document.getElementById('order-amount')?.value);
            const price = parseFloat(document.getElementById('order-price')?.value) || currentPrice;
            
            if (!amount || amount < 10) {
                showNotification('error', 'Invalid Amount', 'Minimum order amount is $10');
                return;
            }
            
            if (amount > userBalances.main && currentOrderTab === 'buy') {
                showNotification('error', 'Insufficient Balance', `You have $${formatUSD(userBalances.main)} available`);
                return;
            }
            
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch(`${BACKEND_URL}/api/trading/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        symbol: currentSymbol,
                        side: currentOrderTab,
                        type: 'limit',
                        price: price,
                        amount: amount / price, // Convert USDT amount to asset amount
                        total: amount
                    })
                });
                
                if (response.ok) {
                    showNotification('success', 'Order Placed', `Your ${currentOrderTab} order has been placed`);
                    
                    // Refresh balances
                    await fetchUserBalances();
                    
                    // Clear amount input
                    document.getElementById('order-amount').value = '';
                    updateOrderTotal();
                    
                    // Refresh orders
                    await fetchOpenOrders();
                } else {
                    const error = await response.json();
                    showNotification('error', 'Order Failed', error.message || 'Failed to place order');
                }
            } catch (error) {
                console.error('Order execution failed:', error);
                showNotification('error', 'Order Failed', 'Network error. Please try again.');
            }
        }

        // =============================================
        // ORDERS FUNCTIONS
        // =============================================
        
        async function fetchOpenOrders() {
            if (!isAuthenticated) {
                document.getElementById('orders-table-container').innerHTML = `
                    <div style="text-align: center; padding: 20px; color: var(--gray);">
                        <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>Login to view your orders</p>
                    </div>
                `;
                return;
            }
            
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch(`${BACKEND_URL}/api/trading/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    renderOrders(data.data || []);
                }
            } catch (error) {
                console.error('Failed to fetch orders:', error);
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-table-container');
            
            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: var(--gray);">
                        <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>No open orders</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Pair</th>
                            <th>Type</th>
                            <th>Side</th>
                            <th>Price</th>
                            <th>Amount</th>
                            <th>Filled</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            orders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleString();
                const sideClass = order.side === 'buy' ? 'buy' : 'sell';
                
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${order.symbol}</td>
                        <td>${order.type}</td>
                        <td class="${sideClass}">${order.side.toUpperCase()}</td>
                        <td>$${formatNumber(order.price)}</td>
                        <td>${formatNumber(order.amount)}</td>
                        <td>${order.filled || 0}</td>
                        <td>${order.status}</td>
                        <td><button class="cancel-btn" onclick="cancelOrder('${order.id}')">Cancel</button></td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function cancelOrder(orderId) {
            try {
                const token = localStorage.getItem('jwtToken');
                const response = await fetch(`${BACKEND_URL}/api/trading/orders/${orderId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    showNotification('success', 'Order Cancelled', 'Your order has been cancelled');
                    await fetchOpenOrders();
                }
            } catch (error) {
                console.error('Failed to cancel order:', error);
            }
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        
        function formatNumber(num, isUSD = false) {
            if (num === undefined || num === null) return '0.00';
            
            const numericNum = parseFloat(num);
            
            if (isUSD) {
                if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
                if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
                if (numericNum >= 1e3) return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return numericNum.toFixed(2);
            } else {
                if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
                if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
                if (numericNum >= 1e3) return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                if (numericNum < 0.0001) return numericNum.toFixed(8);
                if (numericNum < 0.01) return numericNum.toFixed(6);
                return numericNum.toFixed(2);
            }
        }

        function formatUSD(num, abbreviate = true) {
            const numericNum = parseFloat(num) || 0;
            
            if (abbreviate) {
                if (numericNum >= 1e9) return (numericNum / 1e9).toFixed(2) + 'B';
                if (numericNum >= 1e6) return (numericNum / 1e6).toFixed(2) + 'M';
            }
            
            return numericNum.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function showLoading() {
            // Show loading skeletons in order book
            const asksContainer = document.getElementById('order-book-asks');
            const bidsContainer = document.getElementById('order-book-bids');
            
            asksContainer.innerHTML = Array(10).fill(0).map(() => 
                '<div class="loading-skeleton" style="margin: 5px 0;"></div>'
            ).join('');
            
            bidsContainer.innerHTML = Array(10).fill(0).map(() => 
                '<div class="loading-skeleton" style="margin: 5px 0;"></div>'
            ).join('');
        }

        function showNotification(type, title, message) {
            const container = document.getElementById('notification-center');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <strong>${title}</strong>
                <p style="margin-top: 5px; font-size: 0.8rem;">${message}</p>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        
        function setupEventListeners() {
            // Favorite icon
            document.getElementById('favorite-icon').addEventListener('click', toggleFavorite);
            
            // Precision selector
            document.getElementById('precision-selector').addEventListener('change', (e) => {
                precision = parseFloat(e.target.value);
                renderOrderBook();
            });
            
            // Pair search
            document.getElementById('pair-search').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filtered = allPairs.filter(pair => 
                    pair.base.toLowerCase().includes(searchTerm) || 
                    pair.symbol.toLowerCase().includes(searchTerm)
                );
                renderFilteredPairs(filtered);
            });
            
            // Refresh data every 5 seconds
            setInterval(() => {
                if (!wsConnection) {
                    fetchOrderBook(currentSymbol);
                    fetchRecentTrades(currentSymbol);
                }
                if (isAuthenticated) {
                    fetchOpenOrders();
                }
            }, 5000);
        }

        function toggleFavorite() {
            const icon = document.getElementById('favorite-icon');
            
            if (favoritePairs.includes(currentSymbol)) {
                favoritePairs = favoritePairs.filter(s => s !== currentSymbol);
                icon.className = 'far fa-star favorite-icon';
            } else {
                favoritePairs.push(currentSymbol);
                icon.className = 'fas fa-star favorite-icon active';
            }
            
            localStorage.setItem('favoritePairs', JSON.stringify(favoritePairs));
        }

        function renderFilteredPairs(filtered) {
            const container = document.getElementById('pairs-list');
            container.innerHTML = '';
            
            filtered.forEach(pair => {
                const row = document.createElement('div');
                row.className = `pair-row ${pair.symbol === currentSymbol ? 'active' : ''}`;
                row.onclick = () => switchPair(pair.symbol);
                
                const icon = assetIcons[pair.base] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
                const changeClass = pair.change >= 0 ? 'positive' : 'negative';
                const changeSign = pair.change >= 0 ? '+' : '';
                
                row.innerHTML = `
                    <div class="pair-info">
                        <img src="${icon}" class="pair-icon-small">
                        <span class="pair-symbol">${pair.base}/${pair.quote}</span>
                    </div>
                    <span class="pair-price">$${formatNumber(pair.price, true)}</span>
                    <span class="pair-change ${changeClass}">${changeSign}${pair.change.toFixed(2)}%</span>
                `;
                
                container.appendChild(row);
            });
        }

        // Handle browser back/forward
        window.onpopstate = () => {
            const newSymbol = new URLSearchParams(window.location.search).get('symbol') || 'BTCUSDT';
            if (newSymbol !== currentSymbol) {
                switchPair(newSymbol);
            }
        };
    </script>
