<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BTC/USDT · $43,125.32 · BitHash Trade</title>
    
    <!-- Favicon (exactly as index.html) -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <!-- Fonts & Icons (same theme) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ----- CRYPTO.COM COLOR THEME (EXACT FROM INDEX) ----- */
        :root {
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --secondary: #0A0E17;
            --secondary-dark: #05080F;
            --dark: #FFFFFF;
            --darker: #0A0E17;
            --light: #0A0E17;
            --lighter: #111827;
            --gray: #8E9BAE;
            --gray-light: #1F2937;
            --gray-lighter: #374151;
            --success: #28a745;
            --warning: #FFB800;
            --error: #FF0000;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --blue: #003366;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* main trading container – scrollable */
        .trading-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 12px 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 100%;
            background: var(--light);
        }

        /* ----- SECTION 1: TRADING PAIR HEADER (60px) ----- */
        .pair-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: var(--darker);
            border-radius: var(--border-radius);
            padding: 10px 16px;
            border: 1px solid var(--gray-light);
            min-height: 60px;
            gap: 10px;
        }

        .pair-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fav-icon {
            color: var(--gray);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .coin-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        .pair-name {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .pair-sub {
            color: var(--gray);
            font-size: 0.8rem;
            margin-left: 4px;
        }

        .live-price-container {
            text-align: center;
        }

        .live-price {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            transition: background-color 0.2s;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .price-flash-green {
            background-color: rgba(40, 167, 69, 0.3);
        }

        .price-flash-red {
            background-color: rgba(255, 0, 0, 0.3);
        }

        .price-small {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .market-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--gray);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            color: var(--dark);
            font-weight: 600;
        }

        /* ----- MAIN TRADING AREA (3 columns) ----- */
        .main-trading-area {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 10px;
            min-height: 480px;
        }

        /* order book panel */
        .order-book-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 12px 6px 12px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-light);
        }

        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-light);
        }

        .order-book-rows {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
            scrollbar-width: thin;
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
        }

        .order-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 3px 12px;
            cursor: pointer;
            position: relative;
            background: transparent;
        }

        .order-row:hover {
            background: rgba(255,255,255,0.03);
        }

        .depth-bg {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }

        .ask-row .depth-bg {
            background: var(--error);
        }

        .bid-row .depth-bg {
            background: var(--success);
        }

        .price-col {
            text-align: right;
            z-index: 1;
            font-weight: 500;
        }

        .amount-col, .total-col {
            text-align: right;
            z-index: 1;
            color: var(--gray);
        }

        .current-price-row {
            background: var(--gray-lighter);
            font-weight: 700;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--gray-light);
            border-bottom: 1px solid var(--gray-light);
        }

        /* chart panel */
        .chart-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-toolbar {
            display: flex;
            padding: 8px 12px;
            gap: 12px;
            border-bottom: 1px solid var(--gray-light);
            flex-wrap: wrap;
        }

        .timeframes {
            display: flex;
            gap: 6px;
        }

        .time-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .time-btn.active {
            background: var(--primary);
            color: var(--darker);
        }

        .chart-icons {
            display: flex;
            gap: 10px;
            color: var(--gray);
            margin-left: auto;
        }

        .chart-container {
            flex: 1;
            min-height: 360px;
            position: relative;
        }

        #tv-chart {
            width: 100%;
            height: 100%;
        }

        /* market pairs panel */
        .market-pairs-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--gray-light);
        }

        .search-box input {
            width: 100%;
            background: var(--light);
            border: 1px solid var(--gray-light);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--dark);
        }

        .pairs-tabs {
            display: flex;
            padding: 8px 8px 0 8px;
            gap: 10px;
            border-bottom: 1px solid var(--gray-light);
        }

        .pair-tab {
            font-size: 0.75rem;
            padding: 4px 0;
            cursor: pointer;
            color: var(--gray);
            border-bottom: 2px solid transparent;
        }

        .pair-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .pairs-list {
            flex: 1;
            overflow-y: auto;
            max-height: 380px;
            font-size: 0.8rem;
        }

        .pair-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .pair-row:hover {
            background: rgba(255,255,255,0.03);
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pair-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .pair-change.positive {
            color: var(--success);
        }

        .pair-change.negative {
            color: var(--error);
        }

        /* ----- TRADE INTERACTION AREA (3 columns) ----- */
        .trade-interaction {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 10px;
            margin-top: 10px;
        }

        /* order book continuation (left) - same style */
        .order-book-small {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            padding: 10px;
        }

        /* buy/sell panel */
        .buy-sell-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            padding: 16px;
        }

        .order-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .order-tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            background: var(--gray-lighter);
            color: var(--gray);
        }

        .order-tab-btn.buy.active {
            background: var(--success);
            color: white;
        }

        .order-tab-btn.sell.active {
            background: var(--error);
            color: white;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--light);
            border: 1px solid var(--gray-light);
            border-radius: 6px;
            padding: 0 10px;
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: var(--dark);
            font-family: 'Manrope', sans-serif;
        }

        .input-wrapper span {
            color: var(--gray);
            font-size: 0.8rem;
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 4px;
        }

        .percentage-slider {
            display: flex;
            gap: 6px;
            margin: 12px 0;
        }

        .perc-btn {
            flex: 1;
            background: var(--gray-lighter);
            border: none;
            color: var(--dark);
            padding: 6px 0;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .perc-btn:hover {
            background: var(--primary);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.buy {
            background: var(--success);
            color: white;
        }

        .action-btn.sell {
            background: var(--error);
            color: white;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* market trades panel */
        .market-trades-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            padding: 10px 12px 0;
            gap: 16px;
            border-bottom: 1px solid var(--gray-light);
        }

        .tab-link {
            font-size: 0.8rem;
            padding-bottom: 8px;
            cursor: pointer;
            color: var(--gray);
        }

        .tab-link.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .trades-list {
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 0;
            font-variant-numeric: tabular-nums;
        }

        .trade-price.buyer {
            color: var(--success);
        }

        .trade-price.seller {
            color: var(--error);
        }

        /* ----- BOTTOM PANEL: ORDERS / HISTORY ----- */
        .orders-history-panel {
            background: var(--darker);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            margin-top: 10px;
            overflow: hidden;
        }

        .history-tabs {
            display: flex;
            padding: 10px 16px 0;
            gap: 24px;
            border-bottom: 1px solid var(--gray-light);
        }

        .history-tab {
            font-size: 0.85rem;
            padding-bottom: 8px;
            cursor: pointer;
            color: var(--gray);
        }

        .history-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 12px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 600px;
        }

        .orders-table th {
            text-align: left;
            color: var(--gray);
            font-weight: 500;
            padding: 8px 4px;
        }

        .orders-table td {
            padding: 8px 4px;
            border-bottom: 1px solid var(--gray-light);
        }

        .cancel-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-lighter);
            border-radius: 4px;
        }

        /* responsive */
        @media (max-width: 1000px) {
            .main-trading-area, .trade-interaction {
                grid-template-columns: 1fr;
            }
            .pair-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .market-stats {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="trading-container" id="tradingContainer">
        <!-- SECTION 1: TRADING PAIR HEADER (dynamic) -->
        <div class="pair-header" id="pairHeader">
            <!-- will be populated by JS -->
        </div>

        <!-- SECTION 2: MAIN TRADING AREA (3 columns) -->
        <div class="main-trading-area">
            <!-- ORDER BOOK LEFT -->
            <div class="order-book-panel">
                <div class="panel-header">
                    <span>Order Book</span>
                    <i class="fas fa-cog" style="color: var(--gray); cursor: pointer;"></i>
                </div>
                <div class="order-book-header">
                    <span>Price (USDT)</span>
                    <span>Amount (BTC)</span>
                    <span>Total</span>
                </div>
                <div class="order-book-rows" id="orderBookRows">
                    <!-- dynamic asks/bids -->
                </div>
                <div class="current-price-row" id="currentPriceRow">
                    <span id="currentPriceSpan">0.00</span>
                    <span id="priceChangeIndicator">↑</span>
                </div>
            </div>

            <!-- CHART CENTER -->
            <div class="chart-panel">
                <div class="chart-toolbar">
                    <div class="timeframes">
                        <button class="time-btn active">1m</button>
                        <button class="time-btn">15m</button>
                        <button class="time-btn">1H</button>
                        <button class="time-btn">4H</button>
                        <button class="time-btn">1D</button>
                    </div>
                    <div class="chart-icons">
                        <i class="fas fa-calendar-alt"></i>
                        <i class="fas fa-chart-line"></i>
                        <i class="fas fa-draw-polygon"></i>
                        <i class="fas fa-cog"></i>
                    </div>
                </div>
                <div class="chart-container" id="tv-chart"></div>
            </div>

            <!-- MARKET PAIRS RIGHT -->
            <div class="market-pairs-panel">
                <div class="search-box">
                    <input type="text" placeholder="Search" id="pairSearch">
                </div>
                <div class="pairs-tabs">
                    <span class="pair-tab active">USDT</span>
                    <span class="pair-tab">BTC</span>
                    <span class="pair-tab"> favourites</span>
                </div>
                <div class="pairs-list" id="pairsList"></div>
            </div>
        </div>

        <!-- SECTION 3: TRADE INTERACTION (3 columns) -->
        <div class="trade-interaction">
            <!-- left column: order book mini (could be depth) -->
            <div class="order-book-small" id="orderBookSmall">
                <!-- small version or same as above, we reuse the same data but minimal -->
                <div style="font-size:0.75rem; color:var(--gray); margin-bottom:8px;">Depth</div>
                <div id="smallDepth"></div>
            </div>

            <!-- buy/sell panel -->
            <div class="buy-sell-panel">
                <div class="order-tabs">
                    <button class="order-tab-btn buy active" id="tabBuy">Buy</button>
                    <button class="order-tab-btn sell" id="tabSell">Sell</button>
                </div>

                <div class="input-group">
                    <label>Price (USDT)</label>
                    <div class="input-wrapper">
                        <input type="number" id="orderPrice" step="0.01" placeholder="0.00">
                        <span>USDT</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Amount (USD)</label>
                    <div class="input-wrapper">
                        <input type="number" id="orderAmount" step="1" placeholder="0">
                        <span>USD</span>
                    </div>
                    <div class="balance-info">
                        <span>Available: <span id="availableBalance">$0.00</span></span>
                        <span>≈ <span id="estimatedAsset">0.000000</span> BTC</span>
                    </div>
                </div>

                <div class="percentage-slider">
                    <button class="perc-btn">25%</button>
                    <button class="perc-btn">50%</button>
                    <button class="perc-btn">75%</button>
                    <button class="perc-btn">100%</button>
                </div>

                <button class="action-btn buy" id="placeOrderBtn">Buy BTC</button>
                <div style="margin-top:12px; font-size:0.7rem; color:var(--gray); text-align:center;" id="orderStatus"></div>
            </div>

            <!-- market trades panel -->
            <div class="market-trades-panel">
                <div class="tabs-header">
                    <span class="tab-link active" id="tabMarketTrades">Market Trades</span>
                    <span class="tab-link" id="tabMyTrades">My Trades</span>
                </div>
                <div class="trades-list" id="tradesList"></div>
            </div>
        </div>

        <!-- SECTION 4: ORDERS / HISTORY -->
        <div class="orders-history-panel">
            <div class="history-tabs">
                <span class="history-tab active" data-tab="open">Open Orders</span>
                <span class="history-tab" data-tab="history">Order History</span>
                <span class="history-tab" data-tab="trade">Trade History</span>
            </div>
            <div class="table-wrapper" id="ordersTableWrapper">
                <!-- dynamic table -->
            </div>
        </div>
    </div>

    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>

            ];

            // --------------------------------------------------------------
            // HELPER FUNCTIONS
            // --------------------------------------------------------------
            function formatUSD(val) {
                if (val >= 1e9) return '$' + (val/1e9).toFixed(2) + 'B';
                if (val >= 1e6) return '$' + (val/1e6).toFixed(2) + 'M';
                return '$' + val.toFixed(2);
            }

            function formatNumber(val, digits=2) {
                if (val >= 1e9) return (val/1e9).toFixed(2) + 'B';
                if (val >= 1e6) return (val/1e6).toFixed(2) + 'M';
                return val.toFixed(digits);
            }

            function updateTabTitle(price, changeDir) {
                const dir = changeDir === 'up' ? ' ↑' : ' ↓';
                document.title = `${baseAsset}/${quoteAsset} · $${price.toFixed(2)}${dir} · BitHash Trade`;
            }

            function flashPrice(price, oldPrice) {
                const el = document.querySelector('.live-price');
                if (!el) return;
                el.classList.remove('price-flash-green', 'price-flash-red');
                if (price > oldPrice) {
                    el.classList.add('price-flash-green');
                } else if (price < oldPrice) {
                    el.classList.add('price-flash-red');
                }
                if (priceFlashTimeout) clearTimeout(priceFlashTimeout);
                priceFlashTimeout = setTimeout(() => {
                    el.classList.remove('price-flash-green', 'price-flash-red');
                }, 300);
            }

            // --------------------------------------------------------------
            // FETCH REAL DATA FROM BACKEND / COINGECKO
            // --------------------------------------------------------------
            async function fetchOrderBook(symbol = currentPair) {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/market/orderbook/${symbol}`);
                    if (!res.ok) throw new Error('Orderbook failed');
                    const data = await res.json();
                    // expected format: { bids: [[price, amount]], asks: [...] }
                    if (data.bids && data.asks) {
                        bids = data.bids.map(b => [parseFloat(b[0]), parseFloat(b[1])]);
                        asks = data.asks.map(a => [parseFloat(a[0]), parseFloat(a[1])]);
                        maxBidSize = Math.max(...bids.map(b => b[1]), 0.01);
                        maxAskSize = Math.max(...asks.map(a => a[1]), 0.01);
                        renderOrderBook();
                    }
                } catch (e) {
                    console.warn('Orderbook fetch failed, using mock');
                    generateMockOrderBook();
                }
            }

            function generateMockOrderBook() {
                bids = [];
                asks = [];
                for (let i = 1; i <= 10; i++) {
                    bids.push([currentPrice * (1 - i*0.001), Math.random() * 2 + 0.5]);
                    asks.push([currentPrice * (1 + i*0.001), Math.random() * 2 + 0.5]);
                }
                maxBidSize = Math.max(...bids.map(b => b[1]));
                maxAskSize = Math.max(...asks.map(a => a[1]));
                renderOrderBook();
            }

            function renderOrderBook() {
                const container = document.getElementById('orderBookRows');
                if (!container) return;
                let html = '';
                // asks (sell) - top rows in red
                asks.slice(0, 8).forEach((ask) => {
                    const [price, amount] = ask;
                    const total = price * amount;
                    const depthWidth = (amount / maxAskSize) * 100;
                    html += `<div class="order-row ask-row" onclick="setPrice(${price})">
                        <div class="depth-bg" style="width: ${depthWidth}%;"></div>
                        <span class="price-col" style="color: var(--error);">${price.toFixed(2)}</span>
                        <span class="amount-col">${amount.toFixed(4)}</span>
                        <span class="total-col">${total.toFixed(2)}</span>
                    </div>`;
                });
                // small spacer
                html += `<div style="border-top:1px solid var(--gray-light); margin:4px 0;"></div>`;
                // bids (buy)
                bids.slice(0, 8).forEach((bid) => {
                    const [price, amount] = bid;
                    const total = price * amount;
                    const depthWidth = (amount / maxBidSize) * 100;
                    html += `<div class="order-row bid-row" onclick="setPrice(${price})">
                        <div class="depth-bg" style="width: ${depthWidth}%;"></div>
                        <span class="price-col" style="color: var(--success);">${price.toFixed(2)}</span>
                        <span class="amount-col">${amount.toFixed(4)}</span>
                        <span class="total-col">${total.toFixed(2)}</span>
                    </div>`;
                });
                container.innerHTML = html;

                // small depth
                document.getElementById('smallDepth').innerHTML = 
                    `<div style="color:var(--error);">Ask: $${asks[0]?.[0].toFixed(2)}</div>
                     <div style="color:var(--success);">Bid: $${bids[0]?.[0].toFixed(2)}</div>`;
            }

            async function fetchTicker() {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPair}`);
                    if (!res.ok) throw new Error('ticker failed');
                    const data = await res.json();
                    const newPrice = parseFloat(data.lastPrice);
                    const change24h = parseFloat(data.priceChangePercent);
                    prevPrice = currentPrice;
                    currentPrice = newPrice;

                    flashPrice(currentPrice, prevPrice);
                    updateTabTitle(currentPrice, currentPrice > prevPrice ? 'up' : 'down');

                    // update header
                    document.getElementById('pairHeader').innerHTML = generatePairHeaderHTML(data);
                    document.getElementById('currentPriceSpan').innerText = '$' + currentPrice.toFixed(2);
                    document.getElementById('priceChangeIndicator').innerHTML = currentPrice > prevPrice ? '↑' : '↓';
                } catch (e) {
                    console.warn('ticker mock');
                }
            }

            function generatePairHeaderHTML(ticker) {
                const pair = PAIRS.find(p => p.symbol === currentPair) || PAIRS[0];
                return `
                    <div class="pair-left">
                        <i class="far fa-star fav-icon"></i>
                        <img src="${pair.icon}" class="coin-icon">
                        <span class="pair-name">${baseAsset}/${quoteAsset}</span>
                        <span class="pair-sub">${baseAsset} Price</span>
                    </div>
                    <div class="live-price-container">
                        <div class="live-price" id="livePriceEl">$${currentPrice.toFixed(2)}</div>
                        <div class="price-small">≈ $${currentPrice.toFixed(2)}</div>
                    </div>
                    <div class="market-stats">
                        <div class="stat-item"><span>24h Change</span><span class="stat-value ${ticker?.priceChangePercent > 0 ? 'price-positive' : 'price-negative'}">${ticker?.priceChangePercent ? ticker.priceChangePercent.toFixed(2)+'%' : '+2.34%'}</span></div>
                        <div class="stat-item"><span>24h High</span><span class="stat-value">$${ticker?.highPrice ? parseFloat(ticker.highPrice).toFixed(2) : '43,890'}</span></div>
                        <div class="stat-item"><span>24h Low</span><span class="stat-value">$${ticker?.lowPrice ? parseFloat(ticker.lowPrice).toFixed(2) : '42,100'}</span></div>
                        <div class="stat-item"><span>24h Vol(BTC)</span><span class="stat-value">${ticker?.volume ? formatNumber(parseFloat(ticker.volume)) : '12.5K'}</span></div>
                        <div class="stat-item"><span>24h Vol(USDT)</span><span class="stat-value">$${ticker?.quoteVolume ? formatNumber(parseFloat(ticker.quoteVolume)) : '540M'}</span></div>
                    </div>
                `;
            }

            async function fetchRecentTrades() {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/market/trades/${currentPair}?limit=20`);
                    if (!res.ok) throw new Error('trades failed');
                    const data = await res.json();
                    renderTrades(data);
                } catch (e) {
                    const mock = [];
                    for (let i=0;i<10;i++) {
                        mock.push({
                            price: currentPrice * (1 + (Math.random()-0.5)*0.002),
                            amount: Math.random()*0.5,
                            time: new Date(Date.now() - i*20000).toLocaleTimeString(),
                            side: Math.random()>0.5 ? 'buy' : 'sell'
                        });
                    }
                    renderTrades(mock);
                }
            }

            function renderTrades(trades) {
                const list = document.getElementById('tradesList');
                let html = '<div class="trade-row" style="color:var(--gray);"><span>Price</span><span>Amount</span><span>Time</span></div>';
                trades.slice(0,15).forEach(t => {
                    const side = t.side || (Math.random()>0.5?'buy':'sell');
                    html += `<div class="trade-row">
                        <span class="trade-price ${side==='buy'?'buyer':'seller'}">$${t.price.toFixed(2)}</span>
                        <span>${t.amount.toFixed(4)}</span>
                        <span>${t.time || new Date().toLocaleTimeString()}</span>
                    </div>`;
                });
                list.innerHTML = html;
            }

            // market pairs render
            function renderPairsList() {
                const container = document.getElementById('pairsList');
                let html = '';
                PAIRS.forEach(p => {
                    const changeClass = p.change >= 0 ? 'positive' : 'negative';
                    html += `<div class="pair-row" data-symbol="${p.symbol}" onclick="switchPair('${p.symbol}')">
                        <div class="pair-info">
                            <img src="${p.icon}" class="pair-icon">
                            <span>${p.base}</span>
                        </div>
                        <span>$${p.price.toFixed(2)}</span>
                        <span class="pair-change ${changeClass}">${p.change > 0 ? '+' : ''}${p.change.toFixed(2)}%</span>
                    </div>`;
                });
                container.innerHTML = html;
            }

            // balance fetch
            async function fetchBalances() {
                if (!userToken) return;
                try {
                    const res = await fetch(`${BACKEND_URL}/api/users/balances`, {
                        headers: { 'Authorization': `Bearer ${userToken}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        mainBalanceUSD = data.data?.balances?.main || 0;
                        // also fetch btc balance
                        const btcPrice = currentPrice;
                        btcBalance = mainBalanceUSD / btcPrice;
                        document.getElementById('availableBalance').innerText = formatUSD(mainBalanceUSD);
                    }
                } catch (e) {}
            }

            // order execution
            window.placeOrder = async function(side) {
                if (!userToken) {
                    document.getElementById('orderStatus').innerText = 'Login required';
                    return;
                }
                const price = parseFloat(document.getElementById('orderPrice').value);
                const amountUSD = parseFloat(document.getElementById('orderAmount').value);
                if (amountUSD < 10) { document.getElementById('orderStatus').innerText = 'Min $10'; return; }
                if (amountUSD > mainBalanceUSD) { document.getElementById('orderStatus').innerText = 'Insufficient'; return; }

                try {
                    const res = await fetch(`${BACKEND_URL}/api/trading/orders`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userToken}` },
                        body: JSON.stringify({
                            symbol: currentPair,
                            side: side,
                            type: 'market',
                            amount: amountUSD,
                            price: price
                        })
                    });
                    if (res.ok) {
                        document.getElementById('orderStatus').innerText = 'Order placed';
                        fetchBalances();
                        fetchRecentTrades();
                        fetchOrderBook();
                    } else {
                        document.getElementById('orderStatus').innerText = 'Order failed';
                    }
                } catch (e) {
                    document.getElementById('orderStatus').innerText = 'Error';
                }
            };

            // percentage buttons
            document.querySelectorAll('.perc-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const perc = parseInt(this.innerText);
                    if (!userToken) return;
                    const amount = (mainBalanceUSD * perc / 100).toFixed(2);
                    document.getElementById('orderAmount').value = amount;
                    const est = amount / currentPrice;
                    document.getElementById('estimatedAsset').innerText = est.toFixed(6);
                });
            });

            // price setter from order book
            window.setPrice = function(price) {
                document.getElementById('orderPrice').value = price.toFixed(2);
            };

            window.switchPair = function(symbol) {
                const pair = PAIRS.find(p => p.symbol === symbol);
                if (!pair) return;
                currentPair = symbol;
                baseAsset = pair.base;
                quoteAsset = pair.quote;
                currentPrice = pair.price;
                fetchOrderBook();
                fetchRecentTrades();
                fetchTicker();
                renderPairsList();
                document.getElementById('orderPrice').value = currentPrice.toFixed(2);
                if (typeof TradingView !== 'undefined') {
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": `BINANCE:${symbol}`,
                        "interval": "1",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "container_id": "tv-chart"
                    });
                }
            };

            // --------------------------------------------------------------
            // INIT
            // --------------------------------------------------------------
            async function init() {
                // initial header
                document.getElementById('pairHeader').innerHTML = generatePairHeaderHTML();
                await fetchBalances();
                await fetchTicker();
                await fetchOrderBook();
                await fetchRecentTrades();
                renderPairsList();

                // tradingview
                if (typeof TradingView !== 'undefined') {
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": `BINANCE:${currentPair}`,
                        "interval": "1",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "container_id": "tv-chart",
                        "studies": ["Volume@tv-basicstudies"]
                    });
                }

                // order amount listener
                document.getElementById('orderAmount').addEventListener('input', function(e) {
                    const amt = parseFloat(e.target.value) || 0;
                    const est = amt / currentPrice;
                    document.getElementById('estimatedAsset').innerText = est.toFixed(6);
                });

                // tab buy/sell
                document.getElementById('tabBuy').addEventListener('click', function() {
                    document.getElementById('tabBuy').classList.add('active');
                    document.getElementById('tabSell').classList.remove('active');
                    document.getElementById('placeOrderBtn').className = 'action-btn buy';
                    document.getElementById('placeOrderBtn').innerText = `Buy ${baseAsset}`;
                });
                document.getElementById('tabSell').addEventListener('click', function() {
                    document.getElementById('tabSell').classList.add('active');
                    document.getElementById('tabBuy').classList.remove('active');
                    document.getElementById('placeOrderBtn').className = 'action-btn sell';
                    document.getElementById('placeOrderBtn').innerText = `Sell ${baseAsset}`;
                });

                document.getElementById('placeOrderBtn').addEventListener('click', function() {
                    const isBuy = document.getElementById('tabBuy').classList.contains('active');
                    placeOrder(isBuy ? 'buy' : 'sell');
                });

                // price input default
                document.getElementById('orderPrice').value = currentPrice.toFixed(2);

                // start polling (every 5 sec)
                setInterval(() => {
                    fetchTicker();
                    fetchOrderBook();
                    fetchRecentTrades();
                }, 5000);
            }

            init();
        })();
    </script>
