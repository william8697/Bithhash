<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BitHash | Trading Terminal</title>
    <meta name="description" content="Professional crypto trading terminal with real-time Binance data, order book, and advanced charting.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&display=swap" rel="stylesheet">
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        header {
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img { height: 32px; }
        .logo-text { font-family: 'Rowdies', sans-serif; font-weight: 700; font-size: 1.3rem; color: white; }
        .pair-selector {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .pair-logos { display: flex; align-items: center; gap: 5px; }
        .pair-logos img { width: 28px; height: 28px; border-radius: 50%; background: #1e2329; padding: 2px; }
        .pair-symbol { font-weight: 700; font-size: 1.1rem; }
        .balance-badge {
            background: rgba(247,166,0,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(247,166,0,0.3);
        }
        .btn {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-success { background: var(--positive); color: #fff; }
        .btn-success:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--negative); color: #fff; }
        .btn-danger:hover { filter: brightness(1.1); }
        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 16px;
            margin: 20px 0;
        }
        .panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .orderbook-rows { max-height: 480px; overflow-y: auto; }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-family: monospace;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        .order-row:hover { background: var(--bg-hover); }
        .bid-price { color: var(--positive); }
        .ask-price { color: var(--negative); }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }
        .stat-card {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); }
        .stat-value { font-weight: 700; font-size: 1rem; }
        .chart-container { height: 450px; width: 100%; }
        .order-entry {
            padding: 16px;
        }
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-hover);
        }
        .order-tab.buy.active { background: var(--positive); color: #fff; }
        .order-tab.sell.active { background: var(--negative); color: #fff; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
        }
        .balance-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--text-muted);
        }
        .action-btn { width: 100%; margin-top: 12px; padding: 12px; border-radius: 40px; font-weight: 700; }
        .footer-ticker {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 10px 0;
            margin-top: 30px;
            white-space: nowrap;
            overflow-x: auto;
        }
        .ticker-items { display: flex; gap: 30px; animation: tickerScroll 40s linear infinite; width: max-content; }
        @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item { display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        .deposit-convert-bar {
            background: rgba(247,166,0,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 16px;
        }
        @media (max-width: 1200px) { .trading-grid { grid-template-columns: 1fr; gap: 16px; } .orderbook-rows { max-height: 300px; } }
        @media (max-width: 768px) { .container { padding: 0 12px; } }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<header>
    <div class="container header-flex">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="Logo">
            <span class="logo-text">₿itHash</span>
        </div>
        <div class="pair-selector" id="pairSelectorBtn">
            <div class="pair-logos" id="pairLogos">
                <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" id="baseLogo">
                <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" id="quoteLogo">
            </div>
            <span class="pair-symbol" id="selectedPairSymbol">BTC/USDT</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div class="balance-badge" id="cryptoBalanceDisplay">BTC: 0.00000000</div>
        <div><button class="btn btn-outline" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button></div>
    </div>
</header>

<div class="container">
    <div class="trading-grid">
        <!-- LEFT: Order Book + Recent Trades -->
        <div class="panel">
            <div class="panel-header"><i class="fas fa-book"></i> Order Book</div>
            <div class="orderbook-rows" id="orderBookContainer">
                <div class="order-row" style="justify-content:center;">Loading depth...</div>
            </div>
            <div class="panel-header" style="border-top:1px solid var(--border);"><i class="fas fa-history"></i> Recent Trades</div>
            <div id="recentTradesContainer" style="max-height: 200px; overflow-y: auto;"></div>
        </div>

        <!-- CENTER: Chart + Stats -->
        <div class="panel">
            <div class="stats-grid" id="tickerStats">
                <div class="stat-card"><div class="stat-label">Last Price</div><div class="stat-value" id="lastPrice">-</div></div>
                <div class="stat-card"><div class="stat-label">24h Change</div><div class="stat-value" id="priceChangePercent">-</div></div>
                <div class="stat-card"><div class="stat-label">24h High</div><div class="stat-value" id="high24h">-</div></div>
                <div class="stat-card"><div class="stat-label">24h Low</div><div class="stat-value" id="low24h">-</div></div>
                <div class="stat-card"><div class="stat-label">24h Volume (USDT)</div><div class="stat-value" id="volumeUsdt">-</div></div>
                <div class="stat-card"><div class="stat-label">Spread</div><div class="stat-value" id="spread">-</div></div>
            </div>
            <div class="chart-container" id="tradingview-container"></div>
        </div>

        <!-- RIGHT: Trade Panel + Balance Actions -->
        <div class="panel" id="tradePanel">
            <div class="order-entry">
                <div class="order-tabs">
                    <div class="order-tab buy active" id="buyTabBtn">Buy</div>
                    <div class="order-tab sell" id="sellTabBtn">Sell</div>
                </div>
                <div id="tradeFormContent">
                    <div class="input-group"><label>Price (USDT)</label><input type="number" id="tradePrice" step="0.01" placeholder="Market"></div>
                    <div class="input-group"><label>Amount (USDT)</label><input type="number" id="tradeAmountUsdt" step="10" placeholder="Amount in USDT"></div>
                    <div class="balance-info-row"><span>Available Balance</span><span id="availableBalanceDisplay">0.00 USDT</span></div>
                    <div class="balance-info-row"><span>≈ Crypto Amount</span><span id="estimatedCryptoAmount">0.00000000</span></div>
                    <button class="btn btn-success action-btn" id="executeTradeBtn">Buy</button>
                </div>
                <div id="insufficientFundsPanel" style="display:none;">
                    <div class="deposit-convert-bar">
                        <i class="fas fa-exclamation-triangle" style="color:var(--accent); font-size:1.5rem;"></i>
                        <p style="margin:10px 0;">Insufficient USDT balance to trade this pair.</p>
                        <div style="display:flex; gap:12px; justify-content:center;">
                            <button class="btn btn-primary" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button>
                            <button class="btn btn-outline" id="convertFundsBtn"><i class="fas fa-exchange-alt"></i> Convert</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer-ticker" id="priceTicker"></div>

<script>
    // ---------- GLOBALS ----------
    let currentPair = { base: 'BTC', quote: 'USDT', symbol: 'BTCUSDT' };
    let realtimePrices = {};
    let orderBook = { bids: [], asks: [] };
    let userCryptoBalances = {};    // { BTC: 0.123, ETH: ... }
    let userUsdtBalance = 0;
    let isLoggedIn = false;
    let availablePairs = [];          // all Binance USDT pairs + metadata
    let allPairsCache = [];
    let currentOrderSide = 'BUY';
    let tvWidget = null;
    let updateInterval = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let tickerInterval = null;
    
    // ---------- HELPER: format number ----------
    function formatNumber(num, decimals=8) { return parseFloat(num).toFixed(decimals).replace(/\.?0+$/, ''); }
    function formatUsd(num) { return `$${parseFloat(num).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`; }
    
    // ---------- FETCH CRYPTO BALANCES (ONLY CRYPTO, SAME AS /api/users/balances in dashboard) ----------
    async function fetchCryptoBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) { isLoggedIn = false; userCryptoBalances = {}; userUsdtBalance = 0; updateBalanceUI(); return; }
        try {
            const res = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                // data contains main, active, matured but we need individual crypto assets
                // Additionally fetch /api/users/assets to get per-crypto breakdown
                const assetsRes = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (assetsRes.ok) {
                    const assetsData = await assetsRes.json();
                    userCryptoBalances = {};
                    assetsData.forEach(asset => { userCryptoBalances[asset.symbol.toUpperCase()] = parseFloat(asset.balance) || 0; });
                    // USDT balance specifically:
                    userUsdtBalance = userCryptoBalances['USDT'] || 0;
                } else {
                    userUsdtBalance = 0;
                }
                isLoggedIn = true;
            } else { isLoggedIn = false; userUsdtBalance = 0; userCryptoBalances = {}; }
        } catch(e) { console.warn(e); isLoggedIn = false; userUsdtBalance = 0; }
        updateBalanceUI();
    }
    
    function updateBalanceUI() {
        const cryptoBalSpan = document.getElementById('cryptoBalanceDisplay');
        if (isLoggedIn) {
            const baseSym = currentPair.base;
            const baseBalance = userCryptoBalances[baseSym] || 0;
            cryptoBalSpan.innerHTML = `${baseSym}: ${formatNumber(baseBalance, 8)} &nbsp;| USDT: ${formatNumber(userUsdtBalance, 2)}`;
        } else {
            cryptoBalSpan.innerHTML = `Login to trade`;
        }
        const availSpan = document.getElementById('availableBalanceDisplay');
        if (availSpan) availSpan.innerText = `${formatNumber(userUsdtBalance, 2)} USDT`;
        checkSufficientBalanceForTrade();
    }
    
    // ---------- CHECK SUFFICIENT USDT ----------
    function checkSufficientBalanceForTrade() {
        const tradePanel = document.getElementById('tradePanel');
        const formDiv = document.getElementById('tradeFormContent');
        const insufficientDiv = document.getElementById('insufficientFundsPanel');
        if (!isLoggedIn || userUsdtBalance <= 0.01) {
            formDiv.style.display = 'none';
            insufficientDiv.style.display = 'block';
        } else {
            formDiv.style.display = 'block';
            insufficientDiv.style.display = 'none';
        }
    }
    
    // ---------- CONVERT BUTTON LOGIC (same as dashboard convert) ----------
    document.getElementById('convertFundsBtn')?.addEventListener('click', () => {
        window.location.href = 'dashboard.html?openConvert=true'; // fallback to dashboard convert modal
        // Better: open convert modal directly
        if (window.opener) {} else { window.location.href = 'dashboard.html'; }
    });
    
    // ---------- BINANCE API HELPERS ----------
    async function fetchBinancePairs() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            const data = await res.json();
            const symbols = data.symbols.filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT');
            allPairsCache = symbols.map(s => ({ symbol: s.symbol, baseAsset: s.baseAsset, quoteAsset: s.quoteAsset }));
            availablePairs = allPairsCache;
            return allPairsCache;
        } catch(e) { console.error(e); return []; }
    }
    
    async function fetchBinanceTicker(symbol) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
            return await res.json();
        } catch(e) { return null; }
    }
    
    async function fetchOrderBookDepth(symbol) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=20`);
            const data = await res.json();
            orderBook.bids = data.bids.map(b => ({ price: parseFloat(b[0]), qty: parseFloat(b[1]) }));
            orderBook.asks = data.asks.map(a => ({ price: parseFloat(a[0]), qty: parseFloat(a[1]) }));
            renderOrderBook();
        } catch(e) { console.warn(e); }
    }
    
    async function fetchRecentTrades(symbol) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/trades?symbol=${symbol}&limit=20`);
            const trades = await res.json();
            renderRecentTrades(trades);
        } catch(e) {}
    }
    
    function renderOrderBook() {
        const container = document.getElementById('orderBookContainer');
        if (!container) return;
        let html = `<div style="padding:8px 12px;font-size:0.7rem;color:var(--text-muted);display:flex;justify-content:space-between;"><span>Price(USDT)</span><span>Amount</span><span>Total</span></div>`;
        // asks (sell orders)
        for (let ask of orderBook.asks.slice(0, 12)) {
            const total = ask.price * ask.qty;
            html += `<div class="order-row" onclick="document.getElementById('tradePrice').value=${ask.price}"><span class="ask-price">${ask.price.toFixed(2)}</span><span>${formatNumber(ask.qty,4)}</span><span>${formatNumber(total,2)}</span></div>`;
        }
        // spread indicator
        const bestBid = orderBook.bids[0]?.price || 0;
        const bestAsk = orderBook.asks[0]?.price || 0;
        const spread = bestAsk - bestBid;
        const spreadPercent = bestAsk ? (spread / bestAsk * 100).toFixed(4) : 0;
        html += `<div class="order-row" style="justify-content:center; background:var(--bg-hover);"><span>Spread: ${spread.toFixed(2)} (${spreadPercent}%)</span></div>`;
        for (let bid of orderBook.bids.slice(0, 12)) {
            const total = bid.price * bid.qty;
            html += `<div class="order-row" onclick="document.getElementById('tradePrice').value=${bid.price}"><span class="bid-price">${bid.price.toFixed(2)}</span><span>${formatNumber(bid.qty,4)}</span><span>${formatNumber(total,2)}</span></div>`;
        }
        container.innerHTML = html;
        const spreadElem = document.getElementById('spread');
        if(spreadElem) spreadElem.innerText = `${spread.toFixed(2)} (${spreadPercent}%)`;
    }
    
    function renderRecentTrades(trades) {
        const container = document.getElementById('recentTradesContainer');
        if(!container) return;
        let html = '';
        for(let t of trades.slice(0, 20)) {
            const isBuy = t.isBuyerMaker === false;
            const sideClass = isBuy ? 'trade-buy' : 'trade-sell';
            const sideText = isBuy ? 'BUY' : 'SELL';
            const time = new Date(t.time).toLocaleTimeString();
            html += `<div class="trade-item"><span class="${sideClass}">${sideText}</span><span>${parseFloat(t.price).toFixed(2)}</span><span>${formatNumber(t.qty,4)}</span><span>${time}</span></div>`;
        }
        container.innerHTML = html;
    }
    
    async function updateTickerUI() {
        const ticker = await fetchBinanceTicker(currentPair.symbol);
        if(ticker) {
            document.getElementById('lastPrice').innerHTML = formatUsd(ticker.lastPrice);
            const change = parseFloat(ticker.priceChangePercent);
            const changeElem = document.getElementById('priceChangePercent');
            changeElem.innerHTML = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeElem.style.color = change >=0 ? 'var(--positive)' : 'var(--negative)';
            document.getElementById('high24h').innerHTML = formatUsd(ticker.highPrice);
            document.getElementById('low24h').innerHTML = formatUsd(ticker.lowPrice);
            document.getElementById('volumeUsdt').innerHTML = formatUsd(ticker.quoteVolume);
            // update browser title
            document.title = `${currentPair.base}/${currentPair.quote} ${formatUsd(ticker.lastPrice)} | BitHash Trade`;
            realtimePrices[currentPair.symbol] = parseFloat(ticker.lastPrice);
            // estimate crypto amount when amount changes
            estimateCryptoAmount();
        }
    }
    
    function estimateCryptoAmount() {
        const amountUsdt = parseFloat(document.getElementById('tradeAmountUsdt').value) || 0;
        const price = parseFloat(document.getElementById('tradePrice').value) || realtimePrices[currentPair.symbol] || 0;
        if(price > 0) {
            const cryptoAmount = amountUsdt / price;
            document.getElementById('estimatedCryptoAmount').innerText = formatNumber(cryptoAmount, 8);
        } else {
            document.getElementById('estimatedCryptoAmount').innerText = '0.00000000';
        }
    }
    
    // ---------- TRADING CHART (TradingView) ----------
    function initTradingViewChart(symbol) {
        const container = document.getElementById('tradingview-container');
        container.innerHTML = '';
        if (tvWidget) tvWidget.remove();
        new TradingView.widget({
            "autosize": true,
            "symbol": `BINANCE:${symbol}`,
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "allow_symbol_change": false,
            "container_id": "tradingview-container",
            "hide_side_toolbar": false,
            "studies": ["Volume@tv-basicstudies"]
        });
    }
    
    // ---------- PAIR SELECTOR (searchable dropdown, only USDT pairs but any from binance) ----------
    async function buildPairSelector() {
        await fetchBinancePairs();
        const modalDiv = document.createElement('div');
        modalDiv.id = "pairModal";
        modalDiv.style.cssText = "position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);";
        modalDiv.innerHTML = `
            <div style="background:var(--bg-surface);border-radius:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;">
                <div style="display:flex;justify-content:space-between;"><h3>Select Trading Pair</h3><button id="closePairModalBtn" style="background:none;border:none;color:white;font-size:1.5rem;">&times;</button></div>
                <input type="text" id="pairSearchInput" placeholder="Search BTC, ETH, SOL..." style="width:100%;padding:12px;margin:15px 0;border-radius:40px;background:var(--bg-card);border:1px solid var(--border);color:white;">
                <div id="pairListContainer" style="max-height:400px;overflow-y:auto;"></div>
            </div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('pairSelectorBtn').onclick = () => { modalDiv.style.display = 'flex'; renderPairList(''); };
        document.getElementById('closePairModalBtn').onclick = () => modalDiv.style.display = 'none';
        const searchInput = document.getElementById('pairSearchInput');
        searchInput.addEventListener('input', (e) => renderPairList(e.target.value));
        window.renderPairList = (query) => {
            const filtered = allPairsCache.filter(p => p.symbol.includes(query.toUpperCase()) || p.baseAsset.includes(query.toUpperCase()));
            const container = document.getElementById('pairListContainer');
            container.innerHTML = filtered.slice(0, 80).map(p => {
                const baseAsset = p.baseAsset;
                const quoteAsset = p.quoteAsset;
                const logoUrl = `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`; // temporary, but we fetch from coingecko later
                const logoUrl2 = `https://assets.coingecko.com/coins/images/325/large/Tether.png`;
                return `<div class="pair-selector-item" style="padding:12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;" data-symbol="${p.symbol}" data-base="${p.baseAsset}" data-quote="${p.quoteAsset}">
                            <div style="display:flex;"><img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" width="28" style="border-radius:50%;"><img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="28" style="border-radius:50%;margin-left:-8px;"></div>
                            <div><strong>${p.baseAsset}/${p.quoteAsset}</strong><div style="font-size:0.7rem;">${p.symbol}</div></div>
                        </div>`;
            }).join('');
            document.querySelectorAll('.pair-selector-item').forEach(el => {
                el.addEventListener('click', () => {
                    const symbol = el.dataset.symbol;
                    const base = el.dataset.base;
                    const quote = el.dataset.quote;
                    changeTradingPair(symbol, base, quote);
                    modalDiv.style.display = 'none';
                });
            });
        };
    }
    
    // fetch asset logos from coingecko
    async function fetchCoinLogo(assetSymbol) {
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&symbols=${assetSymbol.toLowerCase()}`);
            const data = await res.json();
            if(data && data[0]) return data[0].image;
        } catch(e) {}
        return `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
    }
    
    async function changeTradingPair(symbol, base, quote) {
        if(updateInterval) clearInterval(updateInterval);
        if(orderBookInterval) clearInterval(orderBookInterval);
        if(tradesInterval) clearInterval(tradesInterval);
        if(tickerInterval) clearInterval(tickerInterval);
        currentPair = { symbol, base, quote };
        document.getElementById('selectedPairSymbol').innerHTML = `${base}/${quote}`;
        // update logos
        const baseLogo = await fetchCoinLogo(base);
        const quoteLogo = await fetchCoinLogo(quote);
        document.getElementById('baseLogo').src = baseLogo;
        document.getElementById('quoteLogo').src = quoteLogo;
        initTradingViewChart(symbol);
        await updateTickerUI();
        await fetchOrderBookDepth(symbol);
        await fetchRecentTrades(symbol);
        startRealtimeUpdates(symbol);
        checkSufficientBalanceForTrade();
        updateBalanceUI();
    }
    
    function startRealtimeUpdates(symbol) {
        orderBookInterval = setInterval(() => fetchOrderBookDepth(symbol), 2000);
        tradesInterval = setInterval(() => fetchRecentTrades(symbol), 3000);
        tickerInterval = setInterval(() => updateTickerUI(), 5000);
        updateInterval = setInterval(() => { fetchOrderBookDepth(symbol); fetchRecentTrades(symbol); }, 3000);
    }
    
    // ---------- TRADE EXECUTION (Simulated on backend, but full production) ----------
    async function executeTrade() {
        const token = localStorage.getItem('jwtToken');
        if(!token) { alert("Please login to trade"); window.location.href='login.html'; return; }
        const side = currentOrderSide;
        const price = parseFloat(document.getElementById('tradePrice').value);
        const amountUsdt = parseFloat(document.getElementById('tradeAmountUsdt').value);
        if(!amountUsdt || amountUsdt <= 0) { alert("Enter valid amount"); return; }
        if(amountUsdt > userUsdtBalance && side === 'BUY') { alert("Insufficient USDT balance"); return; }
        // call backend trading endpoint (consistent with dashboard)
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    symbol: currentPair.symbol,
                    side: side.toLowerCase(),
                    type: 'market',
                    amount: amountUsdt,
                    price: price || 0
                })
            });
            if(response.ok) {
                alert(`${side} order placed: ${amountUsdt} USDT of ${currentPair.base}`);
                await fetchCryptoBalances();
                document.getElementById('tradeAmountUsdt').value = '';
                estimateCryptoAmount();
            } else {
                const err = await response.json();
                alert(`Order failed: ${err.message || 'Insufficient funds or error'}`);
            }
        } catch(e) { alert("Network error, please try again"); }
    }
    
    // ---------- UI TOGGLE & EVENT LISTENERS ----------
    function initTradeUI() {
        const buyTab = document.getElementById('buyTabBtn');
        const sellTab = document.getElementById('sellTabBtn');
        const execBtn = document.getElementById('executeTradeBtn');
        buyTab.addEventListener('click', () => {
            buyTab.classList.add('active'); sellTab.classList.remove('active');
            currentOrderSide = 'BUY';
            execBtn.classList.remove('btn-danger'); execBtn.classList.add('btn-success');
            execBtn.innerText = 'Buy';
        });
        sellTab.addEventListener('click', () => {
            sellTab.classList.add('active'); buyTab.classList.remove('active');
            currentOrderSide = 'SELL';
            execBtn.classList.remove('btn-success'); execBtn.classList.add('btn-danger');
            execBtn.innerText = 'Sell';
        });
        execBtn.addEventListener('click', executeTrade);
        document.getElementById('tradeAmountUsdt').addEventListener('input', estimateCryptoAmount);
        document.getElementById('tradePrice').addEventListener('input', estimateCryptoAmount);
    }
    
    // ---------- FOOTER TICKER (real-time prices for top 10 pairs) ----------
    async function initFooterTicker() {
        const tickerDiv = document.getElementById('priceTicker');
        const topPairs = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','DOTUSDT','MATICUSDT'];
        async function updateTicker() {
            let html = '<div class="ticker-items">';
            for(let sym of topPairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
                    const data = await res.json();
                    const change = parseFloat(data.priceChangePercent);
                    const color = change >= 0 ? 'var(--positive)' : 'var(--negative)';
                    html += `<div class="ticker-item"><span>${sym.replace('USDT','')}</span><span>${formatUsd(data.lastPrice)}</span><span style="color:${color}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span></div>`;
                } catch(e) {}
            }
            html += '</div>';
            tickerDiv.innerHTML = html;
        }
        await updateTicker();
        setInterval(updateTicker, 10000);
    }
    
    // ---------- INITIAL LOAD ----------
    async function init() {
        await fetchCryptoBalances();
        await buildPairSelector();
        await initTradeUI();
        await initFooterTicker();
        // extract asset from URL (if any)
        const urlParams = new URLSearchParams(window.location.search);
        const symbolParam = urlParams.get('symbol');
        if(symbolParam) {
            let baseAsset = symbolParam.toUpperCase();
            let found = allPairsCache.find(p => p.baseAsset === baseAsset && p.quoteAsset === 'USDT');
            if(found) await changeTradingPair(found.symbol, found.baseAsset, found.quoteAsset);
            else await changeTradingPair('BTCUSDT', 'BTC', 'USDT');
        } else {
            await changeTradingPair('BTCUSDT', 'BTC', 'USDT');
        }
        setInterval(() => fetchCryptoBalances(), 15000);
    }
    init();
</script>
