<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <title>BitHash Capital | Trading</title>
    <meta name="description" content="Professional cryptocurrency trading platform with real-time Binance data. Trade crypto with advanced charting and order book.">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Chart Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-46S59PXRGK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-46S59PXRGK');
    </script>
    
    <style>
        /* ============================================= */
        /* COLOR SYSTEM */
        /* ============================================= */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --blue: #003366;
            --gold: #D4AF37;
            --success: #228B22;
            --warning: #FFB800;
            --error: #FF0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* ============================================= */
        /* HEADER - Logo | Pair Selector | Price | 24h Stats | Actions */
        /* ============================================= */
        .main-header {
            background-color: var(--bg-base);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* Logo */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: 140px;
        }

        .logo-area img {
            height: 32px;
            width: auto;
        }

        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        /* Pair Selector */
        .pair-selector-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-surface);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .pair-logos {
            display: flex;
            align-items: center;
        }

        .pair-logos img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }

        .pair-logos img:first-child {
            margin-right: -8px;
            z-index: 2;
        }

        .pair-name {
            font-weight: 700;
            font-size: 1rem;
        }

        /* Price Area */
        .price-area {
            text-align: center;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .price-change {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .price-change.positive { background: rgba(34, 139, 34, 0.15); color: var(--positive); }
        .price-change.negative { background: rgba(255, 0, 0, 0.15); color: var(--negative); }

        /* 24h Stats */
        .stats-area {
            display: flex;
            gap: 24px;
        }

        .stat-item {
            text-align: left;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Actions */
        .actions-area {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #000000;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* User Balance Bar */
        .user-balance-bar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            position: fixed;
            top: 70px;
            width: 100%;
            z-index: 999;
        }

        .user-balance-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(247, 166, 0, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ============================================= */
        /* MAIN TRADING GRID - EXACT LAYOUT MAP */
        /* LEFT: 25% | CENTER: 50% | RIGHT: 25% */
        /* ============================================= */
        .trading-container {
            margin-top: 128px;
            padding: 0 20px 60px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        .trading-grid {
            display: grid;
            grid-template-columns: 25% 50% 25%;
            gap: 16px;
        }

        /* ============================================= */
        /* LEFT COLUMN: ORDER BOOK + RECENT TRADES */
        /* ============================================= */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-title {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        /* Order Book */
        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .order-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.1s;
        }

        .order-row:hover {
            background: var(--bg-hover);
        }

        .price-positive { color: var(--positive); }
        .price-negative { color: var(--negative); }

        .spread-info {
            text-align: center;
            padding: 8px;
            background: var(--bg-hover);
            margin: 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        /* Recent Trades */
        .trades-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr 0.8fr;
            padding: 6px 12px;
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }

        /* ============================================= */
        /* CENTER COLUMN: CHART - BIGGEST ELEMENT */
        /* ============================================= */
        .center-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pair-search-container {
            position: relative;
        }

        .pair-search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }

        .pair-search-input:focus {
            border-color: var(--accent);
        }

        .pair-dropdown {
            position: absolute;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 260px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
            margin-top: 5px;
        }

        .pair-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .pair-item:hover {
            background: var(--bg-card);
        }

        .pair-item img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Chart */
        .chart-wrapper {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            height: 480px;
            overflow: hidden;
        }

        #tradingview-chart {
            width: 100%;
            height: 100%;
        }

        /* ============================================= */
        /* RIGHT COLUMN: TRADE BOX + TRADE HISTORY */
        /* ============================================= */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Trade Box */
        .trade-box {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 18px;
        }

        .order-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .order-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-hover);
        }

        .order-tab.buy.active {
            background: var(--positive);
            color: white;
        }

        .order-tab.sell.active {
            background: var(--negative);
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .balance-hint {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .order-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }

        .order-btn.buy {
            background: var(--positive);
            color: white;
        }

        .order-btn.sell {
            background: var(--negative);
            color: white;
        }

        .insufficient-message {
            display: none;
        }

        .insufficient-message .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        /* Trade History */
        .history-box {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-row {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr 0.8fr;
            padding: 8px 12px;
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .empty-history {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* ============================================= */
        /* FOOTER - SCROLLING MARKET TICKER */
        /* ============================================= */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 100;
        }

        .ticker-scroll {
            display: inline-block;
            animation: tickerScroll 40s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            margin: 0 20px;
            font-size: 0.75rem;
        }

        .ticker-item .pos { color: var(--positive); }
        .ticker-item .neg { color: var(--negative); }

        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Notification */
        .notification-center {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 10000;
            max-width: 340px;
        }

        .notification {
            background: var(--bg-hover);
            border-left: 4px solid;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }

        /* Responsive */
        @media (max-width: 1100px) {
            .trading-grid {
                grid-template-columns: 28% 44% 28%;
            }
            .stats-area {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
            .left-column, .right-column {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
    <div><i class="fas fa-chart-line"></i> Loading Trading Platform...</div>
</div>

<!-- ========== HEADER: Logo | Pair Selector | Price | 24h Stats | Actions ========== -->
<div class="main-header">
    <div class="header-content">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="Logo">
            <span class="logo-text">₿itHash</span>
        </div>
        
        <div class="pair-selector-area" id="pairSelectorBtn">
            <div class="pair-logos" id="headerLogos">
                <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="BTC">
                <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" alt="USDT">
            </div>
            <span class="pair-name" id="headerPairName">BTC/USDT</span>
        </div>
        
        <div class="price-area">
            <div class="current-price" id="headerPrice">$0.00</div>
            <span class="price-change" id="headerChange">0.00%</span>
        </div>
        
        <div class="stats-area">
            <div class="stat-item"><div class="stat-label">24h High</div><div class="stat-value" id="statHigh">$0.00</div></div>
            <div class="stat-item"><div class="stat-label">24h Low</div><div class="stat-value" id="statLow">$0.00</div></div>
            <div class="stat-item"><div class="stat-label">24h Volume</div><div class="stat-value" id="statVolume">0</div></div>
            <div class="stat-item"><div class="stat-label">24h Change</div><div class="stat-value" id="statChange">0.00%</div></div>
        </div>
        
        <div class="actions-area" id="authButtons">
            <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</div>

<!-- User Balance Bar -->
<div class="user-balance-bar" id="userBalanceBar" style="display: none;">
    <div class="user-balance-content">
        <div class="balance-item">
            <i class="fas fa-coins"></i>
            <span id="assetBalance">0.00000000</span>
            <span id="assetSymbol">BTC</span>
        </div>
        <button class="btn btn-outline" onclick="window.location.href='deposit.html'" style="padding: 4px 12px;">Deposit</button>
    </div>
</div>

<div class="notification-center" id="notificationCenter"></div>

<!-- ========== MAIN TRADING LAYOUT ========== -->
<div class="trading-container">
    <div class="trading-grid">
        
        <!-- LEFT COLUMN: ORDER BOOK + RECENT TRADES -->
        <div class="left-column">
            <!-- Order Book -->
            <div class="panel">
                <div class="panel-title"><i class="fas fa-book"></i> ORDER BOOK</div>
                <div class="order-book-header">
                    <span>Price (USDT)</span>
                    <span>Amount</span>
                    <span>Total</span>
                </div>
                <div id="orderBookAsks"></div>
                <div class="spread-info" id="spreadInfo">Spread: <span style="color:var(--accent)">0.00</span> (0.00%)</div>
                <div id="orderBookBids"></div>
            </div>
            
            <!-- Recent Trades -->
            <div class="panel">
                <div class="panel-title"><i class="fas fa-clock"></i> RECENT TRADES</div>
                <div class="trades-list" id="recentTradesList"></div>
            </div>
        </div>
        
        <!-- CENTER COLUMN: CHART (BIGGEST) -->
        <div class="center-column">
            <div class="pair-search-container">
                <input type="text" class="pair-search-input" id="pairSearchInput" placeholder="Search pair (BTCUSDT, ETHUSDT)...">
                <div id="pairDropdown" class="pair-dropdown" style="display: none;"></div>
            </div>
            <div class="chart-wrapper">
                <div id="tradingview-chart"></div>
            </div>
        </div>
        
        <!-- RIGHT COLUMN: TRADE BOX + TRADE HISTORY -->
        <div class="right-column">
            <!-- Trade Box -->
            <div class="trade-box">
                <div class="order-tabs">
                    <div class="order-tab buy active" id="tabBuy" onclick="setOrderSide('buy')">BUY</div>
                    <div class="order-tab sell" id="tabSell" onclick="setOrderSide('sell')">SELL</div>
                </div>
                <div id="tradeFormContent">
                    <div class="form-group">
                        <label>Price (USDT)</label>
                        <input type="number" class="form-input" id="orderPrice" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" class="form-input" id="orderAmount" step="0.0001">
                        <div class="balance-hint">
                            <span id="balanceHint">Available: 0.00000000</span>
                            <span id="totalValue">≈ $0.00</span>
                        </div>
                    </div>
                    <button class="order-btn buy" id="orderSubmitBtn" onclick="executeOrder()">Buy BTC</button>
                </div>
                <div id="insufficientMsg" class="insufficient-message">
                    <div class="action-btns">
                        <button class="btn btn-primary" onclick="window.location.href='deposit.html'">Deposit</button>
                        <button class="btn btn-outline" onclick="window.location.href='dashboard.html?tab=convert'">Convert</button>
                    </div>
                </div>
            </div>
            
            <!-- Trade History - only shows history for current pair -->
            <div class="history-box">
                <div class="panel-title"><i class="fas fa-history"></i> TRADE HISTORY</div>
                <div class="history-list" id="tradeHistoryList">
                    <div class="empty-history">No trades for this pair</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ========== FOOTER: SCROLLING MARKET TICKER ========== -->
<div class="footer-ticker" id="footerTicker"></div>

<script>
    // =============================================
    // GLOBAL STATE
    // =============================================
    let currentPairSymbol = 'BTCUSDT';
    let currentPairBase = 'BTC';
    let currentPairQuote = 'USDT';
    let currentPrice = 0;
    let currentChange24h = 0;
    let orderSide = 'buy';
    let userAssets = {};
    let userMainBalance = 0;
    let userMaturedBalance = 0;
    let allPairs = [];
    let usdtPairs = [];
    let isLoggedIn = false;
    let tickerInterval, orderBookInterval, tradesInterval;
    
    const logoCache = {};
    
    // =============================================
    // HELPERS
    // =============================================
    function formatNumber(num, decimals = 8) {
        if (num === null || num === undefined) return '0.00000000';
        return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }
    
    function formatUSD(num) {
        if (num === null || num === undefined) return '$0.00';
        return '$' + parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    
    function showNotification(type, title, message) {
        const container = document.getElementById('notificationCenter');
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), 5000);
    }
    
    // =============================================
    // FETCH LOGOS - ACCURATE & SPECIFIC
    // =============================================
    async function fetchAssetLogo(assetSymbol) {
        if (logoCache[assetSymbol]) return logoCache[assetSymbol];
        
        const assetMap = {
            'btc': 'bitcoin', 'eth': 'ethereum', 'usdt': 'tether', 'bnb': 'binancecoin',
            'sol': 'solana', 'xrp': 'xrp', 'ada': 'cardano', 'doge': 'dogecoin',
            'trx': 'tron', 'dot': 'polkadot', 'matic': 'polygon', 'ltc': 'litecoin',
            'avax': 'avalanche-2', 'shib': 'shiba-inu', 'uni': 'uniswap', 'link': 'chainlink'
        };
        
        const coinId = assetMap[assetSymbol.toLowerCase()];
        if (!coinId) {
            logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            return logoCache[assetSymbol];
        }
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}`);
            if (response.ok) {
                const data = await response.json();
                const logo = data.image?.small;
                if (logo) {
                    logoCache[assetSymbol] = logo;
                    return logo;
                }
            }
        } catch (e) {}
        
        logoCache[assetSymbol] = 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
        return logoCache[assetSymbol];
    }
    
    async function updateHeaderLogos() {
        const baseLogo = await fetchAssetLogo(currentPairBase);
        const quoteLogo = await fetchAssetLogo(currentPairQuote);
        document.getElementById('headerLogos').innerHTML = `<img src="${baseLogo}"><img src="${quoteLogo}">`;
    }
    
    // =============================================
    // FETCH BINANCE PAIRS
    // =============================================
    async function fetchBinancePairs() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            if (response.ok) {
                const data = await response.json();
                allPairs = data.symbols.filter(s => s.status === 'TRADING').map(s => ({
                    symbol: s.symbol, baseAsset: s.baseAsset, quoteAsset: s.quoteAsset
                }));
                usdtPairs = allPairs.filter(p => p.quoteAsset === 'USDT');
                return true;
            }
        } catch (e) { console.error(e); }
        return false;
    }
    
    // =============================================
    // SELECT PAIR - FULL PAGE RELOAD
    // =============================================
    function selectPair(pairSymbol) {
        if (pairSymbol === currentPairSymbol) return;
        window.location.href = `trading.html?symbol=${pairSymbol}`;
    }
    
    // =============================================
    // LOAD TRADE HISTORY FOR CURRENT PAIR FROM DB
    // =============================================
    async function loadTradeHistory() {
        const token = localStorage.getItem('jwtToken');
        const historyContainer = document.getElementById('tradeHistoryList');
        
        if (!token) {
            historyContainer.innerHTML = '<div class="empty-history">Login to view history</div>';
            return;
        }
        
        try {
            const response = await fetch(`https://bithash-backend-1.onrender.com/api/trading/history?symbol=${currentPairSymbol}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const trades = await response.json();
                if (trades && trades.length > 0) {
                    historyContainer.innerHTML = trades.map(t => `
                        <div class="history-row">
                            <span style="color: ${t.side === 'buy' ? '#228B22' : '#FF0000'}">${t.side.toUpperCase()}</span>
                            <span>${formatNumber(t.amount, 4)}</span>
                            <span>${formatUSD(t.price)}</span>
                            <span>${new Date(t.timestamp).toLocaleTimeString()}</span>
                        </div>
                    `).join('');
                } else {
                    historyContainer.innerHTML = '<div class="empty-history">No trades for this pair</div>';
                }
            } else {
                historyContainer.innerHTML = '<div class="empty-history">Unable to load history</div>';
            }
        } catch (error) {
            historyContainer.innerHTML = '<div class="empty-history">Error loading history</div>';
        }
    }
    
    // =============================================
    // USER BALANCES
    // =============================================
    async function fetchUserBalances() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            isLoggedIn = false;
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userBalanceBar').style.display = 'none';
            return;
        }
        
        isLoggedIn = true;
        document.getElementById('authButtons').style.display = 'none';
        document.getElementById('userBalanceBar').style.display = 'block';
        
        try {
            const balanceRes = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (balanceRes.ok) {
                const data = await balanceRes.json();
                userMainBalance = parseFloat(data.main) || 0;
                userMaturedBalance = parseFloat(data.matured) || 0;
            }
            
            const assetsRes = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (assetsRes.ok) {
                const data = await assetsRes.json();
                userAssets = {};
                data.forEach(a => { userAssets[a.symbol.toLowerCase()] = parseFloat(a.balance) || 0; });
            }
            updateBalanceDisplay();
            loadTradeHistory();
        } catch (e) { console.error(e); }
    }
    
    function updateBalanceDisplay() {
        const balance = userAssets[currentPairBase.toLowerCase()] || 0;
        document.getElementById('assetBalance').textContent = formatNumber(balance, 8);
        document.getElementById('assetSymbol').textContent = currentPairBase;
        document.getElementById('balanceHint').innerHTML = `Available: ${formatNumber(balance, 8)} ${currentPairBase}`;
        
        const hasUSDT = (userMainBalance + userMaturedBalance) > 0;
        const hasBase = balance > 0;
        
        if (orderSide === 'buy') {
            if (hasUSDT) {
                document.getElementById('tradeFormContent').style.display = 'block';
                document.getElementById('insufficientMsg').style.display = 'none';
            } else {
                document.getElementById('tradeFormContent').style.display = 'none';
                document.getElementById('insufficientMsg').style.display = 'block';
            }
        } else {
            if (hasBase) {
                document.getElementById('tradeFormContent').style.display = 'block';
                document.getElementById('insufficientMsg').style.display = 'none';
            } else {
                document.getElementById('tradeFormContent').style.display = 'none';
                document.getElementById('insufficientMsg').style.display = 'block';
            }
        }
    }
    
    // =============================================
    // TRADINGVIEW CHART - EXACT PAIR MATCH
    // =============================================
    let tvWidget = null;
    function createChart() {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        if (typeof TradingView !== 'undefined') {
            tvWidget = new TradingView.widget({
                autosize: true,
                symbol: `BINANCE:${currentPairSymbol}`,
                interval: "15",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                toolbar_bg: "#151A21",
                enable_publishing: false,
                allow_symbol_change: false,
                container_id: "tradingview-chart",
                studies: ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center;">Loading Chart...</div>';
        }
    }
    
    // =============================================
    // BINANCE REAL-TIME DATA
    // =============================================
    async function fetchTicker() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPairSymbol}`);
            if (res.ok) {
                const d = await res.json();
                currentPrice = parseFloat(d.lastPrice);
                currentChange24h = parseFloat(d.priceChangePercent);
                
                document.getElementById('headerPrice').textContent = formatUSD(currentPrice);
                const changeClass = currentChange24h >= 0 ? 'positive' : 'negative';
                const sign = currentChange24h >= 0 ? '+' : '';
                document.getElementById('headerChange').textContent = `${sign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('headerChange').className = `price-change ${changeClass}`;
                document.getElementById('statChange').textContent = `${sign}${currentChange24h.toFixed(2)}%`;
                document.getElementById('statHigh').textContent = formatUSD(parseFloat(d.highPrice));
                document.getElementById('statLow').textContent = formatUSD(parseFloat(d.lowPrice));
                document.getElementById('statVolume').textContent = `${formatNumber(parseFloat(d.volume), 0)} ${currentPairBase}`;
                document.getElementById('orderPrice').value = currentPrice.toFixed(2);
                updateTotal();
            }
        } catch (e) {}
    }
    
    async function fetchOrderBook() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPairSymbol}&limit=10`);
            if (res.ok) {
                const data = await res.json();
                const asksDiv = document.getElementById('orderBookAsks');
                asksDiv.innerHTML = data.asks.slice(0, 8).reverse().map(a => {
                    const price = parseFloat(a[0]), amount = parseFloat(a[1]);
                    return `<div class="order-row" onclick="setPrice(${price})"><span class="price-negative">${formatUSD(price)}</span><span>${formatNumber(amount, 4)}</span><span>${formatUSD(price * amount)}</span></div>`;
                }).join('');
                
                const bidsDiv = document.getElementById('orderBookBids');
                bidsDiv.innerHTML = data.bids.slice(0, 8).map(b => {
                    const price = parseFloat(b[0]), amount = parseFloat(b[1]);
                    return `<div class="order-row" onclick="setPrice(${price})"><span class="price-positive">${formatUSD(price)}</span><span>${formatNumber(amount, 4)}</span><span>${formatUSD(price * amount)}</span></div>`;
                }).join('');
                
                const spread = parseFloat(data.asks[0][0]) - parseFloat(data.bids[0][0]);
                const spreadPercent = (spread / parseFloat(data.asks[0][0])) * 100;
                document.getElementById('spreadInfo').innerHTML = `Spread: <span style="color:var(--accent)">${formatUSD(spread)}</span> (${spreadPercent.toFixed(4)}%)`;
            }
        } catch (e) {}
    }
    
    async function fetchRecentTrades() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPairSymbol}&limit=15`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('recentTradesList').innerHTML = data.map(t => {
                    const isBuy = !t.isBuyerMaker;
                    return `<div class="trade-row"><span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span><span>${formatUSD(parseFloat(t.price))}</span><span>${formatNumber(parseFloat(t.qty), 4)}</span><span style="font-size:0.65rem;">${new Date(t.time).toLocaleTimeString()}</span></div>`;
                }).join('');
            }
        } catch (e) {}
    }
    
    function setPrice(price) {
        document.getElementById('orderPrice').value = price.toFixed(2);
        updateTotal();
    }
    
    function updateTotal() {
        const amount = parseFloat(document.getElementById('orderAmount').value) || 0;
        const price = parseFloat(document.getElementById('orderPrice').value) || 0;
        document.getElementById('totalValue').innerHTML = `≈ ${formatUSD(amount * price)}`;
    }
    
    function setOrderSide(side) {
        orderSide = side;
        const buyTab = document.getElementById('tabBuy');
        const sellTab = document.getElementById('tabSell');
        const btn = document.getElementById('orderSubmitBtn');
        
        if (side === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            btn.className = 'order-btn buy';
            btn.innerHTML = `Buy ${currentPairBase}`;
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            btn.className = 'order-btn sell';
            btn.innerHTML = `Sell ${currentPairBase}`;
        }
        updateBalanceDisplay();
    }
    
    async function executeOrder() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            showNotification('error', 'Auth Required', 'Please login to trade');
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }
        
        const price = parseFloat(document.getElementById('orderPrice').value);
        const amount = parseFloat(document.getElementById('orderAmount').value);
        if (!amount || amount <= 0) {
            showNotification('error', 'Invalid', 'Enter valid amount');
            return;
        }
        
        const total = price * amount;
        
        if (orderSide === 'buy') {
            const available = userMainBalance + userMaturedBalance;
            if (total > available) {
                showNotification('error', 'Insufficient USDT', `Need ${formatUSD(total)}`);
                return;
            }
        } else {
            const available = userAssets[currentPairBase.toLowerCase()] || 0;
            if (amount > available) {
                showNotification('error', 'Insufficient', `You have ${formatNumber(available, 8)} ${currentPairBase}`);
                return;
            }
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ symbol: currentPairSymbol, side: orderSide, type: 'market', price, amount, total })
            });
            
            if (response.ok) {
                showNotification('success', 'Order Executed', `${orderSide.toUpperCase()} ${formatNumber(amount, 6)} ${currentPairBase}`);
                document.getElementById('orderAmount').value = '';
                updateTotal();
                await fetchUserBalances();
                await loadTradeHistory();
            } else {
                const err = await response.json();
                showNotification('error', 'Failed', err.message || 'Try again');
            }
        } catch (e) {
            showNotification('error', 'Network Error', 'Please try again');
        }
    }
    
    function startIntervals() {
        if (tickerInterval) clearInterval(tickerInterval);
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        
        fetchTicker(); fetchOrderBook(); fetchRecentTrades();
        tickerInterval = setInterval(fetchTicker, 2000);
        orderBookInterval = setInterval(fetchOrderBook, 1200);
        tradesInterval = setInterval(fetchRecentTrades, 2000);
    }
    
    // =============================================
    // FOOTER TICKER
    // =============================================
    async function initTicker() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            if (res.ok) {
                const data = await res.json();
                const items = data.filter(t => t.symbol.endsWith('USDT')).slice(0, 25).map(t => {
                    const ch = parseFloat(t.priceChangePercent);
                    const cls = ch >= 0 ? 'pos' : 'neg';
                    const sign = ch >= 0 ? '+' : '';
                    return `<span class="ticker-item">${t.symbol.replace('USDT', '/USDT')}: ${formatUSD(parseFloat(t.lastPrice))} <span class="${cls}">${sign}${ch.toFixed(2)}%</span></span>`;
                }).join('');
                document.getElementById('footerTicker').innerHTML = `<div class="ticker-scroll">${items.repeat(2)}</div>`;
            }
        } catch (e) {}
    }
    
    // =============================================
    // PAIR SEARCH DROPDOWN
    // =============================================
    async function setupSearch() {
        const input = document.getElementById('pairSearchInput');
        const dropdown = document.getElementById('pairDropdown');
        
        input.addEventListener('input', async (e) => {
            const term = e.target.value.toUpperCase();
            if (term.length < 1) { dropdown.style.display = 'none'; return; }
            const matches = usdtPairs.filter(p => p.symbol.includes(term)).slice(0, 12);
            if (matches.length) {
                dropdown.style.display = 'block';
                let html = '';
                for (const p of matches) {
                    const logo = await fetchAssetLogo(p.baseAsset);
                    html += `<div class="pair-item" onclick="selectPair('${p.symbol}')"><img src="${logo}"><div><strong>${p.baseAsset}/${p.quoteAsset}</strong><div style="font-size:10px;">${p.symbol}</div></div></div>`;
                }
                dropdown.innerHTML = html;
            } else {
                dropdown.style.display = 'none';
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }
    
    // =============================================
    // INIT
    // =============================================
    async function init() {
        await fetchBinancePairs();
        
        const urlSymbol = new URLSearchParams(window.location.search).get('symbol');
        if (urlSymbol) {
            let sym = urlSymbol.toUpperCase();
            if (!sym.includes('USDT')) sym += 'USDT';
            if (allPairs.some(p => p.symbol === sym)) currentPairSymbol = sym;
        }
        
        const pairInfo = allPairs.find(p => p.symbol === currentPairSymbol);
        if (pairInfo) {
            currentPairBase = pairInfo.baseAsset;
            currentPairQuote = pairInfo.quoteAsset;
        }
        
        document.getElementById('headerPairName').textContent = `${currentPairBase}/${currentPairQuote}`;
        document.title = `${currentPairBase}/${currentPairQuote} | BitHash Trading`;
        
        await updateHeaderLogos();
        await fetchUserBalances();
        await initTicker();
        createChart();
        startIntervals();
        setupSearch();
        
        document.getElementById('orderAmount').addEventListener('input', updateTotal);
        
        document.getElementById('loading-overlay').classList.add('hidden');
        
        setInterval(() => { if (isLoggedIn) fetchUserBalances(); }, 30000);
    }
    
    window.setPrice = setPrice;
    window.setOrderSide = setOrderSide;
    window.executeOrder = executeOrder;
    window.selectPair = selectPair;
    
    init();
</script>
</body>
</html>
