<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BitHash | Advanced Trading Panel</title>
    <meta name="description" content="Professional cryptocurrency trading platform with real-time order book, charting, and instant execution.">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Widget -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --primary: #F7A600;
            --success: #228B22;
            --error: #FF0000;
            --warning: #FFB800;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* Header Styles */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo img { height: 32px; width: auto; }
        .logo-text { font-family: 'Rowdies', sans-serif; font-weight: 700; font-size: 1.3rem; color: white; }
        
        .btn {
            padding: 10px 20px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary { background: var(--accent); color: #000000; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--text-primary); border: 1px solid #2A2F36; }
        .btn-outline:hover { background: rgba(247, 166, 0, 0.1); border-color: var(--accent); }
        
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-hover);
            padding: 12px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 100;
            border-left: 4px solid var(--success);
            border: 1px solid var(--border);
        }
        
        /* Trading Page Specific */
        .trading-section {
            padding: 100px 0 40px;
        }
        
        .trading-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* Order Book Panel */
        .order-book-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .order-book-header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .order-book-asks, .order-book-bids {
            flex: 1;
            overflow-y: auto;
        }
        
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .order-row:hover { background: var(--bg-hover); }
        .order-price.positive { color: var(--positive); }
        .order-price.negative { color: var(--negative); }
        .order-amount, .order-total { color: var(--text-secondary); }
        
        .current-market-price {
            text-align: center;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 8px 0;
            color: var(--accent);
        }
        
        /* Chart Panel */
        .chart-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            height: 500px;
        }
        
        #tradingview-chart { width: 100%; height: 100%; }
        
        /* Recent Trades */
        .recent-trades-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .recent-trades-header {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .trades-list { flex: 1; overflow-y: auto; }
        .trade-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        .trade-buy { color: var(--positive); }
        .trade-sell { color: var(--negative); }
        
        /* Order Entry Panel */
        .order-entry-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-hover);
            transition: all 0.2s;
        }
        
        .order-tab.buy.active { background: var(--positive); color: white; }
        .order-tab.sell.active { background: var(--negative); color: white; }
        
        .order-form-group { margin-bottom: 16px; }
        .order-form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        
        .order-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .order-input:focus { outline: none; border-color: var(--accent); }
        
        .order-balance-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .order-action-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        
        .order-action-btn.buy { background: var(--positive); color: white; }
        .order-action-btn.sell { background: var(--negative); color: white; }
        .order-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Asset Info Header */
        .asset-info-header {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .asset-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .asset-details img { width: 48px; height: 48px; border-radius: 50%; }
        .asset-name { font-size: 1.5rem; font-weight: 700; }
        .asset-symbol { color: var(--text-secondary); font-size: 0.9rem; }
        .asset-price { font-size: 1.8rem; font-weight: 700; }
        .asset-change { font-size: 0.9rem; padding: 4px 8px; border-radius: 20px; }
        .asset-change.positive { color: var(--positive); background: rgba(34,139,34,0.1); }
        .asset-change.negative { color: var(--negative); background: rgba(255,0,0,0.1); }
        
        .insufficient-balance-banner {
            background: rgba(255,0,0,0.1);
            border: 1px solid var(--negative);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .insufficient-balance-banner p { color: var(--negative); font-weight: 500; }
        .action-buttons-group { display: flex; gap: 12px; }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .back-link:hover { color: var(--accent); }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11,14,17,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg-surface);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            border: 1px solid var(--border);
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        
        .modal.active .modal-content { transform: translateY(0); }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .notification-center {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { border-left-color: var(--success); }
        .notification.error { border-left-color: var(--error); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 1024px) {
            .trading-layout { grid-template-columns: 1fr; gap: 15px; }
            .order-book-panel, .chart-panel, .recent-trades-panel { height: 400px; }
        }
        
        @media (max-width: 768px) {
            .asset-info-header { flex-direction: column; align-items: flex-start; }
            .asset-price { font-size: 1.4rem; }
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
    </style>
</head>
<body>

<div class="security-badge">
    <i class="fas fa-shield-alt"></i>
    <span>256-bit AES & TLS 1.3 Encrypted</span>
</div>

<div class="notification-center" id="notification-center"></div>

<header>
    <div class="container header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo">
            <span class="logo-text"><span>₿</span>itHash</span>
        </div>
        <div class="auth-buttons" id="auth-buttons"></div>
    </div>
</header>

<section class="trading-section">
    <div class="container">
        <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Back to Markets</a>
        
        <div class="asset-info-header" id="asset-info-header">
            <div class="asset-details">
                <img id="asset-logo" src="" alt="">
                <div>
                    <div class="asset-name" id="asset-name">Loading...</div>
                    <div class="asset-symbol" id="asset-symbol"></div>
                </div>
            </div>
            <div>
                <div class="asset-price" id="asset-price">$0.00</div>
                <div class="asset-change" id="asset-change">0.00%</div>
            </div>
        </div>
        
        <div id="insufficient-balance-banner" class="insufficient-balance-banner" style="display: none;">
            <p><i class="fas fa-exclamation-triangle"></i> Insufficient USD balance to place this order</p>
            <div class="action-buttons-group">
                <button class="btn btn-primary" id="deposit-btn-banner"><i class="fas fa-plus-circle"></i> Deposit</button>
                <button class="btn btn-outline" id="convert-btn-banner"><i class="fas fa-exchange-alt"></i> Convert</button>
            </div>
        </div>
        
        <div class="trading-layout">
            <!-- Order Book Panel -->
            <div class="order-book-panel">
                <div class="order-book-header">
                    <span>Price (USD)</span>
                    <span>Amount</span>
                    <span>Total</span>
                </div>
                <div class="order-book-asks" id="order-book-asks"></div>
                <div class="current-market-price" id="current-market-price">$0.00</div>
                <div class="order-book-bids" id="order-book-bids"></div>
            </div>
            
            <!-- Chart Panel -->
            <div class="chart-panel">
                <div id="tradingview-chart"></div>
            </div>
            
            <!-- Recent Trades -->
            <div class="recent-trades-panel">
                <div class="recent-trades-header">Recent Trades</div>
                <div class="trades-list" id="recent-trades-list"></div>
            </div>
        </div>
        
        <!-- Order Entry Panel -->
        <div class="order-entry-panel">
            <div class="order-tabs">
                <div class="order-tab buy active" data-tab="buy">Buy</div>
                <div class="order-tab sell" data-tab="sell">Sell</div>
            </div>
            <div class="order-form-group">
                <label>Price (USD)</label>
                <input type="number" id="order-price" class="order-input" step="0.01" placeholder="Market Price">
            </div>
            <div class="order-form-group">
                <label>Amount (USD)</label>
                <input type="number" id="order-amount" class="order-input" step="10" placeholder="Enter amount in USD">
                <div class="order-balance-info">
                    <span>Available USD: <strong id="available-usd">$0.00</strong></span>
                    <span>≈ <span id="estimated-crypto">0.000000</span> <span id="asset-symbol-small">BTC</span></span>
                </div>
            </div>
            <button class="order-action-btn buy" id="execute-order-btn">Buy</button>
        </div>
    </div>
</section>

<div class="modal" id="convert-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Convert Crypto</h3>
            <button class="modal-close" onclick="closeConvertModal()">&times;</button>
        </div>
        <div class="modal-body" id="convert-modal-body">
            <div class="form-group">
                <label>Select asset to convert from</label>
                <select id="convert-from-asset" class="order-input"></select>
            </div>
            <div class="form-group">
                <label>Select asset to convert to</label>
                <select id="convert-to-asset" class="order-input"></select>
            </div>
            <div class="form-group">
                <label>Amount to convert</label>
                <input type="number" id="convert-amount" class="order-input" placeholder="Enter amount">
            </div>
            <div class="order-balance-info" id="convert-info"></div>
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="executeConvert()">Convert</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // PRODUCTION READY TRADING PAGE
    // ============================================
    
    let currentAsset = null;
    let currentPrices = {};
    let userBalances = { main: 0, active: 0, matured: 0 };
    let userAssets = [];
    let socket = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let currentOrderTab = 'buy';
    let assetId = null;
    let token = localStorage.getItem('jwtToken');
    
    // Get asset from URL (complex session-based parameter)
    const urlParams = new URLSearchParams(window.location.search);
    const symbolFromUrl = urlParams.get('symbol');
    const sessionId = urlParams.get('session');
    
    if (!symbolFromUrl) {
        window.location.href = 'index.html';
    }
    
    // Top assets mapping
    const topAssetsList = [
        { id: 'bitcoin', symbol: 'btc', name: 'Bitcoin', logo: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png' },
        { id: 'ethereum', symbol: 'eth', name: 'Ethereum', logo: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png' },
        { id: 'solana', symbol: 'sol', name: 'Solana', logo: 'https://assets.coingecko.com/coins/images/4128/large/solana.png' },
        { id: 'binancecoin', symbol: 'bnb', name: 'BNB', logo: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png' },
        { id: 'ripple', symbol: 'xrp', name: 'XRP', logo: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png' },
        { id: 'dogecoin', symbol: 'doge', name: 'Dogecoin', logo: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png' },
        { id: 'cardano', symbol: 'ada', name: 'Cardano', logo: 'https://assets.coingecko.com/coins/images/975/large/cardano.png' }
    ];
    
    function getAssetBySymbol(symbol) {
        return topAssetsList.find(a => a.symbol === symbol.toLowerCase()) || topAssetsList[0];
    }
    
    // Initialize
    async function init() {
        currentAsset = getAssetBySymbol(symbolFromUrl);
        assetId = currentAsset.id;
        
        document.getElementById('asset-logo').src = currentAsset.logo;
        document.getElementById('asset-name').textContent = currentAsset.name;
        document.getElementById('asset-symbol').textContent = currentAsset.symbol.toUpperCase();
        document.getElementById('asset-symbol-small').textContent = currentAsset.symbol.toUpperCase();
        
        await checkAuthAndFetchBalances();
        await fetchMarketData();
        await fetchUserAssets();
        initSocket();
        startPolling();
        
        // Setup event listeners
        document.querySelectorAll('.order-tab').forEach(tab => {
            tab.addEventListener('click', () => switchOrderTab(tab.dataset.tab));
        });
        
        document.getElementById('order-amount').addEventListener('input', updateEstimatedCrypto);
        document.getElementById('order-price').addEventListener('input', updateEstimatedCrypto);
        document.getElementById('execute-order-btn').addEventListener('click', executeOrder);
        
        document.getElementById('deposit-btn-banner').addEventListener('click', () => window.location.href = 'deposit.html');
        document.getElementById('convert-btn-banner').addEventListener('click', openConvertModal);
        
        // Load TradingView chart after DOM
        setTimeout(() => createTradingViewChart(), 500);
    }
    
    async function checkAuthAndFetchBalances() {
        token = localStorage.getItem('jwtToken');
        const authButtons = document.getElementById('auth-buttons');
        
        if (!token) {
            authButtons.innerHTML = `
                <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
                <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
            `;
            userBalances.main = 0;
            updateBalanceDisplay();
            return;
        }
        
        authButtons.innerHTML = `<button class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/balances', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                userBalances.main = parseFloat(data.main) || 0;
                userBalances.active = parseFloat(data.active) || 0;
                userBalances.matured = parseFloat(data.matured) || 0;
                updateBalanceDisplay();
                
                // Also fetch user assets for convert
                await fetchUserAssets();
            }
        } catch (error) {
            console.error('Balance fetch error:', error);
        }
    }
    
    async function fetchUserAssets() {
        if (!token) return;
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/users/assets', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                userAssets = await response.json();
                populateConvertModalAssets();
            }
        } catch (error) {
            console.error('Assets fetch error:', error);
        }
    }
    
    async function fetchMarketData() {
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/market/assets');
            if (response.ok) {
                const data = await response.json();
                if (data.data) {
                    data.data.forEach(asset => {
                        if (asset.id === assetId || asset.symbol === currentAsset.symbol) {
                            currentPrices = { usd: asset.current_price || 0, change24h: asset.price_change_percentage_24h || 0 };
                            updateAssetPriceDisplay(asset.current_price || 0, asset.price_change_percentage_24h || 0);
                            document.getElementById('order-price').value = (asset.current_price || 0).toFixed(2);
                        }
                    });
                }
            }
        } catch (error) {
            console.error('Market data fetch error:', error);
        }
    }
    
    function updateAssetPriceDisplay(price, change) {
        document.getElementById('asset-price').textContent = formatUSD(price);
        const changeElem = document.getElementById('asset-change');
        changeElem.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
        changeElem.className = `asset-change ${change >= 0 ? 'positive' : 'negative'}`;
        document.getElementById('current-market-price').textContent = formatUSD(price);
    }
    
    function updateBalanceDisplay() {
        const totalUsd = userBalances.main + userBalances.matured;
        document.getElementById('available-usd').textContent = formatUSD(totalUsd);
        
        const insufficient = totalUsd < 10;
        document.getElementById('insufficient-balance-banner').style.display = insufficient ? 'flex' : 'none';
        document.getElementById('execute-order-btn').disabled = insufficient;
    }
    
    function updateEstimatedCrypto() {
        const amount = parseFloat(document.getElementById('order-amount').value) || 0;
        const price = parseFloat(document.getElementById('order-price').value) || currentPrices.usd || 0;
        if (price > 0) {
            const cryptoAmount = amount / price;
            document.getElementById('estimated-crypto').textContent = cryptoAmount.toFixed(6);
        } else {
            document.getElementById('estimated-crypto').textContent = '0.000000';
        }
    }
    
    function switchOrderTab(tab) {
        currentOrderTab = tab;
        const buyTab = document.querySelector('.order-tab.buy');
        const sellTab = document.querySelector('.order-tab.sell');
        const actionBtn = document.getElementById('execute-order-btn');
        
        if (tab === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            actionBtn.className = 'order-action-btn buy';
            actionBtn.textContent = 'Buy';
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            actionBtn.className = 'order-action-btn sell';
            actionBtn.textContent = 'Sell';
        }
    }
    
    async function executeOrder() {
        if (!token) {
            showNotification('error', 'Authentication Required', 'Please login to trade');
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }
        
        const amountUSD = parseFloat(document.getElementById('order-amount').value);
        const price = parseFloat(document.getElementById('order-price').value);
        
        if (!amountUSD || amountUSD < 10) {
            showNotification('error', 'Invalid Amount', 'Minimum order amount is $10 USD');
            return;
        }
        
        const totalUsd = userBalances.main + userBalances.matured;
        if (amountUSD > totalUsd) {
            showNotification('error', 'Insufficient Balance', `You have ${formatUSD(totalUsd)} available. Please deposit.`);
            document.getElementById('insufficient-balance-banner').style.display = 'flex';
            return;
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/trading/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    symbol: currentAsset.symbol,
                    side: currentOrderTab,
                    type: 'market',
                    amount: amountUSD,
                    price: price || currentPrices.usd
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                showNotification('success', 'Order Placed', `${currentOrderTab.toUpperCase()} order for ${formatUSD(amountUSD)} executed successfully`);
                document.getElementById('order-amount').value = '';
                await checkAuthAndFetchBalances();
                updateEstimatedCrypto();
                await fetchRecentTrades();
            } else {
                const error = await response.json();
                showNotification('error', 'Order Failed', error.message || 'Unable to place order');
            }
        } catch (error) {
            showNotification('error', 'Network Error', 'Failed to connect to trading engine');
        }
    }
    
    async function fetchOrderBook() {
        try {
            const response = await fetch(`https://bithash-backend-1.onrender.com/api/market/orderbook/${currentAsset.symbol}`);
            if (response.ok) {
                const data = await response.json();
                renderOrderBook(data);
            }
        } catch (error) {
            console.error('Order book fetch error:', error);
        }
    }
    
    function renderOrderBook(orderBook) {
        const asksContainer = document.getElementById('order-book-asks');
        const bidsContainer = document.getElementById('order-book-bids');
        
        asksContainer.innerHTML = '';
        bidsContainer.innerHTML = '';
        
        if (orderBook.asks) {
            orderBook.asks.slice(0, 10).forEach(ask => {
                const [price, amount] = ask;
                const total = price * amount;
                const row = document.createElement('div');
                row.className = 'order-row';
                row.onclick = () => document.getElementById('order-price').value = price.toFixed(2);
                row.innerHTML = `
                    <span class="order-price negative">$${price.toFixed(2)}</span>
                    <span class="order-amount">${amount.toFixed(4)}</span>
                    <span class="order-total">$${total.toFixed(2)}</span>
                `;
                asksContainer.appendChild(row);
            });
        }
        
        if (orderBook.bids) {
            orderBook.bids.slice(0, 10).forEach(bid => {
                const [price, amount] = bid;
                const total = price * amount;
                const row = document.createElement('div');
                row.className = 'order-row';
                row.onclick = () => document.getElementById('order-price').value = price.toFixed(2);
                row.innerHTML = `
                    <span class="order-price positive">$${price.toFixed(2)}</span>
                    <span class="order-amount">${amount.toFixed(4)}</span>
                    <span class="order-total">$${total.toFixed(2)}</span>
                `;
                bidsContainer.appendChild(row);
            });
        }
    }
    
    async function fetchRecentTrades() {
        try {
            const response = await fetch(`https://bithash-backend-1.onrender.com/api/market/trades/${currentAsset.symbol}?limit=20`);
            if (response.ok) {
                const data = await response.json();
                renderRecentTrades(data);
            }
        } catch (error) {
            console.error('Trades fetch error:', error);
        }
    }
    
    function renderRecentTrades(trades) {
        const container = document.getElementById('recent-trades-list');
        if (!container) return;
        container.innerHTML = '';
        
        if (!trades || trades.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">No recent trades</div>';
            return;
        }
        
        trades.slice(0, 20).forEach(trade => {
            const row = document.createElement('div');
            row.className = 'trade-row';
            const isBuy = trade.side === 'buy';
            row.innerHTML = `
                <span class="${isBuy ? 'trade-buy' : 'trade-sell'}">${isBuy ? 'BUY' : 'SELL'}</span>
                <span>$${trade.price.toFixed(2)}</span>
                <span>${trade.amount.toFixed(4)}</span>
                <span>${new Date(trade.timestamp).toLocaleTimeString()}</span>
            `;
            container.appendChild(row);
        });
    }
    
    function createTradingViewChart() {
        const container = document.getElementById('tradingview-chart');
        if (!container) return;
        container.innerHTML = '';
        
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": `${currentAsset.symbol.toUpperCase()}USD`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--gray);">Loading chart...</div>';
        }
    }
    
    function initSocket() {
        if (!token) return;
        socket = io('https://bithash-backend-1.onrender.com', {
            transports: ['websocket'],
            auth: { token }
        });
        
        socket.on('connect', () => console.log('Socket connected for trading'));
        socket.on('balance_update', (data) => {
            if (data.main !== undefined) userBalances.main = parseFloat(data.main);
            if (data.matured !== undefined) userBalances.matured = parseFloat(data.matured);
            updateBalanceDisplay();
        });
        
        socket.on('price_update', (prices) => {
            if (prices[currentAsset.symbol] && prices[currentAsset.symbol].price) {
                const newPrice = prices[currentAsset.symbol].price;
                currentPrices.usd = newPrice;
                updateAssetPriceDisplay(newPrice, prices[currentAsset.symbol].change24h || 0);
                if (!document.getElementById('order-price').value) {
                    document.getElementById('order-price').value = newPrice.toFixed(2);
                }
                updateEstimatedCrypto();
            }
        });
    }
    
    function startPolling() {
        fetchOrderBook();
        fetchRecentTrades();
        orderBookInterval = setInterval(fetchOrderBook, 3000);
        tradesInterval = setInterval(fetchRecentTrades, 5000);
    }
    
    function populateConvertModalAssets() {
        const fromSelect = document.getElementById('convert-from-asset');
        const toSelect = document.getElementById('convert-to-asset');
        if (!fromSelect) return;
        
        const cryptoAssets = userAssets.filter(a => a.symbol !== 'usd');
        fromSelect.innerHTML = '<option value="">Select asset</option>';
        toSelect.innerHTML = '<option value="">Select asset</option>';
        
        cryptoAssets.forEach(asset => {
            fromSelect.innerHTML += `<option value="${asset.symbol}">${asset.symbol.toUpperCase()} (${asset.balance.toFixed(6)})</option>`;
        });
        
        topAssetsList.forEach(asset => {
            toSelect.innerHTML += `<option value="${asset.symbol}">${asset.symbol.toUpperCase()}</option>`;
        });
    }
    
    function openConvertModal() {
        populateConvertModalAssets();
        document.getElementById('convert-modal').classList.add('active');
        document.getElementById('convert-amount').value = '';
        document.getElementById('convert-info').innerHTML = '';
    }
    
    function closeConvertModal() {
        document.getElementById('convert-modal').classList.remove('active');
    }
    
    async function executeConvert() {
        if (!token) {
            showNotification('error', 'Login Required', 'Please login to convert');
            closeConvertModal();
            return;
        }
        
        const fromAsset = document.getElementById('convert-from-asset').value;
        const toAsset = document.getElementById('convert-to-asset').value;
        const amount = parseFloat(document.getElementById('convert-amount').value);
        
        if (!fromAsset || !toAsset || !amount || amount <= 0) {
            showNotification('error', 'Invalid Input', 'Please select assets and enter a valid amount');
            return;
        }
        
        try {
            const response = await fetch('https://bithash-backend-1.onrender.com/api/convert', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ fromAsset, toAsset, amount })
            });
            
            if (response.ok) {
                const data = await response.json();
                showNotification('success', 'Conversion Complete', `Converted ${amount} ${fromAsset.toUpperCase()} to ${toAsset.toUpperCase()}`);
                closeConvertModal();
                await checkAuthAndFetchBalances();
                await fetchUserAssets();
            } else {
                const error = await response.json();
                showNotification('error', 'Conversion Failed', error.message || 'Unable to convert');
            }
        } catch (error) {
            showNotification('error', 'Network Error', 'Failed to process conversion');
        }
    }
    
    function formatUSD(num) {
        const n = parseFloat(num) || 0;
        if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
        if (n >= 1e3) return '$' + (n / 1e3).toFixed(2) + 'K';
        return '$' + n.toFixed(2);
    }
    
    function showNotification(type, title, message) {
        const container = document.getElementById('notification-center');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 4000);
    }
    
    function logout() {
        localStorage.removeItem('jwtToken');
        window.location.href = 'index.html';
    }
    
    // Cleanup intervals on page unload
    window.addEventListener('beforeunload', () => {
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        if (socket) socket.disconnect();
    });
    
    init();
</script>
</body>
</html>
