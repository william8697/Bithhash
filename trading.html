<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trading | BitHash Capital</title>
    <meta name="description" content="Professional crypto trading panel with real-time Binance data. Buy and sell cryptocurrencies with USDT pairs.">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- TradingView Charting Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Chart.js for depth visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        /* ============================================= */
        /* COLOR SYSTEM - MATCHING EXISTING PAGE */
        /* ============================================= */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --success: #228B22;
            --error: #FF0000;
            --warning: #FFB800;
            --gold: #D4AF37;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header Styles */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            transition: all 0.3s;
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo img {
            height: 32px;
            width: auto;
        }
        
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000000;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid #2A2F36;
        }
        
        .btn-outline:hover {
            background: rgba(247, 166, 0, 0.1);
            border-color: var(--accent);
        }
        
        .btn-buy {
            background: var(--positive);
            color: white;
        }
        
        .btn-buy:hover {
            background: #1a6e1a;
        }
        
        .btn-sell {
            background: var(--negative);
            color: white;
        }
        
        .btn-sell:hover {
            background: #cc0000;
        }
        
        /* User Balance Bar */
        .user-balance-container {
            width: 100%;
            background-color: var(--bg-surface);
            padding: 8px 0;
            position: fixed;
            top: 70px;
            z-index: 999;
            border-bottom: 1px solid var(--border);
        }
        
        .user-balances {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .user-balance {
            background: rgba(247, 166, 0, 0.1);
            border: 1px solid rgba(247, 166, 0, 0.3);
            border-radius: 12px;
            padding: 8px 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
        }
        
        .balance-asset-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .balance-asset-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        /* Trading Panel Layout */
        .trading-section {
            padding: 140px 0 40px;
        }
        
        .trading-grid {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            gap: 20px;
            margin-top: 20px;
        }
        
        /* Left Panel - Pair Selection & Order Book */
        .left-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        /* Pair Search Section */
        .pair-search-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .pair-search-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .pair-search-container {
            position: relative;
        }
        
        .pair-search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .pair-search-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .pair-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        
        .pair-dropdown.show {
            display: block;
        }
        
        .pair-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }
        
        .pair-option:hover {
            background: var(--bg-card);
        }
        
        .pair-option img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
        
        .pair-option-info {
            flex: 1;
        }
        
        .pair-option-symbol {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .pair-option-name {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .selected-pair-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-hover);
            border-bottom: 1px solid var(--border);
        }
        
        .selected-pair-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .selected-pair-logos {
            display: flex;
            align-items: center;
        }
        
        .selected-pair-logos img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        
        .selected-pair-logos img:first-child {
            margin-right: -8px;
            z-index: 2;
        }
        
        .selected-pair-logos img:last-child {
            z-index: 1;
        }
        
        .selected-pair-symbol {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .selected-pair-price {
            text-align: right;
        }
        
        .current-price {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .price-change {
            font-size: 0.8rem;
        }
        
        .price-change.positive {
            color: var(--positive);
        }
        
        .price-change.negative {
            color: var(--negative);
        }
        
        /* Order Book */
        .order-book-section {
            padding: 16px;
        }
        
        .section-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .order-book-header {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        
        .order-book-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .order-book-row:hover {
            background: var(--bg-hover);
        }
        
        .order-book-price.positive {
            color: var(--positive);
        }
        
        .order-book-price.negative {
            color: var(--negative);
        }
        
        .spread-info {
            text-align: center;
            padding: 12px 0;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 8px 0;
        }
        
        /* Center Panel - Chart & Trading Form */
        .center-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .chart-container {
            height: 400px;
            padding: 16px;
        }
        
        #tradingview-chart {
            width: 100%;
            height: 100%;
        }
        
        .market-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 16px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .stat-value {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 4px;
        }
        
        .trading-form {
            padding: 20px;
        }
        
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-hover);
        }
        
        .order-tab.buy.active {
            background: var(--positive);
            color: white;
        }
        
        .order-tab.sell.active {
            background: var(--negative);
            color: white;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .order-action-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        
        .order-action-btn.buy {
            background: var(--positive);
            color: white;
        }
        
        .order-action-btn.sell {
            background: var(--negative);
            color: white;
        }
        
        .order-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .balance-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        /* Right Panel - Recent Trades & Depth */
        .right-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .recent-trades-section, .depth-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        
        .trade-price.positive {
            color: var(--positive);
        }
        
        .trade-price.negative {
            color: var(--negative);
        }
        
        .depth-canvas {
            height: 200px;
            margin-top: 10px;
        }
        
        /* Notification System */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { background: var(--positive); color: white; }
        .notification.error { background: var(--negative); color: white; }
        .notification.warning { background: var(--warning); color: #000; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .market-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        // Global State
        let allPairs = [];
        let filteredPairs = [];
        let currentPair = { symbol: 'BTCUSDT', baseAsset: 'BTC', quoteAsset: 'USDT', baseName: 'Bitcoin', quoteName: 'Tether' };
        let currentPrices = {};
        let userBalances = { main: 0, matured: 0 };
        let cryptoBalances = {};
        let orderSide = 'buy';
        let depthChart = null;
        let tickerInterval = null;
        let orderBookInterval = null;
        let tradesInterval = null;
        let convertLogic = null;
        
        // Backend API
        const BACKEND_URL = 'https://bithash-backend-1.onrender.com';
        
        // CoinGecko logo cache
        const logoCache = {};
        
        // Fetch all Binance USDT pairs
        async function fetchBinancePairs() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await response.json();
                const usdtPairs = data.symbols.filter(s => s.symbol.endsWith('USDT') && s.status === 'TRADING');
                allPairs = usdtPairs.map(p => ({
                    symbol: p.symbol,
                    baseAsset: p.baseAsset,
                    quoteAsset: p.quoteAsset,
                    baseName: p.baseAsset,
                    quoteName: 'Tether'
                }));
                filteredPairs = [...allPairs];
                return true;
            } catch (error) {
                console.error('Failed to fetch Binance pairs:', error);
                // Fallback top pairs
                allPairs = [
                    { symbol: 'BTCUSDT', baseAsset: 'BTC', quoteAsset: 'USDT', baseName: 'Bitcoin', quoteName: 'Tether' },
                    { symbol: 'ETHUSDT', baseAsset: 'ETH', quoteAsset: 'USDT', baseName: 'Ethereum', quoteName: 'Tether' },
                    { symbol: 'BNBUSDT', baseAsset: 'BNB', quoteAsset: 'USDT', baseName: 'BNB', quoteName: 'Tether' },
                    { symbol: 'SOLUSDT', baseAsset: 'SOL', quoteAsset: 'USDT', baseName: 'Solana', quoteName: 'Tether' },
                    { symbol: 'XRPUSDT', baseAsset: 'XRP', quoteAsset: 'USDT', baseName: 'XRP', quoteName: 'Tether' }
                ];
                filteredPairs = [...allPairs];
                return false;
            }
        }
        
        // Fetch asset logos from CoinGecko
        async function fetchAssetLogo(assetSymbol) {
            if (logoCache[assetSymbol]) return logoCache[assetSymbol];
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/search?query=${assetSymbol}`);
                const data = await response.json();
                if (data.coins && data.coins.length > 0) {
                    const logo = data.coins[0].thumb || `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
                    logoCache[assetSymbol] = logo;
                    return logo;
                }
            } catch (e) {}
            logoCache[assetSymbol] = `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
            return logoCache[assetSymbol];
        }
        
        // Render pair dropdown
        function renderPairDropdown(searchTerm) {
            const dropdown = document.getElementById('pair-dropdown');
            if (!searchTerm.trim()) {
                dropdown.classList.remove('show');
                return;
            }
            const filtered = allPairs.filter(p => 
                p.symbol.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.baseAsset.toLowerCase().includes(searchTerm.toLowerCase())
            ).slice(0, 20);
            
            if (filtered.length === 0) {
                dropdown.classList.remove('show');
                return;
            }
            
            dropdown.innerHTML = filtered.map(pair => `
                <div class="pair-option" onclick="selectPair('${pair.symbol}')">
                    <img src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" onerror="this.src='https://assets.coingecko.com/coins/images/1/large/bitcoin.png'">
                    <div class="pair-option-info">
                        <div class="pair-option-symbol">${pair.symbol}</div>
                        <div class="pair-option-name">${pair.baseAsset} / USDT</div>
                    </div>
                </div>
            `).join('');
            dropdown.classList.add('show');
        }
        
        // Select pair and update everything
        async function selectPair(symbol) {
            const pair = allPairs.find(p => p.symbol === symbol);
            if (!pair) return;
            currentPair = { ...pair, baseName: pair.baseAsset, quoteName: 'Tether' };
            document.getElementById('selected-symbol').textContent = `${currentPair.baseAsset}/USDT`;
            document.getElementById('crypto-symbol').textContent = currentPair.baseAsset;
            
            // Fetch logos
            const baseLogo = await fetchAssetLogo(currentPair.baseAsset);
            const quoteLogo = await fetchAssetLogo('USDT');
            document.getElementById('pair-logos').innerHTML = `
                <img src="${baseLogo}" alt="${currentPair.baseAsset}">
                <img src="${quoteLogo}" alt="USDT">
            `;
            
            document.getElementById('pair-search').value = '';
            document.getElementById('pair-dropdown').classList.remove('show');
            
            // Fetch all trading data
            await fetchTickerData();
            await fetchOrderBook();
            await fetchRecentTrades();
            await fetchKlineData();
            
            // Update TradingView chart
            updateTradingViewChart();
            
            // Update tab title with price
            updateTabTitle();
            
            // Start real-time updates
            startRealTimeUpdates();
        }
        
        // Fetch 24hr ticker stats
        async function fetchTickerData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentPair.symbol}`);
                const data = await response.json();
                currentPrices = {
                    lastPrice: parseFloat(data.lastPrice),
                    change24h: parseFloat(data.priceChange),
                    changePercent24h: parseFloat(data.priceChangePercent),
                    high24h: parseFloat(data.highPrice),
                    low24h: parseFloat(data.lowPrice),
                    volume24h: parseFloat(data.volume),
                    quoteVolume: parseFloat(data.quoteVolume),
                    weightedAvgPrice: parseFloat(data.weightedAvgPrice)
                };
                
                document.getElementById('current-price').textContent = `$${currentPrices.lastPrice.toFixed(2)}`;
                const changePercent = currentPrices.changePercent24h;
                const changeElem = document.getElementById('price-change');
                changeElem.textContent = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
                changeElem.className = `price-change ${changePercent >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('high-24h').textContent = `$${currentPrices.high24h.toFixed(2)}`;
                document.getElementById('low-24h').textContent = `$${currentPrices.low24h.toFixed(2)}`;
                document.getElementById('volume-24h').textContent = formatVolume(currentPrices.volume24h);
                document.getElementById('weighted-avg').textContent = `$${currentPrices.weightedAvgPrice.toFixed(2)}`;
                
                document.getElementById('order-price').value = currentPrices.lastPrice.toFixed(2);
                updateEstimatedCrypto();
                
                return currentPrices;
            } catch (error) {
                console.error('Ticker fetch error:', error);
            }
        }
        
        // Fetch order book
        async function fetchOrderBook() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentPair.symbol}&limit=15`);
                const data = await response.json();
                const bids = data.bids.slice(0, 10).map(b => ({ price: parseFloat(b[0]), amount: parseFloat(b[1]) }));
                const asks = data.asks.slice(0, 10).map(a => ({ price: parseFloat(a[0]), amount: parseFloat(a[1]) }));
                
                const bestBid = bids[0]?.price || 0;
                const bestAsk = asks[0]?.price || 0;
                const spread = bestAsk - bestBid;
                const spreadPercent = bestBid ? (spread / bestBid) * 100 : 0;
                document.getElementById('spread-info').textContent = `Spread: ${spread.toFixed(2)} (${spreadPercent.toFixed(4)}%)`;
                
                const asksContainer = document.getElementById('asks-container');
                const bidsContainer = document.getElementById('bids-container');
                
                asksContainer.innerHTML = asks.reverse().map(ask => `
                    <div class="order-book-row" onclick="setPrice(${ask.price})">
                        <span class="order-book-price negative">$${ask.price.toFixed(2)}</span>
                        <span>${ask.amount.toFixed(4)}</span>
                        <span>$${(ask.price * ask.amount).toFixed(2)}</span>
                    </div>
                `).join('');
                
                bidsContainer.innerHTML = bids.map(bid => `
                    <div class="order-book-row" onclick="setPrice(${bid.price})">
                        <span class="order-book-price positive">$${bid.price.toFixed(2)}</span>
                        <span>${bid.amount.toFixed(4)}</span>
                        <span>$${(bid.price * bid.amount).toFixed(2)}</span>
                    </div>
                `).join('');
                
                // Update depth chart
                updateDepthChart(bids, asks);
            } catch (error) {
                console.error('Order book error:', error);
            }
        }
        
        // Fetch recent trades
        async function fetchRecentTrades() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/trades?symbol=${currentPair.symbol}&limit=20`);
                const trades = await response.json();
                const container = document.getElementById('recent-trades-container');
                container.innerHTML = trades.map(trade => `
                    <div class="trade-item">
                        <span class="trade-price ${trade.isBuyerMaker ? 'negative' : 'positive'}">
                            ${trade.isBuyerMaker ? 'SELL' : 'BUY'}
                        </span>
                        <span>$${parseFloat(trade.price).toFixed(2)}</span>
                        <span>${parseFloat(trade.qty).toFixed(4)}</span>
                        <span>${new Date(trade.time).toLocaleTimeString()}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Trades error:', error);
            }
        }
        
        // Fetch kline data for chart
        async function fetchKlineData() {
            // Chart handled by TradingView widget
        }
        
        // Update TradingView chart
        function updateTradingViewChart() {
            const container = document.getElementById('tradingview-chart');
            container.innerHTML = '';
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": `BINANCE:${currentPair.symbol}`,
                    "interval": "15",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "allow_symbol_change": false,
                    "container_id": "tradingview-chart",
                    "studies": ["Volume@tv-basicstudies"]
                });
            }
        }
        
        // Depth chart
        function updateDepthChart(bids, asks) {
            const ctx = document.getElementById('depth-chart').getContext('2d');
            if (depthChart) depthChart.destroy();
            
            const bidPrices = bids.map(b => b.price);
            const bidAmounts = bids.map(b => b.amount);
            const askPrices = asks.map(a => a.price);
            const askAmounts = asks.map(a => a.amount);
            
            depthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Bids', data: bidPrices.map((p, i) => ({ x: p, y: bidAmounts[i] })), borderColor: '#228B22', backgroundColor: 'rgba(34,139,34,0.1)', fill: true, tension: 0.4, pointRadius: 0 },
                        { label: 'Asks', data: askPrices.map((p, i) => ({ x: p, y: askAmounts[i] })), borderColor: '#FF0000', backgroundColor: 'rgba(255,0,0,0.1)', fill: true, tension: 0.4, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { x: { title: { display: true, text: 'Price (USDT)' } }, y: { title: { display: true, text: 'Amount' } } }, plugins: { legend: { position: 'top', labels: { color: '#B7BDC6' } } } }
            });
        }
        
        function setPrice(price) {
            document.getElementById('order-price').value = price.toFixed(2);
            updateEstimatedCrypto();
        }
        
        function setOrderSide(side) {
            orderSide = side;
            document.getElementById('buy-tab').classList.toggle('active', side === 'buy');
            document.getElementById('sell-tab').classList.toggle('active', side === 'sell');
            const actionBtn = document.getElementById('order-action-btn');
            actionBtn.className = `order-action-btn ${side}`;
            actionBtn.textContent = `${side === 'buy' ? 'Buy' : 'Sell'} ${currentPair.baseAsset}`;
            updateEstimatedCrypto();
        }
        
        function updateEstimatedCrypto() {
            const amount = parseFloat(document.getElementById('order-amount').value) || 0;
            const price = parseFloat(document.getElementById('order-price').value) || currentPrices.lastPrice || 0;
            const cryptoAmount = price ? amount / price : 0;
            document.getElementById('estimated-crypto').textContent = cryptoAmount.toFixed(6);
        }
        
        // Balance fetching from backend
        async function fetchUserBalances() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-balance-container').style.display = 'none';
                return;
            }
            try {
                const response = await fetch(`${BACKEND_URL}/api/users/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    userBalances.main = data.main || 0;
                    userBalances.matured = data.matured || 0;
                    document.getElementById('user-balance-container').style.display = 'block';
                    document.getElementById('auth-buttons').style.display = 'none';
                    renderUserBalances();
                }
            } catch (error) {
                console.error('Balance fetch error:', error);
            }
            
            // Fetch crypto balances from /api/users/assets
            try {
                const assetsResponse = await fetch(`${BACKEND_URL}/api/users/assets`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (assetsResponse.ok) {
                    const assets = await assetsResponse.json();
                    cryptoBalances = {};
                    assets.forEach(asset => { cryptoBalances[asset.symbol.toLowerCase()] = asset.balance; });
                    updateBalanceDisplay();
                }
            } catch (error) {}
        }
        
        function renderUserBalances() {
            const container = document.getElementById('user-balances');
            const totalUSD = userBalances.main + userBalances.matured;
            container.innerHTML = `
                <div class="user-balance">
                    <i class="fas fa-wallet"></i>
                    <div class="balance-asset-row">
                        <img src="https://flagcdn.com/w40/us.png" class="balance-asset-logo">
                        <span>$${totalUSD.toLocaleString()}</span>
                        <span>USD</span>
                    </div>
                </div>
            `;
        }
        
        function updateBalanceDisplay() {
            const balance = cryptoBalances[currentPair.baseAsset?.toLowerCase()] || 0;
            const availableSpan = document.getElementById('available-balance');
            const actionBtn = document.getElementById('order-action-btn');
            const insufficientDiv = document.getElementById('insufficient-actions');
            
            if (orderSide === 'buy') {
                const totalUSD = userBalances.main + userBalances.matured;
                availableSpan.textContent = `$${totalUSD.toLocaleString()}`;
                if (totalUSD < 10) {
                    actionBtn.disabled = true;
                    insufficientDiv.style.display = 'flex';
                } else {
                    actionBtn.disabled = false;
                    insufficientDiv.style.display = 'none';
                }
            } else {
                availableSpan.textContent = `${balance.toFixed(6)} ${currentPair.baseAsset}`;
                if (balance <= 0) {
                    actionBtn.disabled = true;
                    insufficientDiv.style.display = 'flex';
                } else {
                    actionBtn.disabled = false;
                    insufficientDiv.style.display = 'none';
                }
            }
        }
        
        // Execute trade
        async function executeTrade() {
            const token = localStorage.getItem('jwtToken');
            if (!token) {
                showNotification('error', 'Login Required', 'Please login to trade');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            const amount = parseFloat(document.getElementById('order-amount').value);
            const price = parseFloat(document.getElementById('order-price').value);
            
            if (!amount || amount < 10) {
                showNotification('error', 'Invalid Amount', 'Minimum order amount is 10 USDT');
                return;
            }
            
            const totalUSD = userBalances.main + userBalances.matured;
            const cryptoBalance = cryptoBalances[currentPair.baseAsset?.toLowerCase()] || 0;
            
            if (orderSide === 'buy' && amount > totalUSD) {
                showNotification('error', 'Insufficient Balance', `You have $${totalUSD.toLocaleString()} available. Please deposit funds.`);
                return;
            }
            
            if (orderSide === 'sell') {
                const cryptoAmount = amount / price;
                if (cryptoAmount > cryptoBalance) {
                    showNotification('error', 'Insufficient Balance', `You have ${cryptoBalance.toFixed(6)} ${currentPair.baseAsset} available.`);
                    return;
                }
            }
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/trading/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        symbol: currentPair.symbol,
                        side: orderSide,
                        amount: amount,
                        price: price
                    })
                });
                
                if (response.ok) {
                    showNotification('success', 'Order Executed', `${orderSide === 'buy' ? 'Bought' : 'Sold'} ${(amount / price).toFixed(6)} ${currentPair.baseAsset}`);
                    document.getElementById('order-amount').value = '';
                    await fetchUserBalances();
                    updateEstimatedCrypto();
                } else {
                    const error = await response.json();
                    showNotification('error', 'Order Failed', error.message || 'Trade execution failed');
                }
            } catch (error) {
                showNotification('error', 'Network Error', 'Failed to execute order');
            }
        }
        
        // Open convert modal (redirect to dashboard convert)
        function openConvert() {
            window.location.href = 'dashboard.html#convert-section';
        }
        
        function showNotification(type, title, message) {
            const container = document.getElementById('notification-center');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><div><strong>${title}</strong><br>${message}</div>`;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }
        
        function formatVolume(vol) {
            if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B';
            if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
            return vol.toFixed(2);
        }
        
        function updateTabTitle() {
            const price = currentPrices.lastPrice || 0;
            document.title = `${currentPair.baseAsset}/USDT $${price.toFixed(2)} | BitHash Trading`;
        }
        
        function startRealTimeUpdates() {
            if (tickerInterval) clearInterval(tickerInterval);
            if (orderBookInterval) clearInterval(orderBookInterval);
            if (tradesInterval) clearInterval(tradesInterval);
            
            tickerInterval = setInterval(fetchTickerData, 3000);
            orderBookInterval = setInterval(fetchOrderBook, 2000);
            tradesInterval = setInterval(fetchRecentTrades, 3000);
        }
        
        // Handle URL parameter from index.html click
        function handleUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const symbol = urlParams.get('symbol');
            if (symbol) {
                const upperSymbol = symbol.toUpperCase() + 'USDT';
                if (allPairs.some(p => p.symbol === upperSymbol)) {
                    selectPair(upperSymbol);
                }
            }
        }
        
        // Initialize
        document.getElementById('pair-search').addEventListener('input', (e) => renderPairDropdown(e.target.value));
        document.getElementById('order-amount').addEventListener('input', updateEstimatedCrypto);
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.pair-search-container')) {
                document.getElementById('pair-dropdown').classList.remove('show');
            }
        });
        
        async function init() {
            await fetchBinancePairs();
            await fetchUserBalances();
            if (allPairs.length > 0) {
                selectPair('BTCUSDT');
            }
            handleUrlParams();
        }
        
        init();
        
        // Expose globals
        window.selectPair = selectPair;
        window.setOrderSide = setOrderSide;
        window.executeTrade = executeTrade;
        window.setPrice = setPrice;
        window.openConvert = openConvert;
    </script>
</body>
</html>
