<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- Socket.IO client library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <title>BitHash | Trading Panel</title>
    <meta name="description" content="Professional cryptocurrency trading panel with real-time Binance data">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rowdies:wght@300;400;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Widget -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        /* ============================================= */
        /* COLOR SYSTEM - MATCHING EXISTING PAGE */
        /* ============================================= */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --buy-color: #228B22;
            --sell-color: #FF0000;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-base);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        /* Container */
        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        header {
            background-color: var(--bg-base);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            height: 70px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img {
            height: 32px;
            width: auto;
        }
        .logo-text {
            font-family: 'Rowdies', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
        }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--accent);
        }
        
        /* Main Trading Layout */
        .trading-container {
            margin-top: 90px;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        /* Left Panel - Order Book & Recent Trades */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Order Book */
        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }
        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .order-book-row:hover {
            background: var(--bg-hover);
        }
        .order-book-price.bid {
            color: var(--positive);
        }
        .order-book-price.ask {
            color: var(--negative);
        }
        .order-book-spread {
            padding: 8px 12px;
            text-align: center;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* Recent Trades */
        .trade-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        .trade-price.buy {
            color: var(--positive);
        }
        .trade-price.sell {
            color: var(--negative);
        }
        
        /* Center Panel - Chart & Market Stats */
        .chart-panel {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chart-container {
            height: 400px;
            width: 100%;
        }
        .market-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .stat-value.positive {
            color: var(--positive);
        }
        .stat-value.negative {
            color: var(--negative);
        }
        
        /* Right Panel - Trading Form */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .trading-form {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
            padding: 16px;
        }
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-hover);
        }
        .order-tab.buy.active {
            background: var(--buy-color);
            color: white;
        }
        .order-tab.sell.active {
            background: var(--sell-color);
            color: white;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .balance-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        .trade-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .trade-btn.buy {
            background: var(--buy-color);
            color: white;
        }
        .trade-btn.buy:hover:not(:disabled) {
            background: #1a6e1a;
            transform: translateY(-2px);
        }
        .trade-btn.sell {
            background: var(--sell-color);
            color: white;
        }
        .trade-btn.sell:hover:not(:disabled) {
            background: #cc0000;
            transform: translateY(-2px);
        }
        .trade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Pair Selector */
        .pair-selector {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pair-search {
            flex: 1;
            position: relative;
        }
        .pair-search input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .pair-search input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .pair-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .pair-dropdown.show {
            display: block;
        }
        .pair-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .pair-option:hover {
            background: var(--bg-card);
        }
        .pair-option img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
        .pair-option .pair-symbol {
            font-weight: 600;
        }
        .pair-option .pair-name {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .selected-pair {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg-hover);
            border-radius: var(--border-radius);
            cursor: pointer;
        }
        .selected-pair img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .selected-pair-info {
            text-align: left;
        }
        .selected-pair-symbol {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .selected-pair-price {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        /* Asset Balance Card */
        .asset-balance-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border);
            padding: 16px;
        }
        .asset-balance-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .asset-balance-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .asset-balance-amount {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .deposit-convert-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .deposit-convert-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .deposit-btn {
            background: var(--accent);
            border: none;
            color: #000;
        }
        .convert-btn-mini {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        
        /* Footer Ticker */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 99;
        }
        .ticker-content {
            display: inline-block;
            animation: ticker-scroll 30s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            margin-right: 30px;
            font-size: 0.8rem;
        }
        .ticker-symbol {
            font-weight: 600;
        }
        .ticker-price.positive {
            color: var(--positive);
        }
        .ticker-price.negative {
            color: var(--negative);
        }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* Notification */
        .notification-center {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        .notification {
            background: var(--bg-hover);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: var(--border-radius);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .trading-container {
                grid-template-columns: 280px 1fr 280px;
                gap: 12px;
            }
        }
        @media (max-width: 992px) {
            .trading-container {
                grid-template-columns: 1fr;
            }
            .left-panel {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
        }
        @media (max-width: 768px) {
            .left-panel {
                grid-template-columns: 1fr;
            }
            .market-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo" class="loading-logo">
    <div class="loading-text"><i class="fas fa-chart-line"></i> Loading Trading Data...</div>
</div>

<div class="notification-center" id="notification-center"></div>

<header>
    <div class="container header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash Logo">
            <span class="logo-text">₿itHash</span>
        </div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</header>

<main class="container trading-container">
    <!-- Left Panel: Order Book & Recent Trades -->
    <div class="left-panel">
        <div class="panel-card">
            <div class="panel-header">Order Book</div>
            <div class="order-book-header">
                <span>Price (USDT)</span>
                <span>Amount</span>
                <span>Total</span>
            </div>
            <div id="asks-container"></div>
            <div class="order-book-spread" id="spread-display">Spread: --</div>
            <div id="bids-container"></div>
        </div>
        
        <div class="panel-card">
            <div class="panel-header">Recent Trades</div>
            <div class="order-book-header">
                <span>Price</span>
                <span>Amount</span>
                <span>Time</span>
            </div>
            <div id="recent-trades-container"></div>
        </div>
    </div>
    
    <!-- Center Panel: Chart & Market Stats -->
    <div>
        <div class="chart-panel">
            <div class="pair-selector" style="border-bottom: 1px solid var(--border); border-radius: 0;">
                <div class="pair-search">
                    <input type="text" id="pair-search-input" placeholder="Search pair (e.g., BTCUSDT, ETHUSDT)...">
                    <div class="pair-dropdown" id="pair-dropdown"></div>
                </div>
                <div class="selected-pair" id="selected-pair">
                    <img id="selected-pair-logo" src="" alt="">
                    <div class="selected-pair-info">

                </div>
            </div>
            <div class="chart-container">
                <div id="tradingview-chart" style="height: 400px;"></div>

            <div class="market-stats" id="market-stats">
                <div class="stat-item"><div class="stat-label">24h Change</div><div class="stat-value" id="stat-change">--</div></div>
                <div class="stat-item"><div class="stat-label">24h High</div><div class="stat-value" id="stat-high">--</div></div>
                <div class="stat-item"><div class="stat-label">24h Low</div><div class="stat-value" id="stat-low">--</div></div>

    <!-- Right Panel: Trading Form & Asset Balance -->
    <div class="right-panel">

                    <div id="asset-balance-symbol">BTC</div>
                    <div class="asset-balance-amount" id="asset-balance-amount">0.000000</div>
                </div>
            </div>
            <div id="asset-balance-actions" class="deposit-convert-buttons">
                <button class="deposit-btn" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button>
                <button class="convert-btn-mini" onclick="openConvertDeposit()"><i class="fas fa-exchange-alt"></i> Convert</button>

        <div class="trading-form">
            <div class="order-tabs">

                <div class="order-tab sell" id="sell-tab" onclick="setOrderType('sell')">Sell</div>

            <div class="form-group">
                <label>Price (USDT)</label>

                <div class="balance-info">
                    <span>Best Bid: <span id="best-bid">--</span></span>
                    <span>Best Ask: <span id="best-ask">--</span></span>
                </div>
            </div>
            
            <div class="form-group">
                <label>Amount (USDT)</label>
                <input type="number" id="order-amount" class="form-input" step="10" placeholder="Enter amount in USDT">
                <div class="balance-info">
                    <span>≈ <span id="estimated-crypto">0.000000</span> <span id="order-symbol">BTC</span></span>
                    <span>Available: <span id="available-balance">0.000000</span> <span id="available-symbol">BTC</span></span>
                </div>
            </div>
            
            <button class="trade-btn buy" id="trade-btn" onclick="executeTrade()">Buy BTC</button>
        </div>
    </div>
</main>

<!-- Footer Ticker -->
<div class="footer-ticker" id="footer-ticker">
    <div class="ticker-content" id="ticker-content"></div>
</div>

<script>
    // =============================================
    // GLOBAL STATE
    // =============================================
    let currentPair = { base: 'BTC', quote: 'USDT', symbol: 'BTCUSDT' };
    let currentPrice = 0;
    let orderBookData = { bids: [], asks: [] };
    let recentTrades = [];
    let allPairs = [];
    let userBalances = {};
    let currentOrderType = 'buy';
    let tickerInterval = null;
    let orderBookInterval = null;
    let tradesInterval = null;
    let currentAssetBalance = 0;
    
    // CoinGecko logo cache
    const logoCache = {};
    
    // Backend API
    const BACKEND_URL = 'https://bithash-backend-1.onrender.com';
    const BINANCE_API = 'https://api.binance.com/api/v3';
    
    // =============================================
    // INITIALIZATION
    // =============================================
    document.addEventListener('DOMContentLoaded', async () => {
        await checkURLParams();
        await loadAllPairs();
        await loadUserBalances();
        await loadPairData();
        startRealtimeUpdates();
        
        setTimeout(() => {
            document.getElementById('loading-overlay').classList.add('hidden');
        }, 1000);
        
        // Setup event listeners
        document.getElementById('pair-search-input').addEventListener('input', filterPairs);
        document.getElementById('order-amount').addEventListener('input', updateEstimatedCrypto);
        document.getElementById('order-price').addEventListener('input', updateEstimatedCrypto);
        document.getElementById('selected-pair').addEventListener('click', () => {
            document.getElementById('pair-dropdown').classList.toggle('show');
        });
        
        // Update title with price
        setInterval(updateTabTitle, 1000);
        
        // Load ticker data
        loadTickerData();
        setInterval(loadTickerData, 30000);
    });
    
    // =============================================
    // URL PARAMETER HANDLING (from index.html click)
    // =============================================
    function checkURLParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const symbol = urlParams.get('symbol');
        if (symbol) {
            const upperSymbol = symbol.toUpperCase();
            currentPair = {
                base: upperSymbol,
                quote: 'USDT',
                symbol: `${upperSymbol}USDT`
            };
            document.title = `BitHash | ${upperSymbol}/USDT Trading`;
        }
    }
    
    // =============================================
    // LOAD ALL TRADING PAIRS FROM BINANCE
    // =============================================
    async function loadAllPairs() {
        try {
            const response = await fetch(`${BINANCE_API}/exchangeInfo`);
            const data = await response.json();
            
            allPairs = data.symbols
                .filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT')
                .map(s => ({
                    symbol: s.symbol,
                    base: s.baseAsset,
                    quote: s.quoteAsset
                }))
                .sort((a, b) => a.base.localeCompare(b.base));
            
            // Load logos from CoinGecko
            await loadLogosForPairs(allPairs);
            
            renderPairDropdown();
        } catch (error) {
            console.error('Error loading pairs:', error);
        }
    }
    
    async function loadLogosForPairs(pairs) {
        for (const pair of pairs.slice(0, 50)) {
            if (!logoCache[pair.base]) {
                const logo = await fetchCoinGeckoLogo(pair.base);
                if (logo) logoCache[pair.base] = logo;
            }
        }
    }
    
    async function fetchCoinGeckoLogo(symbol) {
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/search?query=${symbol}`);
            const data = await response.json();
            if (data.coins && data.coins[0]) {
                return data.coins[0].thumb || `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
            }
        } catch (e) {}
        return `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`;
    }
    
    function renderPairDropdown() {
        const dropdown = document.getElementById('pair-dropdown');
        dropdown.innerHTML = allPairs.map(pair => `
            <div class="pair-option" onclick="selectPair('${pair.symbol}')">
                <img src="${logoCache[pair.base] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'}" alt="${pair.base}">
                <div>
                    <div class="pair-symbol">${pair.base}/${pair.quote}</div>
                    <div class="pair-name">${pair.base}</div>
                </div>
            </div>
        `).join('');
    }
    
    function filterPairs() {
        const searchTerm = document.getElementById('pair-search-input').value.toLowerCase();
        const filtered = allPairs.filter(p => 
            p.base.toLowerCase().includes(searchTerm) || 
            p.symbol.toLowerCase().includes(searchTerm)
        );
        const dropdown = document.getElementById('pair-dropdown');
        dropdown.innerHTML = filtered.slice(0, 20).map(pair => `
            <div class="pair-option" onclick="selectPair('${pair.symbol}')">
                <img src="${logoCache[pair.base] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png'}" alt="${pair.base}">
                <div>
                    <div class="pair-symbol">${pair.base}/${pair.quote}</div>
                    <div class="pair-name">${pair.base}</div>
                </div>
            </div>
        `).join('');
        dropdown.classList.add('show');
    }
    
    async function selectPair(symbol) {
        const pair = allPairs.find(p => p.symbol === symbol);
        if (pair) {
            currentPair = pair;
            document.getElementById('pair-dropdown').classList.remove('show');
            document.getElementById('pair-search-input').value = '';
            
            // Update UI
            document.getElementById('selected-pair-symbol').innerHTML = `${pair.base}/${pair.quote}`;
            document.getElementById('order-symbol').textContent = pair.base;
            document.getElementById('available-symbol').textContent = pair.base;
            document.getElementById('asset-balance-symbol').textContent = pair.base;
            
            const logo = logoCache[pair.base] || await fetchCoinGeckoLogo(pair.base);
            if (logo) logoCache[pair.base] = logo;
            document.getElementById('selected-pair-logo').src = logo || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            document.getElementById('asset-balance-logo').src = logo || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
            
            // Update asset balance display
            updateAssetBalanceDisplay();
            
            // Load all data for new pair
            await loadPairData();
            
            // Update TradingView chart
            updateTradingViewChart();
            
            document.title = `BitHash | ${pair.base}/${pair.quote} Trading | $${currentPrice.toFixed(2)}`;
            
            showNotification('info', 'Pair Changed', `Now trading ${pair.base}/${pair.quote}`);
        }
    }
    
    // =============================================
    // LOAD USER BALANCES (My Assets endpoint)
    // =============================================
    async function loadUserBalances() {
        try {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            const response = await fetch(`${BACKEND_URL}/api/users/balances`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                // Extract crypto balances from the response
                // The balances endpoint returns main/active/matured in USD, but we need crypto balances
                // Also fetch /api/users/assets for crypto balances
                await loadCryptoBalances();
            }
        } catch (error) {
            console.error('Error loading balances:', error);
        }
    }
    
    async function loadCryptoBalances() {
        try {
            const token = localStorage.getItem('jwtToken');
            if (!token) return;
            
            const response = await fetch(`${BACKEND_URL}/api/users/assets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                const assets = await response.json();
                assets.forEach(asset => {
                    userBalances[asset.symbol.toUpperCase()] = parseFloat(asset.balance) || 0;
                });
                updateAssetBalanceDisplay();
            }
        } catch (error) {
            console.error('Error loading crypto balances:', error);
        }
    }
    
    function updateAssetBalanceDisplay() {
        const balance = userBalances[currentPair.base] || 0;
        currentAssetBalance = balance;
        document.getElementById('asset-balance-amount').textContent = balance.toFixed(8);
        document.getElementById('available-balance').textContent = balance.toFixed(8);
        
        // Show/hide deposit/convert buttons based on balance
        if (balance === 0) {
            document.getElementById('asset-balance-actions').style.display = 'flex';
        } else {
            document.getElementById('asset-balance-actions').style.display = 'flex';
        }
    }
    
    // =============================================
    // LOAD PAIR DATA (Price, Order Book, Trades, Stats)
    // =============================================
    async function loadPairData() {
        await Promise.all([
            fetchPrice(),
            fetchOrderBook(),
            fetchRecentTrades(),
            fetch24hStats()
        ]);
    }
    
    async function fetchPrice() {
        try {
            const response = await fetch(`${BINANCE_API}/ticker/price?symbol=${currentPair.symbol}`);
            const data = await response.json();
            currentPrice = parseFloat(data.price);
            document.getElementById('selected-pair-price').textContent = `$${currentPrice.toFixed(2)}`;
            document.getElementById('order-price').value = currentPrice.toFixed(2);
        } catch (error) {
            console.error('Error fetching price:', error);
        }
    }
    
    async function fetchOrderBook() {
        try {
            const response = await fetch(`${BINANCE_API}/depth?symbol=${currentPair.symbol}&limit=20`);
            const data = await response.json();
            orderBookData = {
                bids: data.bids.map(b => [parseFloat(b[0]), parseFloat(b[1])]),
                asks: data.asks.map(a => [parseFloat(a[0]), parseFloat(a[1])])
            };
            renderOrderBook();
        } catch (error) {
            console.error('Error fetching order book:', error);
        }
    }
    
    function renderOrderBook() {
        const bidsContainer = document.getElementById('bids-container');
        const asksContainer = document.getElementById('asks-container');
        
        // Render asks (sell orders) - show top 10
        const asksHtml = orderBookData.asks.slice(0, 10).map(ask => `
            <div class="order-book-row" onclick="setOrderPrice(${ask[0]})">
                <span class="order-book-price ask">$${ask[0].toFixed(2)}</span>
                <span>${ask[1].toFixed(4)}</span>
                <span>$${(ask[0] * ask[1]).toFixed(2)}</span>
            </div>
        `).join('');
        
        // Render bids (buy orders)
        const bidsHtml = orderBookData.bids.slice(0, 10).map(bid => `
            <div class="order-book-row" onclick="setOrderPrice(${bid[0]})">
                <span class="order-book-price bid">$${bid[0].toFixed(2)}</span>
                <span>${bid[1].toFixed(4)}</span>
                <span>$${(bid[0] * bid[1]).toFixed(2)}</span>
            </div>
        `).join('');
        
        asksContainer.innerHTML = asksHtml || '<div style="padding: 10px; text-align: center;">No asks</div>';
        bidsContainer.innerHTML = bidsHtml || '<div style="padding: 10px; text-align: center;">No bids</div>';
        
        // Update spread
        const bestBid = orderBookData.bids[0]?.[0] || 0;
        const bestAsk = orderBookData.asks[0]?.[0] || 0;
        const spread = bestAsk - bestBid;
        const spreadPercent = bestBid ? (spread / bestBid * 100).toFixed(4) : 0;
        document.getElementById('spread-display').innerHTML = `Spread: $${spread.toFixed(4)} (${spreadPercent}%)`;
        document.getElementById('best-bid').textContent = bestBid ? `$${bestBid.toFixed(2)}` : '--';
        document.getElementById('best-ask').textContent = bestAsk ? `$${bestAsk.toFixed(2)}` : '--';
    }
    
    async function fetchRecentTrades() {
        try {
            const response = await fetch(`${BINANCE_API}/trades?symbol=${currentPair.symbol}&limit=20`);
            const trades = await response.json();
            recentTrades = trades.map(t => ({
                price: parseFloat(t.price),
                qty: parseFloat(t.qty),
                time: new Date(t.time).toLocaleTimeString(),
                isBuyerMaker: t.isBuyerMaker
            }));
            renderRecentTrades();
        } catch (error) {
            console.error('Error fetching recent trades:', error);
        }
    }
    
    function renderRecentTrades() {
        const container = document.getElementById('recent-trades-container');
        container.innerHTML = recentTrades.map(trade => `
            <div class="trade-row">
                <span class="trade-price ${trade.isBuyerMaker ? 'sell' : 'buy'}">$${trade.price.toFixed(2)}</span>
                <span>${trade.qty.toFixed(4)}</span>
                <span>${trade.time}</span>
            </div>
        `).join('');
    }
    
    async function fetch24hStats() {
        try {
            const response = await fetch(`${BINANCE_API}/ticker/24hr?symbol=${currentPair.symbol}`);
            const data = await response.json();
            
            const change = parseFloat(data.priceChangePercent);
            const high = parseFloat(data.highPrice);
            const low = parseFloat(data.lowPrice);
            const volume = parseFloat(data.quoteVolume);
            
            document.getElementById('stat-change').innerHTML = `<span class="${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span>`;
            document.getElementById('stat-high').textContent = `$${high.toFixed(2)}`;
            document.getElementById('stat-low').textContent = `$${low.toFixed(2)}`;
            document.getElementById('stat-volume').textContent = `$${(volume / 1e6).toFixed(2)}M`;
        } catch (error) {
            console.error('Error fetching 24h stats:', error);
        }
    }
    
    // =============================================
    // TRADING VIEW CHART
    // =============================================
    function updateTradingViewChart() {
        const container = document.getElementById('tradingview-chart');
        container.innerHTML = '';
        
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": `BINANCE:${currentPair.symbol}`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview-chart",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        }
    }
    
    // =============================================
    // REAL-TIME UPDATES
    // =============================================
    function startRealtimeUpdates() {
        if (tickerInterval) clearInterval(tickerInterval);
        if (orderBookInterval) clearInterval(orderBookInterval);
        if (tradesInterval) clearInterval(tradesInterval);
        
        tickerInterval = setInterval(() => {
            fetchPrice();
            fetch24hStats();
        }, 2000);
        
        orderBookInterval = setInterval(fetchOrderBook, 2000);
        tradesInterval = setInterval(fetchRecentTrades, 3000);
    }
    
    // =============================================
    // FOOTER TICKER
    // =============================================
    async function loadTickerData() {
        try {
            const response = await fetch(`${BINANCE_API}/ticker/24hr`);
            const data = await response.json();
            const topPairs = data.filter(t => t.symbol.endsWith('USDT')).slice(0, 30);
            
            const tickerHtml = topPairs.map(t => `
                <span class="ticker-item">
                    <span class="ticker-symbol">${t.symbol.replace('USDT', '')}</span>
                    <span class="ticker-price ${parseFloat(t.priceChangePercent) >= 0 ? 'positive' : 'negative'}">
                        $${parseFloat(t.lastPrice).toFixed(2)} ${parseFloat(t.priceChangePercent) >= 0 ? '▲' : '▼'} ${Math.abs(parseFloat(t.priceChangePercent)).toFixed(2)}%
                    </span>
                </span>
            `).join('');
            
            const tickerContent = document.getElementById('ticker-content');
            tickerContent.innerHTML = tickerHtml + tickerHtml;
        } catch (error) {
            console.error('Error loading ticker:', error);
        }
    }
    
    // =============================================
    // TRADING LOGIC
    // =============================================
    function setOrderType(type) {
        currentOrderType = type;
        const buyTab = document.getElementById('buy-tab');
        const sellTab = document.getElementById('sell-tab');
        const tradeBtn = document.getElementById('trade-btn');
        
        if (type === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            tradeBtn.classList.remove('sell');
            tradeBtn.classList.add('buy');
            tradeBtn.innerHTML = `Buy ${currentPair.base}`;
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            tradeBtn.classList.remove('buy');
            tradeBtn.classList.add('sell');
            tradeBtn.innerHTML = `Sell ${currentPair.base}`;
        }
    }
    
    function setOrderPrice(price) {
        document.getElementById('order-price').value = price;
        updateEstimatedCrypto();
    }
    
    function updateEstimatedCrypto() {
        const amountUSD = parseFloat(document.getElementById('order-amount').value) || 0;
        const price = parseFloat(document.getElementById('order-price').value) || currentPrice;
        const estimatedCrypto = amountUSD / price;
        document.getElementById('estimated-crypto').textContent = estimatedCrypto.toFixed(8);
    }
    
    async function executeTrade() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            showNotification('error', 'Authentication Required', 'Please login to trade');
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }
        
        const amountUSD = parseFloat(document.getElementById('order-amount').value);
        const price = parseFloat(document.getElementById('order-price').value);
        
        if (!amountUSD || amountUSD < 10) {
            showNotification('error', 'Invalid Amount', 'Minimum order amount is 10 USDT');
            return;
        }
        
        const assetAmount = amountUSD / price;
        
        if (currentOrderType === 'sell') {
            if (assetAmount > currentAssetBalance) {
                showNotification('error', 'Insufficient Balance', `You only have ${currentAssetBalance.toFixed(8)} ${currentPair.base}`);
                return;
            }
        } else {
            // Check if user has sufficient USDT balance (from main balance)
            const mainBalance = await getUserMainBalance();
            if (amountUSD > mainBalance) {
                showNotification('error', 'Insufficient Funds', `You need ${amountUSD} USDT. Please deposit or convert funds.`);
                return;
            }
        }
        
        showNotification('info', 'Processing', `Placing ${currentOrderType} order for ${assetAmount.toFixed(8)} ${currentPair.base}...`);
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/trading/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    symbol: currentPair.base,
                    side: currentOrderType,
                    type: 'market',
                    amount: amountUSD,
                    price: price,
                    assetAmount: assetAmount
                })
            });
            
            if (response.ok) {
                showNotification('success', 'Order Executed', `Successfully ${currentOrderType === 'buy' ? 'bought' : 'sold'} ${assetAmount.toFixed(8)} ${currentPair.base}`);
                document.getElementById('order-amount').value = '';
                await loadCryptoBalances();
                updateEstimatedCrypto();
            } else {
                const error = await response.json();
                showNotification('error', 'Order Failed', error.message || 'Please try again');
            }
        } catch (error) {
            console.error('Trade error:', error);
            showNotification('error', 'Order Failed', 'Network error. Please try again.');
        }
    }
    
    async function getUserMainBalance() {
        try {
            const token = localStorage.getItem('jwtToken');
            if (!token) return 0;
            const response = await fetch(`${BACKEND_URL}/api/users/balances`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                return parseFloat(data.main) || 0;
            }
        } catch (e) {}
        return 0;
    }
    
    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    function updateTabTitle() {
        document.title = `BitHash | ${currentPair.base}/${currentPair.quote} | $${currentPrice.toFixed(2)}`;
    }
    
    function openConvertDeposit() {
        window.location.href = 'dashboard.html?openConvert=true';
    }
    
    function showNotification(type, title, message) {
        const container = document.getElementById('notification-center');
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.innerHTML = `
            <strong>${title}</strong><br>
            <small>${message}</small>
        `;
        container.appendChild(notification);
        setTimeout(() => notification.remove(), 5000);
    }
    
    // Expose functions globally
    window.selectPair = selectPair;
    window.setOrderPrice = setOrderPrice;
    window.setOrderType = setOrderType;
    window.executeTrade = executeTrade;
    window.openConvertDeposit = openConvertDeposit;
</script>
</body>
