<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">ETH/USDT | BitHash Trading</title>
    
    <!-- Preconnect to APIs -->
    <link rel="preconnect" href="https://api.binance.com">
    <link rel="preconnect" href="https://api.bithashcapital.live">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://s3.tradingview.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://media.bithashcapital.live/circular_dark_background%20(1).png" type="image/png">
    
    <style>
        /* ============================================= */
        /* CRYPTO.COM STYLE BACKGROUND + BINANCE COLORS */
        /* ============================================= */
        :root {
            --bg: #0B0E11;
            --panel: #151A21;
            --border: #2B3139;
            --green: #0ECB81;
            --red: #F6465D;
            --text-primary: #EAECEF;
            --text-secondary: #848E9C;
            --primary: #00D8FF;
            --primary-dark: #00A3CC;
            --primary-light: #33E0FF;
            --success: #0ECB81;
            --error: #F6465D;
            --warning: #F0B90B;
            --gold: #D4AF37;
            --hover-bg: rgba(255, 255, 255, 0.03);
            --active-bg: rgba(0, 216, 255, 0.08);
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Manrope', monospace;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-primary);
            background: radial-gradient(circle at 20% 20%, rgba(0, 102, 255, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(0, 204, 255, 0.12), transparent 40%),
                        #0B0E11;
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ============================================= */
        /* BINANCE EXACT GRID LAYOUT */
        /* ============================================= */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            grid-template-rows: auto 1fr auto auto;
            height: 100vh;
            gap: 8px;
            padding: 8px;
            background: transparent;
        }

        /* Glass Effect for Panels */
        .panel {
            background: rgba(21, 26, 33, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #2B3139;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            grid-column: 1 / -1;
            background: rgba(21, 26, 33, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #2B3139;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pair-logos {
            display: flex;
            align-items: center;
        }

        .pair-logo {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #0B0E11;
        }

        .pair-logo:last-child {
            margin-left: -8px;
        }

        .pair-name {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.2px;
        }

        .pair-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .live-price {
            font-size: 22px;
            font-weight: 600;
            font-family: var(--font-mono);
            line-height: 1.2;
        }

        .market-stats {
            display: flex;
            gap: 28px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-value {
            font-size: 0.85rem;
            font-weight: 500;
            font-family: var(--font-mono);
        }

        .stat-value.positive {
            color: var(--green);
        }

        .stat-value.negative {
            color: var(--red);
        }

        /* LEFT: Order Book */
        .order-book-panel {
            grid-row: 2 / 3;
        }

        .order-book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .order-book-content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .order-book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 4px 12px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s ease;
        }

        .order-book-row:hover {
            background-color: var(--hover-bg);
        }

        .depth-bar {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            opacity: 0.2;
            pointer-events: none;
            transition: width 0.2s ease;
        }

        .sell-depth {
            background-color: var(--red);
        }

        .buy-depth {
            background-color: var(--green);
        }

        .order-sell {
            background: linear-gradient(to left, rgba(246,70,93,0.2), transparent);
        }

        .order-buy {
            background: linear-gradient(to right, rgba(14,203,129,0.2), transparent);
        }

        .order-book-price {
            text-align: right;
            font-weight: 500;
        }

        .order-book-price.sell {
            color: var(--red);
        }

        .order-book-price.buy {
            color: var(--green);
        }

        .order-book-amount, .order-book-total {
            text-align: right;
            color: var(--text-secondary);
        }

        .current-price-row {
            background-color: rgba(0, 216, 255, 0.05);
            padding: 8px 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-family: var(--font-mono);
            border-left: 3px solid var(--primary);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        /* CENTER: Chart */
        .chart-panel {
            grid-row: 2 / 3;
        }

        .chart-tabs {
            display: flex;
            gap: 20px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .chart-tab {
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .chart-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .chart-controls {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .timeframe-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .timeframe-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .timeframe-btn.active {
            background-color: var(--primary);
            color: #0B0E11;
            border-color: var(--primary);
        }

        #tradingview-chart {
            flex: 1;
            min-height: 0;
        }

        /* RIGHT: Market List */
        .market-list-panel {
            grid-row: 2 / 3;
        }

        .search-container {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            background-color: #0B0E11;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .pair-tabs {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .pair-tab {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .pair-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pair-tab.active {
            background-color: var(--primary);
            color: #0B0E11;
            border-color: var(--primary);
        }

        .pairs-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            padding: 8px 12px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .pairs-list {
            flex: 1;
            overflow-y: auto;
        }

        .pair-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            align-items: center;
        }

        .pair-row:hover {
            background: rgba(255,255,255,0.05);
        }

        .pair-row.active {
            background-color: var(--active-bg);
            border-left: 3px solid var(--primary);
        }

        .pair-name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pair-small-logo {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .pair-symbol {
            font-weight: 500;
            font-size: 0.85rem;
        }

        .pair-price {
            text-align: right;
            font-family: var(--font-mono);
        }

        .pair-change {
            text-align: right;
            font-weight: 500;
        }

        .pair-change.positive {
            color: var(--green);
        }

        .pair-change.negative {
            color: var(--red);
        }

        /* BOTTOM LEFT: Depth */
        .depth-panel {
            grid-row: 3 / 4;
        }

        /* BOTTOM CENTER: Trading Panel */
        .trading-panel {
            grid-row: 3 / 4;
        }

        .order-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
        }

        .order-tab.buy.active {
            color: var(--green);
            border-bottom-color: var(--green);
        }

        .order-tab.sell.active {
            color: var(--red);
            border-bottom-color: var(--red);
        }

        .order-form {
            padding: 16px;
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            background-color: #0B0E11;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: var(--font-mono);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-suffix {
            position: absolute;
            right: 12px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .percentage-buttons {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .percentage-btn {
            flex: 1;
            background-color: #0B0E11;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 0;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
        }

        .percentage-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .action-btn.buy {
            background-color: var(--green);
            color: white;
        }

        .action-btn.sell {
            background-color: var(--red);
            color: white;
        }

        /* BOTTOM RIGHT: Market Trades */
        .market-trades-panel {
            grid-row: 3 / 4;
        }

        .trades-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 8px 12px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .trades-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .trade-price.buy {
            color: var(--green);
        }

        .trade-price.sell {
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .main-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto auto auto;
                overflow-y: auto;
            }
            .top-bar { grid-row: 1; }
            .order-book-panel { grid-row: 2; }
            .chart-panel { grid-row: 3; }
            .market-list-panel { grid-row: 4; }
            .depth-panel { grid-row: 5; }
            .trading-panel { grid-row: 6; }
            .market-trades-panel { grid-row: 7; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Top Bar (pair, price, stats) -->
        <div class="top-bar">
            <div class="pair-info">
                <div class="pair-logos" id="pairLogos"></div>
                <div>
                    <span class="pair-name" id="pairSymbol">ETH/USDT</span>
                    <span class="pair-label" id="pairBase">Ethereum</span>
                </div>
            </div>
            <div class="live-price" id="livePrice">$0.00</div>
            <div class="market-stats" id="marketStats"></div>
        </div>

        <!-- LEFT: Order Book -->
        <div class="panel order-book-panel">
            <div class="order-book-header">
                <span style="text-align: right;">Price (USDT)</span>
                <span style="text-align: right;">Amount (ETH)</span>
                <span style="text-align: right;">Total</span>
            </div>
            <div class="order-book-content" id="orderBookContent"></div>
        </div>

        <!-- CENTER: Chart -->
        <div class="panel chart-panel">
            <div class="chart-tabs">
                <span class="chart-tab active" onclick="switchChartTab('chart')">Chart</span>
                <span class="chart-tab" onclick="switchChartTab('info')">Info</span>
            </div>
            <div class="chart-controls">
                <button class="timeframe-btn active" onclick="changeTimeframe('1m')">1m</button>
                <button class="timeframe-btn" onclick="changeTimeframe('5m')">5m</button>
                <button class="timeframe-btn" onclick="changeTimeframe('15m')">15m</button>
                <button class="timeframe-btn" onclick="changeTimeframe('1H')">1H</button>
                <button class="timeframe-btn" onclick="changeTimeframe('4H')">4H</button>
                <button class="timeframe-btn" onclick="changeTimeframe('1D')">1D</button>
            </div>
            <div id="tradingview-chart"></div>
        </div>

        <!-- RIGHT: Market List -->
        <div class="panel market-list-panel">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search" id="pairSearch" oninput="filterPairs()">
            </div>
            <div class="pair-tabs">
                <button class="pair-tab active" onclick="filterPairsByTab('all')">⭐ All</button>
                <button class="pair-tab" onclick="filterPairsByTab('USDT')">USDT</button>
                <button class="pair-tab" onclick="filterPairsByTab('BTC')">BTC</button>
                <button class="pair-tab" onclick="filterPairsByTab('ETH')">ETH</button>
            </div>
            <div class="pairs-header">
                <span>Pair</span>
                <span style="text-align: right;">Last Price</span>
                <span style="text-align: right;">24h Change</span>
            </div>
            <div class="pairs-list" id="pairsList"></div>
        </div>

        <!-- BOTTOM LEFT: Depth -->
        <div class="panel depth-panel">
            <div class="order-book-content" id="depthContent"></div>
        </div>

        <!-- BOTTOM CENTER: Trading Panel -->
        <div class="panel trading-panel">
            <div class="order-tabs">
                <button class="order-tab buy active" onclick="switchOrderTab('buy')">Buy / Long</button>
                <button class="order-tab sell" onclick="switchOrderTab('sell')">Sell / Short</button>
            </div>
            <div class="order-form">
                <div class="form-group">
                    <div class="form-label">
                        <span>Price (USDT)</span>
                        <span>≈ <span id="priceUSDT">0.00</span> USDT</span>
                    </div>
                    <div class="form-input-container">
                        <input type="number" class="form-input" id="orderPrice" step="0.01" placeholder="0.00" oninput="calculateTotal()">
                        <span class="input-suffix">USDT</span>
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-label">
                        <span>Amount (ETH)</span>
                        <span>Available: <span id="availableBalance">0.00</span> <span id="availableAsset">USDT</span></span>
                    </div>
                    <div class="form-input-container">
                        <input type="number" class="form-input" id="orderAmount" step="0.000001" placeholder="0.00" oninput="calculateTotal()">
                        <span class="input-suffix">ETH</span>
                    </div>
                </div>
                <div class="percentage-buttons">
                    <button class="percentage-btn" onclick="setPercentage(25)">25%</button>
                    <button class="percentage-btn" onclick="setPercentage(50)">50%</button>
                    <button class="percentage-btn" onclick="setPercentage(75)">75%</button>
                    <button class="percentage-btn" onclick="setPercentage(100)">100%</button>
                </div>
                <div class="form-group">
                    <div class="form-label">
                        <span>Total</span>
                        <span>≈ <span id="totalValue">0.00</span> USDT</span>
                    </div>
                    <div class="form-input-container">
                        <input type="text" class="form-input" id="orderTotal" readonly>
                        <span class="input-suffix">USDT</span>
                    </div>
                </div>
                <button class="action-btn buy" id="placeOrderBtn" onclick="placeOrder()">Buy / Long ETH</button>
            </div>
        </div>

        <!-- BOTTOM RIGHT: Market Trades -->
        <div class="panel market-trades-panel">
            <div class="trades-header">
                <span>Price (USDT)</span>
                <span style="text-align: right;">Amount (ETH)</span>
                <span style="text-align: right;">Time</span>
            </div>
            <div class="trades-list" id="marketTradesList"></div>
        </div>
    </div>

    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <script>
        // =============================================
        // BINANCE EXACT UI + REAL-TIME WEBSOCKETS
        // =============================================
        let currentSymbol = 'ETHUSDT';
        let currentBase = 'ETH';
        let currentPrice = 0;
        let previousPrice = 0;
        let userBalance = 10000;
        let ws = null;
        let orderBook = { bids: [], asks: [] };
        let marketTrades = [];
        let marketPairs = [];
        let chartWidget = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMarketPairs();
            initWebSocket();
            initTradingView();
            setInterval(fetch24hStats, 3000);
            setInterval(() => renderOrderBook(), 200);
        });

        function initWebSocket() {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/ethusdt@depth20@100ms/ethusdt@trade');
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.e === 'depthUpdate') {
                    updateOrderBook(data);
                } else if (data.e === 'trade') {
                    updateTrade(data);
                }
            };
        }

        function updateOrderBook(data) {
            if (data.b) data.b.forEach(([p, q]) => updateBidAsk('bids', p, q));
            if (data.a) data.a.forEach(([p, q]) => updateBidAsk('asks', p, q));
            orderBook.bids.sort((a,b) => b[0] - a[0]);
            orderBook.asks.sort((a,b) => a[0] - b[0]);
            renderOrderBook();
        }

        function updateBidAsk(type, price, qty) {
            const arr = orderBook[type];
            const index = arr.findIndex(item => item[0] === parseFloat(price));
            if (parseFloat(qty) === 0) {
                if (index !== -1) arr.splice(index,1);
            } else {
                if (index !== -1) arr[index] = [parseFloat(price), parseFloat(qty)];
                else arr.push([parseFloat(price), parseFloat(qty)]);
            }
        }

        function updateTrade(trade) {
            const t = {
                price: parseFloat(trade.p),
                amount: parseFloat(trade.q),
                time: new Date(trade.T).toLocaleTimeString(),
                isBuy: !trade.m
            };
            marketTrades.unshift(t);
            if (marketTrades.length > 50) marketTrades.pop();
            previousPrice = currentPrice;
            currentPrice = t.price;
            document.getElementById('livePrice').innerText = `$${currentPrice.toFixed(2)}`;
            document.getElementById('priceUSDT').innerText = currentPrice.toFixed(2);
            const orderPrice = document.getElementById('orderPrice');
            if (orderPrice && !orderPrice.value) orderPrice.value = currentPrice.toFixed(2);
            renderTrades();
            calculateTotal();
        }

        function renderOrderBook() {
            const container = document.getElementById('orderBookContent');
            if (!container) return;
            let html = '';
            const maxTotal = [...orderBook.asks, ...orderBook.bids].reduce((max, [p,a]) => Math.max(max, p*a), 1);
            [...orderBook.asks].sort((a,b) => b[0]-a[0]).slice(0,12).forEach(([price, amount]) => {
                const total = price*amount;
                const depthPercent = (total/maxTotal)*100;
                html += `<div class="order-book-row order-sell" onclick="setPrice(${price})">
                            <div class="depth-bar sell-depth" style="width:${depthPercent}%"></div>
                            <span class="order-book-price sell">$${price.toFixed(2)}</span>
                            <span class="order-book-amount">${amount.toFixed(4)}</span>
                            <span class="order-book-total">$${total.toFixed(2)}</span>
                         </div>`;
            });
            html += `<div class="current-price-row">
                        <span class="current-price-value">$${currentPrice.toFixed(2)}</span>
                        <span class="current-price-change ${currentPrice>=previousPrice?'up':'down'}">
                            <i class="fas fa-arrow-${currentPrice>=previousPrice?'up':'down'}"></i>
                        </span>
                     </div>`;
            [...orderBook.bids].sort((a,b) => a[0]-b[0]).slice(0,12).forEach(([price, amount]) => {
                const total = price*amount;
                const depthPercent = (total/maxTotal)*100;
                html += `<div class="order-book-row order-buy" onclick="setPrice(${price})">
                            <div class="depth-bar buy-depth" style="width:${depthPercent}%"></div>
                            <span class="order-book-price buy">$${price.toFixed(2)}</span>
                            <span class="order-book-amount">${amount.toFixed(4)}</span>
                            <span class="order-book-total">$${total.toFixed(2)}</span>
                         </div>`;
            });
            container.innerHTML = html;

            // Depth panel
            const depthDiv = document.getElementById('depthContent');
            if (depthDiv) {
                let depthHtml = '<div style="padding:12px"><div style="color:var(--red); margin-bottom:8px">ASKS</div>';
                orderBook.asks.slice(0,5).forEach(([p,a]) => {
                    depthHtml += `<div style="display:flex; justify-content:space-between; font-size:12px"><span>$${p.toFixed(2)}</span><span>${a.toFixed(4)}</span></div>`;
                });
                depthHtml += '<div style="margin:8px 0; border-top:1px solid var(--border)"></div><div style="color:var(--green); margin-bottom:8px">BIDS</div>';
                orderBook.bids.slice(0,5).forEach(([p,a]) => {
                    depthHtml += `<div style="display:flex; justify-content:space-between; font-size:12px"><span>$${p.toFixed(2)}</span><span>${a.toFixed(4)}</span></div>`;
                });
                depthHtml += '</div>';
                depthDiv.innerHTML = depthHtml;
            }
        }

        function renderTrades() {
            const container = document.getElementById('marketTradesList');
            if (!container) return;
            let html = '';
            marketTrades.slice(0,20).forEach(t => {
                html += `<div class="trade-row">
                            <span class="trade-price ${t.isBuy ? 'buy' : 'sell'}">$${t.price.toFixed(2)}</span>
                            <span class="trade-amount" style="text-align:right">${t.amount.toFixed(4)}</span>
                            <span class="trade-time" style="text-align:right">${t.time}</span>
                         </div>`;
            });
            container.innerHTML = html;
        }

        async function loadMarketPairs() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                const top = data.filter(d => d.symbol.endsWith('USDT') && ['BTC','ETH','BNB','SOL','XRP','ADA','DOGE'].includes(d.symbol.replace('USDT','')));
                marketPairs = top.map(d => ({
                    symbol: d.symbol.replace('USDT',''),
                    price: parseFloat(d.lastPrice),
                    change: parseFloat(d.priceChangePercent),
                    logo: `https://assets.coingecko.com/coins/images/1/large/bitcoin.png`
                }));
                renderPairs();
            } catch(e) { console.error(e); }
        }

        function renderPairs() {
            const container = document.getElementById('pairsList');
            if (!container) return;
            let html = '';
            marketPairs.forEach(p => {
                const changeClass = p.change >=0 ? 'positive' : 'negative';
                html += `<div class="pair-row" onclick="switchPair('${p.symbol}')">
                            <div class="pair-name-cell">
                                <img src="${p.logo}" class="pair-small-logo">
                                <span class="pair-symbol">${p.symbol}/USDT</span>
                            </div>
                            <span class="pair-price">$${p.price.toFixed(2)}</span>
                            <span class="pair-change ${changeClass}">${p.change>=0?'+':''}${p.change.toFixed(2)}%</span>
                         </div>`;
            });
            container.innerHTML = html;
        }

        function filterPairs() {
            const search = document.getElementById('pairSearch').value.toLowerCase();
            const filtered = marketPairs.filter(p => p.symbol.toLowerCase().includes(search));
            const container = document.getElementById('pairsList');
            if (!container) return;
            let html = '';
            filtered.forEach(p => {
                const changeClass = p.change >=0 ? 'positive' : 'negative';
                html += `<div class="pair-row" onclick="switchPair('${p.symbol}')">
                            <div class="pair-name-cell">
                                <img src="${p.logo}" class="pair-small-logo">
                                <span class="pair-symbol">${p.symbol}/USDT</span>
                            </div>
                            <span class="pair-price">$${p.price.toFixed(2)}</span>
                            <span class="pair-change ${changeClass}">${p.change>=0?'+':''}${p.change.toFixed(2)}%</span>
                         </div>`;
            });
            container.innerHTML = html;
        }

        function filterPairsByTab(tab) {
            document.querySelectorAll('.pair-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            // simplified filter
            renderPairs();
        }

        function switchPair(symbol) {
            window.location.href = `trading.html?symbol=${symbol}`;
        }

        async function fetch24hStats() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT');
                const data = await res.json();
                const change = parseFloat(data.priceChangePercent);
                const changeClass = change >=0 ? 'positive' : 'negative';
                document.getElementById('marketStats').innerHTML = `
                    <div class="stat-item"><span class="stat-label">24h Change</span><span class="stat-value ${changeClass}">${change>=0?'+':''}${change.toFixed(2)}%</span></div>
                    <div class="stat-item"><span class="stat-label">24h High</span><span class="stat-value">$${parseFloat(data.highPrice).toFixed(2)}</span></div>
                    <div class="stat-item"><span class="stat-label">24h Low</span><span class="stat-value">$${parseFloat(data.lowPrice).toFixed(2)}</span></div>
                    <div class="stat-item"><span class="stat-label">24h Vol(ETH)</span><span class="stat-value">${parseFloat(data.volume).toFixed(2)}</span></div>
                `;
                document.getElementById('pairLogos').innerHTML = `
                    <img src="https://assets.coingecko.com/coins/images/279/large/ethereum.png" class="pair-logo">
                    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="pair-logo">
                `;
            } catch(e) {}
        }

        function initTradingView() {
            if (typeof TradingView !== 'undefined') {
                chartWidget = new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:ETHUSDT",
                    "interval": "15",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "container_id": "tradingview-chart",
                    "studies": ["Volume@tv-basicstudies"]
                });
            }
        }

        function changeTimeframe(tf) {
            document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const map = {'1m':'1','5m':'5','15m':'15','1H':'60','4H':'240','1D':'1D'};
            if (chartWidget) chartWidget.setSymbol('BINANCE:ETHUSDT', map[tf] || '15');
        }

        function switchChartTab(tab) {
            document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'info') {
                document.getElementById('tradingview-chart').innerHTML = '<div style="padding:20px;color:var(--text-primary)"><h3>ETH Information</h3><p>Ethereum is a decentralized blockchain platform...</p></div>';
            } else {
                document.getElementById('tradingview-chart').innerHTML = '';
                initTradingView();
            }
        }

        function setPrice(price) {
            document.getElementById('orderPrice').value = price.toFixed(2);
            calculateTotal();
        }

        function calculateTotal() {
            const price = parseFloat(document.getElementById('orderPrice').value) || currentPrice;
            const amount = parseFloat(document.getElementById('orderAmount').value) || 0;
            const total = price * amount;
            document.getElementById('orderTotal').value = total.toFixed(2);
            document.getElementById('totalValue').innerText = total.toFixed(2);
            document.getElementById('priceUSDT').innerText = price.toFixed(2);
        }

        function setPercentage(percent) {
            const totalBalance = userBalance;
            const price = parseFloat(document.getElementById('orderPrice').value) || currentPrice;
            const maxAmount = totalBalance / price;
            const amount = maxAmount * percent / 100;
            document.getElementById('orderAmount').value = amount.toFixed(6);
            calculateTotal();
        }

        function switchOrderTab(tab) {
            const buyBtn = document.querySelector('.order-tab.buy');
            const sellBtn = document.querySelector('.order-tab.sell');
            const actionBtn = document.getElementById('placeOrderBtn');
            if (tab === 'buy') {
                buyBtn.classList.add('active');
                sellBtn.classList.remove('active');
                actionBtn.className = 'action-btn buy';
                actionBtn.innerText = 'Buy / Long ETH';
                document.getElementById('availableAsset').innerText = 'USDT';
                document.getElementById('availableBalance').innerText = userBalance.toFixed(2);
            } else {
                buyBtn.classList.remove('active');
                sellBtn.classList.add('active');
                actionBtn.className = 'action-btn sell';
                actionBtn.innerText = 'Sell / Short ETH';
                const ethBalance = userBalance / currentPrice;
                document.getElementById('availableAsset').innerText = 'ETH';
                document.getElementById('availableBalance').innerText = ethBalance.toFixed(4);
            }
        }

        function placeOrder() {
            const amount = parseFloat(document.getElementById('orderAmount').value);
            if (!amount || amount <= 0) {
                alert('Please enter amount');
                return;
            }
            const price = parseFloat(document.getElementById('orderPrice').value) || currentPrice;
            const total = price * amount;
            if (document.querySelector('.order-tab.buy').classList.contains('active')) {
                if (total > userBalance) {
                    alert('Insufficient balance');
                    return;
                }
                userBalance -= total;
                alert(`Buy order placed: ${amount} ETH at $${price.toFixed(2)}`);
            } else {
                const ethBalance = userBalance / currentPrice;
                if (amount > ethBalance) {
                    alert('Insufficient ETH balance');
                    return;
                }
                userBalance += total;
                alert(`Sell order placed: ${amount} ETH at $${price.toFixed(2)}`);
            }
            document.getElementById('orderAmount').value = '';
            document.getElementById('orderTotal').value = '';
            switchOrderTab(document.querySelector('.order-tab.buy').classList.contains('active') ? 'buy' : 'sell');
        }
    </script>
</body>
</html>
