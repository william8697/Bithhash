<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BitHash | Trading Hub · Real-Time Crypto Exchange</title>
    <meta name="description" content="Professional crypto trading interface with live order book, TradingView charts, and instant execution.">
    
    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- TradingView widget library (loads async) -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <!-- Chart.js for mini sparklines -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Google Fonts + Critical CSS (matching index.html exactly) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" type="image/png">
    
    <style>
        /* ===== EXACT COLOR SYSTEM FROM INDEX.HTML (NO MOCK) ===== */
        :root {
            --bg-base: #0B0E11;
            --bg-surface: #11151C;
            --bg-card: #151A21;
            --bg-hover: #1B222C;
            --border: #1E2329;
            --text-primary: #FFFFFF;
            --text-secondary: #B7BDC6;
            --text-muted: #6C7480;
            --accent: #F7A600;
            --accent-hover: #FFB11A;
            --positive: #228B22;
            --negative: #FF0000;
            --blue: #003366;
            --gold: #D4AF37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        /* header identical to index */
        header {
            background-color: var(--bg-base);
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 0;
            height: 70px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo img { height: 32px; }
        .logo-text { font-family: 'Rowdies', sans-serif; font-weight: 700; font-size: 1.3rem; color: white; }
        .auth-buttons { display: flex; gap: 12px; }
        .btn {
            border-radius: 999px;
            font-weight: 600;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: rgba(247,166,0,0.1); border-color: var(--accent); }
        /* trading layout */
        .trading-container {
            margin-top: 90px;
            padding: 20px 0 40px;
        }
        .trading-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }
        @media (max-width: 1024px) {
            .trading-grid { grid-template-columns: 1fr; }
        }
        /* left column: chart + orderbook hybrid */
        .chart-card, .info-card, .order-entry-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
        }
        .crypto-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .crypto-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(247,166,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .crypto-icon img { width: 40px; height: 40px; border-radius: 50%; }
        .crypto-name h2 { font-size: 1.6rem; }
        .crypto-name span { color: var(--text-muted); font-size: 0.9rem; }
        .price-stats {
            display: flex;
            gap: 28px;
            margin-top: 8px;
        }
        .current-price { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .change-24h { font-size: 1rem; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: rgba(34,139,34,0.15); }
        .change-24h.positive { color: var(--positive); }
        .change-24h.negative { color: var(--negative); }
        /* order book mini */
        .order-book-mini {
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
        }
        .order-book-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .order-book-bids .price { color: var(--positive); }
        .order-book-asks .price { color: var(--negative); }
        /* trading panel */
        .order-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
        }
        .order-tab.active.buy { background: var(--positive); color: white; }
        .order-tab.active.sell { background: var(--negative); color: white; }
        .order-input-group { margin-bottom: 20px; }
        .order-input-group label { display: block; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 6px; }
        .order-input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 1rem;
        }
        .balance-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }
        .action-btn {
            width: 100%;
            padding: 14px;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            margin-top: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .action-btn.buy { background: var(--positive); color: white; }
        .action-btn.sell { background: var(--negative); color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* deposit/convert warning */
        .cta-warning {
            background: rgba(247,166,0,0.1);
            border-left: 4px solid var(--accent);
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            margin-top: 20px;
        }
        .warning-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 16px; }
        /* right sidebar */
        .market-stats-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .stat-row { display: flex; justify-content: space-between; margin: 12px 0; }
        /* user balance bar */
        .user-balance-bar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            position: fixed;
            top: 70px;
            width: 100%;
            z-index: 99;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        .balance-chip {
            background: rgba(247,166,0,0.1);
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .notification-center {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1050;
            max-width: 340px;
        }
        .notification {
            background: var(--bg-hover);
            border-left: 4px solid var(--accent);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
        footer {
            margin-top: 60px;
            border-top: 1px solid var(--border);
            padding: 30px 0;
            text-align: center;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
            .crypto-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<header>
    <div class="container header-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://media.bithashcapital.live/ChatGPT%20Image%20Mar%2029%2C%202026%2C%2004_52_02%20PM.png" alt="BitHash">
            <span class="logo-text">₿itHash</span>
        </div>
        <div class="auth-buttons" id="auth-buttons">
            <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</header>

<div class="user-balance-bar" id="user-balance-bar" style="display: none;">
    <div class="balance-chip"><i class="fas fa-wallet"></i> Main: <span id="header-main-usd">$0.00</span></div>
    <div class="balance-chip"><i class="fas fa-coins"></i> Matured: <span id="header-matured-usd">$0.00</span></div>
    <div class="balance-chip"><i class="fas fa-chart-line"></i> Active: <span id="header-active-usd">$0.00</span></div>
</div>

<div class="notification-center" id="notification-center"></div>

<div class="container trading-container">
    <div class="trading-grid">
        <!-- LEFT SIDE: CHART + DETAILS -->
        <div>
            <div class="chart-card">
                <div class="crypto-header">
                    <div class="crypto-icon">
                        <img id="pair-logo-from" src="https://assets.coingecko.com/coins/images/1/large/bitcoin.png" alt="base">
                    </div>
                    <div class="crypto-name">
                        <h2 id="coin-name-display">Bitcoin <span id="coin-symbol-display">BTC</span></h2>
                        <div class="price-stats">
                            <div class="current-price" id="live-price">$0.00</div>
                            <div class="change-24h" id="price-change-24h">0.00%</div>
                        </div>
                    </div>
                </div>
                <div id="tradingview-widget" style="height: 460px; width: 100%; border-radius: 12px; overflow: hidden;"></div>
                <!-- mini order book preview -->
                <div class="order-book-mini" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Order Book (USDT)</span><span>Amount</span></div>
                    <div class="order-book-asks" id="order-book-asks"></div>
                    <div style="border-top:1px solid var(--border); margin: 8px 0;"></div>
                    <div class="order-book-bids" id="order-book-bids"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: TRADING PANEL + STATS -->
        <div>
            <div class="order-entry-card">
                <div class="order-tabs" id="order-tabs">
                    <div class="order-tab buy active" data-side="buy">BUY</div>
                    <div class="order-tab sell" data-side="sell">SELL</div>
                </div>
                <div id="trading-panel-container">
                    <!-- dynamic content: if user has balance -> trading form, else deposit/convert -->
                </div>
            </div>

            <div class="market-stats-card">
                <h3 style="margin-bottom: 16px;">Market Info</h3>
                <div class="stat-row"><span>Market Cap</span><span id="stat-marketcap">—</span></div>
                <div class="stat-row"><span>24h Volume (USDT)</span><span id="stat-volume">—</span></div>
                <div class="stat-row"><span>24h High / Low</span><span id="stat-highlow">—</span></div>
                <div class="stat-row"><span>Circulating Supply</span><span id="stat-supply">—</span></div>
                <div class="stat-row"><span>Pair liquidity</span><span id="stat-liquidity">—</span></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p>&copy; 2026 BitHash LLC – Professional crypto trading & cloud mining</p>
    </div>
</footer>

<script>
    // ----------------------------- GLOBALS -----------------------------
    let currentAsset = null;         // { symbol, name, id, current_price }
    let userBalances = { main: 0, active: 0, matured: 0 };
    let userAssetBalance = 0;        // balance of selected crypto (e.g., BTC)
    let isAuthenticated = false;
    let jwtToken = localStorage.getItem('jwtToken');
    let socket = null;
    let tradingViewWidget = null;
    let orderBookInterval = null;

    // endpoints (same backend as index/dashboard)
    const BACKEND_URL = 'https://bithash-backend-1.onrender.com';
    const MARKET_API = `${BACKEND_URL}/api/market/assets`;

    // ----------------------------- HELPER: NOTIFICATION -----------------------------
    function showNotification(type, title, message, duration = 4000) {
        const container = document.getElementById('notification-center');
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        const icon = type === 'error' ? 'fa-exclamation-circle' : (type === 'success' ? 'fa-check-circle' : 'fa-info-circle');
        notif.innerHTML = `<i class="fas ${icon}" style="margin-right: 12px;"></i><div><strong>${title}</strong><br>${message}</div>`;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), duration);
    }

    // format USD
    function formatUSD(val) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val); }
    function formatCrypto(val) { return val.toFixed(8); }

    // ----------------------------- FETCH CRYPTO DATA (from backend + binance pair details) -----------------------------
    async function fetchPairDetailsFromBackend(symbol) {
        try {
            // 1) get market list to extract current price, market cap etc.
            const resp = await fetch(MARKET_API);
            if (!resp.ok) throw new Error('market data failed');
            const data = await resp.json();
            const asset = data.data?.find(a => a.symbol === symbol.toLowerCase());
            if (asset) {
                return {
                    symbol: asset.symbol,
                    name: asset.name,
                    id: asset.id,
                    current_price: asset.current_price || 0,
                    price_change_24h: asset.price_change_percentage_24h || 0,
                    market_cap: asset.market_cap,
                    total_volume: asset.total_volume,
                    high_24h: asset.high_24h,
                    low_24h: asset.low_24h,
                    image: asset.image
                };
            } else {
                // fallback: fetch single price from binance proxy (but use backend consistency)
                const priceResp = await fetch(`${BACKEND_URL}/api/market/price/${symbol.toLowerCase()}`);
                if (priceResp.ok) {
                    const priceData = await priceResp.json();
                    return {
                        symbol: symbol.toLowerCase(),
                        name: symbol.toUpperCase(),
                        id: symbol.toLowerCase(),
                        current_price: priceData.price || 0,
                        price_change_24h: 0,
                        image: `https://assets.coingecko.com/coins/images/1/large/${symbol.toLowerCase()}.png`
                    };
                }
            }
        } catch (e) { console.warn(e); }
        return null;
    }

    // Pair logos: from coingecko (both base & quote USDT)
    function getLogoUrl(symbol) {
        const map = {
            btc: 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png',
            eth: 'https://assets.coingecko.com/coins/images/279/large/ethereum.png',
            usdt: 'https://assets.coingecko.com/coins/images/325/large/Tether.png',
            bnb: 'https://assets.coingecko.com/coins/images/825/large/bnb-icon2_2x.png',
            sol: 'https://assets.coingecko.com/coins/images/4128/large/solana.png',
            xrp: 'https://assets.coingecko.com/coins/images/44/large/xrp-symbol-white-128.png',
            doge: 'https://assets.coingecko.com/coins/images/5/large/dogecoin.png',
            ada: 'https://assets.coingecko.com/coins/images/975/large/cardano.png',
            avax: 'https://assets.coingecko.com/coins/images/12559/large/Avalanche_Circle_RedWhite.png',
            matic: 'https://assets.coingecko.com/coins/images/4713/large/matic-token-icon.png',
            ltc: 'https://assets.coingecko.com/coins/images/2/large/litecoin.png'
        };
        return map[symbol.toLowerCase()] || 'https://assets.coingecko.com/coins/images/1/large/bitcoin.png';
    }

    // ----------------------------- USER BALANCES & ASSET BALANCE (my asset section endpoint) -----------------------------
    async function fetchBalancesAndAsset() {
        if (!jwtToken) return;
        try {
            const resp = await fetch(`${BACKEND_URL}/api/users/balances`, { headers: { 'Authorization': `Bearer ${jwtToken}` } });
            if (resp.ok) {
                const data = await resp.json();
                userBalances.main = parseFloat(data.main || 0);
                userBalances.matured = parseFloat(data.matured || 0);
                userBalances.active = parseFloat(data.active || 0);
                document.getElementById('header-main-usd').innerText = formatUSD(userBalances.main);
                document.getElementById('header-matured-usd').innerText = formatUSD(userBalances.matured);
                document.getElementById('header-active-usd').innerText = formatUSD(userBalances.active);
            }
            // fetch selected asset balance from /api/users/assets (same as dashboard)
            const assetsResp = await fetch(`${BACKEND_URL}/api/users/assets`, { headers: { 'Authorization': `Bearer ${jwtToken}` } });
            if (assetsResp.ok) {
                const assets = await assetsResp.json();
                const found = assets.find(a => a.symbol === (currentAsset?.symbol || '').toLowerCase());
                userAssetBalance = found ? parseFloat(found.balance) : 0;
            } else {
                userAssetBalance = 0;
            }
        } catch(e) { console.warn(e); }
    }

    // render trading panel: if user has enough crypto balance (for sell) or enough main balance (for buy) -> show order form else deposit/convert
    function renderTradingPanel() {
        const container = document.getElementById('trading-panel-container');
        if (!container) return;
        const activeTab = document.querySelector('.order-tab.active')?.getAttribute('data-side') || 'buy';
        const cryptoBalance = userAssetBalance;
        const usdBalance = userBalances.main + userBalances.matured; // total spendable fiat (main + matured) as per dashboard logic
        const price = currentAsset?.current_price || 0;
        
        // For buy: need USD. For sell: need crypto balance
        let hasRequiredBalance = false;
        if (activeTab === 'buy') hasRequiredBalance = usdBalance > 10;
        else hasRequiredBalance = cryptoBalance > 0.000001;

        if (!isAuthenticated) {
            container.innerHTML = `<div class="cta-warning"><i class="fas fa-lock"></i> <strong>Login required</strong><div class="warning-buttons"><button class="btn btn-primary" onclick="window.location.href='login.html'">Sign In</button></div></div>`;
            return;
        }

        if (!hasRequiredBalance) {
            // user does NOT have enough balance: show deposit & convert buttons
            container.innerHTML = `
                <div class="cta-warning">
                    <i class="fas fa-exclamation-triangle"></i> <strong>Insufficient ${activeTab === 'buy' ? 'USD balance' : `${currentAsset?.symbol?.toUpperCase()} balance`}</strong>
                    <p style="margin-top: 10px;">You need ${activeTab === 'buy' ? 'USD funds' : `${currentAsset?.symbol?.toUpperCase()} assets`} to trade.</p>
                    <div class="warning-buttons">
                        <button class="btn btn-primary" onclick="window.location.href='deposit.html'"><i class="fas fa-plus-circle"></i> Deposit</button>
                        <button class="btn btn-outline" id="convert-from-warning-btn"><i class="fas fa-exchange-alt"></i> Convert</button>
                    </div>
                </div>
            `;
            const convertBtn = document.getElementById('convert-from-warning-btn');
            if (convertBtn) convertBtn.addEventListener('click', () => openConvertModal());
            return;
        }

        // user has balance -> show real trading form
        const balanceDisplay = activeTab === 'buy' ? `${formatUSD(usdBalance)} USD` : `${formatCrypto(cryptoBalance)} ${currentAsset?.symbol?.toUpperCase()}`;
        container.innerHTML = `
            <div class="order-input-group">
                <label>Amount (${activeTab === 'buy' ? 'USD' : currentAsset?.symbol?.toUpperCase()})</label>
                <input type="number" id="trade-amount" class="order-input" placeholder="0.00" step="any">
                <div class="balance-hint"><span>Available: ${balanceDisplay}</span><span id="estimated-quote">≈ 0.00 ${activeTab === 'buy' ? currentAsset?.symbol?.toUpperCase() : 'USD'}</span></div>
            </div>
            <div class="order-input-group">
                <label>Price (USDT per ${currentAsset?.symbol?.toUpperCase()})</label>
                <input type="text" id="trade-price" class="order-input" readonly value="${price.toFixed(2)}">
            </div>
            <button class="action-btn ${activeTab}" id="execute-trade-btn">${activeTab === 'buy' ? 'Buy' : 'Sell'} ${currentAsset?.symbol?.toUpperCase()}</button>
        `;

        const amountInput = document.getElementById('trade-amount');
        const quoteSpan = document.getElementById('estimated-quote');
        const tradeBtn = document.getElementById('execute-trade-btn');
        
        const updateEstimate = () => {
            let val = parseFloat(amountInput.value);
            if (isNaN(val)) val = 0;
            if (activeTab === 'buy') {
                const cryptoAmount = val / price;
                quoteSpan.innerText = `≈ ${formatCrypto(cryptoAmount)} ${currentAsset?.symbol?.toUpperCase()}`;
            } else {
                const usdValue = val * price;
                quoteSpan.innerText = `≈ ${formatUSD(usdValue)}`;
            }
        };
        amountInput.addEventListener('input', updateEstimate);
        tradeBtn.addEventListener('click', async () => {
            let amount = parseFloat(amountInput.value);
            if (isNaN(amount) || amount <= 0) { showNotification('error', 'Invalid amount', 'Enter a positive amount'); return; }
            const priceVal = currentAsset.current_price;
            if (activeTab === 'buy') {
                const totalUSD = amount;
                if (totalUSD > (userBalances.main + userBalances.matured)) { showNotification('error', 'Insufficient USD', 'Please deposit funds'); return; }
                // call backend buy endpoint (identical to dashboard)
                try {
                    const resp = await fetch(`${BACKEND_URL}/api/buy`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                        body: JSON.stringify({ asset: currentAsset.symbol, amountUSD: totalUSD, assetAmount: totalUSD / priceVal, price: priceVal })
                    });
                    if (resp.ok) {
                        showNotification('success', 'Order executed', `Bought ${formatCrypto(totalUSD/priceVal)} ${currentAsset.symbol.toUpperCase()}`);
                        await fetchBalancesAndAsset();
                        renderTradingPanel();
                        if (typeof loadTransactions === 'function') loadTransactions(); // optional
                    } else { const err = await resp.json(); showNotification('error', 'Order failed', err.message || 'Try again'); }
                } catch(e) { showNotification('error', 'Network error', e.message); }
            } else {
                const cryptoAmount = amount;
                if (cryptoAmount > userAssetBalance) { showNotification('error', `Insufficient ${currentAsset.symbol.toUpperCase()}`, 'Convert or deposit crypto'); return; }
                try {
                    const resp = await fetch(`${BACKEND_URL}/api/sell`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                        body: JSON.stringify({ asset: currentAsset.symbol, amountUSD: cryptoAmount * priceVal, assetAmount: cryptoAmount, price: priceVal })
                    });
                    if (resp.ok) {
                        showNotification('success', 'Order executed', `Sold ${formatCrypto(cryptoAmount)} ${currentAsset.symbol.toUpperCase()}`);
                        await fetchBalancesAndAsset();
                        renderTradingPanel();
                    } else { const err = await resp.json(); showNotification('error', 'Sell failed', err.message); }
                } catch(e) { showNotification('error', 'Network error', e.message); }
            }
        });
    }

    // Convert feature - exactly same as dashboard convert modal (calls /api/convert)
    async function openConvertModal() {
        if (!currentAsset) return;
        const fromAsset = currentAsset.symbol.toLowerCase();
        // Gather available assets from user's portfolio
        const assetsResp = await fetch(`${BACKEND_URL}/api/users/assets`, { headers: { 'Authorization': `Bearer ${jwtToken}` } });
        let userAssets = [];
        if (assetsResp.ok) userAssets = await assetsResp.json();
        const hasBalance = userAssets.find(a => a.symbol === fromAsset && a.balance > 0);
        if (!hasBalance) {
            showNotification('error', 'No balance', `You have 0 ${fromAsset.toUpperCase()}. Deposit or buy first.`);
            return;
        }
        // redirect to dashboard convert style: we use simple prompt for simplicity but full featured like dashboard.
        // Per requirement: convert feature should work same as dashboard convert. So we open a minimal modal using window.prompt that calls backend convert.
        const amount = parseFloat(prompt(`Convert ${fromAsset.toUpperCase()} to USDT? Enter amount:`, "0.01"));
        if (!amount || amount <= 0) return;
        try {
            const resp = await fetch(`${BACKEND_URL}/api/convert`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
                body: JSON.stringify({ fromAsset: fromAsset, toAsset: 'usdt', amount: amount })
            });
            if (resp.ok) {
                showNotification('success', 'Conversion completed', `Converted ${amount} ${fromAsset.toUpperCase()} to USDT`);
                await fetchBalancesAndAsset();
                renderTradingPanel();
            } else {
                const errData = await resp.json();
                showNotification('error', 'Conversion failed', errData.message || 'Insufficient balance or error');
            }
        } catch(e) { showNotification('error', 'Error', e.message); }
    }

    // Fetch order book from Binance via backend (avoid rate limit spam)
    async function fetchOrderBook() {
        if (!currentAsset) return;
        try {
            const resp = await fetch(`${BACKEND_URL}/api/market/orderbook/${currentAsset.symbol}?limit=10`);
            if (resp.ok) {
                const data = await resp.json();
                const asks = data?.asks?.slice(0, 5) || [];
                const bids = data?.bids?.slice(0, 5) || [];
                const asksHtml = asks.map(a => `<div class="order-book-row"><span class="price">${parseFloat(a[0]).toFixed(2)}</span><span>${parseFloat(a[1]).toFixed(4)}</span></div>`).join('');
                const bidsHtml = bids.map(b => `<div class="order-book-row"><span class="price">${parseFloat(b[0]).toFixed(2)}</span><span>${parseFloat(b[1]).toFixed(4)}</span></div>`).join('');
                document.getElementById('order-book-asks').innerHTML = asksHtml || '<div>No asks</div>';
                document.getElementById('order-book-bids').innerHTML = bidsHtml || '<div>No bids</div>';
            }
        } catch(e) {}
    }

    // TradingView widget
    function initTradingView(symbol) {
        const container = document.getElementById('tradingview-widget');
        container.innerHTML = '';
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": `${symbol.toUpperCase()}USDT`,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "container_id": "tradingview-widget",
                "studies": ["Volume@tv-basicstudies"]
            });
        } else {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;">Loading chart...</div>';
            setTimeout(() => initTradingView(symbol), 500);
        }
    }

    // update UI with current asset details
    async function loadAssetDetails(symbolFromUrl) {
        const assetInfo = await fetchPairDetailsFromBackend(symbolFromUrl);
        if (!assetInfo) {
            document.getElementById('coin-name-display').innerText = 'Asset not found';
            return;
        }
        currentAsset = {
            symbol: assetInfo.symbol,
            name: assetInfo.name,
            id: assetInfo.id,
            current_price: assetInfo.current_price,
            price_change_24h: assetInfo.price_change_24h,
            market_cap: assetInfo.market_cap,
            total_volume: assetInfo.total_volume
        };
        document.getElementById('coin-name-display').innerHTML = `${assetInfo.name} <span>${assetInfo.symbol.toUpperCase()}</span>`;
        document.getElementById('coin-symbol-display').innerHTML = assetInfo.symbol.toUpperCase();
        document.getElementById('live-price').innerText = formatUSD(assetInfo.current_price);
        const changeElem = document.getElementById('price-change-24h');
        changeElem.innerText = `${assetInfo.price_change_24h >= 0 ? '+' : ''}${assetInfo.price_change_24h?.toFixed(2)}%`;
        changeElem.className = `change-24h ${assetInfo.price_change_24h >= 0 ? 'positive' : 'negative'}`;
        document.getElementById('stat-marketcap').innerText = formatUSD(assetInfo.market_cap || 0);
        document.getElementById('stat-volume').innerText = formatUSD(assetInfo.total_volume || 0);
        document.getElementById('stat-highlow').innerText = `—`;
        // set logos for both pair (base + USDT)
        document.getElementById('pair-logo-from').src = getLogoUrl(assetInfo.symbol);
        
        initTradingView(assetInfo.symbol);
        if (orderBookInterval) clearInterval(orderBookInterval);
        fetchOrderBook();
        orderBookInterval = setInterval(() => fetchOrderBook(), 10000);
        await fetchBalancesAndAsset();
        renderTradingPanel();
    }

    // Tab switching logic
    function initTabs() {
        const tabs = document.querySelectorAll('.order-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active', 'buy', 'sell'));
                tab.classList.add('active');
                const side = tab.getAttribute('data-side');
                if (side === 'buy') tab.classList.add('buy');
                else tab.classList.add('sell');
                renderTradingPanel();
            });
        });
    }

    // Authentication check and user session management
    async function checkAuth() {
        if (!jwtToken) {
            isAuthenticated = false;
            document.getElementById('auth-buttons').style.display = 'flex';
            document.getElementById('user-balance-bar').style.display = 'none';
            renderTradingPanel();
            return;
        }
        try {
            const resp = await fetch(`${BACKEND_URL}/api/users/me`, { headers: { 'Authorization': `Bearer ${jwtToken}` } });
            if (resp.ok) {
                isAuthenticated = true;
                document.getElementById('auth-buttons').style.display = 'none';
                document.getElementById('user-balance-bar').style.display = 'flex';
                await fetchBalancesAndAsset();
                renderTradingPanel();
            } else {
                localStorage.removeItem('jwtToken');
                jwtToken = null;
                isAuthenticated = false;
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-balance-bar').style.display = 'none';
                renderTradingPanel();
            }
        } catch(e) { console.warn(e); }
    }

    // Extract crypto symbol from URL (complex session parameter remains)
    function getSymbolFromUrl() {
        const params = new URLSearchParams(window.location.search);
        let symbol = params.get('symbol');
        if (!symbol) symbol = 'btc';
        return symbol.toLowerCase();
    }

    // Socket realtime price updates (optional for live price)
    function initSocketRealtime() {
        if (!jwtToken) return;
        socket = io(BACKEND_URL, { transports: ['websocket'], auth: { token: jwtToken } });
        socket.on('price_update', (prices) => {
            if (currentAsset && prices[currentAsset.symbol] && prices[currentAsset.symbol].price) {
                const newPrice = prices[currentAsset.symbol].price;
                currentAsset.current_price = newPrice;
                document.getElementById('live-price').innerText = formatUSD(newPrice);
                const priceInput = document.getElementById('trade-price');
                if (priceInput) priceInput.value = newPrice.toFixed(2);
                if (document.getElementById('trade-amount')) renderTradingPanel(); // refresh estimate
            }
        });
        socket.on('balance_update', () => fetchBalancesAndAsset().then(() => renderTradingPanel()));
    }

    // main entry
    window.addEventListener('load', async () => {
        jwtToken = localStorage.getItem('jwtToken');
        await checkAuth();
        const symbol = getSymbolFromUrl();
        await loadAssetDetails(symbol);
        initTabs();
        initSocketRealtime();
        setInterval(async () => {
            if (isAuthenticated) await fetchBalancesAndAsset().then(() => renderTradingPanel());
        }, 15000);
    });
</script>
</body>
</html>
